    {s:'Spring Core'},
    {q:'IoC и DI в Spring',a:'<b>IoC</b> (Inversion of Control) — фреймворк управляет созданием и жизненным циклом объектов.\n<b>DI</b> (Dependency Injection) — способ реализации IoC: зависимости внедряются извне.\n\n<b>3 способа DI:</b>\n<pre><code>// 1. Constructor injection (РЕКОМЕНДУЕМЫЙ)\n@Service\npublic class PaymentService {\n    private final PaymentRepository repo;    // final!\n    private final NotificationService notify;\n\n    // С одним конструктором @Autowired не нужен (Spring 4.3+)\n    public PaymentService(PaymentRepository repo, NotificationService notify) {\n        this.repo = repo;\n        this.notify = notify;\n    }\n}\n\n// 2. Setter injection (для опциональных зависимостей)\n@Autowired(required = false)\npublic void setCache(CacheService cache) { this.cache = cache; }\n\n// 3. Field injection (НЕ рекомендуется)\n@Autowired\nprivate PaymentRepository repo; // сложнее тестировать!</code></pre>\n\n<b>Почему constructor лучше:</b>\n• final поля — immutable, thread-safe\n• Видны зависимости в конструкторе\n• Легко тестировать: new PaymentService(mockRepo, mockNotify)\n• Нельзя забыть зависимость (compile error)\n\n<b>ApplicationContext vs BeanFactory:</b>\n• BeanFactory — базовый контейнер, lazy loading\n• ApplicationContext — расширяет BeanFactory: events, i18n, AOP, eager loading\n\n<b>На собесе:</b> почему field injection плохо? (нельзя сделать final, сложнее тестировать, скрытые зависимости)',hot:1,lvl:1},
    {q:'Жизненный цикл бина',a:'<pre><code>1.  Instantiation (создание объекта)\n2.  Populate Properties (DI — внедрение зависимостей)\n3.  BeanNameAware.setBeanName()\n4.  BeanFactoryAware.setBeanFactory()\n5.  ApplicationContextAware.setApplicationContext()\n6.  BeanPostProcessor.postProcessBeforeInitialization()\n7.  @PostConstruct  ← тут инициализация!\n8.  InitializingBean.afterPropertiesSet()\n9.  custom init-method\n10. BeanPostProcessor.postProcessAfterInitialization()\n    ← тут создаются AOP proxy (@Transactional, @Cacheable)!\n--- Бин готов к использованию ---\n11. @PreDestroy  ← тут cleanup!\n12. DisposableBean.destroy()\n13. custom destroy-method</code></pre>\n\n<b>Пример:</b>\n<pre><code>@Service\npublic class PaymentService {\n\n    @PostConstruct\n    void init() {\n        log.info("PaymentService initialized");\n        // загрузка справочников, прогрев кэша\n    }\n\n    @PreDestroy\n    void cleanup() {\n        log.info("PaymentService shutting down");\n        // закрытие ресурсов, flush кэша\n    }\n}</code></pre>\n\n<b>BeanPostProcessor — самый важный:</b>\n• Вызывается для КАЖДОГО бина\n• postProcessAfterInitialization — создаёт proxy (AOP)\n• Именно поэтому @Transactional работает через proxy\n\n<b>На собесе:</b> в какой момент создаётся proxy для @Transactional? (step 10 — postProcessAfterInitialization)',hot:1,lvl:2},
    {q:'Скоупы бинов',a:'• <b>singleton</b> (default) — один на контейнер\n• <b>prototype</b> — новый каждый раз\n• request, session, application (web)\n\nSingleton → Prototype проблема: один prototype.\nРешения: @Lookup, ObjectFactory, Provider, proxyMode.',lvl:1},
    {q:'@Bean vs @Component и стереотипы',a:'<b>@Component</b> — автосканирование (@ComponentScan)\n<b>@Service</b> — бизнес-логика\n<b>@Repository</b> — DAO + трансляция исключений\n<b>@Controller/@RestController</b> — web\n<b>@Bean</b> — метод в @Configuration (сторонние библиотеки)\n\n@Primary — приоритет. @Qualifier — по имени.\n@Conditional, @Profile — условные бины.',hot:1,lvl:2},
    {q:'@Autowired, @Inject, @Resource — разница',a:'<b>@Autowired</b> (Spring): по типу, потом @Qualifier.\n<b>@Inject</b> (Jakarta CDI): аналог @Autowired, стандарт.\n<b>@Resource</b> (Jakarta): по имени, потом по типу.\n\nРекомендация: constructor injection без аннотации (Spring 4.3+: единственный конструктор автоматически).',lvl:2},
    {q:'Как заинжектить примитив или коллекцию?',a:'<b>Примитив:</b>\n<code>@Value("${app.timeout:5000}") private int timeout;</code>\n<code>@Value("#{2 * 3}") private int calc;</code> — SpEL\n\n<b>Коллекция бинов:</b>\n<code>@Autowired private List<PaymentStrategy> strategies;</code>\nИнжектит все бины типа PaymentStrategy.\n\n<code>@Autowired private Map<String, PaymentStrategy> map;</code>\nКлюч = имя бина, значение = бин.',lvl:2},
    {q:'BeanPostProcessor и BeanFactoryPostProcessor',a:'<b>BeanPostProcessor:</b> модифицирует бины после создания.\n• postProcessBeforeInitialization — до @PostConstruct\n• postProcessAfterInitialization — после (здесь создаются proxy!)\n\n<b>BeanFactoryPostProcessor:</b> модифицирует определения бинов до их создания.\nПример: PropertySourcesPlaceholderConfigurer — подставляет ${} значения.',lvl:2},
    {s:'Spring MVC'},
    {q:'@Controller vs @RestController',a:'@Controller — возвращает View.\n@RestController = @Controller + @ResponseBody — JSON/XML.\n\n@GetMapping, @PostMapping, @PutMapping, @DeleteMapping\n@RequestParam, @PathVariable, @RequestBody, @RequestHeader\nResponseEntity<T> — статус + заголовки + тело.',lvl:2},
    {q:'Обработка ошибок в Spring MVC',a:'<b>Глобальный обработчик (рекомендуемый):</b>\n<pre><code>@RestControllerAdvice\npublic class GlobalExceptionHandler {\n\n    @ExceptionHandler(PaymentNotFoundException.class)\n    @ResponseStatus(HttpStatus.NOT_FOUND)\n    public ProblemDetail handleNotFound(PaymentNotFoundException ex) {\n        ProblemDetail pd = ProblemDetail.forStatusAndDetail(\n            HttpStatus.NOT_FOUND, ex.getMessage());\n        pd.setTitle("Payment Not Found");\n        pd.setProperty("paymentId", ex.getPaymentId());\n        return pd;\n    }\n\n    @ExceptionHandler(ConstraintViolationException.class)\n    @ResponseStatus(HttpStatus.BAD_REQUEST)\n    public ProblemDetail handleValidation(ConstraintViolationException ex) {\n        ProblemDetail pd = ProblemDetail.forStatus(HttpStatus.BAD_REQUEST);\n        pd.setTitle("Validation Error");\n        pd.setProperty("violations", ex.getConstraintViolations().stream()\n            .map(v -> v.getPropertyPath() + ": " + v.getMessage())\n            .toList());\n        return pd;\n    }\n\n    @ExceptionHandler(Exception.class)\n    @ResponseStatus(HttpStatus.INTERNAL_SERVER_ERROR)\n    public ProblemDetail handleGeneral(Exception ex) {\n        log.error("Unexpected error", ex);\n        return ProblemDetail.forStatusAndDetail(\n            HttpStatus.INTERNAL_SERVER_ERROR, "Internal server error");\n    }\n}</code></pre>\n\n<b>ProblemDetail (RFC 7807, Spring 6):</b> стандартный формат ошибок JSON.\n\n<b>На собесе:</b> как обрабатываете ошибки в REST API? (@RestControllerAdvice + ProblemDetail)',lvl:2},
    {q:'Filters vs Interceptors',a:'<pre><code>HTTP Request\n    ↓\nFilter 1 (Servlet level)  ← CORS, Security, Logging\n    ↓\nFilter 2\n    ↓\nDispatcherServlet\n    ↓\nInterceptor.preHandle()   ← Auth, Metrics, MDC\n    ↓\nController\n    ↓\nInterceptor.postHandle()  ← Modify Model\n    ↓\nView Rendering\n    ↓\nInterceptor.afterCompletion() ← Cleanup\n    ↓\nFilter 2 (response)\n    ↓\nFilter 1 (response)</code></pre>\n\n<b>Filter (Servlet API):</b>\n• До DispatcherServlet\n• Работает с ServletRequest/Response\n• Не знает о Spring MVC (controllers, handlers)\n• Для: CORS, Security, request logging, compression\n\n<b>Interceptor (Spring MVC):</b>\n• После DispatcherServlet, до Controller\n• Знает о Spring (доступ к Handler, ModelAndView)\n• Для: аутентификация, метрики, MDC (trace_id), rate limiting\n\n<pre><code>// Filter\n@Component\npublic class RequestLogFilter implements Filter {\n    public void doFilter(ServletRequest req, ServletResponse res, FilterChain chain) {\n        log.info("Request: {}", ((HttpServletRequest) req).getRequestURI());\n        chain.doFilter(req, res);\n    }\n}\n\n// Interceptor\n@Component\npublic class TraceInterceptor implements HandlerInterceptor {\n    public boolean preHandle(HttpServletRequest req, HttpServletResponse res, Object handler) {\n        MDC.put("traceId", UUID.randomUUID().toString());\n        return true;\n    }\n    public void afterCompletion(...) { MDC.clear(); }\n}</code></pre>\n\n<b>На собесе:</b> где лучше логировать запросы — Filter или Interceptor? (Filter — видит ВСЕ запросы, включая ошибки до контроллера)',lvl:2},
    {s:'Spring Boot 3'},
    {q:'Spring Boot 3 — ключевые изменения',a:'<b>Главные изменения:</b>\n\n• <b>Java 17+ минимум</b>\n• <b>javax.* -> jakarta.*</b> (Jakarta EE 10)\n<pre><code>// Было:\nimport javax.persistence.Entity;\nimport javax.servlet.http.HttpServletRequest;\n\n// Стало:\nimport jakarta.persistence.Entity;\nimport jakarta.servlet.http.HttpServletRequest;</code></pre>\n\n• <b>Spring Framework 6</b> под капотом\n\n• <b>Observability</b> — встроенная поддержка:\n<pre><code>// Micrometer + Micrometer Tracing (замена Spring Cloud Sleuth)\nmanagement.tracing.sampling.probability=1.0\nmanagement.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans</code></pre>\n\n• <b>Virtual Threads</b> (Java 21):\n<pre><code>spring.threads.virtual.enabled=true\n# Все HTTP запросы на virtual threads!</code></pre>\n\n• <b>GraalVM Native Image</b> — AOT компиляция:\n<pre><code>mvn -Pnative native:compile\n# Быстрый старт (~100ms), меньше памяти\n# Но: время компиляции, ограничения рефлексии</code></pre>\n\n• <b>HTTP Interface Clients</b> (@HttpExchange)\n• <b>ProblemDetail</b> (RFC 7807) — стандарт ошибок\n• <b>Docker Compose support</b> — автозапуск\n• <b>Testcontainers @ServiceConnection</b>\n\n<b>На собесе:</b> что нужно изменить при миграции на Spring Boot 3? (javax->jakarta, Java 17+, обновить зависимости)',hot:1,lvl:2},
    {q:'Spring Boot Auto-configuration',a:'Магия Spring Boot — автоматическая конфигурация бинов на основе classpath.\n\n<b>Механизм:</b>\n1. @SpringBootApplication включает @EnableAutoConfiguration\n2. Загружает классы из META-INF/spring/AutoConfiguration.imports\n3. Каждый класс — @Configuration с условиями:\n<pre><code>@AutoConfiguration\n@ConditionalOnClass(KafkaTemplate.class)       // есть в classpath?\n@ConditionalOnProperty(name = "spring.kafka.bootstrap-servers") // есть property?\npublic class KafkaAutoConfiguration {\n\n    @Bean\n    @ConditionalOnMissingBean  // только если пользователь не создал сам\n    public KafkaTemplate kafkaTemplate(ProducerFactory pf) {\n        return new KafkaTemplate(pf);\n    }\n}</code></pre>\n\n<b>Пример:</b> добавил spring-kafka + spring.kafka.bootstrap-servers -> автоматически: KafkaTemplate, ProducerFactory, ConsumerFactory.\n\n<b>Условные аннотации:</b>\n• @ConditionalOnClass — класс в classpath\n• @ConditionalOnMissingBean — бин ещё не создан\n• @ConditionalOnProperty — property задано\n• @ConditionalOnWebApplication — web-приложение\n\n<b>Отключить:</b>\n<pre><code>@SpringBootApplication(exclude = DataSourceAutoConfiguration.class)</code></pre>\n\n<b>Посмотреть что включено:</b> --debug или /actuator/conditions\n\n<b>На собесе:</b> как Spring Boot понимает что настроить? (classpath scanning + conditional annotations)',lvl:2},
    {q:'Spring Boot Actuator',a:'Production-ready мониторинг из коробки.\n\n<pre><code># application.yml\nmanagement:\n  endpoints:\n    web:\n      exposure:\n        include: health,metrics,prometheus,info,loggers\n  endpoint:\n    health:\n      show-details: when-authorized\n      probes:\n        enabled: true  # /health/liveness, /health/readiness</code></pre>\n\n<b>Ключевые endpoints:</b>\n<pre><code>/actuator/health          — UP/DOWN (для K8s probes)\n/actuator/health/liveness — жив ли контейнер?\n/actuator/health/readiness — готов принимать трафик?\n/actuator/metrics         — все метрики\n/actuator/prometheus      — метрики в формате Prometheus\n/actuator/info            — информация о приложении\n/actuator/loggers         — управление уровнями логов в runtime!\n/actuator/env             — environment properties</code></pre>\n\n<b>Кастомная метрика:</b>\n<pre><code>@Service\npublic class PaymentService {\n    private final Counter paymentCounter;\n    private final Timer paymentTimer;\n\n    PaymentService(MeterRegistry registry) {\n        this.paymentCounter = registry.counter("payments.total", "type", "card");\n        this.paymentTimer = registry.timer("payments.duration");\n    }\n\n    public Payment process(Request req) {\n        return paymentTimer.record(() -> {\n            paymentCounter.increment();\n            return doProcess(req);\n        });\n    }\n}</code></pre>\n\n<b>На собесе:</b> как мониторите приложение? (Actuator -> Prometheus -> Grafana. Custom метрики через MeterRegistry)',lvl:2},
    {s:'AOP'},
    {q:'AOP в Spring',a:'Аспектно-ориентированное программирование — вынесение сквозной логики.\n\n<b>Терминология:</b>\n<pre><code>@Aspect        — класс с advice\nJoin Point     — точка выполнения (вызов метода)\nPointcut       — какие join points перехватить\nAdvice         — что сделать (Before, After, Around)\nWeaving        — внедрение (Spring: runtime proxy)</code></pre>\n\n<b>Пример — логирование времени выполнения:</b>\n<pre><code>@Aspect\n@Component\npublic class TimingAspect {\n\n    @Around("@annotation(Timed)")\n    public Object measureTime(ProceedingJoinPoint pjp) throws Throwable {\n        long start = System.currentTimeMillis();\n        try {\n            return pjp.proceed(); // вызов оригинального метода\n        } finally {\n            long elapsed = System.currentTimeMillis() - start;\n            log.info("{}.{} took {} ms",\n                pjp.getTarget().getClass().getSimpleName(),\n                pjp.getSignature().getName(), elapsed);\n        }\n    }\n}\n\n// Использование:\n@Timed\npublic Payment processPayment(Long id) { ... }</code></pre>\n\n<b>Типы advice:</b>\n• @Before — до метода\n• @After — после (всегда)\n• @AfterReturning — после успешного выполнения\n• @AfterThrowing — после исключения\n• @Around — полный контроль (до + после)\n\n<b>Proxy:</b>\n• JDK Dynamic Proxy — для интерфейсов\n• CGLIB — для классов (default в Spring Boot) — создаёт подкласс\n\n<b>Self-invocation:</b> <code>this.method()</code> НЕ проходит через proxy!\n@Transactional, @Cacheable, @Async, @Secured — все через AOP.\n\n<b>На собесе:</b> почему self-invocation не работает? (this = оригинальный объект, не proxy)',hot:1,lvl:2},
    {s:'Транзакции'},
    {q:'@Transactional — как работает',a:'Spring создаёт CGLIB proxy вокруг бина:\n\n<pre><code>// Что видит Spring:\nPaymentService$$CGLIB_PROXY {\n    PaymentService target; // оригинальный объект\n\n    void process(Payment p) {\n        // 1. Открыть транзакцию\n        TransactionStatus tx = txManager.getTransaction(definition);\n        try {\n            target.process(p);  // 2. Вызвать оригинал\n            txManager.commit(tx); // 3. Commit\n        } catch (RuntimeException e) {\n            txManager.rollback(tx); // 4. Rollback\n            throw e;\n        }\n    }\n}</code></pre>\n\n<b>Propagation:</b>\n<pre><code>REQUIRED (default)  — есть TX? используем. Нет? создаём.\nREQUIRES_NEW        — всегда новая TX (suspend текущей)\n                      Пример: аудит-лог должен сохраниться\n                      даже если основная TX откатится\nNESTED              — savepoint внутри текущей TX\nSUPPORTS            — есть TX? используем. Нет? без TX.\nNOT_SUPPORTED       — suspend текущей TX\nMANDATORY           — TX обязательна, иначе исключение\nNEVER               — TX запрещена, иначе исключение</code></pre>\n\n<b>Rollback:</b>\n• RuntimeException — ROLLBACK (по умолчанию)\n• Checked Exception — НЕ откатывает!\n• Явно: <code>@Transactional(rollbackFor = Exception.class)</code>\n\n<b>3 главных подводных камня:</b>\n<pre><code>// 1. Self-invocation — proxy не работает!\n@Service\npublic class PaymentService {\n    @Transactional\n    public void process() { ... }\n\n    public void batch() {\n        this.process(); // ПРОБЛЕМА! this = оригинал, НЕ proxy!\n    }\n}\n// Решение: self-inject, AopContext.currentProxy(), TransactionTemplate\n\n// 2. private метод — proxy не перехватывает!\n@Transactional\nprivate void process() { ... } // НЕ РАБОТАЕТ!\n\n// 3. Checked exception без rollbackFor\n@Transactional // не откатит при IOException!\nvoid process() throws IOException { ... }\n@Transactional(rollbackFor = Exception.class) // теперь откатит</code></pre>\n\n<b>На собесе:</b> самый частый вопрос по Spring! Объясни self-invocation + как починить.',hot:1,lvl:2},
    {q:'@Transactional readOnly',a:'<pre><code>@Transactional(readOnly = true)\npublic List&lt;Payment&gt; findByStatus(Status status) {\n    return repo.findByStatus(status);\n}</code></pre>\n\n<b>Что делает readOnly = true:</b>\n\n1. <b>Hibernate</b> отключает dirty checking:\n   • Не создаёт snapshot при загрузке Entity\n   • Экономит память и CPU\n   • flush mode = MANUAL (не генерирует UPDATE)\n\n2. <b>JDBC</b>: <code>connection.setReadOnly(true)</code>\n   • PostgreSQL может направить на replica\n   • Некоторые СУБД оптимизируют запросы\n\n3. <b>Spring</b>: hint для TransactionManager\n   • НЕ бросает исключение при попытке записи (зависит от БД)\n\n<b>Лучшая практика:</b>\n<pre><code>@Service\n@Transactional(readOnly = true) // default для всего сервиса\npublic class PaymentQueryService {\n\n    public List&lt;Payment&gt; findAll() { ... }     // readOnly\n    public Payment findById(Long id) { ... }    // readOnly\n\n    @Transactional // override: read-write для мутаций\n    public Payment create(CreateRequest req) { ... }\n}</code></pre>\n\n<b>На собесе:</b> зачем readOnly? (производительность: нет dirty checking, возможность replica routing)',lvl:2},
    {s:'Spring Security'},
    {q:'Spring Security',a:'<b>Архитектура:</b>\n<pre><code>HTTP Request\n    ↓\nSecurity Filter Chain (DelegatingFilterProxy)\n    ↓\nAuthenticationFilter (UsernamePassword / Bearer JWT)\n    ↓\nAuthenticationManager\n    ↓\nAuthenticationProvider\n    ↓\nUserDetailsService.loadUserByUsername()\n    ↓\nSecurityContextHolder.getContext().setAuthentication()\n    ↓\nAuthorizationFilter (@PreAuthorize, requestMatchers)\n    ↓\nController</code></pre>\n\n<b>Конфигурация (Spring Boot 3):</b>\n<pre><code>@Configuration\n@EnableWebSecurity\n@EnableMethodSecurity  // для @PreAuthorize\npublic class SecurityConfig {\n\n    @Bean\n    SecurityFilterChain filterChain(HttpSecurity http) throws Exception {\n        return http\n            .authorizeHttpRequests(auth -> auth\n                .requestMatchers("/api/public/**").permitAll()\n                .requestMatchers("/actuator/health/**").permitAll()\n                .requestMatchers("/api/admin/**").hasRole("ADMIN")\n                .anyRequest().authenticated())\n            .oauth2ResourceServer(oauth2 -> oauth2.jwt(\n                Customizer.withDefaults()))\n            .sessionManagement(s -> s\n                .sessionCreationPolicy(SessionCreationPolicy.STATELESS))\n            .csrf(csrf -> csrf.disable()) // stateless API\n            .build();\n    }\n}</code></pre>\n\n<b>SecurityContextHolder:</b> хранит Authentication в ThreadLocal.\n<code>SecurityContextHolder.getContext().getAuthentication().getName()</code>\n\n<b>На собесе:</b> как Spring Security обрабатывает JWT запрос? (BearerTokenAuthenticationFilter -> JwtDecoder -> проверка подписи/exp/iss -> SecurityContext)',hot:1,lvl:2},
    {q:'OAuth 2.0 и JWT в Spring',a:'<b>OAuth 2.0:</b> Authorization Code (web), Client Credentials (M2M).\n\n<b>JWT:</b> Header.Payload.Signature. Stateless.\nPayload: sub, iss, exp, roles.\n\nSpring: spring-boot-starter-oauth2-resource-server.\nВалидация: подпись, exp, iss, aud. Custom claims → GrantedAuthority.',hot:1,lvl:2},
    {q:'CSRF защита',a:'Cross-Site Request Forgery — атака заставляет браузер отправить запрос от имени пользователя.\n\nSpring Security: CSRF token в cookie/header.\nCsrfTokenRepository — хранение токена.\n\n<b>Отключают для:</b> stateless REST API с JWT/OAuth2 (нет cookies).\n<code>.csrf(csrf -> csrf.disable())</code>',lvl:2},
    {s:'Spring Data JPA'},
    {q:'Spring Data JPA',a:'• CrudRepository, JpaRepository\n• Query methods: findByStatusAndCreatedAtAfter()\n• @Query — JPQL/native\n• Specification<T> — динамические\n• Pageable, Page<T>, Slice<T>\n• Auditing: @CreatedDate, @LastModifiedDate\n• @Modifying для UPDATE/DELETE',hot:1,lvl:2},
    {q:'MapStruct',a:'Compile-time генератор маппинга Entity <-> DTO. Без рефлексии.\n\n<pre><code>@Mapper(componentModel = "spring") // интеграция со Spring\npublic interface PaymentMapper {\n\n    // Простой маппинг (имена полей совпадают)\n    PaymentDto toDto(Payment payment);\n    List&lt;PaymentDto&gt; toDtoList(List&lt;Payment&gt; payments);\n\n    // Кастомный маппинг\n    @Mapping(source = "merchant.name", target = "merchantName")\n    @Mapping(source = "createdAt", target = "date", dateFormat = "dd.MM.yyyy")\n    @Mapping(target = "id", ignore = true)\n    PaymentDto toDetailDto(Payment payment);\n\n    // Обратный маппинг\n    @Mapping(target = "id", ignore = true)\n    @Mapping(target = "status", constant = "CREATED")\n    Payment toEntity(CreatePaymentRequest request);\n}\n\n// Использование:\n@Service\npublic class PaymentService {\n    private final PaymentMapper mapper; // инжектится как Spring bean\n\n    public PaymentDto getPayment(Long id) {\n        Payment p = repo.findById(id).orElseThrow();\n        return mapper.toDto(p);\n    }\n}</code></pre>\n\n<b>Преимущества перед ModelMapper/Dozer:</b>\n• Компиляция -> нет рефлексии, максимальная скорость\n• Type-safe: ошибки маппинга при компиляции\n• Генерирует обычный Java-код (можно отлаживать)\n\n<b>На собесе:</b> почему MapStruct лучше ручного маппинга? (нет boilerplate, compile-time проверки, поддерживает вложенные объекты)',lvl:2},
    {q:'Spring кэширование',a:'<pre><code>@Configuration\n@EnableCaching\npublic class CacheConfig { }\n\n@Service\npublic class MerchantService {\n\n    @Cacheable(value = "merchants", key = "#id")\n    public Merchant findById(Long id) {\n        log.info("Loading from DB"); // только при первом вызове!\n        return repo.findById(id).orElseThrow();\n    }\n\n    @CachePut(value = "merchants", key = "#merchant.id")\n    public Merchant update(Merchant merchant) {\n        return repo.save(merchant); // обновляет и кэш\n    }\n\n    @CacheEvict(value = "merchants", key = "#id")\n    public void delete(Long id) {\n        repo.deleteById(id); // удаляет из кэша\n    }\n\n    @CacheEvict(value = "merchants", allEntries = true)\n    public void clearCache() { } // очистить весь кэш\n}</code></pre>\n\n<b>Провайдеры:</b>\n• <b>Caffeine</b> — in-memory, быстрый, для одного инстанса\n• <b>Redis</b> — distributed, для нескольких инстансов\n\n<pre><code># application.yml\nspring.cache.type=caffeine\nspring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m\n\n# Или Redis:\nspring.cache.type=redis\nspring.data.redis.host=localhost</code></pre>\n\n<b>Подводные камни:</b>\n• Self-invocation — как @Transactional, proxy не работает\n• unless = "#result == null" — не кэшировать null\n• TTL — обязательно! Без TTL кэш растёт бесконечно\n\n<b>На собесе:</b> как инвалидировать кэш при обновлении? (@CachePut или @CacheEvict)',lvl:2},
    {q:'Spring Cloud — обзор',a:'Набор инструментов для микросервисов:\n\n• <b>Spring Cloud Config</b> — централизованная конфигурация\n• <b>Spring Cloud Gateway</b> — API Gateway\n• <b>Spring Cloud OpenFeign</b> — декларативный HTTP клиент\n• <b>Spring Cloud Circuit Breaker</b> — Resilience4j\n• <b>Spring Cloud Stream</b> — messaging abstraction (Kafka, RabbitMQ)\n• <b>Spring Cloud Kubernetes</b> — интеграция с K8s\n\nSpring Cloud Contract — consumer-driven contract testing.',lvl:2},
  
    {s:'WebClient и HTTP'},
    {q:'RestTemplate vs WebClient',a:'<b>RestTemplate</b> (legacy):\n• Синхронный, блокирующий\n• Deprecated с Spring 6 (maintenance mode)\n\n<b>WebClient</b> (рекомендуемый):\n• Неблокирующий (reactive)\n• Поддерживает sync и async режимы\n• Fluent API\n\n<pre><code>WebClient client = WebClient.create("http://api.example.com");\nMono<Payment> payment = client.get()\n    .uri("/payments/{id}", id)\n    .retrieve()\n    .bodyToMono(Payment.class);\n// Sync: payment.block()\n// Async: payment.subscribe(p -> ...)</code></pre>',hot:1,lvl:2},
    {q:'@HttpExchange (Spring 6+)',a:'Декларативный HTTP-клиент (аналог Feign):\n\n<pre><code>@HttpExchange("/api/payments")\npublic interface PaymentClient {\n    @GetExchange("/{id}")\n    Payment getById(@PathVariable Long id);\n\n    @PostExchange\n    Payment create(@RequestBody CreatePaymentRequest req);\n}</code></pre>\n\nСоздание: WebClientAdapter + HttpServiceProxyFactory.\nПреимущество: нативный Spring, без дополнительных зависимостей.',lvl:2},

    {s:'Spring Batch'},
    {q:'Spring Batch — основы',a:'Фреймворк для пакетной обработки данных.\n\n<b>Архитектура:</b> Job → Step → (Chunk или Tasklet)\n\n<b>Chunk processing:</b>\n1. ItemReader — чтение данных (БД, файл)\n2. ItemProcessor — преобразование\n3. ItemWriter — запись (БД, файл, Kafka)\n\nChunk size = количество элементов в одной транзакции.\n\n<b>Tasklet:</b> простая задача (очистка файлов, отправка отчёта).\n\n<b>Job scheduling:</b> @Scheduled, Camunda, или внешний (cron, Kubernetes CronJob).',lvl:2},
    {s:'Connection Pooling'},
    {q:'HikariCP — пул соединений',a:'HikariCP — default connection pool в Spring Boot. Самый быстрый.\n\n<pre><code># application.yml\nspring.datasource:\n  url: jdbc:postgresql://localhost:5432/payments\n  username: app\n  password: secret\n  hikari:\n    maximum-pool-size: 10      # макс. соединений\n    minimum-idle: 5            # минимум idle соединений\n    connection-timeout: 30000  # 30s ожидание свободного\n    idle-timeout: 600000       # 10min неактивное закрывается\n    max-lifetime: 1800000      # 30min макс. жизнь соединения\n    leak-detection-threshold: 60000 # 60s — предупреждение об утечке!</code></pre>\n\n<b>Формула размера пула:</b>\n<code>connections = (CPU cores * 2) + effective_spindle_count</code>\nОбычно <b>10-20</b> для микросервиса. Больше != лучше (contention на БД)!\n\n<b>Мониторинг (Actuator + Prometheus):</b>\n<pre><code>hikaricp_connections_active     — активные\nhikaricp_connections_idle       — простаивающие\nhikaricp_connections_pending    — ожидающие (должно быть 0!)\nhikaricp_connections_timeout_total — таймауты (проблема!)</code></pre>\n\n<b>Частые проблемы:</b>\n• <b>Connection leak:</b> забыли закрыть Connection (try-with-resources!). leak-detection-threshold поможет найти.\n• <b>Pool exhaustion:</b> все соединения заняты -> timeout. Причины: медленные запросы, нехватка pool size, deadlock в БД.\n\n<b>На собесе:</b> как настроен connection pool? Как определить оптимальный размер? (зависит от нагрузки, CPU, I/O)',lvl:2,hot:1},
]},
