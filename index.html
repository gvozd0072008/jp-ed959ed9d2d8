<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Java Interview Prep 2026</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Java Prep">
<meta name="theme-color" content="#0f1117">
<meta name="description" content="Java Developer Interview Preparation 2026">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #242837;
  --bg4: #2e3347;
  --text: #e1e4ed;
  --text2: #9298b0;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --green: #00b894;
  --yellow: #fdcb6e;
  --red: #e17055;
  --orange: #f39c12;
  --blue: #74b9ff;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}
[data-theme="light"] {
  --bg: #f5f6fa;
  --bg2: #ffffff;
  --bg3: #eef0f6;
  --bg4: #dfe3ee;
  --text: #2d3436;
  --text2: #636e72;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}
button { cursor:pointer; border:none; background:none; color:inherit; font:inherit; }
input { font:inherit; color:inherit; }

/* Layout */
.app { display:flex; min-height:100vh; }
.sidebar {
  width: 260px;
  background: var(--bg2);
  border-right: 1px solid var(--bg3);
  padding: 20px 0;
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  overflow-y: auto;
  z-index: 100;
  transition: transform 0.3s;
}
.sidebar::-webkit-scrollbar { width:4px; }
.sidebar::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:4px; }
.main {
  flex:1;
  margin-left: 260px;
  padding: 20px;
  max-width: 900px;
}

/* Logo */
.logo {
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--bg3);
  margin-bottom: 12px;
}
.logo h1 { font-size:18px; font-weight:700; }
.logo span { color:var(--accent2); }
.logo p { font-size:12px; color:var(--text2); margin-top:2px; }

/* Nav */
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding: 10px 20px;
  font-size: 14px;
  transition: all 0.15s;
  border-left: 3px solid transparent;
  position: relative;
}
.nav-item:hover { background:var(--bg3); }
.nav-item.active { background:var(--bg3); border-left-color:var(--accent); color:var(--accent2); font-weight:600; }
.nav-icon { font-size:16px; width:22px; text-align:center; }
.nav-badge {
  margin-left:auto;
  font-size:11px;
  padding:2px 7px;
  border-radius:10px;
  background:var(--bg4);
  color:var(--text2);
}
.nav-progress {
  position:absolute; bottom:0; left:20px; right:20px; height:2px;
  background:var(--bg4); border-radius:1px;
}
.nav-progress-fill { height:100%; background:var(--green); border-radius:1px; transition:width 0.3s; }

/* Top bar */
.topbar {
  display:flex; align-items:center; gap:12px;
  margin-bottom:20px; flex-wrap:wrap;
}
.search-box {
  flex:1; min-width:200px;
  display:flex; align-items:center; gap:8px;
  background:var(--bg2); border:1px solid var(--bg3);
  border-radius:var(--radius); padding:10px 14px;
}
.search-box input {
  flex:1; border:none; background:none; outline:none;
  font-size:14px;
}
.search-box input::placeholder { color:var(--text2); }
.topbar-btn {
  padding:10px 14px;
  background:var(--bg2); border:1px solid var(--bg3);
  border-radius:var(--radius); font-size:13px;
  display:flex; align-items:center; gap:6px;
  transition:all 0.15s;
  white-space: nowrap;
}
.topbar-btn:hover { background:var(--bg3); }
.topbar-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.topbar-filters { display:flex; gap:8px; flex-wrap:wrap; }

/* Stats */
.stats {
  display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr));
  gap:12px; margin-bottom:24px;
}
.stat-card {
  background:var(--bg2); border-radius:var(--radius);
  padding:16px; text-align:center;
  border:1px solid var(--bg3);
}
.stat-num { font-size:28px; font-weight:700; }
.stat-label { font-size:12px; color:var(--text2); margin-top:2px; }
.stat-num.green { color:var(--green); }
.stat-num.yellow { color:var(--yellow); }
.stat-num.red { color:var(--red); }
.stat-num.accent { color:var(--accent2); }

/* Progress bar */
.progress-bar {
  width:100%; height:6px; background:var(--bg3);
  border-radius:3px; margin-bottom:20px; overflow:hidden;
  display:flex;
}
.progress-bar .seg-green { background:var(--green); transition:width 0.3s; }
.progress-bar .seg-yellow { background:var(--yellow); transition:width 0.3s; }

/* Section header */
.section-header {
  font-size:13px; font-weight:600; color:var(--text2);
  text-transform:uppercase; letter-spacing:1px;
  padding:12px 0 8px; margin-top:8px;
  border-bottom:1px solid var(--bg3);
}

/* Cards */
.card {
  background:var(--bg2);
  border:1px solid var(--bg3);
  border-radius:var(--radius);
  margin-bottom:10px;
  overflow:hidden;
  transition: all 0.15s;
}
.card:hover { border-color:var(--bg4); }
.card.status-known { border-left:3px solid var(--green); }
.card.status-learning { border-left:3px solid var(--yellow); }
.card.status-hard { border-left:3px solid var(--red); }
.card-q {
  padding:14px 16px;
  display:flex; align-items:center; gap:10px;
  cursor:pointer; user-select:none;
}
.card-q:active { background:var(--bg3); }
.card-q-text { flex:1; font-size:14px; font-weight:500; }
.card-arrow {
  font-size:12px; color:var(--text2);
  transition:transform 0.2s;
}
.card.open .card-arrow { transform:rotate(90deg); }
.card-a {
  max-height:0; overflow:hidden;
  transition: max-height 0.3s ease;
}
.card.open .card-a { max-height:5000px; }
.card-a-inner {
  padding:0 16px 14px;
  font-size:13px; line-height:1.7;
  color:var(--text2);
  border-top:1px solid var(--bg3);
  padding-top:14px;
}
.card-a-inner strong { color:var(--text); font-weight:600; }

/* Code blocks */
.card-a-inner pre {
  background:var(--bg); border:1px solid var(--bg3);
  border-radius:8px; padding:12px; margin:8px 0;
  overflow-x:auto; font-size:12px; line-height:1.5;
}
.card-a-inner code {
  font-family:'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  font-size:12px;
}
.card-a-inner :not(pre)>code {
  background:var(--bg3); padding:2px 6px; border-radius:4px;
}

/* Status buttons */
.card-actions {
  display:flex; gap:6px; padding:10px 16px;
  border-top:1px solid var(--bg3);
}
.status-btn {
  flex:1; padding:8px; border-radius:8px;
  font-size:12px; font-weight:500; text-align:center;
  transition:all 0.15s; border:1px solid var(--bg3);
}
.status-btn:hover { transform:scale(1.02); }
.status-btn.btn-hard { color:var(--red); }
.status-btn.btn-hard.selected { background:var(--red); color:#fff; border-color:var(--red); }
.status-btn.btn-learning { color:var(--yellow); }
.status-btn.btn-learning.selected { background:var(--yellow); color:#000; border-color:var(--yellow); }
.status-btn.btn-known { color:var(--green); }
.status-btn.btn-known.selected { background:var(--green); color:#fff; border-color:var(--green); }

/* Priority badges */
.badge {
  font-size:10px; padding:2px 8px; border-radius:10px;
  font-weight:600; white-space:nowrap;
}
.badge-hot { background:rgba(225,112,85,0.15); color:var(--red); }
.badge-mid { background:rgba(253,203,110,0.15); color:var(--yellow); }
.badge-l1 { background:rgba(0,184,148,0.15); color:var(--green); }
.badge-l2 { background:rgba(253,203,110,0.15); color:var(--yellow); }
.badge-l3 { background:rgba(225,112,85,0.15); color:var(--red); }


/* Quiz mode */
.quiz-overlay {
  position:fixed; inset:0; background:var(--bg);
  z-index:1000; display:none; flex-direction:column;
}
.quiz-overlay.active { display:flex; }
.quiz-header {
  padding:16px 20px; display:flex; align-items:center;
  gap:12px; border-bottom:1px solid var(--bg3);
}
.quiz-close { font-size:24px; padding:4px; }
.quiz-progress-text { margin-left:auto; font-size:13px; color:var(--text2); }
.quiz-body {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:20px; text-align:center;
}
.quiz-question {
  font-size:20px; font-weight:600; max-width:600px;
  margin-bottom:24px;
}
.quiz-topic { font-size:13px; color:var(--accent2); margin-bottom:12px; }
.quiz-reveal-btn {
  padding:14px 32px; background:var(--accent);
  color:#fff; border-radius:var(--radius);
  font-size:15px; font-weight:600;
  transition:all 0.15s;
}
.quiz-reveal-btn:hover { background:var(--accent2); }
.quiz-answer {
  max-width:700px; text-align:left;
  font-size:14px; line-height:1.7;
  color:var(--text2); margin-bottom:24px;
  display:none;
}
.quiz-answer.visible { display:block; }
.quiz-answer pre {
  background:var(--bg2); border:1px solid var(--bg3);
  border-radius:8px; padding:12px; margin:8px 0;
  overflow-x:auto; font-size:12px;
}
.quiz-answer code {
  font-family:'JetBrains Mono','Fira Code',Consolas,monospace;
  font-size:12px;
}
.quiz-rate {
  display:flex; gap:10px; display:none;
}
.quiz-rate.visible { display:flex; }
.quiz-rate button {
  padding:12px 24px; border-radius:var(--radius);
  font-size:14px; font-weight:600;
  border:1px solid var(--bg3); transition:all 0.15s;
}
.quiz-rate button:hover { transform:scale(1.05); }
.quiz-rate .qr-hard { color:var(--red); }
.quiz-rate .qr-learning { color:var(--yellow); }
.quiz-rate .qr-known { color:var(--green); }

/* Filter pills */
.filter-row {
  display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;
}
.filter-pill {
  padding:6px 14px; border-radius:20px;
  font-size:12px; font-weight:500;
  background:var(--bg2); border:1px solid var(--bg3);
  transition:all 0.15s;
}
.filter-pill:hover { background:var(--bg3); }
.filter-pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* Mobile */
.mobile-header {
  display:none;
  position:fixed; top:0; left:0; right:0;
  background:var(--bg2); border-bottom:1px solid var(--bg3);
  padding:12px 16px; z-index:200;
  align-items:center; gap:12px;
}
.burger { font-size:22px; padding:4px; }
.mobile-header h1 { font-size:15px; font-weight:600; }
.sidebar-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.5); z-index:99;
}

/* Empty state */
.empty-state {
  text-align:center; padding:60px 20px; color:var(--text2);
}
.empty-state .icon { font-size:48px; margin-bottom:12px; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:3px; }

@media (max-width:768px) {
  .sidebar {
    transform:translateX(-100%);
    width:280px;
  }
  .sidebar.open { transform:translateX(0); }
  .sidebar-overlay.open { display:block; }
  .main {
    margin-left:0;
    padding: 60px 10px 20px;
    padding-top: calc(60px + env(safe-area-inset-top));
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    max-width:100%;
    width:100%;
  }
  .mobile-header {
    display:flex;
    padding-top: env(safe-area-inset-top);
  }
  .stats { grid-template-columns:repeat(2,1fr); gap:8px; }
  .stat-card { padding:12px 8px; }
  .stat-num { font-size:22px; }

  /* Topbar: search + scrollable filters */
  .topbar {
    flex-direction:column;
    gap:8px;
    margin-bottom:14px;
  }
  .search-box { width:100%; min-width:0; padding:8px 12px; }
  .topbar-filters {
    display:flex;
    gap:6px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    padding-bottom:4px;
    width:100%;
  }
  .topbar-filters::-webkit-scrollbar { display:none; }
  .topbar-btn {
    padding:8px 12px;
    font-size:12px;
    flex-shrink:0;
  }

  /* Cards */
  .card { margin-bottom:8px; border-radius:10px; }
  .card-q { padding:12px 14px; gap:8px; }
  .card-q-text { font-size:13px; }
  .card-a-inner {
    padding:10px 14px 12px;
    font-size:12px;
    line-height:1.6;
    word-break:break-word;
  }
  .card-a-inner pre {
    padding:10px;
    font-size:11px;
    border-radius:6px;
    -webkit-overflow-scrolling:touch;
  }
  .card-a-inner code { font-size:11px; }
  .card-actions { padding:8px 12px; gap:4px; }
  .status-btn { padding:7px 4px; font-size:11px; border-radius:6px; }

  .section-header { font-size:11px; padding:10px 0 6px; }
  .badge { font-size:9px; padding:2px 6px; }

  /* Quiz */
  .quiz-overlay { padding-top: env(safe-area-inset-top); }
  .quiz-body {
    padding:16px;
    justify-content:flex-start;
    padding-top:10vh;
    overflow-y:auto;
  }
  .quiz-question { font-size:16px; margin-bottom:20px; }
  .quiz-answer {
    font-size:13px;
    max-width:100%;
    word-break:break-word;
  }
  .quiz-answer pre { font-size:11px; padding:10px; }
  .quiz-reveal-btn { padding:12px 28px; font-size:14px; width:100%; }
  .quiz-rate {
    flex-direction:row;
    width:100%;
    gap:6px;
  }
  .quiz-rate button {
    flex:1;
    padding:10px 8px;
    font-size:12px;
  }

  /* Dashboard */
  .progress-bar { height:5px; }
}

/* Animations */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.card { animation:fadeIn 0.2s ease; }

/* Print */
@media print {
  .sidebar,.mobile-header,.topbar,.card-actions,.filter-row { display:none!important; }
  .main { margin:0; max-width:100%; }
  .card-a { max-height:none!important; }
  .card { break-inside:avoid; }
}
</style>
</head>
<body data-theme="dark">

<div class="mobile-header">
  <button class="burger" onclick="toggleSidebar()">&#9776;</button>
  <h1>Java Prep <span style="color:var(--accent2)">2026</span></h1>
  <button style="margin-left:auto;font-size:18px" onclick="toggleTheme()">&#9790;</button>
</div>
<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

<div class="quiz-overlay" id="quiz">
  <div class="quiz-header">
    <button class="quiz-close" onclick="closeQuiz()">&times;</button>
    <span style="font-weight:600">Quiz Mode</span>
    <span class="quiz-progress-text" id="quizProgress"></span>
  </div>
  <div class="quiz-body">
    <div class="quiz-topic" id="quizTopic"></div>
    <div class="quiz-question" id="quizQuestion"></div>
    <div class="quiz-answer" id="quizAnswer"></div>
    <button class="quiz-reveal-btn" id="quizRevealBtn" onclick="revealQuizAnswer()">Show Answer</button>
    <div class="quiz-rate" id="quizRate">
      <button class="qr-hard" onclick="rateQuiz('hard')">Не знаю</button>
      <button class="qr-learning" onclick="rateQuiz('learning')">Частично</button>
      <button class="qr-known" onclick="rateQuiz('known')">Знаю!</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const TOPICS = [
  { id:'core', icon:'&#9749;', name:'Core Java', data: [
    {s:'ООП'},
    {q:'Что такое ООП? Основные принципы.',a:'ООП — парадигма программирования, основанная на концепции объектов.\n\n<b>4 принципа:</b>\n• <b>Инкапсуляция</b> — сокрытие внутреннего состояния, доступ через методы\n<pre><code>public class Payment {\n    private BigDecimal amount; // скрыто\n    public BigDecimal getAmount() { return amount; } // контролируемый доступ\n}</code></pre>\n\n• <b>Наследование</b> — создание классов на основе существующих\n<pre><code>public class CardPayment extends Payment { ... }</code></pre>\n\n• <b>Полиморфизм</b> — единый интерфейс для разных типов\n<pre><code>Payment p = new CardPayment(); // runtime — вызовется метод CardPayment\np.process(); // динамическая диспетчеризация</code></pre>\n\n• <b>Абстракция</b> — выделяем значимое, скрываем детали\n<pre><code>public interface PaymentProcessor { void process(Payment p); }\n// клиент не знает деталей реализации</code></pre>\n\n<b>На собесе спросят:</b> приведите пример каждого принципа из вашего проекта. Чем абстракция отличается от инкапсуляции?',hot:1,lvl:1},
    {q:'SOLID принципы',a:'<b>S — Single Responsibility:</b> класс имеет одну причину для изменения.\n<pre><code>// Плохо: PaymentService и логирует, и считает, и отправляет\n// Хорошо:\nclass PaymentService { void process(Payment p) {...} }\nclass PaymentNotifier { void notify(Payment p) {...} }\nclass PaymentLogger { void log(Payment p) {...} }</code></pre>\n\n<b>O — Open/Closed:</b> открыт для расширения, закрыт для модификации.\n<pre><code>// Добавляем новый тип оплаты без изменения существующего кода\ninterface PaymentStrategy { void pay(BigDecimal amount); }\nclass CardPayment implements PaymentStrategy { ... }\nclass SBPPayment implements PaymentStrategy { ... } // новый</code></pre>\n\n<b>L — Liskov Substitution:</b> подклассы заменяют базовый без нарушений.\nПример нарушения: Square extends Rectangle, но setWidth() ломает инвариант.\n\n<b>I — Interface Segregation:</b> много маленьких интерфейсов лучше одного большого.\n<pre><code>interface Readable { Payment find(Long id); }\ninterface Writable { void save(Payment p); }\n// Вместо одного PaymentRepository со всеми методами</code></pre>\n\n<b>D — Dependency Inversion:</b> зависимость от абстракций.\n<pre><code>class PaymentService {\n    private final PaymentRepository repo; // интерфейс, не impl!\n    PaymentService(PaymentRepository repo) { this.repo = repo; }\n}</code></pre>\n\n<b>На собесе:</b> просят привести пример нарушения каждого принципа и как исправить.',hot:1,lvl:1},
    {q:'IS-A, HAS-A, ассоциация, агрегация, композиция',a:'<b>IS-A</b> — наследование: Dog IS-A Animal (extends)\n<b>HAS-A</b> — использование:\n• <b>Ассоциация</b> — объекты связаны, существуют независимо (Teacher ↔ Student)\n• <b>Агрегация</b> — часть-целое, части живут независимо (University → Professor)\n• <b>Композиция</b> — часть не существует без целого (House → Room)\n\nВ коде: агрегация — объект приходит извне (конструктор), композиция — создаётся внутри',lvl:2},
    {q:'Раннее и позднее связывание',a:'<b>Раннее (статическое)</b> — метод определяется при компиляции: private, static, final методы, перегрузка.\n<b>Позднее (динамическое)</b> — в runtime: переопределённые методы, абстрактные.\n\nJava использует позднее связывание по умолчанию для нестатических методов — через vtable.',lvl:2},
    {q:'Что такое полиморфизм? Виды.',a:'Полиморфизм — объекты разных типов используют общий интерфейс.\n\n<b>Статический</b> (compile-time): перегрузка методов — одно имя, разные параметры.\n<b>Динамический</b> (runtime): переопределение методов — подкласс меняет реализацию.\n\n<b>3 вида:</b>\n• Ad hoc — перегрузка, разное поведение для разных типов аргументов\n• Параметрический — дженерики, одинаковое поведение для разных типов\n• Subtype — объект подкласса вместо базового (LSP)',hot:1,lvl:2},
    {q:'Инкапсуляция vs абстракция',a:'<b>Инкапсуляция</b> — КАК прячем: private поля + public методы. Защита внутреннего состояния.\n<b>Абстракция</b> — ЧТО показываем: выделяем важное, скрываем детали.\n\nПример: <code>List</code> — абстракция (интерфейс). ArrayList — инкапсуляция (скрывает массив внутри).\n\nИнкапсуляция — механизм, абстракция — концепция.',lvl:2},
    {q:'GRASP: Low Coupling и High Cohesion',a:'<b>Low Coupling</b> — минимум зависимостей между классами/модулями. Изменение одного не ломает другой.\n<b>High Cohesion</b> — класс делает одну хорошо определённую задачу. Все методы связаны.\n\nНарушение: God Class — делает всё (low cohesion). Service зависит от 20 других сервисов (high coupling).',lvl:2},
    {s:'Java Platform'},
    {q:'JDK, JRE, JVM — в чём разница?',a:'<b>JDK</b> — набор для разработки: JRE + компилятор (javac) + утилиты (jshell, jlink, jpackage)\n<b>JRE</b> — среда выполнения: JVM + стандартные библиотеки\n<b>JVM</b> — виртуальная машина, исполняет байт-код\n\nС Java 11 JRE не поставляется отдельно — только JDK.\nОсновная JVM — HotSpot (Oracle). Альтернативы: GraalVM, Eclipse OpenJ9, Amazon Corretto.',hot:1,lvl:1},
    {q:'Что такое байт-код и JIT-компиляция?',a:'Байт-код — промежуточное представление (.class файлы).\n\n<b>JIT (Just-In-Time):</b>\n• Компилирует горячий байт-код в нативный код\n• HotSpot: C1 (быстрая компиляция) и C2 (агрессивная оптимизация)\n• Tiered Compilation (default): C1 → C2 для hot spots\n• GraalVM: AOT-компиляция — быстрый старт, меньше памяти',lvl:1},
    {q:'ClassLoader — загрузка классов',a:'Три загрузчика (Java 9+):\n• <b>Bootstrap</b> — java.base и core\n• <b>Platform</b> (бывш. Extension) — платформа\n• <b>Application</b> — classpath\n\n<b>Parent Delegation:</b> загрузчик сначала просит родителя.\nЭтапы: Loading → Linking (Verification, Preparation, Resolution) → Initialization',lvl:2},
    {q:'Как работает компиляция и запуск Java-программы?',a:'1. <code>javac Main.java</code> → Main.class (байт-код)\n2. <code>java Main</code> → JVM загружает и исполняет байт-код\n\nПроцесс в JVM:\n• ClassLoader загружает .class\n• Bytecode Verifier проверяет корректность\n• Interpreter начинает выполнение\n• JIT компилирует hot spots в native code\n• GC управляет памятью',lvl:2},
    {q:'Что такое кроссплатформенность Java?',a:'\"Write Once, Run Anywhere\" — один байт-код работает на любой ОС с JVM.\n\nJVM — прослойка между приложением и ОС.\nJVM реализована для каждой платформы (Windows, Linux, macOS).\nКод компилируется в байт-код один раз, исполняется JVM везде.',lvl:2},
    {s:'Garbage Collection'},
    {q:'Как работает сборка мусора?',a:'GC автоматически освобождает память от недостижимых объектов.\n\n<b>Алгоритм трассировки:</b> от GC Roots находит достижимые объекты. Остальное — мусор.\n\n<b>GC Roots:</b>\n• Локальные переменные в стеке потоков\n• Статические поля классов\n• JNI ссылки\n• Активные потоки\n\n<b>Поколенческая модель:</b>\n<pre><code>Heap\n├── Young Generation (~1/3 heap)\n│   ├── Eden — новые объекты создаются здесь\n│   ├── Survivor S0 (From)\n│   └── Survivor S1 (To)\n├── Old Generation (~2/3 heap) — долгоживущие\n└── Metaspace (вне heap) — метаданные классов</code></pre>\n\n<b>Процесс Minor GC:</b>\n1. Eden заполнен → Minor GC (Stop-the-World!)\n2. Живые из Eden → Survivor To\n3. Живые из Survivor From → Survivor To (age++)\n4. Если age > threshold → Old Generation\n5. Eden и From очищаются, From ↔ To меняются\n\n<b>Major/Full GC:</b> очищает Old Gen. Дольше, больше пауза.\n\n<b>JVM флаги:</b>\n<code>-Xms2g -Xmx2g</code> — начальный и макс. heap\n<code>-XX:NewRatio=2</code> — соотношение Old/Young\n<code>-XX:SurvivorRatio=8</code> — Eden/Survivor\n<code>-Xlog:gc*:file=gc.log</code> — логирование GC\n\n<b>На собесе:</b> какие объекты попадают сразу в Old Gen? (большие, -XX:PretenureSizeThreshold)',hot:1,lvl:2},
    {q:'Сборщики мусора в Java 21',a:'• <b>Serial GC</b> (-XX:+UseSerialGC) — однопоточный. Для маленьких приложений (<100MB heap).\n\n• <b>Parallel GC</b> (-XX:+UseParallelGC) — многопоточный, максимальный throughput. Для batch-обработки.\n\n• <b>G1 GC</b> (-XX:+UseG1GC) — default с Java 9.\n  Делит heap на регионы (~2048). Собирает сначала \"мусорные\" регионы.\n  <code>-XX:MaxGCPauseMillis=200</code> — целевая пауза.\n  Подходит для большинства приложений.\n\n• <b>ZGC</b> (-XX:+UseZGC) — паузы <1мс даже на терабайтных heap!\n  Concurrent: почти вся работа параллельно с приложением.\n  <code>-XX:+UseZGC -XX:+ZGenerational</code> (Java 21: generational ZGC)\n  Идеален для low-latency: платёжные системы, real-time.\n\n• <b>Shenandoah</b> (-XX:+UseShenandoahGC) — аналог ZGC от Red Hat.\n  Concurrent compaction. Доступен в OpenJDK.\n\n<b>Как выбрать:</b>\n<pre><code>Микросервис (Spring Boot)  → G1 (default) или ZGC\nВысокая нагрузка, low-latency → ZGC\nBatch processing, throughput → Parallel GC\nМаленькое приложение → Serial GC</code></pre>\n\n<b>CMS удалён в Java 14.</b>\n\n<b>На собесе:</b> какой GC используете в production? Как мониторите паузы? (GC logs, Prometheus jvm_gc_pause)',hot:1,lvl:2},
    {q:'Виды ссылок: Strong, Weak, Soft, Phantom',a:'• <b>Strong</b> — обычная, GC не удалит пока жива\n• <b>Weak</b> (WeakReference) — GC удалит при следующей сборке. WeakHashMap\n• <b>Soft</b> (SoftReference) — GC удалит при нехватке памяти. Для кэшей\n• <b>Phantom</b> (PhantomReference) — для cleanup после финализации. С ReferenceQueue',lvl:2},
    {q:'Stack vs Heap',a:'<b>Stack:</b> примитивы, ссылки, фреймы методов. LIFO, свой у потока. Быстрый, -Xss. StackOverflowError.\n<b>Heap:</b> объекты и массивы. Общий. Управляется GC, -Xms/-Xmx. OutOfMemoryError.',lvl:1},
    {q:'Как настроить JVM для production?',a:'<b>Память:</b>\n<pre><code>-Xms2g -Xmx2g          # начальный = максимальный (избегаем resize)\n-XX:MaxMetaspaceSize=256m # лимит метаданных\n-XX:MaxDirectMemorySize=512m # для NIO буферов</code></pre>\n\n<b>GC (выбор):</b>\n<pre><code># G1 (default, универсальный)\n-XX:+UseG1GC -XX:MaxGCPauseMillis=200\n\n# ZGC (low-latency, платёжные системы)\n-XX:+UseZGC -XX:+ZGenerational</code></pre>\n\n<b>Мониторинг и диагностика:</b>\n<pre><code>-XX:+HeapDumpOnOutOfMemoryError\n-XX:HeapDumpPath=/tmp/heapdump.hprof\n-Xlog:gc*:file=gc.log:time,uptime,level,tags\n-XX:+UnlockDiagnosticVMOptions\n-XX:+DebugNonSafepoints  # для async-profiler</code></pre>\n\n<b>Для контейнеров (K8s/Docker):</b>\n<pre><code>-XX:+UseContainerSupport        # default с Java 10\n-XX:MaxRAMPercentage=75.0       # 75% от container memory limit\n-XX:InitialRAMPercentage=75.0   # сразу выделяем</code></pre>\n\n<b>Пример Dockerfile:</b>\n<pre><code>FROM eclipse-temurin:21-jre\nENV JAVA_OPTS="-XX:+UseZGC -XX:MaxRAMPercentage=75 -XX:+HeapDumpOnOutOfMemoryError"\nCMD java $JAVA_OPTS -jar app.jar</code></pre>\n\n<b>На собесе:</b> как настроен JVM в вашем production? Какой GC используете? Как мониторите? (Prometheus + Grafana: jvm_memory_used, jvm_gc_pause)',lvl:2},
    {q:'Случаи утечки памяти в Java',a:'Несмотря на GC, утечки возможны:\n\n• <b>Незакрытые ресурсы</b>: Connection, InputStream без try-with-resources\n• <b>Статические коллекции</b>: static Map который только растёт\n• <b>Listeners/Callbacks</b>: зарегистрировали, не отписались\n• <b>ThreadLocal</b>: не вызван remove() в thread pool\n• <b>Inner classes</b>: нестатический внутренний класс держит ссылку на внешний\n• <b>Кеш без eviction</b>: HashMap как кеш без ограничения размера\n\nДиагностика: jmap, jvisualvm, Eclipse MAT, async-profiler',lvl:2},
    {s:'Типы данных и строки'},
    {q:'Примитивные типы данных',a:'8 примитивов:\n• <code>byte</code> (1Б, -128..127), <code>short</code> (2Б), <code>int</code> (4Б, ~±2.1 млрд), <code>long</code> (8Б)\n• <code>float</code> (4Б), <code>double</code> (8Б, IEEE 754)\n• <code>char</code> (2Б, UTF-16), <code>boolean</code> (~1Б)\n\nОбёртки: Integer, Long... Автоупаковка/распаковка.\nInteger cache: -128..127.',lvl:1},
    {q:'Что такое автоупаковка и распаковка?',a:'<b>Автоупаковка (autoboxing):</b> примитив → обёртка автоматически.\n<pre><code>Integer x = 42;       // int → Integer.valueOf(42)\nList<Integer> list = new ArrayList<>();\nlist.add(5);          // int → Integer.valueOf(5)</code></pre>\n\n<b>Распаковка (unboxing):</b> обёртка → примитив.\n<pre><code>int y = x;            // Integer.intValue()\nint sum = x + 10;     // распаковка перед сложением</code></pre>\n\n<b>Подводные камни:</b>\n\n1. <b>Integer Cache (-128..127):</b>\n<pre><code>Integer a = 127, b = 127;\na == b  // true — один объект из кэша!\n\nInteger c = 128, d = 128;\nc == d  // false — разные объекты!\nc.equals(d) // true — всегда используй equals!</code></pre>\n\n2. <b>NullPointerException при unboxing:</b>\n<pre><code>Integer x = null;\nint y = x;  // NPE! null.intValue()\n\n// Частая ошибка в Map:\nMap<String, Integer> map = new HashMap<>();\nint val = map.get("key"); // NPE если ключа нет!</code></pre>\n\n3. <b>Производительность:</b>\n<pre><code>// Плохо: миллион boxing операций\nLong sum = 0L;\nfor (long i = 0; i < 1_000_000; i++) sum += i;\n\n// Хорошо: примитив\nlong sum = 0L;\nfor (long i = 0; i < 1_000_000; i++) sum += i;</code></pre>\n\n<b>На собесе:</b> почему <code>Integer.valueOf(127) == Integer.valueOf(127)</code> true, а 128 — false?',lvl:2},
    {q:'String, StringBuilder, StringBuffer',a:'<b>String</b> — immutable, final класс. Хранится в String Pool.\n<pre><code>String s1 = "hello";           // литерал → String Pool\nString s2 = "hello";           // та же ссылка из Pool\nString s3 = new String("hello"); // новый объект в heap\n\ns1 == s2    // true (один объект в Pool)\ns1 == s3    // false (разные объекты)\ns1.equals(s3) // true (одинаковое содержимое)</code></pre>\n\nCompact Strings (Java 9+): byte[] + coder (LATIN1/UTF16) вместо char[] — экономия памяти.\n\n<b>Конкатенация в цикле — ПРОБЛЕМА:</b>\n<pre><code>// Плохо: O(n²) — создаёт новый String на каждой итерации\nString result = "";\nfor (int i = 0; i < 10000; i++) result += i;\n\n// Хорошо: O(n) — StringBuilder\nvar sb = new StringBuilder();\nfor (int i = 0; i < 10000; i++) sb.append(i);\nString result = sb.toString();</code></pre>\n\n<b>StringBuilder vs StringBuffer:</b>\n• StringBuilder — НЕ потокобезопасный, быстрый (используй по умолчанию)\n• StringBuffer — synchronized, медленнее (legacy)\n\n<b>Text Blocks (Java 15+):</b>\n<pre><code>String json = \"\"\"\n    {\n        "name": "Payment",\n        "amount": 100.50\n    }\n    \"\"\";</code></pre>\n\n<b>Почему String immutable:</b> безопасность ключей (HashMap), потокобезопасность, String Pool, кеширование hashCode.\n\n<b>На собесе:</b> почему строки не рекомендуется использовать для хранения паролей? (String Pool — не контролируешь когда GC удалит, char[] можно обнулить)',hot:1,lvl:2},
    {q:'Что такое пул строк (String Pool)?',a:'Область в heap для уникальных строковых литералов.\n\n• Литералы автоматически в пуле: <code>String s = "hello"</code>\n• <code>new String("hello")</code> создаёт ВНЕ пула\n• <code>intern()</code> — возвращает из пула или добавляет\n• Экономит память при повторяющихся строках\n• С Java 7 — в heap (не PermGen), управляется GC',lvl:2},
    {q:'Почему String неизменяемый?',a:'• <b>Безопасность</b> — как ключ в HashMap, hashCode не меняется\n• <b>Потокобезопасность</b> — можно шарить между потоками без синхронизации\n• <b>String Pool</b> — несколько ссылок на один объект\n• <b>Кеширование hashCode</b> — вычисляется один раз, используется повторно\n• <b>Безопасность паролей</b> — нельзя модифицировать (но char[] лучше — можно обнулить)',lvl:2},
    {q:'Передача по значению или по ссылке?',a:'Java ВСЕГДА передаёт <b>по значению</b>.\n\nДля примитивов: копируется значение.\nДля объектов: копируется <b>ссылка</b> (не объект!).\n\n<pre><code>void change(String s) { s = "new"; } // не изменит оригинал\nvoid change(List l) { l.add(1); } // изменит содержимое!\nvoid change(List l) { l = new ArrayList(); } // не изменит оригинал</code></pre>',lvl:2},
    {s:'Классы и ООП в Java'},
    {q:'Модификаторы доступа',a:'• <code>private</code> — только внутри класса\n• default (package-private) — внутри пакета\n• <code>protected</code> — пакет + наследники\n• <code>public</code> — отовсюду\n\nКлассы: только public или default. С Java 17+: sealed classes.',lvl:1},
    {q:'static, final, abstract',a:'<b>static:</b> принадлежит классу. Не переопределяется (method hiding). Static nested class без ссылки на внешний.\n\n<b>final:</b> переменная — нельзя переназначить (но объект мутабелен!); метод — нельзя переопределить; класс — нельзя наследовать.\n\n<b>abstract:</b> класс — нельзя инстанциировать; метод — без тела, override обязателен.',lvl:1},
    {q:'Может ли статический метод быть переопределён?',a:'<b>Нет.</b> Статические методы привязаны к классу, не к объекту.\n\nЕсли подкласс объявит метод с той же сигнатурой — это <b>method hiding</b>, не overriding.\n\n<pre><code>class Parent { static void foo() { print("Parent"); } }\nclass Child extends Parent { static void foo() { print("Child"); } }\nParent p = new Child();\np.foo(); // "Parent" — вызывается по типу ссылки!</code></pre>',lvl:2},
    {q:'Интерфейсы vs абстрактные классы',a:'<b>Интерфейс:</b>\n• Множественная реализация (implements)\n• Поля: public static final\n• Методы: abstract, default, static, private (Java 9+)\n• Нет конструкторов\n\n<b>Абстрактный класс:</b>\n• Одиночное наследование (extends)\n• Любое состояние, конструкторы, модификаторы\n\nИнтерфейс — контракт (Repository), абстрактный — общая реализация (AbstractList).',hot:1,lvl:2},
    {q:'Вложенные классы',a:'• <b>Static nested</b> — без ссылки на внешний. Как обычный класс, но внутри.\n• <b>Inner (нестатический)</b> — имеет OuterClass.this. Нельзя иметь static members.\n• <b>Local</b> — в теле метода. Доступ к effectively final переменным.\n• <b>Anonymous</b> — без имени, одноразовая реализация.\n\nС Java 8 лямбды заменяют anonymous classes для функциональных интерфейсов.',lvl:2},
    {q:'enum в Java',a:'Перечисления — фиксированный набор экземпляров.\n\n• Неявно extends Enum, final\n• Может иметь поля, конструкторы (private), методы\n• values(), valueOf(String)\n• Можно реализовывать интерфейсы\n• <b>Лучший способ Singleton</b> — через enum\n• Сериализация гарантирована JVM',lvl:1},
    {q:'Records (Java 16+)',a:'Неизменяемый data carrier — замена boilerplate POJO:\n\n<pre><code>// Было (Java 8):\npublic class Money {\n    private final BigDecimal amount;\n    private final Currency currency;\n    // конструктор, getters, equals, hashCode, toString — 50+ строк\n}\n\n// Стало (Java 16+):\nrecord Money(BigDecimal amount, Currency currency) {\n    // compact constructor для валидации\n    Money {\n        if (amount.compareTo(BigDecimal.ZERO) < 0)\n            throw new IllegalArgumentException("Amount must be >= 0");\n        Objects.requireNonNull(currency);\n    }\n\n    // можно добавить методы\n    Money add(Money other) {\n        if (!currency.equals(other.currency))\n            throw new IllegalArgumentException("Currency mismatch");\n        return new Money(amount.add(other.amount), currency);\n    }\n}</code></pre>\n\n<b>Автогенерация:</b> private final поля, конструктор, amount(), currency() (без get-), equals(), hashCode(), toString().\n\n<b>Нельзя:</b> extends другой класс (implicit final), мутировать поля, добавлять instance поля.\n<b>Можно:</b> implements интерфейсы, static поля/методы, custom методы.\n\n<b>Идеально для DDD:</b> Value Objects (Money, Address, PaymentId), DTO, Event payload.\n\n<b>На собесе:</b> чем record отличается от Lombok @Value? (record — часть языка, pattern matching, compact constructor)',hot:1,lvl:2},
    {q:'Sealed classes (Java 17+)',a:'Ограничивают кто может наследовать — закрытая иерархия:\n\n<pre><code>// Статусы платежа — точно известный набор\npublic sealed interface PaymentStatus\n    permits Created, Processing, Completed, Failed {\n}\nrecord Created(Instant at) implements PaymentStatus {}\nrecord Processing(String provider) implements PaymentStatus {}\nrecord Completed(Instant at, String txId) implements PaymentStatus {}\nrecord Failed(String reason, ErrorCode code) implements PaymentStatus {}</code></pre>\n\n<b>Exhaustive switch (Java 21):</b>\n<pre><code>String describe(PaymentStatus status) {\n    return switch (status) {\n        case Created c -> "Создан " + c.at();\n        case Processing p -> "В обработке: " + p.provider();\n        case Completed c -> "Завершён: " + c.txId();\n        case Failed f -> "Ошибка: " + f.reason();\n        // нет default — компилятор проверил все варианты!\n    };\n}</code></pre>\n\n<b>Подклассы обязаны быть:</b> final, sealed или non-sealed.\n\n<b>Зачем:</b>\n• Компилятор гарантирует обработку всех вариантов\n• Безопасный рефакторинг: добавил вариант → ошибки компиляции везде\n• Идеально для DDD: Command, Event, Status, Result\n\n<b>На собесе:</b> чем sealed лучше enum? (sealed может хранить данные в каждом варианте, enum — нет)',hot:1,lvl:3},
    {q:'Порядок инициализации класса',a:'1. Статические поля и блоки родителя (в порядке объявления)\n2. Статические поля и блоки потомка\n3. Поля экземпляра и блоки инициализации родителя\n4. Конструктор родителя\n5. Поля экземпляра и блоки инициализации потомка\n6. Конструктор потомка\n\nСтатическая инициализация — один раз при загрузке класса.',lvl:2},
    {s:'equals, hashCode, Object'},
    {q:'Методы класса Object',a:'11 методов: toString(), equals(), hashCode(), clone(), finalize() (deprecated), getClass(), notify(), notifyAll(), wait() (3 варианта).\n\nВсе классы наследуют Object.',lvl:1},
    {q:'equals() и hashCode() — контракт',a:'<b>Контракт:</b>\n• a.equals(b) → a.hashCode() == b.hashCode() (ОБЯЗАТЕЛЬНО)\n• Одинаковый hashCode ≠ equals (коллизия)\n\n<b>Полный пример реализации:</b>\n<pre><code>public class Payment {\n    private Long id;\n    private String externalId;\n\n    @Override\n    public boolean equals(Object o) {\n        if (this == o) return true;  // 1. та же ссылка\n        if (!(o instanceof Payment p)) return false;  // 2. тип\n        return Objects.equals(id, p.id)  // 3. поля\n            && Objects.equals(externalId, p.externalId);\n    }\n\n    @Override\n    public int hashCode() {\n        return Objects.hash(id, externalId); // те же поля!\n    }\n}</code></pre>\n\n<b>Что будет если нарушить контракт:</b>\n<pre><code>// Переопределили equals, но НЕ hashCode\nSet<Payment> set = new HashSet<>();\nset.add(new Payment(1L));\nset.contains(new Payment(1L)); // false! разные hashCode → разные бакеты</code></pre>\n\n<b>Правила:</b>\n• Используй те же поля в equals и hashCode\n• 31 * result + field — оптимизируется JVM в (x << 5) - x\n• Для JPA Entity: используй бизнес-ключ, а не @Id (proxy проблема)\n• Records: equals/hashCode генерируются автоматически\n\n<b>На собесе:</b> что будет если положить объект в HashMap, потом изменить поле, участвующее в hashCode?',hot:1,lvl:2},
    {q:'Разница между == и equals()',a:'<code>==</code> — сравнение ссылок (адресов) для объектов, значений для примитивов.\n<code>equals()</code> — сравнение содержимого (если переопределён).\n\n<code>"hello" == "hello"</code> → true (String Pool)\n<code>new String("hello") == new String("hello")</code> → false\n\n<code>Integer a = 127; a == 127</code> → true (cache)\n<code>Integer a = 128; a == 128</code> → false (unboxing нюансы зависят от контекста)',hot:1,lvl:2},
    {q:'getClass() vs instanceof',a:'<code>obj instanceof MyClass</code> — true для MyClass и всех подклассов.\n<code>obj.getClass() == MyClass.class</code> — true ТОЛЬКО для точного класса.\n\nВ equals(): instanceof — позволяет сравнивать подклассы. getClass() — строгое совпадение.\nJoshua Bloch рекомендует instanceof для не-final классов с осторожностью.',lvl:2},
    {q:'Как правильно переопределить toString()?',a:'Хорошая практика: включить значимые поля.\n\n<pre><code>@Override\npublic String toString() {\n    return "Payment{id=" + id + ", amount=" + amount + ", status=" + status + "}";\n}</code></pre>\n\nLombok: @ToString. Records: автоматически.\nНе включать чувствительные данные (пароли, токены)!',lvl:2},
    {s:'Исключения'},
    {q:'Иерархия исключений',a:'<pre><code>Throwable\n├── Error — критические ошибки JVM\n│   ├── OutOfMemoryError\n│   ├── StackOverflowError\n│   └── NoClassDefFoundError\n└── Exception\n    ├── Checked (обязательно обработать)\n    │   ├── IOException\n    │   ├── SQLException\n    │   └── ClassNotFoundException\n    └── RuntimeException (unchecked)\n        ├── NullPointerException\n        ├── IllegalArgumentException\n        ├── IllegalStateException\n        └── IndexOutOfBoundsException</code></pre>\n\n<b>Пример пользовательского исключения (платежи):</b>\n<pre><code>public class PaymentProcessingException extends RuntimeException {\n    private final String paymentId;\n    private final ErrorCode code;\n\n    public PaymentProcessingException(String paymentId, ErrorCode code, String msg) {\n        super(msg);\n        this.paymentId = paymentId;\n        this.code = code;\n    }\n}\n\n// Использование\nif (balance.compareTo(amount) < 0) {\n    throw new PaymentProcessingException(id, INSUFFICIENT_FUNDS,\n        "Недостаточно средств для платежа " + id);\n}</code></pre>\n\n<b>try-with-resources:</b>\n<pre><code>try (var conn = dataSource.getConnection();\n     var stmt = conn.prepareStatement(sql)) {\n    // ресурсы закроются автоматически\n} catch (SQLException e) {\n    throw new PaymentProcessingException(id, DB_ERROR, e.getMessage());\n}</code></pre>\n\n<b>Multi-catch:</b> <code>catch (IOException | SQLException e)</code>\n\n<b>На собесе:</b> когда использовать checked vs unchecked? Как правильно логировать исключения (не терять stacktrace)?',hot:1,lvl:1},
    {q:'Checked vs Unchecked исключения',a:'<b>Checked</b> (наследники Exception, не RuntimeException):\n• Обязательно обрабатывать: try-catch или throws\n• IOException, SQLException, ClassNotFoundException\n• Для recoverable ситуаций\n\n<b>Unchecked</b> (RuntimeException):\n• Не обязательно объявлять\n• NullPointerException, IllegalArgumentException, IndexOutOfBounds\n• Ошибки программиста\n\nСовременный подход: предпочитать unchecked (Spring использует unchecked).',lvl:1},
    {q:'try-with-resources',a:'Автоматически закрывает AutoCloseable ресурсы:\n\n<pre><code>try (var conn = dataSource.getConnection();\n     var stmt = conn.prepareStatement(sql)) {\n    // использование\n} // conn и stmt закроются автоматически</code></pre>\n\nЕсли исключение в try И в close — основное сохраняется, close добавляется как suppressed.\nJava 9+: можно использовать effectively final переменные.',lvl:2},
    {q:'Как создать пользовательское исключение?',a:'<pre><code>// Checked\npublic class PaymentException extends Exception {\n    private final String paymentId;\n    public PaymentException(String msg, String paymentId) {\n        super(msg);\n        this.paymentId = paymentId;\n    }\n}\n\n// Unchecked (рекомендуется)\npublic class PaymentNotFoundException extends RuntimeException {\n    public PaymentNotFoundException(String id) {\n        super("Payment not found: " + id);\n    }\n}</code></pre>',lvl:2},
    {s:'Сериализация и клонирование'},
    {q:'Сериализация в Java',a:'Преобразование объекта в поток байтов.\n\n• <b>Serializable</b> — маркерный интерфейс\n• serialVersionUID — версия класса\n• transient — поле не сериализуется\n• Кастомизация: writeObject()/readObject()\n• Singleton проблема: readResolve()\n\nСовременные альтернативы: Jackson (JSON), Protobuf, Avro (Kafka).\nJava-сериализация — legacy и небезопасна.',lvl:2},
    {q:'Клонирование объектов',a:'<b>Shallow copy</b> (поверхностное): clone() копирует ссылки, не объекты.\n<b>Deep copy</b> (глубокое): копирует все вложенные объекты.\n\nСпособы глубокого копирования:\n1. Конструктор копирования (рекомендуемый)\n2. Сериализация/десериализация\n3. Ручное клонирование всех полей\n\nCloneable + clone() считается broken API (Bloch). Используй copy constructor.',lvl:2},
    {s:'Java 9-21'},
    {q:'Java 9-11: ключевые изменения',a:'<b>Java 9:</b> модули (Jigsaw), JShell, List.of(), private методы в интерфейсах, Process API, Flow API\n<b>Java 10:</b> var — вывод типов, List.copyOf()\n<b>Java 11 (LTS):</b> HTTP Client API, String: isBlank(), lines(), strip(), Files.readString()',lvl:2},
    {q:'Java 12-16: ключевые изменения',a:'<b>Java 12:</b> Switch expressions (preview), Collectors.teeing()\n<b>Java 13:</b> Text blocks (preview)\n<b>Java 14:</b> Pattern matching instanceof (preview), Records (preview), NullPointerExceptions (helpful)\n<b>Java 15:</b> Text blocks (final), Sealed classes (preview), ZGC/Shenandoah production\n<b>Java 16:</b> Records (final), Pattern matching instanceof (final), Stream.toList()',lvl:2},
    {q:'Java 17 (LTS)',a:'• Sealed classes (final)\n• Pattern matching for instanceof (final)\n• Records, Text blocks (final)\n• Switch expressions + yield\n• Helpful NullPointerExceptions\n• Удалены: CMS GC, Security Manager (deprecated)\n• Strong encapsulation JDK internals',lvl:2},
    {q:'Java 21 (LTS)',a:'Главный релиз за последние годы:\n\n<b>Virtual Threads (Project Loom) — final!</b>\n<pre><code>// Было: ограниченный пул\nvar pool = Executors.newFixedThreadPool(200);\n\n// Стало: миллион лёгких потоков\nvar executor = Executors.newVirtualThreadPerTaskExecutor();\nexecutor.submit(() -> {\n    var result = httpClient.send(request); // блокирующий, но не занимает OS thread\n});</code></pre>\n\n<b>Pattern Matching for switch (final):</b>\n<pre><code>Object obj = getResponse();\nreturn switch (obj) {\n    case Integer i -> "число: " + i;\n    case String s when s.length() > 10 -> "длинная строка";\n    case String s -> "строка: " + s;\n    case null -> "null";\n    default -> "другое";\n};</code></pre>\n\n<b>Record Patterns:</b>\n<pre><code>if (obj instanceof Point(int x, int y)) {\n    System.out.println(x + ", " + y); // деструктуризация!\n}</code></pre>\n\n<b>Sequenced Collections:</b>\n<pre><code>var list = new ArrayList<>(List.of("a","b","c"));\nlist.getFirst(); // "a" — вместо list.get(0)\nlist.getLast();  // "c" — вместо list.get(list.size()-1)\nlist.reversed(); // ["c","b","a"] — view, не копия</code></pre>\n\n<b>Также:</b> String Templates (preview), Structured Concurrency (preview), Scoped Values (preview).\n\n<b>На собесе:</b> что такое Virtual Threads и зачем? Как включить в Spring Boot? (<code>spring.threads.virtual.enabled=true</code>)',hot:1,lvl:2},
    {q:'Что такое var?',a:'Вывод типов локальных переменных (Java 10):\n<pre><code>var list = new ArrayList<String>(); // ArrayList<String>\nvar stream = list.stream(); // Stream<String>\nvar entry = Map.entry("key", 1); // Map.Entry<String,Integer></code></pre>\n\nГде нельзя: поля класса, параметры методов, return type.\nГде можно: локальные переменные, for-each, лямбды (Java 11).\nНе злоупотреблять: <code>var x = someMethod();</code> — неочевидный тип.',lvl:2},
    {q:'Что такое модульная система (Java 9)?',a:'Project Jigsaw — модули для структурирования JDK и приложений.\n\n<code>module-info.java</code>:\n<pre><code>module com.myapp {\n    requires java.sql;\n    requires spring.core;\n    exports com.myapp.api;\n}</code></pre>\n\n• requires — зависимости\n• exports — открытые пакеты\n• opens — для рефлексии (Hibernate, Spring)\n\nНа практике многие проекты работают без модулей (classpath).',lvl:2},
  
    {s:'Generics'},
    {q:'Generics — основы',a:'Параметризация типов — type safety без приведения типов.\n\n<b>Без дженериков (Java 1.4):</b>\n<pre><code>List list = new ArrayList();\nlist.add("hello");\nlist.add(42); // компилируется!\nString s = (String) list.get(1); // ClassCastException в runtime!</code></pre>\n\n<b>С дженериками:</b>\n<pre><code>List<String> list = new ArrayList<>();\nlist.add("hello");\nlist.add(42); // ошибка компиляции! type safety\nString s = list.get(0); // без приведения</code></pre>\n\n<b>Generic класс:</b>\n<pre><code>public class Result<T> {\n    private final T value;\n    private final String error;\n\n    public static <T> Result<T> ok(T value) {\n        return new Result<>(value, null);\n    }\n    public static <T> Result<T> fail(String error) {\n        return new Result<>(null, error);\n    }\n}\n\nResult<Payment> result = paymentService.process(request);</code></pre>\n\n<b>Type Erasure:</b> при компиляции <code>List<String></code> → <code>List</code>. Информация о типе стирается.\n\n<b>Ограничения из-за erasure:</b>\n• Нельзя: <code>new T()</code>, <code>new T[]</code>\n• Нельзя: <code>instanceof List<String></code>\n• Нельзя: перегрузка <code>foo(List<String>)</code> и <code>foo(List<Integer>)</code>\n\n<b>На собесе:</b> что такое type erasure и какие ограничения накладывает?',lvl:1,hot:1},
    {q:'Wildcards и PECS',a:'<b>Wildcards — типы подстановки:</b>\n• <code>?</code> — любой тип (unbounded)\n• <code>? extends T</code> — T или подтипы (upper bound) — ЧТЕНИЕ\n• <code>? super T</code> — T или супертипы (lower bound) — ЗАПИСЬ\n\n<b>PECS — Producer Extends, Consumer Super:</b>\n<pre><code>// Producer — ЧИТАЕМ из коллекции → extends\nvoid printAll(List<? extends Payment> payments) {\n    for (Payment p : payments) { // OK — читаем как Payment\n        System.out.println(p.getAmount());\n    }\n    // payments.add(new CardPayment()); // ОШИБКА! нельзя писать\n}\n\n// Consumer — ПИШЕМ в коллекцию → super\nvoid addDefaults(List<? super CardPayment> list) {\n    list.add(new CardPayment()); // OK — пишем CardPayment\n    // CardPayment p = list.get(0); // ОШИБКА! тип чтения = Object\n}\n\n// Пример из JDK:\npublic static <T> void copy(\n    List<? super T> dest,    // consumer — пишем\n    List<? extends T> src    // producer — читаем\n)</code></pre>\n\n<b>Мнемоника:</b>\n• extends = out = producer = можно только читать\n• super = in = consumer = можно только писать\n\n<b>На собесе:</b> напишите generic метод, который копирует элементы из одного списка в другой. Почему нельзя <code>List<Object> = List<String></code>? (дженерики инвариантны)',lvl:2,hot:1},
    {q:'Стирание типов (Type Erasure)',a:'При компиляции дженерики заменяются на Object (или bound).\n\n<code>List<String></code> → <code>List</code> в байт-коде.\n\n<b>Следствия:</b>\n• Нельзя: <code>new T()</code>, <code>new T[]</code>, <code>instanceof List<String></code>\n• Нельзя: перегрузка по generic type: foo(List<String>) и foo(List<Integer>) — коллизия\n• Runtime: <code>List<String></code> и <code>List<Integer></code> — один класс\n\nОбходы: Class<T> параметр, TypeReference (Jackson), reified (Kotlin).',lvl:2},
    {s:'Date/Time API (Java 8+)'},
    {q:'Date/Time API — основные классы',a:'java.time пакет (Java 8+) — замена устаревших Date/Calendar:\n\n<pre><code>// Основные классы\nLocalDate date = LocalDate.of(2026, 4, 10);      // без времени\nLocalTime time = LocalTime.of(14, 30, 0);         // без даты\nLocalDateTime dt = LocalDateTime.now();            // дата + время, без зоны\nZonedDateTime zdt = ZonedDateTime.now(ZoneId.of("Europe/Moscow"));\nInstant instant = Instant.now();                   // UTC, epoch millis\n\n// Арифметика\nLocalDate tomorrow = date.plusDays(1);\nLocalDate nextMonth = date.plus(1, ChronoUnit.MONTHS);\n\n// Период и длительность\nPeriod period = Period.between(startDate, endDate); // годы/месяцы/дни\nDuration duration = Duration.between(startTime, endTime); // часы/мин/сек\n\n// Форматирование\nDateTimeFormatter fmt = DateTimeFormatter.ofPattern("dd.MM.yyyy HH:mm");\nString s = dt.format(fmt); // "10.04.2026 14:30"\nLocalDateTime parsed = LocalDateTime.parse(s, fmt);\n\n// Для БД (JPA/Hibernate)\n@Column\nprivate Instant createdAt;  // рекомендуется — UTC, однозначный\n\n// Для API (JSON)\n// Jackson: JavaTimeModule автоматически сериализует в ISO-8601</code></pre>\n\n<b>Все классы immutable и thread-safe!</b>\n\n<b>Совет:</b> храни в БД как Instant (UTC). Конвертируй в зону пользователя при отображении.\n\n<b>На собесе:</b> чем Instant отличается от LocalDateTime? (Instant — точка на временной шкале, LocalDateTime — без зоны, неоднозначный)',lvl:1,hot:1},
    {q:'Java IO vs NIO',a:'<b>IO (Blocking):</b>\n• InputStream/OutputStream — байтовые потоки\n• Reader/Writer — символьные потоки\n• Блокирующий: поток ждёт завершения операции\n\n<b>NIO (Non-blocking, Java 7+):</b>\n• Channel + Buffer — двусторонний\n• Selector — мультиплексирование (один поток обслуживает много каналов)\n• Path, Files — удобная работа с файловой системой\n• Files.readString(), Files.writeString() (Java 11)\n\nДля файлов: NIO (Files, Path). Для сетевых серверов: NIO или Netty.',lvl:2},
]},

  { id:'collections', icon:'&#128218;', name:'Коллекции', data: [
    {s:'Иерархия'},
    {q:'Иерархия коллекций Java',a:'<pre><code>Iterable\n└── Collection\n    ├── List: ArrayList, LinkedList, Vector\n    ├── Set: HashSet, LinkedHashSet, TreeSet\n    └── Queue/Deque: ArrayDeque, PriorityQueue\n\nMap (НЕ Collection): HashMap, LinkedHashMap, TreeMap, ConcurrentHashMap</code></pre>\n\n<b>Java 21 — Sequenced Collections:</b>\nSequencedCollection: addFirst/Last(), getFirst/Last(), reversed()',hot:1,lvl:2},
    {q:'Collection vs Collections',a:'<b>Collection</b> — интерфейс, корень иерархии коллекций.\n<b>Collections</b> — утилитный класс со static методами:\n• sort(), reverse(), shuffle(), binarySearch()\n• unmodifiableList(), synchronizedList()\n• singletonList(), emptyList()\n• frequency(), disjoint()',lvl:2},
    {s:'List'},
    {q:'ArrayList — устройство и сложность',a:'Основан на <code>Object[]</code>. Default capacity 10 (или 0 до первого add).\nРасширение: ×1.5 (oldCapacity + oldCapacity >> 1), Arrays.copyOf()\n\n• get(i), set(i) — <b>O(1)</b>\n• add(e) — амортизированная <b>O(1)</b>\n• add(i,e), remove(i) — <b>O(n)</b> (сдвиг)\n• contains() — <b>O(n)</b>\n\n~4 байта на ссылку + overhead массива. Почти всегда лучше LinkedList.',hot:1,lvl:2},
    {q:'ArrayList vs LinkedList',a:'<b>ArrayList:</b> массив, O(1) random access, O(n) вставка, CPU cache friendly, ~4 байт/элемент.\n<b>LinkedList:</b> двусвязный список, O(n) доступ, O(1) вставка (с итератором), ~48 байт/элемент.\n\nВ 99% случаев ArrayList лучше.\nLinkedList: часто вставка/удаление в начало/конец (но ArrayDeque ещё лучше).',hot:1,lvl:2},
    {q:'Как удалить элемент из ArrayList при итерации?',a:'<b>Неправильно:</b>\n<pre><code>for (String s : list)\n    if (s.equals("x")) list.remove(s); // ConcurrentModificationException!</code></pre>\n\n<b>Правильно:</b>\n1. <code>Iterator.remove()</code>\n2. <code>list.removeIf(s -> s.equals("x"))</code> (Java 8+) — лучший способ\n3. Итерация в обратном порядке с remove(i)',lvl:2},
    {q:'Vector и Stack — почему deprecated?',a:'<b>Vector</b> — synchronized ArrayList. Медленный из-за блокировки каждого метода. Замена: ArrayList + Collections.synchronizedList() или CopyOnWriteArrayList.\n\n<b>Stack extends Vector</b> — нарушает LSP, позволяет random access. Замена: <code>ArrayDeque</code> как стек.\n\nОба — legacy классы из Java 1.0.',lvl:2},
    {q:'Оценка памяти: byte в LinkedList vs ArrayList',a:'<b>LinkedList:</b> Node (item + next + prev) = 24 байта + Object header 16б + Byte обёртка 16б ≈ <b>~56 байт</b>\n<b>ArrayList:</b> ссылка 4 байта + Byte обёртка 16 байт ≈ <b>~20 байт</b>\n\nLinkedList потребляет в ~3 раза больше памяти на элемент.',lvl:2},
    {s:'Map'},
    {q:'HashMap — устройство',a:'Массив бакетов (Node[]). Бакет — связный список или <b>красно-чёрное дерево</b> (≥8 и ≥64 бакетов).\n\n<b>put(key, value):</b>\n1. hash = key.hashCode() ^ (hashCode >>> 16) — spread\n2. index = hash & (capacity - 1)\n3. Пуст → новый Node\n4. Коллизия → equals() по цепочке\n5. Цепочка ≥ 8 → TreeNode\n\nO(1) среднее, O(log n) worst. Load factor: 0.75. Resize: ×2. Default: 16.',hot:1,lvl:2},
    {q:'TreeMap, LinkedHashMap, ConcurrentHashMap',a:'<b>TreeMap:</b> красно-чёрное дерево, отсортированные ключи. O(log n). NavigableMap: floorKey(), ceilingKey(), subMap().\n\n<b>LinkedHashMap:</b> HashMap + двусвязный список (порядок вставки). LRU кэш: override removeEldestEntry().\n\n<b>ConcurrentHashMap:</b> CAS + synchronized на бакете. Нет блокировки чтения. НЕ null ключи/значения. compute(), merge() — атомарные.',lvl:2},
    {q:'Почему нельзя null в ConcurrentHashMap?',a:'В HashMap: <code>map.get(key) == null</code> может означать \"нет ключа\" ИЛИ \"значение null\".\n\nВ ConcurrentHashMap это создаёт race condition:\n1. Thread A: containsKey(k) → true\n2. Thread B: remove(k)\n3. Thread A: get(k) → null (ключ удалён!)\n\nЗапрет null убирает неоднозначность. Используй Optional или sentinel value.',lvl:2},
    {q:'Что будет если HashMap ключ мутабельный?',a:'Если изменить поля ключа, используемые в hashCode() — объект \"потеряется\" в HashMap!\n\nhashCode изменится → бакет другой → get() по старому хешу не найдёт.\n\n<b>Правило:</b> ключи HashMap должны быть immutable (String, Integer, record) или не менять поля, участвующие в equals/hashCode.',hot:1,lvl:2},
    {q:'Как итерироваться по Map?',a:'<pre><code>// entrySet — самый эффективный\nfor (Map.Entry<K,V> e : map.entrySet()) {\n    e.getKey(); e.getValue();\n}\n\n// forEach (Java 8+)\nmap.forEach((k, v) -> ...);\n\n// keySet (менее эффективно — дополнительный get)\nfor (K key : map.keySet()) { map.get(key); }\n\n// Stream\nmap.entrySet().stream()\n    .filter(e -> e.getValue() > 0)\n    .map(Map.Entry::getKey)\n    .toList();</code></pre>',lvl:2},
    {q:'Начальная ёмкость коллекций',a:'• ArrayList: 10 (или 0 при пустом конструкторе до первого add)\n• HashMap: 16 бакетов\n• HashSet: 16 (внутри HashMap)\n• StringBuilder: 16 символов\n\nЕсли знаешь размер заранее — указывай capacity:\n<code>new ArrayList<>(1000)</code>\n<code>new HashMap<>(expectedSize / 0.75 + 1)</code>',lvl:2},
    {s:'Set'},
    {q:'HashSet, LinkedHashSet, TreeSet',a:'<b>HashSet:</b> обёртка над HashMap (value = PRESENT). O(1), без порядка.\n<b>LinkedHashSet:</b> LinkedHashMap, порядок вставки. O(1).\n<b>TreeSet:</b> TreeMap, отсортированный. O(log n). NavigableSet.\n\n<b>EnumSet</b> — для enum, битовая маска, очень быстрый.\n<b>CopyOnWriteArraySet</b> — для маленьких read-heavy наборов.',lvl:2},
    {s:'Queue и Deque'},
    {q:'Queue и Deque',a:'<b>Queue (FIFO):</b> offer/poll/peek (без исключений), add/remove/element (с исключениями).\n<b>Deque:</b> двусторонняя — addFirst/Last, removeFirst/Last.\n\n• <b>ArrayDeque</b> — на массиве, быстрее LinkedList, без null\n• <b>PriorityQueue</b> — binary heap, по приоритету, без null\n\nFIFO → ArrayDeque. LIFO (стек) → ArrayDeque (Stack deprecated).\nPriority → PriorityQueue + Comparator.',lvl:2},
    {s:'Comparable и Comparator'},
    {q:'Comparable vs Comparator',a:'<b>Comparable&lt;T&gt;:</b> compareTo(other) — естественный порядок в самом классе. Один порядок.\n<b>Comparator&lt;T&gt;:</b> compare(a, b) — внешний, любой порядок.\n\n<pre><code>Comparator.comparing(Person::getName)\n    .thenComparing(Person::getAge)\n    .reversed()</code></pre>\n\nВозвращают: отрицательное (<), 0 (=), положительное (>).',hot:1,lvl:2},
    {s:'Итераторы'},
    {q:'fail-fast vs fail-safe',a:'<b>fail-fast</b> (ArrayList, HashMap): ConcurrentModificationException при изменении во время итерации. modCount. Удаление: iterator.remove().\n\n<b>fail-safe</b> (ConcurrentHashMap, CopyOnWriteArrayList): snapshot/weakly consistent, не бросает CME.',hot:1,lvl:2},
    {q:'Iterable, Iterator и for-each',a:'<b>Iterable&lt;T&gt;</b> — интерфейс с методом iterator(). Позволяет использовать for-each.\n<b>Iterator&lt;T&gt;</b> — hasNext(), next(), remove().\n\nfor-each — синтаксический сахар:\n<pre><code>for (String s : list) { ... }\n// компилируется в:\nIterator<String> it = list.iterator();\nwhile (it.hasNext()) { String s = it.next(); ... }</code></pre>',lvl:2},
    {q:'Immutable коллекции',a:'<b>Java 9+:</b> List.of(), Set.of(), Map.of() — unmodifiable, нельзя null.\n<b>Java 10+:</b> List.copyOf(collection) — unmodifiable копия.\n<b>Java 16+:</b> stream.toList() — unmodifiable.\n\n<b>Collections:</b> unmodifiableList() — view (не копия!), оригинал может меняться.\n\nGuava: ImmutableList.of(), ImmutableMap.builder().\n\nUnsupportedOperationException при попытке модификации.',lvl:2},
  
    {q:'SequencedCollection (Java 21)',a:'Новые интерфейсы с гарантией порядка:\n\n<b>SequencedCollection:</b> addFirst/Last(), getFirst/Last(), reversed()\n<b>SequencedSet</b> extends SequencedCollection, Set\n<b>SequencedMap:</b> putFirst/Last(), firstEntry(), sequencedKeySet()\n\n<pre><code>List<String> list = new ArrayList<>();\nlist.addFirst("a"); // вместо add(0, "a")\nString last = list.getLast();\nList<String> rev = list.reversed(); // view, не копия</code></pre>\n\nLinkedHashSet, LinkedHashMap теперь реализуют Sequenced интерфейсы.',hot:1,lvl:2},
    {q:'EnumSet и EnumMap',a:'<b>EnumSet:</b> Set для enum, реализован как bit vector.\nМаксимально быстрый: O(1) add/contains/remove.\n<code>EnumSet.of(Status.ACTIVE, Status.PENDING)</code>\n<code>EnumSet.allOf(Status.class)</code>\n\n<b>EnumMap:</b> Map с enum ключами, массив значений.\nБыстрее HashMap для enum ключей.\n\nВсегда используй вместо HashSet/HashMap для enum.',lvl:2},
]},

  { id:'streams', icon:'&#9854;', name:'Stream API', data: [
    {s:'Функциональные интерфейсы'},
    {q:'Основные функциональные интерфейсы',a:'@FunctionalInterface — один абстрактный метод.\n\n• <code>Function&lt;T,R&gt;</code> — apply(T): T → R\n• <code>Predicate&lt;T&gt;</code> — test(T): T → boolean\n• <code>Consumer&lt;T&gt;</code> — accept(T): T → void\n• <code>Supplier&lt;T&gt;</code> — get(): () → T\n• <code>UnaryOperator&lt;T&gt;</code> — T → T\n• <code>BinaryOperator&lt;T&gt;</code> — (T,T) → T\n• BiFunction, BiPredicate, BiConsumer\n\nСсылки: <code>String::toUpperCase</code>, <code>System.out::println</code>, <code>Integer::new</code>',hot:1,lvl:2},
    {q:'Лямбда-выражения',a:'<code>(params) -> expression</code> или <code>(params) -> { body; }</code>\n\n• Реализация функционального интерфейса\n• Захватывает effectively final переменные (closure)\n• invokedynamic + LambdaMetafactory (не anonymous class)\n• <code>this</code> = this окружающего класса',lvl:2},
    {q:'Ссылки на методы (Method References)',a:'4 типа:\n• Static: <code>Integer::parseInt</code> — Math::abs\n• Instance (specific): <code>System.out::println</code>\n• Instance (arbitrary): <code>String::toLowerCase</code> — вызывается на элементе\n• Constructor: <code>ArrayList::new</code>\n\nЭквиваленты лямбд, но лаконичнее:\n<code>list.forEach(System.out::println)</code> = <code>list.forEach(x -> System.out.println(x))</code>',lvl:2},
    {s:'Stream API'},
    {q:'Stream API — основы',a:'Конвейер операций. НЕ хранит, НЕ модифицирует источник.\n\n<b>Создание:</b> collection.stream(), Stream.of(), Arrays.stream(), IntStream.range(), Stream.generate(), Stream.iterate()\n\n<b>Ленивость:</b> промежуточные выполняются только при терминальной.\nОдноразовый — нельзя повторно использовать.\n\n<b>Порядок:</b> элементы проходят по конвейеру один за другим (не слой за слоем).',hot:1,lvl:2},
    {q:'Промежуточные операции',a:'• <code>filter(Predicate)</code> — фильтрация\n• <code>map(Function)</code> — преобразование\n• <code>flatMap(Function)</code> — развёртывание вложенных коллекций\n• <code>distinct()</code> — уникальные (equals/hashCode)\n• <code>sorted()</code> — сортировка\n• <code>peek(Consumer)</code> — побочный эффект (дебаг)\n• <code>limit(n)</code>, <code>skip(n)</code>\n• <code>mapToInt/Long/Double</code> — примитивные стримы\n\nJava 9+: takeWhile(), dropWhile()\nJava 16+: mapMulti()',lvl:2},
    {q:'Терминальные операции',a:'• <code>collect(Collector)</code>, <code>toList()</code> (Java 16+)\n• <code>reduce(identity, BinaryOperator)</code>\n• <code>forEach()</code>, <code>forEachOrdered()</code>\n• <code>count()</code>, <code>min()</code>, <code>max()</code>\n• <code>anyMatch()</code>, <code>allMatch()</code>, <code>noneMatch()</code>\n• <code>findFirst()</code>, <code>findAny()</code> → Optional\n• <code>toArray()</code>',hot:1,lvl:2},
    {q:'Collectors — подробно',a:'• <code>toList()</code>, <code>toSet()</code>, <code>toUnmodifiableList()</code>\n• <code>toMap(keyMapper, valueMapper)</code> — с mergeFunction для дубликатов\n• <code>groupingBy(classifier)</code> — Map&lt;K, List&lt;V&gt;&gt;\n• <code>groupingBy(classifier, downstream)</code> — с вложенным коллектором\n• <code>partitioningBy(predicate)</code> — Map&lt;Boolean, List&gt;\n• <code>joining(", ")</code> — конкатенация строк\n• <code>counting()</code>, <code>summingInt()</code>, <code>averagingDouble()</code>\n• <code>teeing(c1, c2, merger)</code> (Java 12) — два коллектора параллельно\n• <code>collectingAndThen(collector, finisher)</code>',hot:1,lvl:2},
    {q:'map() vs flatMap()',a:'<b>map()</b> — 1:1 преобразование каждого элемента.\n<b>flatMap()</b> — 1:N, разворачивает вложенные структуры.\n\n<pre><code>// map: List<List<String>> → Stream<List<String>>\nlists.stream().map(l -> l) // каждый элемент — список\n\n// flatMap: List<List<String>> → Stream<String>\nlists.stream().flatMap(Collection::stream) // плоский поток</code></pre>\n\nАналогия: map = поехали на каждый адрес, flatMap = забрали всех пассажиров в один автобус.',lvl:2},
    {q:'reduce() — как работает',a:'Свёртка: комбинирует элементы в одно значение.\n\n<pre><code>// Сумма\nint sum = numbers.stream().reduce(0, Integer::sum);\n\n// Максимум\nOptional<Integer> max = numbers.stream().reduce(Integer::max);\n\n// Конкатенация\nString s = words.stream().reduce("", (a, b) -> a + " " + b);</code></pre>\n\n3 варианта: reduce(identity, accumulator), reduce(accumulator) → Optional, reduce(identity, accumulator, combiner) — для parallel.',lvl:2},
    {q:'Parallel streams',a:'<code>list.parallelStream()</code> или <code>stream.parallel()</code>\n\nИспользует ForkJoinPool.commonPool() (по умолчанию = cores - 1 потоков).\n\n<b>Когда полезно:</b> большие коллекции (>10k), CPU-bound, порядок не важен.\n<b>Когда НЕ:</b> маленькие коллекции, I/O, порядок важен, shared state.\n\n<b>Свой пул:</b>\n<pre><code>ForkJoinPool pool = new ForkJoinPool(4);\npool.submit(() -> list.parallelStream().forEach(...)).get();</code></pre>',lvl:2},
    {q:'Optional — правильное использование',a:'Контейнер: есть значение или нет.\n\n<code>Optional.of(val)</code>, <code>ofNullable(val)</code>, <code>empty()</code>\n\n• map(), flatMap(), filter()\n• orElse(), orElseGet(supplier), orElseThrow()\n• ifPresentOrElse() (Java 9)\n• or(() -> Optional.of(fallback)) (Java 9)\n• stream() (Java 9)\n\n<b>Антипаттерны:</b> не для полей, не для параметров, не get() без проверки.\n<b>Паттерн:</b> return type метода для выражения \"может не быть\".',lvl:2},
    {q:'Пример: группировка и агрегация',a:'<pre><code>// Средняя зарплата по отделу\nMap<Dept, Double> avg = employees.stream()\n    .collect(groupingBy(\n        Employee::getDept,\n        averagingDouble(Employee::getSalary)));\n\n// Топ-3 по зарплате в каждом отделе\nMap<Dept, List<Employee>> top3 = employees.stream()\n    .collect(groupingBy(Employee::getDept,\n        collectingAndThen(\n            toList(),\n            list -> list.stream()\n                .sorted(comparing(Employee::getSalary).reversed())\n                .limit(3).toList())));</code></pre>',hot:1,lvl:2},
  ]},

  { id:'threads', icon:'&#9881;', name:'Multithreading', data: [
    {s:'Основы'},
    {q:'Процесс vs поток',a:'<b>Процесс:</b> отдельное адресное пространство, изолирован.\n<b>Поток:</b> общий heap, свой стек.\n\nСоздание: Thread, Runnable, Callable, ExecutorService.\nPlatform threads: 1:1 с OS (~1MB). Virtual threads (Java 21): миллионы.',lvl:1},
    {q:'Создание потока: Thread vs Runnable vs Callable',a:'<pre><code>// extends Thread\nnew MyThread().start();\n\n// Runnable (рекомендуется)\nnew Thread(() -> doWork()).start();\n\n// Callable — возвращает результат\nFuture<String> f = executor.submit(() -> computeResult());\nString result = f.get(); // блокирует</code></pre>\n\nRunnable: void run(). Callable: V call() throws Exception.\nRunnable предпочтительнее Thread: можно реализовать интерфейс + наследовать другой класс.',lvl:2},
    {q:'Состояния потока',a:'NEW → start() → <b>RUNNABLE</b> ↔ BLOCKED/WAITING/TIMED_WAITING → <b>TERMINATED</b>\n\n• BLOCKED — ждёт монитор (synchronized)\n• WAITING — wait(), join(), LockSupport.park()\n• TIMED_WAITING — sleep(ms), wait(ms), join(ms)',lvl:1},
    {q:'wait() vs sleep()',a:'<b>wait()</b> — Object метод:\n• Вызывается в synchronized блоке\n• Освобождает монитор\n• Пробуждается через notify()/notifyAll()\n\n<b>sleep()</b> — Thread метод:\n• Не нужен synchronized\n• НЕ освобождает монитор\n• Просыпается по таймеру\n\nОба бросают InterruptedException.',lvl:2},
    {q:'join() и interrupt()',a:'<b>join():</b> текущий поток ждёт завершения другого.\n<code>thread.join()</code> — ждёт бесконечно\n<code>thread.join(1000)</code> — ждёт до 1 секунды\n\n<b>interrupt():</b> запрашивает прерывание (не убивает!).\n• Если поток в wait/sleep/join → InterruptedException\n• Если работает → isInterrupted() == true, проверять вручную\n\n<b>stop()</b> — deprecated, опасен (не освобождает ресурсы).',lvl:1},
    {q:'Потоки-демоны',a:'Daemon thread — фоновый поток, JVM завершается когда остались только daemon.\n\n<code>thread.setDaemon(true)</code> — до start()!\n\nПримеры: GC, финализатор. main() — не daemon.\nОсторожно: daemon не гарантирует завершение задачи (JVM может убить).',lvl:2},
    {q:'synchronized, volatile, happens-before',a:'<b>synchronized:</b> mutual exclusion + видимость. На методе → this. На блоке → lockObject.\n\n<b>volatile:</b> чтение/запись из/в main memory. Memory barrier. НЕ атомарно: <code>count++</code>!\n\n<b>happens-before:</b> unlock → lock, volatile write → read, start() → run(), join() → after.',hot:1,lvl:3},
    {q:'wait(), notify(), notifyAll()',a:'Методы Object. ТОЛЬКО внутри synchronized на том же мониторе.\n\n• wait() — освобождает монитор, WAITING\n• notify() — будит один случайный\n• notifyAll() — будит всех\n\n<pre><code>synchronized(lock) {\n    while (!condition)\n        lock.wait(); // spurious wakeups!\n}</code></pre>\n\nСовременная альтернатива: Condition, BlockingQueue, CountDownLatch.',lvl:2},
    {s:'java.util.concurrent'},
    {q:'Atomic типы и CAS',a:'AtomicInteger, AtomicLong, AtomicBoolean, AtomicReference.\n\n• incrementAndGet(), compareAndSet() — без synchronized\n• CAS (Compare-And-Swap) — аппаратная инструкция\n• При высокой конкуренции: <b>LongAdder</b> (шардирует по ячейкам)\n• VarHandle (Java 9) — низкоуровневые атомарные операции',hot:1,lvl:3},
    {q:'ExecutorService и пулы потоков',a:'• <code>newFixedThreadPool(n)</code> — фиксированный\n• <code>newCachedThreadPool()</code> — динамический\n• <code>newSingleThreadExecutor()</code> — один поток\n• <code>newScheduledThreadPool(n)</code> — отложенные/периодические\n• <code>newVirtualThreadPerTaskExecutor()</code> (Java 21)\n\n<b>ThreadPoolExecutor:</b> corePoolSize, maxPoolSize, queue, rejectionPolicy.\n\nsubmit() → Future: get() блокирует.\n<b>CompletableFuture:</b> thenApply(), thenCompose(), thenCombine(), exceptionally().',lvl:2},
    {q:'CompletableFuture — подробно',a:'Неблокирующие асинхронные цепочки:\n\n<pre><code>CompletableFuture.supplyAsync(() -> fetchUser(id))\n    .thenApply(user -> enrichUser(user))\n    .thenCompose(user -> fetchOrders(user.getId()))\n    .thenCombine(fetchDiscount(), (orders, discount) -> apply(orders, discount))\n    .exceptionally(ex -> fallback())\n    .thenAccept(result -> save(result));</code></pre>\n\nallOf() — ждать все. anyOf() — ждать любой.\nМожно указать свой Executor: supplyAsync(task, myExecutor).',hot:1,lvl:3},
    {q:'Concurrent коллекции',a:'• <b>ConcurrentHashMap</b> — CAS + synchronized на бакете\n• <b>CopyOnWriteArrayList / Set</b> — копия при записи, read-heavy\n• <b>ConcurrentLinkedQueue / Deque</b> — неблокирующие CAS\n• <b>BlockingQueue:</b> ArrayBlockingQueue, LinkedBlockingQueue, PriorityBlockingQueue\n\nProducer-Consumer: put() блокирует если полна, take() если пуста.',lvl:2},
    {q:'Lock, ReentrantLock',a:'Lock — гибче synchronized:\n• lock()/unlock() — обязательно в finally!\n• tryLock() — неблокирующая попытка\n• lockInterruptibly() — прерываемое ожидание\n• Condition — await()/signal() вместо wait/notify\n\nReentrantLock: реентерабельный. fair=true → FIFO.\nReadWriteLock: много читателей, один писатель.\nStampedLock (Java 8): оптимистичное чтение.',lvl:2},
    {q:'CountDownLatch, Semaphore, CyclicBarrier',a:'<b>CountDownLatch(n):</b> countDown() → await() ждёт =0. Одноразовый.\nПример: ждём загрузки всех сервисов.\n\n<b>Semaphore(permits):</b> acquire()/release(). Ограничение одновременных доступов.\nПример: пул соединений.\n\n<b>CyclicBarrier(parties):</b> все ждут друг друга. Переиспользуемый.\nПример: фазы параллельных вычислений.\n\n<b>Phaser</b> (Java 7) — гибкий аналог CyclicBarrier с динамическим числом участников.',lvl:3},
    {q:'Deadlock, Livelock, Starvation',a:'<b>Deadlock:</b> A → lock1 + ждёт lock2; B → lock2 + ждёт lock1.\nРешения: упорядочить захват, tryLock() с таймаутом.\n\n<b>Livelock:</b> активны, но не продвигаются (уступают друг другу).\n<b>Starvation:</b> поток не получает ресурсы (unfair lock).\n\nОбнаружение: jstack, Thread dumps, VisualVM.',hot:1,lvl:3},
    {q:'ThreadLocal',a:'Переменная, уникальная для каждого потока.\n\n<pre><code>private static final ThreadLocal<SimpleDateFormat> df =\n    ThreadLocal.withInitial(() -> new SimpleDateFormat("yyyy-MM-dd"));</code></pre>\n\n<b>Важно:</b> вызвать remove() в thread pool! Иначе утечка памяти.\n\nJava 21: <b>ScopedValue</b> (preview) — замена ThreadLocal для virtual threads (immutable, scoped).',lvl:2},
    {s:'Virtual Threads (Java 21)'},
    {q:'Virtual Threads — что и зачем?',a:'Лёгкие потоки, управляемые JVM. ~1KB стека (vs ~1MB для platform thread).\n\n<b>Проблема:</b> platform threads тяжёлые. 10k потоков = 10GB стека. При I/O — поток простаивает.\n\n<b>Решение:</b> virtual threads. При блокировке I/O — отцепляется от carrier thread, carrier свободен для другой работы.\n\n<pre><code>// Создание\nThread.ofVirtual().start(() -> processPayment(id));\nThread.startVirtualThread(() -> processPayment(id));\n\n// Executor (рекомендуемый способ)\ntry (var executor = Executors.newVirtualThreadPerTaskExecutor()) {\n    for (Long id : paymentIds) {\n        executor.submit(() -> processPayment(id)); // миллион задач!\n    }\n} // автоматически ждёт завершения</code></pre>\n\n<b>Spring Boot 3.2+:</b>\n<pre><code># application.yml\nspring:\n  threads:\n    virtual:\n      enabled: true  # все HTTP запросы на virtual threads!</code></pre>\n\n<b>Когда использовать:</b>\n• I/O-bound: HTTP вызовы, запросы к БД, Kafka, файлы\n• Высокая конкуренция: тысячи одновременных запросов\n\n<b>Когда НЕ использовать:</b>\n• CPU-bound задачи (используй platform threads)\n• synchronized блоки (pinning — virtual thread не отцепляется!)\n  → Заменяй synchronized на ReentrantLock\n\n<b>НЕ пулить:</b> создавай новый virtual thread на каждую задачу. Пулить бессмысленно — они лёгкие.\n\n<b>На собесе:</b> что такое pinning? Как virtual threads работают с synchronized? Чем отличаются от корутин Kotlin?',hot:1,lvl:3},
    {q:'Structured Concurrency (Preview)',a:'Задачи привязаны к scope:\n<pre><code>try (var scope = new StructuredTaskScope.ShutdownOnFailure()) {\n    var user = scope.fork(() -> fetchUser(id));\n    var order = scope.fork(() -> fetchOrder(id));\n    scope.join().throwIfFailed();\n    return new Response(user.get(), order.get());\n}</code></pre>\n\nВсе подзадачи завершены к выходу из scope. Ошибка в одной → отмена остальных.',lvl:3},
    {q:'Java Memory Model (JMM)',a:'Определяет как потоки видят записи друг друга.\n\nhappens-before:\n1. Внутри потока — программный порядок\n2. synchronized unlock → lock\n3. volatile write → read\n4. Thread.start() → run()\n5. run() → join()\n6. Transitivity',lvl:3},
    {q:'Fork/Join Framework',a:'Разделяй и властвуй для параллельных задач:\n\n<pre><code>class SumTask extends RecursiveTask<Long> {\n    protected Long compute() {\n        if (size < THRESHOLD) return directSum();\n        SumTask left = new SumTask(firstHalf);\n        SumTask right = new SumTask(secondHalf);\n        left.fork();\n        return right.compute() + left.join();\n    }\n}</code></pre>\n\nForkJoinPool — work-stealing: свободный поток забирает задачи у занятого.\nParallel Streams используют ForkJoinPool.commonPool().',lvl:3},
  ]},

  { id:'sql', icon:'&#128451;', name:'SQL и БД', data: [
    {s:'Основы SQL'},
    {q:'Категории SQL-команд',a:'<b>DDL:</b> CREATE, ALTER, DROP, TRUNCATE\n<b>DML:</b> SELECT, INSERT, UPDATE, DELETE, MERGE\n<b>TCL:</b> COMMIT, ROLLBACK, SAVEPOINT\n<b>DCL:</b> GRANT, REVOKE',lvl:1},
    {q:'JOIN — виды',a:'• <b>INNER JOIN</b> — только совпадения\n• <b>LEFT JOIN</b> — все из левой + совпадения из правой (NULL)\n• <b>RIGHT JOIN</b> — все из правой\n• <b>FULL OUTER JOIN</b> — все из обеих\n• <b>CROSS JOIN</b> — декартово произведение\n• <b>SELF JOIN</b> — таблица с собой (иерархии)\n\nJOIN обычно быстрее подзапросов. Стратегии: Nested Loop, Hash, Merge.',hot:1,lvl:1},
    {q:'WHERE vs HAVING',a:'<b>WHERE</b> — фильтрация строк ДО группировки. Не может использовать агрегатные функции.\n<b>HAVING</b> — фильтрация ПОСЛЕ GROUP BY. Может использовать агрегатные функции.\n\n<pre><code>SELECT dept, AVG(salary) avg_sal\nFROM employees\nWHERE status = \'ACTIVE\'     -- фильтр строк\nGROUP BY dept\nHAVING AVG(salary) > 100000  -- фильтр групп</code></pre>',lvl:2},
    {q:'UNION vs UNION ALL',a:'<b>UNION</b> — объединяет результаты, убирает дубликаты (медленнее, сортировка).\n<b>UNION ALL</b> — объединяет всё, включая дубликаты (быстрее).\n\nПравило: одинаковое количество столбцов и совместимые типы.\nЕсли дубликатов точно нет — используй UNION ALL.',lvl:2},
    {q:'Агрегатные функции',a:'COUNT(*), COUNT(column), SUM(), AVG(), MIN(), MAX()\n\n• COUNT(*) — считает все строки (включая NULL)\n• COUNT(column) — исключает NULL\n• GROUP BY — группировка перед агрегацией\n• DISTINCT внутри: COUNT(DISTINCT status)',lvl:2},
    {q:'Подзапросы и EXISTS',a:'<b>Коррелированный подзапрос:</b> выполняется для каждой строки внешнего запроса.\n<b>EXISTS</b> — проверяет наличие строк (быстрее IN для больших подзапросов).\n\n<pre><code>SELECT * FROM orders o\nWHERE EXISTS (\n    SELECT 1 FROM payments p\n    WHERE p.order_id = o.id AND p.status = \'SUCCESS\'\n);</code></pre>\n\nIN — для маленьких наборов. EXISTS — для больших, коррелированных.',lvl:2},
    {q:'Индексы',a:'B-tree (default) — =, <, >, BETWEEN, ORDER BY\nHash — только = (PostgreSQL)\nGIN — массивы, JSONB, полнотекст\nGiST — гео, диапазоны\nBRIN — большие упорядоченные таблицы\n\n<b>Составной:</b> порядок столбцов важен (leftmost prefix).\n<b>Покрывающий:</b> все столбцы в индексе.\n<b>Частичный:</b> WHERE status = \'ACTIVE\'\n\nМинусы: медленнее INSERT/UPDATE/DELETE, место.',hot:1,lvl:2},
    {q:'EXPLAIN — план запроса',a:'<code>EXPLAIN ANALYZE</code> — реальное время.\n\n• Seq Scan — полный перебор (нет индекса)\n• Index Scan — индекс + таблица\n• Index Only Scan — покрывающий\n• Bitmap Index Scan — множество строк\n• Nested Loop / Hash Join / Merge Join\n\ncost — оценка, rows — ожидаемое количество, actual time — реальное.\nОптимизация: индекс, переписать запрос, VACUUM ANALYZE, work_mem.',hot:1,lvl:3},
    {q:'TRUNCATE vs DELETE',a:'<b>DELETE</b> — DML: по строкам, можно WHERE, пишет в WAL, triggers работают, можно ROLLBACK.\n<b>TRUNCATE</b> — DDL: мгновенно сбрасывает таблицу, сбрасывает sequences (RESTART IDENTITY), без triggers.\n\nTRUNCATE — быстрее для полной очистки.',lvl:2},
    {q:'Constraints (ограничения)',a:'• <b>PRIMARY KEY</b> — уникальность + NOT NULL\n• <b>FOREIGN KEY</b> — ссылочная целостность\n• <b>UNIQUE</b> — уникальность (допускает NULL)\n• <b>NOT NULL</b> — обязательное значение\n• <b>CHECK</b> — условие: CHECK (amount > 0)\n• <b>DEFAULT</b> — значение по умолчанию\n\nSurrogate key (автоинкремент) vs Natural key (бизнес-значение).',lvl:2},
    {s:'Транзакции'},
    {q:'ACID',a:'<b>A</b>tomicity — всё или ничего (COMMIT/ROLLBACK)\n<b>C</b>onsistency — корректное состояние\n<b>I</b>solation — параллельные транзакции не мешают\n<b>D</b>urability — после COMMIT сохранено (WAL)\n\nPostgreSQL: MVCC — каждая транзакция видит snapshot.',hot:1,lvl:1},
    {q:'Уровни изоляции',a:'• <b>READ UNCOMMITTED</b> — dirty reads (PG = READ COMMITTED)\n• <b>READ COMMITTED</b> (default PG) — только committed. Non-repeatable reads.\n• <b>REPEATABLE READ</b> — snapshot. PG защищает от phantoms.\n• <b>SERIALIZABLE</b> — полная изоляция, может откатить.\n\nDirty read → Non-repeatable → Phantom read.\nЧем выше изоляция, тем ниже производительность.',hot:1,lvl:2},
    {q:'Блокировки в БД',a:'<b>Shared lock (FOR SHARE):</b> чтение, не мешает другим читать.\n<b>Exclusive lock (FOR UPDATE):</b> запись, блокирует других.\n\n<b>Оптимистическая:</b> проверка версии при UPDATE. Если изменилась — конфликт.\n<b>Пессимистическая:</b> SELECT FOR UPDATE — блокирует строки.\n\nОптимистическая — для low contention (чаще).\nПессимистическая — для критичных операций (баланс).',lvl:2},
    {s:'PostgreSQL'},
