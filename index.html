function toggleTestChip(btn, isAll) {
  var chips = document.querySelectorAll("#testTopicChips .test-chip");
  if (isAll) {
    chips.forEach(function(c){ c.classList.remove("active"); });
    btn.classList.add("active");
  } else {
    var allChip = document.querySelector('#testTopicChips [data-topic="all"]');
    allChip.classList.remove("active");
    btn.classList.toggle("active");
    var anyActive = document.querySelector('#testTopicChips .test-chip.active:not([data-topic="all"])');
    if (!anyActive) allChip.classList.add("active");
  }
}
function toggleTestLevel(btn) {
  document.querySelectorAll("#testLevelChips .test-chip").forEach(function(c){ c.classList.remove("active"); });
  btn.classList.add("active");
}
function toggleTestCount(btn) {
  document.querySelectorAll("#testCountChips .test-chip").forEach(function(c){ c.classList.remove("active"); });
  btn.classList.add("active");
}
function toggleTestTimerChip(btn) {
  document.querySelectorAll("#testTimerChips .test-chip").forEach(function(c){ c.classList.remove("active"); });
  btn.classList.add("active");
}

function startTest() {
  var selectedTopics = [];
  var allChip = document.querySelector('#testTopicChips [data-topic="all"]');
  if (allChip && allChip.classList.contains("active")) {
    selectedTopics = null; // all
  } else {
    document.querySelectorAll("#testTopicChips .test-chip.active").forEach(function(c){
      selectedTopics.push(c.getAttribute("data-topic"));
    });
  }
  var levelEl = document.querySelector("#testLevelChips .test-chip.active");
  var level = levelEl ? parseInt(levelEl.getAttribute("data-level")) : 0;
  var countEl = document.querySelector("#testCountChips .test-chip.active");
  var count = countEl ? parseInt(countEl.getAttribute("data-count")) : 10;
  var timerEl = document.querySelector("#testTimerChips .test-chip.active");
  var timerSec = timerEl ? parseInt(timerEl.getAttribute("data-timer")) : 0;

  var pool = QUIZ_BANK.filter(function(q) {
    if (selectedTopics && selectedTopics.indexOf(q.topic) === -1) return false;
    if (level > 0 && q.lvl !== level) return false;
    return true;
  });

  // Shuffle
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }

  if (pool.length === 0) { alert("Нет вопросов для выбранных параметров"); return; }

  var infinite = count === 0;
  var questions = infinite ? pool : pool.slice(0, count);

  testState = {
    questions: questions,
    answers: new Array(questions.length).fill(null), // each: array of selected indices, or null
    current: 0,
    streak: 0,
    bestStreak: 0,
    startTime: Date.now(),
    timerSec: timerSec,
    timerInterval: null,
    timerRemaining: timerSec,
    infinite: infinite,
    selectedTopics: selectedTopics,
    selectedLevel: level,
    finished: false
  };

  document.getElementById("testNav").style.display = "flex";
  document.getElementById("testTitle").innerHTML = "&#128221; Тест";
  renderTestQuestion();
  setupTestSwipe();
}

function renderTestQuestion() {
  if (!testState || testState.current >= testState.questions.length) {
    if (testState && testState.infinite) { finishTest(); }
    return;
  }

  var q = testState.questions[testState.current];
  var topicObj = TOPICS.find(function(t){return t.id===q.topic;});
  var topicName = topicObj ? topicObj.name : q.topic;

  // Header
  document.getElementById("testProgressText").textContent = (testState.current+1) + " / " + testState.questions.length;
  document.getElementById("testProgressBar").style.width = ((testState.current+1)/testState.questions.length*100) + "%";
  document.getElementById("testStreak").textContent = testState.streak > 0 ? ("\uD83D\uDD25 " + testState.streak) : "";

  // Dots
  var dotsHtml = "";
  var maxDots = Math.min(testState.questions.length, 50);
  for (var i = 0; i < maxDots; i++) {
    var cls = "test-dot";
    if (testState.answers[i] !== null) cls += " answered";
    if (i === testState.current) cls += " current";
    dotsHtml += '<span class="'+cls+'"></span>';
  }
  if (testState.questions.length > 50) dotsHtml += '<span style="color:var(--text2);font-size:11px">...+'+(testState.questions.length-50)+'</span>';
  document.getElementById("testDots").innerHTML = dotsHtml;

  // Body
  var html = '<div class="test-body">';
  html += '<div class="test-q-badges"><span class="badge badge-l'+q.lvl+'">L'+q.lvl+'</span><span class="badge" style="background:rgba(108,92,231,0.15);color:var(--accent2)">'+topicName+'</span>';
  if (q.type === "multi") html += '<span class="badge" style="background:rgba(253,203,110,0.15);color:var(--yellow)">Несколько ответов</span>';
  html += '</div>';
  html += '<div class="test-q-text">'+q.q+'</div>';
  if (q.code) {
    html += '<div class="test-q-code">'+escHtml(q.code)+'</div>';
  }
  if (q.type === "multi") html += '<div class="test-q-hint">Выберите несколько вариантов</div>';
  html += '<div class="test-options">';
  var currentAnswer = testState.answers[testState.current];
  q.options.forEach(function(opt, idx) {
    var selected = currentAnswer && currentAnswer.indexOf(idx) !== -1;
    var cls = "test-option" + (q.type === "multi" ? " multi" : "") + (selected ? " selected" : "");
    html += '<div class="'+cls+'" onclick="selectTestOption('+idx+')">';
    html += '<span class="indicator"></span>';
    html += '<span>'+escHtml(opt)+'</span>';
    html += '</div>';
  });
  html += '</div></div>';

  document.getElementById("testContent").innerHTML = html;
  document.getElementById("testContent").className = "";

  // Timer
  if (testState.timerInterval) clearInterval(testState.timerInterval);
  if (testState.timerSec > 0) {
    testState.timerRemaining = testState.timerSec;
    updateTimerDisplay();
    testState.timerInterval = setInterval(function() {
      testState.timerRemaining--;
      updateTimerDisplay();
      if (testState.timerRemaining <= 0) {
        clearInterval(testState.timerInterval);
        testState.timerInterval = null;
        testNext();
      }
    }, 1000);
  } else {
    document.getElementById("testTimer").textContent = "";
  }
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function updateTimerDisplay() {
  var el = document.getElementById("testTimer");
  var r = testState.timerRemaining;
  el.textContent = "\u23F1 " + r + "\u0441";
  el.className = "test-timer" + (r <= 5 ? " warning" : "");
}

function selectTestOption(idx) {
  if (!testState || testState.finished) return;
  var q = testState.questions[testState.current];
  var ans = testState.answers[testState.current] || [];
  ans = ans.slice(); // copy

  if (q.type === "single") {
    ans = [idx];
  } else {
    var pos = ans.indexOf(idx);
    if (pos !== -1) ans.splice(pos, 1);
    else ans.push(idx);
  }
  testState.answers[testState.current] = ans;
  updateTestOptions();
}

function updateTestOptions() {
  var q = testState.questions[testState.current];
  var currentAnswer = testState.answers[testState.current];
  var optionEls = document.querySelectorAll("#testContent .test-option");
  optionEls.forEach(function(el, idx) {
    var selected = currentAnswer && currentAnswer.indexOf(idx) !== -1;
    el.classList.toggle("selected", selected);
  });
}

function testPrev() {
  if (!testState || testState.finished || testState.current <= 0) return;
  testState.current--;
  renderTestQuestion();
}

function testNext() {
  if (!testState || testState.finished) return;
  // Check answer for streak
  var q = testState.questions[testState.current];
  var ans = testState.answers[testState.current];
  if (ans && ans.length > 0) {
    var correct = isAnswerCorrect(testState.current);
    if (correct) {
      testState.streak++;
      if (testState.streak > testState.bestStreak) testState.bestStreak = testState.streak;
    } else {
      testState.streak = 0;
    }
  }

  testState.current++;
  if (testState.current >= testState.questions.length) {
    if (testState.infinite) {
      // Add more questions from pool if possible
      finishTest();
    } else {
      finishTest();
    }
    return;
  }
  renderTestQuestion();
}

function isAnswerCorrect(idx) {
  var q = testState.questions[idx];
  var ans = testState.answers[idx];
  if (!ans || ans.length === 0) return false;
  if (ans.length !== q.correct.length) return false;
  var sorted1 = ans.slice().sort();
  var sorted2 = q.correct.slice().sort();
  for (var i = 0; i < sorted1.length; i++) {
    if (sorted1[i] !== sorted2[i]) return false;
  }
  return true;
}

function finishTest() {
  if (!testState) return;
  if (testState.timerInterval) { clearInterval(testState.timerInterval); testState.timerInterval = null; }

  // Save history only once
  if (!testState.finished) {
    testState.finished = true;
    testState.elapsed = Math.round((Date.now() - testState.startTime) / 1000);
    // Recalculate best streak
    var streak = 0, bestStreak = 0;
    testState.questions.forEach(function(q, i) {
      if (isAnswerCorrect(i)) { streak++; if (streak > bestStreak) bestStreak = streak; }
      else streak = 0;
    });
    testState.bestStreak = bestStreak;
    var totalCorrect = 0, totalAnswered = 0;
    testState.questions.forEach(function(q, i) {
      var ans = testState.answers[i];
      if (ans && ans.length > 0) { totalAnswered++; if (isAnswerCorrect(i)) totalCorrect++; }
    });
    testState.cachedCorrect = totalCorrect;
    testState.cachedAnswered = totalAnswered;
    saveTestHistory(totalCorrect, totalAnswered, testState.elapsed, bestStreak);
  }

  showTestResults();
}

function showTestResults() {
  if (!testState) return;

  var totalCorrect = testState.cachedCorrect;
  var totalAnswered = testState.cachedAnswered;
  var elapsed = testState.elapsed;
  var bestStreak = testState.bestStreak;

  var topicStats = {};
  testState.questions.forEach(function(q, i) {
    if (!topicStats[q.topic]) topicStats[q.topic] = {total:0, correct:0};
    topicStats[q.topic].total++;
    var ans = testState.answers[i];
    if (ans && ans.length > 0 && isAnswerCorrect(i)) topicStats[q.topic].correct++;
  });

  var pct = totalAnswered > 0 ? Math.round(totalCorrect / totalAnswered * 100) : 0;

  // Stars
  var stars = pct >= 90 ? 5 : pct >= 75 ? 4 : pct >= 60 ? 3 : pct >= 40 ? 2 : 1;
  var starStr = "";
  for (var i = 0; i < 5; i++) starStr += i < stars ? "\u2605" : "\u2606";
  var verdicts = ["","Попробуйте ещё раз","Неплохо!","Хорошо!","Отлично!","Превосходно!"];

  // Render results
  document.getElementById("testNav").style.display = "none";
  document.getElementById("testTitle").innerHTML = "&#128202; Результат";
  document.getElementById("testStreak").textContent = "";
  document.getElementById("testTimer").textContent = "";
  document.getElementById("testDots").innerHTML = "";

  var html = '<div class="test-results">';
  html += '<div class="test-results-score">';
  html += '<div class="big-num" style="color:' + (pct >= 60 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)') + '">' + totalCorrect + ' / ' + totalAnswered + '</div>';
  html += '<div class="big-pct">' + pct + '%</div>';
  html += '<div class="stars">' + starStr + '</div>';
  html += '<div class="verdict">' + verdicts[stars] + '</div>';
  html += '</div>';

  html += '<div class="test-results-meta">';
  html += '<span>\uD83D\uDD25 Streak: ' + bestStreak + '</span>';
  html += '<span>\u23F1 ' + formatTime(elapsed) + '</span>';
  html += '</div>';

  // Topic breakdown
  html += '<div class="test-results-topics"><h3 style="margin-bottom:12px">По темам</h3>';
  Object.keys(topicStats).forEach(function(tid) {
    var ts = topicStats[tid];
    var topicObj = TOPICS.find(function(t){return t.id===tid;});
    var name = topicObj ? topicObj.name : tid;
    var tpct = ts.total > 0 ? Math.round(ts.correct/ts.total*100) : 0;
    html += '<div class="test-results-topic"><span style="min-width:120px">' + name + '</span>';
    html += '<div class="topic-bar"><div class="topic-bar-fill" style="width:'+tpct+'%"></div></div>';
    html += '<span style="min-width:70px;text-align:right">'+ts.correct+'/'+ts.total+' '+tpct+'%</span></div>';
  });
  html += '</div>';

  // Error list
  var errors = [];
  testState.questions.forEach(function(q, i) {
    if (!isAnswerCorrect(i)) errors.push({q:q, idx:i});
  });
  if (errors.length > 0) {
    html += '<div class="test-errors-list"><h3 style="margin-bottom:12px">\u274C Ошибки ('+errors.length+')</h3>';
    errors.forEach(function(e) {
      html += '<div class="test-error-item" onclick="showTestReview('+e.idx+')">';
      html += '\u274C Q'+(e.idx+1)+': '+e.q.q.substring(0,60)+(e.q.q.length>60?"...":"");
      html += '</div>';
    });
    html += '</div>';
  }

  html += '<div class="test-results-actions">';
  if (errors.length > 0) html += '<button onclick="showTestReview('+errors[0].idx+')">\uD83D\uDCD6 Разбор ошибок</button>';
  html += '<button onclick="retryTest()">\uD83D\uDD04 Пройти ещё раз</button>';
  html += '<button onclick="shareTestResult()">&#128227; Поделиться</button>';
  html += '<button class="btn-primary" onclick="closeTest()">\uD83C\uDFE0 На главную</button>';
  html += '</div></div>';

  document.getElementById("testContent").innerHTML = html;
  document.getElementById("testContent").scrollTop = 0;
  document.getElementById("testProgressBar").style.width = "100%";
  document.getElementById("testProgressText").textContent = "";
}

function formatTime(sec) {
  var m = Math.floor(sec / 60);
  var s = sec % 60;
  return m + ":" + (s < 10 ? "0" : "") + s;
}

function saveTestHistory(correct, total, timeSec, streak) {
  var data = JSON.parse(localStorage.getItem("java-prep-tests") || '{"history":[],"bestStreak":0,"totalTests":0,"totalCorrect":0,"totalAnswered":0}');
  var errorIds = [];
  testState.questions.forEach(function(q, i) {
    if (!isAnswerCorrect(i)) errorIds.push(q.id);
  });
  data.history.push({
    date: new Date().toISOString(),
    topics: testState.selectedTopics || ["all"],
    level: testState.selectedLevel || 0,
    total: total,
    correct: correct,
    time: timeSec,
    streak: streak,
    errors: errorIds
  });
  data.totalTests++;
  data.totalCorrect += correct;
  data.totalAnswered += total;
  if (streak > data.bestStreak) data.bestStreak = streak;
  localStorage.setItem("java-prep-tests", JSON.stringify(data));
}

function showTestReview(idx) {
  if (!testState) return;
  var q = testState.questions[idx];
  var ans = testState.answers[idx] || [];
  var topicObj = TOPICS.find(function(t){return t.id===q.topic;});
  var topicName = topicObj ? topicObj.name : q.topic;
  var correct = isAnswerCorrect(idx);

  document.getElementById("testNav").style.display = "none";
  document.getElementById("testTitle").innerHTML = (correct ? "\u2705" : "\u274C") + " Вопрос " + (idx+1);

  // Find prev/next errors
  var errors = [];
  testState.questions.forEach(function(qq, i) { if (!isAnswerCorrect(i)) errors.push(i); });
  var errPos = errors.indexOf(idx);
  var prevErr = errPos > 0 ? errors[errPos - 1] : -1;
  var nextErr = errPos < errors.length - 1 ? errors[errPos + 1] : -1;

  var html = '<div class="test-review">';
  html += '<div class="test-q-badges"><span class="badge badge-l'+q.lvl+'">L'+q.lvl+'</span><span class="badge" style="background:rgba(108,92,231,0.15);color:var(--accent2)">'+topicName+'</span></div>';
  html += '<div class="test-q-text" style="text-align:left;font-size:16px">'+q.q+'</div>';
  if (q.code) html += '<div class="test-q-code">'+escHtml(q.code)+'</div>';

  html += '<div class="test-options" style="pointer-events:none">';
  q.options.forEach(function(opt, oi) {
    var wasSelected = ans.indexOf(oi) !== -1;
    var isCorrect = q.correct.indexOf(oi) !== -1;
    var cls = "test-option" + (q.type === "multi" ? " multi" : "");
    if (wasSelected && isCorrect) cls += " selected opt-correct";
    else if (wasSelected && !isCorrect) cls += " selected opt-wrong";
    else if (!wasSelected && isCorrect) cls += " opt-missed";
    html += '<div class="'+cls+'"><span class="indicator"></span><span>'+escHtml(opt);
    if (wasSelected && isCorrect) html += ' \u2705';
    else if (wasSelected && !isCorrect) html += ' \u274C';
    else if (!wasSelected && isCorrect) html += ' \u2705 (правильный)';
    html += '</span></div>';
  });
  html += '</div>';

  if (q.explanation) {
    html += '<div class="test-review-explanation"><b>Объяснение:</b><br>' + q.explanation + '</div>';
  }

  // Если ответ неправильный — показать релевантные учебные материалы
  if (!correct) {
    var recs = getTopicResources(q.topic);
    // Приоритет: материалы уровня L<=q.lvl, берём top-4
    var relevant = recs.filter(function(r){ return (r.l || 1) <= q.lvl; });
    if (relevant.length === 0) relevant = recs;
    relevant = relevant.slice(0, 4);
    if (relevant.length > 0) {
      html += '<div class="review-rec">';
      html += '<div class="review-rec-title">\uD83D\uDCA1 Рекомендую изучить</div>';
      html += renderResourceList(relevant, true);
      html += '</div>';
    }
  }

  html += '<div style="display:flex;gap:10px;margin-top:20px">';
  if (prevErr >= 0) html += '<button class="topbar-btn" style="flex:1" onclick="showTestReview('+prevErr+')">\u2190 Предыдущая ошибка</button>';
  html += '<button class="topbar-btn" style="flex:1" onclick="showTestResults()">\u2190 К результатам</button>';
  if (nextErr >= 0) html += '<button class="topbar-btn" style="flex:1" onclick="showTestReview('+nextErr+')">Следующая ошибка \u2192</button>';
  html += '</div></div>';

  document.getElementById("testContent").innerHTML = html;
  document.getElementById("testContent").scrollTop = 0;
}

function retryTest() {
  if (!testState) return;
  // Re-shuffle
  var qs = testState.questions;
  for (var i = qs.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = qs[i]; qs[i] = qs[j]; qs[j] = tmp;
  }
  testState.answers = new Array(qs.length).fill(null);
  testState.current = 0;
  testState.streak = 0;
  testState.bestStreak = 0;
  testState.startTime = Date.now();
  testState.finished = false;
  document.getElementById("testNav").style.display = "flex";
  document.getElementById("testTitle").innerHTML = "&#128221; Тест";
  renderTestQuestion();
}

function closeTest() {
  if (testState && testState.timerInterval) { clearInterval(testState.timerInterval); }
  testState = null;
  document.getElementById("testOverlay").classList.remove("active");
  renderSidebar();
  renderMain();
}

// Swipe support for test mode
function setupTestSwipe() {
  var el = document.getElementById("testContent");
  var startX = 0, startY = 0;
  el.ontouchstart = function(e) { startX = e.changedTouches[0].screenX; startY = e.changedTouches[0].screenY; };
  el.ontouchend = function(e) {
    if (!testState || testState.finished) return;
    var dx = e.changedTouches[0].screenX - startX;
    var dy = e.changedTouches[0].screenY - startY;
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
    if (dx < 0) testNext(); else testPrev();
  };
}

var srsQueue = [];
var srsIndex = 0;

function openSRS() {
  srsQueue = getDueCards();
  if (srsQueue.length === 0) {
    alert("Нет карточек для повторения! Все повторения актуальны.");
    return;
  }
  srsIndex = 0;
  document.getElementById("srsOverlay").classList.add("active");
  closeSidebar();
  renderSRSCard();
  setupSRSSwipe();
}

function setupSRSSwipe() {
  var el = document.getElementById("srsBody");
  var startX = 0, startY = 0, startTime = 0;
  el.ontouchstart = function(e) {
    startX = e.changedTouches[0].screenX;
    startY = e.changedTouches[0].screenY;
    startTime = Date.now();
  };
  el.ontouchend = function(e) {
    var dx = e.changedTouches[0].screenX - startX;
    var dy = e.changedTouches[0].screenY - startY;
    var elapsed = Date.now() - startTime;
    if (elapsed > 500) return;
    // Vertical swipe up -> reveal answer
    if (Math.abs(dy) > 60 && Math.abs(dy) > Math.abs(dx) * 1.3 && dy < 0) {
      var rb = document.getElementById("srsRevealBtn");
      if (rb && rb.style.display !== "none") { revealSRSAnswer(); return; }
    }
    // Horizontal swipes only when answer is revealed -> rate
    if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 1.3) {
      var rate = document.getElementById("srsRate");
      if (rate && rate.style.display === "flex") {
        if (dx > 0) rateSRS(5); // swipe right = Знаю
        else rateSRS(1); // swipe left = Не знаю
      }
    }
  };
}

function closeSRS() {
  document.getElementById("srsOverlay").classList.remove("active");
  renderSidebar();
  renderMain();
}

function renderSRSCard() {
  if (srsIndex >= srsQueue.length) {
    var body = document.getElementById("srsBody");
    body.innerHTML = '<div style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:16px">&#127881;</div><h2>Повторение завершено!</h2><p style="color:var(--text2);margin:12px 0">Вы повторили ' + srsQueue.length + ' карточек</p><button class="test-start-btn" onclick="closeSRS()" style="max-width:300px;margin:20px auto">&#127968; На главную</button></div>';
    return;
  }
  var entry = srsQueue[srsIndex];
  document.getElementById("srsProgress").textContent = (srsIndex + 1) + " / " + srsQueue.length;
  document.getElementById("srsTitle").innerHTML = "&#128257; Повторение";

  var html = '<div style="max-width:700px;width:100%;margin:0 auto">';
  html += '<div style="display:flex;gap:8px;margin-bottom:12px;justify-content:center">';
  html += '<span class="badge badge-l' + (entry.item.lvl||1) + '">L' + (entry.item.lvl||1) + '</span>';
  html += '<span class="badge" style="background:rgba(108,92,231,0.15);color:var(--accent2)">' + entry.topicName + '</span>';
  var daysAgo = Math.round((Date.now() - entry.card.lastReview) / 86400000);
  html += '<span class="badge" style="background:rgba(253,203,110,0.15);color:var(--yellow)">Последний раз: ' + (daysAgo === 0 ? 'сегодня' : daysAgo + ' дн. назад') + '</span>';
  html += '</div>';
  html += '<div class="test-q-text">' + entry.item.q + '</div>';
  html += '<div class="quiz-answer" id="srsAnswer" style="display:none;max-width:700px;text-align:left;font-size:14px;line-height:1.7;color:var(--text2);margin:16px 0">' + formatAnswer(entry.item.a || '') + '</div>';
  html += '<button class="quiz-reveal-btn" id="srsRevealBtn" onclick="revealSRSAnswer()" style="margin-bottom:8px">Показать ответ</button>';
  html += '<div style="text-align:center;font-size:11px;color:var(--text2);margin-bottom:16px">\uD83D\uDCF1 Свайп \u2191 — показать ответ</div>';
  html += '<div id="srsRate" style="display:none;gap:10px;width:100%;max-width:400px;margin:0 auto">';
  html += '<button class="topbar-btn" style="flex:1;justify-content:center;color:var(--red)" onclick="rateSRS(1)">&#128308; Не знаю</button>';
  html += '<button class="topbar-btn" style="flex:1;justify-content:center;color:var(--yellow)" onclick="rateSRS(3)">&#128992; Частично</button>';
  html += '<button class="topbar-btn" style="flex:1;justify-content:center;color:var(--green)" onclick="rateSRS(5)">&#128994; Знаю!</button>';
  html += '</div>';
  html += '<div id="srsSwipeHint" style="text-align:center;font-size:11px;color:var(--text2);margin-top:8px;display:none">\uD83D\uDCF1 Свайп \u2190 Не знаю / \u2192 Знаю</div>';
  html += '</div>';

  document.getElementById("srsBody").innerHTML = html;
}

function revealSRSAnswer() {
  document.getElementById("srsAnswer").style.display = "block";
  document.getElementById("srsRevealBtn").style.display = "none";
  document.getElementById("srsRate").style.display = "flex";
  var hint = document.getElementById("srsSwipeHint");
  if (hint) hint.style.display = "block";
}

function rateSRS(quality) {
  var entry = srsQueue[srsIndex];
  srsSchedule(entry.key, quality);
  // Also update flashcard status
  var parts = entry.key.split('::');
  var status = quality >= 5 ? 'known' : quality >= 3 ? 'learning' : 'hard';
  state.statuses[entry.key] = status;
  saveState();
  srsIndex++;
  renderSRSCard();
}

}
function toggleInterviewLvl(btn) {
  document.querySelectorAll("#interviewLevel .test-chip").forEach(function(c){c.classList.remove("active");});
  btn.classList.add("active");
}

function startInterview() {
  var durEl = document.querySelector("#interviewDuration .test-chip.active");
  var dur = durEl ? parseInt(durEl.getAttribute("data-dur")) : 30;
  var lvlEl = document.querySelector("#interviewLevel .test-chip.active");
  var senior = lvlEl && lvlEl.getAttribute("data-lvl") === "1";

  // Build interview sections
  var sections = [];

  // 1. Open questions (5-8)
  var openTopics = ['core','spring','sql','threads','arch'];
  var openQs = [];
  openTopics.forEach(function(tid) {
    var topic = TOPICS.find(function(t){return t.id===tid;});
    if (topic) {
      topic.data.forEach(function(d) {
        if (d.s || !d.a) return;
        if (senior && d.lvl && d.lvl < 2) return;
        if (!senior && d.lvl && d.lvl > 2) return;
        openQs.push({item:d, topicId:tid, topicName:topic.name});
      });
    }
  });
  shuffle(openQs);
  var numOpen = dur >= 45 ? 8 : 5;
  openQs = openQs.slice(0, numOpen);

  // 2. Test questions (5-10)
  var testPool = QUIZ_BANK.filter(function(q) {
    if (senior && q.lvl < 2) return false;
    if (!senior && q.lvl > 2) return false;
    return true;
  });
  shuffle(testPool);
  var numTest = dur >= 45 ? 10 : 5;
  testPool = testPool.slice(0, numTest);

  // 3. Code tasks (1-2)
  var codeTopic = TOPICS.find(function(t){return t.id==='live';});
  var codeTasks = [];
  if (codeTopic) {
    codeTopic.data.forEach(function(d) {
      if (d.s || !d.a) return;
      codeTasks.push(d);
    });
  }
  shuffle(codeTasks);
  codeTasks = codeTasks.slice(0, dur >= 45 ? 2 : 1);

  interviewState = {
    duration: dur * 60,
    startTime: Date.now(),
    interval: null,
    openQs: openQs,
    testQs: testPool,
    codeTasks: codeTasks,
    testAnswers: new Array(testPool.length).fill(null),
    openAnswers: new Array(openQs.length).fill(""),
    codeAnswers: new Array(codeTasks.length).fill(""),
    senior: senior,
    finished: false
  };

  // Start timer
  interviewState.interval = setInterval(updateInterviewTimer, 1000);
  renderInterview();
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
}

function updateInterviewTimer() {
  if (!interviewState) return;
  var elapsed = Math.round((Date.now() - interviewState.startTime) / 1000);
  var remaining = interviewState.duration - elapsed;
  if (remaining <= 0) { finishInterview(); return; }
  var m = Math.floor(remaining / 60);
  var s = remaining % 60;
  document.getElementById("interviewTimer").textContent = "\u23F1 " + m + ":" + (s < 10 ? "0" : "") + s;
  document.getElementById("interviewTimer").className = "test-timer" + (remaining <= 60 ? " warning" : "");
  document.getElementById("interviewTimerBar").style.width = (elapsed / interviewState.duration * 100) + "%";
}

function renderInterview() {
  if (!interviewState) return;
  document.getElementById("interviewTitle").innerHTML = "&#127908; Собеседование" + (interviewState.senior ? " (Senior)" : " (Middle)");
  var sec = 0;
  var html = '';

  // Section 1: Open questions
  html += '<h2 style="margin-bottom:16px">&#128172; Теоретические вопросы</h2>';
  html += '<p style="color:var(--text2);margin-bottom:16px;font-size:13px">Ответьте своими словами, как на настоящем собеседовании</p>';
  interviewState.openQs.forEach(function(oq, i) {
    html += '<div class="interview-section">';
    html += '<h3><span class="badge badge-l' + (oq.item.lvl||1) + '">L' + (oq.item.lvl||1) + '</span> ' + oq.topicName + '</h3>';
    html += '<p style="font-size:15px;font-weight:500;margin:8px 0">' + oq.item.q + '</p>';
    html += '<textarea class="interview-textarea" placeholder="Ваш ответ..." onblur="interviewState.openAnswers[' + i + ']=this.value">' + interviewState.openAnswers[i] + '</textarea>';
    html += '</div>';
  });

  // Section 2: Tests
  html += '<h2 style="margin:24px 0 16px">&#128221; Тестовые вопросы</h2>';
  interviewState.testQs.forEach(function(tq, i) {
    html += '<div class="interview-section">';
    html += '<h3><span class="badge badge-l' + tq.lvl + '">L' + tq.lvl + '</span> ' + tq.q + '</h3>';
    if (tq.code) html += '<div class="test-q-code">' + escHtml(tq.code) + '</div>';
    html += '<div class="test-options">';
    var curAns = interviewState.testAnswers[i];
    tq.options.forEach(function(opt, oi) {
      var sel = curAns && curAns.indexOf(oi) !== -1;
      html += '<div class="test-option' + (tq.type==="multi"?" multi":"") + (sel?" selected":"") + '" onclick="selectInterviewOption(' + i + ',' + oi + ')">';
      html += '<span class="indicator"></span><span>' + escHtml(opt) + '</span></div>';
    });
    html += '</div></div>';
  });

  // Section 3: Code
  if (interviewState.codeTasks.length > 0) {
    html += '<h2 style="margin:24px 0 16px">&#128187; Задачи на код</h2>';
    interviewState.codeTasks.forEach(function(ct, i) {
      html += '<div class="interview-section">';
      html += '<h3>' + ct.q + '</h3>';
      html += '<textarea class="interview-textarea" style="font-family:monospace;min-height:150px" placeholder="// Ваш код..." onblur="interviewState.codeAnswers[' + i + ']=this.value">' + interviewState.codeAnswers[i] + '</textarea>';
      html += '</div>';
    });
  }

  html += '<div style="margin-top:24px;text-align:center"><button class="test-start-btn" style="max-width:400px" onclick="finishInterview()">&#10003; Завершить собеседование</button></div>';

  document.getElementById("interviewBody").innerHTML = html;
}

function selectInterviewOption(qIdx, optIdx) {
  if (!interviewState || interviewState.finished) return;
  var tq = interviewState.testQs[qIdx];
  var ans = interviewState.testAnswers[qIdx] || [];
  ans = ans.slice();
  if (tq.type === "single") { ans = [optIdx]; }
  else { var p = ans.indexOf(optIdx); if (p !== -1) ans.splice(p,1); else ans.push(optIdx); }
  interviewState.testAnswers[qIdx] = ans;
  // Update just this question options visually
  var sections = document.querySelectorAll(".interview-section");
  var testStart = interviewState.openQs.length;
  var section = sections[testStart + qIdx];
  if (section) {
    section.querySelectorAll(".test-option").forEach(function(el, oi) {
      el.classList.toggle("selected", ans.indexOf(oi) !== -1);
    });
  }
}

function finishInterview() {
  if (!interviewState) return;
  if (interviewState.interval) { clearInterval(interviewState.interval); interviewState.interval = null; }
  interviewState.finished = true;

  var elapsed = Math.round((Date.now() - interviewState.startTime) / 1000);
  document.getElementById("interviewTimer").textContent = "";
  document.getElementById("interviewTimerBar").style.width = "100%";

  // Score tests
  var testCorrect = 0;
  interviewState.testQs.forEach(function(tq, i) {
    var ans = interviewState.testAnswers[i] || [];
    if (ans.length > 0 && ans.length === tq.correct.length) {
      var s1 = ans.slice().sort(), s2 = tq.correct.slice().sort();
      var ok = true;
      for (var j = 0; j < s1.length; j++) { if (s1[j] !== s2[j]) ok = false; }
      if (ok) testCorrect++;
    }
  });

  // Count open answered
  var openAnswered = interviewState.openAnswers.filter(function(a){return a.trim().length > 10;}).length;
  var codeAnswered = interviewState.codeAnswers.filter(function(a){return a.trim().length > 10;}).length;

  var testPct = interviewState.testQs.length > 0 ? Math.round(testCorrect / interviewState.testQs.length * 100) : 0;
  var openPct = interviewState.openQs.length > 0 ? Math.round(openAnswered / interviewState.openQs.length * 100) : 0;
  var codePct = interviewState.codeTasks.length > 0 ? Math.round(codeAnswered / interviewState.codeTasks.length * 100) : 0;
  var overallPct = Math.round((testPct * 0.4 + openPct * 0.4 + codePct * 0.2));
  var ready = overallPct >= 70;

  var html = '<div class="test-results">';
  html += '<div class="test-results-score">';
  html += '<div style="font-size:48px;margin-bottom:8px">' + (ready ? '&#9989;' : '&#128170;') + '</div>';
  html += '<div class="verdict" style="color:' + (ready ? 'var(--green)' : 'var(--yellow)') + '">' + (ready ? 'Готов к собеседованию!' : 'Нужно подтянуть!') + '</div>';
  html += '</div>';

  html += '<div class="test-results-meta">';
  html += '<span>\u23F1 ' + Math.floor(elapsed/60) + ':' + (elapsed%60<10?'0':'') + elapsed%60 + '</span>';
  html += '</div>';

  html += '<div class="test-results-topics" style="margin-top:20px">';
  html += '<div class="test-results-topic"><span style="min-width:140px">&#128221; Тесты</span><div class="topic-bar"><div class="topic-bar-fill" style="width:' + testPct + '%"></div></div><span style="min-width:80px;text-align:right">' + testCorrect + '/' + interviewState.testQs.length + ' ' + testPct + '%</span></div>';
  html += '<div class="test-results-topic"><span style="min-width:140px">&#128172; Теория</span><div class="topic-bar"><div class="topic-bar-fill" style="width:' + openPct + '%"></div></div><span style="min-width:80px;text-align:right">' + openAnswered + '/' + interviewState.openQs.length + ' ' + openPct + '%</span></div>';
  html += '<div class="test-results-topic"><span style="min-width:140px">&#128187; Код</span><div class="topic-bar"><div class="topic-bar-fill" style="width:' + codePct + '%"></div></div><span style="min-width:80px;text-align:right">' + codeAnswered + '/' + interviewState.codeTasks.length + ' ' + codePct + '%</span></div>';
  html += '</div>';

  // Show test answers review
  html += '<h3 style="margin:20px 0 12px">Разбор тестов</h3>';
  interviewState.testQs.forEach(function(tq, i) {
    var ans = interviewState.testAnswers[i] || [];
    var isCorr = ans.length > 0 && ans.length === tq.correct.length;
    if (isCorr) { var s1=ans.slice().sort(),s2=tq.correct.slice().sort(); for(var j=0;j<s1.length;j++){if(s1[j]!==s2[j])isCorr=false;} }
    html += '<div class="interview-section" style="border-left:3px solid ' + (isCorr ? 'var(--green)' : 'var(--red)') + '">';
    html += '<p style="font-weight:500">' + (isCorr ? '\u2705' : '\u274C') + ' ' + tq.q + '</p>';
    if (!isCorr && tq.explanation) html += '<p style="color:var(--text2);font-size:13px;margin-top:8px">' + tq.explanation + '</p>';
    html += '</div>';
  });

  // Show reference answers for open questions
  html += '<h3 style="margin:20px 0 12px">Эталонные ответы</h3>';
  interviewState.openQs.forEach(function(oq, i) {
    html += '<div class="interview-section">';
    html += '<p style="font-weight:500">' + oq.item.q + '</p>';
    if (interviewState.openAnswers[i].trim()) {
      html += '<p style="color:var(--text2);font-size:13px;margin:8px 0"><b>Ваш ответ:</b> ' + interviewState.openAnswers[i].substring(0, 200) + (interviewState.openAnswers[i].length > 200 ? '...' : '') + '</p>';
    }
    html += '<details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent2);font-size:13px">Показать эталон</summary><div style="color:var(--text2);font-size:13px;margin-top:8px;line-height:1.6">' + formatAnswer(oq.item.a) + '</div></details>';
    html += '</div>';
  });

  // Recommendations based on weak topics from this interview
  if (!ready) {
    var weakTopicsInInterview = {};
    interviewState.testQs.forEach(function(tq, i) {
      var ans = interviewState.testAnswers[i] || [];
      var ok = ans.length > 0 && ans.length === tq.correct.length;
      if (ok) { var s1=ans.slice().sort(),s2=tq.correct.slice().sort(); for(var j=0;j<s1.length;j++){if(s1[j]!==s2[j])ok=false;} }
      if (!ok) weakTopicsInInterview[tq.topic] = (weakTopicsInInterview[tq.topic]||0) + 1;
    });
    var weakTopicIds = Object.keys(weakTopicsInInterview).sort(function(a,b){return weakTopicsInInterview[b]-weakTopicsInInterview[a];}).slice(0,3);
    if (weakTopicIds.length > 0) {
      html += '<h3 style="margin:20px 0 12px">\uD83D\uDCDA Что подтянуть</h3>';
      weakTopicIds.forEach(function(tid) {
        var tObj = TOPICS.find(function(t){return t.id===tid;});
        var resources = getTopicResources(tid).slice(0, 3);
        if (resources.length === 0) return;
        html += '<div class="resources-block open" style="margin-bottom:12px">';
        html += '<div class="resources-header"><span>' + (tObj ? tObj.icon + ' ' + tObj.name : tid) + '</span></div>';
        html += renderResourceList(resources, true);
        html += '</div>';
      });
    }
  }

  html += '<div class="test-results-actions" style="margin-top:20px">';
  html += '<button onclick="shareInterviewResult(' + overallPct + ',' + (interviewState.senior?1:0) + ')">&#128227; Поделиться</button>';
  html += '<button onclick="openInterviewSetup()">&#128260; Ещё раз</button>';
  html += '<button class="btn-primary" onclick="closeInterview()">&#127968; На главную</button>';
  html += '</div></div>';

  document.getElementById("interviewBody").innerHTML = html;
  document.getElementById("interviewBody").scrollTop = 0;
}

function closeInterview() {
  if (interviewState && interviewState.interval) clearInterval(interviewState.interval);
  interviewState = null;
  document.getElementById("interviewOverlay").classList.remove("active");
  renderSidebar();
  renderMain();
}

// ============================================================
// CODE SANDBOX
// ============================================================
var sandboxTask = null;

function openSandbox(taskQ, taskA) {
  sandboxTask = {q: taskQ, a: taskA || ''};
  document.getElementById("sandboxOverlay").classList.add("active");
  document.getElementById("sandboxTitle").textContent = "\uD83D\uDCBB " + taskQ.substring(0, 40) + (taskQ.length > 40 ? "..." : "");
  document.getElementById("sandboxEditor").value = "";
  document.getElementById("sandboxRef").style.display = "none";
  document.getElementById("sandboxRef").innerHTML = '<b>Эталонное решение:</b><div class="sandbox-ref-code">' + formatAnswer(taskA) + '</div>';

  // Tab key support
  var editor = document.getElementById("sandboxEditor");
  editor.onkeydown = function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      var start = this.selectionStart;
      this.value = this.value.substring(0, start) + "    " + this.value.substring(this.selectionEnd);
      this.selectionStart = this.selectionEnd = start + 4;
    }
  };
}

function closeSandbox() {
  document.getElementById("sandboxOverlay").classList.remove("active");
  sandboxTask = null;
}

function toggleSandboxRef() {
  var ref = document.getElementById("sandboxRef");
  ref.style.display = ref.style.display === "none" ? "block" : "none";
}

function clearSandbox() {
  if (confirm("Очистить код?")) document.getElementById("sandboxEditor").value = "";
}

// ============================================================
// SHARE
// ============================================================
function shareTestResult() {
  if (!testState) return;
  var pct = testState.cachedAnswered > 0 ? Math.round(testState.cachedCorrect / testState.cachedAnswered * 100) : 0;
  var text = "\uD83C\uDFAF Java Interview Prep\n";
  text += "Результат теста: " + testState.cachedCorrect + "/" + testState.cachedAnswered + " (" + pct + "%)\n";
  text += "\uD83D\uDD25 Лучший streak: " + testState.bestStreak + "\n";
  text += "\u23F1 Время: " + formatTime(testState.elapsed) + "\n";
  text += "java-prep.app";
  showShareModal(text);
}

function shareInterviewResult(pct, senior) {
  var text = "\uD83C\uDFA4 Java Interview Prep\n";
  text += "Симуляция собеседования (" + (senior ? "Senior" : "Middle") + ")\n";
  text += "Результат: " + pct + "%\n";
  text += (pct >= 70 ? "\u2705 Готов!" : "\uD83D\uDCAA В процессе подготовки") + "\n";
  text += "java-prep.app";
  showShareModal(text);
}

function showShareModal(text) {
  document.getElementById("shareText").value = text;
  document.getElementById("shareModal").classList.add("active");
}

function closeShareModal(e) {
  if (!e || e.target === document.getElementById("shareModal")) {
    document.getElementById("shareModal").classList.remove("active");
  }
}

function copyShare() {
  var el = document.getElementById("shareText");
  el.select();
  document.execCommand("copy");
  if (navigator.clipboard) navigator.clipboard.writeText(el.value);
  var btn = el.parentElement.querySelector(".test-start-btn");
  btn.textContent = "\u2705 Скопировано!";
  setTimeout(function(){ btn.textContent = "\uD83D\uDCCB Скопировать"; }, 2000);
}

// ============================================================
// THEME & MOBILE
// ============================================================
function toggleTheme() {
  const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.querySelector('.sidebar-overlay').classList.remove('open');
}

function resetProgress() {
  if (confirm('Сбросить весь прогресс?')) {
    state = {statuses:{},lastTopic:currentTopic};
    saveState();
    renderSidebar();
    renderMain();
  }
}

function exportProgress() {
  var payload = {
    statuses: state.statuses,
    customCards: customCards,
    bookmarks: bookmarksData,
    notes: notesData,
    srs: srsData,
    activity: activityData
  };
  var data = JSON.stringify(payload, null, 2);
  var blob = new Blob([data], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'java-prep-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importProgress() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var imported = JSON.parse(ev.target.result);
        if (!imported.statuses) throw new Error('bad format');
        var countNew = Object.keys(imported.statuses).length;
        var countOld = Object.keys(state.statuses).length;
        var customCount = imported.customCards ? Object.values(imported.customCards).reduce(function(s,a){return s+a.length;},0) : 0;
        if (confirm('Импортировать данные?\nСтатусов: ' + countNew + ' (сейчас: ' + countOld + ')\nКастомных карточек: ' + customCount + '\n\nВсё будет объединено с текущим прогрессом.')) {
          Object.keys(imported.statuses).forEach(function(k) { state.statuses[k] = imported.statuses[k]; });
          if (imported.customCards) {
            Object.keys(imported.customCards).forEach(function(tid) {
              if (!customCards[tid]) customCards[tid] = [];
              imported.customCards[tid].forEach(function(c) {
                if (!customCards[tid].find(function(x){return x.id===c.id;})) customCards[tid].push(c);
              });
            });
            saveCustomCards();
          }
          if (imported.bookmarks) { Object.assign(bookmarksData, imported.bookmarks); saveBookmarks(); }
          if (imported.notes) { Object.assign(notesData, imported.notes); saveNotes(); }
          if (imported.srs) { Object.assign(srsData, imported.srs); saveSRS(); }
          if (imported.activity && imported.activity.days) {
            Object.keys(imported.activity.days).forEach(function(k) { if (!activityData.days[k]) activityData.days[k] = imported.activity.days[k]; });
            saveActivity();
          }
          saveState();
          renderSidebar();
          renderMain();
          alert('Импорт завершён!');
        }
      } catch(err) {
        alert('Ошибка: неверный формат файла');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('cardEditorModal').classList.contains('active')) { closeCardEditor(); return; }
    if (document.getElementById('shareModal').classList.contains('active')) { closeShareModal(); return; }
    if (document.getElementById('sandboxOverlay').classList.contains('active')) { closeSandbox(); return; }
    if (document.getElementById('interviewOverlay').classList.contains('active')) { closeInterview(); return; }
    if (document.getElementById('srsOverlay').classList.contains('active')) { closeSRS(); return; }
  }
  // Test mode keys
  if (document.getElementById('testOverlay').classList.contains('active')) {
    if (e.key === 'Escape') closeTest();
    if (e.key === 'ArrowLeft') testPrev();
    if (e.key === 'ArrowRight') testNext();
    return;
  }
  // SRS: space to reveal, 1-2-3 to rate
  if (document.getElementById('srsOverlay').classList.contains('active')) {
    if (e.key === ' ') { e.preventDefault(); var rb = document.getElementById('srsRevealBtn'); if (rb && rb.style.display !== 'none') revealSRSAnswer(); }
    var sr = document.getElementById('srsRate');
    if (sr && sr.style.display === 'flex') {
      if (e.key === '1') rateSRS(1);
      if (e.key === '2') rateSRS(3);
      if (e.key === '3') rateSRS(5);
    }
    return;
  }
  if (e.key === 'Escape') closeQuiz();
  if (e.key === ' ' && document.getElementById('quiz').classList.contains('active')) {
    e.preventDefault();
    if (!document.getElementById('quizAnswer').classList.contains('visible')) revealQuizAnswer();
  }
  if (document.getElementById('quiz').classList.contains('active') && document.getElementById('quizAnswer').classList.contains('visible')) {
    if (e.key === '1') rateQuiz('hard');
    if (e.key === '2') rateQuiz('learning');
    if (e.key === '3') rateQuiz('known');
  }
});

// Init
const savedTheme = localStorage.getItem('theme');
if (savedTheme) document.body.setAttribute('data-theme', savedTheme);
renderSidebar();
renderMain();

// PWA: Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
