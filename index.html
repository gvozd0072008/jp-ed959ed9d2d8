    {q:'HashSet, LinkedHashSet, TreeSet',a:'<b>HashSet:</b> обёртка над HashMap (value = PRESENT). O(1), без порядка.\n<b>LinkedHashSet:</b> LinkedHashMap, порядок вставки. O(1).\n<b>TreeSet:</b> TreeMap, отсортированный. O(log n). NavigableSet.\n\n<b>EnumSet</b> — для enum, битовая маска, очень быстрый.\n<b>CopyOnWriteArraySet</b> — для маленьких read-heavy наборов.',lvl:2},
    {s:'Queue и Deque'},
    {q:'Queue и Deque',a:'<b>Queue (FIFO):</b> offer/poll/peek (без исключений), add/remove/element (с исключениями).\n<b>Deque:</b> двусторонняя — addFirst/Last, removeFirst/Last.\n\n• <b>ArrayDeque</b> — на массиве, быстрее LinkedList, без null\n• <b>PriorityQueue</b> — binary heap, по приоритету, без null\n\nFIFO → ArrayDeque. LIFO (стек) → ArrayDeque (Stack deprecated).\nPriority → PriorityQueue + Comparator.',lvl:2},
    {s:'Comparable и Comparator'},
    {q:'Comparable vs Comparator',a:'<b>Comparable&lt;T&gt;</b> — естественный порядок В САМОМ КЛАССЕ:\n<pre><code>public class Payment implements Comparable<Payment> {\n    private BigDecimal amount;\n\n    @Override\n    public int compareTo(Payment other) {\n        return this.amount.compareTo(other.amount);\n    }\n}\n\nCollections.sort(payments); // сортирует по amount</code></pre>\n\n<b>Comparator&lt;T&gt;</b> — ВНЕШНИЙ объект, любой порядок:\n<pre><code>// Простой\nComparator<Payment> byAmount = Comparator.comparing(Payment::getAmount);\n\n// Составной\nComparator<Payment> complex = Comparator\n    .comparing(Payment::getStatus)               // сначала по статусу\n    .thenComparing(Payment::getAmount).reversed() // потом по сумме desc\n    .thenComparing(Payment::getCreatedAt);        // потом по дате\n\npayments.sort(complex);\n\n// Null-safe\nComparator.comparing(Payment::getName,\n    Comparator.nullsLast(Comparator.naturalOrder()))</code></pre>\n\nВозвращают: отрицательное (<), 0 (=), положительное (>).\n\n<b>Когда что:</b>\n• Comparable — один очевидный порядок (String → алфавит, Integer → числовой)\n• Comparator — несколько вариантов сортировки, сторонние классы\n\n<b>На собесе:</b> как отсортировать список объектов по двум полям? (Comparator.comparing().thenComparing())',hot:1,lvl:2},
    {s:'Итераторы'},
    {q:'fail-fast vs fail-safe',a:'<b>fail-fast</b> (ArrayList, HashMap, HashSet):\n<pre><code>List<String> list = new ArrayList<>(List.of("a","b","c"));\nfor (String s : list) {\n    if (s.equals("b")) list.remove(s); // ConcurrentModificationException!\n}\n\n// Правильно:\nlist.removeIf(s -> s.equals("b")); // Java 8+ — лучший способ\n\n// Или через Iterator:\nvar it = list.iterator();\nwhile (it.hasNext()) {\n    if (it.next().equals("b")) it.remove(); // OK\n}</code></pre>\n\nМеханизм: внутренний счётчик <code>modCount</code>. При создании Iterator запоминает expectedModCount. При структурном изменении коллекции modCount++. Итератор сравнивает → CME.\n\n<b>fail-safe</b> (ConcurrentHashMap, CopyOnWriteArrayList):\n<pre><code>CopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>();\n// Итерация по snapshot — можно модифицировать параллельно\n// Но: дорого при частых записях (полная копия массива)\n\nConcurrentHashMap<String,Integer> map = new ConcurrentHashMap<>();\n// Weakly consistent iterator — видит изменения, но без гарантий\n// НЕ бросает CME</code></pre>\n\n<b>На собесе:</b> как безопасно удалить элемент из коллекции при итерации? (removeIf, iterator.remove, CopyOnWriteArrayList)',hot:1,lvl:2},
    {q:'Iterable, Iterator и for-each',a:'<b>Iterable&lt;T&gt;</b> — интерфейс с методом iterator(). Позволяет использовать for-each.\n<b>Iterator&lt;T&gt;</b> — hasNext(), next(), remove().\n\nfor-each — синтаксический сахар:\n<pre><code>for (String s : list) { ... }\n// компилируется в:\nIterator<String> it = list.iterator();\nwhile (it.hasNext()) { String s = it.next(); ... }</code></pre>',lvl:2},
    {q:'Immutable коллекции',a:'<b>Java 9+ фабрики (полностью immutable):</b>\n<pre><code>List<String> list = List.of("a", "b", "c");\nSet<Integer> set = Set.of(1, 2, 3);\nMap<String,Integer> map = Map.of("a", 1, "b", 2);\n\nlist.add("d");    // UnsupportedOperationException!\nlist.set(0, "x"); // UnsupportedOperationException!\n\n// Нельзя null:\nList.of(null); // NullPointerException!</code></pre>\n\n<b>Java 10+ копирование:</b>\n<pre><code>List<String> copy = List.copyOf(mutableList); // immutable копия\n// Если mutableList изменится — copy не затронут</code></pre>\n\n<b>Java 16+ Stream:</b>\n<pre><code>List<String> list = stream.toList(); // immutable!</code></pre>\n\n<b>Collections.unmodifiable — ОСТОРОЖНО:</b>\n<pre><code>List<String> original = new ArrayList<>(List.of("a","b"));\nList<String> view = Collections.unmodifiableList(original);\n\nview.add("c"); // UnsupportedOperationException — OK\noriginal.add("c"); // OK! view тоже изменился — это VIEW, не копия!</code></pre>\n\n<b>Сравнение:</b>\n<pre><code>List.of()                    — immutable, нет null, маленькие\nList.copyOf()                — immutable копия\nCollections.unmodifiableList  — view (не копия!), оригинал может меняться\nstream.toList()              — immutable (Java 16+)\nstream.collect(toList())     — mutable ArrayList</code></pre>\n\n<b>На собесе:</b> чем List.of() отличается от Collections.unmodifiableList()? (копия vs view, null handling)',lvl:2},
  
    {q:'SequencedCollection (Java 21)',a:'Новые интерфейсы с гарантированным порядком элементов:\n\n<pre><code>// SequencedCollection (List, LinkedHashSet, SortedSet)\nvar list = new ArrayList<>(List.of("a","b","c"));\n\nlist.addFirst("z");        // ["z","a","b","c"]\nlist.addLast("d");         // ["z","a","b","c","d"]\nlist.getFirst();           // "z" — вместо list.get(0)\nlist.getLast();            // "d" — вместо list.get(list.size()-1)\nlist.removeFirst();        // удалить первый\nlist.removeLast();         // удалить последний\n\nList<String> rev = list.reversed(); // view! не копия\n// rev: ["d","c","b","a"]</code></pre>\n\n<pre><code>// SequencedMap (LinkedHashMap, TreeMap, ConcurrentSkipListMap)\nvar map = new LinkedHashMap<String,Integer>();\nmap.put("a", 1); map.put("b", 2); map.put("c", 3);\n\nmap.firstEntry();    // a=1\nmap.lastEntry();     // c=3\nmap.pollFirstEntry(); // удалить и вернуть первую\nmap.reversed();      // обратный view\nmap.sequencedKeySet(); // SequencedSet ключей</code></pre>\n\n<b>Иерархия:</b>\n• List implements SequencedCollection\n• LinkedHashSet implements SequencedSet\n• SortedSet extends SequencedSet\n• LinkedHashMap implements SequencedMap\n• SortedMap extends SequencedMap\n\n<b>На собесе:</b> как до Java 21 получали последний элемент списка? (<code>list.get(list.size()-1)</code> — некрасиво)',hot:1,lvl:2},
    {q:'EnumSet и EnumMap',a:'<b>EnumSet:</b> Set для enum, реализован как bit vector.\nМаксимально быстрый: O(1) add/contains/remove.\n<code>EnumSet.of(Status.ACTIVE, Status.PENDING)</code>\n<code>EnumSet.allOf(Status.class)</code>\n\n<b>EnumMap:</b> Map с enum ключами, массив значений.\nБыстрее HashMap для enum ключей.\n\nВсегда используй вместо HashSet/HashMap для enum.',lvl:2},
]},

  { id:'streams', icon:'&#9854;', name:'Stream API', data: [
    {s:'Функциональные интерфейсы'},
    {q:'Основные функциональные интерфейсы',a:'@FunctionalInterface — ровно один абстрактный метод.\n\n<pre><code>// Основные (java.util.function):\nFunction<T,R>      apply(T) → R        // преобразование\nPredicate<T>       test(T)  → boolean  // фильтрация\nConsumer<T>        accept(T) → void    // побочный эффект\nSupplier<T>        get()    → T        // фабрика/lazy\nUnaryOperator<T>   apply(T) → T        // T → T\nBinaryOperator<T>  apply(T,T) → T      // (T,T) → T\nBiFunction<T,U,R>  apply(T,U) → R      // два аргумента</code></pre>\n\n<b>Примеры использования:</b>\n<pre><code>// Function — преобразование\nFunction<Payment, PaymentDTO> toDto = p -> new PaymentDTO(p.getId(), p.getAmount());\nList<PaymentDTO> dtos = payments.stream().map(toDto).toList();\n\n// Predicate — фильтрация, комбинирование\nPredicate<Payment> isActive = p -> p.getStatus() == ACTIVE;\nPredicate<Payment> isLarge = p -> p.getAmount().compareTo(new BigDecimal("10000")) > 0;\npayments.stream().filter(isActive.and(isLarge)).toList();\n\n// Consumer — побочный эффект\nConsumer<Payment> log = p -> logger.info("Payment: {}", p.getId());\nConsumer<Payment> notify = p -> notificationService.send(p);\npayments.forEach(log.andThen(notify)); // цепочка\n\n// Supplier — lazy инициализация\nSupplier<List<Payment>> lazyLoad = () -> repository.findAll();</code></pre>\n\n<b>Ссылки на методы:</b>\n<pre><code>String::toUpperCase     // instance method (arbitrary)\nSystem.out::println     // instance method (specific)\nInteger::parseInt       // static method\nPayment::new            // constructor</code></pre>\n\n<b>На собесе:</b> чем Function отличается от UnaryOperator? (UnaryOperator extends Function<T,T> — вход и выход одного типа)',hot:1,lvl:2},
    {q:'Лямбда-выражения',a:'<pre><code>// Синтаксис\n(parameters) -> expression\n(parameters) -> { statements; return result; }\n\n// Примеры\nRunnable r = () -> System.out.println("hello");\nComparator<String> c = (a, b) -> a.compareTo(b);\nFunction<String, Integer> len = s -> s.length();\nPredicate<Payment> isActive = p -> p.getStatus() == ACTIVE;</code></pre>\n\n<b>Захват переменных (closure):</b>\n<pre><code>String prefix = "Payment: "; // effectively final!\nFunction<Payment, String> fmt = p -> prefix + p.getId();\n\n// prefix = "other"; // ошибка компиляции! лямбда захватила\n</code></pre>\n\n<b>Лямбда vs anonymous class:</b>\n• Лямбда: invokedynamic + LambdaMetafactory (быстрее, нет .class файла)\n• Anonymous: создаёт настоящий класс (ClassName$1.class)\n• <code>this</code> в лямбде = this внешнего класса (в anonymous = сам anonymous)\n\n<b>Ограничение:</b> только для @FunctionalInterface (один абстрактный метод).\nДля 2+ методов — используй anonymous class.\n\n<b>На собесе:</b> может ли лямбда модифицировать локальную переменную? (нет — effectively final. Но может модифицировать поля объекта или коллекцию)',lvl:2},
    {q:'Ссылки на методы (Method References)',a:'4 типа ссылок — замена лямбд:\n\n<pre><code>// 1. Static method: ClassName::staticMethod\nFunction<String, Integer> parse = Integer::parseInt;\n// эквивалент: s -> Integer.parseInt(s)\n\n// 2. Instance method (конкретный объект): instance::method\nConsumer<String> printer = System.out::println;\n// эквивалент: s -> System.out.println(s)\n\nPaymentService service = new PaymentService();\nFunction<Long, Payment> find = service::findById;\n// эквивалент: id -> service.findById(id)\n\n// 3. Instance method (произвольный объект): ClassName::method\nFunction<String, String> upper = String::toUpperCase;\n// эквивалент: s -> s.toUpperCase()\n// Первый аргумент стримa становится \"this\"\n\nBiFunction<String, String, Boolean> eq = String::equals;\n// эквивалент: (a, b) -> a.equals(b)\n\n// 4. Constructor: ClassName::new\nSupplier<ArrayList<String>> factory = ArrayList::new;\n// эквивалент: () -> new ArrayList<>()\n\nFunction<String, Payment> create = Payment::new;\n// эквивалент: name -> new Payment(name)</code></pre>\n\n<b>В стримах:</b>\n<pre><code>payments.stream()\n    .map(Payment::getAmount)   // тип 3\n    .filter(Objects::nonNull)  // тип 1\n    .forEach(System.out::println); // тип 2</code></pre>\n\n<b>На собесе:</b> <code>String::length</code> — это какой тип? (тип 3 — instance method arbitrary object. <code>Function<String, Integer></code>)',lvl:2},
    {s:'Stream API'},
    {q:'Stream API — основы',a:'Конвейер операций над данными. НЕ хранит, НЕ модифицирует источник.\n\n<b>Создание:</b>\n<pre><code>// Из коллекции\nlist.stream();\nlist.parallelStream();\n\n// Из значений\nStream.of("a", "b", "c");\nStream.empty();\n\n// Из массива\nArrays.stream(new int[]{1, 2, 3});\n\n// Генерация\nStream.iterate(0, n -> n + 2); // 0, 2, 4, 6...\nStream.iterate(0, n -> n < 100, n -> n + 2); // с условием (Java 9)\nStream.generate(Math::random); // бесконечный\n\n// Примитивные\nIntStream.range(0, 10);     // 0..9\nIntStream.rangeClosed(1, 10); // 1..10</code></pre>\n\n<b>Ленивость — ключевое свойство:</b>\n<pre><code>List.of(1,2,3,4,5).stream()\n    .filter(n -> { System.out.println("filter: "+n); return n > 2; })\n    .map(n -> { System.out.println("map: "+n); return n * 10; })\n    .findFirst(); // обработает только 1,2,3 — НЕ все элементы!\n// Вывод: filter:1, filter:2, filter:3, map:3\n// 4 и 5 не обработаны! (short-circuiting)</code></pre>\n\n<b>Стрим одноразовый:</b>\n<pre><code>var stream = list.stream();\nstream.count();\nstream.forEach(...); // IllegalStateException: stream already closed!</code></pre>\n\n<b>На собесе:</b> что значит \"ленивый\"? Сколько элементов обработает filter+findFirst на списке из миллиона?',hot:1,lvl:2},
    {q:'Промежуточные операции',a:'Ленивые — выполняются только при вызове терминальной операции.\n\n<pre><code>// filter — фильтрация по условию\npayments.stream()\n    .filter(p -> p.getStatus() == ACTIVE)\n    .filter(p -> p.getAmount().compareTo(BigDecimal.ZERO) > 0)\n\n// map — преобразование каждого элемента\npayments.stream()\n    .map(Payment::getAmount)      // Stream<BigDecimal>\n    .map(a -> a.multiply(rate))   // конвертация валюты\n\n// flatMap — развернуть вложенные коллекции\norders.stream()\n    .flatMap(o -> o.getItems().stream())  // Stream<Item>\n\n// distinct — уникальные (по equals/hashCode)\nids.stream().distinct()\n\n// sorted — сортировка\npayments.stream()\n    .sorted(comparing(Payment::getCreatedAt).reversed()) // по дате desc\n\n// peek — подглядывание (для дебага, НЕ для мутации!)\npayments.stream()\n    .peek(p -> log.debug("processing: {}", p.getId()))\n    .map(this::process)\n\n// limit, skip — пагинация\npayments.stream().skip(20).limit(10)  // страница 3, размер 10\n\n// takeWhile, dropWhile (Java 9)\nIntStream.of(1,2,3,4,5,1,2)\n    .takeWhile(n -> n < 4)  // 1, 2, 3 — останавливается на первом false\n\n// mapToInt/Long/Double — примитивные стримы (без boxing)\npayments.stream()\n    .mapToLong(Payment::getId)  // LongStream\n    .sum()                       // long, не Long</code></pre>\n\n<b>На собесе:</b> чем peek отличается от map? (peek возвращает тот же элемент, map — преобразованный. peek для side effects, map для трансформации)',lvl:2},
    {q:'Терминальные операции',a:'Запускают конвейер и возвращают результат.\n\n<pre><code>// collect — основная операция сбора\nList<Payment> list = stream.collect(Collectors.toList());\nList<Payment> list = stream.toList(); // Java 16+ (immutable!)\n\n// forEach — побочный эффект (порядок не гарантирован в parallel!)\npayments.stream().forEach(p -> process(p));\npayments.stream().forEachOrdered(p -> process(p)); // с порядком\n\n// reduce — свёртка\nBigDecimal total = payments.stream()\n    .map(Payment::getAmount)\n    .reduce(BigDecimal.ZERO, BigDecimal::add);\n\n// count\nlong active = payments.stream().filter(p -> p.isActive()).count();\n\n// min / max\nOptional<Payment> cheapest = payments.stream()\n    .min(comparing(Payment::getAmount));\n\n// findFirst / findAny\nOptional<Payment> first = payments.stream()\n    .filter(p -> p.getStatus() == FAILED)\n    .findFirst();  // первый failed\n// findAny — любой (быстрее в parallel)\n\n// anyMatch / allMatch / noneMatch (short-circuiting)\nboolean hasFailed = payments.stream().anyMatch(p -> p.getStatus() == FAILED);\nboolean allActive = payments.stream().allMatch(Payment::isActive);\nboolean noErrors = payments.stream().noneMatch(Payment::hasError);\n\n// toArray\nPayment[] arr = payments.stream().toArray(Payment[]::new);</code></pre>\n\n<b>Важно:</b>\n• Стрим можно использовать ОДИН раз\n• Терминальная операция \"закрывает\" стрим\n• Без терминальной — промежуточные НЕ выполнятся (ленивость!)\n\n<b>На собесе:</b> чем findFirst отличается от findAny? (findFirst гарантирует порядок, findAny — нет, но быстрее в parallel)',hot:1,lvl:2},
    {q:'Collectors — подробно',a:'<pre><code>// Базовые\n.collect(Collectors.toList())           // mutable ArrayList\n.collect(Collectors.toUnmodifiableList()) // immutable\n.toList()                               // immutable (Java 16+)\n.collect(Collectors.toSet())\n\n// toMap (осторожно с дубликатами!)\n.collect(Collectors.toMap(\n    Payment::getId,       // key\n    Payment::getAmount,   // value\n    BigDecimal::add       // merge при дубликате ключа!\n))\n\n// groupingBy — GROUP BY из SQL\nMap<Status, List<Payment>> byStatus = payments.stream()\n    .collect(groupingBy(Payment::getStatus));\n\n// groupingBy + downstream collector\nMap<Status, Long> countByStatus = payments.stream()\n    .collect(groupingBy(Payment::getStatus, counting()));\n\nMap<Status, BigDecimal> sumByStatus = payments.stream()\n    .collect(groupingBy(\n        Payment::getStatus,\n        reducing(BigDecimal.ZERO, Payment::getAmount, BigDecimal::add)\n    ));\n\n// Вложенная группировка\nMap<Status, Map<Currency, List<Payment>>> nested = payments.stream()\n    .collect(groupingBy(Payment::getStatus,\n        groupingBy(Payment::getCurrency)));\n\n// partitioningBy — разделение на true/false\nMap<Boolean, List<Payment>> split = payments.stream()\n    .collect(partitioningBy(p -> p.getAmount().compareTo(BigDecimal.valueOf(1000)) > 0));\n\n// joining\nString ids = payments.stream()\n    .map(p -> p.getId().toString())\n    .collect(joining(", ", "[", "]")); // [1, 2, 3]\n\n// teeing (Java 12) — два коллектора параллельно\nvar stats = payments.stream().collect(\n    Collectors.teeing(\n        counting(),\n        summingDouble(p -> p.getAmount().doubleValue()),\n        (count, sum) -> new Stats(count, sum)\n    ));\n\n// collectingAndThen\nList<Payment> unmodifiable = payments.stream()\n    .collect(collectingAndThen(toList(), Collections::unmodifiableList));</code></pre>\n\n<b>На собесе:</b> как сгруппировать платежи по статусу и посчитать сумму в каждой группе? (groupingBy + reducing)',hot:1,lvl:2},
    {q:'map() vs flatMap()',a:'<b>map()</b> — 1:1, преобразует каждый элемент:\n<pre><code>// Payment → String (id)\npayments.stream()\n    .map(Payment::getId)     // Stream<Long>\n    .map(String::valueOf)    // Stream<String>\n    .toList();               // List<String></code></pre>\n\n<b>flatMap()</b> — 1:N, разворачивает вложенные коллекции:\n<pre><code>// Проблема: List<Order>, каждый Order имеет List<Item>\nList<Order> orders = getOrders();\n\n// map даст Stream<List<Item>> — вложенный!\norders.stream().map(Order::getItems); // Stream<List<Item>> ✗\n\n// flatMap разворачивает:\norders.stream()\n    .flatMap(order -> order.getItems().stream()) // Stream<Item> ✓\n    .filter(item -> item.getPrice() > 100)\n    .toList();\n\n// Ещё пример: разбить строки на слова\nList<String> lines = List.of("hello world", "foo bar baz");\nlines.stream()\n    .flatMap(line -> Arrays.stream(line.split(" ")))\n    .toList(); // ["hello","world","foo","bar","baz"]\n\n// Optional + flatMap:\nOptional<Payment> payment = findPayment(id);\nOptional<String> merchantName = payment\n    .flatMap(p -> findMerchant(p.getMerchantId())) // Optional<Merchant>\n    .map(Merchant::getName); // Optional<String></code></pre>\n\n<b>Правило:</b> если map() даёт Stream<Stream<T>> или Stream<Collection<T>> — нужен flatMap().\n\n<b>На собесе:</b> есть List<List<Integer>>, как получить плоский список всех чисел? (<code>flatMap(Collection::stream)</code>)',lvl:2},
    {q:'reduce() — как работает',a:'Свёртка: комбинирует все элементы в одно значение.\n\n<b>3 формы:</b>\n<pre><code>// 1. С identity (начальным значением) — всегда возвращает T\nint sum = numbers.stream().reduce(0, Integer::sum);\nBigDecimal total = payments.stream()\n    .map(Payment::getAmount)\n    .reduce(BigDecimal.ZERO, BigDecimal::add);\n\n// 2. Без identity — возвращает Optional (может быть пусто)\nOptional<Integer> max = numbers.stream().reduce(Integer::max);\n\n// 3. С combiner (для parallel streams)\nint sum = numbers.parallelStream()\n    .reduce(0,           // identity\n        Integer::sum,    // accumulator\n        Integer::sum);   // combiner (объединяет результаты потоков)</code></pre>\n\n<b>Как работает reduce(0, Integer::sum) на [1, 2, 3, 4]:</b>\n<pre><code>acc = 0          // identity\nacc = 0 + 1 = 1\nacc = 1 + 2 = 3\nacc = 3 + 3 = 6\nacc = 6 + 4 = 10 // результат</code></pre>\n\n<b>Когда reduce, когда collect:</b>\n• reduce — для immutable результата (число, строка)\n• collect — для mutable контейнера (List, Map, StringBuilder)\n\n<b>На собесе:</b> найти самый дорогой платёж через reduce:\n<code>payments.stream().reduce((a, b) -> a.getAmount().compareTo(b.getAmount()) > 0 ? a : b)</code>\nНо лучше: <code>payments.stream().max(comparing(Payment::getAmount))</code>',lvl:2},
    {q:'Parallel streams',a:'<code>list.parallelStream()</code> или <code>stream.parallel()</code>\n\nИспользует ForkJoinPool.commonPool() (cores - 1 потоков).\n\n<b>Когда ПОЛЕЗНО:</b>\n• Большие коллекции (>100k элементов)\n• CPU-bound операции (вычисления, не I/O)\n• Независимые элементы (нет shared state)\n\n<b>Когда ВРЕДНО:</b>\n• Маленькие коллекции — overhead больше выигрыша\n• I/O операции — блокирует commonPool, тормозит всё приложение!\n• Порядок важен — forEachOrdered медленнее\n• Shared mutable state — race condition\n• LinkedList — плохо делится на части\n\n<b>Пример проблемы:</b>\n<pre><code>// ОПАСНО: shared state\nList<Integer> result = new ArrayList<>(); // НЕ потокобезопасный!\nnumbers.parallelStream().forEach(result::add); // race condition!\n\n// Правильно:\nList<Integer> result = numbers.parallelStream().collect(toList());</code></pre>\n\n<b>Свой пул (для I/O-задач):</b>\n<pre><code>ForkJoinPool customPool = new ForkJoinPool(16);\nList<Payment> result = customPool.submit(() ->\n    ids.parallelStream()\n        .map(this::fetchPayment)  // I/O\n        .toList()\n).get();</code></pre>\n\n<b>На собесе:</b> почему parallel stream может быть МЕДЛЕННЕЕ обычного? (overhead на разделение, объединение, переключение контекста)',lvl:2},
    {q:'Optional — правильное использование',a:'Контейнер: значение есть или нет. Замена null.\n\n<b>Создание:</b>\n<pre><code>Optional.of(value)         // NPE если value == null!\nOptional.ofNullable(value) // empty() если null\nOptional.empty()           // пустой</code></pre>\n\n<b>Правильное использование (цепочка вместо if-null):</b>\n<pre><code>// БЫЛО (null-проверки):\nPayment payment = repository.findById(id);\nif (payment != null) {\n    Merchant merchant = merchantService.find(payment.getMerchantId());\n    if (merchant != null) {\n        return merchant.getName();\n    }\n}\nreturn "Unknown";\n\n// СТАЛО (Optional):\nreturn repository.findById(id)         // Optional<Payment>\n    .map(Payment::getMerchantId)        // Optional<Long>\n    .flatMap(merchantService::find)     // Optional<Merchant>\n    .map(Merchant::getName)             // Optional<String>\n    .orElse("Unknown");                 // String</code></pre>\n\n<b>API:</b>\n<pre><code>.orElse("default")              // значение по умолчанию (вычисляется всегда!)\n.orElseGet(() -> compute())     // lazy — вычисляется только если empty\n.orElseThrow()                  // NoSuchElementException\n.orElseThrow(() -> new PaymentNotFoundException(id))\n.ifPresent(p -> process(p))     // если есть — выполнить\n.ifPresentOrElse(p -> ok(p), () -> notFound()) // Java 9\n.or(() -> findInCache(id))      // Java 9: альтернативный Optional\n.stream()                       // Java 9: Optional → Stream (0 или 1)</code></pre>\n\n<b>Антипаттерны:</b>\n<pre><code>// НЕ ДЕЛАЙ:\noptional.get()                  // NPE если empty! используй orElse/orElseThrow\noptional.isPresent() ? optional.get() : null // бессмысленно\nOptional<List<Payment>> list    // не оборачивай коллекции — верни пустой список\npublic void process(Optional<Payment> p) // не для параметров!</code></pre>\n\n<b>Где использовать:</b> return type методов, чтобы сказать \"может не быть\".\n\n<b>На собесе:</b> чем orElse отличается от orElseGet? (orElse вычисляет default ВСЕГДА, orElseGet — только если empty. Важно при дорогих операциях!)',lvl:2},
    {q:'Пример: группировка и агрегация',a:'<b>Типичные задачи на собеседовании:</b>\n\n<pre><code>List<Payment> payments = getPayments();\n\n// 1. Группировка по статусу\nMap<Status, List<Payment>> byStatus = payments.stream()\n    .collect(groupingBy(Payment::getStatus));\n\n// 2. Количество по статусу\nMap<Status, Long> countByStatus = payments.stream()\n    .collect(groupingBy(Payment::getStatus, counting()));\n\n// 3. Сумма по статусу\nMap<Status, BigDecimal> sumByStatus = payments.stream()\n    .collect(groupingBy(Payment::getStatus,\n        reducing(BigDecimal.ZERO, Payment::getAmount, BigDecimal::add)));\n\n// 4. Средняя сумма по валюте\nMap<Currency, Double> avgByCurrency = payments.stream()\n    .collect(groupingBy(Payment::getCurrency,\n        averagingDouble(p -> p.getAmount().doubleValue())));\n\n// 5. Топ-3 самых дорогих\nList<Payment> top3 = payments.stream()\n    .sorted(comparing(Payment::getAmount).reversed())\n    .limit(3)\n    .toList();\n\n// 6. Самый дорогой платёж по каждому мерчанту\nMap<Long, Optional<Payment>> maxByMerchant = payments.stream()\n    .collect(groupingBy(Payment::getMerchantId,\n        maxBy(comparing(Payment::getAmount))));\n\n// 7. Строка из ID через запятую\nString ids = payments.stream()\n    .map(p -> p.getId().toString())\n    .collect(joining(", ")); // "1, 2, 3"\n\n// 8. Есть ли хоть один неудачный?\nboolean hasFailed = payments.stream()\n    .anyMatch(p -> p.getStatus() == FAILED);\n\n// 9. Все суммы > 0?\nboolean allPositive = payments.stream()\n    .allMatch(p -> p.getAmount().compareTo(BigDecimal.ZERO) > 0);\n\n// 10. Разделить на большие и маленькие\nMap<Boolean, List<Payment>> split = payments.stream()\n    .collect(partitioningBy(\n        p -> p.getAmount().compareTo(BigDecimal.valueOf(10000)) > 0));\nList<Payment> big = split.get(true);\nList<Payment> small = split.get(false);</code></pre>\n\n<b>На собесе:</b> эти задачи дают очень часто. Потренируйся писать их без IDE за 1-2 минуты.',hot:1,lvl:2},
  ]},

  { id:'threads', icon:'&#9881;', name:'Multithreading', data: [
    {s:'Основы'},
    {q:'Процесс vs поток',a:'<b>Процесс:</b> отдельное адресное пространство, изолирован. Тяжёлый в создании.\n<b>Поток:</b> разделяет heap процесса, свой стек. Легче создать.\n\n<pre><code>Процесс A              Процесс B\n┌─────────────┐        ┌─────────────┐\n│ Heap  (свой)│        │ Heap  (свой)│\n│ Thread 1    │        │ Thread 1    │\n│   └ Stack   │        │   └ Stack   │\n│ Thread 2    │        │             │\n│   └ Stack   │        │             │\n└─────────────┘        └─────────────┘\n  Изолированы — общение через IPC/сеть</code></pre>\n\n<b>В Java:</b>\n• Каждый поток — свой стек (call stack), но общий heap\n• main() — первый поток приложения\n\n<b>Виды потоков:</b>\n• <b>Platform threads</b>: 1 Java поток = 1 OS поток (~1MB стека). Тяжёлые.\n• <b>Virtual threads</b> (Java 21): управляются JVM, ~1KB. Миллионы.\n\n<b>На собесе:</b> чем поток отличается от процесса? Что общее у потоков одного процесса? (heap, открытые файлы, сетевые соединения)',lvl:1},
    {q:'Создание потока: Thread vs Runnable vs Callable',a:'<pre><code>// 1. extends Thread (НЕ рекомендуется — нет множественного наследования)\nclass MyThread extends Thread {\n    public void run() { System.out.println("работаю"); }\n}\nnew MyThread().start(); // start() — не run()!\n\n// 2. Runnable (рекомендуется) — void, без исключений\nnew Thread(() -> processPayment(id)).start();\n\n// Через ExecutorService:\nexecutor.execute(() -> processPayment(id));\n\n// 3. Callable<V> — возвращает результат, бросает Exception\nCallable<Payment> task = () -> {\n    return paymentService.process(id); // может бросить исключение\n};\nFuture<Payment> future = executor.submit(task);\nPayment result = future.get(); // блокирует до завершения\nPayment result = future.get(5, TimeUnit.SECONDS); // с таймаутом</code></pre>\n\n<b>Runnable vs Callable:</b>\n<pre><code>Runnable:  void run()              — нет результата, нет checked exceptions\nCallable:  V call() throws Exception — есть результат, есть исключения</code></pre>\n\n<b>Почему Runnable лучше Thread:</b>\n• Можно реализовать + наследовать другой класс\n• Отделяет задачу от механизма выполнения\n• Можно передать в ExecutorService\n\n<b>На собесе:</b> что будет если вызвать run() вместо start()? (выполнится в текущем потоке, новый НЕ создастся)',lvl:2},
    {q:'Состояния потока',a:'<b>Enum <code>Thread.State</code></b> — 6 состояний:\n\n<pre><code>NEW → start() → RUNNABLE\nRUNNABLE ↔ BLOCKED (ждёт монитор)\nRUNNABLE ↔ WAITING (wait/join/park без таймаута)\nRUNNABLE ↔ TIMED_WAITING (sleep/wait(ms)/join(ms))\n(любое) → TERMINATED</code></pre>\n\n<b>1. NEW</b> — поток создан, но <code>start()</code> ещё не вызван.\n<pre><code>Thread t = new Thread(() -> ...);\n// t.getState() == NEW</code></pre>\n\n<b>2. RUNNABLE</b> — поток готов выполняться или уже выполняется на CPU. В Java нет разделения Ready/Running — ОС сама управляет.\n\n<b>3. BLOCKED</b> — ждёт получения монитора (входа в <code>synchronized</code>-блок), занятого другим потоком.\n<pre><code>synchronized (lock) { /* thread2 ждёт здесь */ }</code></pre>\n\n<b>4. WAITING</b> — ждёт неопределённо долго, пока другой поток не даст сигнал:\n• <code>Object.wait()</code> — ждёт <code>notify()</code>/<code>notifyAll()</code>\n• <code>Thread.join()</code> — ждёт завершения другого потока\n• <code>LockSupport.park()</code> — ждёт <code>unpark()</code>\n\n<b>5. TIMED_WAITING</b> — ждёт с таймаутом:\n• <code>Thread.sleep(ms)</code>\n• <code>Object.wait(ms)</code>\n• <code>Thread.join(ms)</code>\n• <code>LockSupport.parkNanos()</code>\n• блокирующие методы <code>BlockingQueue.poll(timeout)</code>, <code>Lock.tryLock(timeout)</code>\n\n<b>6. TERMINATED</b> — поток завершён (выполнение <code>run()</code> закончилось нормально или исключением). Нельзя перезапустить — нужно создавать новый Thread.\n\n<b>BLOCKED vs WAITING — частая путаница:</b>\n• <b>BLOCKED</b> — ждёт МОНИТОР на входе в synchronized (implicit lock)\n• <b>WAITING</b> — внутри synchronized вызван <code>wait()</code>, отдал монитор и ждёт notify()\n\n<b>Проверка на практике:</b>\n<pre><code>Thread t = new Thread(() -> {\n    try { Thread.sleep(5000); } catch (InterruptedException e) {}\n});\nt.start();\nThread.sleep(100);\nSystem.out.println(t.getState()); // TIMED_WAITING</code></pre>\n\n<b>Диагностика:</b> <code>jstack &lt;pid&gt;</code> показывает состояния всех потоков. BLOCKED на входе в synchronized часто указывает на contention или deadlock.',lvl:1},
    {q:'wait() vs sleep()',a:'Оба метода приостанавливают поток, но работают фундаментально по-разному.\n\n<b><code>Object.wait()</code></b>\n• Метод класса <b>Object</b>\n• Вызывается на объекте: <code>obj.wait()</code>\n• ТРЕБУЕТ держать монитор объекта — только внутри <code>synchronized(obj)</code>\n• <b>ОСВОБОЖДАЕТ монитор</b> и ждёт\n• Просыпается при <code>obj.notify()</code> / <code>obj.notifyAll()</code> или по timeout\n• После пробуждения — снова захватывает монитор\n• Если вызывать без держания монитора — <code>IllegalMonitorStateException</code>\n\n<pre><code>synchronized (lock) {\n    while (!condition) {\n        lock.wait(); // освобождает lock, ждёт\n    }\n    // монитор lock снова наш\n    doWork();\n}\n\n// Другой поток:\nsynchronized (lock) {\n    condition = true;\n    lock.notifyAll(); // будит всех waiting\n}</code></pre>\n\n<b><code>Thread.sleep()</code></b>\n• Static метод класса <b>Thread</b>\n• Вызывается без объекта: <code>Thread.sleep(1000)</code>\n• <b>НЕ требует</b> synchronized\n• <b>НЕ освобождает</b> никаких мониторов — если держал lock, продолжает держать во сне!\n• Просыпается строго по таймеру\n• Может быть прерван через <code>interrupt()</code>\n\n<pre><code>synchronized (lock) {\n    Thread.sleep(1000); // lock ПРОДОЛЖАЕТ быть захваченным!\n    // другие потоки ждут освобождения lock всё это время\n}\n// На практике — почти всегда плохо</code></pre>\n\n<b>Сравнительная таблица:</b>\n<pre><code>Критерий                  | wait()           | sleep()\n──────────────────────────┼──────────────────┼─────────────────\nКласс                     | Object           | Thread\nМетод экземпляра/static   | экземпляра       | static\nВызов на                  | объекте-мониторе | не на объекте\nТребует synchronized      | ДА               | нет\nОсвобождает монитор       | ДА               | НЕТ\nКто будит                 | notify/notifyAll | таймер / interrupt\nМожет прерваться          | да (InterruptedE)| да (InterruptedE)\nИспользование             | межпоточная     | пауза в работе\n                          | координация      |</code></pre>\n\n<b>Зачем wait() вообще нужен:</b>\nКлассический паттерн producer-consumer:\n<pre><code>class BoundedBuffer&lt;T&gt; {\n    private final Object lock = new Object();\n    private final Queue&lt;T&gt; queue = new LinkedList&lt;&gt;();\n    private final int capacity;\n\n    public void put(T item) throws InterruptedException {\n        synchronized (lock) {\n            while (queue.size() == capacity) {\n                lock.wait(); // ждём пока consumer что-то достанет\n            }\n            queue.offer(item);\n            lock.notifyAll(); // будим consumers\n        }\n    }\n\n    public T take() throws InterruptedException {\n        synchronized (lock) {\n            while (queue.isEmpty()) {\n                lock.wait(); // ждём пока producer что-то положит\n            }\n            T item = queue.poll();\n            lock.notifyAll(); // будим producers\n            return item;\n        }\n    }\n}</code></pre>\n\n<b>Почему <code>while</code>, а не <code>if</code>?</b>\n<b>Spurious wakeup</b> — поток может проснуться без notify (редко, но возможно на уровне ОС). Поэтому условие надо перепроверять в цикле.\n\n<b>Современные альтернативы wait/notify:</b>\n• <code>ReentrantLock</code> + <code>Condition</code> — более гибкий API\n• <code>BlockingQueue</code> — готовый producer-consumer без ручного wait/notify\n• <code>CountDownLatch</code>, <code>CyclicBarrier</code>, <code>Semaphore</code> — для специфичных задач\n• <code>CompletableFuture</code> — для асинхронной работы\n\n<pre><code>// Современный эквивалент:\nBlockingQueue&lt;T&gt; queue = new ArrayBlockingQueue&lt;&gt;(capacity);\nqueue.put(item);    // блокирует если полна\nT item = queue.take(); // блокирует если пуста\n// Никакого synchronized / wait / notify!</code></pre>\n\n<b>notify() vs notifyAll():</b>\n• <code>notify()</code> — будит ОДИН произвольный ожидающий поток\n• <code>notifyAll()</code> — будит ВСЕ ожидающие потоки (они снова борются за монитор)\n• Рекомендация: почти всегда <code>notifyAll()</code> для безопасности (если не уверен — может случиться missed signal)\n\n<b>Важные нюансы sleep:</b>\n• Не использовать в production-коде как «подожди пока что-то произойдёт» — это race condition\n• Для задержки — OK (rate limiting, retry backoff)\n• Не гарантирует точное время сна (минимум, но может быть больше)\n\n<b>Thread.sleep(0) vs Thread.yield():</b>\n• <code>sleep(0)</code> — передаёт управление планировщику, но остаётся RUNNABLE\n• <code>yield()</code> — подсказка планировщику «дай другим потокам поработать» (может игнорироваться)\n\n<b>На собесе:</b>\n• Освобождает ли wait() монитор? (да)\n• Освобождает ли sleep() монитор? (нет!)\n• Можно ли вызвать wait() без synchronized? (IllegalMonitorStateException)\n• Зачем while вместо if при wait()? (spurious wakeups)\n• Чем заменить wait/notify в современном коде? (ReentrantLock+Condition, BlockingQueue)',lvl:2},
    {q:'join() и interrupt()',a:'<b>join():</b> текущий поток ждёт завершения другого.\n<code>thread.join()</code> — ждёт бесконечно\n<code>thread.join(1000)</code> — ждёт до 1 секунды\n\n<b>interrupt():</b> запрашивает прерывание (не убивает!).\n• Если поток в wait/sleep/join → InterruptedException\n• Если работает → isInterrupted() == true, проверять вручную\n\n<b>stop()</b> — deprecated, опасен (не освобождает ресурсы).',lvl:1},
    {q:'Потоки-демоны',a:'<b>Daemon thread</b> — фоновый поток, «обслуживающий» main-потоки. JVM завершается, когда остаются ТОЛЬКО daemon-потоки.\n\n<b>Два типа потоков в JVM:</b>\n• <b>User (non-daemon)</b> — обычные. JVM ждёт их завершения при выходе\n• <b>Daemon</b> — фоновые. При выходе всех user-потоков JVM убивает daemon без церемоний\n\n<b>main() — это user thread.</b> Пока он (или дочерние user-потоки) жив — JVM работает.\n\n<b>Пример:</b>\n<pre><code>public static void main(String[] args) throws InterruptedException {\n    Thread daemon = new Thread(() -&gt; {\n        while (true) {\n            System.out.println("I\\\'m daemon");\n            try { Thread.sleep(500); } catch (Exception e) { }\n        }\n    });\n    daemon.setDaemon(true); // ВАЖНО: до start()!\n    daemon.start();\n\n    Thread.sleep(2000);\n    // main выходит — JVM убивает daemon, программа завершается\n}</code></pre>\n\n<b>Если забыть <code>setDaemon(true)</code>:</b> поток продолжит работать бесконечно, и JVM не завершится → программа «висит».\n\n<b>Правила:</b>\n• <code>setDaemon()</code> можно вызвать только ДО <code>start()</code>. После — <code>IllegalThreadStateException</code>\n• По умолчанию thread наследует daemon-статус от создавшего потока\n• У main() daemon = false, поэтому все потоки, созданные в main — по умолчанию user\n\n<b>Встроенные daemon-потоки JVM:</b>\n• <b>Garbage Collector</b> — сборка мусора\n• <b>Finalizer</b> — вызов finalize() (устарело)\n• <b>Reference Handler</b> — обработка WeakReference, PhantomReference\n• <b>JIT compiler</b> — компиляция в нативный код\n• <b>Signal dispatcher</b> — обработка сигналов ОС\n\n<pre><code>// Посмотреть все потоки:\nThread.getAllStackTraces().keySet().forEach(t -&gt;\n    System.out.println(t.getName() + " daemon=" + t.isDaemon()));</code></pre>\n\n<b>Когда использовать:</b>\n• Мониторинг, heartbeat, логирование\n• Таймеры, scheduled tasks (не критичные)\n• Фоновая обработка кеша\n• Cleanup-задачи, которые не страшно прервать\n\n<b>Когда НЕ использовать:</b>\n• Работа с I/O (запись в БД, файлы) — могут прерваться в середине\n• Критичные задачи, которые должны завершиться\n• Транзакции, финансовые операции\n\n<b>Опасность daemon:</b>\n<pre><code>Thread daemon = new Thread(() -&gt; {\n    // Записываем важные данные в БД\n    dbService.save(importantData);\n});\ndaemon.setDaemon(true);\ndaemon.start();\n// Если main завершится до save() — JVM убьёт поток В СЕРЕДИНЕ операции!\n// finally-блоки не будут выполнены!</code></pre>\n\n<b>Thread pools и daemon:</b>\n<pre><code>// По умолчанию ExecutorService создаёт user-потоки\nExecutorService pool = Executors.newFixedThreadPool(4);\n// Если не вызвать pool.shutdown() — программа не завершится!\n\n// Решение: daemon-фабрика\nExecutorService pool = Executors.newFixedThreadPool(4, r -&gt; {\n    Thread t = new Thread(r);\n    t.setDaemon(true);\n    return t;\n});\n// Теперь JVM не будет ждать этих потоков</code></pre>\n\n<b>Graceful alternative to daemon:</b>\n<pre><code>// Правильнее: сделать обычный user-поток и корректно остановить\nvolatile boolean running = true;\nThread worker = new Thread(() -&gt; {\n    while (running) {\n        // работа\n    }\n    cleanup(); // корректное завершение\n});\nworker.start();\n\n// При shutdown:\nrunning = false;\nworker.join(); // ждём завершения</code></pre>\n\n<b>Виртуальные потоки (Java 21+):</b>\n<pre><code>Thread.ofVirtual().start(() -&gt; {...});\n// Виртуальные потоки по умолчанию — daemon\n// Их не надо останавливать явно</code></pre>\n\n<b>На собесе:</b>\n• Чем daemon отличается от обычного? (JVM не ждёт завершения daemon)\n• Когда JVM завершается? (когда остались только daemon-потоки)\n• Опасность daemon для I/O? (может убиться в середине операции)\n• Как сделать daemon-пул? (своя ThreadFactory)',lvl:2},
    {q:'synchronized, volatile, happens-before',a:'<b>synchronized:</b> mutual exclusion + видимость.\n<pre><code>// На методе — монитор = this\npublic synchronized void process() { ... }\n\n// На статическом методе — монитор = Class объект\npublic static synchronized void process() { ... }\n\n// На блоке — указываем монитор\nsynchronized (lockObject) {\n    balance = balance - amount;\n}</code></pre>\n\n<b>volatile:</b> каждое чтение из main memory, каждая запись в main memory.\n<pre><code>// Правильное использование — флаг остановки:\nprivate volatile boolean running = true;\n\nvoid stop() { running = false; }\nvoid run() {\n    while (running) { // всегда видит актуальное значение\n        doWork();\n    }\n}</code></pre>\n\n<b>volatile НЕ атомарен:</b>\n<pre><code>volatile int count = 0;\ncount++; // НЕ атомарно! Read → Increment → Write — 3 операции\n// Используй AtomicInteger.incrementAndGet()</code></pre>\n\n<b>Double-Checked Locking (Singleton):</b>\n<pre><code>class Singleton {\n    private static volatile Singleton instance; // volatile обязателен!\n    \n    static Singleton getInstance() {\n        if (instance == null) {                 // 1-я проверка (без lock)\n            synchronized (Singleton.class) {\n                if (instance == null) {         // 2-я проверка (с lock)\n                    instance = new Singleton(); // без volatile может быть partially constructed!\n                }\n            }\n        }\n        return instance;\n    }\n}</code></pre>\n\n<b>happens-before:</b> если A happens-before B, результаты A видны B.\nПравила:\n1. Внутри потока — программный порядок\n2. synchronized unlock → lock на том же мониторе\n3. volatile write → read той же переменной\n4. Thread.start() → первая инструкция потока\n5. Последняя инструкция → Thread.join()\n\n<b>На собесе:</b> зачем volatile в double-checked locking? (без volatile другой поток может увидеть partially constructed объект — reordering)',hot:1,lvl:3},
    {q:'wait(), notify(), notifyAll()',a:'Методы Object. Вызываются ТОЛЬКО внутри synchronized блока.\n\n<pre><code>// Producer-Consumer через wait/notify\nclass SharedQueue<T> {\n    private final Queue<T> queue = new LinkedList<>();\n    private final int maxSize;\n\n    synchronized void put(T item) throws InterruptedException {\n        while (queue.size() >= maxSize) // WHILE, не IF (spurious wakeups!)\n            wait();                     // освобождает монитор, ждёт\n        queue.add(item);\n        notifyAll();                    // будим consumers\n    }\n\n    synchronized T take() throws InterruptedException {\n        while (queue.isEmpty())\n            wait();\n        T item = queue.remove();\n        notifyAll();                    // будим producers\n        return item;\n    }\n}</code></pre>\n\n<b>Важные правила:</b>\n• <code>wait()</code> — ТОЛЬКО в while, не if! (spurious wakeups — поток может проснуться без notify)\n• <code>wait()</code> освобождает монитор, <code>sleep()</code> — НЕТ\n• <code>notify()</code> будит ОДИН случайный поток, <code>notifyAll()</code> — все\n• Обычно используй <code>notifyAll()</code> — безопаснее\n\n<b>Современные альтернативы (лучше):</b>\n<pre><code>// BlockingQueue — встроенный producer-consumer\nBlockingQueue<Payment> queue = new LinkedBlockingQueue<>(100);\nqueue.put(payment);   // блокирует если полна\nqueue.take();          // блокирует если пуста\n\n// Condition (с Lock) — несколько условий\n// CompletableFuture — для асинхронных результатов</code></pre>\n\n<b>На собесе:</b> почему wait() должен быть в while, а не в if? (spurious wakeups + условие может стать false после notify, но до получения монитора)',lvl:2},

    {q:'Atomic типы и CAS',a:'<b>Атомарные операции без synchronized:</b>\n<pre><code>AtomicInteger counter = new AtomicInteger(0);\n\ncounter.incrementAndGet();     // ++counter (атомарно!)\ncounter.getAndIncrement();     // counter++ (атомарно!)\ncounter.compareAndSet(5, 10);  // если == 5, установить 10\ncounter.addAndGet(5);          // += 5\ncounter.updateAndGet(x -> x * 2); // атомарное преобразование</code></pre>\n\n<b>CAS (Compare-And-Swap) — аппаратная инструкция CPU:</b>\n<pre><code>// Псевдокод CAS:\nboolean CAS(address, expectedValue, newValue) {\n    if (*address == expectedValue) {\n        *address = newValue;\n        return true;  // успех\n    }\n    return false; // кто-то изменил раньше — retry\n}</code></pre>\n\nНе блокирует поток — при неудаче просто повторяет (spin-wait).\n\n<b>AtomicReference — для объектов:</b>\n<pre><code>AtomicReference<Payment> ref = new AtomicReference<>(payment);\nref.compareAndSet(oldPayment, newPayment);</code></pre>\n\n<b>LongAdder — для высокой конкуренции:</b>\n<pre><code>// AtomicLong: один counter, все потоки конкурируют за него\n// LongAdder: распределяет по ячейкам (cells), суммирует при чтении\nLongAdder counter = new LongAdder();\ncounter.increment(); // каждый поток пишет в свою ячейку\ncounter.sum();       // суммирует все ячейки\n// Быстрее AtomicLong при >4 потоков</code></pre>\n\n<b>Когда что:</b>\n• AtomicInteger/Long — счётчики с умеренной конкуренцией\n• LongAdder — счётчики метрик, высокая конкуренция\n• AtomicReference — CAS над объектом\n• synchronized — сложная логика (несколько переменных)\n\n<b>На собесе:</b> чем CAS лучше synchronized? (нет блокировки потока, нет context switch. Хуже при высокой конкуренции — busy-wait)',hot:1,lvl:3},
    {q:'ExecutorService и пулы потоков',a:'<pre><code>// Фиксированный пул — для CPU-bound задач\nExecutorService pool = Executors.newFixedThreadPool(\n    Runtime.getRuntime().availableProcessors()\n);\n\n// Кэширующий — для коротких I/O задач (создаёт потоки по требованию)\nExecutorService cached = Executors.newCachedThreadPool();\n\n// Один поток — гарантирует порядок выполнения\nExecutorService single = Executors.newSingleThreadExecutor();\n\n// Планировщик — периодические задачи\nScheduledExecutorService scheduled = Executors.newScheduledThreadPool(2);\nscheduled.scheduleAtFixedRate(() -> cleanup(), 0, 1, TimeUnit.HOURS);\n\n// Virtual Thread (Java 21) — для I/O bound\nExecutorService virtual = Executors.newVirtualThreadPerTaskExecutor();</code></pre>\n\n<b>ThreadPoolExecutor — тонкая настройка:</b>\n<pre><code>new ThreadPoolExecutor(\n    4,              // corePoolSize — минимум потоков\n    16,             // maxPoolSize — максимум при пиковой нагрузке\n    60, TimeUnit.SECONDS, // idle timeout для потоков > core\n    new LinkedBlockingQueue<>(1000), // очередь задач\n    new ThreadPoolExecutor.CallerRunsPolicy() // при переполнении\n);\n\n// Rejection policies:\n// AbortPolicy — RejectedExecutionException (default)\n// CallerRunsPolicy — вызывающий поток сам выполняет\n// DiscardPolicy — тихо отбрасывает\n// DiscardOldestPolicy — удаляет самую старую задачу</code></pre>\n\n<b>Важно — shutdown:</b>\n<pre><code>executor.shutdown();            // не принимает новые, ждёт текущие\nexecutor.shutdownNow();         // прерывает все\nexecutor.awaitTermination(30, SECONDS); // ждёт завершения</code></pre>\n\n<b>На собесе:</b> как определить размер пула? CPU-bound: cores. I/O-bound: cores * (1 + wait/compute). Virtual threads: не пулить вообще.',lvl:2},
    {q:'CompletableFuture — подробно',a:'Неблокирующие асинхронные цепочки — замена callback hell.\n\n<b>Создание:</b>\n<pre><code>// Асинхронно с результатом\nCompletableFuture<Payment> cf = CompletableFuture\n    .supplyAsync(() -> paymentService.findById(id));\n\n// Асинхронно без результата\nCompletableFuture<Void> cf = CompletableFuture\n    .runAsync(() -> notificationService.send(msg));\n\n// Уже готовый результат\nCompletableFuture.completedFuture(payment);</code></pre>\n\n<b>Цепочки (реальный пример — обработка платежа):</b>\n<pre><code>CompletableFuture<PaymentResult> result = \n    CompletableFuture.supplyAsync(() -> validatePayment(request))  // 1. Валидация\n    .thenApply(payment -> enrichWithMerchant(payment))            // 2. Обогащение\n    .thenCompose(payment -> processAsync(payment))                // 3. Обработка (возвращает CF)\n    .thenApply(payment -> createResponse(payment))                // 4. Формирование ответа\n    .exceptionally(ex -> {                                        // Обработка ошибок\n        log.error("Payment failed", ex);\n        return PaymentResult.failed(ex.getMessage());\n    });</code></pre>\n\n<b>Параллельное выполнение:</b>\n<pre><code>// Два запроса параллельно\nvar userCF = CompletableFuture.supplyAsync(() -> fetchUser(id));\nvar ordersCF = CompletableFuture.supplyAsync(() -> fetchOrders(id));\n\n// Объединение результатов\nvar response = userCF.thenCombine(ordersCF, \n    (user, orders) -> new UserResponse(user, orders)\n).get();\n\n// Ждать все\nCompletableFuture.allOf(cf1, cf2, cf3).join();\n\n// Ждать любой\nObject first = CompletableFuture.anyOf(cf1, cf2).join();</code></pre>\n\n<b>Ключевые методы:</b>\n<pre><code>thenApply(fn)      — трансформация результата (как map)\nthenCompose(fn)    — если fn возвращает CF (как flatMap)\nthenCombine(cf,fn) — объединить два CF\nthenAccept(fn)     — потребить результат (void)\nexceptionally(fn)  — обработка ошибки\nhandle(fn)         — результат ИЛИ ошибка\nwhenComplete(fn)   — callback при любом исходе</code></pre>\n\n<b>На собесе:</b> чем thenApply отличается от thenCompose? (thenApply: T→R, thenCompose: T→CompletableFuture<R> — как map vs flatMap)',hot:1,lvl:3},
    {q:'Concurrent коллекции',a:'<b>ConcurrentHashMap:</b>\n<pre><code>ConcurrentHashMap<String, Long> counters = new ConcurrentHashMap<>();\n\n// Атомарные операции (главное преимущество):\ncounters.computeIfAbsent("payments", k -> 0L);\ncounters.merge("payments", 1L, Long::sum); // атомарный инкремент\ncounters.compute("errors", (k, v) -> v == null ? 1L : v + 1);\n\n// НЕ делай так (race condition!):\nif (!map.containsKey(key)) map.put(key, value); // проверка + вставка не атомарны\nmap.putIfAbsent(key, value); // атомарно!</code></pre>\n\n<b>CopyOnWriteArrayList — для read-heavy:</b>\n<pre><code>CopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>();\n// Каждая запись = полная копия массива (дорого!)\n// Чтение без блокировки (дёшево)\n// Идеально: listeners, observers, конфигурации</code></pre>\n\n<b>BlockingQueue — producer-consumer:</b>\n<pre><code>BlockingQueue<Payment> queue = new LinkedBlockingQueue<>(1000);\n\n// Producer\nqueue.put(payment);   // блокирует если полна\nqueue.offer(payment, 5, SECONDS); // с таймаутом\n\n// Consumer\nPayment p = queue.take();    // блокирует если пуста\nPayment p = queue.poll(5, SECONDS); // с таймаутом</code></pre>\n\n<b>Какую когда:</b>\n<pre><code>ConcurrentHashMap   — общий кэш, счётчики\nCopyOnWriteArrayList — listeners, read >> write\nBlockingQueue       — producer-consumer\nConcurrentLinkedQueue — неблокирующая очередь (CAS)</code></pre>\n\n<b>На собесе:</b> почему ConcurrentHashMap не допускает null? (ambiguity: get(key)==null — нет ключа или value=null? race condition)',lvl:2},
    {q:'Lock, ReentrantLock',a:'Lock — интерфейс, гибче synchronized:\n\n<pre><code>ReentrantLock lock = new ReentrantLock();\n\nvoid process() {\n    lock.lock();\n    try {\n        // критическая секция\n    } finally {\n        lock.unlock(); // ОБЯЗАТЕЛЬНО в finally!\n    }\n}\n\n// tryLock — неблокирующая попытка\nif (lock.tryLock(1, TimeUnit.SECONDS)) {\n    try { ... } finally { lock.unlock(); }\n} else {\n    log.warn("Не удалось захватить блокировку");\n    // альтернативная логика\n}</code></pre>\n\n<b>Condition — замена wait/notify:</b>\n<pre><code>ReentrantLock lock = new ReentrantLock();\nCondition notEmpty = lock.newCondition();\nCondition notFull = lock.newCondition();\n\n// Producer\nlock.lock();\ntry {\n    while (queue.isFull()) notFull.await(); // ждём место\n    queue.add(item);\n    notEmpty.signal(); // сигнал consumer\n} finally { lock.unlock(); }\n\n// Consumer\nlock.lock();\ntry {\n    while (queue.isEmpty()) notEmpty.await(); // ждём данные\n    item = queue.remove();\n    notFull.signal(); // сигнал producer\n} finally { lock.unlock(); }</code></pre>\n\n<b>ReadWriteLock:</b>\n<pre><code>ReadWriteLock rwl = new ReentrantReadWriteLock();\n\n// Чтение — много одновременно\nrwl.readLock().lock();\ntry { return data; } finally { rwl.readLock().unlock(); }\n\n// Запись — эксклюзивно\nrwl.writeLock().lock();\ntry { data = newData; } finally { rwl.writeLock().unlock(); }</code></pre>\n\n<b>StampedLock (Java 8) — оптимистичное чтение:</b>\n<pre><code>StampedLock sl = new StampedLock();\nlong stamp = sl.tryOptimisticRead(); // не блокирует!\nint x = this.x;\nif (!sl.validate(stamp)) { // кто-то записал?\n    stamp = sl.readLock();  // fallback на обычный read lock\n    try { x = this.x; } finally { sl.unlockRead(stamp); }\n}</code></pre>\n\n<b>synchronized vs Lock:</b>\n<pre><code>               synchronized    ReentrantLock\ntryLock         Нет             Да\nfair            Нет             Да (fair=true)\nCondition       1 (wait/notify) Несколько\nInterruptible   Нет             lockInterruptibly()\nАвтоматический  Да              Нет (finally!)</code></pre>\n\n<b>На собесе:</b> когда Lock лучше synchronized? (tryLock, fairness, multiple conditions, interruptible)',lvl:2},
    {q:'CountDownLatch, Semaphore, CyclicBarrier',a:'<b>CountDownLatch — ожидание N событий:</b>\n<pre><code>// Ждём пока все 3 сервиса запустятся\nCountDownLatch latch = new CountDownLatch(3);\n\n// Каждый сервис:\nexecutor.submit(() -> {\n    startService();\n    latch.countDown(); // -1\n});\n\nlatch.await();          // блокирует пока count != 0\nlatch.await(30, SECONDS); // с таймаутом\n// Все 3 запустились — продолжаем\n// ОДНОРАЗОВЫЙ — нельзя reset!</code></pre>\n\n<b>Semaphore — ограничение одновременного доступа:</b>\n<pre><code>// Максимум 10 одновременных запросов к внешнему API\nSemaphore semaphore = new Semaphore(10);\n\nvoid callExternalApi() {\n    semaphore.acquire(); // ждёт если все 10 заняты\n    try {\n        httpClient.send(request);\n    } finally {\n        semaphore.release(); // освобождаем\n    }\n}\n// Пример: connection pool, rate limiter</code></pre>\n\n<b>CyclicBarrier — все ждут друг друга:</b>\n<pre><code>// 3 потока обрабатывают данные фазами\nCyclicBarrier barrier = new CyclicBarrier(3, () -> {\n    System.out.println("Фаза завершена — все собрались!");\n});\n\n// Каждый поток:\nvoid run() {\n    processPhase1();\n    barrier.await(); // ждёт пока все 3 дойдут сюда\n    processPhase2();\n    barrier.await(); // снова ждёт всех (ПЕРЕИСПОЛЬЗУЕМЫЙ!)\n}</code></pre>\n\n<b>Сравнение:</b>\n<pre><code>                CountDownLatch  CyclicBarrier  Semaphore\nОдноразовый?    Да              Нет            Нет\nКто ждёт?       await()         await()        acquire()\nКто сигналит?   countDown()     await()        release()\nПрименение:     Ожидание        Синхронизация  Ограничение\n                событий         потоков        доступа</code></pre>\n\n<b>На собесе:</b> чем CountDownLatch отличается от CyclicBarrier? (CDL — одноразовый, N → 0. CB — переиспользуемый, все ждут друг друга)',lvl:3},
    {q:'Deadlock, Livelock, Starvation',a:'<b>Deadlock — взаимная блокировка:</b>\n<pre><code>// Поток A: lock1 → ждёт lock2\n// Поток B: lock2 → ждёт lock1\n\nObject lock1 = new Object(), lock2 = new Object();\n\n// Thread A\nnew Thread(() -> {\n    synchronized (lock1) {\n        sleep(100);\n        synchronized (lock2) { /* deadlock! */ }\n    }\n}).start();\n\n// Thread B\nnew Thread(() -> {\n    synchronized (lock2) {\n        sleep(100);\n        synchronized (lock1) { /* deadlock! */ }\n    }\n}).start();</code></pre>\n\n<b>4 условия Coffman (все 4 → deadlock):</b>\n1. Mutual exclusion — ресурс захвачен одним потоком\n2. Hold and wait — держит одно, ждёт другое\n3. No preemption — нельзя отобрать ресурс\n4. Circular wait — циклическое ожидание\n\n<b>Решения:</b>\n<pre><code>// 1. Упорядочить захват (убираем circular wait)\n// Всегда сначала lock1, потом lock2\nsynchronized (lock1) {\n    synchronized (lock2) { ... }\n}\n\n// 2. tryLock с таймаутом (убираем hold and wait)\nif (lock.tryLock(1, TimeUnit.SECONDS)) {\n    try { ... } finally { lock.unlock(); }\n} else {\n    // не удалось — retry или fallback\n}</code></pre>\n\n<b>Livelock:</b> потоки активны, но не продвигаются (каждый уступает другому — как два человека в коридоре).\n\n<b>Starvation:</b> поток не получает ресурсы (низкий приоритет, unfair lock).\nРешение: fair = true в ReentrantLock.\n\n<b>Обнаружение:</b> jstack PID, VisualVM, ThreadMXBean.findDeadlockedThreads().\n\n<b>На собесе:</b> напишите пример deadlock и объясните как починить.',hot:1,lvl:3},
    {q:'ThreadLocal',a:'Переменная с отдельной копией для каждого потока.\n\n<pre><code>// Пример: SimpleDateFormat НЕ потокобезопасен\n// Вместо synchronized — ThreadLocal\nprivate static final ThreadLocal<SimpleDateFormat> dateFormat =\n    ThreadLocal.withInitial(() -> new SimpleDateFormat("yyyy-MM-dd"));\n\nString format(Date d) {\n    return dateFormat.get().format(d); // каждый поток — свой экземпляр\n}\n\n// Пример: контекст запроса\npublic class RequestContext {\n    private static final ThreadLocal<String> traceId = new ThreadLocal<>();\n    \n    public static void set(String id) { traceId.set(id); }\n    public static String get() { return traceId.get(); }\n    public static void clear() { traceId.remove(); }\n}</code></pre>\n\n<b>УТЕЧКА ПАМЯТИ в thread pool:</b>\n<pre><code>// Thread pool переиспользует потоки!\n// ThreadLocal значение остаётся от предыдущей задачи!\nexecutor.submit(() -> {\n    RequestContext.set("trace-123");\n    processPayment();\n    // ЗАБЫЛИ clear() → утечка!\n});\n\n// ПРАВИЛЬНО:\nexecutor.submit(() -> {\n    try {\n        RequestContext.set("trace-123");\n        processPayment();\n    } finally {\n        RequestContext.clear(); // ОБЯЗАТЕЛЬНО!\n    }\n});</code></pre>\n\n<b>Java 21 — ScopedValue (preview):</b>\n<pre><code>// Замена ThreadLocal для virtual threads\nstatic final ScopedValue<String> TRACE_ID = ScopedValue.newInstance();\n\nScopedValue.where(TRACE_ID, "trace-123")\n    .run(() -> processPayment()); // автоматически очищается!\n// Нет проблемы утечки, immutable, scoped</code></pre>\n\n<b>На собесе:</b> почему ThreadLocal опасен с thread pool? Как починить? (remove() в finally. Или ScopedValue в Java 21)',lvl:2},
    {s:'Virtual Threads (Java 21)'},
    {q:'Virtual Threads — что и зачем?',a:'Лёгкие потоки, управляемые JVM. ~1KB стека (vs ~1MB для platform thread).\n\n<b>Проблема:</b> platform threads тяжёлые. 10k потоков = 10GB стека. При I/O — поток простаивает.\n\n<b>Решение:</b> virtual threads. При блокировке I/O — отцепляется от carrier thread, carrier свободен для другой работы.\n\n<pre><code>// Создание\nThread.ofVirtual().start(() -> processPayment(id));\nThread.startVirtualThread(() -> processPayment(id));\n\n// Executor (рекомендуемый способ)\ntry (var executor = Executors.newVirtualThreadPerTaskExecutor()) {\n    for (Long id : paymentIds) {\n        executor.submit(() -> processPayment(id)); // миллион задач!\n    }\n} // автоматически ждёт завершения</code></pre>\n\n<b>Spring Boot 3.2+:</b>\n<pre><code># application.yml\nspring:\n  threads:\n    virtual:\n      enabled: true  # все HTTP запросы на virtual threads!</code></pre>\n\n<b>Когда использовать:</b>\n• I/O-bound: HTTP вызовы, запросы к БД, Kafka, файлы\n• Высокая конкуренция: тысячи одновременных запросов\n\n<b>Когда НЕ использовать:</b>\n• CPU-bound задачи (используй platform threads)\n• synchronized блоки (pinning — virtual thread не отцепляется!)\n  → Заменяй synchronized на ReentrantLock\n\n<b>НЕ пулить:</b> создавай новый virtual thread на каждую задачу. Пулить бессмысленно — они лёгкие.\n\n<b>На собесе:</b> что такое pinning? Как virtual threads работают с synchronized? Чем отличаются от корутин Kotlin?',hot:1,lvl:3},
    {q:'Structured Concurrency (Preview)',a:'Задачи привязаны к scope:\n<pre><code>try (var scope = new StructuredTaskScope.ShutdownOnFailure()) {\n    var user = scope.fork(() -> fetchUser(id));\n    var order = scope.fork(() -> fetchOrder(id));\n    scope.join().throwIfFailed();\n    return new Response(user.get(), order.get());\n}</code></pre>\n\nВсе подзадачи завершены к выходу из scope. Ошибка в одной → отмена остальных.',lvl:3},
    {q:'Java Memory Model (JMM)',a:'Определяет как потоки видят записи друг друга. Без JMM — компилятор и CPU могут переупорядочивать инструкции.\n\n<b>Проблема без JMM:</b>\n<pre><code>// Thread 1            // Thread 2\nx = 1;                 if (ready)\nready = true;              print(x); // может напечатать 0!\n// CPU может переупорядочить: ready = true ПЕРЕД x = 1</code></pre>\n\n<b>happens-before — гарантия видимости:</b>\nЕсли A happens-before B, результаты A видны B.\n\n<b>Правила:</b>\n1. <b>Program order</b>: внутри потока — порядок кода\n2. <b>Monitor lock</b>: synchronized unlock → lock на том же мониторе\n3. <b>Volatile</b>: volatile write → read той же переменной\n4. <b>Thread start</b>: thread.start() → первая инструкция потока\n5. <b>Thread join</b>: последняя инструкция → thread.join()\n6. <b>Transitivity</b>: A hb B, B hb C → A hb C\n\n<b>Исправленный пример:</b>\n<pre><code>volatile boolean ready = false; // volatile!\nint x = 0;\n\n// Thread 1\nx = 1;\nready = true;  // volatile write happens-before read\n\n// Thread 2\nif (ready)     // volatile read\n    print(x);  // гарантированно 1 (transitivity)</code></pre>\n\n<b>Memory barriers:</b>\nvolatile write = StoreStore + StoreLoad barrier\nvolatile read = LoadLoad + LoadStore barrier\n\n<b>На собесе:</b> что такое happens-before? Зачем нужен volatile кроме видимости? (запрет переупорядочивания — memory barrier)',lvl:3},
    {q:'Fork/Join Framework',a:'Divide & conquer для параллельных вычислений.\n\n<pre><code>// Пример: параллельное суммирование массива\nclass SumTask extends RecursiveTask<Long> {\n    private final int[] arr;\n    private final int from, to;\n    private static final int THRESHOLD = 10_000;\n\n    protected Long compute() {\n        if (to - from <= THRESHOLD) {\n            // Маленький кусок — считаем напрямую\n            long sum = 0;\n            for (int i = from; i < to; i++) sum += arr[i];\n            return sum;\n        }\n        // Большой — делим пополам\n        int mid = (from + to) / 2;\n        SumTask left = new SumTask(arr, from, mid);\n        SumTask right = new SumTask(arr, mid, to);\n        left.fork();    // запускаем left в другом потоке\n        long rightResult = right.compute(); // считаем right в текущем\n        long leftResult = left.join();      // ждём left\n        return leftResult + rightResult;\n    }\n}\n\nForkJoinPool pool = new ForkJoinPool(); // default: cores потоков\nlong sum = pool.invoke(new SumTask(array, 0, array.length));</code></pre>\n\n<b>Work-stealing:</b> свободный поток забирает задачи из очереди занятого. Эффективная балансировка.\n\n<b>RecursiveTask<V></b> — возвращает результат.\n<b>RecursiveAction</b> — void (побочные эффекты).\n\n<b>ForkJoinPool.commonPool()</b> — используется Parallel Streams.\nРазмер: cores - 1 поток. Можно менять: <code>-Djava.util.concurrent.ForkJoinPool.common.parallelism=16</code>\n\n<b>На собесе:</b> как parallel stream связан с Fork/Join? (parallelStream() использует commonPool() для разделения работы)',lvl:3},
