    {q:'Модификаторы доступа',a:'<b>Четыре уровня видимости</b> (от самого строгого к самому открытому):\n\n<b>1. <code>private</code></b>\nДоступ только внутри своего класса. Стандарт для полей (инкапсуляция).\n<pre><code>class Account {\n    private BigDecimal balance; // никто снаружи не увидит\n    public BigDecimal getBalance() { return balance; } // доступ через геттер\n}</code></pre>\n\n<b>2. default (package-private)</b> — отсутствие модификатора\nДоступ только внутри того же пакета. Часто используется для классов-помощников внутри модуля.\n<pre><code>class InternalHelper { } // виден только в том же пакете</code></pre>\n\n<b>3. <code>protected</code></b>\nДоступ в пакете + подклассам (даже из других пакетов). Используется для «защищённого наследования» — фреймворки (Spring, JPA).\n<pre><code>class Base {\n    protected void beforeSave() { } // могут переопределить наследники\n}</code></pre>\n\n<b>4. <code>public</code></b>\nДоступен отовсюду. API класса, публичные методы сервисов, контроллеры.\n\n<b>Таблица видимости:</b>\n<pre><code>                 Класс   Пакет   Подкласс   Везде\nprivate            ✅     ❌       ❌        ❌\ndefault            ✅     ✅       ❌        ❌\nprotected          ✅     ✅       ✅        ❌\npublic             ✅     ✅       ✅        ✅</code></pre>\n\n<b>Модификаторы для классов верхнего уровня:</b>\n• <b>public</b> — доступен отовсюду (должен быть в файле с тем же именем)\n• <b>default</b> — только в пакете\n• Нет <code>private</code>/<code>protected</code> для top-level классов (но можно для nested)\n\n<b>Nested классы</b> могут иметь все 4 модификатора:\n<pre><code>public class Outer {\n    private static class SecretHelper { } // видим только в Outer\n    public static class PublicAPI { }\n    protected class ForSubclasses { }\n}</code></pre>\n\n<b>С Java 9+ — модули (JPMS):</b>\n<pre><code>// module-info.java\nmodule my.app {\n    exports com.example.api;       // видим снаружи модуля\n    // com.example.internal        // НЕ видим, даже если public-классы внутри\n}</code></pre>\nТеперь <code>public</code> ≠ «виден всем». Модуль может скрывать даже public-классы.\n\n<b>С Java 17+ — sealed classes:</b>\n<pre><code>public sealed class Shape permits Circle, Square, Triangle { }\npublic final class Circle extends Shape { }\npublic final class Square extends Shape { }\n// Shape можно наследовать ТОЛЬКО Circle/Square/Triangle\n// Pattern matching работает безопасно (exhaustive)</code></pre>\n\n<b>Пример хорошего дизайна:</b>\n<pre><code>@Service\npublic class PaymentService {\n    private final PaymentRepository repo;       // приватная зависимость\n    private static final int MAX_RETRIES = 3;   // private static final = константа\n\n    public PaymentService(PaymentRepository repo) { this.repo = repo; }\n\n    public Payment process(PaymentRequest req) {  // public API\n        validate(req);\n        return doProcess(req);\n    }\n\n    private void validate(PaymentRequest req) { ... }  // внутренняя логика\n    private Payment doProcess(PaymentRequest req) { ... }\n}</code></pre>\n\n<b>Правила хорошего тона:</b>\n• По умолчанию <b>private</b>, ослабляй только если реально нужно\n• Поля классов — всегда <b>private</b> (кроме констант)\n• Не используй <code>protected</code> без цели наследования\n• Пакетная видимость — удобно для тестов без open public API\n\n<b>На собесе:</b> «зачем protected если есть public?» — для framework hook-методов; «может ли класс внутри того же пакета обратиться к private полю?» — нет, только тот же класс (кроме nested).',lvl:1},
    {q:'static, final, abstract',a:'<b>static:</b> принадлежит классу. Не переопределяется (method hiding). Static nested class без ссылки на внешний.\n\n<b>final:</b> переменная — нельзя переназначить (но объект мутабелен!); метод — нельзя переопределить; класс — нельзя наследовать.\n\n<b>abstract:</b> класс — нельзя инстанциировать; метод — без тела, override обязателен.',lvl:1},
    {q:'Может ли статический метод быть переопределён?',a:'<b>Нет.</b> Статические методы привязаны к классу, не к объекту.\n\nЕсли подкласс объявит метод с той же сигнатурой — это <b>method hiding</b>, не overriding.\n\n<pre><code>class Parent { static void foo() { print("Parent"); } }\nclass Child extends Parent { static void foo() { print("Child"); } }\nParent p = new Child();\np.foo(); // "Parent" — вызывается по типу ссылки!</code></pre>',lvl:2},
    {q:'Интерфейсы vs абстрактные классы',a:'<b>Интерфейс:</b>\n• Множественная реализация (implements)\n• Поля: public static final\n• Методы: abstract, default, static, private (Java 9+)\n• Нет конструкторов\n\n<b>Абстрактный класс:</b>\n• Одиночное наследование (extends)\n• Любое состояние, конструкторы, модификаторы\n\nИнтерфейс — контракт (Repository), абстрактный — общая реализация (AbstractList).',hot:1,lvl:2},
    {q:'Вложенные классы',a:'• <b>Static nested</b> — без ссылки на внешний. Как обычный класс, но внутри.\n• <b>Inner (нестатический)</b> — имеет OuterClass.this. Нельзя иметь static members.\n• <b>Local</b> — в теле метода. Доступ к effectively final переменным.\n• <b>Anonymous</b> — без имени, одноразовая реализация.\n\nС Java 8 лямбды заменяют anonymous classes для функциональных интерфейсов.',lvl:2},
    {q:'enum в Java',a:'<b>Enum</b> — перечисление, особый тип класса с фиксированным набором экземпляров. Появился в Java 5.\n\n<b>Базовое использование:</b>\n<pre><code>public enum PaymentStatus {\n    PENDING, AUTHORIZED, CAPTURED, REFUNDED, FAILED;\n}\n\nPaymentStatus s = PaymentStatus.CAPTURED;\nif (s == PaymentStatus.CAPTURED) { ... } // можно == (singleton)</code></pre>\n\n<b>Устройство:</b>\n• Неявно <code>extends java.lang.Enum</code>\n• Неявно <code>final</code> — нельзя наследовать\n• Каждое значение — <b>singleton</b> экземпляр, создаётся один раз\n• Конструктор всегда <code>private</code> (другого не разрешит компилятор)\n• Нельзя создать <code>new PaymentStatus()</code>\n\n<b>Enum с полями и методами:</b>\n<pre><code>public enum Currency {\n    USD("$", 2),\n    EUR("€", 2),\n    JPY("¥", 0),\n    BTC("₿", 8);\n\n    private final String symbol;\n    private final int decimals;\n\n    Currency(String symbol, int decimals) { // private неявно\n        this.symbol = symbol;\n        this.decimals = decimals;\n    }\n\n    public String getSymbol() { return symbol; }\n    public int getDecimals() { return decimals; }\n\n    public String format(BigDecimal amount) {\n        return amount.setScale(decimals).toPlainString() + " " + symbol;\n    }\n}\n\nCurrency.USD.format(BigDecimal.valueOf(100.5)); // "100.50 $"</code></pre>\n\n<b>Методы enum:</b>\n• <code>values()</code> — массив всех значений (static)\n• <code>valueOf(String)</code> — получить по имени (throws IllegalArgumentException)\n• <code>name()</code> — имя как в коде (CAPTURED)\n• <code>ordinal()</code> — порядковый номер (0, 1, 2...). НЕ рекомендуется сохранять в БД!\n• <code>compareTo()</code> — сравнение по ordinal\n\n<pre><code>for (Currency c : Currency.values()) {\n    System.out.println(c.name() + " = " + c.getSymbol());\n}\n\nCurrency c = Currency.valueOf("USD"); // если нет — exception</code></pre>\n\n<b>Enum с методами для каждого значения:</b>\n<pre><code>public enum Operation {\n    PLUS {\n        @Override\n        public int apply(int x, int y) { return x + y; }\n    },\n    MINUS {\n        @Override\n        public int apply(int x, int y) { return x - y; }\n    },\n    TIMES {\n        @Override\n        public int apply(int x, int y) { return x * y; }\n    };\n\n    public abstract int apply(int x, int y);\n}\n\nOperation.PLUS.apply(2, 3); // 5</code></pre>\n\n<b>Enum реализует интерфейс:</b>\n<pre><code>public interface Priced {\n    BigDecimal getPrice();\n}\n\npublic enum PlanType implements Priced {\n    FREE(BigDecimal.ZERO),\n    PRO(BigDecimal.valueOf(99)),\n    ENTERPRISE(BigDecimal.valueOf(999));\n\n    private final BigDecimal price;\n    PlanType(BigDecimal p) { this.price = p; }\n    public BigDecimal getPrice() { return price; }\n}</code></pre>\n\n<b>EnumSet и EnumMap</b> — специальные оптимизированные коллекции (внутри — битовая маска для set и массив для map):\n<pre><code>Set&lt;PaymentStatus&gt; openStatuses = EnumSet.of(PENDING, AUTHORIZED);\nEnumSet&lt;PaymentStatus&gt; allExceptFailed = EnumSet.complementOf(EnumSet.of(FAILED));\nEnumSet&lt;PaymentStatus&gt; all = EnumSet.allOf(PaymentStatus.class);\n\nMap&lt;Currency, BigDecimal&gt; rates = new EnumMap&lt;&gt;(Currency.class);\n// Быстрее и компактнее HashMap для enum-ключей</code></pre>\n\n<b>Switch с enum</b> (Java 14+ с Pattern matching):\n<pre><code>// Классический\nswitch (status) {\n    case PENDING:    return "Waiting";\n    case CAPTURED:   return "Paid";\n    case FAILED:     return "Error";\n    default:         throw new IllegalStateException();\n}\n\n// Switch expression (Java 14+)\nString label = switch (status) {\n    case PENDING, AUTHORIZED -&gt; "In progress";\n    case CAPTURED -&gt; "Paid";\n    case FAILED, REFUNDED -&gt; "Closed";\n};</code></pre>\n\n<b>Enum как лучший Singleton (Joshua Bloch):</b>\n<pre><code>public enum Logger {\n    INSTANCE;\n\n    public void log(String msg) { System.out.println(msg); }\n}\nLogger.INSTANCE.log("hi");</code></pre>\nПочему лучший: защищён от reflection (<code>newInstance()</code> для enum выбрасывает exception), сериализации (Java гарантирует single instance при десериализации), многопоточности (инициализация потокобезопасна).\n\n<b>Enum в JPA:</b>\n<pre><code>@Entity\npublic class Payment {\n    @Enumerated(EnumType.STRING) // храним строкой "CAPTURED"\n    private PaymentStatus status;\n    // EnumType.ORDINAL — опасно! добавил новое значение — сломалось\n}</code></pre>\n\n<b>Сериализация в JSON (Jackson):</b>\n<pre><code>// По умолчанию: сериализуется имя\n// {"status": "CAPTURED"}\n\n// Кастомная сериализация\npublic enum Status {\n    @JsonProperty("paid") CAPTURED,\n    @JsonProperty("failed") FAILED;\n}</code></pre>\n\n<b>Частые грабли:</b>\n• <b>ordinal() в БД</b> — добавил значение в середину → все ID поехали\n• <b>Добавление нового значения</b> — все switch без default могут сломаться\n• <b>EnumSet.of без аргументов</b> — ошибка компиляции, используй <code>EnumSet.noneOf(Class)</code>\n\n<b>На собесе:</b>\n• Почему == можно использовать вместо equals для enum? (singleton, гарантированный JVM)\n• Чем EnumMap лучше HashMap? (на массиве, O(1), меньше памяти, быстрее)\n• Как добавить поведение отдельно каждому значению? (abstract method + override в значениях)',lvl:1},
    {q:'Records (Java 16+)',a:'Неизменяемый data carrier — замена boilerplate POJO:\n\n<pre><code>// Было (Java 8):\npublic class Money {\n    private final BigDecimal amount;\n    private final Currency currency;\n    // конструктор, getters, equals, hashCode, toString — 50+ строк\n}\n\n// Стало (Java 16+):\nrecord Money(BigDecimal amount, Currency currency) {\n    // compact constructor для валидации\n    Money {\n        if (amount.compareTo(BigDecimal.ZERO) < 0)\n            throw new IllegalArgumentException("Amount must be >= 0");\n        Objects.requireNonNull(currency);\n    }\n\n    // можно добавить методы\n    Money add(Money other) {\n        if (!currency.equals(other.currency))\n            throw new IllegalArgumentException("Currency mismatch");\n        return new Money(amount.add(other.amount), currency);\n    }\n}</code></pre>\n\n<b>Автогенерация:</b> private final поля, конструктор, amount(), currency() (без get-), equals(), hashCode(), toString().\n\n<b>Нельзя:</b> extends другой класс (implicit final), мутировать поля, добавлять instance поля.\n<b>Можно:</b> implements интерфейсы, static поля/методы, custom методы.\n\n<b>Идеально для DDD:</b> Value Objects (Money, Address, PaymentId), DTO, Event payload.\n\n<b>На собесе:</b> чем record отличается от Lombok @Value? (record — часть языка, pattern matching, compact constructor)',hot:1,lvl:2},
    {q:'Sealed classes (Java 17+)',a:'Ограничивают кто может наследовать — закрытая иерархия:\n\n<pre><code>// Статусы платежа — точно известный набор\npublic sealed interface PaymentStatus\n    permits Created, Processing, Completed, Failed {\n}\nrecord Created(Instant at) implements PaymentStatus {}\nrecord Processing(String provider) implements PaymentStatus {}\nrecord Completed(Instant at, String txId) implements PaymentStatus {}\nrecord Failed(String reason, ErrorCode code) implements PaymentStatus {}</code></pre>\n\n<b>Exhaustive switch (Java 21):</b>\n<pre><code>String describe(PaymentStatus status) {\n    return switch (status) {\n        case Created c -> "Создан " + c.at();\n        case Processing p -> "В обработке: " + p.provider();\n        case Completed c -> "Завершён: " + c.txId();\n        case Failed f -> "Ошибка: " + f.reason();\n        // нет default — компилятор проверил все варианты!\n    };\n}</code></pre>\n\n<b>Подклассы обязаны быть:</b> final, sealed или non-sealed.\n\n<b>Зачем:</b>\n• Компилятор гарантирует обработку всех вариантов\n• Безопасный рефакторинг: добавил вариант → ошибки компиляции везде\n• Идеально для DDD: Command, Event, Status, Result\n\n<b>На собесе:</b> чем sealed лучше enum? (sealed может хранить данные в каждом варианте, enum — нет)',hot:1,lvl:3},
    {q:'Порядок инициализации класса',a:'1. Статические поля и блоки родителя (в порядке объявления)\n2. Статические поля и блоки потомка\n3. Поля экземпляра и блоки инициализации родителя\n4. Конструктор родителя\n5. Поля экземпляра и блоки инициализации потомка\n6. Конструктор потомка\n\nСтатическая инициализация — один раз при загрузке класса.',lvl:2},
    {s:'equals, hashCode, Object'},
    {q:'Методы класса Object',a:'<b>Object</b> — корневой класс Java. Все классы неявно наследуют его.\n\n<b>11 методов (8 unique):</b>\n\n<b>1. <code>public String toString()</code></b>\nТекстовое представление. По умолчанию: <code>ClassName@hexHashCode</code>. Переопределяют почти всегда.\n<pre><code>@Override\npublic String toString() { return "User{id=" + id + ", name=" + name + "}"; }</code></pre>\n\n<b>2. <code>public boolean equals(Object other)</code></b>\nЛогическое сравнение. По умолчанию — сравнение ссылок (<code>this == other</code>).\nКонтракт: рефлексивность, симметричность, транзитивность, согласованность, <code>equals(null) == false</code>.\n\n<b>3. <code>public int hashCode()</code></b>\nЦелочисленный код для hash-based структур. Контракт с equals: если <code>a.equals(b)</code>, то <code>a.hashCode() == b.hashCode()</code> (обратное не требуется).\n\n<b>4. <code>protected Object clone()</code></b>\nСоздание копии. Нужен <code>implements Cloneable</code>, иначе CloneNotSupportedException. Shallow copy по умолчанию. Joshua Bloch советует избегать.\n\n<b>5. <code>public final Class&lt;?&gt; getClass()</code></b>\nRuntime-класс объекта. Нельзя переопределить.\n\n<b>6. <code>protected void finalize()</code></b>\nDeprecated с Java 9, удалён в Java 18. Не использовать! Замена: <code>try-with-resources</code>, <code>Cleaner</code>, <code>PhantomReference</code>.\n\n<b>7-9. Синхронизация (работают с монитором объекта):</b>\n• <code>public final void wait()</code> — освобождает монитор, ждёт <code>notify()</code> (3 перегрузки: без аргументов, с timeout, с nanos)\n• <code>public final void notify()</code> — будит ОДИН произвольный ожидающий поток\n• <code>public final void notifyAll()</code> — будит ВСЕ ожидающие потоки\n\nВсе три требуют держать монитор (<code>synchronized</code>):\n<pre><code>synchronized (obj) {\n    while (!condition) obj.wait();\n    // ...\n}</code></pre>\n\n<b>Почему wait/notify в Object:</b> каждый объект в Java имеет встроенный монитор (intrinsic lock), так что синхронизация работает с любым объектом.\n\n<b>Современная альтернатива wait/notify:</b> <code>ReentrantLock</code> + <code>Condition</code>, <code>BlockingQueue</code>, <code>CountDownLatch</code>, <code>Semaphore</code>.\n\n<b>На собесе:</b> контракт equals/hashCode; почему нельзя менять hashCode объекта, если он уже в HashMap (элемент станет «недостижимым»).',lvl:1},
    {q:'equals() и hashCode() — контракт',a:'<b>Контракт:</b>\n• a.equals(b) → a.hashCode() == b.hashCode() (ОБЯЗАТЕЛЬНО)\n• Одинаковый hashCode ≠ equals (коллизия)\n\n<b>Полный пример реализации:</b>\n<pre><code>public class Payment {\n    private Long id;\n    private String externalId;\n\n    @Override\n    public boolean equals(Object o) {\n        if (this == o) return true;  // 1. та же ссылка\n        if (!(o instanceof Payment p)) return false;  // 2. тип\n        return Objects.equals(id, p.id)  // 3. поля\n            && Objects.equals(externalId, p.externalId);\n    }\n\n    @Override\n    public int hashCode() {\n        return Objects.hash(id, externalId); // те же поля!\n    }\n}</code></pre>\n\n<b>Что будет если нарушить контракт:</b>\n<pre><code>// Переопределили equals, но НЕ hashCode\nSet<Payment> set = new HashSet<>();\nset.add(new Payment(1L));\nset.contains(new Payment(1L)); // false! разные hashCode → разные бакеты</code></pre>\n\n<b>Правила:</b>\n• Используй те же поля в equals и hashCode\n• 31 * result + field — оптимизируется JVM в (x << 5) - x\n• Для JPA Entity: используй бизнес-ключ, а не @Id (proxy проблема)\n• Records: equals/hashCode генерируются автоматически\n\n<b>На собесе:</b> что будет если положить объект в HashMap, потом изменить поле, участвующее в hashCode?',hot:1,lvl:2},
    {q:'Разница между == и equals()',a:'<code>==</code> — сравнение ссылок (адресов) для объектов, значений для примитивов.\n<code>equals()</code> — сравнение содержимого (если переопределён).\n\n<code>"hello" == "hello"</code> → true (String Pool)\n<code>new String("hello") == new String("hello")</code> → false\n\n<code>Integer a = 127; a == 127</code> → true (cache)\n<code>Integer a = 128; a == 128</code> → false (unboxing нюансы зависят от контекста)',hot:1,lvl:2},
    {q:'getClass() vs instanceof',a:'<code>obj instanceof MyClass</code> — true для MyClass и всех подклассов.\n<code>obj.getClass() == MyClass.class</code> — true ТОЛЬКО для точного класса.\n\nВ equals(): instanceof — позволяет сравнивать подклассы. getClass() — строгое совпадение.\nJoshua Bloch рекомендует instanceof для не-final классов с осторожностью.',lvl:2},
    {q:'Как правильно переопределить toString()?',a:'<b>Назначение toString()</b> — текстовое представление объекта. По умолчанию в <code>Object</code>: <code>ClassName@hexHashCode</code> (бесполезно для логов).\n\n<b>Простой и понятный вариант:</b>\n<pre><code>@Override\npublic String toString() {\n    return "Payment{" +\n        "id=" + id +\n        ", amount=" + amount +\n        ", status=" + status +\n        ", createdAt=" + createdAt +\n        \\\'}\\\';\n}</code></pre>\n\n<b>Правила хорошего toString():</b>\n\n<b>1. Читаемость важнее всего.</b> Формат, который легко парсить глазами в логах.\n\n<b>2. Включать ключевые идентифицирующие поля.</b> ID всегда. Часто — имя/название, статус.\n\n<b>3. НЕ включать чувствительные данные!</b>\n<pre><code>@Entity\npublic class User {\n    private Long id;\n    private String email;\n    private String passwordHash;  // ❌ никогда в toString!\n    private String ssn;            // ❌ PII\n    private String creditCardNumber; // ❌\n    private String apiToken;       // ❌\n}\n\n// Правильно:\n@Override\npublic String toString() {\n    return "User{id=" + id + ", email=" + mask(email) + "}";\n}\n\nprivate String mask(String email) {\n    // "john.doe@example.com" -&gt; "j***@example.com"\n    return email.charAt(0) + "***@" + email.substring(email.indexOf("@") + 1);\n}</code></pre>\n\n<b>4. Осторожно с JPA lazy-полями:</b>\n<pre><code>@Entity\npublic class Order {\n    @ManyToOne(fetch = LAZY)\n    private User user;\n\n    @OneToMany(fetch = LAZY)\n    private List&lt;OrderItem&gt; items;\n\n    @Override\n    public String toString() {\n        // ❌ ПРОБЛЕМА: обращение к user.getName() загрузит user из БД!\n        // ❌ items — загрузит все элементы — N+1 в логах!\n        return "Order{id=" + id + ", user=" + user.getName() + ", items=" + items + "}";\n    }\n}\n\n// Правильно: только id из FK, без обращения к lazy полям\n@Override\npublic String toString() {\n    return "Order{id=" + id + ", userId=" + userId + ", itemsCount=" + (items == null ? 0 : items.size()) + "}";\n}</code></pre>\n\n<b>5. Циклические ссылки — вечный цикл!</b>\n<pre><code>// Двусторонние ассоциации:\nclass User {\n    List&lt;Order&gt; orders;\n    toString() { return "User{... orders=" + orders + "}"; }\n}\nclass Order {\n    User user;\n    toString() { return "Order{user=" + user + "}"; }\n}\n// user.toString() -&gt; orders -&gt; order.toString() -&gt; user -&gt; StackOverflow!\n\n// Решение: toString одной стороны содержит только id\nclass Order {\n    User user;\n    toString() { return "Order{userId=" + (user == null ? null : user.getId()) + "}"; }\n}</code></pre>\n\n<b>Lombok @ToString — автогенерация:</b>\n<pre><code>@ToString\npublic class Payment {\n    private Long id;\n    private BigDecimal amount;\n    @ToString.Exclude // исключить чувствительные поля\n    private String cvv;\n}\n// Генерирует toString() со всеми полями, кроме @ToString.Exclude\n\n@ToString(onlyExplicitlyIncluded = true)\npublic class User {\n    @ToString.Include private Long id;\n    @ToString.Include private String email;\n    private String password; // не включён\n    private String ssn;      // не включён\n}</code></pre>\n\n<b>Records (Java 14+) — автоматически:</b>\n<pre><code>public record Money(BigDecimal amount, String currency) { }\n// Автогенерация toString:\n// Money[amount=100, currency=USD]</code></pre>\n\n<b>StringBuilder для больших toString():</b>\n<pre><code>@Override\npublic String toString() {\n    StringBuilder sb = new StringBuilder("Order{");\n    sb.append("id=").append(id);\n    sb.append(", userId=").append(userId);\n    sb.append(", items=[");\n    for (OrderItem item : items) {\n        sb.append(item.getId()).append(",");\n    }\n    sb.append("]}");\n    return sb.toString();\n}\n// Чуть быстрее конкатенации при большом числе полей</code></pre>\n\n<b>Apache Commons ToStringBuilder:</b>\n<pre><code>public String toString() {\n    return new ToStringBuilder(this, ToStringStyle.SHORT_PREFIX_STYLE)\n        .append("id", id)\n        .append("amount", amount)\n        .toString();\n}\n// Разные стили: DEFAULT, SHORT_PREFIX, JSON, MULTI_LINE</code></pre>\n\n<b>Структурированное логирование — альтернатива toString():</b>\n<pre><code>// Вместо\nlog.info("Payment: " + payment);\n// Используй SLF4J placeholders + правильный logger\nlog.info("Payment created: id={} amount={} status={}",\n    payment.getId(), payment.getAmount(), payment.getStatus());\n// - Нет вызова toString если уровень отключен (быстрее)\n// - Структурированные логи легко парсить в ELK</code></pre>\n\n<b>JSON как toString():</b>\n<pre><code>@Override\npublic String toString() {\n    try {\n        return new ObjectMapper().writeValueAsString(this);\n    } catch (Exception e) {\n        return super.toString();\n    }\n}\n// Удобно если логи собираются в ELK и парсятся как JSON\n// Минус: зависимость на Jackson, может быть медленно</code></pre>\n\n<b>Контракт toString() (из javadoc Object):</b>\n• Должен быть «краткий, но информативный»\n• Рекомендуется переопределять во всех классах\n• НЕ должен бросать исключения\n• Должен возвращать не-null\n\n<b>Частые ошибки:</b>\n• <b>Включить mutable collections</b> — при concurrent modification → <code>ConcurrentModificationException</code>\n• <b>NullPointerException</b> на null полях — используй <code>Objects.toString(x, "null")</code>\n• <b>Вызов toString() в конструкторе</b> — если поля ещё не инициализированы\n• <b>Чувствительные данные</b> — протекут в логи\n\n<b>На собесе:</b>\n• Зачем переопределять toString()? (логи, отладка)\n• Какие поля НЕ включать? (пароли, токены, PII)\n• Проблемы с JPA lazy? (N+1, вечный цикл при bidirectional)\n• Lombok-альтернативы? (@ToString с @ToString.Exclude)\n• Records — нужно ли переопределять? (уже есть автосгенерированный)',lvl:2},

    {q:'Иерархия исключений',a:'<pre><code>Throwable\n├── Error — критические ошибки JVM\n│   ├── OutOfMemoryError\n│   ├── StackOverflowError\n│   └── NoClassDefFoundError\n└── Exception\n    ├── Checked (обязательно обработать)\n    │   ├── IOException\n    │   ├── SQLException\n    │   └── ClassNotFoundException\n    └── RuntimeException (unchecked)\n        ├── NullPointerException\n        ├── IllegalArgumentException\n        ├── IllegalStateException\n        └── IndexOutOfBoundsException</code></pre>\n\n<b>Пример пользовательского исключения (платежи):</b>\n<pre><code>public class PaymentProcessingException extends RuntimeException {\n    private final String paymentId;\n    private final ErrorCode code;\n\n    public PaymentProcessingException(String paymentId, ErrorCode code, String msg) {\n        super(msg);\n        this.paymentId = paymentId;\n        this.code = code;\n    }\n}\n\n// Использование\nif (balance.compareTo(amount) < 0) {\n    throw new PaymentProcessingException(id, INSUFFICIENT_FUNDS,\n        "Недостаточно средств для платежа " + id);\n}</code></pre>\n\n<b>try-with-resources:</b>\n<pre><code>try (var conn = dataSource.getConnection();\n     var stmt = conn.prepareStatement(sql)) {\n    // ресурсы закроются автоматически\n} catch (SQLException e) {\n    throw new PaymentProcessingException(id, DB_ERROR, e.getMessage());\n}</code></pre>\n\n<b>Multi-catch:</b> <code>catch (IOException | SQLException e)</code>\n\n<b>На собесе:</b> когда использовать checked vs unchecked? Как правильно логировать исключения (не терять stacktrace)?',hot:1,lvl:1},
    {q:'Checked vs Unchecked исключения',a:'<b>Checked</b> (наследники Exception, не RuntimeException):\n• Обязательно обрабатывать: try-catch или throws\n• IOException, SQLException, ClassNotFoundException\n• Для recoverable ситуаций\n\n<b>Unchecked</b> (RuntimeException):\n• Не обязательно объявлять\n• NullPointerException, IllegalArgumentException, IndexOutOfBounds\n• Ошибки программиста\n\nСовременный подход: предпочитать unchecked (Spring использует unchecked).',lvl:1},
    {q:'try-with-resources',a:'Автоматически закрывает AutoCloseable ресурсы:\n\n<pre><code>try (var conn = dataSource.getConnection();\n     var stmt = conn.prepareStatement(sql)) {\n    // использование\n} // conn и stmt закроются автоматически</code></pre>\n\nЕсли исключение в try И в close — основное сохраняется, close добавляется как suppressed.\nJava 9+: можно использовать effectively final переменные.',lvl:2},
    {q:'Как создать пользовательское исключение?',a:'<pre><code>// Checked\npublic class PaymentException extends Exception {\n    private final String paymentId;\n    public PaymentException(String msg, String paymentId) {\n        super(msg);\n        this.paymentId = paymentId;\n    }\n}\n\n// Unchecked (рекомендуется)\npublic class PaymentNotFoundException extends RuntimeException {\n    public PaymentNotFoundException(String id) {\n        super("Payment not found: " + id);\n    }\n}</code></pre>',lvl:2},
    {s:'Сериализация и клонирование'},
    {q:'Сериализация в Java',a:'Преобразование объекта в поток байтов.\n\n• <b>Serializable</b> — маркерный интерфейс\n• serialVersionUID — версия класса\n• transient — поле не сериализуется\n• Кастомизация: writeObject()/readObject()\n• Singleton проблема: readResolve()\n\nСовременные альтернативы: Jackson (JSON), Protobuf, Avro (Kafka).\nJava-сериализация — legacy и небезопасна.',lvl:2},
    {q:'Клонирование объектов',a:'<b>Shallow copy</b> (поверхностное): clone() копирует ссылки, не объекты.\n<b>Deep copy</b> (глубокое): копирует все вложенные объекты.\n\nСпособы глубокого копирования:\n1. Конструктор копирования (рекомендуемый)\n2. Сериализация/десериализация\n3. Ручное клонирование всех полей\n\nCloneable + clone() считается broken API (Bloch). Используй copy constructor.',lvl:2},

    {q:'Java 9-11: ключевые изменения',a:'Важный период: переход с 6-месячного кадентса, смена лицензионной модели Oracle JDK, Java 11 — первый LTS после 8.\n\n<b>=== Java 9 (сентябрь 2017) ===</b>\n\n<b>Модульная система (JPMS, Jigsaw — JEP 261)</b>\n<pre><code>// module-info.java\nmodule com.example.payment {\n    requires java.base;\n    requires spring.core;\n    exports com.example.payment.api;        // видим снаружи\n    // com.example.payment.internal         // НЕ видим даже если public\n    opens com.example.payment.dto to jackson.databind; // для reflection\n}</code></pre>\nОграничения: публичный класс может быть невидим снаружи модуля. Изменилась семантика <code>public</code>.\n\n<b>Факторные методы коллекций:</b>\n<pre><code>List&lt;Integer&gt; list = List.of(1, 2, 3);       // immutable\nMap&lt;String,Integer&gt; map = Map.of("a", 1);\nSet&lt;String&gt; set = Set.of("x", "y");\n// Попытка add/put → UnsupportedOperationException</code></pre>\n\n<b>Другие фичи Java 9:</b>\n• <b>JShell</b> — REPL (<code>jshell</code> в терминале)\n• <b>Private методы в интерфейсах</b> — для переиспользования внутри default-методов\n• <b>Process API</b>: <code>ProcessHandle.current()</code>, <code>children()</code>, <code>destroy()</code>\n• <b>Flow API</b> — <code>Flow.Publisher/Subscriber</code> для reactive streams\n• <b>Stream улучшения</b>: <code>takeWhile</code>, <code>dropWhile</code>, <code>iterate</code> с предикатом\n• <b>Try-with-resources</b> — можно использовать effectively final переменные\n• <b>Optional.ifPresentOrElse, Optional.or, Optional.stream</b>\n• <b>G1</b> становится default GC\n\n<b>=== Java 10 (март 2018) ===</b>\n\n<b>Local-variable type inference — <code>var</code> (JEP 286):</b>\n<pre><code>var list = new ArrayList&lt;String&gt;();  // List&lt;String&gt;\nvar map = Map.of("a", 1);             // Map&lt;String,Integer&gt;\nfor (var entry : map.entrySet()) { }  // Map.Entry&lt;String,Integer&gt;\n\n// НЕЛЬЗЯ:\n// var x = null;       // тип не определим\n// var x = () -&gt; 42;   // лямбда\n// var[] arr = ...;    // массивы</code></pre>\nИспользуется ТОЛЬКО для локальных переменных. В методах, полях класса — нельзя.\n\n<b>Другие:</b>\n• <code>List.copyOf</code>, <code>Set.copyOf</code>, <code>Map.copyOf</code> — immutable-копии\n• <code>Optional.orElseThrow()</code> без аргументов\n• <b>Application Class-Data Sharing (AppCDS)</b> — ускорение старта\n• <b>Experimental ZGC</b>\n\n<b>=== Java 11 (сентябрь 2018, LTS) ===</b>\n\nПервый LTS после Java 8. Начало «бесплатной» OpenJDK эпохи (Oracle JDK 11+ платный для коммерции).\n\n<b>HTTP Client API (JEP 321)</b> — финализирован\n<pre><code>HttpClient client = HttpClient.newBuilder()\n    .version(HttpClient.Version.HTTP_2)\n    .connectTimeout(Duration.ofSeconds(10))\n    .build();\n\nHttpRequest request = HttpRequest.newBuilder()\n    .uri(URI.create("https://api.example.com/users/1"))\n    .header("Authorization", "Bearer " + token)\n    .GET()\n    .build();\n\nHttpResponse&lt;String&gt; response = client.send(request, BodyHandlers.ofString());\n// Async:\nclient.sendAsync(request, BodyHandlers.ofString())\n    .thenApply(HttpResponse::body)\n    .thenAccept(System.out::println);</code></pre>\nЗаменяет устаревший <code>HttpURLConnection</code>. Поддерживает HTTP/2, WebSocket.\n\n<b>Новые методы String:</b>\n<pre><code>"  hi  ".isBlank();           // true\n"  hi  ".strip();             // "hi" — учитывает Unicode whitespace\n"  hi  ".stripLeading();      // "hi  "\n"  hi  ".stripTrailing();     // "  hi"\n"a\\nb\\nc".lines();            // Stream&lt;String&gt; — [a, b, c]\n"abc".repeat(3);              // "abcabcabc"\nFiles.readString(Path.of("file.txt")); // вся строка одной операцией\nFiles.writeString(path, "content");</code></pre>\n\n<b>Single-file source launcher (JEP 330):</b>\n<pre><code>// Hello.java\npublic class Hello {\n    public static void main(String[] args) {\n        System.out.println("Hi");\n    }\n}\n\n$ java Hello.java   // без компиляции!</code></pre>\n\n<b>Var для лямбд:</b>\n<pre><code>list.stream().map((var s) -&gt; s.toUpperCase()); // для @аннотаций на аргументах</code></pre>\n\n<b>Удалено в Java 11:</b>\n• Java EE модули (javax.xml.bind, javax.annotation, javax.xml.ws, CORBA, JavaFX)\n• Если нужны — подключать отдельные зависимости (jakarta.xml.bind-api)\n• Java Web Start, Applets\n\n<b>Новые GC:</b> Epsilon (no-op, для тестов), <b>ZGC</b> experimental (low pause, &lt;10ms)\n\n<b>Лицензионная революция:</b>\n• Oracle JDK 11+ — платный для production\n• OpenJDK 11 — свободно, но обновления 6 месяцев\n• Eclipse Temurin (AdoptOpenJDK), Azul Zulu, Amazon Corretto — бесплатные дистрибутивы с LTS поддержкой\n\n<b>На собесе:</b>\n• Почему var нельзя для полей? (вывод типов только локально)\n• Чем List.of лучше new ArrayList()? (immutable, компактнее в памяти)\n• Что принципиально изменилось в Java 9? (модульная система + сохранение совместимости с classpath)\n• Зачем миграция с Java 8? (LTS, производительность, безопасность, новый синтаксис)',lvl:2},
    {q:'Java 12-16: ключевые изменения',a:'<b>Java 12:</b> Switch expressions (preview), Collectors.teeing()\n<b>Java 13:</b> Text blocks (preview)\n<b>Java 14:</b> Pattern matching instanceof (preview), Records (preview), NullPointerExceptions (helpful)\n<b>Java 15:</b> Text blocks (final), Sealed classes (preview), ZGC/Shenandoah production\n<b>Java 16:</b> Records (final), Pattern matching instanceof (final), Stream.toList()',lvl:2},
    {q:'Java 17 (LTS)',a:'Java 17 — <b>Long-Term Support</b> релиз (сентябрь 2021). LTS — бесплатные обновления до ~2029, многие компании мигрировали с 8/11.\n\n<b>Главные фичи (finalized):</b>\n\n<b>1. Sealed classes (JEP 409)</b> — ограничение наследования\n<pre><code>public sealed class Shape permits Circle, Square, Triangle { }\npublic final class Circle extends Shape { }\npublic final class Square extends Shape { }\npublic non-sealed class Triangle extends Shape { } // продолжает быть extendable</code></pre>\nЗачем: exhaustive pattern matching (switch без default), ограничение API.\n\n<b>2. Pattern matching for instanceof (JEP 394)</b>\n<pre><code>// Было:\nif (obj instanceof String) {\n    String s = (String) obj;\n    doSomething(s);\n}\n\n// Стало:\nif (obj instanceof String s) {\n    doSomething(s);\n}</code></pre>\n\n<b>3. Records (JEP 395)</b> — immutable data carriers\n<pre><code>public record Point(int x, int y) { }\n// Автоматически: конструктор, x(), y(), equals, hashCode, toString\n// Неявно final, все поля private final</code></pre>\n\n<b>4. Text blocks (JEP 378)</b> — многострочные строки\n<pre><code>String json = """\n    {\n        "id": 1,\n        "name": "Java"\n    }\n    """;</code></pre>\n\n<b>5. Switch expressions (JEP 361)</b>\n<pre><code>String label = switch (day) {\n    case MONDAY, FRIDAY, SUNDAY -&gt; "weekday-ish";\n    case TUESDAY -&gt; "gym day";\n    case THURSDAY, SATURDAY -&gt; "rest";\n    case WEDNESDAY -&gt; {\n        String s = compute();\n        yield s; // для блоков — yield\n    }\n};</code></pre>\nПреимущества над старым switch: выражение (возвращает значение), нет fall-through, exhaustive check, можно несколько case через запятую.\n\n<b>6. Helpful NullPointerException (JEP 358)</b>\n<pre><code>// Было: NullPointerException в строке 42\n// Стало: Cannot invoke "String.length()" because "user.address" is null</code></pre>\nПриходит прямо с указанием того, что именно было null.\n\n<b>Удалено / deprecated:</b>\n• <b>CMS GC</b> удалён (в Java 14)\n• <b>Security Manager</b> deprecated для удаления\n• <b>Applets</b> удалены\n• Internal JDK API закрыты — strong encapsulation (<code>--add-opens</code> для доступа)\n\n<b>Другие улучшения:</b>\n• <b>Foreign Function &amp; Memory API</b> (incubator, финализировано в Java 22)\n• <b>Vector API</b> (incubator)\n• <b>macOS/AArch64 поддержка</b> (Apple M1)\n• <b>Новые классы в Random</b> — RandomGenerator, L128X256MixRandom и др.\n• <b>Deprecation of Applets</b>\n• <b>Context-Specific Deserialization Filters</b>\n\n<b>Пакетные изменения (с 9 до 17):</b>\n• <code>var</code> (Java 10) — type inference для локальных переменных\n• HTTP Client API (Java 11, финальный)\n• Single-file source launcher (Java 11): <code>java Hello.java</code>\n• <code>List.of</code>, <code>Map.of</code> (Java 9)\n• Все «incubator» в 9-16 постепенно становятся финальными\n\n<b>Миграция с Java 8 — ключевые моменты:</b>\n• <code>javax.*</code> → <code>jakarta.*</code> (не в Java, но часто связано с апдейтом)\n• Reflection на internal JDK API — сломается без <code>--add-opens</code>\n• Удалённый javax.xml.bind (JAXB) — нужна отдельная зависимость\n• Security Manager deprecated — если использовали\n\n<b>На собесе:</b>\n• Главные фичи Java 17? (sealed, records, pattern matching, text blocks, switch expressions)\n• Зачем sealed? (exhaustive check, ограничение API)\n• Чем record лучше класса с getter/setter? (автогенерация equals/hashCode/toString, immutable, компактность)\n• Какой GC по умолчанию в Java 17? (G1)',lvl:2},
    {q:'Java 21 (LTS)',a:'Главный релиз за последние годы:\n\n<b>Virtual Threads (Project Loom) — final!</b>\n<pre><code>// Было: ограниченный пул\nvar pool = Executors.newFixedThreadPool(200);\n\n// Стало: миллион лёгких потоков\nvar executor = Executors.newVirtualThreadPerTaskExecutor();\nexecutor.submit(() -> {\n    var result = httpClient.send(request); // блокирующий, но не занимает OS thread\n});</code></pre>\n\n<b>Pattern Matching for switch (final):</b>\n<pre><code>Object obj = getResponse();\nreturn switch (obj) {\n    case Integer i -> "число: " + i;\n    case String s when s.length() > 10 -> "длинная строка";\n    case String s -> "строка: " + s;\n    case null -> "null";\n    default -> "другое";\n};</code></pre>\n\n<b>Record Patterns:</b>\n<pre><code>if (obj instanceof Point(int x, int y)) {\n    System.out.println(x + ", " + y); // деструктуризация!\n}</code></pre>\n\n<b>Sequenced Collections:</b>\n<pre><code>var list = new ArrayList<>(List.of("a","b","c"));\nlist.getFirst(); // "a" — вместо list.get(0)\nlist.getLast();  // "c" — вместо list.get(list.size()-1)\nlist.reversed(); // ["c","b","a"] — view, не копия</code></pre>\n\n<b>Также:</b> String Templates (preview), Structured Concurrency (preview), Scoped Values (preview).\n\n<b>На собесе:</b> что такое Virtual Threads и зачем? Как включить в Spring Boot? (<code>spring.threads.virtual.enabled=true</code>)',hot:1,lvl:2},
    {q:'Что такое var?',a:'Вывод типов локальных переменных (Java 10):\n<pre><code>var list = new ArrayList<String>(); // ArrayList<String>\nvar stream = list.stream(); // Stream<String>\nvar entry = Map.entry("key", 1); // Map.Entry<String,Integer></code></pre>\n\nГде нельзя: поля класса, параметры методов, return type.\nГде можно: локальные переменные, for-each, лямбды (Java 11).\nНе злоупотреблять: <code>var x = someMethod();</code> — неочевидный тип.',lvl:2},
    {q:'Что такое модульная система (Java 9)?',a:'Project Jigsaw — модули для структурирования JDK и приложений.\n\n<code>module-info.java</code>:\n<pre><code>module com.myapp {\n    requires java.sql;\n    requires spring.core;\n    exports com.myapp.api;\n}</code></pre>\n\n• requires — зависимости\n• exports — открытые пакеты\n• opens — для рефлексии (Hibernate, Spring)\n\nНа практике многие проекты работают без модулей (classpath).',lvl:2},
  
    {s:'Generics'},
    {q:'Generics — основы',a:'Параметризация типов — type safety без приведения типов.\n\n<b>Без дженериков (Java 1.4):</b>\n<pre><code>List list = new ArrayList();\nlist.add("hello");\nlist.add(42); // компилируется!\nString s = (String) list.get(1); // ClassCastException в runtime!</code></pre>\n\n<b>С дженериками:</b>\n<pre><code>List<String> list = new ArrayList<>();\nlist.add("hello");\nlist.add(42); // ошибка компиляции! type safety\nString s = list.get(0); // без приведения</code></pre>\n\n<b>Generic класс:</b>\n<pre><code>public class Result<T> {\n    private final T value;\n    private final String error;\n\n    public static <T> Result<T> ok(T value) {\n        return new Result<>(value, null);\n    }\n    public static <T> Result<T> fail(String error) {\n        return new Result<>(null, error);\n    }\n}\n\nResult<Payment> result = paymentService.process(request);</code></pre>\n\n<b>Type Erasure:</b> при компиляции <code>List<String></code> → <code>List</code>. Информация о типе стирается.\n\n<b>Ограничения из-за erasure:</b>\n• Нельзя: <code>new T()</code>, <code>new T[]</code>\n• Нельзя: <code>instanceof List<String></code>\n• Нельзя: перегрузка <code>foo(List<String>)</code> и <code>foo(List<Integer>)</code>\n\n<b>На собесе:</b> что такое type erasure и какие ограничения накладывает?',lvl:1,hot:1},
    {q:'Wildcards и PECS',a:'<b>Wildcards — типы подстановки:</b>\n• <code>?</code> — любой тип (unbounded)\n• <code>? extends T</code> — T или подтипы (upper bound) — ЧТЕНИЕ\n• <code>? super T</code> — T или супертипы (lower bound) — ЗАПИСЬ\n\n<b>PECS — Producer Extends, Consumer Super:</b>\n<pre><code>// Producer — ЧИТАЕМ из коллекции → extends\nvoid printAll(List<? extends Payment> payments) {\n    for (Payment p : payments) { // OK — читаем как Payment\n        System.out.println(p.getAmount());\n    }\n    // payments.add(new CardPayment()); // ОШИБКА! нельзя писать\n}\n\n// Consumer — ПИШЕМ в коллекцию → super\nvoid addDefaults(List<? super CardPayment> list) {\n    list.add(new CardPayment()); // OK — пишем CardPayment\n    // CardPayment p = list.get(0); // ОШИБКА! тип чтения = Object\n}\n\n// Пример из JDK:\npublic static <T> void copy(\n    List<? super T> dest,    // consumer — пишем\n    List<? extends T> src    // producer — читаем\n)</code></pre>\n\n<b>Мнемоника:</b>\n• extends = out = producer = можно только читать\n• super = in = consumer = можно только писать\n\n<b>На собесе:</b> напишите generic метод, который копирует элементы из одного списка в другой. Почему нельзя <code>List<Object> = List<String></code>? (дженерики инвариантны)',lvl:2,hot:1},
    {q:'Стирание типов (Type Erasure)',a:'При компиляции дженерики заменяются на Object (или bound).\n\n<code>List<String></code> → <code>List</code> в байт-коде.\n\n<b>Следствия:</b>\n• Нельзя: <code>new T()</code>, <code>new T[]</code>, <code>instanceof List<String></code>\n• Нельзя: перегрузка по generic type: foo(List<String>) и foo(List<Integer>) — коллизия\n• Runtime: <code>List<String></code> и <code>List<Integer></code> — один класс\n\nОбходы: Class<T> параметр, TypeReference (Jackson), reified (Kotlin).',lvl:2},
    {s:'Date/Time API (Java 8+)'},
    {q:'Date/Time API — основные классы',a:'java.time пакет (Java 8+) — замена устаревших Date/Calendar:\n\n<pre><code>// Основные классы\nLocalDate date = LocalDate.of(2026, 4, 10);      // без времени\nLocalTime time = LocalTime.of(14, 30, 0);         // без даты\nLocalDateTime dt = LocalDateTime.now();            // дата + время, без зоны\nZonedDateTime zdt = ZonedDateTime.now(ZoneId.of("Europe/Moscow"));\nInstant instant = Instant.now();                   // UTC, epoch millis\n\n// Арифметика\nLocalDate tomorrow = date.plusDays(1);\nLocalDate nextMonth = date.plus(1, ChronoUnit.MONTHS);\n\n// Период и длительность\nPeriod period = Period.between(startDate, endDate); // годы/месяцы/дни\nDuration duration = Duration.between(startTime, endTime); // часы/мин/сек\n\n// Форматирование\nDateTimeFormatter fmt = DateTimeFormatter.ofPattern("dd.MM.yyyy HH:mm");\nString s = dt.format(fmt); // "10.04.2026 14:30"\nLocalDateTime parsed = LocalDateTime.parse(s, fmt);\n\n// Для БД (JPA/Hibernate)\n@Column\nprivate Instant createdAt;  // рекомендуется — UTC, однозначный\n\n// Для API (JSON)\n// Jackson: JavaTimeModule автоматически сериализует в ISO-8601</code></pre>\n\n<b>Все классы immutable и thread-safe!</b>\n\n<b>Совет:</b> храни в БД как Instant (UTC). Конвертируй в зону пользователя при отображении.\n\n<b>На собесе:</b> чем Instant отличается от LocalDateTime? (Instant — точка на временной шкале, LocalDateTime — без зоны, неоднозначный)',lvl:1,hot:1},
    {q:'Java IO vs NIO',a:'<b>IO (Blocking):</b>\n• InputStream/OutputStream — байтовые потоки\n• Reader/Writer — символьные потоки\n• Блокирующий: поток ждёт завершения операции\n\n<b>NIO (Non-blocking, Java 7+):</b>\n• Channel + Buffer — двусторонний\n• Selector — мультиплексирование (один поток обслуживает много каналов)\n• Path, Files — удобная работа с файловой системой\n• Files.readString(), Files.writeString() (Java 11)\n\nДля файлов: NIO (Files, Path). Для сетевых серверов: NIO или Netty.',lvl:2},
]},

    {s:'Иерархия'},
    {q:'Иерархия коллекций Java',a:'<pre><code>Iterable\n└── Collection\n    ├── List (упорядоч., дубли OK)\n    │   ├── ArrayList   — массив, O(1) доступ\n    │   ├── LinkedList  — двусвязный список\n    │   └── Vector      — synchronized (legacy)\n    ├── Set (без дубликатов)\n    │   ├── HashSet        — HashMap внутри, O(1)\n    │   ├── LinkedHashSet  — порядок вставки\n    │   ├── TreeSet        — отсортированный, O(log n)\n    │   └── EnumSet        — битовая маска для enum\n    └── Queue / Deque\n        ├── ArrayDeque     — стек и очередь\n        ├── PriorityQueue  — по приоритету (heap)\n        └── LinkedList     — тоже Deque\n\nMap (НЕ Collection!)\n├── HashMap          — O(1), без порядка\n├── LinkedHashMap    — порядок вставки\n├── TreeMap          — отсортированный, O(log n)\n├── ConcurrentHashMap — потокобезопасный\n└── EnumMap          — для enum ключей</code></pre>\n\n<b>Java 21 — Sequenced Collections:</b>\nSequencedCollection: addFirst/Last(), getFirst/Last(), reversed()\nLinkedHashSet, LinkedHashMap теперь реализуют Sequenced интерфейсы.\n\n<b>На собесе:</b> почему Map не наследует Collection? (разная семантика: Collection хранит элементы, Map — пары ключ-значение)',hot:1,lvl:2},
    {q:'Collection vs Collections',a:'<b>Classic interview trick question</b> — разные сущности с похожими именами.\n\n<b>Collection&lt;T&gt;</b> (единственное число) — <b>интерфейс</b>, корень иерархии коллекций в <code>java.util</code>.\n<pre><code>public interface Collection&lt;E&gt; extends Iterable&lt;E&gt; {\n    boolean add(E e);\n    boolean remove(Object o);\n    int size();\n    boolean isEmpty();\n    boolean contains(Object o);\n    Iterator&lt;E&gt; iterator();\n    Object[] toArray();\n    Stream&lt;E&gt; stream(); // default с Java 8\n    // ... и ещё десяток методов\n}\n\n// Иерархия:\nCollection\n  ├─ List (упорядоченный, допускает дубли)\n  │   ├─ ArrayList, LinkedList, Vector, Stack\n  ├─ Set (не допускает дубли)\n  │   ├─ HashSet, LinkedHashSet, TreeSet\n  └─ Queue / Deque\n      ├─ PriorityQueue, ArrayDeque, LinkedList</code></pre>\n\n<b>Collections</b> (множественное число) — <b>утилитный класс</b> со static методами для работы с коллекциями. Аналог <code>Arrays</code> для массивов.\n\n<pre><code>// Сортировка\nCollections.sort(list);                      // естественный порядок\nCollections.sort(list, comparator);\nCollections.reverse(list);\nCollections.shuffle(list);\n\n// Поиск и агрегация\nint idx = Collections.binarySearch(sortedList, key);\nString max = Collections.max(list);\nString min = Collections.min(list);\nint count = Collections.frequency(list, "x");\nboolean disjoint = Collections.disjoint(list1, list2); // без пересечений?\n\n// Неизменяемые обёртки\nList&lt;T&gt; immutable = Collections.unmodifiableList(list);\nSet&lt;T&gt; immutable = Collections.unmodifiableSet(set);\nMap&lt;K,V&gt; immutable = Collections.unmodifiableMap(map);\n\n// Потокобезопасные обёртки (синхронизированные)\nList&lt;T&gt; sync = Collections.synchronizedList(list);\nMap&lt;K,V&gt; sync = Collections.synchronizedMap(map);\n// Любой итерация должна быть в synchronized блоке!\n\n// Пустые коллекции (singleton)\nList&lt;T&gt; empty = Collections.emptyList();\nMap&lt;K,V&gt; empty = Collections.emptyMap();\nSet&lt;T&gt; empty = Collections.emptySet();\n\n// Коллекции с одним элементом\nList&lt;T&gt; one = Collections.singletonList(item);\nSet&lt;T&gt; one = Collections.singleton(item);\nMap&lt;K,V&gt; one = Collections.singletonMap(key, value);\n\n// Наполнение\nCollections.fill(list, "X");              // заменить все на "X"\nCollections.copy(dest, src);\nCollections.swap(list, i, j);\nCollections.nCopies(5, "hello");          // [hello, hello, hello, hello, hello]\nCollections.addAll(list, "a", "b", "c");\nCollections.replaceAll(list, "old", "new");\nCollections.rotate(list, 2);              // циклический сдвиг\n\n// Преобразование\nEnumeration&lt;T&gt; e = Collections.enumeration(list);\nList&lt;T&gt; fromEnum = Collections.list(enumeration);</code></pre>\n\n<b>Сводная таблица:</b>\n<pre><code>Critical          | Collection        | Collections\n──────────────────┼───────────────────┼─────────────────\nТип               | interface         | class (final)\nПакет             | java.util         | java.util\nМножественное     | нет               | да\nЭкземпляры        | да (через impl)   | нет (final + private ctor)\nПримеры использ.  | List&lt;T&gt;, Set&lt;T&gt;   | Collections.sort(...)</code></pre>\n\n<b>С Java 9+ — лучше использовать factory методы самих интерфейсов:</b>\n<pre><code>// Старое:\nList&lt;Integer&gt; list = Collections.unmodifiableList(\n    Arrays.asList(1, 2, 3));\n\n// Новое (Java 9+):\nList&lt;Integer&gt; list = List.of(1, 2, 3);     // immutable\nMap&lt;String,Integer&gt; map = Map.of("a", 1);\nSet&lt;Integer&gt; set = Set.of(1, 2, 3);</code></pre>\n\n<b>Современная альтернатива synchronized-коллекциям — java.util.concurrent:</b>\n<pre><code>// Синхронизированные обёртки (старые)\nMap&lt;K,V&gt; sync = Collections.synchronizedMap(new HashMap&lt;&gt;());\n// Вся карта — один lock, медленно при contention\n\n// ConcurrentHashMap (современное)\nMap&lt;K,V&gt; concurrent = new ConcurrentHashMap&lt;&gt;();\n// Segment-locking (было) / lock-free (сейчас), быстрее при contention</code></pre>\n\n<b>На собесе:</b>\n• Что такое Collection? (интерфейс)\n• Что такое Collections? (утилитный класс со static методами)\n• Отличие List.of(...) от Collections.unmodifiableList(...)? (первое — compact immutable, второе — обёртка над mutable)\n• Почему synchronizedList медленнее ConcurrentHashMap? (один lock на всю коллекцию)',lvl:2},
    {s:'List'},
    {q:'ArrayList — устройство и сложность',a:'Внутри — массив <code>Object[] elementData</code>.\n\n<b>Создание:</b>\n<pre><code>new ArrayList<>()     // elementData = {} (пустой массив!)\nnew ArrayList<>(100)  // elementData = new Object[100]\n// Первый add() в пустой → resize до 10</code></pre>\n\n<b>Расширение:</b> newCapacity = oldCapacity + (oldCapacity >> 1) — рост ×1.5\n<pre><code>10 → 15 → 22 → 33 → 49 → 73 → 109 → ...</code></pre>\nВнутри: Arrays.copyOf() → System.arraycopy() — O(n).\n\n<b>Сложность операций:</b>\n<pre><code>get(i)          O(1)    — прямой доступ по индексу\nset(i, e)       O(1)    — прямая замена\nadd(e)          O(1)*   — в конец (* амортизированная, resize = O(n))\nadd(i, e)       O(n)    — сдвиг элементов вправо\nremove(i)       O(n)    — сдвиг элементов влево\ncontains(e)     O(n)    — линейный поиск\nindexOf(e)      O(n)    — линейный поиск</code></pre>\n\n<b>Совет:</b> если знаешь размер заранее — указывай capacity:\n<code>new ArrayList<>(expectedSize)</code> — избегаешь лишних resize.\n\n<b>Память:</b> ~4 байта на ссылку + overhead массива. Самая эффективная коллекция для 99% задач.\n\n<b>На собесе:</b> что происходит при add() когда массив полон? (создаётся новый ×1.5, копируются элементы, старый → GC)',hot:1,lvl:2},
    {q:'ArrayList vs LinkedList',a:'<pre><code>Критерий         ArrayList        LinkedList\n─────────────────────────────────────────────\nСтруктура        Массив           Двусвязный список\nget(i)           O(1)             O(n)\nset(i, e)        O(1)             O(n)\nadd(e) конец     O(1)*            O(1)\nadd(0, e) начало O(n)             O(1)\nadd(i, e)        O(n)             O(n)**\nremove(i)        O(n)             O(n)**\ncontains(e)      O(n)             O(n)\nПамять/элемент   ~4 байта (ref)   ~48 байт (Node)\nCPU cache        Отличный         Плохой\nIterator.remove  O(n)             O(1)</code></pre>\n* амортизированная  ** O(1) если есть итератор на позиции\n\n<b>Почему ArrayList почти всегда лучше:</b>\n• CPU cache locality — элементы рядом в памяти, prefetch работает\n• Меньше памяти: 4 байта vs 48 байт на элемент\n• System.arraycopy() — нативный, очень быстрый\n\n<b>Когда LinkedList:</b>\n• Очередь (но ArrayDeque лучше!)\n• Частая вставка/удаление при итерации (iterator.remove())\n• В реальности: практически никогда\n\n<b>ArrayDeque</b> — лучше LinkedList для стека и очереди:\n• На массиве, быстрее, меньше памяти\n• Нет null элементов\n\n<b>На собесе:</b> когда вы реально использовали LinkedList? (почти никогда — это правильный ответ)',hot:1,lvl:2},
    {q:'Как удалить элемент из ArrayList при итерации?',a:'<b>НЕПРАВИЛЬНО — ConcurrentModificationException:</b>\n<pre><code>for (String s : list) {\n    if (s.equals("remove_me")) list.remove(s); // CME!\n}</code></pre>\n\n<b>ПРАВИЛЬНО — 4 способа:</b>\n\n1. <b>removeIf (Java 8+) — лучший:</b>\n<pre><code>list.removeIf(s -> s.equals("remove_me"));\npayments.removeIf(p -> p.getStatus() == FAILED);</code></pre>\n\n2. <b>Iterator.remove():</b>\n<pre><code>var it = list.iterator();\nwhile (it.hasNext()) {\n    if (it.next().equals("remove_me")) it.remove();\n}</code></pre>\n\n3. <b>Обратный цикл по индексу:</b>\n<pre><code>for (int i = list.size() - 1; i >= 0; i--) {\n    if (list.get(i).equals("remove_me")) list.remove(i);\n}</code></pre>\n\n4. <b>Stream + filter (новый список):</b>\n<pre><code>list = list.stream()\n    .filter(s -> !s.equals("remove_me"))\n    .collect(Collectors.toList());</code></pre>\n\n<b>На собесе:</b> какой способ самый эффективный? (removeIf — O(n), один проход, без создания новых объектов)',lvl:2},
    {q:'Vector и Stack — почему deprecated?',a:'<b>Vector</b> — synchronized ArrayList. Медленный из-за блокировки каждого метода. Замена: ArrayList + Collections.synchronizedList() или CopyOnWriteArrayList.\n\n<b>Stack extends Vector</b> — нарушает LSP, позволяет random access. Замена: <code>ArrayDeque</code> как стек.\n\nОба — legacy классы из Java 1.0.',lvl:2},
    {q:'Оценка памяти: byte в LinkedList vs ArrayList',a:'Классический вопрос «чтобы показать глубокое понимание JVM». Расчёт на 64-битной JVM с compressed oops.\n\n<b>ArrayList&lt;Byte&gt;:</b>\n<pre><code>Внутри — Object[] elementData\n\nПамять на один элемент:\n• Ссылка в массиве (compressed oop) = 4 байта\n• Byte объект (wrapper) = Object header 12 + byte 1 + padding 3 = 16 байт\n────────────────────────────────────────────────────\nИТОГО: 4 + 16 = 20 байт на элемент\n\n// + оверхед самого ArrayList: 16 (header) + int size + Object[] ref = ~40 байт\n// (но это one-time)</code></pre>\n\n<b>LinkedList&lt;Byte&gt;:</b>\n<pre><code>Внутри — двусвязный список из Node\n\nstatic class Node&lt;E&gt; {\n    E item;\n    Node&lt;E&gt; next;\n    Node&lt;E&gt; prev;\n}\n\nПамять на один элемент:\n• Node объект: Object header 12 + ссылка item 4 + next 4 + prev 4 + padding 8 = 32 байта\n• Byte объект (wrapper) = 16 байт\n────────────────────────────────────────────────────\nИТОГО: 32 + 16 = 48 байт на элемент\n// + сама LinkedList: 16 (header) + int size + 2 Node refs = ~32 байта</code></pre>\n\n<b>Вывод:</b>\n• <code>LinkedList</code>: ~48 байт на байт — <b>48x overhead</b>!\n• <code>ArrayList</code>: ~20 байт на байт — <b>20x overhead</b>\n• Просто <code>byte[]</code> массив: 1 байт на байт!\n\n<b>Для сравнения:</b>\n<pre><code>byte[] array = new byte[1_000_000];       // ~1 MB\nList&lt;Byte&gt; arrList = new ArrayList&lt;&gt;(1_000_000); // ~20 MB (!)\nList&lt;Byte&gt; linked = new LinkedList&lt;&gt;();          // ~48 MB после заполнения\n// 48x разница по сравнению с byte[]!</code></pre>\n\n<b>Почему такой оверхед:</b>\n\n<b>1. Autoboxing</b> — каждый <code>byte</code> становится объектом <code>Byte</code>:\n• Object header: 12 байт (compressed) / 16 байт (без compressed oops)\n• Само значение byte: 1 байт\n• Выравнивание до 8 байт: padding = 3 байта\n• Итого: 16 байт на wrapper\n\nИсключение: Byte cache для значений от -128 до 127 (все Byte умещаются в кэш). Но это не сильно помогает с памятью, так как ссылки всё равно нужны.\n\n<b>2. Ссылки</b> — в collections хранятся Object references, не примитивы. Каждая ссылка = 4 байта (compressed) или 8 байт.\n\n<b>3. LinkedList — ещё и Node-обёртки</b> с двумя указателями (prev, next).\n\n<b>Как оптимизировать память для примитивов:</b>\n\n<b>1. Массивы примитивов</b> — лучшее:\n<pre><code>byte[] bytes = new byte[1000]; // 1000 байт\nint[] ints = new int[1000];    // 4000 байт</code></pre>\n\n<b>2. Специализированные библиотеки:</b>\n• <b>Eclipse Collections</b> — IntArrayList, LongArrayList\n• <b>Koloboke</b>, <b>fastutil</b> — primitive collections\n• <b>HPPC</b>\n\n<pre><code>IntArrayList list = new IntArrayList();\nlist.add(5); // никакого Integer, просто int в массиве\n// В 4x раз меньше памяти чем List&lt;Integer&gt;</code></pre>\n\n<b>3. ByteBuffer</b> — off-heap или native память:\n<pre><code>ByteBuffer buf = ByteBuffer.allocateDirect(1_000_000);\n// Память вне heap, не трогается GC\nbuf.putInt(123);</code></pre>\n\n<b>Зачем знать эти цифры:</b>\n\n<b>Реальный кейс:</b> у вас в приложении есть счётчик запросов, и вы держите <code>List&lt;Long&gt;</code> с последними 1M timestamps. Это 32 MB памяти! Перевод на <code>long[]</code> — 8 MB, экономия 24 MB.\n\n<b>При больших объёмах важно:</b>\n• Cache-hits — меньше памяти = больше в L1/L2\n• GC pressure — меньше объектов = меньше work для GC\n• Heap size — в 10x разница может быть между OK и OOM\n\n<b>Когда использовать что:</b>\n• <b>Примитивы в heavy computations</b> — массивы, не collections\n• <b>Мало элементов, редкие операции</b> — ArrayList&lt;Integer&gt; удобнее\n• <b>Миллионы элементов</b> — IntArrayList из Eclipse Collections\n• <b>Off-heap, огромные данные</b> — ByteBuffer.allocateDirect или Chronicle Map\n\n<b>Проверить реальный размер:</b>\n<pre><code>// Через Java Agent\nInstrumentation.getObjectSize(obj);\n\n// Через jmap\njmap -histo &lt;pid&gt; | grep ArrayList\n\n// Через JOL (Java Object Layout)\nSystem.out.println(ClassLayout.parseInstance(new Byte((byte)0)).toPrintable());\n// Покажет точный layout с offset\\\'ами</code></pre>\n\n<b>На собесе:</b>\n• Сколько памяти займёт 1M byte в LinkedList? (~48 MB — в 48 раз больше массива!)\n• Почему autoboxing дорогой? (Object header 12 байт + padding до 8)\n• Как хранить миллионы примитивов эффективно? (массивы, Eclipse Collections, ByteBuffer)\n• Что такое compressed oops? (сжатие ссылок до 4 байт для heap &lt; 32 GB)',lvl:2},

    {q:'HashMap — устройство',a:'Массив бакетов <code>Node&lt;K,V&gt;[] table</code>. Default: 16 бакетов, load factor 0.75.\n\n<b>Процесс put(key, value) пошагово:</b>\n<pre><code>1. hash = key.hashCode() ^ (hashCode >>> 16)  // spread bits\n2. index = hash & (capacity - 1)               // вместо % (быстрее)\n3. table[index] == null?\n   → ДА: новый Node(hash, key, value, null)\n   → НЕТ: коллизия!\n     3a. Проверяем equals() по цепочке\n         → Нашли: заменяем value\n         → Не нашли: добавляем в конец цепочки\n     3b. Если цепочка >= 8 && capacity >= 64\n         → treeify: LinkedList → Red-Black Tree (O(n) → O(log n))\n     3c. Если цепочка >= 8 && capacity < 64\n         → resize вместо treeify\n4. Если size > capacity * loadFactor → resize (×2)</code></pre>\n\n<b>Пример с коллизией:</b>\n<pre><code>Map<String, Integer> map = new HashMap<>();\nmap.put("Aa", 1);  // hashCode("Aa") = 2112\nmap.put("BB", 2);  // hashCode("BB") = 2112 — коллизия!\n// Оба в одном бакете, но equals() различает</code></pre>\n\n<b>Resize:</b> capacity ×2, все элементы перехешируются (rehash). Дорого! Указывай initial capacity:\n<code>new HashMap<>(expectedSize * 4 / 3 + 1)</code>\n\n<b>Java 8 treeify:</b>\n• TREEIFY_THRESHOLD = 8 (список → дерево)\n• UNTREEIFY_THRESHOLD = 6 (дерево → список)\n• MIN_TREEIFY_CAPACITY = 64\n\n<b>На собесе:</b> зачем XOR с >>> 16? (spread bits — старшие биты влияют на младшие, меньше коллизий для плохих hashCode)',hot:1,lvl:2},
    {q:'TreeMap, LinkedHashMap, ConcurrentHashMap',a:'<b>TreeMap:</b> красно-чёрное дерево, ключи отсортированы.\n<pre><code>TreeMap<String, Integer> map = new TreeMap<>();\nmap.put("banana", 2);\nmap.put("apple", 1);\nmap.put("cherry", 3);\n// Итерация: apple → banana → cherry (отсортировано!)\n\n// NavigableMap методы:\nmap.floorKey("b");     // "banana" — ≤ "b" нет, ≤ "banana"\nmap.ceilingKey("b");   // "banana" — ≥ "b"\nmap.subMap("a", "c");  // {apple=1, banana=2}</code></pre>\nO(log n) для get/put/remove.\n\n<b>LinkedHashMap:</b> HashMap + двусвязный список = порядок вставки.\n<pre><code>// LRU Cache за 3 строки:\nclass LRUCache<K,V> extends LinkedHashMap<K,V> {\n    private final int maxSize;\n    LRUCache(int max) { super(max, 0.75f, true); this.maxSize = max; }\n    protected boolean removeEldestEntry(Map.Entry<K,V> e) {\n        return size() > maxSize;\n    }\n}</code></pre>\n\n<b>ConcurrentHashMap:</b> потокобезопасная без блокировки всей Map.\n<pre><code>ConcurrentHashMap<String, AtomicLong> counters = new ConcurrentHashMap<>();\n\n// Атомарные операции (ВАЖНО!):\ncounters.computeIfAbsent("payments", k -> new AtomicLong()).incrementAndGet();\ncounters.merge("errors", 1L, Long::sum); // атомарный increment\n\n// НЕ делай так:\nif (!map.containsKey(key)) { map.put(key, value); } // race condition!\n// Делай так:\nmap.putIfAbsent(key, value); // атомарно</code></pre>\n\nНЕ допускает null ключи/значения.\n\n<b>На собесе:</b> как ConcurrentHashMap обеспечивает потокобезопасность? (CAS + synchronized на бакете, не на всей Map)',lvl:2},
    {q:'Почему нельзя null в ConcurrentHashMap?',a:'В HashMap: <code>map.get(key) == null</code> может означать \"нет ключа\" ИЛИ \"значение null\".\n\nВ ConcurrentHashMap это создаёт race condition:\n1. Thread A: containsKey(k) → true\n2. Thread B: remove(k)\n3. Thread A: get(k) → null (ключ удалён!)\n\nЗапрет null убирает неоднозначность. Используй Optional или sentinel value.',lvl:2},
    {q:'Что будет если HashMap ключ мутабельный?',a:'<b>Объект \"потеряется\" в HashMap!</b>\n\n<pre><code>class MutableKey {\n    String name;\n    MutableKey(String n) { this.name = n; }\n    public int hashCode() { return name.hashCode(); }\n    public boolean equals(Object o) {\n        return o instanceof MutableKey mk && name.equals(mk.name);\n    }\n}\n\nMap<MutableKey, String> map = new HashMap<>();\nMutableKey key = new MutableKey("payment-1");\nmap.put(key, "value");           // hashCode = X → бакет A\n\nmap.get(key);                    // "value" — OK\n\nkey.name = "payment-2";          // ИЗМЕНИЛИ КЛЮЧ!\n// hashCode ИЗМЕНИЛСЯ → бакет B\n\nmap.get(key);                    // null! ищет в бакете B, а объект в A\nmap.containsKey(key);            // false!\nmap.size();                      // 1 — объект есть, но не достижим!\n// Утечка памяти: GC не удалит, т.к. Map ссылается</code></pre>\n\n<b>Правило:</b> ключи HashMap должны быть <b>immutable</b>:\n• String, Integer, Long, enum — OK\n• record — OK (immutable по дизайну)\n• Свой класс — сделай final поля, не меняй поля из equals/hashCode\n\n<b>На собесе:</b> часто просят \"что будет если...\" — рисуй бакеты и показывай как hashCode меняет бакет.',hot:1,lvl:2},
    {q:'Как итерироваться по Map?',a:'<pre><code>// entrySet — самый эффективный\nfor (Map.Entry<K,V> e : map.entrySet()) {\n    e.getKey(); e.getValue();\n}\n\n// forEach (Java 8+)\nmap.forEach((k, v) -> ...);\n\n// keySet (менее эффективно — дополнительный get)\nfor (K key : map.keySet()) { map.get(key); }\n\n// Stream\nmap.entrySet().stream()\n    .filter(e -> e.getValue() > 0)\n    .map(Map.Entry::getKey)\n    .toList();</code></pre>',lvl:2},
    {q:'Начальная ёмкость коллекций',a:'Знание default capacity помогает оптимизировать производительность — неправильный размер ведёт к множественным resize-операциям.\n\n<b>Default значения в JDK:</b>\n\n<b>ArrayList:</b>\n• <code>new ArrayList&lt;&gt;()</code> — внутренний массив <b>пустой</b> (с Java 7)\n• При первом <code>add()</code> — создаётся массив размера <b>10</b>\n• При переполнении — resize в <b>1.5x</b>: <code>newCapacity = oldCapacity + (oldCapacity &gt;&gt; 1)</code>\n\n<pre><code>// Сэкономит много resize:\nnew ArrayList&lt;&gt;(1000);\n\n// Последовательности capacity при default:\n10 -&gt; 15 -&gt; 22 -&gt; 33 -&gt; 49 -&gt; 73 -&gt; 109 -&gt; 163 -&gt; 244 -&gt; ... -&gt; 1000+\n// Для добавления 1000 элементов — 9 resize операций (+ 9 копирований всего массива)</code></pre>\n\n<b>HashMap:</b>\n• Default capacity: <b>16 бакетов</b>\n• Load factor: <b>0.75</b>\n• Resize порог: capacity * 0.75\n• Resize: удвоение (16 → 32 → 64 → 128...)\n• При resize пере-хэшируются ВСЕ элементы — очень дорого для больших Map\n\n<pre><code>// Стандартная формула: initialCapacity = expectedSize / 0.75 + 1\n// Округлить до ближайшей степени 2\n\nnew HashMap&lt;&gt;(capacity);  // или capacity можно поставить следующей степени 2\n\nЕсли ждём 1000 элементов:\n  1000 / 0.75 + 1 = ~1334 -&gt; округлить до 2048\n  new HashMap&lt;&gt;(2048);\n\n// С Java 19+ — простой способ:\nHashMap.newHashMap(1000); // сам считает правильный capacity</code></pre>\n\n<b>HashSet / LinkedHashSet:</b>\n• Внутри HashMap с фиктивным значением (PRESENT = Object)\n• Те же 16 и 0.75\n\n<b>LinkedHashMap:</b>\n• Те же параметры как HashMap (16, 0.75)\n• + двусвязный список для сохранения порядка\n\n<b>TreeMap:</b>\n• Нет capacity — красно-чёрное дерево, растёт динамически\n• Нет resize\n\n<b>StringBuilder / StringBuffer:</b>\n• Default: <b>16 символов</b>\n• Resize: (capacity + 1) * 2\n\n<pre><code>// Для больших строк всегда указывай\nStringBuilder sb = new StringBuilder(expectedLength);\n\n// Или сразу для конкретной работы:\nStringBuilder sb = new StringBuilder(json.length() * 2);</code></pre>\n\n<b>ArrayDeque:</b>\n• Default: <b>16</b>\n• Resize: удвоение\n\n<b>PriorityQueue:</b>\n• Default: <b>11</b>\n• Resize: 50% если capacity &lt; 64, иначе удвоение\n\n<b>Vector (legacy):</b>\n• Default: <b>10</b>\n• Resize: удвоение (если не задан capacityIncrement)\n\n<b>CopyOnWriteArrayList:</b>\n• Внутри Object[], растёт точно под размер — copy-on-write!\n• Каждый add создаёт новый массив на 1 больше → O(n) на вставку\n\n<b>ConcurrentHashMap:</b>\n• Default capacity: <b>16</b>, load factor 0.75\n• Сегментирование / lock-free (зависит от версии JDK)\n\n<b>Сколько теряется на resize:</b>\n\n<pre><code>// Добавление 10M элементов\nArrayList&lt;Integer&gt; list = new ArrayList&lt;&gt;();\n// ~27 resize операций, каждый копирует весь массив\n// Amortized O(1), но реально — несколько секунд на overhead\n\nArrayList&lt;Integer&gt; list = new ArrayList&lt;&gt;(10_000_000);\n// 0 resize — сразу выделен правильный массив</code></pre>\n\n<b>Почему load factor = 0.75?</b>\n• Компромисс между памятью и количеством коллизий\n• Poisson distribution: при 0.75 среднее число элементов в бакете стабильно\n• Меньше (0.5) — больше памяти, меньше коллизий\n• Больше (0.9) — больше коллизий, больше замедление get\n\n<b>Практические рекомендации:</b>\n\n<pre><code>// ✅ Плохо\nArrayList&lt;User&gt; users = new ArrayList&lt;&gt;();\nfor (Record r : allRecords) users.add(r.toUser());\n// Если allRecords.size() = 1M, 27 resize!\n\n// ✅ Хорошо\nArrayList&lt;User&gt; users = new ArrayList&lt;&gt;(allRecords.size());\nfor (Record r : allRecords) users.add(r.toUser());\n\n// ✅ Ещё лучше — со Stream API\nList&lt;User&gt; users = allRecords.stream()\n    .map(Record::toUser)\n    .toList(); // Java 16+ — immutable, точно нужного размера</code></pre>\n\n<b>HashMap частые ошибки:</b>\n<pre><code>// ❌ Наивная ошибка\nMap&lt;String, String&gt; map = new HashMap&lt;&gt;(1000);\n// 1000 как capacity, но load factor 0.75\n// На 750 элементах уже будет resize → 2048\n\n// ✅ Правильно\nMap&lt;String, String&gt; map = new HashMap&lt;&gt;(1334); // 1000/0.75 + 1\n// или просто:\nMap&lt;String, String&gt; map = HashMap.newHashMap(1000); // Java 19+</code></pre>\n\n<b>Сводная таблица:</b>\n<pre><code>Коллекция            | Default | Load factor | Resize\n─────────────────────┼─────────┼─────────────┼────────────\nArrayList            | 0→10    | -           | 1.5x\nHashMap              | 16      | 0.75        | 2x\nHashSet              | 16      | 0.75        | 2x (через HashMap)\nLinkedHashMap        | 16      | 0.75        | 2x\nTreeMap              | -       | -           | -\nArrayDeque           | 16      | -           | 2x\nPriorityQueue        | 11      | -           | 2x (если &gt;=64)\nStringBuilder        | 16      | -           | 2x+2\nVector               | 10      | -           | 2x\nCopyOnWriteArrayList | 0       | -           | +1 (copy)</code></pre>\n\n<b>На собесе:</b>\n• Default HashMap? (16 бакетов, load factor 0.75)\n• Как оптимизировать добавление 1M в HashMap? (pre-sizing через newHashMap(1M))\n• Как ArrayList растёт? (1.5x начиная с 10)\n• Почему не указано capacity в каждом коде? (оптимизация, но читаемость страдает)',lvl:2},
