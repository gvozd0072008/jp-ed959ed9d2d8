    {q:'Maven — lifecycle и основные команды',a:'<pre><code>// Maven Lifecycle фазы (в порядке):\nvalidate -> compile -> test -> package -> verify -> install -> deploy\n\n// Каждая фаза выполняет все предыдущие!\nmvn package  = validate + compile + test + package\nmvn install  = ... + package + verify + install (в локальный repo)\n\n// Основные команды:\nmvn clean                    # удалить target/\nmvn compile                  # скомпилировать\nmvn test                     # запустить unit тесты\nmvn package                  # собрать JAR\nmvn package -DskipTests      # собрать без тестов\nmvn verify                   # integration тесты (failsafe)\nmvn install                  # в ~/.m2/repository\nmvn dependency:tree          # дерево зависимостей\nmvn versions:display-dependency-updates # доступные обновления</code></pre>\n\n<b>POM.xml ключевые секции:</b>\n<pre><code>&lt;parent&gt;          — наследование (spring-boot-starter-parent)\n&lt;dependencies&gt;    — зависимости\n&lt;dependencyManagement&gt; — версии без добавления (BOM)\n&lt;build&gt;&lt;plugins&gt;  — плагины (compiler, surefire, spring-boot)\n&lt;profiles&gt;        — профили (dev, prod, native)\n&lt;modules&gt;         — multi-module проект</code></pre>\n\n<b>Dependency scope:</b>\n• compile (default) — везде\n• test — только для тестов (JUnit, Mockito)\n• provided — есть в runtime (Servlet API в Tomcat)\n• runtime — не нужен при компиляции (JDBC driver)\n\n<b>На собесе:</b> чем mvn install отличается от mvn deploy? (install = локальный repo, deploy = удалённый Nexus/Artifactory)',lvl:1,hot:1},
    {q:'POM.xml — структура',a:'<pre><code><project>\n  <groupId>ru.raiffeisen</groupId>\n  <artifactId>payment-service</artifactId>\n  <version>1.0.0</version>\n  <packaging>jar</packaging>\n\n  <parent>\n    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-parent</artifactId>\n    <version>3.2.0</version>\n  </parent>\n\n  <dependencies>...</dependencies>\n  <build><plugins>...</plugins></build>\n</project></code></pre>\n\n<b>dependency scope:</b> compile (default), test, provided, runtime.',lvl:1},
    {q:'Maven — multi-module проект',a:'Родительский POM + модули:\n<pre><code><modules>\n  <module>common</module>\n  <module>api</module>\n  <module>service</module>\n</modules></code></pre>\n\n<b>dependencyManagement</b> — версии в parent, без дублирования в модулях.\n<b>pluginManagement</b> — аналог для плагинов.\n\nBOM (Bill of Materials): импорт версий из другого POM (spring-boot-dependencies).',lvl:2},
    {q:'Maven vs Gradle',a:'Два главных инструмента сборки в Java-мире. У каждого свой подход и свои сильные стороны.\n\n<b>=== Maven ===</b>\n\nАпач Maven (2004) — <b>декларативный</b> инструмент сборки на XML.\n\n<pre><code>&lt;!-- pom.xml --&gt;\n&lt;project&gt;\n    &lt;modelVersion&gt;4.0.0&lt;/modelVersion&gt;\n    &lt;groupId&gt;com.example&lt;/groupId&gt;\n    &lt;artifactId&gt;my-app&lt;/artifactId&gt;\n    &lt;version&gt;1.0.0&lt;/version&gt;\n    &lt;packaging&gt;jar&lt;/packaging&gt;\n\n    &lt;properties&gt;\n        &lt;java.version&gt;17&lt;/java.version&gt;\n        &lt;spring-boot.version&gt;3.2.0&lt;/spring-boot.version&gt;\n    &lt;/properties&gt;\n\n    &lt;dependencies&gt;\n        &lt;dependency&gt;\n            &lt;groupId&gt;org.springframework.boot&lt;/groupId&gt;\n            &lt;artifactId&gt;spring-boot-starter-web&lt;/artifactId&gt;\n            &lt;version&gt;${spring-boot.version}&lt;/version&gt;\n        &lt;/dependency&gt;\n    &lt;/dependencies&gt;\n&lt;/project&gt;</code></pre>\n\n<b>Maven Lifecycle:</b>\n<pre><code>validate → compile → test → package → verify → install → deploy\n\nmvn clean install      # clean + install\nmvn test               # выполнит validate + compile + test\nmvn package -DskipTests\nmvn spring-boot:run\nmvn dependency:tree    # дерево зависимостей</code></pre>\n\n<b>Convention over Configuration</b>:\n<pre><code>src/\n├── main/\n│   ├── java/                # Java код\n│   └── resources/           # конфиги, .yml\n└── test/\n    └── java/                # тесты</code></pre>\n\n<b>Плюсы Maven:</b>\n• <b>Стандарт де-факто в enterprise</b> (Spring, banking, корпоративные проекты)\n• Предсказуемо — все проекты похожи\n• Огромная экосистема плагинов\n• IDE поддержка идеальная\n• XML — все знают\n• Декларативность — легко читать даже незнакомый pom.xml\n\n<b>Минусы Maven:</b>\n• XML verbose — много строк\n• Жёсткий lifecycle, сложно кастомизировать\n• Медленнее Gradle (нет incremental)\n• Сложнее делать custom логику сборки\n\n<b>=== Gradle ===</b>\n\nGradle (2007) — <b>императивный</b> инструмент на Groovy DSL (или Kotlin DSL с 2018).\n\n<pre><code>// build.gradle (Groovy)\nplugins {\n    id \\\'org.springframework.boot\\\' version \\\'3.2.0\\\'\n    id \\\'io.spring.dependency-management\\\' version \\\'1.1.0\\\'\n    id \\\'java\\\'\n}\n\ngroup = \\\'com.example\\\'\nversion = \\\'1.0.0\\\'\n\njava {\n    sourceCompatibility = \\\'17\\\'\n}\n\ndependencies {\n    implementation \\\'org.springframework.boot:spring-boot-starter-web\\\'\n    testImplementation \\\'org.springframework.boot:spring-boot-starter-test\\\'\n}\n\ntasks.named(\\\'test\\\') {\n    useJUnitPlatform()\n}</code></pre>\n\n<b>Kotlin DSL (build.gradle.kts)</b> — более type-safe:\n<pre><code>plugins {\n    id("org.springframework.boot") version "3.2.0"\n    kotlin("jvm") version "1.9.0"\n}\n\ndependencies {\n    implementation("org.springframework.boot:spring-boot-starter-web")\n}</code></pre>\n\n<b>Команды:</b>\n<pre><code>gradle build\ngradle test\n./gradlew build         # wrapper (рекомендуется)\n./gradlew dependencies  # дерево\ngradle bootRun</code></pre>\n\n<b>Плюсы Gradle:</b>\n• <b>Быстрее Maven</b> — incremental build, build cache, daemon\n• <b>Гибкость</b> — полноценный Groovy/Kotlin код в сборке\n• Меньше verbose — ~30% короче чем XML\n• Advanced features: composite builds, configuration cache, Version catalogs\n• Обязателен в Android\n• Лучшая поддержка multi-module проектов\n\n<b>Минусы Gradle:</b>\n• Сложнее порог входа (Groovy + свой DSL)\n• Больше разных способов сделать одно и то же → неконсистентность\n• Плохая обратная совместимость (breaking changes между версиями)\n• IDE поддержка чуть хуже Maven (лагает на больших проектах)\n• Громоздкая отладка сложных build.gradle\n\n<b>=== Сравнение производительности ===</b>\n<pre><code>Clean build (100+ модулей):\n  Maven:   ~3 минуты\n  Gradle:  ~1.5 минуты\n\nIncremental build (нет изменений):\n  Maven:   ~1 минута (нельзя пропустить)\n  Gradle:  ~3 секунды (с daemon)\n\nIncremental с кэшем (build cache):\n  Gradle:  часто &lt; 1 секунды</code></pre>\n\n<b>=== Сравнительная таблица ===</b>\n<pre><code>Критерий            | Maven              | Gradle\n────────────────────┼────────────────────┼────────────────────\nЯзык конфига        | XML                | Groovy / Kotlin DSL\nВерсионность        | стабильная         | быстро меняется\nКривая обучения     | низкая             | средняя\nСкорость            | средняя            | высокая (cache)\nГибкость            | ограниченная       | очень высокая\nIncremental         | ❌                 | ✅\nBuild cache         | ❌                 | ✅\nParallel builds     | -T                 | ✅ нативно\nDependency resolution| Ivy-style          | свой, гибкий\nEnterprise adoption | ⭐⭐⭐⭐⭐           | ⭐⭐⭐\nAndroid             | deprecated         | ⭐⭐⭐⭐⭐</code></pre>\n\n<b>=== Когда что ===</b>\n\n<b>Maven:</b>\n• Enterprise Java, банки, консервативные компании\n• Простой проект без сложной сборки\n• Команда не готова учить Groovy\n• Если главное — стабильность и предсказуемость\n• Spring proekты исторически (оба работают, но Maven — default)\n\n<b>Gradle:</b>\n• Android (обязательно)\n• Multi-module monorepo с тысячами модулей\n• Нужна кастомная логика сборки\n• Критична скорость CI (incremental)\n• Новые проекты без legacy\n• Когда build становится сложной задачей\n\n<b>=== Dependency management ===</b>\n\n<b>Maven:</b>\n<pre><code>&lt;dependency&gt;\n    &lt;groupId&gt;com.fasterxml.jackson.core&lt;/groupId&gt;\n    &lt;artifactId&gt;jackson-databind&lt;/artifactId&gt;\n    &lt;version&gt;2.15.0&lt;/version&gt;\n    &lt;scope&gt;compile&lt;/scope&gt;      &lt;!-- compile | test | runtime | provided --&gt;\n    &lt;exclusions&gt;\n        &lt;exclusion&gt;\n            &lt;groupId&gt;org.slf4j&lt;/groupId&gt;\n            &lt;artifactId&gt;slf4j-api&lt;/artifactId&gt;\n        &lt;/exclusion&gt;\n    &lt;/exclusions&gt;\n&lt;/dependency&gt;</code></pre>\n\n<b>Gradle:</b>\n<pre><code>dependencies {\n    implementation("com.fasterxml.jackson.core:jackson-databind:2.15.0") {\n        exclude group: \\\'org.slf4j\\\', module: \\\'slf4j-api\\\'\n    }\n    testImplementation "org.junit.jupiter:junit-jupiter:5.10.0"\n    runtimeOnly "postgresql:postgresql:42.5.0"\n    compileOnly "org.projectlombok:lombok:1.18.30"\n    annotationProcessor "org.projectlombok:lombok:1.18.30"\n}</code></pre>\n\n<b>Scopes:</b>\n<pre><code>Maven scope       | Gradle configuration\n──────────────────┼──────────────────────\ncompile           | implementation (default с 3.4)\n                  | api (если бин транзитивно виден)\nruntime           | runtimeOnly\nprovided          | compileOnly\ntest              | testImplementation, testRuntimeOnly</code></pre>\n\n<b>Wrapper</b> — и Maven (mvnw), и Gradle (gradlew) поддерживают wrapper-скрипты, которые сами скачивают нужную версию — не нужно ставить Maven/Gradle локально.\n\n<b>На собесе:</b>\n• Что используете в Raiffeisen / банке? (обычно Maven)\n• Чем Gradle быстрее? (incremental build + build cache + daemon)\n• XML vs Groovy DSL? (XML — декларативный стандарт; Groovy — гибкий код)\n• Что такое mvn dependency:tree? (показывает дерево транзитивных зависимостей)\n• Как исключить транзитивную зависимость? (&lt;exclusions&gt; в Maven или exclude в Gradle)',lvl:1},
    {s:'Profiling'},
    {q:'Профилирование Java-приложений',a:'<b>Инструменты:</b>\n• <b>async-profiler</b> — CPU/allocation profiling, flame graphs. Лучший для production.\n• <b>JFR (Java Flight Recorder)</b> — встроенный в JDK, low overhead.\n• <b>JVisualVM</b> — GUI мониторинг (heap, threads, CPU).\n• <b>jmap</b> — heap dump: <code>jmap -dump:format=b,file=heap.hprof PID</code>\n• <b>jstack</b> — thread dump: <code>jstack PID</code>\n• <b>Eclipse MAT</b> — анализ heap dump, поиск утечек.\n\n<b>Flame Graph:</b> визуализация CPU usage — ширина = время метода.',lvl:3,hot:1},
]},

  { id:'camunda', icon:'&#9881;', name:'Camunda', data: [
    {q:'Camunda и BPMN 2.0',a:'<b>Camunda</b> — workflow engine для оркестрации бизнес-процессов. <b>BPMN 2.0</b> — стандарт графического описания процессов.\n\n<b>Зачем нужен workflow engine:</b>\nКогда бизнес-процесс — это длинная цепочка шагов (часто с ожиданиями и человеческими решениями), писать его в коде неудобно:\n• Состояние процесса нужно сохранять\n• Таймеры, retry, асинхронность\n• Бизнес хочет видеть процесс визуально\n• Нужен аудит каждого шага\n\nCamunda + BPMN решают всё это.\n\n<b>Основные элементы BPMN 2.0:</b>\n\n<b>События (Events):</b>\n<pre><code>○ Start Event      — старт процесса\n◎ End Event        — окончание\n⊙ Intermediate     — промежуточные (ожидание)\n\nТипы events:\n● None      — обычный\n● Message   — ждём / шлём сообщение (Kafka, REST)\n● Timer     — таймер (5 минут / каждый час / конкретная дата)\n● Error     — ошибка\n● Signal    — broadcast событие\n● Compensation — компенсация</code></pre>\n\n<b>Задачи (Tasks):</b>\n<pre><code>▭ Service Task      — код выполняется автоматически (Java Delegate)\n▭ User Task         — человек принимает решение (в UI)\n▭ Script Task       — инлайн скрипт (JavaScript, Groovy)\n▭ Send/Receive Task — отправка/получение сообщения\n▭ Business Rule     — DMN decision\n▭ Call Activity     — вызов вложенного процесса\n▭ Manual Task       — физическое действие\n▭ External Task     — делегируем внешнему worker</code></pre>\n\n<b>Шлюзы (Gateways):</b>\n<pre><code>◇ Exclusive (XOR)  — одна ветка из многих (if-else)\n◇ Parallel (AND)   — все ветки параллельно\n◇ Inclusive (OR)   — одна или несколько веток\n◇ Event-based      — ждём первое из нескольких событий</code></pre>\n\n<b>Пример процесса — обработка платежа:</b>\n<pre><code>[Start] → [Validate Payment] (Service Task)\n        → &lt;XOR: valid?&gt;\n           ├── yes → [Authorize] → [Capture] → [Send Receipt] → [End]\n           │                    ↓ (если fraud)\n           │                    [Fraud Review] (User Task)\n           │                    ↓\n           │                    &lt;XOR: approved?&gt;\n           │                        ├── yes → [Capture] ...\n           │                        └── no → [Reject]\n           └── no → [Reject Payment] → [Notify User] → [End]</code></pre>\n\n<b>Service Task в Camunda — через JavaDelegate:</b>\n<pre><code>@Component("validatePaymentDelegate")\npublic class ValidatePaymentDelegate implements JavaDelegate {\n    @Override\n    public void execute(DelegateExecution execution) throws Exception {\n        Long paymentId = (Long) execution.getVariable("paymentId");\n        Payment payment = paymentService.findById(paymentId);\n\n        boolean valid = validator.validate(payment);\n        execution.setVariable("isValid", valid);\n        execution.setVariable("fraudScore", calculateFraud(payment));\n    }\n}\n\n&lt;!-- в BPMN XML: --&gt;\n&lt;serviceTask id="validate" camunda:delegateExpression="${validatePaymentDelegate}" /&gt;</code></pre>\n\n<b>Conditions в Gateway:</b>\n<pre><code>&lt;exclusiveGateway id="gw_valid" /&gt;\n&lt;sequenceFlow sourceRef="gw_valid" targetRef="authorize"&gt;\n    &lt;conditionExpression&gt;${isValid &amp;&amp; fraudScore &lt; 50}&lt;/conditionExpression&gt;\n&lt;/sequenceFlow&gt;\n&lt;sequenceFlow sourceRef="gw_valid" targetRef="fraudReview"&gt;\n    &lt;conditionExpression&gt;${isValid &amp;&amp; fraudScore &gt;= 50}&lt;/conditionExpression&gt;\n&lt;/sequenceFlow&gt;\n&lt;sequenceFlow sourceRef="gw_valid" targetRef="reject"&gt;\n    &lt;conditionExpression&gt;${!isValid}&lt;/conditionExpression&gt;\n&lt;/sequenceFlow&gt;</code></pre>\n\n<b>Запуск процесса из Java:</b>\n<pre><code>@Autowired\nprivate RuntimeService runtimeService;\n\npublic String startPaymentProcess(Long paymentId, BigDecimal amount) {\n    Map&lt;String, Object&gt; vars = Map.of(\n        "paymentId", paymentId,\n        "amount", amount\n    );\n    ProcessInstance pi = runtimeService.startProcessInstanceByKey(\n        "payment-process", vars);\n    return pi.getId(); // сохраним в БД для трекинга\n}</code></pre>\n\n<b>User Task — работа с пользовательскими задачами:</b>\n<pre><code>@Autowired TaskService taskService;\n\n// Получить задачи для пользователя\nList&lt;Task&gt; tasks = taskService.createTaskQuery()\n    .assignee("manager@example.com")\n    .active()\n    .list();\n\n// Завершить задачу с переменными\ntaskService.complete(task.getId(), Map.of("approved", true));\n\n// Перенаправить\ntaskService.setAssignee(task.getId(), "another@example.com");</code></pre>\n\n<b>Timer events:</b>\n<pre><code>&lt;!-- Таймаут ожидания 24 часа --&gt;\n&lt;intermediateCatchEvent id="wait"&gt;\n    &lt;timerEventDefinition&gt;\n        &lt;timeDuration&gt;PT24H&lt;/timeDuration&gt;\n    &lt;/timerEventDefinition&gt;\n&lt;/intermediateCatchEvent&gt;\n\n&lt;!-- Периодический cron --&gt;\n&lt;startEvent id="daily"&gt;\n    &lt;timerEventDefinition&gt;\n        &lt;timeCycle&gt;0 0 9 * * ?&lt;/timeCycle&gt; &lt;!-- каждый день в 9:00 --&gt;\n    &lt;/timerEventDefinition&gt;\n&lt;/startEvent&gt;</code></pre>\n\n<b>Error handling:</b>\n<pre><code>// Bpmn Error boundary event — ловит BpmnError из Service Task\n&lt;boundaryEvent attachedToRef="authorize" id="err_handler"&gt;\n    &lt;errorEventDefinition errorRef="PaymentDeclinedError" /&gt;\n&lt;/boundaryEvent&gt;\n\n// В Java delegate:\nthrow new BpmnError("PaymentDeclinedError", "Card declined");</code></pre>\n\n<b>Переменные процесса — scoped и типизированные:</b>\n<pre><code>execution.setVariable("foo", "bar");         // доступна везде\nexecution.setVariableLocal("baz", 42);       // только в текущей activity\n\nMap&lt;String, Object&gt; vars = execution.getVariables();\nString foo = (String) execution.getVariable("foo");\n\n// Типизированные:\nexecution.setVariableTyped("payment",\n    Variables.objectValue(payment).serializationDataFormat(Variables.SerializationDataFormats.JSON).create());</code></pre>\n\n<b>Camunda 7 vs Camunda 8:</b>\n\n<pre><code>Характеристика    | Camunda 7              | Camunda 8\n──────────────────┼────────────────────────┼─────────────────\nАрхитектура       | Embedded в Spring      | Cloud-native, Zeebe\nЯзыки             | Java                   | любой (gRPC)\nБД для state      | PostgreSQL/Oracle      | встроенная (Elastic)\nЛицензия          | Apache 2.0 (community) | Source-available\nPerformance       | средний                | очень высокий\nИспользование     | монолит, корп. Java     | микросервисы, cloud</code></pre>\n\n<b>Camunda 7 (классический) + Spring Boot:</b>\n<pre><code>&lt;dependency&gt;\n    &lt;groupId&gt;org.camunda.bpm.springboot&lt;/groupId&gt;\n    &lt;artifactId&gt;camunda-bpm-spring-boot-starter&lt;/artifactId&gt;\n    &lt;version&gt;7.20.0&lt;/version&gt;\n&lt;/dependency&gt;</code></pre>\n\nБудет доступен web UI на <code>/camunda</code> — Tasklist, Cockpit (мониторинг), Modeler.\n\n<b>Camunda Modeler</b> — desktop приложение для визуального редактирования BPMN XML.\n\n<b>Плюсы Camunda:</b>\n• Визуализация — бизнес понимает\n• Аудит каждого шага\n• Automatic retry, timers, error handling\n• Можно менять процесс без пересборки (deploy нового .bpmn)\n• Cockpit — оператор может вмешаться в зависший процесс\n\n<b>Минусы:</b>\n• Усложняет архитектуру\n• Learning curve для BPMN\n• Overkill для простых процессов\n• Лицензия Camunda 8 платная\n\n<b>Когда использовать:</b>\n• Long-running процессы с таймерами и ожиданиями\n• Процессы с человеческими решениями (approval workflow)\n• Процессы, которые часто меняются (можно обновить BPMN без redeploy)\n• Бизнес-процессы с аудитом (платежи, одобрения)\n• Saga-оркестрация в микросервисах\n\n<b>Когда НЕ нужно:</b>\n• Простой CRUD\n• Чисто технические цепочки без human tasks\n• Простая message-driven логика (Kafka consumers достаточно)\n\n<b>На собесе:</b>\n• Что такое BPMN? (Business Process Model and Notation, стандарт визуализации)\n• Service Task vs User Task? (Java код vs действие пользователя в UI)\n• Зачем Camunda если есть Kafka? (человеческие задачи, таймеры, визуализация, компенсации)\n• Camunda 7 vs 8? (monolithic embedded vs cloud-native)',hot:1,lvl:2},
    {q:'Camunda 7 + Spring Boot',a:'<code>camunda-bpm-spring-boot-starter</code>\n\n<b>Delegate:</b>\n<pre><code>@Component\npublic class ProcessPayment implements JavaDelegate {\n    public void execute(DelegateExecution ex) {\n        String id = (String) ex.getVariable("paymentId");\n        // логика\n        ex.setVariable("status", "OK");\n    }\n}</code></pre>\n\n<b>External Task</b> — worker забирает задачу (лучше для микросервисов).',lvl:2},
    {q:'BPMN элементы подробно',a:'• <b>Service Task</b> — автоматическая задача (JavaDelegate, External)\n• <b>User Task</b> — задача для человека (формы, UI)\n• <b>Exclusive Gateway (XOR)</b> — условное ветвление (expression на рёбрах)\n• <b>Parallel Gateway (AND)</b> — параллельное выполнение\n• <b>Timer Event</b> — задержка (duration: PT30M) или расписание (cron)\n• <b>Error Event</b> — обработка ошибок (boundary event)\n• <b>Message Event</b> — ожидание внешнего сообщения\n• <b>Signal Event</b> — broadcast сигнал всем подписчикам',lvl:2},
    {q:'Camunda — обработка ошибок',a:'1. <b>Retry</b>: asyncBefore=true, retries=3, retryTimeCycle="PT10S"\n2. <b>Error Boundary Event</b>: перехват ошибки, альтернативный путь\n3. <b>Incident</b>: после исчерпания retries → инцидент в Cockpit\n4. <b>Compensation</b>: компенсирующие действия (Saga)\n\nМониторинг: Camunda Cockpit — процессы, инциденты, history.',lvl:2},
    {q:'Camunda vs Temporal vs другие',a:'<b>Camunda 7:</b> embedded, BPMN, Java. Хорошая интеграция со Spring.\n<b>Camunda 8:</b> cloud-native, Zeebe (свой движок), gRPC.\n<b>Temporal:</b> code-first (без BPMN), Go/Java SDK, durable execution.\n\nДля Raiffeisen (Camunda 7): embedded в Spring Boot, BPMN для бизнес-визуализации.',lvl:2},
  ]},

  { id:'algo', icon:'&#129518;', name:'Алгоритмы', data: [
    {q:'Big O нотация',a:'<b>Big O</b> — асимптотическая оценка сложности алгоритма. Показывает, как растёт время/память при увеличении размера входа N.\n\n<b>Классы сложности (от лучших к худшим):</b>\n\n<b>O(1) — константная:</b> не зависит от N.\n• <code>HashMap.get/put</code> (в среднем)\n• <code>ArrayList.get(i)</code>\n• Доступ к элементу массива\n• Stack push/pop\n\n<b>O(log n) — логарифмическая:</b> с каждым шагом исключаем половину.\n• Бинарный поиск (<code>Arrays.binarySearch</code>)\n• <code>TreeMap.get/put</code> (красно-чёрное дерево)\n• Высота сбалансированного BST\n\n<b>O(n) — линейная:</b> проходим все элементы один раз.\n• <code>list.contains(x)</code> для ArrayList\n• <code>Arrays.stream().sum()</code>\n• Поиск в связном списке\n\n<b>O(n log n) — линейно-логарифмическая:</b> сортировка сравнением.\n• <code>Arrays.sort(Object[])</code> — TimSort\n• <code>Arrays.sort(primitives)</code> — Dual-Pivot Quicksort\n• Merge Sort, Heap Sort\n\n<b>O(n²) — квадратичная:</b> вложенные циклы.\n• Bubble Sort, Selection Sort, Insertion Sort\n• Поиск пар в массиве через вложенные циклы\n• <code>list.contains(x)</code> в цикле\n\n<b>O(n³) — кубическая:</b> например, наивное перемножение матриц.\n\n<b>O(2^n) — экспоненциальная:</b> перебор всех подмножеств.\n• Наивный рекурсивный Fibonacci (без мемоизации)\n• Рекурсивное решение задачи о рюкзаке (без DP)\n• Перебор всех подмножеств\n\n<b>O(n!) — факториальная:</b> перебор всех перестановок.\n• Задача коммивояжёра брутфорсом\n• Генерация всех перестановок\n\n<b>Правила упрощения:</b>\n• Отбрасываем константы: O(2n) = O(n)\n• Оставляем только старший член: O(n² + n) = O(n²)\n• Вложенный цикл по разным данным: O(n*m), не O(n²)\n\n<b>Big O vs Big Θ vs Big Ω:</b>\n• <b>O(f(n))</b> — верхняя граница (не хуже)\n• <b>Ω(f(n))</b> — нижняя граница (не лучше)\n• <b>Θ(f(n))</b> — точная оценка\n\nВ повседневной речи «Big O» часто означает Θ.\n\n<b>Worst / Average / Best case:</b>\n• QuickSort: best O(n log n), average O(n log n), <b>worst O(n²)</b>\n• HashMap.get: average O(1), <b>worst O(log n)</b> (после Java 8, иначе O(n))\n• Binary Search: O(log n) всегда\n\n<b>Сложность основных коллекций Java:</b>\n<pre><code>Структура     | add  | remove | contains/get\n──────────────┼──────┼────────┼──────────────\nArrayList     | O(1)*| O(n)   | O(n) / O(1)\nLinkedList    | O(1) | O(1)   | O(n)\nHashMap       | O(1) | O(1)   | O(1)\nTreeMap       | O(log n) на всё\nArrayDeque    | O(1) | O(1)   | O(n)\nPriorityQueue | O(log n) add/poll; O(n) contains\n* амортизированно O(1), иногда resize() O(n)</code></pre>\n\n<b>Space complexity</b> — та же нотация для памяти. Рекурсия обычно добавляет O(depth) на стек.\n\n<b>На собесе:</b> «какова сложность getAllUsers() в твоём коде?» — сначала измерь worst case; часто N+1 проблема скрывает O(n) в общении с БД.',hot:1,lvl:1},
    {q:'Сортировки',a:'<b>Bubble Sort</b> — O(n²): сравнение соседних\n<b>Insertion Sort</b> — O(n²), O(n) для почти sorted\n<b>Merge Sort</b> — O(n log n): divide & conquer, стабильная, O(n) memory\n<b>Quick Sort</b> — O(n log n) avg, O(n²) worst: pivot, in-place\n<b>Tim Sort</b> — O(n log n): merge + insertion, стабильная. Java default.',lvl:2},
    {q:'Бинарный поиск',a:'<b>Binary Search</b> — алгоритм поиска в <b>отсортированном</b> массиве за O(log n). Каждый шаг исключает половину оставшихся элементов.\n\n<b>Идея:</b>\n<pre><code>arr = [1, 3, 5, 7, 9, 11, 13], target = 11\n\nШаг 1: lo=0, hi=6, mid=3, arr[3]=7 &lt; 11 → lo = mid+1 = 4\nШаг 2: lo=4, hi=6, mid=5, arr[5]=11 = target → return 5</code></pre>\n\n<b>Итеративная реализация:</b>\n<pre><code>public int binarySearch(int[] arr, int target) {\n    int lo = 0, hi = arr.length - 1;\n    while (lo &lt;= hi) {\n        int mid = lo + (hi - lo) / 2; // избегаем integer overflow\n        if (arr[mid] == target) return mid;\n        if (arr[mid] &lt; target) lo = mid + 1;\n        else hi = mid - 1;\n    }\n    return -1; // не найден\n}\n// Time O(log n), Space O(1)</code></pre>\n\n<b>Почему <code>lo + (hi - lo) / 2</code>, а не <code>(lo + hi) / 2</code>?</b>\nПри очень больших lo и hi их сумма может переполнить int. Классическая ошибка, найденная в реализации Arrays.binarySearch() в JDK через 10+ лет после написания.\n\n<b>Рекурсивная реализация:</b>\n<pre><code>public int binarySearch(int[] arr, int target, int lo, int hi) {\n    if (lo &gt; hi) return -1;\n    int mid = lo + (hi - lo) / 2;\n    if (arr[mid] == target) return mid;\n    if (arr[mid] &lt; target) return binarySearch(arr, target, mid + 1, hi);\n    return binarySearch(arr, target, lo, mid - 1);\n}\n// Space O(log n) — стек рекурсии</code></pre>\n\n<b>Встроенный в JDK:</b>\n<pre><code>int idx = Arrays.binarySearch(arr, target);\n// Возвращает:\n// >= 0 — индекс найденного\n// &lt; 0 — -(insertion_point + 1) — куда вставить чтобы сохранить порядок\n\n// Для списков\nint idx = Collections.binarySearch(sortedList, target);</code></pre>\n\n<b>Вариации:</b>\n\n<b>1. Найти первое вхождение (lower bound):</b>\n<pre><code>int firstOccurrence(int[] arr, int target) {\n    int lo = 0, hi = arr.length - 1, result = -1;\n    while (lo &lt;= hi) {\n        int mid = lo + (hi - lo) / 2;\n        if (arr[mid] == target) {\n            result = mid;\n            hi = mid - 1; // продолжаем искать левее\n        } else if (arr[mid] &lt; target) lo = mid + 1;\n        else hi = mid - 1;\n    }\n    return result;\n}</code></pre>\n\n<b>2. Последнее вхождение (upper bound):</b>\n<pre><code>// Аналогично, но при совпадении lo = mid + 1 (ищем правее)</code></pre>\n\n<b>3. Поиск в вращённом отсортированном массиве</b> (<code>[4,5,6,7,0,1,2]</code>):\n<pre><code>int search(int[] arr, int target) {\n    int lo = 0, hi = arr.length - 1;\n    while (lo &lt;= hi) {\n        int mid = lo + (hi - lo) / 2;\n        if (arr[mid] == target) return mid;\n        // определяем какая половина отсортирована\n        if (arr[lo] &lt;= arr[mid]) {\n            // левая часть отсортирована\n            if (arr[lo] &lt;= target &amp;&amp; target &lt; arr[mid]) hi = mid - 1;\n            else lo = mid + 1;\n        } else {\n            // правая отсортирована\n            if (arr[mid] &lt; target &amp;&amp; target &lt;= arr[hi]) lo = mid + 1;\n            else hi = mid - 1;\n        }\n    }\n    return -1;\n}</code></pre>\n\n<b>4. Binary search по ответу (двоичный поиск по диапазону значений):</b>\nКогда массив не дан, но ответ лежит в диапазоне и есть предикат <code>canDo(x)</code>, монотонный.\n<pre><code>// Пример: минимальная скорость поедания бананов (LeetCode 875)\nint minEatingSpeed(int[] piles, int h) {\n    int lo = 1, hi = Arrays.stream(piles).max().getAsInt();\n    while (lo &lt; hi) {\n        int mid = lo + (hi - lo) / 2;\n        if (canEatInTime(piles, mid, h)) hi = mid;\n        else lo = mid + 1;\n    }\n    return lo;\n}</code></pre>\n\n<b>Ключевые требования:</b>\n• Массив <b>ДОЛЖЕН быть отсортирован</b> (иначе результат undefined)\n• Доступ по индексу за O(1) — LinkedList не подходит (deградирует до O(n log n))\n• Для дубликатов — выбирать lower/upper bound вариант\n\n<b>Частые ошибки:</b>\n• <code>(lo + hi) / 2</code> — integer overflow\n• <code>while (lo &lt; hi)</code> vs <code>while (lo &lt;= hi)</code> — зависит от инварианта\n• Off-by-one: <code>mid</code>, <code>mid+1</code>, <code>mid-1</code> — путаница\n• Бесконечный цикл если <code>lo = mid</code> вместо <code>lo = mid + 1</code>\n\n<b>Сложность:</b>\n• <b>Time: O(log n)</b> — каждая итерация режет массив пополам\n• <b>Space: O(1)</b> итеративно, <b>O(log n)</b> рекурсивно\n\n<b>Применения в реальном мире:</b>\n• Поиск в отсортированной таблице в памяти\n• B-tree индексы в БД (log n)\n• Git bisect (поиск коммита, который сломал тест)\n• Версионирование (find first version with bug)\n• Автокомплит (префиксный поиск через binary search на trie)\n• Оптимизация параметров (binary search по ответу)\n\n<b>На собесе:</b>\n• Почему <code>lo + (hi - lo) / 2</code>? (избежать integer overflow)\n• Что возвращает Arrays.binarySearch для ненайденного? (-(insertion_point + 1))\n• Работает ли для LinkedList? (технически да, но O(n log n) — нет смысла)\n• Как найти первое вхождение? (не выходить сразу при match, продолжать левее)',lvl:2},
    {q:'Красно-чёрное дерево',a:'<b>Red-Black Tree</b> — самобалансирующееся двоичное дерево поиска (BST). Гарантирует O(log n) для всех операций (get, put, remove) в худшем случае.\n\n<b>Правила (инварианты):</b>\n1. Каждый узел — либо красный, либо чёрный\n2. Корень всегда чёрный\n3. Листья (NIL/null) — чёрные\n4. У красного узла оба ребёнка — чёрные (нет двух красных подряд)\n5. <b>На любом пути от узла до листа — одинаковое количество чёрных узлов</b> (black height)\n\nЭти правила обеспечивают, что самый длинный путь от корня до листа не более чем в 2 раза длиннее самого короткого → высота всегда ≤ 2·log(n+1).\n\n<b>Операции:</b>\n• <b>Search</b> — как в обычном BST, O(log n)\n• <b>Insert</b> — вставляем красный узел, затем «чиним» нарушения правил через повороты (rotation) и перекраску (recolor)\n• <b>Delete</b> — ещё сложнее, но всё равно O(log n)\n\n<b>Повороты (rotations):</b>\n<pre><code>    X                Y\n   / \\    left      / \\\n  a   Y   ─────►   X   c\n     / \\           / \\\n    b   c         a   b\n\nПравый поворот — зеркально</code></pre>\nПоворот сохраняет порядок inorder-обхода, меняет только структуру.\n\n<b>Пример — вставка 4 в дерево:</b>\n<pre><code>       [5B]              [5B]\n      /    \\            /    \\\n    [3R]  [7R]   →   [3B]  [7B]\n                       \\\n                       [4R]\n// 3 и 7 стали чёрными, 4 добавлен красным\n// Правила сохранены</code></pre>\n\n<b>Где используется в JDK:</b>\n• <code>TreeMap</code>, <code>TreeSet</code> — основа\n• <code>HashMap</code> — при коллизиях ≥ 8 элементов в бакете и размере таблицы ≥ 64, цепочка превращается в красно-чёрное дерево (защита от hash-flooding атак)\n• <code>LinkedHashMap</code> — дополнительно сохраняет порядок вставки\n\n<b>Red-Black vs AVL дерево:</b>\n• AVL более строго сбалансировано (высота гарантированно ≤ 1.44·log n) → быстрее search\n• Red-Black допускает небольшой дисбаланс (до 2·log n) → быстрее insert/delete (меньше поворотов)\n• Java выбрала Red-Black для TreeMap как компромисс\n\n<b>Сложность:</b>\n• Search, Insert, Delete: <b>O(log n)</b> worst case\n• Space: O(n)\n\n<b>Альтернативы:</b> B-tree (используется в БД индексах), Skip List, Splay tree.\n\n<b>На собесе:</b> зачем в HashMap? — защита от O(n) деградации при плохом hashCode или намеренной hash-коллизии (DoS).',lvl:2},
    {q:'Хеш-таблица — устройство',a:'<b>Hash table</b> — структура данных, обеспечивающая O(1) в среднем для get/put/remove через преобразование ключа в индекс массива.\n\n<b>Базовая идея:</b>\n<pre><code>bucket[ hash(key) % capacity ] = value\n\nkey "John" -&gt; hash 347291 -&gt; index 347291 % 16 = 11\nkey "Jane" -&gt; hash 582193 -&gt; index 582193 % 16 = 1</code></pre>\n\n<b>Структура:</b>\n<pre><code>array of buckets (default capacity=16)\n\n  [0] -&gt; null\n  [1] -&gt; Jane=25\n  [2] -&gt; null\n  [3] -&gt; Alice=30 -&gt; Bob=40  (коллизия — цепочка)\n  [4] -&gt; null\n  ...\n  [11] -&gt; John=35</code></pre>\n\n<b>Операции:</b>\n\n<b>put(key, value):</b>\n<pre><code>1. hash = key.hashCode()\n2. index = (capacity - 1) &amp; hash // быстрее чем % для степени 2\n3. Если bucket[index] пуст — положить запись\n4. Если занят — найти по equals(), обновить или добавить в цепочку\n5. Если size &gt; capacity * loadFactor — resize()</code></pre>\n\n<b>get(key):</b>\n<pre><code>1. index = hash(key) &amp; (capacity - 1)\n2. Пройти по цепочке в bucket[index]\n3. Вернуть value где key.equals(bucketKey)\n4. Иначе null</code></pre>\n\n<b>Разрешение коллизий — 2 основных подхода:</b>\n\n<b>1. Separate Chaining (закрытая адресация)</b> — Java HashMap\nКаждый бакет — связный список. В Java 8+: при ≥8 элементов в бакете и размере таблицы ≥64 список превращается в красно-чёрное дерево.\n\nПлюсы: простота, легко удалять, работает при любой нагрузке.\nМинусы: больше памяти (Node-обёртки), cache unfriendly (указатели).\n\n<b>2. Open Addressing (открытая адресация)</b>\nВсе записи в самом массиве. При коллизии — ищем следующий свободный слот.\n\n<b>Linear Probing</b>: index+1, index+2, ... Кластеризация.\n<b>Quadratic Probing</b>: index+1², index+2², ... Меньше кластеризации.\n<b>Double Hashing</b>: вторая hash-функция определяет шаг.\n\nПример: ThreadLocalMap, IdentityHashMap в JDK.\n\nПлюсы: меньше памяти (нет Node), cache friendly (последовательные слоты).\nМинусы: сложнее удалять (tombstone), плохо при высоком load factor.\n\n<b>Load Factor:</b>\n<pre><code>loadFactor = size / capacity\n\n// HashMap: 0.75 по умолчанию\n// Когда size &gt; capacity * 0.75 — resize в 2 раза\n// При ресайзе — все элементы пере-хэшируются (дорого!)</code></pre>\n\nВыбор LF — баланс:\n• Меньше LF (0.5) — больше памяти, меньше коллизий\n• Больше LF (0.9) — меньше памяти, больше коллизий\n• 0.75 — проверенный компромисс\n\n<b>Сложность:</b>\n<pre><code>Операция   | Average | Worst (без tree) | Worst (с tree)\n───────────┼─────────┼──────────────────┼────────────────\nget        | O(1)    | O(n)             | O(log n)\nput        | O(1)    | O(n)             | O(log n)\nremove     | O(1)    | O(n)             | O(log n)\ncontains   | O(1)    | O(n)             | O(log n)</code></pre>\n\n<b>Хорошая хэш-функция должна:</b>\n• Равномерно распределять значения по всему диапазону int\n• Быстро вычисляться\n• Одинаковые ключи → одинаковый hash (обязательно!)\n• Разные ключи → разные hash (желательно)\n\n<b>Плохая hash-функция</b>:\n<pre><code>int hashCode() { return 42; } // ВСЕ элементы в одном бакете!\n// get/put деградируют в O(n), тогда дерево спасает до O(log n)</code></pre>\n\n<b>Требования к ключам:</b>\n• <b>Immutable</b> — иначе элемент «теряется» при изменении ключа\n• <b>Корректный equals и hashCode</b> (согласованный контракт)\n• Хорошая дисперсия hashCode\n\n<b>Применение в Java:</b>\n• <code>HashMap</code> — базовый (not thread-safe)\n• <code>HashSet</code> — внутри HashMap с dummy value\n• <code>LinkedHashMap</code> — + двусвязный список для порядка\n• <code>ConcurrentHashMap</code> — lock-free вариант\n• <code>Hashtable</code> — legacy, synchronized, не использовать\n• <code>WeakHashMap</code> — ключи хранятся как WeakReference\n• <code>IdentityHashMap</code> — сравнение ключей через ==, не equals\n\n<b>Hash table vs другие структуры:</b>\n<pre><code>Структура    | get    | put    | Порядок  | Память\n─────────────┼────────┼────────┼──────────┼─────────\nHashMap      | O(1)   | O(1)   | нет      | высокая\nTreeMap      | O(log) | O(log) | sorted   | средняя\nLinkedHashMap| O(1)   | O(1)   | insertion| очень высокая\nArrayList    | O(1)*  | O(1)*  | index    | низкая\n                * по индексу, не по значению</code></pre>\n\n<b>Атаки на hash table — Hash Flooding:</b>\nЗлоумышленник подбирает ключи с одинаковым hashCode → все в один бакет → деградация до O(n²) при вставке n элементов.\n\nЗащита:\n• В Java 8 — переход в tree при коллизиях\n• В Ruby/Python — randomized hash seed\n• В высоконагруженных системах — capacity prime-числа\n\n<b>На собесе:</b>\n• Объясни устройство HashMap\n• Что такое load factor и зачем? (когда делать resize)\n• Как Java 8 защищает от bad hashCode? (tree при коллизиях)\n• Почему capacity — степень двойки? (быстрый % через &amp;)',lvl:2},
    {q:'Стек и очередь',a:'Две базовые линейные структуры данных с разным порядком доступа.\n\n<b>Стек (Stack) — LIFO (Last In First Out)</b>\nПоследний вошедший выходит первым. Как стопка тарелок.\n\n<pre><code>Операции:\n  push(x)   // добавить в вершину\n  pop()     // извлечь из вершины\n  peek()    // посмотреть вершину без извлечения\n  isEmpty()\n  size()\n\nВсе за O(1)\n\n[a]   →   [b]   →   [c]   →   pop → [c]   ... остаётся [a, b]\n               top            возвращает c</code></pre>\n\n<b>Реализации в Java:</b>\n<pre><code>// ❌ Не используй java.util.Stack — legacy, synchronized, на Vector\nStack&lt;Integer&gt; stack = new Stack&lt;&gt;();\n\n// ✅ Современно — ArrayDeque\nDeque&lt;Integer&gt; stack = new ArrayDeque&lt;&gt;();\nstack.push(1);\nstack.push(2);\nint top = stack.peek();   // 2\nint popped = stack.pop(); // 2, извлечён\n\n// ✅ LinkedList тоже работает, но медленнее\nDeque&lt;Integer&gt; stack = new LinkedList&lt;&gt;();</code></pre>\n\n<b>Применение стека:</b>\n• Проверка сбалансированности скобок\n• DFS (Depth-First Search)\n• Undo/Redo в редакторах\n• Откат транзакций\n• Вызовы функций (call stack в JVM!)\n• Парсинг выражений (infix → postfix, RPN)\n• Обратный порядок элементов\n\n<b>Очередь (Queue) — FIFO (First In First Out)</b>\nПервый вошедший выходит первым. Как очередь в магазине.\n\n<pre><code>Операции:\n  offer(x) / add(x)     // добавить в конец\n  poll() / remove()     // извлечь из начала\n  peek() / element()    // посмотреть начало без извлечения\n\noffer/poll/peek НЕ выбрасывают исключения (возвращают null/false)\nadd/remove/element выбрасывают при пустой очереди\n\n[ ]   offer a    offer b    offer c    poll\n      →[a]      →[a,b]     →[a,b,c]   →[b,c] (возвращает a)</code></pre>\n\n<b>Реализации:</b>\n<pre><code>Queue&lt;Integer&gt; queue = new ArrayDeque&lt;&gt;();  // ✅ самая быстрая\nQueue&lt;Integer&gt; queue = new LinkedList&lt;&gt;();  // тоже работает\nQueue&lt;Integer&gt; queue = new PriorityQueue&lt;&gt;(); // с приоритетом\n\n// Concurrent\nQueue&lt;Integer&gt; q = new ConcurrentLinkedQueue&lt;&gt;(); // lock-free\nBlockingQueue&lt;Integer&gt; bq = new ArrayBlockingQueue&lt;&gt;(100); // блокирующая</code></pre>\n\n<b>Применение очереди:</b>\n• BFS (Breadth-First Search)\n• Task scheduling / job queue\n• Producer-Consumer pattern\n• Буферизация (messaging)\n• Уровневая обработка (level-order traversal)\n• Request/Task queue в серверах\n\n<b>Deque (Double-Ended Queue)</b>\nОбобщение — добавление/удаление с обоих концов.\n\n<pre><code>Deque&lt;Integer&gt; deque = new ArrayDeque&lt;&gt;();\ndeque.addFirst(1);   // в начало\ndeque.addLast(2);    // в конец\ndeque.peekFirst();\ndeque.peekLast();\ndeque.pollFirst();\ndeque.pollLast();\n\n// Как Stack:  push() = addFirst(), pop() = pollFirst()\n// Как Queue:  offer() = addLast(), poll() = pollFirst()</code></pre>\n\n<b>Priority Queue</b> — очередь с приоритетом\n\nВнутри — binary heap (двоичная куча). Извлекается не первый вставленный, а с наивысшим приоритетом.\n\n<pre><code>Операции:\n  offer(x)    — O(log n)\n  poll()      — O(log n), возвращает минимум (или по Comparator)\n  peek()      — O(1)\n  contains()  — O(n)  ← медленно!\n\nPriorityQueue&lt;Integer&gt; pq = new PriorityQueue&lt;&gt;();\npq.offer(5); pq.offer(1); pq.offer(3);\npq.poll(); // 1 — минимум первым\npq.poll(); // 3\npq.poll(); // 5\n\n// Max-heap:\nPriorityQueue&lt;Integer&gt; maxHeap = new PriorityQueue&lt;&gt;(Comparator.reverseOrder());\n\n// Кастомный Comparator:\nPriorityQueue&lt;Task&gt; queue = new PriorityQueue&lt;&gt;(\n    Comparator.comparing(Task::getPriority)\n              .thenComparing(Task::getCreatedAt));</code></pre>\n\n<b>Применение Priority Queue:</b>\n• Task scheduler с приоритетами\n• Dijkstra, Prim, A* алгоритмы\n• Top-K элементов\n• Event-driven simulation\n• Huffman coding\n\n<b>BlockingQueue — для producer-consumer в многопоточности</b>\n<pre><code>BlockingQueue&lt;Task&gt; queue = new ArrayBlockingQueue&lt;&gt;(100);\n\n// Producer\nqueue.put(task);        // блокируется если очередь полна\nqueue.offer(task);      // сразу возвращает true/false\nqueue.offer(task, 5, TimeUnit.SECONDS); // с таймаутом\n\n// Consumer\nTask task = queue.take();   // блокируется если очередь пуста\nTask task = queue.poll();\n\n// Реализации:\nArrayBlockingQueue      - фиксированный размер, one lock\nLinkedBlockingQueue     - опционально ограниченный, two locks (put/take)\nPriorityBlockingQueue   - с приоритетом\nSynchronousQueue        - без хранения (каждый put ждёт take)\nDelayQueue              - элементы становятся доступны через задержку</code></pre>\n\n<b>Сводная таблица:</b>\n<pre><code>Тип           | Порядок | Добавить | Извлечь | Java реализация\n──────────────┼─────────┼──────────┼─────────┼──────────────────\nStack         | LIFO    | вершина  | вершина | ArrayDeque\nQueue         | FIFO    | конец    | начало  | ArrayDeque\nDeque         | оба     | оба конц.| оба конц.| ArrayDeque\nPriorityQueue | prio    | любое    | min/max | PriorityQueue\nBlockingQueue | FIFO +  | блокир.  | блокир. | ArrayBlockingQueue\n              | поток   |          |         |</code></pre>\n\n<b>На собесе:</b>\n• Какую коллекцию использовать для Stack в 2026? (ArrayDeque — не Stack!)\n• LIFO vs FIFO? (Last/First In First Out)\n• Сложность Stack/Queue на ArrayDeque? (все операции O(1))\n• Как сделать BFS? (Queue + visited set)\n• Как сделать DFS? (Stack + visited set или рекурсия)\n• Как найти top-K? (min-heap из PriorityQueue размера K)',lvl:2},
    {q:'Графы — обход BFS и DFS',a:'<b>BFS (в ширину):</b> очередь. Кратчайший путь в невзвешенном графе.\n<b>DFS (в глубину):</b> стек/рекурсия. Топологическая сортировка, поиск циклов.\n\n<pre><code>// BFS\nQueue<Node> q = new ArrayDeque<>();\nq.add(start);\nwhile (!q.isEmpty()) {\n    Node n = q.poll();\n    for (Node neighbor : n.neighbors())\n        if (!visited.contains(neighbor)) {\n            visited.add(neighbor);\n            q.add(neighbor);\n        }\n}</code></pre>',lvl:2},
    {q:'Жадные алгоритмы',a:'<b>Greedy algorithm</b> — стратегия, при которой на каждом шаге выбирается локально оптимальное решение в надежде, что последовательность таких выборов приведёт к глобальному оптимуму.\n\n<b>Принцип:</b>\n<pre><code>while (задача не решена):\n    выбрать локально лучший вариант\n    добавить его к решению\n    никогда не пересматривать</code></pre>\n\nВ отличие от backtracking или DP, <b>жадный алгоритм не возвращается назад</b> — принял решение и идёт дальше.\n\n<b>Когда работает (теорема о «жадном выборе»):</b>\n1. <b>Greedy choice property</b> — локально оптимальный выбор приводит к глобальному оптимуму\n2. <b>Optimal substructure</b> — оптимальное решение содержит оптимальные решения подзадач\n\nЕсли обе свойства выполняются — жадный работает. Иначе нужно DP или backtracking.\n\n<b>=== Классические жадные задачи ===</b>\n\n<b>1. Задача о сдаче (Coin Change)</b>\n<pre><code>Дана сумма и номиналы монет. Минимальное число монет.\n\ngreedy(amount, coins):\n    result = 0\n    for coin in sorted(coins, desc):\n        count = amount / coin\n        result += count\n        amount -= count * coin\n    return result\n\n// Работает для [1, 5, 10, 25, 50, 100] (обычные деньги)\n// НЕ работает для [1, 3, 4]: amount=6\n//   greedy: 4+1+1 = 3 монеты\n//   optimum: 3+3 = 2 монеты!</code></pre>\n\n<b>2. Fractional Knapsack (дробный рюкзак)</b>\n<pre><code>Рюкзак ёмкостью W, предметы с весами и стоимостями.\nМожно брать дроби.\n\ngreedy:\n    sort items by value/weight ratio (desc)\n    for item in sorted:\n        if capacity &gt;= item.weight:\n            take whole\n        else:\n            take fraction (capacity / item.weight)\n            break\n\n// Работает! Greedy даёт оптимум для fractional knapsack.\n// Но НЕ работает для 0/1 knapsack (только целые) — нужен DP.</code></pre>\n\n<b>3. Activity Selection / Interval Scheduling</b>\n<pre><code>Дано N активностей с start и end. Макс число непересекающихся.\n\ngreedy:\n    sort by end time\n    last_end = -infinity\n    count = 0\n    for activity in sorted:\n        if activity.start &gt;= last_end:\n            count++\n            last_end = activity.end\n    return count\n\n// Работает — сортировка по end time оптимальна</code></pre>\n\n<b>4. Алгоритм Дейкстры (кратчайший путь)</b>\n<pre><code>Из вершины start найти кратчайшие пути до всех.\n\n1. dist[start] = 0, dist[else] = ∞\n2. priority queue с всеми вершинами\n3. pop min dist vertex u\n4. for each neighbor v:\n     if dist[u] + w(u,v) &lt; dist[v]:\n         dist[v] = dist[u] + w(u,v)\n\n// Работает на графах с неотрицательными весами\n// Не работает с отрицательными — нужен Bellman-Ford</code></pre>\n\n<b>5. Алгоритм Прима (минимальное остовное дерево)</b>\n<pre><code>Похож на Дейкстру, но выбирает ребро с min весом,\nсоединяющее «растущее» дерево с новой вершиной.</code></pre>\n\n<b>6. Алгоритм Краскала (MST через объединение)</b>\n<pre><code>1. Сортируем все рёбра по весу\n2. Берём ребро если оно не создаёт цикл (Union-Find)\n3. Когда набрано V-1 ребро — готово\n\n// Работает жадно — сортировка + Union-Find</code></pre>\n\n<b>7. Huffman Coding (сжатие)</b>\n<pre><code>Частота символов известна.\nСтроим бинарное дерево: часто встречающиеся — короткие коды.\n\n1. PriorityQueue с парами (frequency, symbol)\n2. Извлекаем 2 наименьших, объединяем в node с суммой частот\n3. Возвращаем в очередь\n4. Повторяем пока не останется одно дерево\n\n// Префиксный код — никакой код не является префиксом другого</code></pre>\n\n<b>8. Минимум платформ на станции</b>\n<pre><code>Массив arrival[], departure[] поездов. Мин платформ?\n\nsort arrivals и departures отдельно\nint platforms = 0, max_platforms = 0;\nint i = 0, j = 0;\nwhile (i &lt; arrivals.length) {\n    if (arrivals[i] &lt;= departures[j]) {\n        platforms++;\n        max_platforms = max(max_platforms, platforms);\n        i++;\n    } else {\n        platforms--;\n        j++;\n    }\n}</code></pre>\n\n<b>9. Jump Game (LeetCode 55)</b>\n<pre><code>Массив nums[i] = макс. прыжок из позиции i.\nМожно ли допрыгать до конца?\n\nmax_reachable = 0\nfor i in 0..n-1:\n    if i &gt; max_reachable: return false\n    max_reachable = max(max_reachable, i + nums[i])\nreturn true</code></pre>\n\n<b>=== Когда жадный НЕ работает ===</b>\n\n<b>0/1 Knapsack</b> — брать целиком или не брать:\n<pre><code>Weights: [10, 20, 30]\nValues:  [60, 100, 120]\nCapacity: 50\n\nGreedy по value/weight: возьмём 60 (ratio 6), потом 100 (ratio 5)\n= 10+20 = 30 вес, value 160\n\nOptimum: 20+30 = 50 вес, value 100+120 = 220\n\nНужен DP!</code></pre>\n\n<b>Coin Change с нестандартными номиналами</b>\n\n<b>Longest Path in Graph</b>\n\n<b>Chess (игра) — нужен minimax + backtracking</b>\n\n<b>=== Как доказать, что greedy работает ===</b>\n\nОбычно два подхода:\n\n<b>1. Exchange argument</b> (обмен):\nДопустим есть оптимальное решение без жадного выбора. Покажем что можно обменять шаги с жадным, не ухудшив результат.\n\n<b>2. Induction по шагам:</b>\nПоказать, что после каждого жадного шага остаётся оптимальное решение подзадачи.\n\n<b>=== Greedy vs DP vs Brute force ===</b>\n<pre><code>Критерий   | Greedy  | DP        | Brute force\n───────────┼─────────┼───────────┼─────────────\nСложность  | O(n log n) | O(n²) или O(n³) | O(2^n) или O(n!)\nОснова     | локальный | все подзадачи | полный перебор\nКогда      | есть greedy | overlapping | малые данные\n           | property   | subproblems |\nЛегкость   | сложно   | средне     | тривиально\nКорректность| не всегда! | всегда    | всегда</code></pre>\n\n<b>На собесе — стратегия:</b>\n1. Сначала подумать — можно ли жадно?\n2. Если можно — доказать (интуитивно или formally)\n3. Если нет — пробовать DP или backtracking\n4. Если задача small — brute force OK\n\n<b>Типичная ошибка:</b> интервьюер даёт задачу с «ловушкой», где greedy кажется правильным, но не даёт оптимум. Например, coin change с [1,3,4]. Всегда проверять на edge cases!\n\n<b>На собесе:</b>\n• Что такое жадный алгоритм? (локально оптимальный выбор)\n• Примеры когда работает? (Activity Selection, Dijkstra, Huffman)\n• Когда не работает? (0/1 Knapsack, нестандартные монеты)\n• Как доказать корректность? (exchange argument)\n• Greedy vs DP? (greedy — локальный выбор; DP — все подзадачи)',lvl:2},
    {q:'Динамическое программирование',a:'<b>Dynamic Programming (DP)</b> — техника решения задач через разбиение на подзадачи и сохранение их результатов, чтобы избежать повторных вычислений.\n\n<b>Когда применимо:</b>\n1. <b>Optimal substructure</b> — решение задачи выражается через решения подзадач\n2. <b>Overlapping subproblems</b> — одни и те же подзадачи решаются многократно\n\n<b>Два подхода:</b>\n\n<b>1. Top-down (мемоизация):</b> рекурсия + кэш\n<pre><code>// Fibonacci с мемоизацией\nMap&lt;Integer, Long&gt; memo = new HashMap&lt;&gt;();\nlong fib(int n) {\n    if (n &lt;= 1) return n;\n    if (memo.containsKey(n)) return memo.get(n);\n    long result = fib(n - 1) + fib(n - 2);\n    memo.put(n, result);\n    return result;\n}\n// O(n) time, O(n) space</code></pre>\n\n<b>2. Bottom-up (табулация):</b> итеративно строим решение от базы к верху\n<pre><code>long fib(int n) {\n    if (n &lt;= 1) return n;\n    long[] dp = new long[n + 1];\n    dp[0] = 0; dp[1] = 1;\n    for (int i = 2; i &lt;= n; i++) {\n        dp[i] = dp[i-1] + dp[i-2];\n    }\n    return dp[n];\n}\n// O(n) time, O(n) space; можно ещё оптимизировать до O(1) space</code></pre>\n\n<b>Оптимизация по памяти:</b> часто нужны только последние K состояний.\n<pre><code>long fib(int n) {\n    if (n &lt;= 1) return n;\n    long a = 0, b = 1;\n    for (int i = 2; i &lt;= n; i++) { long t = a + b; a = b; b = t; }\n    return b;\n}\n// O(n) time, O(1) space</code></pre>\n\n<b>Классические DP-задачи:</b>\n\n<b>Climbing Stairs:</b> сколько способов подняться на n ступеней (шаг 1 или 2)?\n<pre><code>dp[i] = dp[i-1] + dp[i-2]; // то же, что Fibonacci</code></pre>\n\n<b>0/1 Knapsack:</b> максимальная ценность, рюкзак ёмкости W.\n<pre><code>int[][] dp = new int[n+1][W+1];\nfor (int i = 1; i &lt;= n; i++) {\n    for (int w = 0; w &lt;= W; w++) {\n        dp[i][w] = dp[i-1][w]; // не брать\n        if (weight[i-1] &lt;= w) {\n            dp[i][w] = Math.max(dp[i][w],\n                dp[i-1][w - weight[i-1]] + value[i-1]); // взять\n        }\n    }\n}\nreturn dp[n][W];</code></pre>\n\n<b>Longest Common Subsequence (LCS):</b>\n<pre><code>int[][] dp = new int[m+1][n+1];\nfor (int i = 1; i &lt;= m; i++)\n    for (int j = 1; j &lt;= n; j++)\n        if (a.charAt(i-1) == b.charAt(j-1))\n            dp[i][j] = dp[i-1][j-1] + 1;\n        else\n            dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);\nreturn dp[m][n];</code></pre>\n\n<b>Edit Distance (Levenshtein):</b> минимум insert/delete/replace чтобы превратить строку a в b.\n\n<b>Longest Increasing Subsequence (LIS):</b> O(n²) через DP или O(n log n) через бинпоиск.\n\n<b>Алгоритм разработки DP-решения:</b>\n1. Определить состояние: <code>dp[i]</code> или <code>dp[i][j]</code> — что оно означает?\n2. Написать рекуррентную формулу (переход)\n3. Определить базу (начальные значения)\n4. Решить top-down или bottom-up\n5. Оптимизировать по памяти, если возможно\n\n<b>DP vs Divide and Conquer:</b>\n• DP: подзадачи пересекаются → кэш\n• D&C: подзадачи независимы (Merge Sort) → кэш не нужен\n\n<b>DP vs Greedy:</b>\n• Greedy: локально оптимальный выбор ведёт к глобально оптимальному (не всегда!)\n• DP: перебор всех вариантов с мемоизацией\n\n<b>На собесе:</b> начни с брутфорсной рекурсии, затем добавь мемоизацию, потом перепиши в bottom-up, потом оптимизируй память. Этот pipeline работает для большинства DP-задач.',lvl:2},
  
    {q:'ArrayList vs LinkedList — сложность операций',a:'<pre><code>Операция        ArrayList    LinkedList\nget(i)          O(1)         O(n)\nset(i, e)       O(1)         O(n)\nadd(e) конец    O(1)*        O(1)\nadd(i, e)       O(n)         O(n)**\nremove(i)       O(n)         O(n)**\ncontains(e)     O(n)         O(n)\niterator.remove O(n)         O(1)</code></pre>\n* амортизированная\n** O(1) если есть итератор на позиции\n\nArrayList выигрывает почти всегда за счёт CPU cache.',hot:1,lvl:2},
    {q:'Задача: проверка скобок',a:'<b>Задача:</b> определить, правильно ли сбалансированы скобки <code>()</code>, <code>[]</code>, <code>{}</code> в строке. Например, <code>"({[]})"</code> — валидно, <code>"([)]"</code> — нет.\n\n<b>Идея:</b> использовать стек. При открывающей скобке — push. При закрывающей — проверить, что на вершине стека соответствующая открывающая.\n\n<b>Решение:</b>\n<pre><code>public boolean isValid(String s) {\n    Deque&lt;Character&gt; stack = new ArrayDeque&lt;&gt;();\n    Map&lt;Character, Character&gt; pairs = Map.of(\n        \\\')\\\', \\\'(\\\',\n        \\\']\\\', \\\'[\\\',\n        \\\'}\\\', \\\'{\\\'\n    );\n\n    for (char c : s.toCharArray()) {\n        if (pairs.containsValue(c)) {\n            // открывающая\n            stack.push(c);\n        } else if (pairs.containsKey(c)) {\n            // закрывающая\n            if (stack.isEmpty() || stack.pop() != pairs.get(c)) {\n                return false;\n            }\n        }\n        // другие символы игнорируем\n    }\n    return stack.isEmpty();\n}</code></pre>\n\n<b>Разбор:</b>\n1. Используем <code>Deque</code>/<code>ArrayDeque</code> как стек (<code>Stack</code> из JDK устарел — он synchronized и медленнее)\n2. Хэш-таблица маппит закрывающие на соответствующие открывающие\n3. При закрывающей проверяем, что стек не пуст и на вершине — нужная скобка\n4. В конце стек должен быть пустым (все открывающие закрыты)\n\n<b>Сложность:</b>\n• Time: O(n) — один проход по строке\n• Space: O(n) — стек в худшем случае вмещает всю строку (например <code>"(((("</code>)\n\n<b>Граничные случаи для обсуждения на собесе:</b>\n• Пустая строка — валидна (<code>true</code>)\n• Одна скобка — невалидна\n• Только закрывающие — невалидна\n• Вложенные нескольких типов — работает\n• Строка с другими символами (буквы, цифры) — по условию задачи или игнорировать, или считать невалидными\n\n<b>Упрощённый вариант для только одного типа скобок</b> — можно без стека, просто счётчик:\n<pre><code>int balance = 0;\nfor (char c : s.toCharArray()) {\n    if (c == \\\'(\\\' ) balance++;\n    else if (c == \\\')\\\') balance--;\n    if (balance &lt; 0) return false; // закрывающая раньше открывающей\n}\nreturn balance == 0;</code></pre>\nНо это работает ТОЛЬКО для одного типа скобок.\n\n<b>Вариация задачи:</b> «минимальное число вставок, чтобы сделать строку валидной» — тот же стек + счётчик.\n\n<b>Задача на LeetCode:</b> #20 Valid Parentheses (Easy).',hot:1,lvl:2},
]},
