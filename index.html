    {q:'@Controller vs @RestController',a:'Обе аннотации помечают класс как веб-контроллер в Spring MVC, но возвращают разное.\n\n<b>@Controller</b> — возвращает View\n• Результат метода — имя шаблона (Thymeleaf, JSP, Freemarker)\n• <code>Model</code> для передачи данных в шаблон\n• Использовался классически для server-side rendering\n\n<pre><code>@Controller\npublic class UserController {\n    @GetMapping("/users/{id}")\n    public String showUser(@PathVariable Long id, Model model) {\n        User user = userService.findById(id);\n        model.addAttribute("user", user);\n        return "user-profile"; // /templates/user-profile.html\n    }\n}</code></pre>\n\n<b>Чтобы вернуть тело напрямую из @Controller — нужен @ResponseBody:</b>\n<pre><code>@Controller\npublic class ApiController {\n    @GetMapping("/api/users/{id}")\n    @ResponseBody // JSON вместо View\n    public User getUser(@PathVariable Long id) { return userService.findById(id); }\n}</code></pre>\n\n<b>@RestController = @Controller + @ResponseBody</b> (на уровне класса)\n• Все методы возвращают тело (JSON/XML)\n• Не нужно ставить @ResponseBody на каждый метод\n• Стандарт для REST API\n\n<pre><code>@RestController\n@RequestMapping("/api/users")\npublic class UserController {\n    @GetMapping("/{id}")\n    public User getUser(@PathVariable Long id) {\n        return userService.findById(id);\n    }\n    // User автоматически сериализуется в JSON (Jackson)\n}</code></pre>\n\n<b>Ключевые аннотации HTTP-методов:</b>\n<pre><code>@GetMapping("/path")    // GET\n@PostMapping("/path")   // POST\n@PutMapping("/path")    // PUT\n@DeleteMapping("/path") // DELETE\n@PatchMapping("/path")  // PATCH\n\n// Общий:\n@RequestMapping(value = "/path", method = RequestMethod.GET)</code></pre>\n\n<b>Извлечение параметров запроса:</b>\n<pre><code>// Path variable\n@GetMapping("/users/{id}")\npublic User get(@PathVariable Long id) { }\n\n// Query parameter\n@GetMapping("/users")\npublic List&lt;User&gt; list(@RequestParam(required = false) String status,\n                       @RequestParam(defaultValue = "10") int limit) { }\n\n// Request body (JSON → Java)\n@PostMapping("/users")\npublic User create(@RequestBody @Valid UserCreateRequest req) { }\n\n// Header\n@GetMapping("/me")\npublic User me(@RequestHeader("Authorization") String token) { }\n\n// Cookie\n@GetMapping("/session")\npublic Session get(@CookieValue("sessionId") String sessionId) { }\n\n// Current user из Spring Security\n@GetMapping("/profile")\npublic Profile get(@AuthenticationPrincipal User user) { }\n\n// Combined\n@GetMapping("/orders/{orderId}/items/{itemId}")\npublic Item get(@PathVariable Long orderId,\n                @PathVariable Long itemId,\n                @RequestParam(required = false) String fields) { }</code></pre>\n\n<b>ResponseEntity — тонкий контроль ответа:</b>\n<pre><code>@PostMapping("/users")\npublic ResponseEntity&lt;User&gt; create(@RequestBody UserRequest req) {\n    User user = service.create(req);\n    return ResponseEntity\n        .status(HttpStatus.CREATED)\n        .header("Location", "/users/" + user.getId())\n        .body(user);\n}\n\n// Шорткаты:\nResponseEntity.ok(user)\nResponseEntity.notFound().build()\nResponseEntity.status(HttpStatus.CONFLICT).body(errorDto)\nResponseEntity.noContent().build() // 204</code></pre>\n\n<b>Обработка ошибок — @ExceptionHandler:</b>\n<pre><code>@RestControllerAdvice // глобальный для всех контроллеров\npublic class GlobalExceptionHandler {\n    @ExceptionHandler(UserNotFoundException.class)\n    public ResponseEntity&lt;ErrorDto&gt; handle(UserNotFoundException e) {\n        return ResponseEntity.status(404).body(new ErrorDto(e.getMessage()));\n    }\n\n    @ExceptionHandler(MethodArgumentNotValidException.class)\n    public ResponseEntity&lt;ErrorDto&gt; validation(MethodArgumentNotValidException e) {\n        // ошибки @Valid\n        return ResponseEntity.status(400).body(...);\n    }\n}</code></pre>\n\n<b>Валидация — @Valid + Jakarta Bean Validation:</b>\n<pre><code>public class UserCreateRequest {\n    @NotBlank @Size(min = 3, max = 50)\n    private String name;\n    @Email\n    private String email;\n    @Min(18) @Max(120)\n    private int age;\n}\n\n@PostMapping\npublic User create(@RequestBody @Valid UserCreateRequest req) { }\n// Если невалидно — MethodArgumentNotValidException (обрабатывается ExceptionHandler)</code></pre>\n\n<b>Negotiation контента:</b>\n<pre><code>@GetMapping(value = "/users/{id}", produces = {"application/json", "application/xml"})\npublic User get(@PathVariable Long id) { }\n// Клиент выбирает через Accept header</code></pre>\n\n<b>Когда использовать:</b>\n• <b>@RestController</b> — REST API, SPA-бэкенд, микросервисы (99% случаев)\n• <b>@Controller</b> — server-side rendering (Thymeleaf), админки, старые проекты\n\n<b>На собесе:</b>\n• Разница @Controller и @RestController? (@RestController = + @ResponseBody, возвращает тело, а не View)\n• Как вернуть конкретный status code? (<code>ResponseEntity.status(...).body(...)</code>)\n• Как обрабатывать ошибки? (@ExceptionHandler, @RestControllerAdvice)\n• Где валидация — на Controller или Service? (Controller: @Valid, на входе; Service: бизнес-валидация)',lvl:2},
    {q:'Обработка ошибок в Spring MVC',a:'<b>Глобальный обработчик (рекомендуемый):</b>\n<pre><code>@RestControllerAdvice\npublic class GlobalExceptionHandler {\n\n    @ExceptionHandler(PaymentNotFoundException.class)\n    @ResponseStatus(HttpStatus.NOT_FOUND)\n    public ProblemDetail handleNotFound(PaymentNotFoundException ex) {\n        ProblemDetail pd = ProblemDetail.forStatusAndDetail(\n            HttpStatus.NOT_FOUND, ex.getMessage());\n        pd.setTitle("Payment Not Found");\n        pd.setProperty("paymentId", ex.getPaymentId());\n        return pd;\n    }\n\n    @ExceptionHandler(ConstraintViolationException.class)\n    @ResponseStatus(HttpStatus.BAD_REQUEST)\n    public ProblemDetail handleValidation(ConstraintViolationException ex) {\n        ProblemDetail pd = ProblemDetail.forStatus(HttpStatus.BAD_REQUEST);\n        pd.setTitle("Validation Error");\n        pd.setProperty("violations", ex.getConstraintViolations().stream()\n            .map(v -> v.getPropertyPath() + ": " + v.getMessage())\n            .toList());\n        return pd;\n    }\n\n    @ExceptionHandler(Exception.class)\n    @ResponseStatus(HttpStatus.INTERNAL_SERVER_ERROR)\n    public ProblemDetail handleGeneral(Exception ex) {\n        log.error("Unexpected error", ex);\n        return ProblemDetail.forStatusAndDetail(\n            HttpStatus.INTERNAL_SERVER_ERROR, "Internal server error");\n    }\n}</code></pre>\n\n<b>ProblemDetail (RFC 7807, Spring 6):</b> стандартный формат ошибок JSON.\n\n<b>На собесе:</b> как обрабатываете ошибки в REST API? (@RestControllerAdvice + ProblemDetail)',lvl:2},
    {q:'Filters vs Interceptors',a:'<pre><code>HTTP Request\n    ↓\nFilter 1 (Servlet level)  ← CORS, Security, Logging\n    ↓\nFilter 2\n    ↓\nDispatcherServlet\n    ↓\nInterceptor.preHandle()   ← Auth, Metrics, MDC\n    ↓\nController\n    ↓\nInterceptor.postHandle()  ← Modify Model\n    ↓\nView Rendering\n    ↓\nInterceptor.afterCompletion() ← Cleanup\n    ↓\nFilter 2 (response)\n    ↓\nFilter 1 (response)</code></pre>\n\n<b>Filter (Servlet API):</b>\n• До DispatcherServlet\n• Работает с ServletRequest/Response\n• Не знает о Spring MVC (controllers, handlers)\n• Для: CORS, Security, request logging, compression\n\n<b>Interceptor (Spring MVC):</b>\n• После DispatcherServlet, до Controller\n• Знает о Spring (доступ к Handler, ModelAndView)\n• Для: аутентификация, метрики, MDC (trace_id), rate limiting\n\n<pre><code>// Filter\n@Component\npublic class RequestLogFilter implements Filter {\n    public void doFilter(ServletRequest req, ServletResponse res, FilterChain chain) {\n        log.info("Request: {}", ((HttpServletRequest) req).getRequestURI());\n        chain.doFilter(req, res);\n    }\n}\n\n// Interceptor\n@Component\npublic class TraceInterceptor implements HandlerInterceptor {\n    public boolean preHandle(HttpServletRequest req, HttpServletResponse res, Object handler) {\n        MDC.put("traceId", UUID.randomUUID().toString());\n        return true;\n    }\n    public void afterCompletion(...) { MDC.clear(); }\n}</code></pre>\n\n<b>На собесе:</b> где лучше логировать запросы — Filter или Interceptor? (Filter — видит ВСЕ запросы, включая ошибки до контроллера)',lvl:2},

    {q:'Spring Boot 3 — ключевые изменения',a:'<b>Главные изменения:</b>\n\n• <b>Java 17+ минимум</b>\n• <b>javax.* -> jakarta.*</b> (Jakarta EE 10)\n<pre><code>// Было:\nimport javax.persistence.Entity;\nimport javax.servlet.http.HttpServletRequest;\n\n// Стало:\nimport jakarta.persistence.Entity;\nimport jakarta.servlet.http.HttpServletRequest;</code></pre>\n\n• <b>Spring Framework 6</b> под капотом\n\n• <b>Observability</b> — встроенная поддержка:\n<pre><code>// Micrometer + Micrometer Tracing (замена Spring Cloud Sleuth)\nmanagement.tracing.sampling.probability=1.0\nmanagement.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans</code></pre>\n\n• <b>Virtual Threads</b> (Java 21):\n<pre><code>spring.threads.virtual.enabled=true\n# Все HTTP запросы на virtual threads!</code></pre>\n\n• <b>GraalVM Native Image</b> — AOT компиляция:\n<pre><code>mvn -Pnative native:compile\n# Быстрый старт (~100ms), меньше памяти\n# Но: время компиляции, ограничения рефлексии</code></pre>\n\n• <b>HTTP Interface Clients</b> (@HttpExchange)\n• <b>ProblemDetail</b> (RFC 7807) — стандарт ошибок\n• <b>Docker Compose support</b> — автозапуск\n• <b>Testcontainers @ServiceConnection</b>\n\n<b>На собесе:</b> что нужно изменить при миграции на Spring Boot 3? (javax->jakarta, Java 17+, обновить зависимости)',hot:1,lvl:2},
    {q:'Spring Boot Auto-configuration',a:'Магия Spring Boot — автоматическая конфигурация бинов на основе classpath.\n\n<b>Механизм:</b>\n1. @SpringBootApplication включает @EnableAutoConfiguration\n2. Загружает классы из META-INF/spring/AutoConfiguration.imports\n3. Каждый класс — @Configuration с условиями:\n<pre><code>@AutoConfiguration\n@ConditionalOnClass(KafkaTemplate.class)       // есть в classpath?\n@ConditionalOnProperty(name = "spring.kafka.bootstrap-servers") // есть property?\npublic class KafkaAutoConfiguration {\n\n    @Bean\n    @ConditionalOnMissingBean  // только если пользователь не создал сам\n    public KafkaTemplate kafkaTemplate(ProducerFactory pf) {\n        return new KafkaTemplate(pf);\n    }\n}</code></pre>\n\n<b>Пример:</b> добавил spring-kafka + spring.kafka.bootstrap-servers -> автоматически: KafkaTemplate, ProducerFactory, ConsumerFactory.\n\n<b>Условные аннотации:</b>\n• @ConditionalOnClass — класс в classpath\n• @ConditionalOnMissingBean — бин ещё не создан\n• @ConditionalOnProperty — property задано\n• @ConditionalOnWebApplication — web-приложение\n\n<b>Отключить:</b>\n<pre><code>@SpringBootApplication(exclude = DataSourceAutoConfiguration.class)</code></pre>\n\n<b>Посмотреть что включено:</b> --debug или /actuator/conditions\n\n<b>На собесе:</b> как Spring Boot понимает что настроить? (classpath scanning + conditional annotations)',lvl:2},
    {q:'Spring Boot Actuator',a:'Production-ready мониторинг из коробки.\n\n<pre><code># application.yml\nmanagement:\n  endpoints:\n    web:\n      exposure:\n        include: health,metrics,prometheus,info,loggers\n  endpoint:\n    health:\n      show-details: when-authorized\n      probes:\n        enabled: true  # /health/liveness, /health/readiness</code></pre>\n\n<b>Ключевые endpoints:</b>\n<pre><code>/actuator/health          — UP/DOWN (для K8s probes)\n/actuator/health/liveness — жив ли контейнер?\n/actuator/health/readiness — готов принимать трафик?\n/actuator/metrics         — все метрики\n/actuator/prometheus      — метрики в формате Prometheus\n/actuator/info            — информация о приложении\n/actuator/loggers         — управление уровнями логов в runtime!\n/actuator/env             — environment properties</code></pre>\n\n<b>Кастомная метрика:</b>\n<pre><code>@Service\npublic class PaymentService {\n    private final Counter paymentCounter;\n    private final Timer paymentTimer;\n\n    PaymentService(MeterRegistry registry) {\n        this.paymentCounter = registry.counter("payments.total", "type", "card");\n        this.paymentTimer = registry.timer("payments.duration");\n    }\n\n    public Payment process(Request req) {\n        return paymentTimer.record(() -> {\n            paymentCounter.increment();\n            return doProcess(req);\n        });\n    }\n}</code></pre>\n\n<b>На собесе:</b> как мониторите приложение? (Actuator -> Prometheus -> Grafana. Custom метрики через MeterRegistry)',lvl:2},

    {q:'AOP в Spring',a:'Аспектно-ориентированное программирование — вынесение сквозной логики.\n\n<b>Терминология:</b>\n<pre><code>@Aspect        — класс с advice\nJoin Point     — точка выполнения (вызов метода)\nPointcut       — какие join points перехватить\nAdvice         — что сделать (Before, After, Around)\nWeaving        — внедрение (Spring: runtime proxy)</code></pre>\n\n<b>Пример — логирование времени выполнения:</b>\n<pre><code>@Aspect\n@Component\npublic class TimingAspect {\n\n    @Around("@annotation(Timed)")\n    public Object measureTime(ProceedingJoinPoint pjp) throws Throwable {\n        long start = System.currentTimeMillis();\n        try {\n            return pjp.proceed(); // вызов оригинального метода\n        } finally {\n            long elapsed = System.currentTimeMillis() - start;\n            log.info("{}.{} took {} ms",\n                pjp.getTarget().getClass().getSimpleName(),\n                pjp.getSignature().getName(), elapsed);\n        }\n    }\n}\n\n// Использование:\n@Timed\npublic Payment processPayment(Long id) { ... }</code></pre>\n\n<b>Типы advice:</b>\n• @Before — до метода\n• @After — после (всегда)\n• @AfterReturning — после успешного выполнения\n• @AfterThrowing — после исключения\n• @Around — полный контроль (до + после)\n\n<b>Proxy:</b>\n• JDK Dynamic Proxy — для интерфейсов\n• CGLIB — для классов (default в Spring Boot) — создаёт подкласс\n\n<b>Self-invocation:</b> <code>this.method()</code> НЕ проходит через proxy!\n@Transactional, @Cacheable, @Async, @Secured — все через AOP.\n\n<b>На собесе:</b> почему self-invocation не работает? (this = оригинальный объект, не proxy)',hot:1,lvl:2},

    {q:'@Transactional — как работает',a:'Spring создаёт CGLIB proxy вокруг бина:\n\n<pre><code>// Что видит Spring:\nPaymentService$$CGLIB_PROXY {\n    PaymentService target; // оригинальный объект\n\n    void process(Payment p) {\n        // 1. Открыть транзакцию\n        TransactionStatus tx = txManager.getTransaction(definition);\n        try {\n            target.process(p);  // 2. Вызвать оригинал\n            txManager.commit(tx); // 3. Commit\n        } catch (RuntimeException e) {\n            txManager.rollback(tx); // 4. Rollback\n            throw e;\n        }\n    }\n}</code></pre>\n\n<b>Propagation:</b>\n<pre><code>REQUIRED (default)  — есть TX? используем. Нет? создаём.\nREQUIRES_NEW        — всегда новая TX (suspend текущей)\n                      Пример: аудит-лог должен сохраниться\n                      даже если основная TX откатится\nNESTED              — savepoint внутри текущей TX\nSUPPORTS            — есть TX? используем. Нет? без TX.\nNOT_SUPPORTED       — suspend текущей TX\nMANDATORY           — TX обязательна, иначе исключение\nNEVER               — TX запрещена, иначе исключение</code></pre>\n\n<b>Rollback:</b>\n• RuntimeException — ROLLBACK (по умолчанию)\n• Checked Exception — НЕ откатывает!\n• Явно: <code>@Transactional(rollbackFor = Exception.class)</code>\n\n<b>3 главных подводных камня:</b>\n<pre><code>// 1. Self-invocation — proxy не работает!\n@Service\npublic class PaymentService {\n    @Transactional\n    public void process() { ... }\n\n    public void batch() {\n        this.process(); // ПРОБЛЕМА! this = оригинал, НЕ proxy!\n    }\n}\n// Решение: self-inject, AopContext.currentProxy(), TransactionTemplate\n\n// 2. private метод — proxy не перехватывает!\n@Transactional\nprivate void process() { ... } // НЕ РАБОТАЕТ!\n\n// 3. Checked exception без rollbackFor\n@Transactional // не откатит при IOException!\nvoid process() throws IOException { ... }\n@Transactional(rollbackFor = Exception.class) // теперь откатит</code></pre>\n\n<b>На собесе:</b> самый частый вопрос по Spring! Объясни self-invocation + как починить.',hot:1,lvl:2},
    {q:'@Transactional readOnly',a:'<pre><code>@Transactional(readOnly = true)\npublic List&lt;Payment&gt; findByStatus(Status status) {\n    return repo.findByStatus(status);\n}</code></pre>\n\n<b>Что делает readOnly = true:</b>\n\n1. <b>Hibernate</b> отключает dirty checking:\n   • Не создаёт snapshot при загрузке Entity\n   • Экономит память и CPU\n   • flush mode = MANUAL (не генерирует UPDATE)\n\n2. <b>JDBC</b>: <code>connection.setReadOnly(true)</code>\n   • PostgreSQL может направить на replica\n   • Некоторые СУБД оптимизируют запросы\n\n3. <b>Spring</b>: hint для TransactionManager\n   • НЕ бросает исключение при попытке записи (зависит от БД)\n\n<b>Лучшая практика:</b>\n<pre><code>@Service\n@Transactional(readOnly = true) // default для всего сервиса\npublic class PaymentQueryService {\n\n    public List&lt;Payment&gt; findAll() { ... }     // readOnly\n    public Payment findById(Long id) { ... }    // readOnly\n\n    @Transactional // override: read-write для мутаций\n    public Payment create(CreateRequest req) { ... }\n}</code></pre>\n\n<b>На собесе:</b> зачем readOnly? (производительность: нет dirty checking, возможность replica routing)',lvl:2},

    {q:'Spring Security',a:'<b>Архитектура:</b>\n<pre><code>HTTP Request\n    ↓\nSecurity Filter Chain (DelegatingFilterProxy)\n    ↓\nAuthenticationFilter (UsernamePassword / Bearer JWT)\n    ↓\nAuthenticationManager\n    ↓\nAuthenticationProvider\n    ↓\nUserDetailsService.loadUserByUsername()\n    ↓\nSecurityContextHolder.getContext().setAuthentication()\n    ↓\nAuthorizationFilter (@PreAuthorize, requestMatchers)\n    ↓\nController</code></pre>\n\n<b>Конфигурация (Spring Boot 3):</b>\n<pre><code>@Configuration\n@EnableWebSecurity\n@EnableMethodSecurity  // для @PreAuthorize\npublic class SecurityConfig {\n\n    @Bean\n    SecurityFilterChain filterChain(HttpSecurity http) throws Exception {\n        return http\n            .authorizeHttpRequests(auth -> auth\n                .requestMatchers("/api/public/**").permitAll()\n                .requestMatchers("/actuator/health/**").permitAll()\n                .requestMatchers("/api/admin/**").hasRole("ADMIN")\n                .anyRequest().authenticated())\n            .oauth2ResourceServer(oauth2 -> oauth2.jwt(\n                Customizer.withDefaults()))\n            .sessionManagement(s -> s\n                .sessionCreationPolicy(SessionCreationPolicy.STATELESS))\n            .csrf(csrf -> csrf.disable()) // stateless API\n            .build();\n    }\n}</code></pre>\n\n<b>SecurityContextHolder:</b> хранит Authentication в ThreadLocal.\n<code>SecurityContextHolder.getContext().getAuthentication().getName()</code>\n\n<b>На собесе:</b> как Spring Security обрабатывает JWT запрос? (BearerTokenAuthenticationFilter -> JwtDecoder -> проверка подписи/exp/iss -> SecurityContext)',hot:1,lvl:2},
    {q:'OAuth 2.0 и JWT в Spring',a:'<b>OAuth 2.0:</b> Authorization Code (web), Client Credentials (M2M).\n\n<b>JWT:</b> Header.Payload.Signature. Stateless.\nPayload: sub, iss, exp, roles.\n\nSpring: spring-boot-starter-oauth2-resource-server.\nВалидация: подпись, exp, iss, aud. Custom claims → GrantedAuthority.',hot:1,lvl:2},
    {q:'CSRF защита',a:'<b>CSRF</b> (Cross-Site Request Forgery) — атака, при которой злоумышленник заставляет браузер жертвы отправить запрос от её имени на сайт, где она авторизована. Классика для сайтов с session-based auth.\n\n<b>Как происходит атака:</b>\n<pre><code>1. Пользователь логинится на bank.com (cookie session сохранён)\n2. Переходит по ссылке на evil.com (не разлогинившись)\n3. На evil.com скрытая форма:\n\n   &lt;form action="https://bank.com/transfer" method="POST"&gt;\n       &lt;input type="hidden" name="to" value="attacker-account"&gt;\n       &lt;input type="hidden" name="amount" value="10000"&gt;\n   &lt;/form&gt;\n   &lt;script&gt;document.forms[0].submit();&lt;/script&gt;\n\n4. Браузер автоматически шлёт cookies сессии bank.com\n5. Bank.com обрабатывает запрос как легитимный → перевод денег!</code></pre>\n\n<b>Почему работает:</b>\n• Cookies отправляются автоматически при запросе на тот же origin\n• Сайт не отличает свой запрос от чужого\n• Same-Origin Policy НЕ блокирует отправку форм (только чтение ответа)\n\n<b>Защита — CSRF token (Synchronizer Token Pattern):</b>\n<pre><code>1. Сервер генерирует случайный токен при создании сессии\n2. Токен вкладывается в каждую форму как hidden field\n   ИЛИ в header при AJAX-запросах\n3. Сервер проверяет: в запросе есть валидный токен этой сессии?\n4. Нет токена = отказ</code></pre>\n\n<b>Evil.com не может узнать этот токен (Same-Origin Policy запрещает чтение страницы bank.com).</b>\n\n<b>Spring Security — CSRF включён по умолчанию:</b>\n<pre><code>@Configuration\n@EnableWebSecurity\npublic class SecurityConfig {\n    @Bean\n    public SecurityFilterChain chain(HttpSecurity http) throws Exception {\n        return http\n            .csrf(csrf -&gt; csrf\n                .csrfTokenRepository(CookieCsrfTokenRepository.withHttpOnlyFalse())\n                .csrfTokenRequestHandler(new CsrfTokenRequestAttributeHandler())\n            )\n            .authorizeHttpRequests(auth -&gt; auth\n                .anyRequest().authenticated())\n            .build();\n    }\n}</code></pre>\n\n<b>Для Thymeleaf форм — токен автоматически:</b>\n<pre><code>&lt;form th:action="@{/transfer}" method="post"&gt;\n    &lt;!-- Thymeleaf автоматически вставит --&gt;\n    &lt;!-- &lt;input type="hidden" name="_csrf" value="..." /&gt; --&gt;\n&lt;/form&gt;</code></pre>\n\n<b>Для AJAX — токен в meta-тег, оттуда в header:</b>\n<pre><code>&lt;meta name="_csrf" content="token-value"&gt;\n&lt;meta name="_csrf_header" content="X-CSRF-TOKEN"&gt;\n\n// JavaScript\nfetch(\\\'/api/transfer\\\', {\n    method: \\\'POST\\\',\n    headers: {\n        \\\'Content-Type\\\': \\\'application/json\\\',\n        \\\'X-CSRF-TOKEN\\\': document.querySelector(\\\'meta[name="_csrf"]\\\').content\n    },\n    body: JSON.stringify(data)\n});</code></pre>\n\n<b>🚨 Когда CSRF отключают:</b>\n<pre><code>// Stateless REST API с JWT — CSRF не нужен\nhttp.csrf(csrf -&gt; csrf.disable());\n\n// Причина: при JWT нет session cookie\n// Токен передаётся через Authorization: Bearer ...\n// Evil.com НЕ может прочитать заголовок из localStorage/memory</code></pre>\n\n<b>Правила когда отключать:</b>\n• ✅ REST API с Bearer JWT\n• ✅ API с HMAC-подписью запросов\n• ✅ Stateless микросервисы (нет cookies)\n• ❌ Приложение с session cookies — ВКЛЮЧАТЬ!\n• ❌ OAuth2 с cookie-based session\n\n<b>SameSite cookies — современная защита (2020+):</b>\n<pre><code>Set-Cookie: JSESSIONID=abc; SameSite=Strict\n// Strict — куки не отправляются при cross-site запросах (полная защита)\n// Lax (default в современных браузерах) — частично\n// None — старое поведение (нужен Secure)</code></pre>\n\nSpring Boot:\n<pre><code>server:\n  servlet:\n    session:\n      cookie:\n        same-site: strict\n        http-only: true\n        secure: true  # только HTTPS</code></pre>\n\n<b>Разные подходы к CSRF-токену:</b>\n\n<b>1. Synchronizer Token Pattern</b> (самый надёжный)\n• Токен хранится на сервере (в сессии)\n• При каждом запросе сравнивается с присланным\n\n<b>2. Double Submit Cookie</b>\n• Токен в cookie + в header/form\n• Сервер проверяет, что они совпадают\n• Stateless — не нужна сессия\n• Используется в Spring Security CookieCsrfTokenRepository\n\n<b>3. Custom Request Header</b>\n• AJAX-фреймворки шлют <code>X-Requested-With: XMLHttpRequest</code>\n• Браузер блокирует это у cross-origin (если не CORS)\n• Слабее чем token-based\n\n<b>Не защищают от CSRF:</b>\n• Проверка Referer (можно подделать, иногда пустой)\n• Capchas (не для каждого запроса)\n• Просто HTTPS\n• GET-запросы с state changes (очень плохо!) → все mutating — POST/PUT/DELETE\n\n<b>Типичная ошибка:</b>\n<pre><code>// ❌ Изменяем состояние через GET\n@GetMapping("/delete-user/{id}")\npublic void delete(@PathVariable Long id) { repo.deleteById(id); }\n// Злоумышленник: &lt;img src="https://bank.com/delete-user/999"&gt; в email\n// Браузер делает GET → аккаунт удалён!\n\n// ✅ Используй правильные методы HTTP:\n@DeleteMapping("/users/{id}")\n@PreAuthorize("hasRole(\\\'ADMIN\\\')")\npublic void delete(@PathVariable Long id) { ... }</code></pre>\n\n<b>Тестирование CSRF:</b>\n<pre><code>@Test\nvoid transfer_without_csrf_fails() throws Exception {\n    mockMvc.perform(post("/transfer").with(user("john"))\n        .contentType(MediaType.APPLICATION_JSON)\n        .content("{\\\'to\\\':\\\'attacker\\\',\\\'amount\\\':100}"))\n        .andExpect(status().isForbidden()); // 403 без csrf\n}\n\n@Test\nvoid transfer_with_csrf_succeeds() throws Exception {\n    mockMvc.perform(post("/transfer").with(csrf()).with(user("john")))\n        .andExpect(status().isOk());\n}</code></pre>\n\n<b>CSRF vs XSS:</b>\n• <b>CSRF</b> — заставляет браузер сделать запрос «изнутри»\n• <b>XSS</b> — инъекция JavaScript на страницу жертвы\n• XSS сильнее (позволяет читать всё), но CSRF проще реализовать\n\n<b>На собесе:</b>\n• Что такое CSRF? (заставляет браузер сделать mutating запрос от имени жертвы)\n• Как защититься? (CSRF token + SameSite cookies)\n• Когда CSRF не нужен? (stateless API с Bearer JWT)\n• Можно ли атаковать GET? (если GET меняет состояние — да; правильно: только POST/PUT/DELETE для мутаций)\n• Что такое SameSite cookie? (браузер не шлёт cookie на cross-site запросы)',lvl:2},

    {q:'Spring Data JPA',a:'<b>Spring Data JPA</b> — модуль поверх JPA/Hibernate, который автогенерирует реализации repository-интерфейсов. Резко сокращает бойлерплейт.\n\n<b>Иерархия интерфейсов:</b>\n<pre><code>Repository&lt;T, ID&gt;          — пустой marker interface\n  ├─ CrudRepository       — save, findById, findAll, deleteById, count\n  │   └─ PagingAndSortingRepository — + pagination и sort\n  │       └─ JpaRepository — + flush, saveAndFlush, getReferenceById, in batch\n  └─ ReactiveCrudRepository — для WebFlux</code></pre>\n\n<b>Базовое использование:</b>\n<pre><code>@Entity\npublic class User {\n    @Id @GeneratedValue\n    private Long id;\n    private String name;\n    private String email;\n    private LocalDateTime createdAt;\n    private UserStatus status;\n}\n\npublic interface UserRepository extends JpaRepository&lt;User, Long&gt; { }\n\n// Использование — реализация автоматическая!\n@Autowired UserRepository repo;\nrepo.save(user);\nUser u = repo.findById(1L).orElseThrow();\nList&lt;User&gt; all = repo.findAll();</code></pre>\n\n<b>Query Methods — запросы по имени метода</b>\nSpring парсит имя метода и генерирует JPQL:\n\n<pre><code>public interface UserRepository extends JpaRepository&lt;User, Long&gt; {\n    // WHERE email = ?\n    Optional&lt;User&gt; findByEmail(String email);\n\n    // WHERE status = ? AND created_at &gt; ?\n    List&lt;User&gt; findByStatusAndCreatedAtAfter(UserStatus status, LocalDateTime after);\n\n    // WHERE name LIKE %?%\n    List&lt;User&gt; findByNameContainingIgnoreCase(String substr);\n\n    // ORDER BY created_at DESC\n    List&lt;User&gt; findByStatusOrderByCreatedAtDesc(UserStatus status);\n\n    // COUNT\n    long countByStatus(UserStatus status);\n\n    // EXISTS\n    boolean existsByEmail(String email);\n\n    // DELETE\n    long deleteByStatus(UserStatus status);\n\n    // TOP / FIRST\n    List&lt;User&gt; findTop10ByOrderByCreatedAtDesc();\n    Optional&lt;User&gt; findFirstByStatus(UserStatus s);\n}</code></pre>\n\n<b>Ключевые слова в query methods:</b>\n<pre><code>And, Or, Not, Between, LessThan, GreaterThan,\nLike, NotLike, Containing, StartingWith, EndingWith,\nIn, NotIn, IsNull, IsNotNull, True, False,\nIgnoreCase, OrderBy...Asc/Desc</code></pre>\n\n<b>@Query — собственные запросы:</b>\n<pre><code>// JPQL (через entity)\n@Query("SELECT u FROM User u WHERE u.email = :email AND u.status = :status")\nOptional&lt;User&gt; findActive(@Param("email") String email, @Param("status") UserStatus status);\n\n// Native SQL\n@Query(value = "SELECT * FROM users WHERE created_at &gt; NOW() - INTERVAL \\\'7 days\\\'",\n       nativeQuery = true)\nList&lt;User&gt; findRecent();\n\n// С пагинацией\n@Query("SELECT u FROM User u WHERE u.status = :status")\nPage&lt;User&gt; findByStatus(@Param("status") UserStatus status, Pageable pageable);</code></pre>\n\n<b>@Modifying — для UPDATE/DELETE:</b>\n<pre><code>@Modifying\n@Transactional\n@Query("UPDATE User u SET u.status = :status WHERE u.id = :id")\nint updateStatus(@Param("id") Long id, @Param("status") UserStatus status);\n\n// Возвращает количество изменённых строк\n// clearAutomatically = true — очистить persistence context после</code></pre>\n\n<b>Pagination и сортировка:</b>\n<pre><code>Pageable pageable = PageRequest.of(0, 20, Sort.by("createdAt").descending());\nPage&lt;User&gt; page = repo.findAll(pageable);\n\npage.getContent();       // List&lt;User&gt; текущей страницы\npage.getTotalElements(); // общее количество записей\npage.getTotalPages();\npage.hasNext();\npage.getNumber();        // номер страницы\n\n// Slice — оптимизация: без count query, просто «есть ли следующая»\nSlice&lt;User&gt; slice = repo.findByStatus(status, pageable);</code></pre>\n\n<b>Specification — динамические запросы (Criteria API):</b>\n<pre><code>public interface UserRepository extends JpaRepository&lt;User, Long&gt;,\n        JpaSpecificationExecutor&lt;User&gt; { }\n\n// Композиция условий\nSpecification&lt;User&gt; active = (root, query, cb) -&gt;\n    cb.equal(root.get("status"), UserStatus.ACTIVE);\n\nSpecification&lt;User&gt; recent = (root, query, cb) -&gt;\n    cb.greaterThan(root.get("createdAt"), LocalDateTime.now().minusDays(7));\n\n// Комбинация\nrepo.findAll(active.and(recent), pageable);</code></pre>\n\n<b>Auditing — автоматическая запись дат:</b>\n<pre><code>@EntityListeners(AuditingEntityListener.class)\n@Entity\npublic class User {\n    @CreatedDate\n    private LocalDateTime createdAt;\n\n    @LastModifiedDate\n    private LocalDateTime updatedAt;\n\n    @CreatedBy\n    private String createdBy;\n\n    @LastModifiedBy\n    private String updatedBy;\n}\n\n@Configuration\n@EnableJpaAuditing\npublic class JpaConfig {\n    @Bean\n    public AuditorAware&lt;String&gt; auditorProvider() {\n        return () -&gt; Optional.ofNullable(SecurityContextHolder.getContext().getAuthentication())\n            .map(Authentication::getName);\n    }\n}</code></pre>\n\n<b>Projections — выборка только нужных полей:</b>\n<pre><code>// Interface-based\npublic interface UserSummary {\n    Long getId();\n    String getName();\n    // никаких полей больше — SQL select только этих\n}\n\nList&lt;UserSummary&gt; findByStatus(UserStatus status);\n\n// DTO-based\n@Query("SELECT new com.example.UserDto(u.id, u.name) FROM User u WHERE u.status = :s")\nList&lt;UserDto&gt; findSummary(@Param("s") UserStatus s);</code></pre>\n\n<b>@EntityGraph — решение N+1:</b>\n<pre><code>@EntityGraph(attributePaths = {"orders", "profile"})\nList&lt;User&gt; findByStatus(UserStatus status);\n// Загрузит User + orders + profile одним JOIN, без N+1</code></pre>\n\n<b>Частые грабли:</b>\n• <b>N+1 queries</b> — lazy-связи в цикле → @EntityGraph, JOIN FETCH\n• <b>@Modifying без @Transactional</b> — ошибка в runtime\n• <b>findById vs getReferenceById</b> — findById делает SELECT сразу, getReferenceById возвращает proxy (lazy)\n• <b>save() vs persist/merge</b> — save() делает persist для new или merge для existing\n\n<b>На собесе:</b>\n• Разница JpaRepository и CrudRepository? (JpaRepository добавляет flush, batch, pagination)\n• Как оптимизировать N+1? (@EntityGraph, JOIN FETCH)\n• Что делает findAll(Specification)? (динамический WHERE через Criteria API)\n• Page vs Slice? (Page выполняет COUNT query, Slice — нет)',hot:1,lvl:2},
    {q:'MapStruct',a:'Compile-time генератор маппинга Entity <-> DTO. Без рефлексии.\n\n<pre><code>@Mapper(componentModel = "spring") // интеграция со Spring\npublic interface PaymentMapper {\n\n    // Простой маппинг (имена полей совпадают)\n    PaymentDto toDto(Payment payment);\n    List&lt;PaymentDto&gt; toDtoList(List&lt;Payment&gt; payments);\n\n    // Кастомный маппинг\n    @Mapping(source = "merchant.name", target = "merchantName")\n    @Mapping(source = "createdAt", target = "date", dateFormat = "dd.MM.yyyy")\n    @Mapping(target = "id", ignore = true)\n    PaymentDto toDetailDto(Payment payment);\n\n    // Обратный маппинг\n    @Mapping(target = "id", ignore = true)\n    @Mapping(target = "status", constant = "CREATED")\n    Payment toEntity(CreatePaymentRequest request);\n}\n\n// Использование:\n@Service\npublic class PaymentService {\n    private final PaymentMapper mapper; // инжектится как Spring bean\n\n    public PaymentDto getPayment(Long id) {\n        Payment p = repo.findById(id).orElseThrow();\n        return mapper.toDto(p);\n    }\n}</code></pre>\n\n<b>Преимущества перед ModelMapper/Dozer:</b>\n• Компиляция -> нет рефлексии, максимальная скорость\n• Type-safe: ошибки маппинга при компиляции\n• Генерирует обычный Java-код (можно отлаживать)\n\n<b>На собесе:</b> почему MapStruct лучше ручного маппинга? (нет boilerplate, compile-time проверки, поддерживает вложенные объекты)',lvl:2},
    {q:'Spring кэширование',a:'<pre><code>@Configuration\n@EnableCaching\npublic class CacheConfig { }\n\n@Service\npublic class MerchantService {\n\n    @Cacheable(value = "merchants", key = "#id")\n    public Merchant findById(Long id) {\n        log.info("Loading from DB"); // только при первом вызове!\n        return repo.findById(id).orElseThrow();\n    }\n\n    @CachePut(value = "merchants", key = "#merchant.id")\n    public Merchant update(Merchant merchant) {\n        return repo.save(merchant); // обновляет и кэш\n    }\n\n    @CacheEvict(value = "merchants", key = "#id")\n    public void delete(Long id) {\n        repo.deleteById(id); // удаляет из кэша\n    }\n\n    @CacheEvict(value = "merchants", allEntries = true)\n    public void clearCache() { } // очистить весь кэш\n}</code></pre>\n\n<b>Провайдеры:</b>\n• <b>Caffeine</b> — in-memory, быстрый, для одного инстанса\n• <b>Redis</b> — distributed, для нескольких инстансов\n\n<pre><code># application.yml\nspring.cache.type=caffeine\nspring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m\n\n# Или Redis:\nspring.cache.type=redis\nspring.data.redis.host=localhost</code></pre>\n\n<b>Подводные камни:</b>\n• Self-invocation — как @Transactional, proxy не работает\n• unless = "#result == null" — не кэшировать null\n• TTL — обязательно! Без TTL кэш растёт бесконечно\n\n<b>На собесе:</b> как инвалидировать кэш при обновлении? (@CachePut или @CacheEvict)',lvl:2},
    {q:'Spring Cloud — обзор',a:'Набор инструментов для микросервисов:\n\n• <b>Spring Cloud Config</b> — централизованная конфигурация\n• <b>Spring Cloud Gateway</b> — API Gateway\n• <b>Spring Cloud OpenFeign</b> — декларативный HTTP клиент\n• <b>Spring Cloud Circuit Breaker</b> — Resilience4j\n• <b>Spring Cloud Stream</b> — messaging abstraction (Kafka, RabbitMQ)\n• <b>Spring Cloud Kubernetes</b> — интеграция с K8s\n\nSpring Cloud Contract — consumer-driven contract testing.',lvl:2},

    {q:'RestTemplate vs WebClient',a:'<b>RestTemplate</b> (legacy):\n• Синхронный, блокирующий\n• Deprecated с Spring 6 (maintenance mode)\n\n<b>WebClient</b> (рекомендуемый):\n• Неблокирующий (reactive)\n• Поддерживает sync и async режимы\n• Fluent API\n\n<pre><code>WebClient client = WebClient.create("http://api.example.com");\nMono<Payment> payment = client.get()\n    .uri("/payments/{id}", id)\n    .retrieve()\n    .bodyToMono(Payment.class);\n// Sync: payment.block()\n// Async: payment.subscribe(p -> ...)</code></pre>',hot:1,lvl:2},
    {q:'@HttpExchange (Spring 6+)',a:'Декларативный HTTP-клиент (аналог Feign):\n\n<pre><code>@HttpExchange("/api/payments")\npublic interface PaymentClient {\n    @GetExchange("/{id}")\n    Payment getById(@PathVariable Long id);\n\n    @PostExchange\n    Payment create(@RequestBody CreatePaymentRequest req);\n}</code></pre>\n\nСоздание: WebClientAdapter + HttpServiceProxyFactory.\nПреимущество: нативный Spring, без дополнительных зависимостей.',lvl:2},

    {s:'Spring Batch'},
    {q:'Spring Batch — основы',a:'Фреймворк для пакетной обработки данных.\n\n<b>Архитектура:</b> Job → Step → (Chunk или Tasklet)\n\n<b>Chunk processing:</b>\n1. ItemReader — чтение данных (БД, файл)\n2. ItemProcessor — преобразование\n3. ItemWriter — запись (БД, файл, Kafka)\n\nChunk size = количество элементов в одной транзакции.\n\n<b>Tasklet:</b> простая задача (очистка файлов, отправка отчёта).\n\n<b>Job scheduling:</b> @Scheduled, Camunda, или внешний (cron, Kubernetes CronJob).',lvl:2},
    {s:'Connection Pooling'},
    {q:'HikariCP — пул соединений',a:'HikariCP — default connection pool в Spring Boot. Самый быстрый.\n\n<pre><code># application.yml\nspring.datasource:\n  url: jdbc:postgresql://localhost:5432/payments\n  username: app\n  password: secret\n  hikari:\n    maximum-pool-size: 10      # макс. соединений\n    minimum-idle: 5            # минимум idle соединений\n    connection-timeout: 30000  # 30s ожидание свободного\n    idle-timeout: 600000       # 10min неактивное закрывается\n    max-lifetime: 1800000      # 30min макс. жизнь соединения\n    leak-detection-threshold: 60000 # 60s — предупреждение об утечке!</code></pre>\n\n<b>Формула размера пула:</b>\n<code>connections = (CPU cores * 2) + effective_spindle_count</code>\nОбычно <b>10-20</b> для микросервиса. Больше != лучше (contention на БД)!\n\n<b>Мониторинг (Actuator + Prometheus):</b>\n<pre><code>hikaricp_connections_active     — активные\nhikaricp_connections_idle       — простаивающие\nhikaricp_connections_pending    — ожидающие (должно быть 0!)\nhikaricp_connections_timeout_total — таймауты (проблема!)</code></pre>\n\n<b>Частые проблемы:</b>\n• <b>Connection leak:</b> забыли закрыть Connection (try-with-resources!). leak-detection-threshold поможет найти.\n• <b>Pool exhaustion:</b> все соединения заняты -> timeout. Причины: медленные запросы, нехватка pool size, deadlock в БД.\n\n<b>На собесе:</b> как настроен connection pool? Как определить оптимальный размер? (зависит от нагрузки, CPU, I/O)',lvl:2,hot:1},
]},

  { id:'kafka', icon:'&#128233;', name:'Kafka & Messaging', data: [
    {s:'Основы Kafka'},
    {q:'Kafka — концепции',a:'Apache Kafka — распределённая платформа event streaming.\n\n<pre><code>Producer ---> [Topic]\n              ├── Partition 0: [msg0][msg1][msg2]... (append-only log)\n              ├── Partition 1: [msg0][msg1]...\n              └── Partition 2: [msg0][msg1][msg2][msg3]...\n                                        ↑ offset\n              Consumer Group A:\n                Consumer 1 <- Partition 0\n                Consumer 2 <- Partition 1, 2\n              Consumer Group B (независимо):\n                Consumer 3 <- Partition 0, 1, 2</code></pre>\n\n<b>Ключевые концепции:</b>\n• <b>Broker</b> — сервер Kafka (обычно 3+ в кластере)\n• <b>Topic</b> — логический канал (как таблица)\n• <b>Partition</b> — единица параллелизма и ordering\n• <b>Offset</b> — номер сообщения в партиции (immutable)\n• <b>Consumer Group</b> — каждая партиция = один consumer в группе\n• <b>ISR</b> (In-Sync Replicas) — реплики, не отстающие от лидера\n• <b>Replication Factor</b> — сколько копий (обычно 3)\n\n<b>KRaft (Kafka 3.x+):</b> метаданные в самой Kafka, ZooKeeper больше не нужен (удалён в 4.0).\n\n<b>Retention:</b> сообщения хранятся N дней (default 7), не удаляются при чтении!\n\n<b>На собесе:</b> чем Kafka отличается от обычной очереди? (log-based, retention, replay, consumer groups)',hot:1,lvl:2},
    {q:'Что такое партиция? Зачем нужна?',a:'Партиция — физическое разделение топика. Append-only лог.\n\n<b>Зачем:</b>\n• Параллелизм: разные consumers читают разные партиции\n• Масштабируемость: партиции распределены по брокерам\n• Ordering гарантирован ВНУТРИ партиции\n\nВыбор партиции: hash(key) % numPartitions, round-robin (без ключа), custom.\n\nБольше партиций → больше параллелизм, но больше overhead (memory, file handles).',lvl:2},
    {q:'Producer — гарантии',a:'<b>acks — уровень подтверждения:</b>\n<pre><code>acks=0    — fire-and-forget. Быстро, но можно потерять.\nacks=1    — лидер подтвердил. Потеря если лидер упал до репликации.\nacks=all  — все ISR подтвердили. Максимальная надёжность.\n            + min.insync.replicas=2 — гарантия при падении 1 брокера</code></pre>\n\n<b>Idempotent Producer (default с Kafka 3.0):</b>\n<pre><code>enable.idempotence=true\n// Каждому сообщению — sequence number\n// Брокер дедуплицирует: повторная отправка не создаст дубль\n// Гарантирует exactly-once на уровне ОДНОЙ партиции</code></pre>\n\n<b>Transactional Producer:</b>\n<pre><code>props.put(ProducerConfig.TRANSACTIONAL_ID_CONFIG, "payment-producer");\nproducer.initTransactions();\ntry {\n    producer.beginTransaction();\n    producer.send(new ProducerRecord("payments", key, value));\n    producer.send(new ProducerRecord("audit", key, auditEvent));\n    producer.commitTransaction(); // атомарно в оба топика!\n} catch (Exception e) {\n    producer.abortTransaction();\n}</code></pre>\n\n<b>Выбор партиции:</b>\n• Есть ключ -> hash(key) % numPartitions (одинаковый ключ = одна партиция = ordering!)\n• Нет ключа -> round-robin (или sticky partitioner)\n• Custom: implements Partitioner\n\n<b>На собесе:</b> как гарантировать порядок сообщений? (один ключ = одна партиция. max.in.flight.requests.per.connection=1 для строгого порядка)',hot:1,lvl:2},
    {q:'Consumer — offset management',a:'<pre><code>// Consumer group: 1 партиция = 1 consumer\n// 3 партиции, 3 consumers -> каждый читает свою\n// 3 партиции, 2 consumers -> один читает 2\n// 3 партиции, 4 consumers -> один простаивает!</code></pre>\n\n<b>Offset commit:</b>\n<pre><code>// Auto commit (по умолчанию)\nenable.auto.commit=true\nauto.commit.interval.ms=5000\n// Риск: commit до обработки -> at-most-once\n// Риск: обработка до commit -> at-least-once с дублями\n\n// Ручной commit (рекомендуется для надёжности)\nenable.auto.commit=false\nwhile (true) {\n    ConsumerRecords records = consumer.poll(Duration.ofMillis(100));\n    for (ConsumerRecord r : records) {\n        processPayment(r.value());  // 1. Обработать\n    }\n    consumer.commitSync();          // 2. Commit ПОСЛЕ обработки\n    // -> at-least-once (при падении между 1 и 2 -> повтор)\n}</code></pre>\n\n<b>Гарантии доставки:</b>\n• <b>At-most-once:</b> commit до обработки. Потеря при ошибке.\n• <b>At-least-once:</b> commit после обработки. Дубли при ошибке. -> Нужна идемпотентность!\n• <b>Exactly-once:</b> transactions + idempotent consumer (дедупликация по ID в БД)\n\n<b>auto.offset.reset:</b>\n• earliest — читать с начала (если нет committed offset)\n• latest — читать только новые\n\n<b>На собесе:</b> как обеспечить exactly-once? (idempotency key в сообщении + UPSERT/check в БД перед обработкой)',hot:1,lvl:2},
    {q:'Consumer Group Rebalancing',a:'Перераспределение партиций между consumers.\n\n<b>Triggers:</b> новый consumer, consumer ушёл, новые партиции.\n\n<b>Стратегии:</b>\n• Range — непрерывные диапазоны партиций\n• RoundRobin — равномерно\n• Sticky — минимум перемещений\n• CooperativeSticky — инкрементальный rebalance (не stop-the-world)\n\nПроблема: во время rebalance — обработка стоит. Cooperative — лучше.',lvl:3},
    {q:'Kafka vs RabbitMQ',a:'<pre><code>Критерий          Kafka              RabbitMQ\n──────────────────────────────────────────────────\nМодель            Log (append-only)  Queue (AMQP)\nДоставка          Pull (consumer)    Push (broker)\nХранение          Retention (дни)    Удаление после ACK\nReplay            Да (перечитать)    Нет\nOrdering          В партиции         В очереди\nПропускная        Миллионы msg/s     Тысячи msg/s\nМаршрутизация     По ключу/партиции  Exchange routing\nConsumer groups   Да (независимые)   Нет (конкурентные)\nProtocol          TCP (свой)         AMQP, STOMP, MQTT</code></pre>\n\n<b>Когда Kafka:</b>\n• Event streaming, event sourcing\n• Audit log (нужен replay)\n• High throughput (платежи, логи)\n• Несколько независимых consumers\n\n<b>Когда RabbitMQ:</b>\n• Task queues (воркеры)\n• Request-reply (RPC)\n• Сложная маршрутизация (topic exchange, headers)\n• Приоритеты сообщений\n\n<b>В стеке Raiffeisen:</b> Kafka для event streaming + Artemis (JMS) для команд.\n\n<b>На собесе:</b> почему Kafka а не RabbitMQ для платёжных событий? (retention для аудита, replay, consumer groups для разных подписчиков)',hot:1,lvl:2},
    {q:'Kafka Connect и Streams',a:'Два ключевых дополнения к базовому Kafka — для интеграции и потоковой обработки без написания consumer-кода.\n\n<b>=== Kafka Connect ===</b>\n\nФреймворк для <b>интеграции Kafka с внешними системами без написания кода</b>. Декларативная конфигурация через JSON.\n\n<b>Два типа коннекторов:</b>\n\n<b>Source Connector</b> — данные идут ВНУТРЬ Kafka\n<pre><code>PostgreSQL ──(Debezium)──► Kafka topic\nMySQL, Oracle, MongoDB    ─► Kafka\nFiles, REST APIs           ─► Kafka\nSalesforce, Jira           ─► Kafka</code></pre>\n\n<b>Sink Connector</b> — данные идут ИЗ Kafka наружу\n<pre><code>Kafka topic ──► Elasticsearch\n           ──► HDFS / S3\n           ──► JDBC (любая БД)\n           ──► MongoDB</code></pre>\n\n<b>Пример Debezium (CDC из PostgreSQL):</b>\n<pre><code>POST http://kafka-connect:8083/connectors\n{\n  "name": "payments-cdc",\n  "config": {\n    "connector.class": "io.debezium.connector.postgresql.PostgresConnector",\n    "database.hostname": "postgres",\n    "database.port": "5432",\n    "database.user": "debezium",\n    "database.password": "...",\n    "database.dbname": "mydb",\n    "table.include.list": "public.payments,public.orders",\n    "topic.prefix": "dbserver1",\n    "plugin.name": "pgoutput"\n  }\n}\n\n// Результат: каждое изменение в payments/orders автоматически\n// публикуется в Kafka topic dbserver1.public.payments\n// Формат: before + after + source metadata</code></pre>\n\n<b>Кейсы использования Kafka Connect:</b>\n• <b>CDC (Change Data Capture)</b> — читать изменения из БД в реальном времени\n• <b>Data pipeline</b> — из production БД в аналитический DWH\n• <b>Переход на event-driven</b> без переписывания legacy системы\n• <b>Репликация</b> между регионами / кластерами\n• <b>Enrichment</b> — загрузка данных из внешних API в Kafka\n\n<b>Плюсы:</b>\n• Нет кода — только JSON config\n• Масштабируемо (distributed mode, задачи разносятся по workers)\n• Exactly-once semantics (с source/sink которые поддерживают)\n• REST API для управления\n• Много готовых connectors (Confluent Hub — 200+)\n\n<b>Минусы:</b>\n• Не гибкий — что коннектор умеет, то и умеет\n• Для кастомной логики — либо SMT (Single Message Transform), либо Kafka Streams\n• Отдельный cluster для Connect\n\n<b>SMT (Single Message Transformations)</b> — лёгкие преобразования:\n<pre><code>"transforms": "unwrap,dropFields",\n"transforms.unwrap.type": "io.debezium.transforms.ExtractNewRecordState",\n"transforms.dropFields.type": "org.apache.kafka.connect.transforms.ReplaceField$Value",\n"transforms.dropFields.blacklist": "password,ssn"</code></pre>\n\n<b>=== Kafka Streams ===</b>\n\nБиблиотека для <b>потоковой обработки данных</b>. Встраивается в обычное Java-приложение (не нужен отдельный cluster как у Flink/Spark).\n\n<b>Основные абстракции:</b>\n\n<b>KStream&lt;K, V&gt;</b> — поток событий (каждая запись — новое событие)\n<pre><code>// События: клики, заказы, транзакции — каждая уникальна\nKStream&lt;String, Order&gt; orders = builder.stream("orders");</code></pre>\n\n<b>KTable&lt;K, V&gt;</b> — changelog / snapshot последнего состояния\n<pre><code>// Последнее состояние: текущая цена товара, остатки\n// Новая запись с тем же ключом = обновление старой\nKTable&lt;String, User&gt; users = builder.table("users");</code></pre>\n\n<b>GlobalKTable</b> — полностью загружен на каждом экземпляре (для lookup-ов)\n\n<b>Пример — обработка платежей:</b>\n<pre><code>StreamsBuilder builder = new StreamsBuilder();\n\n// Source\nKStream&lt;String, Payment&gt; payments = builder.stream("payments");\n\n// 1. Фильтрация\nKStream&lt;String, Payment&gt; successful = payments\n    .filter((k, v) -&gt; v.getStatus().equals("SUCCESS"));\n\n// 2. Трансформация\nKStream&lt;String, FraudScore&gt; scores = payments\n    .mapValues(payment -&gt; calculateFraudScore(payment));\n\n// 3. Группировка и агрегация\nKTable&lt;String, Long&gt; countByMerchant = payments\n    .groupBy((k, v) -&gt; v.getMerchantId())\n    .count();\n\n// 4. Оконные операции (windowed)\nKTable&lt;Windowed&lt;String&gt;, Double&gt; sumPerMinute = payments\n    .groupBy((k, v) -&gt; v.getMerchantId())\n    .windowedBy(TimeWindows.of(Duration.ofMinutes(1)))\n    .aggregate(\n        () -&gt; 0.0,\n        (key, payment, total) -&gt; total + payment.getAmount()\n    );\n\n// 5. Join двух потоков\nKStream&lt;String, EnrichedPayment&gt; enriched = payments\n    .join(users, (payment, user) -&gt; new EnrichedPayment(payment, user));\n\n// Sink\nsuccessful.to("successful-payments");\nsumPerMinute.toStream().to("merchant-stats");\n\n// Запуск\nKafkaStreams streams = new KafkaStreams(builder.build(), config);\nstreams.start();</code></pre>\n\n<b>Окна (windowing):</b>\n• <b>Tumbling</b> — непересекающиеся: 0-1мин, 1-2мин, ...\n• <b>Hopping</b> — пересекающиеся: 0-5мин, 1-6мин, 2-7мин\n• <b>Sliding</b> — по событию\n• <b>Session</b> — группирует по неактивности\n\n<b>State Stores (RocksDB):</b>\nKafka Streams хранит агрегированное состояние локально в RocksDB. Backup в Kafka changelog topic. При рестарте/failover — восстанавливается из changelog.\n\n<b>Exactly-once semantics:</b>\n<pre><code>props.put(StreamsConfig.PROCESSING_GUARANTEE_CONFIG, "exactly_once_v2");\n// Гарантия: каждое событие обработано ровно один раз,\n// даже при failure и перебалансировке</code></pre>\n\n<b>Interactive Queries</b> — можно запрашивать текущее состояние store через REST:\n<pre><code>ReadOnlyKeyValueStore&lt;String, Long&gt; store = streams.store(\n    StoreQueryParameters.fromNameAndType(\n        "merchant-stats", QueryableStoreTypes.keyValueStore()));\n\nLong count = store.get("merchant-123"); // без обращения в Kafka</code></pre>\n\n<b>Сравнительная таблица:</b>\n<pre><code>Критерий          | Kafka Connect       | Kafka Streams\n──────────────────┼─────────────────────┼──────────────────\nНазначение        | Integration         | Stream processing\nКод               | нет (JSON config)   | Java API\nOperation         | Move data           | Transform, aggregate\nDeployment        | Connect cluster     | Embedded in app\nState             | stateless           | stateful (stores)\nГибкость          | низкая              | высокая\nConnectors        | 200+ готовых        | N/A\nExactly-once      | partial support     | ✅ полная\nWindowing         | ❌                   | ✅\nJoins             | ❌                   | ✅</code></pre>\n\n<b>Когда что использовать:</b>\n• <b>Только integration</b> (БД → Kafka → ES) — Kafka Connect\n• <b>Простая обработка без состояния</b> — обычный Spring Kafka consumer\n• <b>Сложная аналитика на стримах</b> — Kafka Streams\n• <b>Большие кластеры, batch + stream</b> — Apache Flink / Spark\n\n<b>Комбинация:</b>\n<pre><code>PostgreSQL ──(Debezium/Connect)──► Kafka topic payments\n                                         │\n                                         ▼\n                              Kafka Streams application\n                              (filtering, aggregation, enrichment)\n                                         │\n                                         ▼\n               Output topics: alerts, aggregates, fraud-scores\n                                         │\n                                         ▼\n              (Connect Sink) ──► Elasticsearch / Redis / DWH</code></pre>\n\n<b>Альтернативы Kafka Streams:</b>\n• <b>Apache Flink</b> — более мощный, отдельный cluster, лучше для Complex Event Processing\n• <b>Spark Streaming</b> — micro-batching, часть Hadoop экосистемы\n• <b>ksqlDB</b> — SQL over Kafka (поверх Kafka Streams)\n\n<b>На собесе:</b>\n• Разница Connect и Streams? (Connect — интеграция, Streams — обработка)\n• Что такое CDC? (Change Data Capture — читаем WAL БД в Kafka)\n• KStream vs KTable? (события vs state/snapshot)\n• Как сделать exactly-once? (processing.guarantee=exactly_once_v2 + идемпотентный sink)\n• Flink vs Kafka Streams? (Flink отдельный кластер и мощнее; Streams проще и встроенный)',lvl:2},
    {q:'Kafka — обработка ошибок',a:'<b>Retry + Dead Letter Topic (Spring Kafka):</b>\n<pre><code>@RetryableTopic(\n    attempts = "3",\n    backoff = @Backoff(delay = 1000, multiplier = 2),\n    dltTopicSuffix = ".DLT",\n    autoCreateTopics = "true"\n)\n@KafkaListener(topics = "payment-events")\npublic void handle(PaymentEvent event) {\n    paymentService.process(event); // при ошибке -> retry 3 раза\n    // 1s -> 2s -> 4s -> DLT\n}\n\n@DltHandler\npublic void handleDlt(PaymentEvent event) {\n    log.error("Failed after retries: {}", event);\n    alertService.notify("Payment processing failed: " + event.getId());\n    // Сохранить для ручной обработки\n}</code></pre>\n\n<b>Альтернатива — ErrorHandler:</b>\n<pre><code>@Bean\nKafkaListenerContainerFactory&lt;?&gt; factory(\n        ConsumerFactory&lt;String, PaymentEvent&gt; cf) {\n    var factory = new ConcurrentKafkaListenerContainerFactory&lt;&gt;();\n    factory.setConsumerFactory(cf);\n    factory.setCommonErrorHandler(\n        new DefaultErrorHandler(new DeadLetterPublishingRecoverer(kafkaTemplate),\n            new FixedBackOff(1000L, 3))); // 3 retry, 1s interval\n    return factory;\n}</code></pre>\n\n<b>Стратегия обработки ошибок:</b>\n1. Retry с backoff (transient errors: сеть, таймаут)\n2. DLT для permanent errors (невалидные данные, бизнес-ошибки)\n3. Мониторинг DLT (алерт если сообщения попали)\n4. Ручная обработка или replay из DLT\n\n<b>На собесе:</b> что происходит если consumer не может обработать сообщение? (retry -> DLT -> alert -> manual processing)',lvl:2},
    {q:'Гарантия доставки и exactly-once',a:'<b>Exactly-once = idempotent producer + transactional consumer</b>\n\n<b>Producer side:</b>\n<pre><code>enable.idempotence=true          // sequence numbers, дедупликация\ntransactional.id=payment-producer // атомарная запись в несколько топиков\nacks=all                          // все ISR подтвердили\nmin.insync.replicas=2            // минимум 2 реплики</code></pre>\n\n<b>Consumer side — идемпотентная обработка:</b>\n<pre><code>@KafkaListener(topics = "payment-events")\n@Transactional\npublic void handle(PaymentEvent event) {\n    // Идемпотентность через уникальный ключ в БД!\n    if (processedEventRepo.existsByEventId(event.getEventId())) {\n        log.warn("Duplicate event: {}", event.getEventId());\n        return; // уже обработано\n    }\n\n    paymentService.process(event);\n\n    // Сохраняем факт обработки\n    processedEventRepo.save(new ProcessedEvent(event.getEventId()));\n    // В одной транзакции с бизнес-логикой!\n}</code></pre>\n\n<b>Для платежей idempotency key — критически важен:</b>\n• Пользователь нажал "Оплатить" дважды -> один платёж\n• Kafka retry отправил сообщение повторно -> не дублируем\n• Сервис перезапустился и перечитал offset -> не обрабатываем повторно\n\n<b>На собесе:</b> как реализовать exactly-once для платежей? (idempotent producer + проверка eventId в БД перед обработкой)',hot:1,lvl:3},
    {q:'Мониторинг Kafka',a:'<b>Broker метрики:</b>\n• UnderReplicatedPartitions — реплики отстают\n• ActiveControllerCount — должен быть 1\n• OfflinePartitionsCount — недоступные партиции\n\n<b>Producer:</b> record-send-rate, request-latency\n<b>Consumer:</b> consumer-lag (offset отставание — ключевая метрика!)\n\nИнструменты: Kafka UI, AKHQ, Confluent Control Center, Burrow (lag monitoring).',lvl:2},
    {s:'JMS'},
    {q:'JMS и Artemis',a:'<b>JMS (Java Message Service)</b> — стандартный API Java для работы с message brokers. Часть Jakarta EE (<code>jakarta.jms</code>, до этого <code>javax.jms</code>).\n\n<b>Основные концепции:</b>\n\n<b>1. Point-to-Point (Queue) — один получатель</b>\n<pre><code>Producer ──► [Queue] ──► Consumer\n                    │\n                    └──► (только один consumer получит)</code></pre>\n• Сообщение доставляется <b>одному</b> получателю\n• Если несколько consumers — балансировка между ними\n• Используется для команд: «обработать платёж»\n\n<b>2. Publish-Subscribe (Topic) — много подписчиков</b>\n<pre><code>Producer ──► [Topic] ──┬──► Subscriber 1\n                       ├──► Subscriber 2\n                       └──► Subscriber 3</code></pre>\n• Каждый активный подписчик получает КОПИЮ сообщения\n• Используется для уведомлений: «статус заказа изменился»\n\n<b>Типы сообщений:</b>\n• <code>TextMessage</code> — строки, часто JSON\n• <code>BytesMessage</code> — бинарные данные\n• <code>ObjectMessage</code> — сериализуемые объекты (избегать! версионирование)\n• <code>MapMessage</code> — пары ключ-значение\n• <code>StreamMessage</code> — поток примитивов\n\n<b>Artemis (ActiveMQ Artemis)</b> — флагманский broker от Red Hat, замена ActiveMQ «Classic». Поддерживает:\n• <b>JMS 2.0</b> (Jakarta Messaging)\n• <b>AMQP 1.0</b>\n• <b>STOMP</b>, <b>MQTT</b>, <b>OpenWire</b>\n• HA через replication или shared storage\n• Persistence на диск\n• Transactions, Selectors, Priorities, Delayed messages\n\n<b>Пример в Spring Boot + Artemis:</b>\n<pre><code># application.yml\nspring:\n  artemis:\n    mode: native\n    broker-url: tcp://localhost:61616\n    user: admin\n    password: admin</code></pre>\n\n<pre><code>// Producer\n@Service\npublic class PaymentProducer {\n    @Autowired private JmsTemplate jmsTemplate;\n\n    public void send(PaymentRequest req) {\n        jmsTemplate.convertAndSend("payment.queue", req);\n    }\n}\n\n// Consumer\n@Component\npublic class PaymentConsumer {\n    @JmsListener(destination = "payment.queue")\n    public void onMessage(PaymentRequest req) {\n        // обработка\n    }\n}</code></pre>\n\n<b>Гарантии доставки:</b>\n• <b>AUTO_ACKNOWLEDGE</b> — автоматически после получения (минус: потеря при падении)\n• <b>CLIENT_ACKNOWLEDGE</b> — клиент подтверждает вручную\n• <b>DUPS_OK_ACKNOWLEDGE</b> — допускает дубликаты, быстрее\n• <b>Transactional</b> — в транзакции с БД\n\n<b>JMS vs Kafka — главная разница:</b>\n<pre><code>Критерий          | JMS (Artemis)    | Kafka\n──────────────────┼──────────────────┼─────────────────────\nМодель            | Message queue    | Distributed log\nХранение          | Удаляется после  | Долго (ретеншн), можно\n                  | прочтения        | читать с любого offset\nПорядок           | FIFO в очереди   | По партиции\nThroughput        | Десятки тыс/сек  | Миллионы/сек\nНагрузка          | Медиум           | Высокая\nScope             | Команды, задания | Events, streams\nРепликация        | HA master/slave  | Replication factor N\nConsumers         | Pull/Push        | Pull с commitом\nReplay            | ❌               | ✅ от любого offset\nDelayed messages  | ✅ нативно       | ❌ (нужно писать)\nPriority          | ✅               | ❌</code></pre>\n\n<b>Когда JMS/Artemis:</b>\n• Транзакционные сообщения внутри корпоративной сети\n• Когда важны приоритеты, задержанные сообщения, TTL\n• Интеграция с legacy Java EE системами\n• Меньшие объёмы, но важна надёжность и простота\n• Request/Reply паттерны (Artemis поддерживает из коробки)\n\n<b>Когда Kafka:</b>\n• High throughput event streaming\n• Event sourcing, log aggregation\n• Stream processing (Kafka Streams, Flink)\n• Когда много consumers читают одни и те же события\n• Когда нужен replay истории событий\n\n<b>RabbitMQ — тоже MQ (AMQP), альтернатива Artemis:</b>\n• Более «умная» маршрутизация (exchanges + routing keys)\n• Не JMS-нативный, но через spring-rabbit\n• Часто выбирают вместо Artemis\n\n<b>Selectors (фильтры) в JMS</b> — consumer получает только подходящие сообщения:\n<pre><code>@JmsListener(destination = "orders", selector = "priority = \\\'HIGH\\\'")\npublic void onHighPriority(Order o) { }</code></pre>\n\n<b>Dead Letter Queue (DLQ)</b> — в Artemis настраивается из коробки для сообщений, которые не удалось обработать.\n\n<b>На собесе:</b>\n• Queue vs Topic? (P2P vs Pub/Sub)\n• Когда выбрать JMS вместо Kafka? (команды, транзакции, меньшие объёмы, приоритеты)\n• Как гарантировать хотя бы один раз доставку? (ack + transactions + idempotency на consumer)',hot:1,lvl:2},
  
    {q:'Spring Kafka — основы использования',a:'<pre><code>// application.yml\nspring.kafka:\n  bootstrap-servers: localhost:9092\n  producer:\n    key-serializer: org.apache.kafka.common.serialization.StringSerializer\n    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer\n  consumer:\n    group-id: payment-service\n    auto-offset-reset: earliest\n    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer\n    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer\n    properties:\n      spring.json.trusted.packages: "*"</code></pre>\n\n<b>Producer:</b>\n<pre><code>@Service\npublic class PaymentEventPublisher {\n    private final KafkaTemplate&lt;String, PaymentEvent&gt; kafka;\n\n    public void publish(Payment payment) {\n        PaymentEvent event = new PaymentEvent(payment.getId(), payment.getStatus());\n        kafka.send("payment-events", payment.getId().toString(), event)\n            .whenComplete((result, ex) -> {\n                if (ex != null) log.error("Failed to send", ex);\n                else log.info("Sent to partition {}", result.getRecordMetadata().partition());\n            });\n    }\n}</code></pre>\n\n<b>Consumer:</b>\n<pre><code>@Component\npublic class PaymentEventConsumer {\n\n    @KafkaListener(topics = "payment-events", groupId = "notification-service")\n    public void handle(PaymentEvent event,\n                       @Header(KafkaHeaders.RECEIVED_PARTITION) int partition,\n                       @Header(KafkaHeaders.OFFSET) long offset) {\n        log.info("Received: {} from partition {} offset {}", event, partition, offset);\n        notificationService.send(event);\n    }\n}</code></pre>\n\n<b>На собесе:</b> как настроен Kafka в вашем проекте? Какой serializer используете? (JSON для простоты, Avro для schema evolution)',hot:1,lvl:2},
    {q:'Schema Registry и Avro',a:'<b>Проблема:</b> producer и consumer должны согласовать формат сообщений.\n\n<b>Schema Registry:</b> хранит и версионирует схемы.\n<b>Avro:</b> бинарная сериализация со схемой.\n\nПреимущества:\n• Валидация: сообщение соответствует схеме\n• Эволюция: backward/forward compatible изменения\n• Компактность: бинарный формат меньше JSON\n\nConfluent Schema Registry — стандарт де-факто.',lvl:3},

    {s:'RabbitMQ'},
    {q:'RabbitMQ — основы',a:'Message broker, протокол AMQP.\n\n<b>Концепции:</b>\n• <b>Producer</b> → <b>Exchange</b> → <b>Queue</b> → <b>Consumer</b>\n• <b>Exchange types:</b>\n  - Direct — по routing key\n  - Fanout — broadcast всем очередям\n  - Topic — pattern matching (payment.*)\n  - Headers — по заголовкам\n\n<b>ACK:</b> consumer подтверждает обработку. При ошибке — requeue или DLQ.\n\nSpring: spring-boot-starter-amqp, @RabbitListener.',lvl:1,hot:1},
    {q:'ActiveMQ Artemis и JMS',a:'<b>JMS</b> (Jakarta Messaging) — стандартный API.\n<b>Artemis</b> — реализация (замена ActiveMQ Classic).\n\n<b>Модели:</b>\n• Queue (P2P) — один получатель\n• Topic (Pub/Sub) — все подписчики\n\n<b>Протоколы:</b> AMQP, STOMP, MQTT, OpenWire.\n\nSpring Boot: spring.artemis.broker-url, @JmsListener.\n\nКогда JMS: простые команды между сервисами.\nКогда Kafka: event streaming, audit log, replay.',lvl:2},
]},

  { id:'arch', icon:'&#127959;', name:'Архитектура и DDD', data: [
    {s:'Архитектурные стили'},
    {q:'Монолит vs Микросервисы',a:'<pre><code>            Монолит                 Микросервисы\nДеплой      Один артефакт           Независимый на сервис\nМасштаб     Целиком                 По сервисам\nТранзакции  ACID                    Eventual consistency\nОтладка     Просто (один процесс)   Сложно (distributed tracing)\nСтек        Один                    Разные возможны\nКоманда     Одна                    Отдельная на сервис\nFail        Всё падает              Изоляция отказов</code></pre>\n\n<b>Модульный монолит</b> — промежуточный вариант:\n• Один деплой, но чёткие модули с границами\n• Spring Modulith — инструмент для модульного монолита\n• Модули общаются через events, не через прямые вызовы\n• Легко извлечь в микросервис позже\n\n<b>Правило:</b> начни с монолита, извлекай микросервисы когда НУЖНО (масштаб, команды, независимый деплой).\n\n<b>Для платёжной системы Raiffeisen:</b>\n• Платежи, мерчанты, тарифы — разные bounded contexts -> разные сервисы\n• Онбординг самозанятых — может быть отдельный сервис\n• Общение: REST (синхронное) + Kafka (события)\n\n<b>На собесе:</b> когда микросервисы оправданы? (разные команды, независимый деплой, разные требования к масштабу)',hot:1,lvl:2},
    {q:'Слоистая, чистая, гексагональная',a:'<b>Слоистая:</b> Controller → Service → Repository. Простая, для CRUD.\n<b>Гексагональная (Ports & Adapters):</b> Domain ← Ports ← Adapters. Domain не зависит от фреймворков.\n<b>Чистая:</b> Entities → Use Cases → Adapters → Frameworks. Внутренние слои не знают о внешних.\n\nДля платежей: гексагональная — domain изолирован.',hot:1,lvl:2},
    {q:'Onion Architecture',a:'<b>Onion Architecture</b> (Jeffrey Palermo, 2008) — архитектурный паттерн с концентрическими слоями. Домен в центре, инфраструктура снаружи. Зависимости направлены только внутрь.\n\n<b>Структура (от центра наружу):</b>\n<pre><code>┌─────────────────────────────────────────┐\n│  Infrastructure (DB, Kafka, HTTP, UI)   │\n│  ┌───────────────────────────────────┐  │\n│  │  Application Services (Use Cases) │  │\n│  │  ┌─────────────────────────────┐  │  │\n│  │  │  Domain Services            │  │  │\n│  │  │  ┌─────────────────────┐    │  │  │\n│  │  │  │  Domain Model       │    │  │  │\n│  │  │  │  (Entities,         │    │  │  │\n│  │  │  │   Value Objects,    │    │  │  │\n│  │  │  │   Aggregates)       │    │  │  │\n│  │  │  └─────────────────────┘    │  │  │\n│  │  └─────────────────────────────┘  │  │\n│  └───────────────────────────────────┘  │\n└─────────────────────────────────────────┘\n         Зависимости направлены внутрь →</code></pre>\n\n<b>Слои:</b>\n\n<b>1. Domain Model (центр, ядро)</b>\n• Entities, Value Objects, Aggregates, Domain Events\n• Чистые Java-классы без зависимостей от фреймворков\n• Бизнес-правила и инварианты\n\n<pre><code>// Никаких @Entity, @Autowired, Spring\npublic class Payment {\n    private final PaymentId id;\n    private Money amount;\n    private PaymentStatus status;\n\n    public void authorize(String authCode) {\n        if (status != CREATED) throw new IllegalStateException();\n        this.status = AUTHORIZED;\n    }\n}</code></pre>\n\n<b>2. Domain Services</b>\n• Бизнес-логика, не принадлежащая одной сущности\n• Координация нескольких aggregates\n• Интерфейсы для внешних зависимостей (repositories)\n\n<pre><code>public class PaymentDomainService {\n    // Только интерфейсы — не импорты из infrastructure!\n    private final PaymentRepository repo;\n    private final FraudChecker fraudChecker;\n\n    public PaymentResult process(PaymentRequest req) {\n        if (fraudChecker.isSuspicious(req)) throw new FraudException();\n        Payment p = new Payment(req);\n        p.authorize(...);\n        repo.save(p);\n        return PaymentResult.success(p);\n    }\n}\n\n// Интерфейс в Domain, реализация — в Infrastructure\npublic interface PaymentRepository {\n    void save(Payment p);\n    Optional&lt;Payment&gt; findById(PaymentId id);\n}</code></pre>\n\n<b>3. Application Services (Use Cases)</b>\n• Оркестрация domain services\n• Транзакции (@Transactional)\n• Координация и переводы data formats\n\n<pre><code>@Service\n@Transactional\npublic class ProcessPaymentUseCase {\n    private final PaymentDomainService domainService;\n    private final NotificationService notifier;\n\n    public PaymentResponse execute(ProcessPaymentCommand cmd) {\n        PaymentResult result = domainService.process(cmd.toRequest());\n        notifier.notify(result);\n        return PaymentResponse.from(result);\n    }\n}</code></pre>\n\n<b>4. Infrastructure (внешний слой)</b>\n• REST Controllers, Kafka listeners\n• JPA Repositories, внешние API-клиенты\n• Конкретные реализации интерфейсов из Domain\n\n<pre><code>@Repository\npublic class JpaPaymentRepository implements PaymentRepository {\n    @Autowired JpaPaymentEntityRepo jpaRepo;\n\n    public void save(Payment p) {\n        jpaRepo.save(PaymentEntity.from(p));\n    }\n}\n\n@RestController\npublic class PaymentController {\n    @Autowired ProcessPaymentUseCase useCase;\n\n    @PostMapping("/payments")\n    public PaymentResponse create(@RequestBody PaymentRequest req) {\n        return useCase.execute(req.toCommand());\n    }\n}</code></pre>\n\n<b>Главный принцип — Dependency Inversion:</b>\n• Зависимости <b>только внутрь</b> — внешние слои зависят от внутренних\n• Внутренние слои НЕ знают о внешних\n• Интерфейсы определяются во внутренних слоях, реализации — во внешних\n\n<b>Что это даёт:</b>\n• <b>Тестируемость</b> — Domain можно тестировать без БД/Spring (юнит-тесты)\n• <b>Замена инфраструктуры</b> — переход с PostgreSQL на MongoDB не требует изменения Domain\n• <b>Независимость от фреймворка</b> — Domain на чистой Java, можно перетащить куда угодно\n• <b>Явные границы</b> — бизнес-правила изолированы от технических деталей\n\n<b>Связанные паттерны:</b>\n\n<b>Hexagonal Architecture (Ports &amp; Adapters)</b> — Alistair Cockburn, 2005. Та же идея, разная терминология:\n• Ports — интерфейсы (входящие и исходящие)\n• Adapters — конкретные реализации (REST, DB, Kafka — адаптеры)\n\n<b>Clean Architecture</b> — Robert C. Martin. Почти то же, с явным выделением Use Cases как слоя.\n\n<b>DDD + Onion</b> — часто вместе. Onion даёт структуру, DDD — содержание (Aggregate, Bounded Context, Domain Events).\n\n<b>Практическая структура Maven/Gradle модулей:</b>\n<pre><code>payment-service/\n├── domain/            -- @Entity? НЕТ. Чистые Java-классы\n│   └── Payment.java\n├── application/       -- Use cases, Domain Services\n│   └── ProcessPaymentUseCase.java\n├── infrastructure/    -- JPA, REST, Kafka\n│   ├── persistence/\n│   │   └── JpaPaymentRepository.java\n│   ├── web/\n│   │   └── PaymentController.java\n│   └── messaging/\n│       └── KafkaEventPublisher.java\n└── application-bootstrap/ -- Spring Boot Application class</code></pre>\n\n<b>Частые ошибки:</b>\n• <b>@Entity на Domain-классе</b> — нарушение изоляции. Лучше отдельные PaymentEntity (для JPA) и Payment (для Domain)\n• <b>Leaky abstraction</b> — в Domain-интерфейсе методы в стиле SQL (findByStatusAndCreatedAtAfter) — пусть будет findOpenPayments()\n• <b>Anemic Domain Model</b> — бизнес-логика в Services, классы только с getters/setters. Onion подразумевает rich domain\n\n<b>Когда оверкилл:</b>\n• CRUD-сервисы без бизнес-логики — достаточно простого Controller → Service → Repository\n• MVP, прототипы — начните проще, рефакторите когда нужно\n• Stateless REST API поверх БД\n\n<b>Когда оправдано:</b>\n• Сложная бизнес-логика (платежи, booking, вычисления)\n• Long-lived проекты (5+ лет)\n• Команды &gt;5 человек\n• Regulated industry (нужна ясная аудируемость)\n\n<b>На собесе:</b>\n• Чем отличается от классической трёхслойной? (зависимости только внутрь, Domain в центре)\n• Зачем интерфейсы репозиториев в Domain? (DIP — infrastructure зависит от Domain, не наоборот)\n• Как тестировать Domain Service? (mock интерфейсы, без Spring)\n• Onion vs Hexagonal? (почти одно и то же, разная терминология)',lvl:2},

    {q:'DDD — стратегический',a:'• <b>Ubiquitous Language</b> — единый язык\n• <b>Bounded Context</b> — граница модели\n• <b>Context Map</b> — взаимодействие контекстов:\n  Shared Kernel, Customer-Supplier, Conformist, ACL, Open Host Service\n• Subdomain: Core (платежи), Supporting (нотификации), Generic (авторизация)\n\nМикросервисы ≈ Bounded Contexts.',hot:1,lvl:2},
    {q:'DDD — тактический',a:'• <b>Entity</b> — с идентичностью (Payment)\n• <b>Value Object</b> — без ID, immutable (Money(amount, currency))\n• <b>Aggregate</b> — кластер с Aggregate Root. 1 транзакция = 1 агрегат.\n• <b>Repository</b> — 1 на агрегат\n• <b>Domain Service</b> — логика вне Entity (TransferService)\n• <b>Domain Event</b> — PaymentCreated, PaymentCompleted\n• <b>Specification</b> — бизнес-правила как предикаты',hot:1,lvl:2},
    {q:'Aggregate — правила',a:'• Aggregate Root — единственная точка входа\n• Ссылки между агрегатами — только по ID\n• Одна транзакция = один агрегат\n• Агрегат должен быть маленьким (1-3 Entity)\n\nПример платёжного агрегата:\n<pre><code>Payment (root)\n├── PaymentItem (entity)\n├── Money (value object)\n└── PaymentStatus (value object)</code></pre>\n\nMerchant — отдельный агрегат, ссылка через merchantId.',lvl:2},
    {q:'Anti-Corruption Layer (ACL)',a:'Паттерн Context Map: защищает наш Bounded Context от чужой модели.\n\nАдаптер между нашей доменной моделью и внешней системой.\n\nПример: внешний платёжный провайдер возвращает XML в своём формате → ACL конвертирует в наши доменные объекты.\n\nРеализация: Adapter + Translator/Mapper.',lvl:2},
