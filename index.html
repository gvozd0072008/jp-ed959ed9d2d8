    {q:'Особенности PostgreSQL',a:'• <b>MVCC</b> — xmin/xmax, неблокирующие чтения\n• <b>JSONB</b> — бинарный JSON, GIN индекс\n• <b>CTE:</b> WITH ... AS (...) — читаемые подзапросы\n• <b>Window functions</b>\n• Partitioning: RANGE, LIST, HASH\n• LISTEN/NOTIFY\n• pg_stat_statements\n• VACUUM / autovacuum\n• Logical/streaming replication',lvl:2},
    {q:'Window functions',a:'Вычисления по окну без группировки.\n\n<pre><code>SELECT name, salary,\n  ROW_NUMBER() OVER (ORDER BY salary DESC) as rn,\n  AVG(salary) OVER (PARTITION BY dept) as dept_avg,\n  LAG(salary) OVER (ORDER BY hire_date) as prev_salary\nFROM employees;</code></pre>\n\nROW_NUMBER(), RANK(), DENSE_RANK(), LAG(), LEAD(), SUM() OVER, FIRST_VALUE(), NTH_VALUE().',hot:1,lvl:3},
    {q:'CTE (Common Table Expressions)',a:'WITH ... AS — именованный подзапрос:\n\n<pre><code>WITH active_payments AS (\n    SELECT * FROM payments WHERE status = \'ACTIVE\'\n),\ntotals AS (\n    SELECT merchant_id, SUM(amount) total\n    FROM active_payments\n    GROUP BY merchant_id\n)\nSELECT m.name, t.total\nFROM merchants m JOIN totals t ON m.id = t.merchant_id;</code></pre>\n\n<b>Recursive CTE</b> — для деревьев и иерархий:\nWITH RECURSIVE ... — самоссылающийся запрос.',lvl:2},
    {q:'JSONB в PostgreSQL',a:'Бинарный JSON, индексируемый.\n\n<pre><code>CREATE TABLE events (id serial, data jsonb);\nCREATE INDEX idx_data ON events USING GIN (data);\n\n-- Запросы\nSELECT data->\'name\' FROM events;\nSELECT * FROM events WHERE data @> \'{\"type\": \"payment\"}\';\nSELECT * FROM events WHERE data->>\'amount\' > \'100\';</code></pre>\n\nОператоры: ->, ->>, @>, ?, #>, jsonb_path_query().',lvl:2},
    {q:'Нормализация',a:'<b>1NF</b> — атомарные значения, нет повторяющихся групп\n<b>2NF</b> — нет частичных зависимостей от составного ключа\n<b>3NF</b> — нет транзитивных зависимостей (A→B→C → разнести)\n\n<b>Денормализация</b> — дублирование для скорости чтения.\nКогда: read-heavy, отчёты, CQRS read model.',lvl:2},
    {q:'Шардирование vs Репликация',a:'<b>Репликация:</b> копии всех данных. Primary-Replica. Масштабирование чтения.\n<b>Шардирование:</b> разделение по серверам. Масштабирование записи.\n\n<b>CAP:</b> Consistency + Availability + Partition tolerance — выбери 2.\nPostgreSQL: CP. Kafka: CP.',lvl:3},
    {q:'Хранимые процедуры и представления (VIEW)',a:'<b>VIEW</b> — именованный запрос, виртуальная таблица:\n<code>CREATE VIEW active_users AS SELECT * FROM users WHERE active;</code>\nМатериализованное: MATERIALIZED VIEW — хранит результат, REFRESH.\n\n<b>Хранимые процедуры (PostgreSQL):</b>\n<pre><code>CREATE FUNCTION get_balance(p_id int) RETURNS numeric AS $$\nBEGIN\n    RETURN (SELECT balance FROM accounts WHERE id = p_id);\nEND;\n$$ LANGUAGE plpgsql;</code></pre>',lvl:2},
    {q:'Триггеры',a:'Автоматические действия при INSERT/UPDATE/DELETE:\n\n<pre><code>CREATE TRIGGER audit_trigger\nAFTER UPDATE ON payments\nFOR EACH ROW\nEXECUTE FUNCTION log_payment_change();</code></pre>\n\nBEFORE/AFTER, FOR EACH ROW/STATEMENT.\nОсторожно: замедляют операции, сложно дебажить.',lvl:2},
  ]},

  { id:'jpa', icon:'&#128190;', name:'Hibernate/JPA', data: [
    {s:'Основы'},
    {q:'ORM, JPA, Hibernate',a:'<b>ORM</b> — маппинг объектов на таблицы.\n<b>JPA</b> — спецификация (jakarta.persistence с Spring Boot 3).\n<b>Hibernate</b> — реализация JPA.\n\nEntityManager — основной интерфейс.',lvl:1},
    {q:'Требования к Entity классу',a:'• Аннотация @Entity\n• Пустой конструктор (public или protected)\n• Не final класс (для proxy)\n• Поле @Id\n• Serializable (рекомендуется)\n• Не вложенный, не enum, не интерфейс\n\nМожет наследовать не-Entity классы и наоборот.',lvl:2},
    {q:'Жизненный цикл Entity',a:'• <b>Transient</b> — new, не в контексте\n• <b>Managed</b> — в persistence context, отслеживается (dirty checking)\n• <b>Detached</b> — контекст закрыт\n• <b>Removed</b> — помечен для удаления\n\npersist() → Managed\nmerge() → Detached → Managed (возвращает НОВЫЙ объект!)\nremove() → Removed\ndetach(), clear(), close() → Detached',hot:1,lvl:2},
    {q:'Dirty Checking',a:'Hibernate автоматически отслеживает изменения managed entities.\n\nПри flush (commit транзакции):\n1. Сравнивает текущее состояние со snapshot (сделан при загрузке)\n2. Если есть изменения → генерирует UPDATE\n\nОптимизация:\n• @DynamicUpdate — только изменённые столбцы\n• readOnly транзакция — отключает dirty checking\n• DTO projection — без Entity вообще',lvl:2},
    {q:'LAZY vs EAGER',a:'<b>LAZY</b> — по требованию (proxy). <b>EAGER</b> — сразу.\n\nDefault: @ManyToOne/@OneToOne = EAGER, @OneToMany/@ManyToMany = LAZY.\n\n<b>Лучшая практика:</b> всё LAZY, нужное через JOIN FETCH или @EntityGraph.\nLazyInitializationException — доступ вне транзакции.',hot:1,lvl:2},
    {q:'Проблема N+1',a:'1 запрос на сущности + N на связи.\n\n<b>Решения:</b>\n1. JOIN FETCH: <code>SELECT p FROM Post p JOIN FETCH p.comments</code>\n2. @EntityGraph(attributePaths = {"comments"})\n3. @BatchSize(size=50) — IN clause\n4. @Fetch(FetchMode.SUBSELECT)\n5. DTO projection — вообще без Entity\n\nОбнаружение: show-sql=true, Hibernate Statistics, datasource-proxy.',hot:1,lvl:3},
    {q:'Стратегии наследования',a:'• <b>SINGLE_TABLE</b> (default) — одна таблица, discriminator column. Быстро, но nullable поля.\n• <b>TABLE_PER_CLASS</b> — таблица для каждого класса. Полиморфные запросы медленные (UNION).\n• <b>JOINED</b> — таблица для каждого класса + JOIN. Нормализовано, но JOIN overhead.\n\nСовет: SINGLE_TABLE для простых иерархий, JOINED для сложных.',lvl:2},
    {q:'Виды связей (@OneToMany и т.д.)',a:'• <b>@OneToOne</b> — один к одному. @JoinColumn на владельце.\n• <b>@OneToMany / @ManyToOne</b> — один ко многим. ManyToOne = владелец (FK в таблице).\n• <b>@ManyToMany</b> — @JoinTable с промежуточной таблицей.\n\n<b>mappedBy</b> — указывает на владельца связи (у кого FK).\n<b>orphanRemoval = true</b> — удаление сирот.\n\nBidirectional: синхронизировать обе стороны вручную!',lvl:2},
    {q:'Каскадные операции',a:'PERSIST, MERGE, REMOVE, REFRESH, DETACH, ALL.\n\n• CascadeType.ALL на @OneToMany с orphanRemoval — полный lifecycle\n• REMOVE осторожно на @ManyToMany (удалит у всех!)\n\n<b>orphanRemoval vs CASCADE.REMOVE:</b>\norphanRemoval — удаление элемента из коллекции → DELETE.\nCASCADE.REMOVE — удаление родителя → DELETE детей.',lvl:2},
    {q:'@GeneratedValue стратегии',a:'• <b>IDENTITY</b> — автоинкремент БД. Не поддерживает batch insert.\n• <b>SEQUENCE</b> (рекомендуется) — sequence в БД. Batch insert работает.\n• <b>TABLE</b> — отдельная таблица (медленно, блокировки).\n• <b>AUTO</b> — Hibernate сам выбирает.\n\nПример:\n<pre><code>@Id\n@GeneratedValue(strategy = SEQUENCE, generator = "payment_seq")\n@SequenceGenerator(name = "payment_seq", allocationSize = 50)\nprivate Long id;</code></pre>',lvl:2},
    {q:'Кэши Hibernate',a:'<b>1st level:</b> Persistence Context, автоматический, в транзакции. Identity guarantee.\n<b>2nd level:</b> общий (EHCache, Caffeine). @Cacheable, @Cache(usage=READ_WRITE).\n<b>Query cache:</b> результаты JPQL. Включать осторожно (инвалидация при любом изменении таблицы).',lvl:3},
    {q:'Блокировки в JPA',a:'<b>Оптимистическая (@Version):</b>\n<pre><code>@Version\nprivate Long version; // auto increment при UPDATE</code></pre>\nOptimisticLockException при конфликте.\n\n<b>Пессимистическая:</b>\nPESSIMISTIC_READ (FOR SHARE), PESSIMISTIC_WRITE (FOR UPDATE).\n\nПлатежи: оптимистическая по умолчанию, пессимистическая для балансов.',hot:1,lvl:3},
    {q:'JPQL vs Criteria API vs Native',a:'<b>JPQL:</b> SQL-подобный, работает с Entity.\n<b>Criteria API:</b> программная генерация, type-safe с Metamodel. Для динамических фильтров.\n<b>Native:</b> чистый SQL, специфичные возможности БД.\n\nSpring Data: query methods, @Query, Specification<T>.',lvl:2},
    {q:'Liquibase — миграции БД',a:'Версионирование схемы.\n\n• Changelog → Changeset (author + id)\n• DATABASECHANGELOG — история\n• Rollback, Contexts, Preconditions\n• Форматы: XML, YAML, SQL, JSON\n\n<code>spring.liquibase.change-log=classpath:db/changelog/master.yaml</code>\n\nАльтернатива: Flyway (SQL-based, проще). Liquibase — более гибкий (XML changesets, preconditions).',lvl:2},
    {q:'Spring Data JPA — подробно',a:'• CrudRepository, JpaRepository, ListCrudRepository (3.1)\n• Query methods: findByStatusAndCreatedAtAfter()\n• @Query — JPQL или nativeQuery\n• Specification<T> — динамические запросы\n• Pageable, Page<T>, Slice<T>\n• Projections: interface/class-based, dynamic\n• Auditing: @CreatedDate, @LastModifiedDate, @CreatedBy\n• @Modifying + @Query для UPDATE/DELETE',hot:1,lvl:2},
  
    {q:'Что такое EntityGraph?',a:'Декларативный способ указать что загрузить вместе с Entity (вместо JOIN FETCH в JPQL).\n\n<pre><code>@NamedEntityGraph(name = "Payment.full",\n    attributeNodes = @NamedAttributeNode("items"))\n@Entity\npublic class Payment { ... }\n\n// Использование\n@EntityGraph("Payment.full")\nList<Payment> findByStatus(Status s);</code></pre>\n\nПреимущество: не нужно писать JPQL, комбинируется с query methods.',lvl:3},
    {q:'Как работает Spring Data Specification?',a:'Программная генерация WHERE условий (аналог Criteria API):\n\n<pre><code>public class PaymentSpec {\n    public static Specification<Payment> hasStatus(Status s) {\n        return (root, query, cb) -> cb.equal(root.get("status"), s);\n    }\n    public static Specification<Payment> amountGreater(BigDecimal min) {\n        return (root, query, cb) -> cb.greaterThan(root.get("amount"), min);\n    }\n}\n// Использование\nrepo.findAll(hasStatus(ACTIVE).and(amountGreater(100)));</code></pre>\n\nИдеально для динамических фильтров.',hot:1,lvl:3},
]},

  { id:'spring', icon:'&#127811;', name:'Spring', data: [
    {s:'Spring Core'},
    {q:'IoC и DI в Spring',a:'<b>IoC</b> — фреймворк управляет lifecycle. <b>DI</b> — внедрение зависимостей:\n\n• Constructor (рекомендуемый) — final поля, immutable\n• Setter — опциональные зависимости\n• Field (@Autowired) — НЕ рекомендуется (сложнее тестировать)\n\nApplicationContext — IoC-контейнер.',hot:1,lvl:1},
    {q:'Жизненный цикл бина',a:'Instantiation → DI → Aware интерфейсы →\nBPP.before → <b>@PostConstruct</b> → InitializingBean → init-method →\nBPP.after → <b>использование</b> →\n@PreDestroy → DisposableBean → destroy-method',hot:1,lvl:2},
    {q:'Скоупы бинов',a:'• <b>singleton</b> (default) — один на контейнер\n• <b>prototype</b> — новый каждый раз\n• request, session, application (web)\n\nSingleton → Prototype проблема: один prototype.\nРешения: @Lookup, ObjectFactory, Provider, proxyMode.',lvl:1},
    {q:'@Bean vs @Component и стереотипы',a:'<b>@Component</b> — автосканирование (@ComponentScan)\n<b>@Service</b> — бизнес-логика\n<b>@Repository</b> — DAO + трансляция исключений\n<b>@Controller/@RestController</b> — web\n<b>@Bean</b> — метод в @Configuration (сторонние библиотеки)\n\n@Primary — приоритет. @Qualifier — по имени.\n@Conditional, @Profile — условные бины.',hot:1,lvl:2},
    {q:'@Autowired, @Inject, @Resource — разница',a:'<b>@Autowired</b> (Spring): по типу, потом @Qualifier.\n<b>@Inject</b> (Jakarta CDI): аналог @Autowired, стандарт.\n<b>@Resource</b> (Jakarta): по имени, потом по типу.\n\nРекомендация: constructor injection без аннотации (Spring 4.3+: единственный конструктор автоматически).',lvl:2},
    {q:'Как заинжектить примитив или коллекцию?',a:'<b>Примитив:</b>\n<code>@Value("${app.timeout:5000}") private int timeout;</code>\n<code>@Value("#{2 * 3}") private int calc;</code> — SpEL\n\n<b>Коллекция бинов:</b>\n<code>@Autowired private List<PaymentStrategy> strategies;</code>\nИнжектит все бины типа PaymentStrategy.\n\n<code>@Autowired private Map<String, PaymentStrategy> map;</code>\nКлюч = имя бина, значение = бин.',lvl:2},
    {q:'BeanPostProcessor и BeanFactoryPostProcessor',a:'<b>BeanPostProcessor:</b> модифицирует бины после создания.\n• postProcessBeforeInitialization — до @PostConstruct\n• postProcessAfterInitialization — после (здесь создаются proxy!)\n\n<b>BeanFactoryPostProcessor:</b> модифицирует определения бинов до их создания.\nПример: PropertySourcesPlaceholderConfigurer — подставляет ${} значения.',lvl:2},
    {s:'Spring MVC'},
    {q:'@Controller vs @RestController',a:'@Controller — возвращает View.\n@RestController = @Controller + @ResponseBody — JSON/XML.\n\n@GetMapping, @PostMapping, @PutMapping, @DeleteMapping\n@RequestParam, @PathVariable, @RequestBody, @RequestHeader\nResponseEntity<T> — статус + заголовки + тело.',lvl:2},
    {q:'Обработка ошибок в Spring MVC',a:'1. <b>@ExceptionHandler</b> — в контроллере, для конкретных исключений\n2. <b>@ControllerAdvice</b> — глобальный обработчик для всех контроллеров\n3. <b>ProblemDetail</b> (Spring 6, RFC 7807) — стандартный формат ошибок\n\n<pre><code>@RestControllerAdvice\npublic class GlobalHandler {\n    @ExceptionHandler(PaymentNotFoundException.class)\n    @ResponseStatus(NOT_FOUND)\n    ProblemDetail handle(PaymentNotFoundException ex) {\n        return ProblemDetail.forStatusAndDetail(\n            HttpStatus.NOT_FOUND, ex.getMessage());\n    }\n}</code></pre>',lvl:2},
    {q:'Filters vs Interceptors',a:'<b>Filter (Servlet):</b>\n• До DispatcherServlet\n• jakarta.servlet.Filter\n• Работает с request/response\n• Для: CORS, logging, security\n\n<b>Interceptor (Spring):</b>\n• После DispatcherServlet, до контроллера\n• HandlerInterceptor: preHandle → controller → postHandle → afterCompletion\n• Доступ к Spring контексту\n• Для: аутентификация, метрики, модификация Model',lvl:2},
    {s:'Spring Boot 3'},
    {q:'Spring Boot 3 — ключевые изменения',a:'• Java 17+ минимум\n• <b>javax.* → jakarta.*</b>\n• Spring Framework 6\n• Observability: Micrometer + Micrometer Tracing\n• GraalVM Native Image\n• Virtual Threads support\n• HTTP Interface Clients (@HttpExchange)\n• ProblemDetail (RFC 7807)\n• Docker Compose support\n• Testcontainers @ServiceConnection',hot:1,lvl:2},
    {q:'Spring Boot Auto-configuration',a:'@EnableAutoConfiguration → META-INF AutoConfiguration.imports.\n@ConditionalOnClass, @ConditionalOnMissingBean, @ConditionalOnProperty.\n\nПример: spring-kafka + bootstrap-servers → авто KafkaTemplate.\n\nОтключить: @SpringBootApplication(exclude = DataSourceAutoConfiguration.class)\nspring.autoconfigure.exclude=...',lvl:2},
    {q:'Spring Boot Actuator',a:'Production-ready мониторинг:\n\n• /actuator/health — состояние (liveness, readiness)\n• /actuator/metrics — метрики (Micrometer)\n• /actuator/prometheus — формат Prometheus\n• /actuator/info — информация о приложении\n• /actuator/env — переменные окружения\n• /actuator/loggers — управление уровнями логов runtime\n\nНастройка: management.endpoints.web.exposure.include=health,metrics,prometheus',lvl:2},
    {s:'AOP'},
    {q:'AOP в Spring',a:'Aspect → Join Point → Pointcut → Advice.\n\n@Before, @After, @AfterReturning, @AfterThrowing, @Around.\n\nProxy: JDK Dynamic (интерфейсы) или CGLIB (классы, default).\n\n<b>Self-invocation:</b> this.method() не проходит через proxy!\n@Transactional, @Cacheable, @Async — через AOP.',hot:1,lvl:2},
    {s:'Транзакции'},
    {q:'@Transactional — как работает',a:'Proxy: open TX → метод → commit/rollback.\n\n<b>Rollback:</b> RuntimeException — да, checked — НЕТ (rollbackFor).\n\n<b>Propagation:</b>\n• REQUIRED (default) — использовать текущую или создать\n• REQUIRES_NEW — всегда новая (suspend текущей)\n• NESTED — savepoint внутри текущей\n• SUPPORTS — если есть, используем\n• NOT_SUPPORTED — suspend текущей\n• MANDATORY — обязательна, иначе исключение\n• NEVER — запрещена\n\n<b>Подводные камни:</b> self-invocation, private, checked exceptions.',hot:1,lvl:2},
    {q:'@Transactional readOnly',a:'<code>@Transactional(readOnly = true)</code>\n\n• Hibernate отключает dirty checking — экономия памяти и CPU\n• JDBC hint: connection.setReadOnly(true)\n• PostgreSQL может использовать replica для read-only\n• НЕ бросает исключение при попытке записи (зависит от БД)\n\nЛучшая практика: readOnly на все Service read-методы.',lvl:2},
    {s:'Spring Security'},
    {q:'Spring Security',a:'Authentication (кто?) → Authorization (что?).\n\nSecurityFilterChain → AuthenticationManager → UserDetailsService.\nSecurityContextHolder — ThreadLocal.\n\n<pre><code>http.authorizeHttpRequests(auth -> auth\n    .requestMatchers("/public/**").permitAll()\n    .anyRequest().authenticated())\n  .oauth2ResourceServer(o -> o.jwt())\n  .csrf(c -> c.disable()); // stateless API</code></pre>',hot:1,lvl:2},
    {q:'OAuth 2.0 и JWT в Spring',a:'<b>OAuth 2.0:</b> Authorization Code (web), Client Credentials (M2M).\n\n<b>JWT:</b> Header.Payload.Signature. Stateless.\nPayload: sub, iss, exp, roles.\n\nSpring: spring-boot-starter-oauth2-resource-server.\nВалидация: подпись, exp, iss, aud. Custom claims → GrantedAuthority.',hot:1,lvl:2},
    {q:'CSRF защита',a:'Cross-Site Request Forgery — атака заставляет браузер отправить запрос от имени пользователя.\n\nSpring Security: CSRF token в cookie/header.\nCsrfTokenRepository — хранение токена.\n\n<b>Отключают для:</b> stateless REST API с JWT/OAuth2 (нет cookies).\n<code>.csrf(csrf -> csrf.disable())</code>',lvl:2},
    {s:'Spring Data JPA'},
    {q:'Spring Data JPA',a:'• CrudRepository, JpaRepository\n• Query methods: findByStatusAndCreatedAtAfter()\n• @Query — JPQL/native\n• Specification<T> — динамические\n• Pageable, Page<T>, Slice<T>\n• Auditing: @CreatedDate, @LastModifiedDate\n• @Modifying для UPDATE/DELETE',hot:1,lvl:2},
    {q:'MapStruct',a:'Compile-time маппинг Entity ↔ DTO.\n\n<code>@Mapper(componentModel = "spring")</code>\n@Mapping(source, target), @AfterMapping.\n\nНет рефлексии, type-safe, быстрый, простая отладка.\nПоддерживает: вложенные маппинги, коллекции, expression.',lvl:2},
    {q:'Spring кэширование',a:'<code>@EnableCaching</code>\n\n• <code>@Cacheable("payments")</code> — кэширует результат\n• <code>@CacheEvict("payments")</code> — инвалидация\n• <code>@CachePut</code> — обновление кэша\n\nПровайдеры: Caffeine (in-memory), Redis (distributed).\n\n<pre><code>@Cacheable(value = "payment", key = "#id", unless = "#result == null")\npublic Payment findById(Long id) { ... }</code></pre>',lvl:2},
    {q:'Spring Cloud — обзор',a:'Набор инструментов для микросервисов:\n\n• <b>Spring Cloud Config</b> — централизованная конфигурация\n• <b>Spring Cloud Gateway</b> — API Gateway\n• <b>Spring Cloud OpenFeign</b> — декларативный HTTP клиент\n• <b>Spring Cloud Circuit Breaker</b> — Resilience4j\n• <b>Spring Cloud Stream</b> — messaging abstraction (Kafka, RabbitMQ)\n• <b>Spring Cloud Kubernetes</b> — интеграция с K8s\n\nSpring Cloud Contract — consumer-driven contract testing.',lvl:2},
  
    {s:'WebClient и HTTP'},
    {q:'RestTemplate vs WebClient',a:'<b>RestTemplate</b> (legacy):\n• Синхронный, блокирующий\n• Deprecated с Spring 6 (maintenance mode)\n\n<b>WebClient</b> (рекомендуемый):\n• Неблокирующий (reactive)\n• Поддерживает sync и async режимы\n• Fluent API\n\n<pre><code>WebClient client = WebClient.create("http://api.example.com");\nMono<Payment> payment = client.get()\n    .uri("/payments/{id}", id)\n    .retrieve()\n    .bodyToMono(Payment.class);\n// Sync: payment.block()\n// Async: payment.subscribe(p -> ...)</code></pre>',hot:1,lvl:2},
    {q:'@HttpExchange (Spring 6+)',a:'Декларативный HTTP-клиент (аналог Feign):\n\n<pre><code>@HttpExchange("/api/payments")\npublic interface PaymentClient {\n    @GetExchange("/{id}")\n    Payment getById(@PathVariable Long id);\n\n    @PostExchange\n    Payment create(@RequestBody CreatePaymentRequest req);\n}</code></pre>\n\nСоздание: WebClientAdapter + HttpServiceProxyFactory.\nПреимущество: нативный Spring, без дополнительных зависимостей.',lvl:2},

    {s:'Spring Batch'},
    {q:'Spring Batch — основы',a:'Фреймворк для пакетной обработки данных.\n\n<b>Архитектура:</b> Job → Step → (Chunk или Tasklet)\n\n<b>Chunk processing:</b>\n1. ItemReader — чтение данных (БД, файл)\n2. ItemProcessor — преобразование\n3. ItemWriter — запись (БД, файл, Kafka)\n\nChunk size = количество элементов в одной транзакции.\n\n<b>Tasklet:</b> простая задача (очистка файлов, отправка отчёта).\n\n<b>Job scheduling:</b> @Scheduled, Camunda, или внешний (cron, Kubernetes CronJob).',lvl:2},
    {s:'Connection Pooling'},
    {q:'HikariCP — пул соединений',a:'HikariCP — default connection pool в Spring Boot. Самый быстрый.\n\n<b>Ключевые настройки:</b>\n<pre><code>spring.datasource.hikari.maximum-pool-size=10\nspring.datasource.hikari.minimum-idle=5\nspring.datasource.hikari.connection-timeout=30000\nspring.datasource.hikari.idle-timeout=600000\nspring.datasource.hikari.max-lifetime=1800000</code></pre>\n\n<b>Формула размера пула:</b> connections = (cores * 2) + disk_spindles\nОбычно 10-20 для микросервиса.\n\nПроблемы: connection leak (забыли закрыть), pool exhaustion (все заняты → timeout).',lvl:2,hot:1},
]},

  { id:'kafka', icon:'&#128233;', name:'Kafka & Messaging', data: [
    {s:'Основы Kafka'},
    {q:'Kafka — концепции',a:'• <b>Broker</b> — сервер Kafka\n• <b>Topic</b> — логический канал\n• <b>Partition</b> — физическое разделение, единица параллелизма\n• <b>Offset</b> — номер сообщения (immutable, append-only)\n• <b>Producer</b> → Topic → <b>Consumer</b>\n• <b>Consumer Group</b> — каждая партиция = один consumer\n• <b>ISR</b> (In-Sync Replicas) — актуальные реплики\n\nKafka 3.x+: <b>KRaft</b> вместо ZooKeeper.',hot:1,lvl:2},
    {q:'Что такое партиция? Зачем нужна?',a:'Партиция — физическое разделение топика. Append-only лог.\n\n<b>Зачем:</b>\n• Параллелизм: разные consumers читают разные партиции\n• Масштабируемость: партиции распределены по брокерам\n• Ordering гарантирован ВНУТРИ партиции\n\nВыбор партиции: hash(key) % numPartitions, round-robin (без ключа), custom.\n\nБольше партиций → больше параллелизм, но больше overhead (memory, file handles).',lvl:2},
    {q:'Producer — гарантии',a:'<b>acks:</b>\n• 0 — fire-and-forget\n• 1 — подтверждение лидера\n• all (-1) — все ISR\n\n<b>Idempotent Producer</b> (default Kafka 3.0): sequence number → exactly-once на партиции.\n<b>Transactional:</b> beginTransaction(), send(), commitTransaction().\n\n<b>min.insync.replicas=2</b> + acks=all → не потеряем данные при падении одного брокера.',hot:1,lvl:2},
    {q:'Consumer — offset management',a:'<b>Consumer group:</b> 1 партиция = 1 consumer.\nRebalancing при изменении consumers.\n\n<b>Offset commit:</b> auto (interval) или ручной (commitSync/Async).\n\n• At-most-once: commit до обработки\n• At-least-once: commit после (дубли — идемпотентность!)\n• Exactly-once: transactions + идемпотентный consumer\n\nauto.offset.reset: earliest | latest | none.',hot:1,lvl:2},
    {q:'Consumer Group Rebalancing',a:'Перераспределение партиций между consumers.\n\n<b>Triggers:</b> новый consumer, consumer ушёл, новые партиции.\n\n<b>Стратегии:</b>\n• Range — непрерывные диапазоны партиций\n• RoundRobin — равномерно\n• Sticky — минимум перемещений\n• CooperativeSticky — инкрементальный rebalance (не stop-the-world)\n\nПроблема: во время rebalance — обработка стоит. Cooperative — лучше.',lvl:3},
    {q:'Kafka vs RabbitMQ',a:'<b>Kafka:</b> log-based, pull, высокая пропускная, replay, consumer groups.\n<b>RabbitMQ:</b> очереди (AMQP), push, гибкая маршрутизация, ACK удаляет.\n\nKafka: event streaming, audit, replay, high throughput.\nRabbitMQ: task queues, RPC, маршрутизация.\n\nKafka retention: хранит N дней. RabbitMQ: удаляет после ACK.',hot:1,lvl:2},
    {q:'Kafka Connect и Streams',a:'<b>Connect:</b> интеграция без кода.\n• Source (БД → Kafka): Debezium (CDC)\n• Sink (Kafka → БД/ES/S3)\n\n<b>Streams:</b> потоковая обработка в приложении.\n• KStream (unbounded events), KTable (changelog)\n• filter, map, groupBy, aggregate, join, windowed\n• State stores (RocksDB), exactly-once',lvl:2},
    {q:'Kafka — обработка ошибок',a:'<b>Dead Letter Topic (DLT):</b> сообщения, которые не удалось обработать → в отдельный топик.\n\n<b>Retry Topic:</b> retry с backoff, потом в DLT.\n\nSpring Kafka:\n<pre><code>@RetryableTopic(attempts = "3",\n    backoff = @Backoff(delay = 1000, multiplier = 2))\n@KafkaListener(topics = "payments")\npublic void listen(Payment p) { ... }</code></pre>\n\nАльтернатива: ErrorHandler, SeekToCurrentErrorHandler.',lvl:2},
    {q:'Гарантия доставки и exactly-once',a:'<b>Producer:</b> idempotent (enable.idempotence=true) + transactional.\n<b>Consumer:</b> at-least-once + идемпотентная обработка.\n\n<b>Exactly-once semantics:</b>\n1. Idempotent producer (sequence numbers)\n2. Transactional producer (atomic writes)\n3. read_committed isolation для consumers\n4. Идемпотентный consumer (deduplication по ключу/ID)\n\nДля платежей: idempotency key в сообщении → проверка в БД перед обработкой.',hot:1,lvl:3},
    {q:'Мониторинг Kafka',a:'<b>Broker метрики:</b>\n• UnderReplicatedPartitions — реплики отстают\n• ActiveControllerCount — должен быть 1\n• OfflinePartitionsCount — недоступные партиции\n\n<b>Producer:</b> record-send-rate, request-latency\n<b>Consumer:</b> consumer-lag (offset отставание — ключевая метрика!)\n\nИнструменты: Kafka UI, AKHQ, Confluent Control Center, Burrow (lag monitoring).',lvl:2},
    {s:'JMS'},
    {q:'JMS и Artemis',a:'JMS — стандартный API (jakarta.jms).\n• Queue (P2P) — один получатель\n• Topic (Pub/Sub) — много подписчиков\n\n<b>Artemis</b> — реализация (замена ActiveMQ Classic).\nПоддерживает AMQP, STOMP, MQTT, OpenWire.\n\nJMS — команды. Kafka — events.',hot:1,lvl:2},
  
    {q:'Spring Kafka — основы использования',a:'<pre><code>// Producer\n@Autowired KafkaTemplate<String, Payment> template;\ntemplate.send("payments", payment.getId(), payment);\n\n// Consumer\n@KafkaListener(topics = "payments", groupId = "payment-service")\npublic void listen(Payment payment,\n    @Header(KafkaHeaders.OFFSET) long offset) {\n    processPayment(payment);\n}</code></pre>\n\nСериализация: обычно JSON (JsonSerializer/Deserializer) или Avro (с Schema Registry).',hot:1,lvl:2},
    {q:'Schema Registry и Avro',a:'<b>Проблема:</b> producer и consumer должны согласовать формат сообщений.\n\n<b>Schema Registry:</b> хранит и версионирует схемы.\n<b>Avro:</b> бинарная сериализация со схемой.\n\nПреимущества:\n• Валидация: сообщение соответствует схеме\n• Эволюция: backward/forward compatible изменения\n• Компактность: бинарный формат меньше JSON\n\nConfluent Schema Registry — стандарт де-факто.',lvl:3},

    {s:'RabbitMQ'},
    {q:'RabbitMQ — основы',a:'Message broker, протокол AMQP.\n\n<b>Концепции:</b>\n• <b>Producer</b> → <b>Exchange</b> → <b>Queue</b> → <b>Consumer</b>\n• <b>Exchange types:</b>\n  - Direct — по routing key\n  - Fanout — broadcast всем очередям\n  - Topic — pattern matching (payment.*)\n  - Headers — по заголовкам\n\n<b>ACK:</b> consumer подтверждает обработку. При ошибке — requeue или DLQ.\n\nSpring: spring-boot-starter-amqp, @RabbitListener.',lvl:1,hot:1},
    {q:'ActiveMQ Artemis и JMS',a:'<b>JMS</b> (Jakarta Messaging) — стандартный API.\n<b>Artemis</b> — реализация (замена ActiveMQ Classic).\n\n<b>Модели:</b>\n• Queue (P2P) — один получатель\n• Topic (Pub/Sub) — все подписчики\n\n<b>Протоколы:</b> AMQP, STOMP, MQTT, OpenWire.\n\nSpring Boot: spring.artemis.broker-url, @JmsListener.\n\nКогда JMS: простые команды между сервисами.\nКогда Kafka: event streaming, audit log, replay.',lvl:2},
]},

  { id:'arch', icon:'&#127959;', name:'Архитектура и DDD', data: [
    {s:'Архитектурные стили'},
    {q:'Монолит vs Микросервисы',a:'<b>Монолит:</b> один деплой, ACID, проще. Масштабируется целиком.\n<b>Микросервисы:</b> независимый деплой, isolation. Сложность: сеть, eventual consistency.\n\n<b>Модульный монолит</b> — один деплой, чёткие модули (Spring Modulith).\n\nStart with monolith, extract microservices when needed.',hot:1,lvl:2},
    {q:'Слоистая, чистая, гексагональная',a:'<b>Слоистая:</b> Controller → Service → Repository. Простая, для CRUD.\n<b>Гексагональная (Ports & Adapters):</b> Domain ← Ports ← Adapters. Domain не зависит от фреймворков.\n<b>Чистая:</b> Entities → Use Cases → Adapters → Frameworks. Внутренние слои не знают о внешних.\n\nДля платежей: гексагональная — domain изолирован.',hot:1,lvl:2},
    {q:'Onion Architecture',a:'Концентрические слои: Domain Model → Domain Services → Application Services → Infrastructure.\n\nПравило: зависимости только внутрь. Infrastructure зависит от Domain, не наоборот.\n\nПохоже на Clean Architecture. Отличие: акцент на Domain Model в центре.',lvl:2},
    {s:'DDD'},
    {q:'DDD — стратегический',a:'• <b>Ubiquitous Language</b> — единый язык\n• <b>Bounded Context</b> — граница модели\n• <b>Context Map</b> — взаимодействие контекстов:\n  Shared Kernel, Customer-Supplier, Conformist, ACL, Open Host Service\n• Subdomain: Core (платежи), Supporting (нотификации), Generic (авторизация)\n\nМикросервисы ≈ Bounded Contexts.',hot:1,lvl:2},
    {q:'DDD — тактический',a:'• <b>Entity</b> — с идентичностью (Payment)\n• <b>Value Object</b> — без ID, immutable (Money(amount, currency))\n• <b>Aggregate</b> — кластер с Aggregate Root. 1 транзакция = 1 агрегат.\n• <b>Repository</b> — 1 на агрегат\n• <b>Domain Service</b> — логика вне Entity (TransferService)\n• <b>Domain Event</b> — PaymentCreated, PaymentCompleted\n• <b>Specification</b> — бизнес-правила как предикаты',hot:1,lvl:2},
    {q:'Aggregate — правила',a:'• Aggregate Root — единственная точка входа\n• Ссылки между агрегатами — только по ID\n• Одна транзакция = один агрегат\n• Агрегат должен быть маленьким (1-3 Entity)\n\nПример платёжного агрегата:\n<pre><code>Payment (root)\n├── PaymentItem (entity)\n├── Money (value object)\n└── PaymentStatus (value object)</code></pre>\n\nMerchant — отдельный агрегат, ссылка через merchantId.',lvl:2},
    {q:'Anti-Corruption Layer (ACL)',a:'Паттерн Context Map: защищает наш Bounded Context от чужой модели.\n\nАдаптер между нашей доменной моделью и внешней системой.\n\nПример: внешний платёжный провайдер возвращает XML в своём формате → ACL конвертирует в наши доменные объекты.\n\nРеализация: Adapter + Translator/Mapper.',lvl:2},
    {s:'Микросервисные паттерны'},
    {q:'Взаимодействие микросервисов',a:'<b>Синхронное:</b> REST, gRPC, GraphQL.\n<b>Асинхронное:</b> Kafka, RabbitMQ, Artemis.\n\nБрокер: decoupling, retry, buffering.\nREST: синхронный ответ, проще.\n\nПлатежи: REST для создания, Kafka для нотификаций.',hot:1,lvl:2},
    {q:'Saga паттерн',a:'Распределённая транзакция: локальные + компенсации.\n\n<b>Оркестрация</b> (Camunda): центральный менеджер.\n<b>Хореография</b> (Kafka): через события.\n\nПлатёж: Create → Reserve → Process → Notify.\nОтмена: Release → Cancel.',hot:1,lvl:3},
    {q:'Transactional Outbox',a:'Атомарно: БД + event.\n\n1. Одна TX: entity + event в outbox table\n2. Poller / CDC (Debezium) → Kafka\n\nКритично для платежей — консистентность данных и событий.',hot:1,lvl:3},
    {q:'Circuit Breaker, Retry, Bulkhead',a:'<b>Circuit Breaker</b> (Resilience4j): CLOSED → OPEN → HALF_OPEN.\n<b>Retry:</b> exponential backoff + jitter. Только idempotent!\n<b>Bulkhead:</b> отдельные ресурсы для каждого сервиса.\n<b>Rate Limiting:</b> Token Bucket.\n<b>Timeout:</b> на ВСЕ внешние вызовы.',hot:1,lvl:3},
    {q:'API Gateway',a:'Единая точка входа: маршрутизация, auth, rate limiting, load balancing.\nSpring Cloud Gateway, Kong, NGINX, Envoy.\nBFF — отдельный gateway для web/mobile.',lvl:2},
    {q:'Service Discovery',a:'Как сервисы находят друг друга?\n\n<b>Client-side:</b> клиент запрашивает реестр (Eureka, Consul). Сам балансирует.\n<b>Server-side:</b> load balancer знает адреса (K8s Service, AWS ALB).\n\nKubernetes: встроенный — Service + DNS. Eureka не нужен.',lvl:2},
    {q:'Идемпотентность',a:'Повторный вызов даёт тот же результат.\n\n<b>HTTP:</b> GET, PUT, DELETE — идемпотентны. POST — нет.\n\n<b>Для платежей:</b>\n• Idempotency-Key в header POST запроса\n• Проверка в БД: если key уже обработан → вернуть предыдущий результат\n• Unique constraint на idempotency_key в таблице\n\nКритично для retry: пользователь нажал \"Оплатить\" дважды → одна транзакция.',hot:1,lvl:2},
    {q:'12-Factor App',a:'Принципы для cloud-native приложений:\n\n1. Codebase — один репозиторий\n2. Dependencies — явные (Maven/Gradle)\n3. Config — в environment variables\n4. Backing services — через URL/config\n5. Build, release, run — разделены\n6. Processes — stateless\n7. Port binding — self-contained\n8. Concurrency — масштабирование через процессы\n9. Disposability — быстрый старт, graceful shutdown\n10. Dev/prod parity\n11. Logs — в stdout\n12. Admin processes — one-off tasks',lvl:2},
  
    {q:'Event Storming',a:'Метод коллективного исследования домена.\n\n<b>Процесс:</b>\n1. Domain Events (оранжевые стикеры) — что произошло? PaymentCreated, OrderShipped\n2. Commands (синие) — что вызвало? CreatePayment, ShipOrder\n3. Aggregates (жёлтые) — кто обрабатывает? Payment, Order\n4. Bounded Contexts — группируем связанные агрегаты\n\nРезультат: карта домена, основа для микросервисов.\nОтлично подходит для онбординга новых разработчиков.',hot:1,lvl:3},
    {q:'Strangler Fig Pattern',a:'Постепенная миграция монолита в микросервисы.\n\n1. Новая функциональность — в микросервисе\n2. Proxy/Gateway перенаправляет запросы\n3. Постепенно переносим старую функциональность\n4. Монолит "удушается" и исчезает\n\nПреимущества: нет big bang миграции, можно откатить, постепенный переход.\nИменно так обычно мигрируют в банках.',lvl:3},
]},

  { id:'patterns', icon:'&#128736;', name:'Паттерны', data: [
    {s:'Порождающие'},
    {q:'Singleton',a:'Один экземпляр. enum — лучший способ.\nDouble-checked locking: volatile + synchronized.\nВ Spring: бины singleton по умолчанию.',lvl:2},
    {q:'Builder',a:'Поэтапное создание: <code>User.builder().name("John").build();</code>\nLombok @Builder. Spring: UriComponentsBuilder.',lvl:2},
    {q:'Factory Method / Abstract Factory',a:'<b>Factory Method:</b> подкласс решает какой объект создать.\n<b>Abstract Factory:</b> семейство объектов.\nSpring: BeanFactory, FactoryBean.',lvl:2},
    {q:'Prototype',a:'Создание копированием. clone() или copy constructor.\nSpring: scope="prototype".',lvl:2},
    {s:'Структурные'},
    {q:'Adapter',a:'Преобразование интерфейса. Адаптер для 1С/Битрикс → наш формат.\nArrays.asList(), InputStreamReader.\nВ микросервисах: Anti-Corruption Layer.',lvl:2},
    {q:'Proxy',a:'Контроль доступа. Hibernate lazy (proxy), Spring AOP (@Transactional, @Cacheable).\nJDK Dynamic Proxy (интерфейсы), CGLIB (классы).',hot:1,lvl:2},
    {q:'Decorator',a:'Добавление функциональности обёрткой.\nBufferedInputStream(new FileInputStream()).\nCollections.unmodifiableList().',lvl:2},
    {q:'Facade',a:'Упрощённый интерфейс к сложной подсистеме.\nSpring: Service как фасад для нескольких Repository/Client.\nPaymentFacade → PaymentService + NotificationService + AuditService.',lvl:2},
    {s:'Поведенческие'},
    {q:'Strategy',a:'Семейство алгоритмов через интерфейс.\nPaymentStrategy: CardPayment, SBPPayment, QRPayment.\n\nВ Spring: Map<String, Strategy> + @Qualifier.',lvl:2},
    {q:'Observer',a:'Подписка на события. Spring: ApplicationEventPublisher / @EventListener.\nKafka: producer → consumers.\n@TransactionalEventListener — после commit транзакции.',lvl:2},
    {q:'Template Method',a:'Алгоритм в abstract классе, шаги — в подклассах.\nSpring: JdbcTemplate, RestTemplate, TransactionTemplate.',lvl:2},
    {q:'Chain of Responsibility',a:'Запрос по цепочке обработчиков.\nSpring Security: Filter chain.\nServlet: FilterChain.',lvl:2},
    {q:'Iterator',a:'Последовательный доступ без знания структуры.\nJava: Iterator<T>, Iterable<T>, for-each.\nStream API — продвинутый итератор.',lvl:2},
    {s:'Enterprise'},
    {q:'CQRS',a:'Command (запись) и Query (чтение) — отдельные модели.\nРазные БД: PostgreSQL (write) + OpenSearch/Redis (read).\nEventually consistent.',hot:1,lvl:3},
    {q:'Event Sourcing',a:'Состояние = последовательность событий.\nPaymentCreated → Authorized → Captured → Settled.\n+ Аудит (платежи!). - Сложность.',hot:1,lvl:3},
    {q:'Saga',a:'Распределённая транзакция + компенсации.\nОркестрация (Camunda) или хореография (Kafka).',hot:1,lvl:2},
    {q:'Паттерны в Spring',a:'Singleton, Factory, Proxy (AOP), Template Method (JdbcTemplate), Observer (@EventListener), Strategy, Front Controller (DispatcherServlet), DI, Decorator (BPP).',hot:1,lvl:2},
  ]},

  { id:'test', icon:'&#9989;', name:'Тестирование', data: [
    {q:'Пирамида тестирования',a:'<b>Unit</b> (много, быстрые) → <b>Integration</b> (средне) → <b>E2E</b> (мало).\n\n+ Contract tests (Spring Cloud Contract, Pact)\n+ Component tests (Testcontainers)',hot:1,lvl:1},
    {s:'JUnit 5'},
    {q:'JUnit 5 — основы',a:'@Test, @BeforeEach, @AfterEach, @BeforeAll, @AfterAll\n@DisplayName, @Nested, @Disabled, @Timeout\n@Tag("integration") — фильтрация\n\nassertEquals, assertTrue, assertThrows, assertAll\nAssertJ: <code>assertThat(list).hasSize(3).contains("a")</code>',lvl:2},
    {q:'@ParameterizedTest',a:'Один тест с разными данными:\n\n<pre><code>@ParameterizedTest\n@ValueSource(strings = {"hello", "world"})\nvoid test(String s) { assertNotNull(s); }\n\n@CsvSource({"1,ONE", "2,TWO"})\nvoid test(int num, String name) { ... }\n\n@MethodSource("dataProvider")\nvoid test(Payment p) { ... }\nstatic Stream<Payment> dataProvider() { ... }</code></pre>',lvl:2},
    {s:'Mockito'},
    {q:'Mockito — мокирование',a:'@Mock — заглушка. @Spy — реальный + можно переопределить.\n@InjectMocks — инжектит моки.\n\nwhen(mock.method()).thenReturn(value)\nverify(mock, times(1)).method(any())\nArgumentCaptor — захват аргументов.\n\ndoReturn().when(spy).method() — для spy (не вызывает реальный метод).',hot:1,lvl:2},
    {q:'Mock vs Spy',a:'<b>Mock:</b> все методы заглушены, нет реального поведения.\nwhen(mock.method()).thenReturn(value)\n\n<b>Spy:</b> реальный объект, реальные методы. Можно переопределить:\ndoReturn(value).when(spy).method()\n\nКогда Spy: нужно протестировать реальную логику, но подменить один метод.',lvl:2},
    {q:'Как тестировать void методы?',a:'<pre><code>// Verify вызов\nverify(notificationService).send(any());\n\n// Verify аргумент\nArgumentCaptor<Email> captor = ArgumentCaptor.forClass(Email.class);\nverify(sender).send(captor.capture());\nassertThat(captor.getValue().getTo()).isEqualTo("user@mail.ru");\n\n// Mock void метод с исключением\ndoThrow(new RuntimeException()).when(service).delete(any());\n\n// doNothing (default для mock)\ndoNothing().when(service).process(any());</code></pre>',lvl:2},
    {s:'Spring Boot тесты'},
    {q:'Тестовые аннотации Spring Boot',a:'• <b>@SpringBootTest</b> — полный контекст\n• <b>@WebMvcTest</b> — только web (MockMvc)\n• <b>@DataJpaTest</b> — только JPA\n• @MockBean, @SpyBean\n\n<b>Testcontainers:</b> реальная БД в Docker.\n@Testcontainers + @Container + @ServiceConnection (SB 3.1)\n\n<b>Allure:</b> @Step, @Epic, @Feature — отчёты.',hot:1,lvl:2},
    {q:'MockMvc — тестирование контроллеров',a:'<pre><code>@WebMvcTest(PaymentController.class)\nclass PaymentControllerTest {\n    @Autowired MockMvc mvc;\n    @MockBean PaymentService service;\n\n    @Test\n    void shouldCreatePayment() throws Exception {\n        when(service.create(any())).thenReturn(payment);\n\n        mvc.perform(post("/api/payments")\n                .contentType(APPLICATION_JSON)\n                .content(json))\n            .andExpect(status().isCreated())\n            .andExpect(jsonPath("$.id").value(1));\n    }\n}</code></pre>',hot:1,lvl:2},
    {q:'Testcontainers',a:'Запуск реальных зависимостей в Docker:\n\n<pre><code>@Testcontainers\n@SpringBootTest\nclass PaymentRepositoryTest {\n    @Container\n    @ServiceConnection // Spring Boot 3.1+\n    static PostgreSQLContainer<?> pg =\n        new PostgreSQLContainer<>("postgres:16");\n\n    @Test\n    void shouldSavePayment() { ... }\n}</code></pre>\n\nПоддерживает: PostgreSQL, Kafka, Redis, RabbitMQ, OpenSearch...',lvl:3},
    {q:'Что такое SonarQube?',a:'Инструмент статического анализа кода:\n\n• <b>Bugs</b> — потенциальные ошибки\n• <b>Vulnerabilities</b> — уязвимости безопасности\n• <b>Code Smells</b> — проблемы поддержки\n• <b>Coverage</b> — процент покрытия тестами\n• <b>Duplications</b> — дублирование кода\n\nQuality Gate — набор условий (coverage ≥ 80%, 0 blockers).\nИнтеграция: Maven plugin → GitLab CI → Sonar.',lvl:2},
  
    {s:'Best Practices'},
    {q:'Как писать хорошие unit-тесты?',a:'<b>Правила:</b>\n• Один тест = одна проверка (single assertion concept)\n• Arrange-Act-Assert (Given-When-Then)\n• Тест не зависит от других тестов\n• Тестируй поведение, не реализацию\n• Имя теста описывает сценарий: should_returnEmpty_when_noPaymentsFound\n\n<b>Не тестируй:</b> getters/setters, конструкторы, private методы, фреймворк.',lvl:2},
    {q:'Тестирование Kafka в Spring',a:'<pre><code>@EmbeddedKafka(partitions = 1,\n    topics = {"payments"})\n@SpringBootTest\nclass KafkaTest {\n    @Autowired\n    KafkaTemplate<String, Payment> template;\n    @Autowired\n    ConsumerFactory<String, Payment> cf;\n\n    @Test\n    void shouldSendAndReceive() {\n        template.send("payments", payment);\n        // verify with consumer or @KafkaListener\n    }\n}</code></pre>\n\nАльтернатива: Testcontainers с реальной Kafka.',hot:1,lvl:2},
    {q:'Contract Testing',a:'Проверка контрактов между сервисами:\n\n<b>Spring Cloud Contract:</b>\n• Producer определяет контракт (Groovy/YAML)\n• Автогенерация тестов для producer\n• Автогенерация stubs для consumer\n\n<b>Pact:</b>\n• Consumer-driven: consumer определяет ожидания\n• Pact Broker хранит контракты\n\nЗачем: изменение API producer не сломает consumer (и наоборот).',lvl:3},
]},

  { id:'devops', icon:'&#128295;', name:'DevOps', data: [
    {s:'Docker'},
    {q:'Docker — основы',a:'Image (шаблон) → Container (процесс). Dockerfile → build → run.\n\nMulti-stage:\n<pre><code>FROM maven:3.9 AS build\nRUN mvn package\nFROM eclipse-temurin:21-jre\nCOPY --from=build target/app.jar .</code></pre>',lvl:1},
    {q:'Docker — основные команды',a:'<pre><code>docker build -t app:1.0 .\ndocker run -p 8080:8080 -e DB_URL=... app:1.0\ndocker ps / docker ps -a\ndocker logs <container>\ndocker exec -it <container> bash\ndocker-compose up -d\ndocker images / docker rmi\ndocker stop / docker rm</code></pre>\n\nDocker Compose: описание multi-container в YAML.',lvl:1},
    {q:'Dockerfile best practices',a:'• Минимальный base image (eclipse-temurin:21-jre, не JDK)\n• Multi-stage build (сборка → runtime)\n• .dockerignore — исключить ненужное\n• Порядок слоёв: редко меняемое сверху (зависимости), часто — снизу\n• Не запускать от root (USER app)\n• HEALTHCHECK — проверка состояния\n• Один процесс на контейнер',lvl:2},
    {s:'Kubernetes'},
    {q:'Kubernetes — концепции',a:'• <b>Pod</b> — минимальная единица\n• <b>Deployment</b> → ReplicaSet → Pods\n• <b>Service</b> — стабильный endpoint (ClusterIP, NodePort, LoadBalancer)\n• ConfigMap / Secret\n• Ingress — HTTP routing\n• PersistentVolume / PVC\n• Namespace — изоляция\n\nHealth: livenessProbe, readinessProbe, startupProbe.\nActuator: /health/liveness, /health/readiness.',hot:1,lvl:2},
    {q:'Деплой стратегии',a:'• <b>Rolling Update</b> (default) — постепенная замена\n• <b>Blue/Green</b> — переключение\n• <b>Canary</b> — малый % трафика\n\nZero-downtime: readinessProbe + preStop hook + graceful shutdown.\n<code>server.shutdown=graceful</code> в Spring Boot.',lvl:2},
    {q:'Kubernetes — YAML пример',a:'<pre><code>apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: payment-service\nspec:\n  replicas: 3\n  selector:\n    matchLabels:\n      app: payment\n  template:\n    spec:\n      containers:\n      - name: app\n        image: payment:1.0\n        ports:\n        - containerPort: 8080\n        livenessProbe:\n          httpGet: { path: /actuator/health/liveness, port: 8080 }\n        readinessProbe:\n          httpGet: { path: /actuator/health/readiness, port: 8080 }</code></pre>',lvl:2},
    {s:'CI/CD'},
    {q:'GitLab CI/CD',a:'.gitlab-ci.yml — stages: build → test → sonar → deploy.\n\nrunners, artifacts, cache, environments, variables, rules.\n\n<pre><code>test:\n  stage: test\n  image: maven:3.9-eclipse-temurin-21\n  script: mvn verify\n  artifacts:\n    reports:\n      junit: target/surefire-reports/*.xml</code></pre>',lvl:2},
    {q:'CI/CD — best practices',a:'• Быстрый feedback: параллельные stages, кэширование зависимостей\n• Quality gates: тесты, SonarQube, security scan\n• Артефакты: Docker image с версией (не latest!)\n• Environments: dev → staging → production\n• Rollback: быстрый откат к предыдущей версии\n• Secrets: в CI variables, не в коде\n• Feature flags: деплой ≠ релиз',lvl:2},
    {s:'Observability'},
    {q:'Три столпа Observability',a:'1. <b>Metrics</b> (Prometheus + Grafana): Counter, Gauge, Histogram. RED: Rate, Errors, Duration.\n\n2. <b>Logging</b> (OpenSearch): MDC (trace_id), JSON формат, уровни: ERROR/WARN/INFO/DEBUG.\n\n3. <b>Tracing</b> (OpenTelemetry): Trace → Spans, context propagation.\nSpring Boot 3: Micrometer Tracing.',hot:1,lvl:2},
    {q:'Prometheus и Grafana',a:'<b>Prometheus:</b> pull-based, PromQL: <code>rate(http_requests_total[5m])</code>, Alertmanager.\n<b>Grafana:</b> dashboards, alerts.\n\nМетрики Java: JVM heap/GC, HTTP p50/p95/p99, business (payment_success_rate).',lvl:2},
    {q:'OpenTelemetry',a:'Стандарт observability: traces + metrics + logs.\n\n• <b>SDK</b> — инструментация приложения\n• <b>Collector</b> — приём, обработка, экспорт данных\n• <b>Exporters:</b> Jaeger, Zipkin, Prometheus, OpenSearch\n\nSpring Boot 3: Micrometer Tracing → OpenTelemetry exporter.\nAutomatic instrumentation: HTTP, JDBC, Kafka, Spring.',lvl:2},
    {s:'Linux'},
    {q:'Linux для разработчика',a:'Процессы: ps aux, top/htop, kill, lsof -i :8080\nДиск: df -h, du -sh, free -h\nСеть: netstat -tlnp, ss -tlnp, curl, dig\nЛоги: tail -f, grep -r, journalctl\n\nМетрики: CPU (load average, iowait), Memory (free), Disk I/O (iostat), Network (iftop).',lvl:2},
    {q:'Bash скрипты — основы',a:'<pre><code>#!/bin/bash\n# Проверка здоровья сервиса\nSERVICE_URL="http://localhost:8080/actuator/health"\nRESPONSE=$(curl -s -o /dev/null -w "%{http_code}" $SERVICE_URL)\n\nif [ "$RESPONSE" -eq 200 ]; then\n    echo "Service is healthy"\nelse\n    echo "Service is DOWN! HTTP: $RESPONSE"\n    exit 1\nfi</code></pre>\n\nВажно: set -e (exit on error), set -o pipefail.',lvl:2},
    {s:'Web-серверы'},
    {q:'Nginx — основы',a:'Веб-сервер и reverse proxy.\n\n• Reverse proxy — проксирует запросы к backend (Tomcat/Spring Boot)\n• Load balancing: round-robin, least_conn, ip_hash\n• SSL termination — HTTPS → HTTP к backend\n• Static files — отдача статики\n• Rate limiting, caching\n\nАльтернативы: HAProxy, Envoy, Traefik.',lvl:2},
  
    {s:'Maven'},
    {q:'Maven — lifecycle и основные команды',a:'<b>Lifecycle фазы (в порядке):</b>\nvalidate → compile → test → package → verify → install → deploy\n\n<pre><code>mvn clean           # очистить target/\nmvn compile          # скомпилировать\nmvn test             # запустить тесты\nmvn package          # собрать JAR/WAR\nmvn install          # в локальный репозиторий\nmvn deploy           # в удалённый репозиторий\nmvn clean package -DskipTests  # собрать без тестов</code></pre>',lvl:1,hot:1},
    {q:'POM.xml — структура',a:'<pre><code><project>\n  <groupId>ru.raiffeisen</groupId>\n  <artifactId>payment-service</artifactId>\n  <version>1.0.0</version>\n  <packaging>jar</packaging>\n\n  <parent>\n    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-parent</artifactId>\n    <version>3.2.0</version>\n  </parent>\n\n  <dependencies>...</dependencies>\n  <build><plugins>...</plugins></build>\n</project></code></pre>\n\n<b>dependency scope:</b> compile (default), test, provided, runtime.',lvl:1},
    {q:'Maven — multi-module проект',a:'Родительский POM + модули:\n<pre><code><modules>\n  <module>common</module>\n  <module>api</module>\n  <module>service</module>\n</modules></code></pre>\n\n<b>dependencyManagement</b> — версии в parent, без дублирования в модулях.\n<b>pluginManagement</b> — аналог для плагинов.\n\nBOM (Bill of Materials): импорт версий из другого POM (spring-boot-dependencies).',lvl:2},
    {q:'Maven vs Gradle',a:'<b>Maven:</b> XML (pom.xml), конвенция, lifecycle. Стабильный, широко используется.\n<b>Gradle:</b> Groovy/Kotlin DSL (build.gradle), гибкий, быстрее (incremental, cache).\n\nВ Raiffeisen стеке: Maven.\n\nGradle популярнее в Android и новых проектах.\nMaven — стандарт для enterprise Java.',lvl:1},
    {s:'Profiling'},
    {q:'Профилирование Java-приложений',a:'<b>Инструменты:</b>\n• <b>async-profiler</b> — CPU/allocation profiling, flame graphs. Лучший для production.\n• <b>JFR (Java Flight Recorder)</b> — встроенный в JDK, low overhead.\n• <b>JVisualVM</b> — GUI мониторинг (heap, threads, CPU).\n• <b>jmap</b> — heap dump: <code>jmap -dump:format=b,file=heap.hprof PID</code>\n• <b>jstack</b> — thread dump: <code>jstack PID</code>\n• <b>Eclipse MAT</b> — анализ heap dump, поиск утечек.\n\n<b>Flame Graph:</b> визуализация CPU usage — ширина = время метода.',lvl:3,hot:1},
]},

  { id:'camunda', icon:'&#9881;', name:'Camunda', data: [
    {q:'Camunda и BPMN 2.0',a:'BPMN: Start/End Event, Service Task, User Task, XOR/AND Gateway, Timer, Message, Error Event.\n\nЗачем: оркестрация бизнес-процессов, визуализация, мониторинг, retry.\nJavaDelegate: execute(DelegateExecution).',hot:1,lvl:2},
    {q:'Camunda 7 + Spring Boot',a:'<code>camunda-bpm-spring-boot-starter</code>\n\n<b>Delegate:</b>\n<pre><code>@Component\npublic class ProcessPayment implements JavaDelegate {\n    public void execute(DelegateExecution ex) {\n        String id = (String) ex.getVariable("paymentId");\n        // логика\n        ex.setVariable("status", "OK");\n    }\n}</code></pre>\n\n<b>External Task</b> — worker забирает задачу (лучше для микросервисов).',lvl:2},
    {q:'BPMN элементы подробно',a:'• <b>Service Task</b> — автоматическая задача (JavaDelegate, External)\n• <b>User Task</b> — задача для человека (формы, UI)\n• <b>Exclusive Gateway (XOR)</b> — условное ветвление (expression на рёбрах)\n• <b>Parallel Gateway (AND)</b> — параллельное выполнение\n• <b>Timer Event</b> — задержка (duration: PT30M) или расписание (cron)\n• <b>Error Event</b> — обработка ошибок (boundary event)\n• <b>Message Event</b> — ожидание внешнего сообщения\n• <b>Signal Event</b> — broadcast сигнал всем подписчикам',lvl:2},
    {q:'Camunda — обработка ошибок',a:'1. <b>Retry</b>: asyncBefore=true, retries=3, retryTimeCycle="PT10S"\n2. <b>Error Boundary Event</b>: перехват ошибки, альтернативный путь\n3. <b>Incident</b>: после исчерпания retries → инцидент в Cockpit\n4. <b>Compensation</b>: компенсирующие действия (Saga)\n\nМониторинг: Camunda Cockpit — процессы, инциденты, history.',lvl:2},
    {q:'Camunda vs Temporal vs другие',a:'<b>Camunda 7:</b> embedded, BPMN, Java. Хорошая интеграция со Spring.\n<b>Camunda 8:</b> cloud-native, Zeebe (свой движок), gRPC.\n<b>Temporal:</b> code-first (без BPMN), Go/Java SDK, durable execution.\n\nДля Raiffeisen (Camunda 7): embedded в Spring Boot, BPMN для бизнес-визуализации.',lvl:2},
  ]},

  { id:'algo', icon:'&#129518;', name:'Алгоритмы', data: [
    {q:'Big O нотация',a:'O(1) — HashMap.get\nO(log n) — бинарный поиск, TreeMap\nO(n) — перебор\nO(n log n) — merge sort, timsort\nO(n²) — bubble sort\nO(2^n) — наивный Fibonacci\n\nArrays.sort(primitives) — Dual-Pivot Quicksort\nArrays.sort(objects) — TimSort',hot:1,lvl:1},
    {q:'Сортировки',a:'<b>Bubble Sort</b> — O(n²): сравнение соседних\n<b>Insertion Sort</b> — O(n²), O(n) для почти sorted\n<b>Merge Sort</b> — O(n log n): divide & conquer, стабильная, O(n) memory\n<b>Quick Sort</b> — O(n log n) avg, O(n²) worst: pivot, in-place\n<b>Tim Sort</b> — O(n log n): merge + insertion, стабильная. Java default.',lvl:2},
    {q:'Бинарный поиск',a:'<pre><code>int lo = 0, hi = arr.length - 1;\nwhile (lo <= hi) {\n    int mid = lo + (hi - lo) / 2;\n    if (arr[mid] == target) return mid;\n    else if (arr[mid] < target) lo = mid + 1;\n    else hi = mid - 1;\n}\nreturn -1;</code></pre>\nO(log n). Массив ОБЯЗАН быть отсортирован.',lvl:2},
    {q:'Красно-чёрное дерево',a:'Самобалансирующееся BST. O(log n) гарантия.\n• Корень чёрный\n• Красный → дети чёрные\n• Одинаковое кол-во чёрных на всех путях\n\nJava: TreeMap, TreeSet, HashMap (коллизии ≥8).',lvl:2},
    {q:'Хеш-таблица — устройство',a:'Массив + hash function → index.\n\n<b>Коллизии:</b>\n• Цепочки (chaining) — linked list/tree в бакете. Java HashMap.\n• Open addressing — linear/quadratic probing, double hashing.\n\nO(1) average, O(n) worst (все коллизии).\nLoad factor — когда resize (0.75 для HashMap).',lvl:2},
    {q:'Стек и очередь',a:'<b>Стек (LIFO):</b> push/pop/peek. ArrayDeque.\nПрименение: скобки, DFS, undo, вызовы функций.\n\n<b>Очередь (FIFO):</b> offer/poll/peek. ArrayDeque.\nПрименение: BFS, task scheduling, producer-consumer.\n\n<b>Priority Queue:</b> binary heap. Min/Max элемент за O(1), insert/remove O(log n).',lvl:2},
    {q:'Графы — обход BFS и DFS',a:'<b>BFS (в ширину):</b> очередь. Кратчайший путь в невзвешенном графе.\n<b>DFS (в глубину):</b> стек/рекурсия. Топологическая сортировка, поиск циклов.\n\n<pre><code>// BFS\nQueue<Node> q = new ArrayDeque<>();\nq.add(start);\nwhile (!q.isEmpty()) {\n    Node n = q.poll();\n    for (Node neighbor : n.neighbors())\n        if (!visited.contains(neighbor)) {\n            visited.add(neighbor);\n            q.add(neighbor);\n        }\n}</code></pre>',lvl:2},
    {q:'Жадные алгоритмы',a:'На каждом шаге выбираем локально оптимальное решение.\n\nПримеры:\n• Задача о рюкзаке (дробный)\n• Алгоритм Дейкстры (кратчайший путь)\n• Алгоритм Хаффмана (сжатие)\n• Задача о монетах (если номиналы каноничны)\n\nНе всегда даёт глобальный оптимум!',lvl:2},
    {q:'Динамическое программирование',a:'Разбиение на подзадачи + мемоизация.\n\nПримеры:\n• Fibonacci: fib(n) = fib(n-1) + fib(n-2)\n• Задача о рюкзаке (0/1)\n• Longest Common Subsequence\n• Climbing Stairs\n\nTop-down (рекурсия + cache) vs Bottom-up (таблица).',lvl:2},
  
    {q:'ArrayList vs LinkedList — сложность операций',a:'<pre><code>Операция        ArrayList    LinkedList\nget(i)          O(1)         O(n)\nset(i, e)       O(1)         O(n)\nadd(e) конец    O(1)*        O(1)\nadd(i, e)       O(n)         O(n)**\nremove(i)       O(n)         O(n)**\ncontains(e)     O(n)         O(n)\niterator.remove O(n)         O(1)</code></pre>\n* амортизированная\n** O(1) если есть итератор на позиции\n\nArrayList выигрывает почти всегда за счёт CPU cache.',hot:1,lvl:2},
    {q:'Задача: проверка скобок',a:'<pre><code>boolean isValid(String s) {\n    Deque<Character> stack = new ArrayDeque<>();\n    Map<Character,Character> map = Map.of(\n        \')\', \'(\', \']\', \'[\', \'}\', \'{\');\n    for (char c : s.toCharArray()) {\n        if (map.containsValue(c)) stack.push(c);\n        else if (map.containsKey(c)) {\n            if (stack.isEmpty() || stack.pop() != map.get(c))\n                return false;\n        }\n    }\n    return stack.isEmpty();\n}</code></pre>\nO(n) time, O(n) space. Классика на собеседованиях.',hot:1,lvl:2},
]},

  { id:'live', icon:'&#128187;', name:'ЛайфКодинг', data: [
    {q:'FizzBuzz',a:'<pre><code>IntStream.rangeClosed(1, 100)\n  .mapToObj(i -> i%15==0 ? "FizzBuzz"\n    : i%3==0 ? "Fizz" : i%5==0 ? "Buzz" : ""+i)\n  .forEach(System.out::println);</code></pre>',lvl:1},
    {q:'Two Sum (O(n))',a:'<pre><code>int[] twoSum(int[] nums, int target) {\n    Map<Integer,Integer> map = new HashMap<>();\n    for (int i = 0; i < nums.length; i++) {\n        int comp = target - nums[i];\n        if (map.containsKey(comp))\n            return new int[]{map.get(comp), i};\n        map.put(nums[i], i);\n    }\n    return new int[]{};\n}</code></pre>',hot:1,lvl:2},
    {q:'Реверс строки',a:'<pre><code>new StringBuilder(str).reverse().toString();\n\n// Ручной\nchar[] c = str.toCharArray();\nfor (int i=0, j=c.length-1; i<j; i++, j--) {\n    char t=c[i]; c[i]=c[j]; c[j]=t;\n}\nreturn new String(c);</code></pre>',lvl:2},
    {q:'Палиндром',a:'<pre><code>boolean isPalin(String s) {\n    s = s.toLowerCase().replaceAll("[^a-zа-я0-9]","");\n    int l=0, r=s.length()-1;\n    while (l < r)\n        if (s.charAt(l++) != s.charAt(r--)) return false;\n    return true;\n}</code></pre>',lvl:2},
    {q:'Факториал',a:'<pre><code>// Итеративно (лучше)\nlong factorial(int n) {\n    long r = 1;\n    for (int i = 2; i <= n; i++) r *= i;\n    return r;\n}\n\n// Рекурсивно\nlong factorial(int n) {\n    return n <= 1 ? 1 : n * factorial(n - 1);\n}</code></pre>',lvl:1},
    {q:'Фибоначчи',a:'<pre><code>int fib(int n) {\n    if (n <= 1) return n;\n    int a=0, b=1;\n    for (int i=2; i<=n; i++) {\n        int t=a+b; a=b; b=t;\n    }\n    return b;\n}</code></pre>',lvl:1},
    {q:'Проверка простого числа',a:'<pre><code>boolean isPrime(int n) {\n    if (n < 2) return false;\n    if (n < 4) return true;\n    if (n%2==0 || n%3==0) return false;\n    for (int i=5; i*i<=n; i+=6)\n        if (n%i==0 || n%(i+2)==0) return false;\n    return true;\n}</code></pre>',lvl:2},
    {q:'Дубликаты в массиве',a:'<pre><code>Set<Integer> seen = new HashSet<>();\nList<Integer> dups = new ArrayList<>();\nfor (int n : arr)\n    if (!seen.add(n)) dups.add(n);\n\n// Stream\nArrays.stream(arr).boxed()\n    .collect(groupingBy(identity(), counting()))\n    .entrySet().stream()\n    .filter(e -> e.getValue() > 1)\n    .map(Entry::getKey).toList();</code></pre>',lvl:2},
    {q:'Реверс числа',a:'<pre><code>int reverse(int num) {\n    int rev = 0;\n    while (num != 0) {\n        rev = rev * 10 + num % 10;\n        num /= 10;\n    }\n    return rev;\n}</code></pre>',lvl:2},
    {q:'Пузырьковая сортировка',a:'<pre><code>for (int i=0; i<n-1; i++) {\n    boolean swapped = false;\n    for (int j=0; j<n-i-1; j++)\n        if (arr[j] > arr[j+1]) {\n            int t=arr[j]; arr[j]=arr[j+1]; arr[j+1]=t;\n            swapped = true;\n        }\n    if (!swapped) break;\n}</code></pre>',lvl:2},
    {q:'Общий элемент в трёх коллекциях',a:'<pre><code>Set<Integer> common = new HashSet<>(list1);\ncommon.retainAll(list2);\ncommon.retainAll(list3);\n\n// Stream\nlist1.stream()\n    .filter(new HashSet<>(list2)::contains)\n    .filter(new HashSet<>(list3)::contains)\n    .toList();</code></pre>',lvl:2},
    {q:'Удалить дубликаты из массива',a:'<pre><code>// С сохранением порядка\nint[] unique = Arrays.stream(arr).distinct().toArray();\n\n// LinkedHashSet\nSet<Integer> set = new LinkedHashSet<>();\nfor (int n : arr) set.add(n);\n\n// Отсортированный массив — in-place O(1) memory\nint j = 0;\nfor (int i = 1; i < arr.length; i++)\n    if (arr[i] != arr[j]) arr[++j] = arr[i];</code></pre>',lvl:2},
    {q:'Найти недостающее число в массиве 1..N',a:'<pre><code>// Сумма арифметической прогрессии\nint missing(int[] arr, int n) {\n    int expected = n * (n + 1) / 2;\n    int actual = Arrays.stream(arr).sum();\n    return expected - actual;\n}\n\n// XOR (не будет overflow)\nint missing(int[] arr, int n) {\n    int xor = 0;\n    for (int i = 1; i <= n; i++) xor ^= i;\n    for (int a : arr) xor ^= a;\n    return xor;\n}</code></pre>',lvl:2},
    {q:'Группировка и подсчёт через Stream',a:'<pre><code>// Подсчёт слов\nMap<String, Long> freq = words.stream()\n    .collect(groupingBy(identity(), counting()));\n\n// Макс. зарплата по отделу\nMap<Dept, Optional<Employee>> topByDept = emps.stream()\n    .collect(groupingBy(Employee::getDept,\n        maxBy(comparing(Employee::getSalary))));\n\n// Строка → Map частот символов\nMap<Character, Long> charFreq = str.chars()\n    .mapToObj(c -> (char) c)\n    .collect(groupingBy(identity(), counting()));</code></pre>',hot:1,lvl:2},
  ]},

  { id:'popular', icon:'&#11088;', name:'TOP вопросы', data: [
    {s:'Java Core'},
    {q:'== vs equals()',a:'<code>==</code> — ссылки (объекты) / значения (примитивы).\n<code>equals()</code> — содержимое (если переопределён).\n\n<code>"hello" == "hello"</code> → true (String Pool)\n<code>new String("hello") == new String("hello")</code> → false',hot:1,lvl:2},
    {q:'Как создать immutable объект?',a:'1. final класс, 2. private final поля, 3. нет setters, 4. defensive copy.\nИли: <code>record MyClass(String name) {}</code>',hot:1,lvl:2},
    {q:'final vs finally vs finalize()',a:'final — модификатор. finally — cleanup блок. finalize() — deprecated (удалён Java 18).',hot:1,lvl:2},
    {q:'Что такое effectively final?',a:'Переменная, которая не изменяется после инициализации. Можно использовать в лямбдах/anonymous classes без явного final.\n\n<pre><code>String name = "John"; // effectively final\nRunnable r = () -> System.out.println(name); // OK\nname = "Jane"; // теперь НЕ effectively final → compile error в лямбде</code></pre>',lvl:2},
    {s:'Collections'},
    {q:'Как HashMap обрабатывает коллизии?',a:'Java 8+: цепочка → красно-чёрное дерево при ≥8 (TREEIFY_THRESHOLD) и ≥64 бакетов.\nОбратно при ≤6 (UNTREEIFY_THRESHOLD).',hot:1,lvl:2},
    {q:'Почему String хороший ключ HashMap?',a:'• Immutable → hashCode не меняется\n• hashCode кэшируется\n• equals() хорошо определён\n• Широко используется (String Pool оптимизация)\n\nMutable ключ → объект \"теряется\" при изменении.',lvl:2},
    {s:'Spring'},
    {q:'Как Spring создаёт proxy для @Transactional?',a:'BeanPostProcessor → CGLIB proxy → перехват: open TX → метод → commit/rollback.\nSelf-invocation не проходит через proxy.\nРешения: AopContext, TransactionTemplate, self-inject.',hot:1,lvl:2},
    {q:'Spring Boot Auto-configuration',a:'@EnableAutoConfiguration → AutoConfiguration.imports.\n@ConditionalOnClass, @ConditionalOnMissingBean.\nspring-kafka + bootstrap-servers → авто KafkaTemplate.',hot:1,lvl:2},
    {q:'Какие паттерны используются в Spring?',a:'Singleton, Factory, Proxy (AOP), Template Method (JdbcTemplate), Observer (@EventListener), Strategy, Front Controller, DI, Decorator (BPP).',hot:1,lvl:2},
    {s:'Архитектура'},
    {q:'Консистентность между микросервисами?',a:'Saga + компенсации, Transactional Outbox, Event Sourcing, 2PC.\nДля платежей: idempotency key, eventual consistency для нотификаций.',hot:1,lvl:2},
    {q:'REST API best practices',a:'Ресурсы, HTTP методы, статус-коды, Idempotency-Key.\n6 принципов: Client-Server, Stateless, Cacheable, Uniform Interface, Layered, Code on Demand.',hot:1,lvl:2},
    {q:'Как оптимизировать медленный сервис?',a:'1. Измерить (profiler, EXPLAIN)\n2. БД: индексы, N+1, HikariCP\n3. Кэш: Redis/Caffeine\n4. Async: Kafka\n5. Virtual Threads\n6. Масштабирование',hot:1,lvl:2},
    {q:'Отказоустойчивость',a:'Репликация, Circuit Breaker, Retry + backoff, Timeouts, Health checks, Graceful shutdown, DLQ, Idempotency.',hot:1,lvl:2},
    {s:'Безопасность'},
    {q:'OAuth 2.0 и JWT',a:'OAuth 2.0: Authorization Code (web), Client Credentials (M2M).\nJWT: Header.Payload.Signature. Stateless.\nSpring: oauth2ResourceServer().jwt().',hot:1,lvl:2},
    {q:'HTTPS, TLS, шифрование',a:'<b>TLS</b> — шифрование канала. Handshake: обмен ключами (asymmetric) → данные (symmetric).\n<b>Symmetric</b> (AES) — один ключ, быстро.\n<b>Asymmetric</b> (RSA, EC) — public/private, медленнее.\n<b>Hashing</b> (SHA-256, bcrypt) — необратимое. Для паролей: bcrypt/scrypt/argon2.',lvl:2},
  ]},

  { id:'ai', icon:'&#129302;', name:'AI', data: [

  { id:'claude', icon:'&#129302;', name:'Claude Code', data: [
    {s:'Основы Claude Code'},
    {q:'Что такое Claude Code?',a:'Claude Code — AI-ассистент от Anthropic для разработки, доступный как CLI, desktop app, web app (claude.ai/code) и расширения для VS Code/JetBrains.\n\nОсновные возможности:\n• Чтение и редактирование файлов\n• Выполнение команд в терминале\n• Поиск по кодовой базе\n• Работа с Git (коммиты, PR)\n• Рефакторинг, генерация кода и тестов\n• Объяснение и анализ кода\n\nРаботает с контекстом до 1M токенов — понимает большие проекты целиком.',hot:1,lvl:1},
    {q:'Как использовать Claude Code в повседневной разработке?',a:'<b>Типичные задачи:</b>\n• <code>/commit</code> — автоматический коммит с осмысленным сообщением\n• Поиск бага: "найди почему PaymentService возвращает null"\n• Рефакторинг: "перепиши этот метод на Stream API"\n• Генерация тестов: "напиши unit-тесты для PaymentMapper"\n• Code review: "проверь этот код на проблемы"\n• Объяснение: "объясни как работает этот SQL запрос"\n\n<b>Советы:</b>\n• Будь конкретен: указывай файлы, классы, методы\n• Давай контекст: стек, ограничения, стиль кода\n• Итерируй: уточняй результат',hot:1,lvl:2},
    {q:'Slash-команды Claude Code',a:'<b>Встроенные:</b>\n• <code>/help</code> — справка\n• <code>/clear</code> — очистить контекст\n• <code>/compact</code> — сжать контекст\n• <code>/cost</code> — стоимость сессии\n• <code>/doctor</code> — диагностика проблем\n\n<b>Полезные навыки:</b>\n• <code>/commit</code> — создать коммит\n• <code>/review-pr</code> — ревью PR\n• <code>/init</code> — создать CLAUDE.md для проекта',lvl:2},
    {q:'CLAUDE.md — что это?',a:'Файл с инструкциями для Claude Code в корне проекта.\n\nЧто включать:\n• Как собрать проект (build, test, lint команды)\n• Архитектура (высокоуровневая)\n• Особенности проекта\n• Не включать: очевидные вещи, структуру файлов\n\nЗагружается автоматически при работе с проектом.',lvl:2},
    {q:'Prompt Engineering для Claude Code',a:'<b>Эффективные промпты:</b>\n\n1. <b>Конкретность:</b> "В PaymentService.java метод processPayment() — добавь валидацию amount > 0" вместо "добавь валидацию"\n\n2. <b>Контекст:</b> "Используем Spring Boot 3.2, Java 21, PostgreSQL. Стиль — hexagonal architecture"\n\n3. <b>Примеры:</b> "Сделай аналогично тому, как сделано в OrderService"\n\n4. <b>Ограничения:</b> "Без Lombok, используй records. Покрой тестами с JUnit 5 + Mockito"\n\n5. <b>Пошагово:</b> для сложных задач разбивай на шаги',hot:1,lvl:2},
    {s:'Продвинутое использование'},
    {q:'Hooks в Claude Code',a:'Hooks — shell-команды, выполняющиеся при определённых событиях.\n\nНастраиваются в settings.json:\n• PreToolUse — перед вызовом инструмента\n• PostToolUse — после вызова\n• UserPromptSubmit — при отправке промпта\n\nПример: автоформатирование после редактирования файла, запуск линтера после изменений.',lvl:2},
    {q:'MCP серверы в Claude Code',a:'MCP (Model Context Protocol) — позволяет подключать внешние инструменты.\n\nПримеры MCP серверов:\n• GitHub — работа с issues, PR\n• PostgreSQL — запросы к БД\n• Slack — отправка сообщений\n• Jira — работа с задачами\n\nНастройка: в settings.json или .mcp.json в проекте.',lvl:2},
    {q:'Claude Code для подготовки к собеседованиям',a:'<b>Как использовать:</b>\n\n• "Задай мне 10 вопросов по Spring Boot 3 для senior-уровня"\n• "Объясни как работает HashMap на уровне собеседования"\n• "Напиши задачу по live coding на тему Stream API и проверь моё решение"\n• "Проведи mock-собеседование по Java Core, задавай по одному вопросу"\n• "Разбери мой код и скажи что спросили бы на code review"\n\nClaude может выступать как интервьюер, ревьюер и ментор.',hot:1,lvl:2},
  ]},

  { id:'security', icon:'&#128274;', name:'Безопасность', data: [
    {s:'Аутентификация и авторизация'},
    {q:'Аутентификация vs авторизация',a:'<b>Аутентификация</b> — КТО ты? Проверка личности (логин/пароль, токен, сертификат).\n<b>Авторизация</b> — ЧТО можешь? Проверка прав доступа (роли, permissions).\n\nПорядок: сначала аутентификация, потом авторизация.\nВ Spring Security: AuthenticationManager → AccessDecisionManager.',lvl:1,hot:1},
    {q:'Basic Auth, Session, Token — сравнение',a:'<b>Basic Auth:</b> логин:пароль в Base64 в каждом запросе. Просто, но небезопасно без HTTPS.\n<b>Session:</b> сервер хранит состояние (HttpSession), клиент — cookie (JSESSIONID). Stateful.\n<b>Token (JWT):</b> сервер НЕ хранит состояние. Токен содержит всё. Stateless.\n\nМикросервисы: Token (JWT) — stateless, масштабируемый.\nМонолит: Session — проще, нативная поддержка.',lvl:1},
    {q:'OAuth 2.0 — протокол авторизации',a:'Делегирование доступа без передачи пароля.\n\n<b>Роли:</b> Resource Owner, Client, Authorization Server, Resource Server.\n\n<b>Grant Types:</b>\n• <b>Authorization Code</b> — для web-приложений (самый безопасный)\n• <b>Client Credentials</b> — machine-to-machine (M2M)\n• <b>PKCE</b> — для SPA и mobile (расширение Auth Code)\n• Resource Owner Password — deprecated\n\n<b>Tokens:</b> Access Token (короткоживущий) + Refresh Token (обновление).\n\nSpring: spring-boot-starter-oauth2-resource-server, spring-boot-starter-oauth2-client.',lvl:2,hot:1},
    {q:'JWT — структура и валидация',a:'JSON Web Token: <b>Header.Payload.Signature</b> (Base64URL)\n\n<b>Header:</b> {"alg":"RS256","typ":"JWT"}\n<b>Payload:</b> {"sub":"user1","iss":"auth-server","exp":1234567890,"roles":["ADMIN"]}\n<b>Signature:</b> HMAC-SHA256(header+payload, secret) или RSA/EC\n\n<b>Валидация:</b>\n1. Проверить подпись (HMAC/RSA)\n2. Проверить exp (не истёк)\n3. Проверить iss (правильный издатель)\n4. Проверить aud (для нас ли токен)\n\nНе хранить чувствительные данные в payload — он НЕ зашифрован!',lvl:2,hot:1},
    {q:'RBAC vs ABAC',a:'<b>RBAC</b> (Role-Based Access Control):\nПрава привязаны к ролям: ADMIN, USER, MANAGER.\nПросто, подходит для большинства приложений.\n@PreAuthorize("hasRole(\'ADMIN\')")\n\n<b>ABAC</b> (Attribute-Based Access Control):\nПрава на основе атрибутов: кто, что, где, когда.\nГибче, но сложнее. Пример: "менеджер может видеть платежи только своего отдела".\n\nДля платёжных систем: RBAC + дополнительные проверки в коде.',lvl:2},
    {s:'Spring Security'},
    {q:'Spring Security — архитектура',a:'<b>Security Filter Chain</b> — цепочка фильтров перед контроллером:\n\n1. SecurityContextPersistenceFilter — загрузка SecurityContext\n2. UsernamePasswordAuthenticationFilter — логин/пароль\n3. BearerTokenAuthenticationFilter — JWT\n4. AuthorizationFilter — проверка прав\n5. ExceptionTranslationFilter — обработка ошибок\n\n<b>Ключевые компоненты:</b>\n• SecurityContextHolder — хранит Authentication (ThreadLocal)\n• AuthenticationManager → AuthenticationProvider → UserDetailsService\n• GrantedAuthority — роль/permission',lvl:2,hot:1},
    {q:'Spring Security — конфигурация (Spring Boot 3)',a:'<pre><code>@Configuration\n@EnableWebSecurity\npublic class SecurityConfig {\n    @Bean\n    SecurityFilterChain filterChain(HttpSecurity http) throws Exception {\n        return http\n            .authorizeHttpRequests(auth -> auth\n                .requestMatchers("/api/public/**").permitAll()\n                .requestMatchers("/api/admin/**").hasRole("ADMIN")\n                .anyRequest().authenticated())\n            .oauth2ResourceServer(oauth2 -> oauth2.jwt(Customizer.withDefaults()))\n            .csrf(csrf -> csrf.disable())\n            .sessionManagement(s -> s.sessionCreationPolicy(STATELESS))\n            .build();\n    }\n}</code></pre>',lvl:2,hot:1},
    {q:'@PreAuthorize, @Secured, @RolesAllowed',a:'Method-level security (нужен @EnableMethodSecurity):\n\n<pre><code>@PreAuthorize("hasRole(\'ADMIN\') and #id == authentication.principal.id")\npublic Payment getPayment(Long id) { ... }\n\n@PreAuthorize("hasAuthority(\'PAYMENT_READ\')")\npublic List<Payment> getAll() { ... }\n\n@Secured("ROLE_ADMIN") // проще, только роли\npublic void delete(Long id) { ... }</code></pre>\n\n@PreAuthorize — самый гибкий, поддерживает SpEL.',lvl:2},
    {q:'CSRF и CORS',a:'<b>CSRF</b> (Cross-Site Request Forgery):\nАтака: вредоносный сайт отправляет запрос от имени пользователя.\nЗащита: CSRF token в cookie/header.\nОтключают для stateless REST API (JWT, без cookies).\n\n<b>CORS</b> (Cross-Origin Resource Sharing):\nБраузер блокирует запросы к другому домену.\n\n<pre><code>@Bean\nCorsConfigurationSource corsConfig() {\n    var config = new CorsConfiguration();\n    config.setAllowedOrigins(List.of("https://pay.raif.ru"));\n    config.setAllowedMethods(List.of("GET","POST","PUT","DELETE"));\n    var source = new UrlBasedCorsConfigurationSource();\n    source.registerCorsConfiguration("/api/**", config);\n    return source;\n}</code></pre>',lvl:2},
    {s:'Криптография'},
    {q:'Симметричное vs асимметричное шифрование',a:'<b>Симметричное</b> (AES, DES):\nОдин ключ для шифрования и дешифрования.\nБыстрое. Проблема: как передать ключ?\n\n<b>Асимметричное</b> (RSA, EC):\nПара ключей: public (шифрование) + private (дешифрование).\nМедленнее, но безопасная передача ключей.\n\n<b>TLS/HTTPS:</b> комбинация обоих:\n1. Asymmetric — обмен ключами (handshake)\n2. Symmetric — шифрование данных (AES)',lvl:2},
    {q:'Хеширование: bcrypt, SHA, MD5',a:'Хеш — необратимое преобразование.\n\n• <b>MD5</b> — устаревший, коллизии, НЕ для паролей\n• <b>SHA-256</b> — быстрый, для подписей и checksum\n• <b>bcrypt</b> — медленный (нарочно!), с salt, для паролей\n• <b>scrypt, argon2</b> — современные альтернативы bcrypt\n\nSpring Security: <code>new BCryptPasswordEncoder()</code>\n\nНикогда не храни пароли в открытом виде! Только хеш + salt.',lvl:1,hot:1},
  ]},

  { id:'git', icon:'&#128200;', name:'Git', data: [
    {s:'Основы'},
    {q:'Git — основные команды',a:'<pre><code>git init              # создать репозиторий\ngit clone url         # клонировать\ngit add file          # добавить в staging\ngit commit -m "msg"   # зафиксировать\ngit push origin main  # отправить\ngit pull              # получить + merge\ngit fetch             # получить без merge\ngit status            # состояние\ngit log --oneline     # история\ngit diff              # изменения</code></pre>',lvl:1,hot:1},
    {q:'git merge vs git rebase',a:'<b>merge</b> — создаёт merge commit, сохраняет историю веток:\n<code>git checkout main && git merge feature</code>\n\n<b>rebase</b> — перемещает коммиты на верх целевой ветки, линейная история:\n<code>git checkout feature && git rebase main</code>\n\n<b>Правило:</b> НИКОГДА не rebase публичных веток (main, develop).\nrebase — для своих feature-веток перед merge.',lvl:1,hot:1},
    {q:'git stash, cherry-pick, bisect',a:'<b>stash</b> — временно спрятать незакоммиченные изменения:\n<code>git stash</code> → <code>git stash pop</code>\n\n<b>cherry-pick</b> — применить конкретный коммит из другой ветки:\n<code>git cherry-pick abc123</code>\n\n<b>bisect</b> — бинарный поиск бага по коммитам:\n<code>git bisect start</code> → <code>git bisect bad</code> → <code>git bisect good v1.0</code>\nGit автоматически находит коммит с багом.',lvl:2},
    {q:'Стратегии ветвления: Git Flow vs Trunk-based',a:'<b>Git Flow:</b>\n• main, develop, feature/*, release/*, hotfix/*\n• Длинные feature ветки, merge через PR\n• Подходит для релизных циклов\n\n<b>Trunk-based:</b>\n• Одна main ветка, короткоживущие feature ветки (<1 день)\n• Feature flags вместо длинных веток\n• Подходит для CI/CD, continuous deployment\n\nТренд 2026: trunk-based с feature flags.',lvl:2,hot:1},
    {q:'Как разрешить merge conflict?',a:'1. <code>git merge feature</code> → CONFLICT\n2. Открыть файл — найти маркеры:\n<pre><code><<<<<<< HEAD\nтекущий код\n=======\nвходящий код\n>>>>>>> feature</code></pre>\n3. Выбрать нужный вариант, убрать маркеры\n4. <code>git add file</code> → <code>git commit</code>\n\nИнструменты: IDE (IntelliJ), git mergetool, VS Code.',lvl:1},
    {q:'.gitignore и git hooks',a:'<b>.gitignore</b> — файлы, которые Git не отслеживает:\n<pre><code>target/\n*.class\n.idea/\n.env\n*.log</code></pre>\n\n<b>Hooks</b> — скрипты при событиях Git:\n• pre-commit — линтер, форматирование перед коммитом\n• pre-push — запуск тестов перед пушем\n• commit-msg — проверка формата сообщения\n\nHusky (JS) / pre-commit (Python) — менеджеры hooks.',lvl:2},
  ]},

  { id:'protocols', icon:'&#127760;', name:'Сеть и протоколы', data: [
    {s:'HTTP'},
    {q:'HTTP — методы и идемпотентность',a:'<b>Методы:</b>\n• GET — чтение (идемпотентный, safe)\n• POST — создание (НЕ идемпотентный)\n• PUT — полное обновление (идемпотентный)\n• PATCH — частичное обновление\n• DELETE — удаление (идемпотентный)\n• HEAD — как GET, но без тела\n• OPTIONS — доступные методы (CORS preflight)\n\n<b>Идемпотентность:</b> повторный вызов = тот же результат.\nGET, PUT, DELETE — идемпотентны. POST — нет (нужен Idempotency-Key).',lvl:1,hot:1},
    {q:'HTTP статус-коды',a:'<b>2xx — успех:</b>\n200 OK, 201 Created, 204 No Content\n\n<b>3xx — перенаправление:</b>\n301 Moved Permanently, 302 Found, 304 Not Modified\n\n<b>4xx — ошибка клиента:</b>\n400 Bad Request, 401 Unauthorized, 403 Forbidden, 404 Not Found, 405 Method Not Allowed, 409 Conflict, 429 Too Many Requests\n\n<b>5xx — ошибка сервера:</b>\n500 Internal Server Error, 502 Bad Gateway, 503 Service Unavailable, 504 Gateway Timeout',lvl:1,hot:1},
    {q:'HTTP/1.1 vs HTTP/2 vs HTTP/3',a:'<b>HTTP/1.1:</b> текстовый, один запрос за соединение (pipelining плохо работает). Keep-Alive.\n<b>HTTP/2:</b> бинарный, мультиплексирование (много запросов по одному TCP), server push, header compression (HPACK).\n<b>HTTP/3:</b> UDP (QUIC вместо TCP), ещё быстрее handshake, лучше при потерях пакетов.\n\ngRPC использует HTTP/2.',lvl:2},
    {q:'HTTPS и TLS',a:'HTTPS = HTTP + TLS (Transport Layer Security).\n\n<b>TLS Handshake:</b>\n1. Client Hello (поддерживаемые алгоритмы)\n2. Server Hello + сертификат (public key)\n3. Обмен ключами (asymmetric)\n4. Шифрование данных (symmetric, AES)\n\nСертификат: CA (Certificate Authority) подтверждает подлинность сервера.\nLet\'s Encrypt — бесплатные сертификаты.',lvl:2},
    {s:'REST и API'},
    {q:'REST — 6 принципов',a:'1. <b>Client-Server</b> — разделение\n2. <b>Stateless</b> — сервер не хранит состояние клиента\n3. <b>Cacheable</b> — ответы можно кэшировать\n4. <b>Uniform Interface</b> — ресурсы, HTTP методы, HATEOAS\n5. <b>Layered System</b> — клиент не знает про промежуточные слои\n6. <b>Code on Demand</b> (optional) — сервер может отправить код\n\nРесурсы: /api/v1/payments/{id}\nМножественное число, существительные, не глаголы.',lvl:1,hot:1},
