  { id:'claude', icon:'&#129302;', name:'Claude Code', data: [
    {s:'Основы Claude Code'},
    {q:'Что такое Claude Code?',a:'Claude Code — AI-ассистент от Anthropic для разработки, доступный как CLI, desktop app, web app (claude.ai/code) и расширения для VS Code/JetBrains.\n\nОсновные возможности:\n• Чтение и редактирование файлов\n• Выполнение команд в терминале\n• Поиск по кодовой базе\n• Работа с Git (коммиты, PR)\n• Рефакторинг, генерация кода и тестов\n• Объяснение и анализ кода\n\nРаботает с контекстом до 1M токенов — понимает большие проекты целиком.',hot:1,lvl:1},
    {q:'Как использовать Claude Code в повседневной разработке?',a:'<b>Типичные задачи:</b>\n• <code>/commit</code> — автоматический коммит с осмысленным сообщением\n• Поиск бага: "найди почему PaymentService возвращает null"\n• Рефакторинг: "перепиши этот метод на Stream API"\n• Генерация тестов: "напиши unit-тесты для PaymentMapper"\n• Code review: "проверь этот код на проблемы"\n• Объяснение: "объясни как работает этот SQL запрос"\n\n<b>Советы:</b>\n• Будь конкретен: указывай файлы, классы, методы\n• Давай контекст: стек, ограничения, стиль кода\n• Итерируй: уточняй результат',hot:1,lvl:2},
    {q:'Slash-команды Claude Code',a:'<b>Встроенные:</b>\n• <code>/help</code> — справка\n• <code>/clear</code> — очистить контекст\n• <code>/compact</code> — сжать контекст\n• <code>/cost</code> — стоимость сессии\n• <code>/doctor</code> — диагностика проблем\n\n<b>Полезные навыки:</b>\n• <code>/commit</code> — создать коммит\n• <code>/review-pr</code> — ревью PR\n• <code>/init</code> — создать CLAUDE.md для проекта',lvl:2},
    {q:'CLAUDE.md — что это?',a:'Файл с инструкциями для Claude Code в корне проекта.\n\nЧто включать:\n• Как собрать проект (build, test, lint команды)\n• Архитектура (высокоуровневая)\n• Особенности проекта\n• Не включать: очевидные вещи, структуру файлов\n\nЗагружается автоматически при работе с проектом.',lvl:2},
    {q:'Prompt Engineering для Claude Code',a:'<b>Эффективные промпты:</b>\n\n1. <b>Конкретность:</b> "В PaymentService.java метод processPayment() — добавь валидацию amount > 0" вместо "добавь валидацию"\n\n2. <b>Контекст:</b> "Используем Spring Boot 3.2, Java 21, PostgreSQL. Стиль — hexagonal architecture"\n\n3. <b>Примеры:</b> "Сделай аналогично тому, как сделано в OrderService"\n\n4. <b>Ограничения:</b> "Без Lombok, используй records. Покрой тестами с JUnit 5 + Mockito"\n\n5. <b>Пошагово:</b> для сложных задач разбивай на шаги',hot:1,lvl:2},
    {s:'Продвинутое использование'},
    {q:'Hooks в Claude Code',a:'Hooks — shell-команды, выполняющиеся при определённых событиях.\n\nНастраиваются в settings.json:\n• PreToolUse — перед вызовом инструмента\n• PostToolUse — после вызова\n• UserPromptSubmit — при отправке промпта\n\nПример: автоформатирование после редактирования файла, запуск линтера после изменений.',lvl:2},
    {q:'MCP серверы в Claude Code',a:'MCP (Model Context Protocol) — позволяет подключать внешние инструменты.\n\nПримеры MCP серверов:\n• GitHub — работа с issues, PR\n• PostgreSQL — запросы к БД\n• Slack — отправка сообщений\n• Jira — работа с задачами\n\nНастройка: в settings.json или .mcp.json в проекте.',lvl:2},
    {q:'Claude Code для подготовки к собеседованиям',a:'<b>Как использовать:</b>\n\n• "Задай мне 10 вопросов по Spring Boot 3 для senior-уровня"\n• "Объясни как работает HashMap на уровне собеседования"\n• "Напиши задачу по live coding на тему Stream API и проверь моё решение"\n• "Проведи mock-собеседование по Java Core, задавай по одному вопросу"\n• "Разбери мой код и скажи что спросили бы на code review"\n\nClaude может выступать как интервьюер, ревьюер и ментор.',hot:1,lvl:2},
  ]},

  { id:'security', icon:'&#128274;', name:'Безопасность', data: [
    {s:'Аутентификация и авторизация'},
    {q:'Аутентификация vs авторизация',a:'<b>Аутентификация</b> — КТО ты? Проверка личности.\n• Логин/пароль\n• JWT токен\n• OAuth 2.0\n• Сертификат (mTLS)\n\n<b>Авторизация</b> — ЧТО можешь? Проверка прав.\n• Роли (RBAC): ADMIN, USER, MANAGER\n• Permissions: PAYMENT_READ, PAYMENT_WRITE\n• Правила: "менеджер видит только платежи своего отдела"\n\n<b>Порядок:</b> сначала аутентификация, потом авторизация.\n\n<b>В Spring Security:</b>\n<pre><code>HTTP Request\n  -> AuthenticationFilter (проверяет токен/пароль)\n  -> SecurityContextHolder.setAuthentication()\n  -> AuthorizationFilter\n     requestMatchers("/admin/**").hasRole("ADMIN")\n     @PreAuthorize("hasAuthority("PAYMENT_READ")")\n  -> Controller</code></pre>\n\n<b>Пример @PreAuthorize:</b>\n<pre><code>@PreAuthorize("hasRole("ADMIN") or #merchantId == authentication.principal.merchantId")\npublic List&lt;Payment&gt; getPayments(Long merchantId) { ... }\n// ADMIN видит все, мерчант — только свои</code></pre>\n\n<b>На собесе:</b> как реализована авторизация в вашем проекте? (JWT + roles в claims + @PreAuthorize)',lvl:1,hot:1},
    {q:'Basic Auth, Session, Token — сравнение',a:'<b>Basic Auth:</b> логин:пароль в Base64 в каждом запросе. Просто, но небезопасно без HTTPS.\n<b>Session:</b> сервер хранит состояние (HttpSession), клиент — cookie (JSESSIONID). Stateful.\n<b>Token (JWT):</b> сервер НЕ хранит состояние. Токен содержит всё. Stateless.\n\nМикросервисы: Token (JWT) — stateless, масштабируемый.\nМонолит: Session — проще, нативная поддержка.',lvl:1},
    {q:'OAuth 2.0 — протокол авторизации',a:'Делегирование доступа без передачи пароля.\n\n<b>Роли:</b>\n• <b>Resource Owner</b> — пользователь\n• <b>Client</b> — приложение (наш сервис)\n• <b>Authorization Server</b> — выдаёт токены (Keycloak)\n• <b>Resource Server</b> — API с данными (наш Spring Boot)\n\n<b>Authorization Code (для web):</b>\n<pre><code>1. User -> Client: "хочу войти"\n2. Client -> Auth Server: redirect на /authorize\n3. User -> Auth Server: логин/пароль\n4. Auth Server -> Client: authorization code (в redirect URL)\n5. Client -> Auth Server: code -> access_token + refresh_token\n6. Client -> Resource Server: Authorization: Bearer access_token</code></pre>\n\n<b>Client Credentials (machine-to-machine):</b>\n<pre><code>// Сервис A вызывает Сервис B\nPOST /oauth/token\n  grant_type=client_credentials\n  client_id=payment-service\n  client_secret=secret\n-> { access_token: "eyJ...", expires_in: 3600 }</code></pre>\n\n<b>Spring Boot как Resource Server:</b>\n<pre><code># application.yml\nspring.security.oauth2.resourceserver.jwt:\n  issuer-uri: https://keycloak.example.com/realms/payments\n  # Автоматически: загрузка JWK keys, валидация подписи, exp, iss</code></pre>\n\n<b>На собесе:</b> Authorization Code vs Client Credentials? (AC — пользователь, CC — сервис-сервис)',lvl:2,hot:1},
    {q:'JWT — структура и валидация',a:'JSON Web Token: <b>Header.Payload.Signature</b> (Base64URL)\n\n<b>Header:</b> {"alg":"RS256","typ":"JWT"}\n<b>Payload:</b> {"sub":"user1","iss":"auth-server","exp":1234567890,"roles":["ADMIN"]}\n<b>Signature:</b> HMAC-SHA256(header+payload, secret) или RSA/EC\n\n<b>Валидация:</b>\n1. Проверить подпись (HMAC/RSA)\n2. Проверить exp (не истёк)\n3. Проверить iss (правильный издатель)\n4. Проверить aud (для нас ли токен)\n\nНе хранить чувствительные данные в payload — он НЕ зашифрован!',lvl:2,hot:1},
    {q:'RBAC vs ABAC',a:'Две основные модели контроля доступа (авторизации).\n\n<b>RBAC — Role-Based Access Control</b>\nПользователь получает роль, роль содержит набор прав.\n\n<pre><code>User ─── has ───► Role ─── grants ───► Permissions\n\nJohn    ────►   ADMIN    ────►   USER_DELETE, USER_EDIT, PAYMENT_VIEW\nAlice   ────►   USER     ────►   PROFILE_VIEW, PROFILE_EDIT\nBob     ────►   MANAGER  ────►   USER_VIEW, REPORT_VIEW</code></pre>\n\n<b>Пример в Spring Security:</b>\n<pre><code>@PreAuthorize("hasRole(\\\'ADMIN\\\')")\npublic void deleteUser(Long id) { }\n\n@PreAuthorize("hasAnyRole(\\\'ADMIN\\\', \\\'MANAGER\\\')")\npublic List&lt;User&gt; listUsers() { }</code></pre>\n\n<b>Плюсы RBAC:</b>\n• Простота — легко понять, легко настроить\n• Хорошо масштабируется по количеству пользователей\n• Стандарт де-факто (поддерживают все фреймворки)\n• Аудит: «кто что может» — прозрачно\n\n<b>Минусы RBAC:</b>\n• <b>Role explosion</b> — для тонких правил нужны роли типа <code>MANAGER_DEPT_SALES_READ_ONLY_REGION_EU</code>\n• Не учитывает контекст (время, IP, содержимое ресурса)\n• Трудно выразить «менеджер видит только свой отдел»\n\n<b>ABAC — Attribute-Based Access Control</b>\nДоступ определяется правилами, работающими с атрибутами <b>4 категорий</b>:\n\n1. <b>Subject</b> — атрибуты пользователя (роль, отдел, страна, уровень допуска)\n2. <b>Action</b> — что делает (read, write, delete, approve)\n3. <b>Resource</b> — атрибуты объекта (владелец, classification, department, amount)\n4. <b>Environment</b> — контекст (время, IP, device type, risk score)\n\n<b>Правило ABAC:</b>\n<pre><code>allow IF\n    subject.department == resource.department\n    AND action == "read"\n    AND environment.time BETWEEN 9:00 AND 18:00\n    AND environment.location == "corporate_network"</code></pre>\n\n<b>Пример в Spring Security:</b>\n<pre><code>@PreAuthorize("""\n    hasRole(\\\'MANAGER\\\')\n    and #payment.merchantId == authentication.principal.merchantId\n    and #payment.amount &lt; 100000\n""")\npublic void approvePayment(Payment payment) { }\n\n// Или через кастомный PermissionEvaluator\n@PreAuthorize("hasPermission(#payment, \\\'approve\\\')")\npublic void approve(Payment payment) { }\n\n@Component\npublic class PaymentPermissionEvaluator implements PermissionEvaluator {\n    public boolean hasPermission(Authentication auth, Object target, Object permission) {\n        Payment p = (Payment) target;\n        User user = (User) auth.getPrincipal();\n        return "approve".equals(permission)\n            &amp;&amp; user.getDepartment().equals(p.getDepartment())\n            &amp;&amp; p.getAmount().compareTo(user.getApprovalLimit()) &lt;= 0;\n    }\n}</code></pre>\n\n<b>Плюсы ABAC:</b>\n• Тонкая гранулярность — можно выразить любое правило\n• Динамические правила — не нужно пересоздавать роли\n• Контекстное принятие решения — время, IP, риск\n• Хорошо для regulated industries (банки, healthcare)\n\n<b>Минусы ABAC:</b>\n• Сложнее реализовать и поддерживать\n• Труднее понять «кто что может» (нужно прогонять правила)\n• Performance — правила могут быть дорогие\n• Политики могут конфликтовать — нужно разрешение конфликтов\n\n<b>Сравнительная таблица:</b>\n<pre><code>Критерий       | RBAC           | ABAC\n───────────────┼────────────────┼──────────────────\nПростота       | ✅ Простой     | ❌ Сложный\nГранулярность  | ⚠ Грубая       | ✅ Любая\nКонтекст       | ❌ Нет          | ✅ Время, IP...\nМасштабируемость | ✅ По юзерам  | ⚠ По правилам\nАудит          | ✅ Легко        | ⚠ Сложнее\nДля regulated  | ⚠ Ограниченно  | ✅ Идеально</code></pre>\n\n<b>Гибрид (практика):</b> большинство систем используют <b>RBAC как основу + ABAC-проверки на уровне данных</b>.\n<pre><code>// RBAC: роль MANAGER имеет право одобрять\n@PreAuthorize("hasRole(\\\'MANAGER\\\')")\npublic void approve(Payment p) {\n    // ABAC: + проверка по данным\n    if (!p.getDepartment().equals(currentUser.getDepartment())) {\n        throw new AccessDeniedException();\n    }\n    if (p.getAmount().compareTo(currentUser.getLimit()) &gt; 0) {\n        throw new AccessDeniedException();\n    }\n}</code></pre>\n\n<b>Стандарт ABAC — XACML</b> (eXtensible Access Control Markup Language). XML-based, сложный, редко в «обычных» проектах. Используется в enterprise/government.\n\n<b>Альтернативы и смежные модели:</b>\n• <b>ACL</b> (Access Control List) — права на каждый объект (Linux файлы)\n• <b>PBAC</b> (Policy-Based) — политики в декларативной форме (OPA, Open Policy Agent)\n• <b>ReBAC</b> (Relationship-Based) — через графы отношений (Google Zanzibar)\n\n<b>На собесе для платёжной системы:</b>\n• Роли: ADMIN, MERCHANT, OPERATOR — RBAC\n• Но: мерчант видит только свои платежи — ABAC-check на уровне данных\n• Лимиты на суммы — ABAC по amount\n• Одобрение крупных платежей — 4 eyes principle + ABAC',lvl:2},

    {q:'Spring Security — архитектура',a:'<b>Security Filter Chain</b> — цепочка фильтров перед контроллером:\n\n1. SecurityContextPersistenceFilter — загрузка SecurityContext\n2. UsernamePasswordAuthenticationFilter — логин/пароль\n3. BearerTokenAuthenticationFilter — JWT\n4. AuthorizationFilter — проверка прав\n5. ExceptionTranslationFilter — обработка ошибок\n\n<b>Ключевые компоненты:</b>\n• SecurityContextHolder — хранит Authentication (ThreadLocal)\n• AuthenticationManager → AuthenticationProvider → UserDetailsService\n• GrantedAuthority — роль/permission',lvl:2,hot:1},
    {q:'Spring Security — конфигурация (Spring Boot 3)',a:'<pre><code>@Configuration\n@EnableWebSecurity\npublic class SecurityConfig {\n    @Bean\n    SecurityFilterChain filterChain(HttpSecurity http) throws Exception {\n        return http\n            .authorizeHttpRequests(auth -> auth\n                .requestMatchers("/api/public/**").permitAll()\n                .requestMatchers("/api/admin/**").hasRole("ADMIN")\n                .anyRequest().authenticated())\n            .oauth2ResourceServer(oauth2 -> oauth2.jwt(Customizer.withDefaults()))\n            .csrf(csrf -> csrf.disable())\n            .sessionManagement(s -> s.sessionCreationPolicy(STATELESS))\n            .build();\n    }\n}</code></pre>',lvl:2,hot:1},
    {q:'@PreAuthorize, @Secured, @RolesAllowed',a:'<b>Method-level security</b> — аннотации на методах для контроля доступа. Более тонкий контроль, чем <code>requestMatchers()</code> в SecurityFilterChain.\n\n<b>Включение (обязательно):</b>\n<pre><code>@Configuration\n@EnableMethodSecurity(\n    prePostEnabled = true,   // @PreAuthorize / @PostAuthorize (default = true)\n    securedEnabled = true,   // @Secured\n    jsr250Enabled = true     // @RolesAllowed (JSR-250)\n)\npublic class SecurityConfig { }</code></pre>\n\n<b>1. @PreAuthorize — самая мощная (рекомендуется)</b>\nПоддерживает SpEL (Spring Expression Language). Работает ДО вызова метода.\n\n<pre><code>// Проверка роли\n@PreAuthorize("hasRole(\\\'ADMIN\\\')")\npublic void deleteUser(Long id) { }\n\n// Несколько ролей\n@PreAuthorize("hasAnyRole(\\\'ADMIN\\\', \\\'MANAGER\\\')")\npublic List&lt;Order&gt; getAllOrders() { }\n\n// Проверка authority (гранулярнее, чем роли)\n@PreAuthorize("hasAuthority(\\\'PAYMENT_WRITE\\\')")\npublic Payment create(PaymentRequest req) { }\n\n// Собственный пользователь или ADMIN\n@PreAuthorize("hasRole(\\\'ADMIN\\\') or #userId == authentication.principal.id")\npublic User getUser(Long userId) { }\n\n// С параметрами метода (#argumentName)\n@PreAuthorize("#order.userId == authentication.principal.id")\npublic void cancelOrder(Order order) { }\n\n// Вызов метода бина\n@PreAuthorize("@permissionChecker.canEdit(#id, authentication)")\npublic void update(Long id) { }</code></pre>\n\n<b>2. @PostAuthorize — проверка после выполнения</b>\nПолезно, когда решение зависит от ВОЗВРАЩЁННОГО значения.\n\n<pre><code>@PostAuthorize("returnObject.ownerId == authentication.principal.id")\npublic Document getDocument(Long id) {\n    return repo.findById(id).orElseThrow();\n    // если владелец не текущий юзер — throw AccessDeniedException\n}</code></pre>\n\n<b>3. @PreFilter / @PostFilter — фильтрация коллекций</b>\n<pre><code>// Отфильтровать входящий список\n@PreFilter("filterObject.ownerId == authentication.principal.id")\npublic void updateMany(List&lt;Order&gt; orders) { }\n\n// Отфильтровать возвращаемый список\n@PostFilter("filterObject.userId == authentication.principal.id")\npublic List&lt;Payment&gt; getAllPayments() {\n    return paymentRepo.findAll();\n    // Результат: только платежи текущего пользователя\n}</code></pre>\n\n<b>4. @Secured — проще, но ограничен</b>\nПоддерживает только роли (не SpEL).\n<pre><code>@Secured({"ROLE_ADMIN", "ROLE_MANAGER"}) // ИЛИ\npublic void approve() { }\n// Обязателен префикс ROLE_</code></pre>\nБольше не рекомендуется — в современных проектах используй @PreAuthorize.\n\n<b>5. @RolesAllowed (JSR-250, Jakarta Security)</b>\nСтандарт Java EE, аналог @Secured.\n<pre><code>@RolesAllowed({"ADMIN", "MANAGER"})\npublic void doSomething() { }</code></pre>\nИспользуется когда нужна совместимость с Jakarta EE.\n\n<b>Сравнительная таблица:</b>\n<pre><code>Аннотация       | SpEL | Args | Return | Коллекции\n────────────────┼──────┼──────┼────────┼───────────\n@PreAuthorize   | ✅   | ✅   | ❌     | ❌\n@PostAuthorize  | ✅   | ✅   | ✅     | ❌\n@PreFilter      | ✅   | ✅   | ❌     | ✅ (in)\n@PostFilter     | ✅   | ❌   | ✅     | ✅ (out)\n@Secured        | ❌   | ❌   | ❌     | ❌\n@RolesAllowed   | ❌   | ❌   | ❌     | ❌</code></pre>\n\n<b>Встроенные методы в SpEL:</b>\n• <code>hasRole(\\\'X\\\')</code> / <code>hasAnyRole(...)</code> — автоматически добавляет префикс ROLE_\n• <code>hasAuthority(\\\'X\\\')</code> / <code>hasAnyAuthority(...)</code> — без префикса\n• <code>permitAll()</code> / <code>denyAll()</code>\n• <code>isAuthenticated()</code>, <code>isAnonymous()</code>, <code>isFullyAuthenticated()</code>\n• <code>authentication</code>, <code>principal</code>\n\n<b>Role vs Authority:</b>\n• Role — высокоуровневая роль (ADMIN, USER), хранится как <code>ROLE_ADMIN</code>\n• Authority — гранулярное право (PAYMENT_READ, USER_DELETE)\n• В Spring Security технически это одно и то же (GrantedAuthority)\n\n<b>Как работает под капотом:</b>\nSpring создаёт AOP-proxy для класса с методами, помеченными аннотацией. Перед вызовом метода проверяет SpEL-выражение через <code>MethodSecurityInterceptor</code>. Если не прошла — выбрасывает <code>AccessDeniedException</code>.\n\n<b>Ограничения AOP-proxy:</b>\n<pre><code>@Service\npublic class OrderService {\n    public void method1() {\n        this.method2(); // self-invocation — @PreAuthorize на method2 НЕ сработает!\n    }\n    @PreAuthorize("hasRole(\\\'ADMIN\\\')")\n    public void method2() { }\n}</code></pre>\nРешение: инжектить self через <code>@Autowired private OrderService self;</code> или вынести метод в другой бин.\n\n<b>На собесе:</b>\n• Что мощнее: @PreAuthorize или @Secured? (@PreAuthorize — SpEL)\n• Когда использовать @PostAuthorize? (проверка владельца через возвращаемое значение)\n• Почему self-invocation не работает? (через `this`, минуя proxy)',lvl:2},
    {q:'CSRF и CORS',a:'<b>CSRF</b> (Cross-Site Request Forgery):\nАтака: вредоносный сайт отправляет запрос от имени пользователя.\nЗащита: CSRF token в cookie/header.\nОтключают для stateless REST API (JWT, без cookies).\n\n<b>CORS</b> (Cross-Origin Resource Sharing):\nБраузер блокирует запросы к другому домену.\n\n<pre><code>@Bean\nCorsConfigurationSource corsConfig() {\n    var config = new CorsConfiguration();\n    config.setAllowedOrigins(List.of("https://pay.raif.ru"));\n    config.setAllowedMethods(List.of("GET","POST","PUT","DELETE"));\n    var source = new UrlBasedCorsConfigurationSource();\n    source.registerCorsConfiguration("/api/**", config);\n    return source;\n}</code></pre>',lvl:2},

    {q:'Симметричное vs асимметричное шифрование',a:'<b>Симметричное</b> (AES, DES):\nОдин ключ для шифрования и дешифрования.\nБыстрое. Проблема: как передать ключ?\n\n<b>Асимметричное</b> (RSA, EC):\nПара ключей: public (шифрование) + private (дешифрование).\nМедленнее, но безопасная передача ключей.\n\n<b>TLS/HTTPS:</b> комбинация обоих:\n1. Asymmetric — обмен ключами (handshake)\n2. Symmetric — шифрование данных (AES)',lvl:2},
    {q:'Хеширование: bcrypt, SHA, MD5',a:'Хеш — необратимое преобразование фиксированной длины.\n\n<pre><code>Тип        Скорость    Для чего          Безопасность\n───────────────────────────────────────────────────────\nMD5        Быстрый     checksums         Небезопасен (коллизии!)\nSHA-256    Быстрый     подписи, checksum Безопасен (без salt)\nbcrypt     Медленный   пароли            Безопасен (salt + cost)\nscrypt     Медленный   пароли            Безопасен (memory-hard)\nargon2     Медленный   пароли            Самый стойкий (2015)</code></pre>\n\n<b>Для паролей — ТОЛЬКО bcrypt/scrypt/argon2:</b>\n<pre><code>// Spring Security:\nPasswordEncoder encoder = new BCryptPasswordEncoder();\n\nString hash = encoder.encode("my_password");\n// $2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy\n// $2a$ = алгоритм, 10 = cost (rounds), salt встроен в хеш!\n\nboolean match = encoder.matches("my_password", hash); // true\n// Нельзя расшифровать обратно! Только проверка.</code></pre>\n\n<b>Почему bcrypt, а не SHA-256:</b>\n• SHA-256 — быстрый: GPU перебирает миллиарды хешей/сек\n• bcrypt — медленный нарочно: cost factor контролирует скорость\n• bcrypt включает salt — одинаковые пароли дают разные хеши\n\n<b>На собесе:</b> как хранить пароли? (ТОЛЬКО хеш + salt, bcrypt/argon2. НИКОГДА plain text или MD5)',lvl:1,hot:1},
  ]},

    {q:'Git — основные команды',a:'<pre><code>git init              # создать репозиторий\ngit clone url         # клонировать\ngit add file          # добавить в staging\ngit commit -m "msg"   # зафиксировать\ngit push origin main  # отправить\ngit pull              # получить + merge\ngit fetch             # получить без merge\ngit status            # состояние\ngit log --oneline     # история\ngit diff              # изменения</code></pre>',lvl:1,hot:1},
    {q:'git merge vs git rebase',a:'<b>merge</b> — создаёт merge commit, сохраняет историю ветки.\n<b>rebase</b> — перемещает коммиты на верх целевой ветки, линейная история.\n\n<b>Workflow:</b>\n<pre><code>git checkout -b feature/payment-api\n# ... коммиты ...\ngit fetch origin\ngit rebase origin/main         # перебазировать на свежий main\ngit push --force-with-lease     # безопасный force push\n# -> PR -> merge в main</code></pre>\n\n<b>Правило:</b> НИКОГДА не rebase публичных веток (main, develop)!\nrebase только своих feature-веток.\n\n<b>--force-with-lease</b> — безопаснее --force: откажет если кто-то запушил.\n\n<b>На собесе:</b> merge vs rebase? (rebase для чистой истории feature ветки, merge для вливания в main)',lvl:1,hot:1},
    {q:'git stash, cherry-pick, bisect',a:'<b>stash</b> — временно спрятать незакоммиченные изменения:\n<code>git stash</code> → <code>git stash pop</code>\n\n<b>cherry-pick</b> — применить конкретный коммит из другой ветки:\n<code>git cherry-pick abc123</code>\n\n<b>bisect</b> — бинарный поиск бага по коммитам:\n<code>git bisect start</code> → <code>git bisect bad</code> → <code>git bisect good v1.0</code>\nGit автоматически находит коммит с багом.',lvl:2},
    {q:'Стратегии ветвления: Git Flow vs Trunk-based',a:'<b>Git Flow:</b>\n<pre><code>main -------- releases\n  |         |\n  develop --+-- integration\n   |  |  |\n   feature branches (длинные)</code></pre>\n+ Чёткая структура, релизные циклы\n- Длинные ветки, сложные мерджи\n\n<b>Trunk-based Development:</b>\n<pre><code>main ---*---*---*---*--- (все коммитят сюда)\n        |/  |/\n       short-lived branches (меньше 1 дня!)</code></pre>\n+ Быстрый delivery, меньше конфликтов\n+ Feature flags вместо долгих веток\n- Нужна дисциплина, хорошие тесты\n\n<b>GitHub Flow</b> — упрощённый: main + feature branches + PR.\n\n<b>Тренд 2026:</b> trunk-based + feature flags. В банках часто Git Flow.\n\n<b>На собесе:</b> какую стратегию ветвления используете? (зависит от команды)',lvl:2,hot:1},
    {q:'Как разрешить merge conflict?',a:'1. <code>git merge feature</code> → CONFLICT\n2. Открыть файл — найти маркеры:\n<pre><code><<<<<<< HEAD\nтекущий код\n=======\nвходящий код\n>>>>>>> feature</code></pre>\n3. Выбрать нужный вариант, убрать маркеры\n4. <code>git add file</code> → <code>git commit</code>\n\nИнструменты: IDE (IntelliJ), git mergetool, VS Code.',lvl:1},
    {q:'.gitignore и git hooks',a:'<b>.gitignore</b> — файлы, которые Git не отслеживает:\n<pre><code>target/\n*.class\n.idea/\n.env\n*.log</code></pre>\n\n<b>Hooks</b> — скрипты при событиях Git:\n• pre-commit — линтер, форматирование перед коммитом\n• pre-push — запуск тестов перед пушем\n• commit-msg — проверка формата сообщения\n\nHusky (JS) / pre-commit (Python) — менеджеры hooks.',lvl:2},
  ]},

  { id:'protocols', icon:'&#127760;', name:'Сеть и протоколы', data: [
    {s:'HTTP'},
    {q:'HTTP — методы и идемпотентность',a:'<pre><code>Метод    Идемпотентный  Safe   Тело запроса   Тело ответа\n─────────────────────────────────────────────────────────\nGET      Да             Да     Нет            Да\nPOST     Нет            Нет    Да             Да\nPUT      Да             Нет    Да             Да/Нет\nPATCH    Нет*           Нет    Да             Да\nDELETE   Да             Нет    Нет/Да         Да/Нет\nHEAD     Да             Да     Нет            Нет\nOPTIONS  Да             Да     Нет            Да</code></pre>\n* PATCH может быть идемпотентным при правильной реализации\n\n<b>Идемпотентность:</b> повторный вызов = тот же результат.\n<pre><code>// GET /payments/1 — всегда один результат ✓\n// PUT /payments/1 {amount:100} — устанавливает 100 каждый раз ✓\n// DELETE /payments/1 — первый раз удаляет, второй — 404, но результат тот же ✓\n// POST /payments — каждый раз создаёт новый! ✗\n//   -> Idempotency-Key header для безопасного retry</code></pre>\n\n<b>Safe:</b> не изменяет состояние сервера (GET, HEAD, OPTIONS).\n\n<b>REST API design:</b>\n<pre><code>GET    /api/v1/payments          — список\nGET    /api/v1/payments/{id}      — один\nPOST   /api/v1/payments           — создать\nPUT    /api/v1/payments/{id}      — обновить полностью\nPATCH  /api/v1/payments/{id}      — обновить частично\nDELETE /api/v1/payments/{id}      — удалить</code></pre>\n\n<b>На собесе:</b> почему PUT идемпотентен, а POST нет? (PUT устанавливает состояние, POST создаёт новый ресурс)',lvl:1,hot:1},
    {q:'HTTP статус-коды',a:'<pre><code>2xx — УСПЕХ\n  200 OK            — запрос выполнен\n  201 Created       — ресурс создан (POST), Location header\n  204 No Content    — успех без тела (DELETE)\n\n3xx — ПЕРЕНАПРАВЛЕНИЕ\n  301 Moved Permanently — URL изменился навсегда\n  302 Found             — временный redirect\n  304 Not Modified      — кэш актуален (If-None-Match/ETag)\n\n4xx — ОШИБКА КЛИЕНТА\n  400 Bad Request       — невалидный запрос (валидация)\n  401 Unauthorized      — не аутентифицирован (нет/невалидный токен)\n  403 Forbidden         — нет прав (аутентифицирован, но нельзя)\n  404 Not Found         — ресурс не найден\n  405 Method Not Allowed — метод не поддерживается\n  409 Conflict          — конфликт (дубликат, version mismatch)\n  422 Unprocessable     — семантическая ошибка\n  429 Too Many Requests — rate limit\n\n5xx — ОШИБКА СЕРВЕРА\n  500 Internal Server Error — непредвиденная ошибка\n  502 Bad Gateway          — upstream сервер недоступен\n  503 Service Unavailable  — сервис перегружен/maintenance\n  504 Gateway Timeout      — upstream не ответил вовремя</code></pre>\n\n<b>Для платёжного API:</b>\n• 201 — платёж создан\n• 409 — дубликат (Idempotency-Key)\n• 402 — недостаточно средств (Payment Required)\n\n<b>На собесе:</b> разница 401 vs 403? (401 — не залогинен, 403 — залогинен, но нет прав)',lvl:1,hot:1},
    {q:'HTTP/1.1 vs HTTP/2 vs HTTP/3',a:'<b>HTTP/1.1:</b> текстовый, один запрос за соединение (pipelining плохо работает). Keep-Alive.\n<b>HTTP/2:</b> бинарный, мультиплексирование (много запросов по одному TCP), server push, header compression (HPACK).\n<b>HTTP/3:</b> UDP (QUIC вместо TCP), ещё быстрее handshake, лучше при потерях пакетов.\n\ngRPC использует HTTP/2.',lvl:2},
    {q:'HTTPS и TLS',a:'HTTPS = HTTP + TLS (Transport Layer Security).\n\n<b>TLS Handshake:</b>\n1. Client Hello (поддерживаемые алгоритмы)\n2. Server Hello + сертификат (public key)\n3. Обмен ключами (asymmetric)\n4. Шифрование данных (symmetric, AES)\n\nСертификат: CA (Certificate Authority) подтверждает подлинность сервера.\nLet\'s Encrypt — бесплатные сертификаты.',lvl:2},
    {s:'REST и API'},
    {q:'REST — 6 принципов',a:'1. <b>Client-Server</b> — разделение\n2. <b>Stateless</b> — сервер не хранит состояние клиента\n3. <b>Cacheable</b> — ответы можно кэшировать\n4. <b>Uniform Interface</b> — ресурсы, HTTP методы, HATEOAS\n5. <b>Layered System</b> — клиент не знает про промежуточные слои\n6. <b>Code on Demand</b> (optional) — сервер может отправить код\n\nРесурсы: /api/v1/payments/{id}\nМножественное число, существительные, не глаголы.',lvl:1,hot:1},
    {q:'gRPC — когда использовать',a:'gRPC = HTTP/2 + Protocol Buffers (бинарная сериализация).\n\n<b>Преимущества перед REST:</b>\n• В 5-10x быстрее (бинарный, сжатие)\n• Строгий контракт (.proto файл)\n• Streaming: server, client, bidirectional\n• Code generation для клиента и сервера\n\n<b>Когда:</b> межсервисное взаимодействие, high-performance, streaming.\n<b>Когда REST:</b> публичный API, браузер, простота.',lvl:2},
    {q:'WebSocket',a:'Двусторонняя связь через постоянное соединение (full-duplex).\n\nHTTP: запрос → ответ. WebSocket: постоянный канал.\n\n<b>Когда:</b> real-time (чат, уведомления, котировки).\nSpring: @EnableWebSocket, STOMP over WebSocket.\n\n<b>Альтернативы:</b> SSE (Server-Sent Events) — только сервер → клиент, проще.',lvl:2},
    {q:'TCP vs UDP',a:'<b>TCP</b> (Transmission Control Protocol):\n• Надёжный: гарантирует доставку, порядок\n• Handshake (SYN → SYN-ACK → ACK)\n• HTTP, HTTPS, FTP, SMTP\n\n<b>UDP</b> (User Datagram Protocol):\n• Быстрый: нет гарантии доставки/порядка\n• Без handshake\n• DNS, видео-стриминг, онлайн-игры, QUIC (HTTP/3)\n\nTCP — когда нужна надёжность. UDP — когда нужна скорость.',lvl:1},
    {q:'DNS — как работает',a:'Domain Name System — преобразование домена в IP.\n\n<b>Порядок:</b>\n1. Браузер → локальный кэш\n2. OS → файл hosts\n3. Recursive resolver (ISP)\n4. Root DNS → TLD DNS (.com) → Authoritative DNS\n5. Ответ: pay.raif.ru → 185.71.x.x\n\nТипы записей: A (IPv4), AAAA (IPv6), CNAME (алиас), MX (почта), TXT (верификация).',lvl:1},
  ]},

  { id:'kotlin', icon:'&#11035;', name:'Kotlin', data: [
    {s:'Основы Kotlin'},
    {q:'Kotlin — основы для Java-разработчика',a:'<b>Ключевые отличия от Java:</b>\n• val (immutable) / var (mutable) вместо final\n• Null safety: String? (nullable) vs String (non-null)\n• Data classes вместо POJO/Lombok\n• when вместо switch (мощнее)\n• Extension functions\n• Нет checked exceptions\n• String templates: "Hello $name, age: ${user.age}"\n\n100% совместим с Java — можно использовать вместе.',lvl:1,hot:1},
    {q:'Null Safety в Kotlin',a:'Nullable типы: <code>var name: String? = null</code>\n\n<b>Операторы:</b>\n• <code>?.</code> — safe call: <code>name?.length</code> (null если name == null)\n• <code>?:</code> — Elvis: <code>name ?: "default"</code>\n• <code>!!</code> — not-null assertion: <code>name!!.length</code> (NPE если null)\n• <code>let</code>: <code>name?.let { println(it) }</code>\n\nCompiler контролирует null — NPE практически невозможен.',lvl:1,hot:1},
    {q:'Data classes, Sealed classes, Object',a:'<b>data class</b> = Java record (но мутабельный по желанию):\n<code>data class Payment(val id: Long, val amount: BigDecimal)</code>\nАвто: equals, hashCode, toString, copy(), destructuring.\n\n<b>sealed class</b> = ограниченная иерархия (как Java sealed):\n<code>sealed class Result { data class Ok(val v: T): Result() ... }</code>\n\n<b>object</b> = Singleton:\n<code>object PaymentValidator { fun validate(p: Payment) {...} }</code>\n<b>companion object</b> = статические методы.',lvl:1},
    {q:'Extension Functions и Scope Functions',a:'<b>Extension Functions</b> — добавление методов к существующим классам:\n<code>fun String.isPalindrome() = this == this.reversed()</code>\n<code>"abba".isPalindrome() // true</code>\n\n<b>Scope Functions:</b>\n• <code>let</code> — it, returns result: <code>str?.let { process(it) }</code>\n• <code>apply</code> — this, returns object: builder-стиль\n• <code>run</code> — this, returns result\n• <code>also</code> — it, returns object: side effects\n• <code>with</code> — this, returns result: работа с объектом',lvl:2},
    {q:'Coroutines — основы',a:'Лёгкие потоки (как Virtual Threads, но для Kotlin).\n\n<pre><code>suspend fun fetchUser(id: Long): User {\n    return withContext(Dispatchers.IO) {\n        repository.findById(id)\n    }\n}\n\n// Запуск\ncoroutineScope {\n    val user = async { fetchUser(1) }\n    val orders = async { fetchOrders(1) }\n    Response(user.await(), orders.await())\n}</code></pre>\n\nDispatchers: IO (I/O), Default (CPU), Main (UI).\nStructured Concurrency — scope управляет жизненным циклом.',lvl:2,hot:1},
    {q:'Kotlin vs Java — что выбрать?',a:'<b>Kotlin лучше:</b> null safety, лаконичность, coroutines, extension functions, DSL.\n<b>Java лучше:</b> экосистема (больше библиотек), Virtual Threads (Java 21), записи в records.\n\n<b>В Raiffeisen стеке:</b> Java 21 основной, Kotlin может использоваться.\n\nТренд: Java активно заимствует у Kotlin (records, sealed, pattern matching).\nKotlin популярен в Android и некоторых backend проектах.',lvl:1},
  ]},

  { id:'nosql', icon:'&#128203;', name:'NoSQL и OpenSearch', data: [
    {s:'Redis'},
    {q:'Redis — основы',a:'In-memory key-value хранилище. Очень быстрое (<1ms).\n\n<b>Типы данных:</b> String, List, Set, Sorted Set, Hash, Stream.\n\n<b>Применение:</b>\n• Кэширование (самое частое)\n• Сессии\n• Rate limiting (INCR + EXPIRE)\n• Pub/Sub\n• Очереди (List: LPUSH/RPOP)\n• Distributed lock (SETNX + EXPIRE / Redisson)\n\nSpring: spring-boot-starter-data-redis, @Cacheable("payments").',lvl:1,hot:1},
    {q:'Redis — кэширование стратегии',a:'<b>Cache-Aside (Lazy Loading):</b>\n1. Ищем в кэше\n2. Нет → читаем из БД → кладём в кэш\n3. Есть → возвращаем из кэша\n\n<b>Write-Through:</b> пишем в кэш И в БД одновременно.\n<b>Write-Behind:</b> пишем в кэш, БД обновляется асинхронно.\n\n<b>TTL</b> (Time To Live) — время жизни записи.\n<b>Eviction:</b> LRU, LFU, Random — что удалять при переполнении.\n\nПроблемы: cache invalidation, thundering herd, cache stampede.',lvl:2},
    {s:'OpenSearch / Elasticsearch'},
    {q:'OpenSearch — основы',a:'Распределённый поисковый движок (форк Elasticsearch).\n\n<b>Концепции:</b>\n• Index — аналог таблицы\n• Document — JSON-запись\n• Mapping — схема полей\n• Shard — горизонтальное разделение индекса\n• Replica — копия шарда для отказоустойчивости\n\n<b>Применение:</b>\n• Полнотекстовый поиск\n• Логирование (ELK/EFK stack)\n• Аналитика и агрегации\n• Автокомплит\n\nВ стеке Raiffeisen: OpenSearch для логов и поиска.',lvl:2,hot:1},
    {q:'OpenSearch — запросы и агрегации',a:'<b>Запросы:</b>\n• match — полнотекстовый поиск\n• term — точное совпадение\n• bool — must/should/must_not/filter\n• range — диапазон дат/чисел\n\n<b>Агрегации:</b>\n• terms — группировка (аналог GROUP BY)\n• avg, sum, min, max\n• date_histogram — по временным интервалам\n\nSpring Data Elasticsearch / OpenSearch Java Client.',lvl:2},
    {s:'MongoDB'},
    {q:'MongoDB — основы',a:'Document-oriented NoSQL (JSON/BSON документы).\n\n<b>Концепции:</b>\n• Database → Collection (аналог таблицы) → Document\n• Нет схемы (schema-less), но можно задать validation\n• _id — автоматический ObjectId\n\n<b>Когда:</b>\n• Гибкая схема данных\n• Быстрая разработка прототипов\n• Полуструктурированные данные\n• Горизонтальное масштабирование\n\n<b>Когда НЕ:</b> сложные JOIN, ACID транзакции (хотя с 4.0 есть multi-doc transactions).',lvl:1},
  ]},

];

function getTopicResources(topicId) { return TOPIC_RESOURCES[topicId] || []; }

function renderResourceList(resources, compact) {
  if (!resources || resources.length === 0) return '';
  var html = '<div class="resources-list' + (compact ? ' compact' : '') + '">';
  resources.forEach(function(r) {
    var meta = RESOURCE_KIND_LABELS[r.k] || {icon:'\uD83D\uDD17', label:r.k};
    html += '<a class="resource-item" href="' + r.u + '" target="_blank" rel="noopener">';
    html += '<span class="resource-icon">' + meta.icon + '</span>';
    html += '<span class="resource-body">';
    html += '<span class="resource-title">' + r.t + '</span>';
    if (r.d) html += '<span class="resource-desc">' + r.d + '</span>';
    html += '<span class="resource-tags"><span class="resource-tag lvl-' + (r.l||1) + '">L' + (r.l||1) + '</span><span class="resource-tag">' + meta.label + '</span></span>';
    html += '</span></a>';
  });
  html += '</div>';
  return html;
}

const QUIZ_BANK = [
  // === Core Java ===
  {id:"core-001",topic:"core",lvl:1,type:"single",q:"Какой принцип ООП позволяет скрыть внутреннее состояние объекта?",options:["Наследование","Полиморфизм","Инкапсуляция","Абстракция","Композиция"],correct:[2],explanation:"Инкапсуляция — сокрытие внутреннего состояния, доступ через методы (getters/setters). Абстракция — выделение значимых характеристик, но НЕ про сокрытие."},
  {id:"core-002",topic:"core",lvl:2,type:"single",q:"Что выведет этот код?",code:"Integer a = 128;\nInteger b = 128;\nSystem.out.println(a == b);",options:["true","false","Ошибка компиляции","NullPointerException","Зависит от JVM"],correct:[1],explanation:"false — Integer cache работает для -128..127. Для 128 создаются два разных объекта, == сравнивает ссылки."},
  {id:"core-003",topic:"core",lvl:1,type:"single",q:"Какой модификатор доступа позволяет обращаться к полю только внутри класса?",options:["public","protected","default (package-private)","private","final"],correct:[3],explanation:"private — доступ только внутри класса. protected — пакет + наследники. default — только пакет."},
  {id:"core-004",topic:"core",lvl:2,type:"single",q:"Что выведет этот код?",code:"String s1 = \"hello\";\nString s2 = new String(\"hello\");\nSystem.out.println(s1 == s2);\nSystem.out.println(s1.equals(s2));",options:["true true","false false","false true","true false","Ошибка компиляции"],correct:[2],explanation:"== сравнивает ссылки: s1 из пула строк, s2 — новый объект в heap. equals() сравнивает содержимое."},
  {id:"core-005",topic:"core",lvl:2,type:"multi",q:"Какие из этих типов являются примитивными в Java?",options:["int","Integer","String","boolean","char"],correct:[0,3,4],explanation:"int, boolean, char — примитивы. Integer — wrapper-класс. String — объект (ссылочный тип)."},
  {id:"core-006",topic:"core",lvl:1,type:"single",q:"Какой принцип SOLID гласит: класс должен иметь только одну причину для изменения?",options:["Open/Closed","Liskov Substitution","Single Responsibility","Interface Segregation","Dependency Inversion"],correct:[2],explanation:"Single Responsibility Principle (SRP) — класс отвечает за одну задачу и имеет одну причину для изменения."},
  {id:"core-007",topic:"core",lvl:2,type:"single",q:"Что произойдёт при выполнении?",code:"try {\n  return 1;\n} finally {\n  return 2;\n}",options:["Вернёт 1","Вернёт 2","Ошибка компиляции","StackOverflowError","Undefined behavior"],correct:[1],explanation:"finally блок выполняется ВСЕГДА. return в finally перезаписывает return из try. Результат: 2."},
  {id:"core-008",topic:"core",lvl:3,type:"single",q:"Какой результат?",code:"double d = 0.1 + 0.2;\nSystem.out.println(d == 0.3);",options:["true","false","Ошибка компиляции","0.3","NaN"],correct:[1],explanation:"false — из-за IEEE 754: 0.1 + 0.2 = 0.30000000000000004. Для точных вычислений используйте BigDecimal."},
  {id:"core-009",topic:"core",lvl:1,type:"single",q:"Что такое полиморфизм?",options:["Сокрытие данных внутри класса","Создание подкласса из суперкласса","Единый интерфейс для разных реализаций","Разделение интерфейса на части","Зависимость от абстракций"],correct:[2],explanation:"Полиморфизм — единый интерфейс для разных типов. Объект подкласса может использоваться через ссылку на суперкласс."},
  {id:"core-010",topic:"core",lvl:2,type:"multi",q:"Какие утверждения верны про HashMap?",options:["Допускает null ключ","Потокобезопасна","Гарантирует порядок элементов","Использует hashCode() и equals()","Допускает null значения"],correct:[0,3,4],explanation:"HashMap: допускает 1 null ключ, множество null значений, использует hashCode()/equals(). НЕ потокобезопасна, НЕ гарантирует порядок."},
  {id:"core-011",topic:"core",lvl:2,type:"single",q:"Какой результат?",code:"List<String> list = List.of(\"a\", \"b\");\nlist.add(\"c\");",options:["[a, b, c]","[a, b]","UnsupportedOperationException","Ошибка компиляции","NullPointerException"],correct:[2],explanation:"List.of() создаёт immutable (неизменяемый) список. Попытка add() выбросит UnsupportedOperationException."},
  {id:"core-012",topic:"core",lvl:3,type:"single",q:"Какой GC пауза минимальна?",options:["Serial GC","Parallel GC","G1 GC","ZGC","CMS (deprecated)"],correct:[3],explanation:"ZGC (с Java 15+) обеспечивает паузы < 1мс независимо от размера heap. G1 — milliseconds, но больше. Serial/Parallel — stop-the-world."},
  // === Collections ===
  {id:"col-001",topic:"collections",lvl:1,type:"single",q:"Какая коллекция НЕ допускает дублирование элементов?",options:["ArrayList","LinkedList","HashSet","HashMap","ArrayDeque"],correct:[2],explanation:"HashSet — реализация Set, который не допускает дубликатов. ArrayList и LinkedList — List (допускают). HashMap — Map (ключи уникальны)."},
  {id:"col-002",topic:"collections",lvl:2,type:"single",q:"Какая сложность операции get(index) у ArrayList?",options:["O(1)","O(log n)","O(n)","O(n log n)","O(n^2)"],correct:[0],explanation:"ArrayList основан на массиве — доступ по индексу за O(1). У LinkedList get(index) = O(n)."},
  {id:"col-003",topic:"collections",lvl:2,type:"multi",q:"Какие коллекции сохраняют порядок вставки?",options:["HashSet","LinkedHashSet","TreeSet","ArrayList","HashMap"],correct:[1,3],explanation:"LinkedHashSet и ArrayList сохраняют порядок вставки. HashSet/HashMap — нет. TreeSet — сортированный порядок (не вставки)."},
  {id:"col-004",topic:"collections",lvl:2,type:"single",q:"Что произойдёт при изменении объекта-ключа HashMap после вставки?",options:["Ничего страшного","Элемент будет автоматически перемещён","Элемент станет недоступен по get()","ConcurrentModificationException","HashMap автоматически пересчитает hash"],correct:[2],explanation:"Если hashCode() ключа изменится, элемент окажется в неправильном бакете и get() его не найдёт. Ключи должны быть immutable."},
  {id:"col-005",topic:"collections",lvl:2,type:"single",q:"Какая структура данных лежит в основе HashMap (Java 8+)?",options:["Только массив","Массив + связные списки","Массив + связные списки + красно-чёрные деревья","B-дерево","Skip list"],correct:[2],explanation:"Java 8+: массив бакетов + связные списки, которые превращаются в красно-чёрные деревья при >8 элементов в бакете (TREEIFY_THRESHOLD)."},

  {id:"str-002",topic:"streams",lvl:2,type:"single",q:"Что выведет код?",code:"Stream.of(1, 2, 3, 4, 5)\n  .filter(n -> n > 2)\n  .map(n -> n * 2)\n  .findFirst()\n  .orElse(0);",options:["6","2","8","0","10"],correct:[0],explanation:"filter оставляет 3,4,5. map превращает в 6,8,10. findFirst() возвращает 6."},
  {id:"str-003",topic:"streams",lvl:2,type:"multi",q:"Какие операции Stream являются промежуточными?",options:["forEach()","peek()","reduce()","distinct()","count()"],correct:[1,3],explanation:"peek() и distinct() — промежуточные. forEach(), reduce(), count() — терминальные."},
