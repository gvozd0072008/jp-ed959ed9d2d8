  { id:'sql', icon:'&#128451;', name:'SQL и БД', data: [
    {s:'Основы SQL'},
    {q:'Категории SQL-команд',a:'SQL команды делятся на <b>5 категорий</b> по назначению.\n\n<b>DDL — Data Definition Language</b>\nОпределение структуры БД (схема, таблицы, индексы).\n• <code>CREATE TABLE / INDEX / VIEW / SCHEMA</code>\n• <code>ALTER TABLE</code>\n• <code>DROP TABLE / INDEX</code>\n• <code>TRUNCATE TABLE</code> — быстрая очистка\n• <code>RENAME</code>\n\nОсобенность: в большинстве СУБД автоматически коммитят текущую транзакцию (<b>implicit commit</b>). В PostgreSQL и SQL Server — DDL транзакционный (можно откатить).\n\n<b>DML — Data Manipulation Language</b>\nРабота с данными внутри таблиц.\n• <code>SELECT</code> (формально иногда выносят в DQL)\n• <code>INSERT</code>\n• <code>UPDATE</code>\n• <code>DELETE</code>\n• <code>MERGE</code> (upsert) — INSERT или UPDATE в зависимости от существования\n\nDML — транзакционные, можно откатить через ROLLBACK.\n\n<b>DCL — Data Control Language</b>\nУправление правами доступа.\n• <code>GRANT</code> — дать права\n• <code>REVOKE</code> — забрать\n\n<pre><code>GRANT SELECT, INSERT ON orders TO app_user;\nREVOKE DELETE ON orders FROM app_user;</code></pre>\n\n<b>TCL — Transaction Control Language</b>\nУправление транзакциями.\n• <code>BEGIN / START TRANSACTION</code>\n• <code>COMMIT</code>\n• <code>ROLLBACK</code>\n• <code>SAVEPOINT name</code> / <code>ROLLBACK TO SAVEPOINT name</code>\n• <code>SET TRANSACTION ISOLATION LEVEL ...</code>\n\n<b>DQL — Data Query Language</b> (иногда выделяют отдельно)\nТолько <code>SELECT</code>. Чаще считается частью DML.\n\n<b>Пример с разными категориями:</b>\n<pre><code>-- DDL: создаём таблицу\nCREATE TABLE payments (\n    id BIGSERIAL PRIMARY KEY,\n    amount DECIMAL(10,2),\n    status VARCHAR(20)\n);\n\n-- DCL: даём права\nGRANT SELECT, INSERT ON payments TO payment_service;\n\n-- TCL + DML: транзакция\nBEGIN;\nINSERT INTO payments (amount, status) VALUES (100.00, \\\'PENDING\\\');\nSAVEPOINT before_update;\nUPDATE payments SET status = \\\'CAPTURED\\\' WHERE id = 1;\n-- если что-то пошло не так:\n-- ROLLBACK TO SAVEPOINT before_update;\nCOMMIT;\n\n-- DQL (DML): читаем\nSELECT * FROM payments WHERE status = \\\'CAPTURED\\\';\n\n-- DDL: меняем структуру\nALTER TABLE payments ADD COLUMN created_at TIMESTAMP;</code></pre>\n\n<b>Ключевые различия:</b>\n• DDL: меняет структуру, обычно auto-commit\n• DML: меняет данные, транзакционная\n• DCL: меняет права\n• TCL: управляет транзакцией\n\n<b>На собесе:</b>\n• К какой категории относится TRUNCATE? (DDL — именно поэтому быстрый и не логирует построчно)\n• К какой категории относится GRANT? (DCL)\n• Может ли DDL быть в одной транзакции с DML? (в Postgres да, в MySQL нет — implicit commit)',lvl:1},
    {q:'JOIN — виды',a:'<pre><code>-- INNER JOIN — только совпадения\nSELECT p.id, m.name, p.amount\nFROM payments p\nINNER JOIN merchants m ON p.merchant_id = m.id;\n\n-- LEFT JOIN — все из левой + совпадения\nSELECT m.name, p.amount\nFROM merchants m\nLEFT JOIN payments p ON m.id = p.merchant_id;\n-- Мерчанты без платежей — amount = NULL\n\n-- FULL OUTER JOIN — все из обеих\n-- CROSS JOIN — декартово произведение\n-- SELF JOIN — таблица сама с собой (иерархии)</code></pre>\n\n<b>JOIN стратегии (EXPLAIN):</b>\n• <b>Nested Loop</b> — маленькие таблицы, есть индекс\n• <b>Hash Join</b> — большие таблицы без индекса\n• <b>Merge Join</b> — обе отсортированы\n\n<b>На собесе:</b> JOIN обычно быстрее подзапроса. Подзапросы удобнее для EXISTS.',hot:1,lvl:1},
    {q:'WHERE vs HAVING',a:'<pre><code>SELECT m.name, SUM(p.amount) AS total\nFROM payments p\nJOIN merchants m ON p.merchant_id = m.id\nWHERE p.status = 1            -- 1. фильтр строк (до GROUP BY)\nGROUP BY m.name               -- 2. группировка\nHAVING SUM(p.amount) &gt; 100000 -- 3. фильтр групп (после)\nORDER BY total DESC;</code></pre>\n\n<b>Порядок выполнения SQL:</b>\n<pre><code>FROM - JOIN - WHERE - GROUP BY - HAVING - SELECT - ORDER BY - LIMIT</code></pre>\n\n<b>Правило:</b>\n• WHERE НЕ может агрегатные функции\n• HAVING может\n• Без агрегата — ставь в WHERE (быстрее)\n\n<b>На собесе:</b> можно ли HAVING без GROUP BY? (да — вся таблица = одна группа)',lvl:2},
    {q:'UNION vs UNION ALL',a:'Операторы для объединения результатов нескольких SELECT в один набор.\n\n<b>UNION</b> — объединяет и <b>убирает дубликаты</b>\n<b>UNION ALL</b> — объединяет и <b>оставляет всё</b>, включая дубликаты\n\n<b>Базовый пример:</b>\n<pre><code>-- Получить всех пользователей И админов\nSELECT id, name FROM users\nUNION\nSELECT id, name FROM admins;\n-- Если John есть в обеих таблицах — в результате ОДИН раз\n\nSELECT id, name FROM users\nUNION ALL\nSELECT id, name FROM admins;\n-- Если John в обеих — в результате ДВА раза</code></pre>\n\n<b>Правила для обоих:</b>\n• Одинаковое количество столбцов в каждом SELECT\n• Типы соответствующих столбцов должны быть совместимы\n• Имена столбцов берутся из первого SELECT\n• <code>ORDER BY</code> применяется только в конце ко всему результату\n• <code>LIMIT</code> тоже ко всему\n\n<pre><code>SELECT id, name FROM users WHERE status = \\\'ACTIVE\\\'\nUNION ALL\nSELECT id, name FROM users WHERE status = \\\'PENDING\\\'\nORDER BY name\nLIMIT 10;</code></pre>\n\n<b>Производительность — критически важно:</b>\n\n<b>UNION</b>:\n1. Выполнить SELECT 1\n2. Выполнить SELECT 2\n3. <b>Отсортировать весь результат</b> (для поиска дубликатов) — дорого!\n4. Удалить дубликаты\n\nФактически работает как <code>UNION ALL + SELECT DISTINCT</code>.\n\n<b>UNION ALL</b>:\n1. Выполнить SELECT 1\n2. Выполнить SELECT 2\n3. Просто склеить результаты — O(n)\n\n<b>UNION ALL значительно быстрее</b>, особенно на больших объёмах.\n\n<b>Правило:</b> если ты <b>точно знаешь</b>, что в результатах не может быть дубликатов (или они допустимы), <b>всегда используй UNION ALL</b>.\n\n<b>Типичные паттерны:</b>\n\n<b>Партиционированные таблицы</b> — UNION ALL:\n<pre><code>SELECT * FROM payments_2025_01 WHERE amount &gt; 1000\nUNION ALL\nSELECT * FROM payments_2025_02 WHERE amount &gt; 1000\nUNION ALL\nSELECT * FROM payments_2025_03 WHERE amount &gt; 1000;\n-- Данные из разных таблиц гарантированно уникальны по дате</code></pre>\n\n<b>Категоризация в один запрос</b>:\n<pre><code>SELECT \\\'big\\\' AS category, COUNT(*) FROM orders WHERE amount &gt; 1000\nUNION ALL\nSELECT \\\'medium\\\', COUNT(*) FROM orders WHERE amount BETWEEN 100 AND 1000\nUNION ALL\nSELECT \\\'small\\\', COUNT(*) FROM orders WHERE amount &lt; 100;</code></pre>\n\n<b>Merge из разных источников</b>:\n<pre><code>SELECT email FROM customers\nUNION  -- нужно убрать дубликаты, т.к. email может быть в обеих таблицах\nSELECT email FROM subscribers;</code></pre>\n\n<b>Связанные операторы:</b>\n\n<b>INTERSECT</b> — пересечение (строки, которые есть в ОБОИХ)\n<pre><code>SELECT email FROM customers\nINTERSECT\nSELECT email FROM subscribers;\n-- Те, кто и customer, и subscriber</code></pre>\n\n<b>EXCEPT / MINUS</b> — разница (из первого вычесть второй)\n<pre><code>SELECT email FROM customers\nEXCEPT\nSELECT email FROM unsubscribed;\n-- Customers, не отписавшиеся от рассылки</code></pre>\n\n<b>Все три (UNION/INTERSECT/EXCEPT) по умолчанию убирают дубликаты</b>, а ALL-версии — нет.\n\n<b>Отличие от JOIN:</b>\n• <b>UNION</b> объединяет <b>строки</b> (вертикально) — результирующие столбцы те же\n• <b>JOIN</b> объединяет <b>столбцы</b> (горизонтально) — добавляет колонки из другой таблицы\n\n<b>Частые ошибки:</b>\n\n<pre><code>-- ❌ Разное количество столбцов\nSELECT id, name FROM users\nUNION\nSELECT id, name, email FROM admins; -- ERROR\n\n-- ❌ Несовместимые типы\nSELECT id, name FROM users     -- name VARCHAR\nUNION\nSELECT id, age FROM admins;    -- age INT\n-- Может сработать с автоконверсией, но обычно проблема\n\n-- ❌ ORDER BY в промежуточном SELECT\nSELECT id FROM t1 ORDER BY id -- ошибка!\nUNION\nSELECT id FROM t2;\n-- Правильно:\nSELECT id FROM t1\nUNION\nSELECT id FROM t2\nORDER BY id;</code></pre>\n\n<b>Performance-тест (реальные числа):</b>\n<pre><code>-- На таблицах 1M строк в PostgreSQL:\nUNION:     ~8 секунд (sort + dedup)\nUNION ALL: ~0.5 секунд</code></pre>\n\n<b>На собесе:</b>\n• Разница UNION и UNION ALL? (UNION убирает дубликаты, UNION ALL — нет)\n• Что быстрее и почему? (UNION ALL — без сортировки)\n• Когда UNION всё-таки нужен? (если дубликаты реальны и их нужно убрать)\n• Что такое INTERSECT? (пересечение, строки есть в обоих)',lvl:2},
    {q:'Агрегатные функции',a:'<b>Агрегатные (aggregate) функции</b> обрабатывают набор значений и возвращают одно значение. Часто используются с <code>GROUP BY</code>.\n\n<b>Основные агрегаты:</b>\n\n<b><code>COUNT(*)</code></b> — считает все строки, включая NULL.\n<pre><code>SELECT COUNT(*) FROM payments;  -- 10000\n-- Считает строки, не значения</code></pre>\n\n<b><code>COUNT(column)</code></b> — считает не-NULL значения столбца.\n<pre><code>SELECT COUNT(email) FROM users;  -- только где email IS NOT NULL</code></pre>\n\n<b><code>COUNT(DISTINCT column)</code></b> — уникальные не-NULL значения.\n<pre><code>SELECT COUNT(DISTINCT merchant_id) FROM payments;  -- сколько разных мерчантов</code></pre>\n\n<b><code>SUM(column)</code></b> — сумма (игнорирует NULL).\n<pre><code>SELECT SUM(amount) FROM payments WHERE status = \\\'CAPTURED\\\';</code></pre>\n\n<b><code>AVG(column)</code></b> — среднее (игнорирует NULL).\n<pre><code>SELECT AVG(amount) FROM payments;\n-- NULL не учитывается в знаменателе:\n-- AVG([10, 20, NULL]) = 15 (не 10!)</code></pre>\n\n<b><code>MIN(column)</code>, <code>MAX(column)</code></b> — минимум/максимум (игнорируют NULL).\n<pre><code>SELECT MIN(created_at), MAX(created_at) FROM orders;\n-- Работает для чисел, дат, строк (лексикографически)</code></pre>\n\n<b>GROUP BY — группировка</b>\nРазбивает строки на группы, применяет агрегат к каждой группе.\n<pre><code>SELECT merchant_id, COUNT(*) AS total, SUM(amount) AS revenue\nFROM payments\nWHERE status = \\\'CAPTURED\\\'\nGROUP BY merchant_id\nHAVING SUM(amount) &gt; 10000  -- фильтр ПО ГРУППАМ (не строкам)\nORDER BY revenue DESC;</code></pre>\n\n<b>Порядок выполнения SQL:</b>\n<pre><code>1. FROM      -- откуда\n2. WHERE     -- фильтр строк (до агрегации)\n3. GROUP BY  -- группировка\n4. HAVING    -- фильтр групп (после агрегации)\n5. SELECT    -- что вернуть\n6. ORDER BY  -- сортировка\n7. LIMIT/OFFSET</code></pre>\n\n<b>WHERE vs HAVING</b> — частая путаница:\n• <code>WHERE</code> — ДО агрегации, нельзя использовать агрегатные функции\n• <code>HAVING</code> — ПОСЛЕ агрегации, можно использовать агрегаты\n\n<pre><code>-- Активные пользователи с заказами &gt; 100k\nSELECT user_id, SUM(amount) AS total\nFROM orders\nWHERE status = \\\'COMPLETED\\\'   -- фильтр строк\nGROUP BY user_id\nHAVING SUM(amount) &gt; 100000;  -- фильтр групп</code></pre>\n\n<b>Ещё агрегаты (PostgreSQL):</b>\n• <b><code>STRING_AGG(col, \\\',\\\')</code></b> — конкатенация в строку\n• <b><code>ARRAY_AGG(col)</code></b> — собрать в массив\n• <b><code>BOOL_AND/BOOL_OR</code></b> — логические операции\n• <b><code>BIT_AND/BIT_OR</code></b>\n• <b><code>PERCENTILE_CONT(0.95)</code></b> — перцентили (статистика)\n• <b><code>STDDEV/VARIANCE</code></b> — статистика\n• <b><code>JSON_AGG(col)</code></b> — JSON массив\n\n<b>Window functions — «оконные» агрегаты</b>\nПозволяют применять агрегаты без схлопывания строк в группы.\n<pre><code>SELECT\n    payment_id,\n    amount,\n    SUM(amount) OVER (PARTITION BY merchant_id) AS merchant_total,\n    RANK() OVER (ORDER BY amount DESC) AS rank_all,\n    ROW_NUMBER() OVER (PARTITION BY merchant_id ORDER BY amount DESC) AS rank_within_merchant\nFROM payments;</code></pre>\n\nВ отличие от GROUP BY, строки НЕ группируются — каждая строка получает свой агрегат по окну.\n\n<b>Обработка NULL — важный нюанс:</b>\n<pre><code>SELECT AVG(col) FROM table WHERE col IS NOT NULL;\n-- Даёт то же самое, что SELECT AVG(col) FROM table;\n-- AVG() и так игнорирует NULL</code></pre>\n\n<pre><code>SELECT COUNT(*), COUNT(col), COUNT(DISTINCT col) FROM table;\n-- COUNT(*) = все строки\n-- COUNT(col) = строки с col IS NOT NULL\n-- COUNT(DISTINCT col) = уникальные не-NULL значения</code></pre>\n\n<b>Типичные задачи:</b>\n<pre><code>-- Средний чек по мерчантам за месяц\nSELECT merchant_id, AVG(amount) AS avg_check, COUNT(*) AS cnt\nFROM payments\nWHERE created_at &gt;= \\\'2026-03-01\\\' AND created_at &lt; \\\'2026-04-01\\\'\nGROUP BY merchant_id;\n\n-- Топ-10 клиентов по обороту\nSELECT customer_id, SUM(amount) AS total\nFROM orders\nGROUP BY customer_id\nORDER BY total DESC\nLIMIT 10;\n\n-- Conversion rate по дням\nSELECT\n    DATE(created_at) AS day,\n    COUNT(*) FILTER (WHERE status = \\\'CAPTURED\\\') * 100.0 / COUNT(*) AS conversion\nFROM payments\nGROUP BY DATE(created_at);</code></pre>\n\n<b>На собесе:</b>\n• Разница COUNT(*) vs COUNT(col)? (col игнорирует NULL)\n• Почему WHERE SUM(x) &gt; 100 не работает? (WHERE до агрегации; нужен HAVING)\n• Как получить ранг без GROUP BY? (window function RANK() OVER)',lvl:2},
    {q:'Подзапросы и EXISTS',a:'<pre><code>-- EXISTS — эффективен для больших наборов\nSELECT * FROM merchants m\nWHERE EXISTS (\n    SELECT 1 FROM payments p\n    WHERE p.merchant_id = m.id AND p.status = 1\n);\n-- Останавливается на первом найденном!\n\n-- NOT EXISTS — мерчанты без платежей\nSELECT * FROM merchants m\nWHERE NOT EXISTS (\n    SELECT 1 FROM payments p WHERE p.merchant_id = m.id\n);\n\n-- Коррелированный подзапрос\nSELECT * FROM payments p1\nWHERE amount &gt; (\n    SELECT AVG(amount) FROM payments p2\n    WHERE p2.merchant_id = p1.merchant_id\n);</code></pre>\n\n<b>IN vs EXISTS:</b>\n• Большой подзапрос -> EXISTS быстрее\n• Маленький подзапрос -> IN быстрее\n\n<b>На собесе:</b> мерчанты без платежей — 2 способа (NOT EXISTS и LEFT JOIN WHERE IS NULL)',lvl:2},
    {q:'Индексы',a:'Структура данных для ускорения поиска (как оглавление книги).\n\n<b>Типы (PostgreSQL):</b>\n<pre><code>-- B-tree (default) для =, &lt;, &gt;, BETWEEN, ORDER BY\nCREATE INDEX idx_status ON payments (status);\n\n-- Составной — порядок столбцов важен!\nCREATE INDEX idx_status_date ON payments (status, created_at);\n-- Работает: status=X, status=X AND created_at&gt;Y\n-- НЕ работает: только created_at (leftmost prefix!)\n\n-- Покрывающий (INCLUDE)\nCREATE INDEX idx_cov ON payments (status) INCLUDE (amount);\n-- Index Only Scan — не лезет в таблицу!\n\n-- Частичный\nCREATE INDEX idx_active ON payments (created_at)\n    WHERE status = 42; -- только активные\n\n-- GIN — для JSONB, массивов, полнотекст\n-- BRIN — для больших упорядоченных таблиц (timestamp)</code></pre>\n\n<b>Минусы:</b> замедляют INSERT/UPDATE/DELETE, занимают место.\n\n<b>На собесе:</b> как понять что нужен индекс? (EXPLAIN ANALYZE -> Seq Scan на большой таблице)',hot:1,lvl:2},
    {q:'EXPLAIN — план запроса',a:'<pre><code>EXPLAIN ANALYZE SELECT * FROM payments WHERE status = 1;\n\n-- Без индекса:\nSeq Scan on payments (cost=0..1234 rows=5000)\n  actual time=0.01..45.12 rows=4823\n  Filter: (status = 1)\n  Rows Removed by Filter: 95177\nExecution Time: 45.4 ms\n\n-- С индексом:\nIndex Scan using idx_status on payments (cost=0.42..123)\n  actual time=0.02..2.34 rows=4823\nExecution Time: 2.5 ms  -- в 18 раз быстрее!</code></pre>\n\n<b>Типы сканирования (от плохого к хорошему):</b>\n<pre><code>Seq Scan          — полный перебор (нет индекса!)\nBitmap Index Scan — индекс -> bitmap -> чтение\nIndex Scan        — индекс -> строка из таблицы\nIndex Only Scan   — всё из индекса (лучший!)</code></pre>\n\n<b>Оптимизация:</b> добавить индекс, VACUUM ANALYZE, переписать запрос, увеличить work_mem.\n\n<b>На собесе:</b> дают медленный запрос -> EXPLAIN -> предлагай индекс. Частая задача!',hot:1,lvl:3},
    {q:'TRUNCATE vs DELETE',a:'Обе команды удаляют данные из таблицы, но работают кардинально по-разному.\n\n<b>DELETE — DML-операция:</b>\n<pre><code>DELETE FROM payments WHERE status = \\\'FAILED\\\';\nDELETE FROM payments; -- удалить все строки</code></pre>\n• Удаляет строки <b>по одной</b>\n• Можно добавить <code>WHERE</code> для частичного удаления\n• Каждое удаление пишется в <b>WAL / binary log</b> (транзакционно)\n• <b>Triggers срабатывают</b> (<code>BEFORE/AFTER DELETE</code>)\n• Занимает место в <b>undo-логе</b> (можно ROLLBACK до COMMIT)\n• Не сбрасывает sequences / auto-increment\n• Blocks нужны для каждой строки (пропускают другие транзакции медленнее)\n• <b>Медленно</b> на больших таблицах (миллионы строк)\n\n<b>TRUNCATE — DDL-операция:</b>\n<pre><code>TRUNCATE TABLE payments;\nTRUNCATE TABLE payments RESTART IDENTITY;  -- + сброс sequence\nTRUNCATE TABLE orders, payments CASCADE;   -- + каскадно</code></pre>\n• Удаляет <b>всю таблицу одним махом</b> (фактически: DROP + CREATE внутренних страниц)\n• <b>Нельзя указать WHERE</b> — только полная очистка\n• Минимальная запись в лог (только факт TRUNCATE, не каждая строка)\n• <b>Triggers НЕ срабатывают</b> (в большинстве СУБД)\n• Обычно <b>нельзя ROLLBACK</b> (в MySQL — нельзя; в PostgreSQL — можно внутри транзакции!)\n• Может <b>сбросить sequence</b> (<code>RESTART IDENTITY</code>)\n• Берёт <b>DDL lock</b> на таблицу — блокирует читателей на время\n• <b>Мгновенно</b> независимо от размера таблицы\n\n<b>Сравнительная таблица:</b>\n<pre><code>Критерий             | DELETE           | TRUNCATE\n─────────────────────┼──────────────────┼─────────────────\nКатегория            | DML              | DDL\nWHERE условие        | ✅ да            | ❌ нет\nСкорость             | O(n) строк       | O(1) — мгновенно\nTriggers             | ✅ срабатывают   | ❌ нет\nROLLBACK             | ✅ до commit     | ❌ (Postgres ✅)\nSequence/Identity    | не трогает       | можно сбросить\nFOREIGN KEYS         | проверяет        | блокирует если ссылки\nСтатистика таблицы   | остаётся         | сбрасывается\nПраво доступа        | DELETE privilege | обычно только owner</code></pre>\n\n<b>DROP — третья альтернатива</b> для сравнения:\n<pre><code>DROP TABLE payments; -- удаляет ВСЮ таблицу вместе со структурой</code></pre>\nDROP = нет таблицы вообще, TRUNCATE = таблица пустая, DELETE = удалил подмножество.\n\n<b>Когда что использовать:</b>\n\n• <b>DELETE WHERE ...</b> — точечное удаление по условию\n• <b>DELETE без WHERE</b> — если нужны triggers или потом откат\n• <b>TRUNCATE</b> — очистить таблицу быстро (тестовые данные, staging, логи)\n• <b>DROP</b> — таблица больше не нужна\n\n<b>Практический сценарий — очистка тестовой БД перед тестами:</b>\n<pre><code>// DELETE — медленно для больших таблиц\nDELETE FROM users;       // 10 секунд на 1M строк\n\n// TRUNCATE — мгновенно\nTRUNCATE TABLE users;    // миллисекунды\nTRUNCATE users, orders, payments RESTART IDENTITY CASCADE;  // всё сразу</code></pre>\n\n<b>Подводные камни:</b>\n• TRUNCATE не работает на таблицах, на которые ссылаются FOREIGN KEY из других таблиц (если не CASCADE)\n• В MySQL TRUNCATE не откатывается даже внутри транзакции\n• Некоторые СУБД не обновляют sequence (MySQL сбрасывает, PostgreSQL — только с <code>RESTART IDENTITY</code>)\n\n<b>На собесе:</b> «как быстро очистить таблицу на 100M строк?» — TRUNCATE. «А если нужно оставить часть?» — партиционирование и DROP PARTITION.',lvl:2},
    {q:'Constraints (ограничения)',a:'• <b>PRIMARY KEY</b> — уникальность + NOT NULL\n• <b>FOREIGN KEY</b> — ссылочная целостность\n• <b>UNIQUE</b> — уникальность (допускает NULL)\n• <b>NOT NULL</b> — обязательное значение\n• <b>CHECK</b> — условие: CHECK (amount > 0)\n• <b>DEFAULT</b> — значение по умолчанию\n\nSurrogate key (автоинкремент) vs Natural key (бизнес-значение).',lvl:2},
    {s:'Транзакции'},
    {q:'ACID',a:'<b>A — Atomicity:</b> всё или ничего.\n<pre><code>BEGIN;\n  UPDATE accounts SET balance = balance - 1000 WHERE id = 1;\n  UPDATE accounts SET balance = balance + 1000 WHERE id = 2;\nCOMMIT; -- обе или ни одна</code></pre>\n\n<b>C — Consistency:</b> БД переходит из одного валидного состояния в другое. Constraints не нарушаются.\n\n<b>I — Isolation:</b> параллельные транзакции не влияют друг на друга. Уровни: READ COMMITTED -> SERIALIZABLE.\n\n<b>D — Durability:</b> после COMMIT данные сохранены. Механизм: WAL (Write-Ahead Log).\n\n<b>PostgreSQL MVCC:</b> каждая транзакция видит snapshot. Чтение не блокирует запись. Каждая строка: xmin (создана TX), xmax (удалена TX).\n\n<b>На собесе:</b> что гарантирует ACID? Как PostgreSQL реализует Durability? (WAL)',hot:1,lvl:1},
    {q:'Уровни изоляции',a:'<pre><code>Уровень              Dirty Read  Non-Repeat  Phantom\nREAD UNCOMMITTED     Да          Да          Да\nREAD COMMITTED       Нет         Да          Да     -- PG default\nREPEATABLE READ      Нет         Нет         Да*\nSERIALIZABLE         Нет         Нет         Нет</code></pre>\n* PG REPEATABLE READ защищает и от phantoms (MVCC snapshot)\n\n<b>Аномалии:</b>\n• <b>Dirty Read:</b> TX2 видит незакоммиченные данные TX1. TX1 делает ROLLBACK — данных никогда не было.\n• <b>Non-Repeatable Read:</b> TX1 читает строку, TX2 меняет и коммитит, TX1 читает снова — другое значение.\n• <b>Phantom Read:</b> TX1 считает строки (10), TX2 вставляет новую, TX1 считает снова (11).\n\n<b>PostgreSQL:</b>\n<pre><code>SET TRANSACTION ISOLATION LEVEL REPEATABLE READ;\nBEGIN;\n  -- видим snapshot на момент BEGIN\nCOMMIT;</code></pre>\n\n<b>SERIALIZABLE:</b> может откатить (serialization failure) -> retry в коде!\n\n<b>На собесе:</b> какой уровень default? (READ COMMITTED). Когда SERIALIZABLE? (проверка баланса + списание)',hot:1,lvl:2},
    {q:'Блокировки в БД',a:'<pre><code>-- Пессимистическая — блокирует строку\nBEGIN;\n  SELECT balance FROM accounts WHERE id = 1 FOR UPDATE;\n  -- Другая TX ждёт!\n  UPDATE accounts SET balance = balance - 100 WHERE id = 1;\nCOMMIT;\n\n-- FOR UPDATE SKIP LOCKED — очередь задач!\nSELECT * FROM tasks WHERE status = 0\n    ORDER BY created_at LIMIT 1\n    FOR UPDATE SKIP LOCKED;</code></pre>\n\n<b>Оптимистическая (JPA @Version):</b>\n<pre><code>UPDATE payments SET amount = 500, version = version + 1\n    WHERE id = 1 AND version = 3;\n-- 0 rows affected -> конфликт!</code></pre>\n\n<b>Когда что:</b>\n• Оптимистическая: low contention, редкие конфликты\n• Пессимистическая: критичные данные (баланс)\n• SKIP LOCKED: очереди задач, batch\n\n<b>На собесе:</b> как реализовать очередь в PostgreSQL? (FOR UPDATE SKIP LOCKED)',lvl:2},
    {s:'PostgreSQL'},
    {q:'Особенности PostgreSQL',a:'<b>MVCC:</b> xmin/xmax на каждой строке. Чтение не блокирует запись.\n\n<b>VACUUM:</b> очистка мёртвых строк. autovacuum по умолчанию.\n<pre><code>VACUUM ANALYZE payments; -- очистка + статистика</code></pre>\n\n<b>pg_stat_statements:</b>\n<pre><code>SELECT query, calls, mean_exec_time\nFROM pg_stat_statements\nORDER BY mean_exec_time DESC LIMIT 10;</code></pre>\n\n<b>Ключевые фичи:</b> JSONB (GIN индексы), CTE, Window functions, Partitioning (RANGE, LIST, HASH), LISTEN/NOTIFY, Logical replication, Full-text search.\n\n<b>pg_stat_user_tables:</b> seq_scan &gt;&gt; idx_scan -> нужен индекс!\n\n<b>На собесе:</b> как найти медленные запросы? (pg_stat_statements + EXPLAIN ANALYZE)',lvl:2},
    {q:'Window functions',a:'Вычисления по окну БЕЗ группировки — каждая строка сохраняется.\n\n<pre><code>-- ROW_NUMBER — топ-3 платежа по каждому мерчанту\nSELECT * FROM (\n    SELECT p.*,\n        ROW_NUMBER() OVER (\n            PARTITION BY merchant_id\n            ORDER BY amount DESC\n        ) AS rn\n    FROM payments p\n) t WHERE rn &lt;= 3;\n\n-- RANK vs DENSE_RANK\n-- amount: 100, 100, 80\n-- RANK:        1, 1, 3     (пропуск)\n-- DENSE_RANK:  1, 1, 2     (без пропуска)\n\n-- LAG / LEAD — предыдущее/следующее\nSELECT date, amount,\n    LAG(amount) OVER (ORDER BY date) AS prev_amount,\n    amount - LAG(amount) OVER (ORDER BY date) AS diff\nFROM payments;\n\n-- Running total (накопительная сумма)\nSELECT date, amount,\n    SUM(amount) OVER (ORDER BY date) AS running_total\nFROM payments;\n\n-- Среднее по отделу\nSELECT name, salary, dept,\n    AVG(salary) OVER (PARTITION BY dept) AS dept_avg\nFROM employees;</code></pre>\n\n<b>На собесе:</b> window functions спрашивают ОЧЕНЬ часто. ROW_NUMBER + PARTITION BY за 1 минуту.',hot:1,lvl:3},
    {q:'CTE (Common Table Expressions)',a:'Именованные подзапросы — читабельнее вложенных.\n\n<pre><code>WITH active_payments AS (\n    SELECT * FROM payments WHERE status = 1\n),\nmerchant_totals AS (\n    SELECT merchant_id, SUM(amount) AS total\n    FROM active_payments\n    GROUP BY merchant_id\n)\nSELECT m.name, mt.total\nFROM merchants m\nJOIN merchant_totals mt ON m.id = mt.merchant_id;\n\n-- Recursive CTE — деревья и иерархии\nWITH RECURSIVE subordinates AS (\n    SELECT id, name, manager_id, 1 AS level\n    FROM employees WHERE id = 1  -- CEO\n    UNION ALL\n    SELECT e.id, e.name, e.manager_id, s.level + 1\n    FROM employees e\n    JOIN subordinates s ON e.manager_id = s.id\n)\nSELECT * FROM subordinates;</code></pre>\n\n<b>Преимущества:</b> читабельность, переиспользование, рекурсия.\n\n<b>На собесе:</b> иерархия сотрудников через recursive CTE — частая задача.',lvl:2},
    {q:'JSONB в PostgreSQL',a:'Бинарный JSON с индексами, быстрее обычного JSON.\n\nСоздание таблицы и GIN индекса:\n<pre><code>CREATE TABLE events (id SERIAL, data JSONB);\nCREATE INDEX idx_data ON events USING GIN (data);</code></pre>\n\nДоступ к полям:\n<pre><code>SELECT data -&gt;&gt; &amp;#39;type&amp;#39; AS type\nFROM events;</code></pre>\n\nФиль��рация (@&gt; = contains):\n<pre><code>SELECT * FROM events\nWHERE data @&gt; &amp;#39;{&quot;type&quot;:&quot;payment&quot;}&amp;#39;::jsonb;</code></pre>\n\n<b>Операторы:</b> -&gt; (jsonb), -&gt;&gt; (text), @&gt; (contains), ? (key exists)\n\n<b>На собесе:</b> когда JSONB вместо колонок? (гибкая схема, метаданные, разные форматы интеграций)',lvl:2},
    {q:'Нормализация',a:'<b>1NF</b> — атомарные значения (нет массивов в ячейке)\n<b>2NF</b> — нет частичных зависимостей от составного ключа\n<b>3NF</b> — нет транзитивных зависимостей (A->B->C: вынести C)\n\n<b>Пример нарушения 3NF:</b>\n<pre><code>| employee_id | dept_id | dept_name |\n-- dept_name зависит от dept_id, а не от employee_id\n-- Решение: dept_name -> в таблицу departments</code></pre>\n\n<b>Денормализация</b> — намеренное дублирование для скорости чтения.\nКогда: read &gt;&gt; write, отчёты, CQRS read model.\n\n<b>На собесе:</b> когда денормализация оправдана? (CQRS, аналитика, критичная скорость чтения)',lvl:2},
    {q:'Шардирование vs Репликация',a:'Две фундаментально разные техники масштабирования БД. Часто используются вместе.\n\n<b>Репликация (Replication)</b>\nПолные копии данных на нескольких серверах.\n\n<pre><code>Primary (master) ──► Replica 1 (read)\n                 ──► Replica 2 (read)\n                 ──► Replica 3 (read)\n\nВсе пишут в Primary, читают из любой Replica</code></pre>\n\n<b>Типы репликации:</b>\n• <b>Sync</b> — Primary ждёт подтверждения от Replica перед commit. Сильная консистентность, медленнее\n• <b>Async</b> — Primary коммитит сразу, Replica догоняет (eventual consistency). Быстрее, риск потери\n• <b>Semi-sync</b> — компромисс: ждём хотя бы одну Replica\n\n<b>Схемы:</b>\n• <b>Primary-Replica</b> (master-slave) — одна Primary, много Replicas. Запись только в Primary\n• <b>Multi-master</b> — несколько Primary. Сложно разрешать конфликты\n• <b>Cascading</b> — Primary → Replica → Sub-Replica (для географического распределения)\n\n<b>Зачем:</b>\n• <b>Масштабирование ЧТЕНИЯ</b> — можно иметь 10 read replicas\n• <b>Отказоустойчивость</b> — Primary упал → failover на Replica\n• <b>Геораспределение</b> — Replica в другом регионе = быстрее локальное чтение\n• <b>Backups</b> без нагрузки на Primary\n\n<b>Что НЕ решает:</b>\n• Не ускоряет запись (всё равно через Primary)\n• Не уменьшает размер каждой ноды\n\n<b>Шардирование (Sharding)</b>\nДанные <b>разделены</b> между серверами. Каждый шард хранит только <b>часть</b> данных.\n\n<pre><code>Shard 1 (users 0-1M)     Shard 2 (users 1M-2M)     Shard 3 (users 2M-3M)\n                         ↑                          ↑\n              Router: по user_id выбирает shard</code></pre>\n\n<b>Стратегии шардирования:</b>\n• <b>Range-based</b>: по диапазону ID/даты. Минус: hot-shard (новые данные все в одном)\n• <b>Hash-based</b>: hash(key) % N. Равномерно, но сложно перераспределить при росте\n• <b>Consistent hashing</b>: при добавлении нового шарда перемещается ~1/N данных (Dynamo, Cassandra, Redis)\n• <b>Directory-based</b>: отдельная lookup-таблица (гибко, но SPOF)\n• <b>Geo-based</b>: по географии пользователя\n\n<b>Зачем:</b>\n• <b>Масштабирование ЗАПИСИ</b> — нагрузка делится на шарды\n• <b>Размер</b> — таблица на 10TB не помещается на одном сервере; на 10 шардах — помещается\n• <b>Производительность запросов</b> — меньше данных в одном шарде = быстрее\n\n<b>Проблемы шардирования:</b>\n• <b>Cross-shard queries</b> — JOIN между шардами очень медленный или невозможен\n• <b>Транзакции</b> между шардами — распределённые, сложные (2PC, Saga)\n• <b>Rebalancing</b> — добавление нового шарда требует перемещения данных\n• <b>Выбор shard key</b> — неправильный → hot-shard\n• <b>Уникальность ID</b> — глобальный autoincrement невозможен → UUID/Snowflake\n\n<b>Сравнительная таблица:</b>\n<pre><code>Критерий            | Репликация        | Шардирование\n────────────────────┼───────────────────┼──────────────────\nМасштаб чтения      | ✅ отлично        | ✅ хорошо\nМасштаб записи      | ❌ всё в Primary  | ✅ отлично\nРазмер данных       | ❌ каждая реплика | ✅ делится\n                    | хранит всё        |\nОтказоустойчивость  | ✅ failover       | ⚠ потеря шарда\n                    |                   | = потеря части данных\nКонсистентность     | ⚠ eventual       | сложно кросс-шард\n                    | (если async)      |\nСложность           | низкая            | высокая</code></pre>\n\n<b>На практике — комбинация:</b>\n<pre><code>Shard 1 (Primary) + 2 Replicas\nShard 2 (Primary) + 2 Replicas\nShard 3 (Primary) + 2 Replicas\n\n// Запись: в Primary нужного шарда\n// Чтение: с Replicas того же шарда\n// Кросс-шард: через application layer или специальный Query Engine</code></pre>\n\n<b>CAP-теорема и выбор:</b>\nВ распределённой системе можно выбрать только 2 из 3:\n• <b>C</b>onsistency — все узлы видят одинаковые данные\n• <b>A</b>vailability — система отвечает на запросы\n• <b>P</b>artition tolerance — работает при сетевых сбоях\n\nP в распределённой системе обязателен (сеть рвётся), так что выбор между <b>CP</b> и <b>AP</b>.\n\n<b>CP-системы</b> (consistency при partition):\n• PostgreSQL, MongoDB (по умолчанию), Redis, HBase\n• При сбое сети — возвращают ошибку или блокируют\n• Подходит для платежей, банковских данных\n\n<b>AP-системы</b> (availability при partition):\n• Cassandra, DynamoDB, CouchDB, Riak\n• При сбое — продолжают работать, данные могут разойтись (eventual consistency)\n• Подходит для соцсетей, каталогов, аналитики\n\n<b>Примеры реальных систем:</b>\n• <b>MySQL/PostgreSQL</b> — репликация из коробки, шардирование — через приложение или Vitess/Citus\n• <b>MongoDB</b> — встроенный sharding + replica sets\n• <b>Cassandra</b> — изначально распределена, consistent hashing\n• <b>Elasticsearch</b> — шардинг и replication встроены\n• <b>Redis</b> — Redis Cluster поддерживает оба\n• <b>Kafka</b> — partitioning (= шардирование) + replication factor\n\n<b>На собесе:</b>\n• Разница репликации и шардирования? (копии всего vs разделение)\n• Когда что использовать? (чтение — replication, запись и размер — sharding)\n• Что такое CAP? (выбор 2 из 3 при сетевом сбое)\n• Какой shard key выбрать для таблицы payments? (merchant_id для изоляции мерчантов, user_id для равномерности)',lvl:3},
    {q:'Хранимые процедуры и представления (VIEW)',a:'<b>VIEW</b> — именованный запрос, виртуальная таблица:\n<code>CREATE VIEW active_users AS SELECT * FROM users WHERE active;</code>\nМатериализованное: MATERIALIZED VIEW — хранит результат, REFRESH.\n\n<b>Хранимые процедуры (PostgreSQL):</b>\n<pre><code>CREATE FUNCTION get_balance(p_id int) RETURNS numeric AS $$\nBEGIN\n    RETURN (SELECT balance FROM accounts WHERE id = p_id);\nEND;\n$$ LANGUAGE plpgsql;</code></pre>',lvl:2},
    {q:'Триггеры',a:'<b>Триггер (trigger)</b> — функция, которая автоматически выполняется БД при определённых событиях: INSERT, UPDATE, DELETE, TRUNCATE.\n\n<b>Синтаксис (PostgreSQL):</b>\n<pre><code>-- 1. Функция, которая будет выполняться\nCREATE OR REPLACE FUNCTION log_payment_change()\nRETURNS TRIGGER AS $$\nBEGIN\n    INSERT INTO payment_audit (payment_id, old_status, new_status, changed_at)\n    VALUES (OLD.id, OLD.status, NEW.status, NOW());\n    RETURN NEW;\nEND;\n$$ LANGUAGE plpgsql;\n\n-- 2. Триггер — связывает событие с функцией\nCREATE TRIGGER audit_trigger\nAFTER UPDATE ON payments\nFOR EACH ROW\nWHEN (OLD.status IS DISTINCT FROM NEW.status)\nEXECUTE FUNCTION log_payment_change();</code></pre>\n\n<b>Параметры триггера:</b>\n\n<b>Timing:</b>\n• <b>BEFORE</b> — до изменения. Можно изменить NEW-значения или отменить операцию (RAISE EXCEPTION)\n• <b>AFTER</b> — после изменения. Данные уже записаны\n• <b>INSTEAD OF</b> — для views (подменяет операцию)\n\n<b>Level:</b>\n• <b>FOR EACH ROW</b> — триггер на каждую изменяемую строку\n• <b>FOR EACH STATEMENT</b> — один раз на SQL-statement\n\n<b>Event:</b>\n• INSERT, UPDATE, DELETE, TRUNCATE\n• UPDATE OF column — только при изменении конкретной колонки\n\n<b>Special variables в функции:</b>\n• <b>NEW</b> — новая строка (для INSERT/UPDATE)\n• <b>OLD</b> — старая строка (для UPDATE/DELETE)\n• <b>TG_OP</b> — тип операции (INSERT/UPDATE/DELETE)\n• <b>TG_TABLE_NAME</b>, <b>TG_WHEN</b> — метаинформация\n\n<b>Типичные применения:</b>\n\n<b>1. Аудит (audit trail):</b>\n<pre><code>CREATE TRIGGER audit_insert\nAFTER INSERT OR UPDATE OR DELETE ON accounts\nFOR EACH ROW EXECUTE FUNCTION audit_log();\n\n-- функция пишет в audit-таблицу старое/новое значение</code></pre>\n\n<b>2. Автозаполнение updated_at:</b>\n<pre><code>CREATE FUNCTION set_updated_at() RETURNS TRIGGER AS $$\nBEGIN\n    NEW.updated_at = NOW();\n    RETURN NEW;\nEND; $$ LANGUAGE plpgsql;\n\nCREATE TRIGGER update_timestamp\nBEFORE UPDATE ON orders\nFOR EACH ROW EXECUTE FUNCTION set_updated_at();</code></pre>\n\n<b>3. Денормализация / материализованные счётчики:</b>\n<pre><code>CREATE TRIGGER update_order_count\nAFTER INSERT OR DELETE ON order_items\nFOR EACH ROW EXECUTE FUNCTION recount_items();\n\n-- recount_items обновляет orders.items_count\n-- Запросы становятся быстрее (не нужен COUNT)</code></pre>\n\n<b>4. Валидация бизнес-правил:</b>\n<pre><code>CREATE FUNCTION check_limit() RETURNS TRIGGER AS $$\nBEGIN\n    IF NEW.amount &gt; (SELECT daily_limit FROM merchants WHERE id = NEW.merchant_id) THEN\n        RAISE EXCEPTION \\\'Daily limit exceeded\\\';\n    END IF;\n    RETURN NEW;\nEND; $$ LANGUAGE plpgsql;\n\nCREATE TRIGGER enforce_limit\nBEFORE INSERT ON payments\nFOR EACH ROW EXECUTE FUNCTION check_limit();</code></pre>\n\n<b>5. Поддержание целостности между таблицами:</b>\n<pre><code>-- При удалении клиента анонимизируем его заказы\nCREATE TRIGGER anonymize_orders\nAFTER DELETE ON customers\nFOR EACH ROW EXECUTE FUNCTION anonymize_customer_orders();</code></pre>\n\n<b>Плюсы:</b>\n• Автоматически — нельзя забыть в коде\n• Гарантированное выполнение (на уровне БД)\n• Централизованно — один раз вместо 10 мест в коде\n• Работают независимо от языка клиента (Java/Python/Go — одинаково)\n\n<b>Минусы:</b>\n• <b>Скрытая логика</b> — разработчик не видит что триггер есть\n• <b>Сложно дебажить</b> — «откуда взялась эта строка?»\n• <b>Замедляют операции</b> — особенно FOR EACH ROW на больших INSERT\n• <b>Cascade</b> — триггер вызывает UPDATE, который вызывает другой триггер...\n• <b>Миграция в другую БД</b> — PL/pgSQL не переносится в MySQL и наоборот\n• Может скрывать N+1 от разработчика\n\n<b>Современная практика — минимум триггеров:</b>\n• Для аудита — предпочтительнее Event Sourcing или CDC (Debezium)\n• Для <code>updated_at</code> — OK, но можно и через JPA <code>@LastModifiedDate</code>\n• Для бизнес-логики — в приложении, не в БД (тестируемость, DDD)\n• Для целостности — FK/CHECK constraint вместо триггеров\n\n<b>Альтернативы триггерам:</b>\n\n<b>1. JPA/Hibernate listeners:</b>\n<pre><code>@Entity\n@EntityListeners(AuditListener.class)\npublic class Payment {\n    @LastModifiedDate\n    private LocalDateTime updatedAt;\n}</code></pre>\nПлюсы: тестируемо, видно в коде. Минус: работает только через Hibernate, прямой SQL обходит.\n\n<b>2. Domain events + outbox pattern:</b>\n<pre><code>@PostPersist\npublic void afterSave() {\n    eventPublisher.publishEvent(new PaymentCreatedEvent(this));\n}</code></pre>\n\n<b>3. CDC (Change Data Capture):</b>\n<pre><code>Debezium читает WAL PostgreSQL и публикует изменения в Kafka\n-&gt; Consumer\\\'ы реагируют на события\n-&gt; Более гибко, чем триггеры, и не замедляет БД</code></pre>\n\n<b>4. CHECK constraints</b> для валидации:\n<pre><code>ALTER TABLE payments ADD CONSTRAINT check_amount\nCHECK (amount &gt; 0 AND amount &lt; 1000000);</code></pre>\n\n<b>5. Generated columns (Postgres 12+):</b>\n<pre><code>ALTER TABLE orders ADD COLUMN total DECIMAL\nGENERATED ALWAYS AS (quantity * price) STORED;</code></pre>\n\n<b>Триггер vs прикладной код:</b>\n<pre><code>Критерий           | Триггер    | В приложении\n───────────────────┼────────────┼───────────────\nСкорость           | быстрее    | медленнее\nВидимость          | скрыт      | явный\nТестируемость      | сложно     | легко\nДебаг              | сложно     | легко\nМасштабируемость   | нагрузка   | легко распределить\nМулть-БД поддержка | нет        | да</code></pre>\n\n<b>Проверка существующих триггеров:</b>\n<pre><code>-- PostgreSQL\nSELECT event_object_table, trigger_name, action_statement\nFROM information_schema.triggers;\n\n-- MySQL\nSHOW TRIGGERS;</code></pre>\n\n<b>Cascading triggers — опасность:</b>\n<pre><code>Trigger A обновляет table B\nTrigger B на table B обновляет table A\n-&gt; infinite loop?\n\nPostgreSQL защищает от этого — ограничение вложенности\nДефолт: max 16 уровней вложенности</code></pre>\n\n<b>На собесе:</b>\n• Зачем триггеры? (аудит, автозаполнение, валидация, денормализация)\n• BEFORE vs AFTER? (BEFORE может изменить NEW, AFTER — нет)\n• FOR EACH ROW vs STATEMENT? (row — на каждую строку, statement — один раз)\n• Почему современные проекты избегают триггеров? (скрытая логика, сложно тестировать)\n• Альтернативы? (JPA listeners, CDC, domain events, CHECK constraints)',lvl:2},
  ]},

  { id:'jpa', icon:'&#128190;', name:'Hibernate/JPA', data: [
    {s:'Основы'},
    {q:'ORM, JPA, Hibernate',a:'<b>ORM</b> (Object-Relational Mapping) — маппинг Java объектов на таблицы БД.\n\n<b>JPA</b> (Jakarta Persistence API) — спецификация ORM в Java. Определяет аннотации и интерфейсы.\n<b>Hibernate</b> — самая популярная реализация JPA.\n\n<pre><code>JPA (спецификация)      Hibernate (реализация)\n@Entity                 реализует маппинг\n@Table                  генерирует SQL\nEntityManager           Session (Hibernate-специфичный)\nJPQL                    HQL (расширение JPQL)</code></pre>\n\n<b>Spring Boot 3:</b> javax.persistence -> <b>jakarta.persistence</b>\n\n<b>Зачем ORM:</b> не пишем SQL руками, маппинг объектов автоматический, кэширование, lazy loading.\n<b>Минусы:</b> N+1, сложность отладки SQL, overhead, иногда медленнее чистого SQL.\n\n<b>Альтернативы:</b> Spring JDBC (JdbcTemplate), jOOQ, MyBatis.\n\n<b>На собесе:</b> когда НЕ стоит использовать Hibernate? (сложные аналитические запросы, bulk operations, когда нужен полный контроль над SQL)',lvl:1},
    {q:'Требования к Entity классу',a:'<pre><code>@Entity\n@Table(name = "payments")\npublic class Payment {\n\n    @Id\n    @GeneratedValue(strategy = GenerationType.SEQUENCE)\n    private Long id;\n\n    @Column(nullable = false)\n    private BigDecimal amount;\n\n    @Enumerated(EnumType.STRING)\n    private PaymentStatus status;\n\n    @ManyToOne(fetch = FetchType.LAZY)\n    @JoinColumn(name = "merchant_id")\n    private Merchant merchant;\n\n    // Пустой конструктор ОБЯЗАТЕЛЕН\n    protected Payment() {}\n\n    // Бизнес-конструктор\n    public Payment(BigDecimal amount, Merchant merchant) {\n        this.amount = amount;\n        this.merchant = merchant;\n        this.status = PaymentStatus.CREATED;\n    }\n}</code></pre>\n\n<b>Обязательные требования:</b>\n• @Entity аннотация\n• @Id поле (primary key)\n• Пустой конструктор (public или protected)\n• Класс НЕ final (Hibernate создаёт proxy)\n• Поля НЕ final (lazy loading через proxy)\n\n<b>Рекомендации:</b>\n• Serializable (для кэша 2 уровня)\n• equals/hashCode по бизнес-ключу, НЕ по id (proxy проблема)\n• toString() без lazy-полей (LazyInitializationException)\n\n<b>На собесе:</b> почему Entity не может быть final? (Hibernate создаёт CGLIB proxy для lazy loading)',lvl:2},
    {q:'Жизненный цикл Entity',a:'<pre><code>    new Payment()\n        │\n        ▼\n    TRANSIENT ──persist()──> MANAGED\n        (не в контексте)       │  (отслеживается)\n                               │\n                    ┌──detach()/clear()──> DETACHED\n                    │          │           (не отслеживается)\n                    │    merge()──────────────┘\n                    │          │\n                    │    remove()──> REMOVED\n                    │                (будет удалён при flush)\n                    │\n                flush()/commit() ──> SQL INSERT/UPDATE/DELETE</code></pre>\n\n<b>Примеры переходов:</b>\n<pre><code>// Transient -> Managed\nPayment p = new Payment(amount, merchant); // transient\nem.persist(p); // managed, id ещё может быть null!\n\n// Managed -> Detached\nem.detach(p); // или em.clear(), или закрытие EntityManager\n\n// Detached -> Managed\nPayment managed = em.merge(p); // ВОЗВРАЩАЕТ НОВЫЙ объект!\n// p всё ещё detached! используй managed\n\n// Managed -> Removed\nem.remove(p); // DELETE при flush\n\n// Managed: автоматический dirty checking\np.setStatus(COMPLETED); // Hibernate заметит при flush -> UPDATE</code></pre>\n\n<b>flush vs commit:</b>\n• flush() — отправляет SQL в БД, но транзакция не завершена\n• commit() — завершает транзакцию (включает flush)\n\n<b>На собесе:</b> что возвращает merge()? (НОВЫЙ managed объект! Исходный остаётся detached)',hot:1,lvl:2},
    {q:'Dirty Checking',a:'Hibernate автоматически отслеживает изменения managed entities.\n\n<pre><code>@Transactional\npublic void updatePayment(Long id, BigDecimal newAmount) {\n    Payment p = repository.findById(id).orElseThrow();\n    // p — managed entity\n    p.setAmount(newAmount); // просто меняем поле!\n    // НЕ вызываем save()! Hibernate сам заметит изменение\n    // При commit: сравнит со snapshot -> сгенерирует UPDATE\n}</code></pre>\n\n<b>Как работает:</b>\n1. При загрузке Entity — Hibernate сохраняет snapshot (копию полей)\n2. При flush — сравнивает текущее состояние со snapshot\n3. Если есть изменения — генерирует UPDATE\n\n<b>Оптимизации:</b>\n<pre><code>// @DynamicUpdate — UPDATE только изменённых столбцов\n@Entity\n@DynamicUpdate\npublic class Payment { ... }\n// Без: UPDATE payments SET amount=?, status=?, merchant_id=? WHERE id=?\n// С:   UPDATE payments SET amount=? WHERE id=?\n\n// readOnly — отключает dirty checking\n@Transactional(readOnly = true)\npublic Payment findById(Long id) { ... }\n// Экономит память и CPU (нет snapshot)</code></pre>\n\n<b>На собесе:</b> почему не нужен save() для managed entity? (dirty checking при flush). Как отключить? (readOnly=true, DTO projection)',lvl:2},
    {q:'LAZY vs EAGER',a:'<b>LAZY</b> — загрузка связи по первому обращению (через proxy).\n<b>EAGER</b> — загрузка сразу с основной сущностью.\n\n<b>Defaults:</b>\n<pre><code>@ManyToOne  — EAGER  (!)  -> поменяй на LAZY!\n@OneToOne   — EAGER  (!)  -> поменяй на LAZY!\n@OneToMany  — LAZY   (OK)\n@ManyToMany — LAZY   (OK)</code></pre>\n\n<b>Лучшая практика: всё LAZY!</b>\n<pre><code>@ManyToOne(fetch = FetchType.LAZY) // явно указываем!\n@JoinColumn(name = "merchant_id")\nprivate Merchant merchant;</code></pre>\n\n<b>Как загрузить LAZY-связь:</b>\n1. <b>JOIN FETCH</b> (JPQL):\n<pre><code>SELECT p FROM Payment p JOIN FETCH p.merchant WHERE p.id = :id</code></pre>\n\n2. <b>@EntityGraph:</b>\n<pre><code>@EntityGraph(attributePaths = {"merchant", "items"})\nList&lt;Payment&gt; findByStatus(Status s);</code></pre>\n\n3. <b>@BatchSize</b> — загрузка пачками:\n<pre><code>@BatchSize(size = 50)\n@OneToMany(mappedBy = "payment")\nprivate List&lt;PaymentItem&gt; items;</code></pre>\n\n<b>LazyInitializationException:</b> доступ к LAZY-связи вне транзакции.\nРешение: JOIN FETCH, @EntityGraph, или @Transactional на сервисном методе.\n\n<b>На собесе:</b> почему @ManyToOne по умолчанию EAGER? (историческое решение, считается ошибкой дизайна)',hot:1,lvl:2},
    {q:'Проблема N+1',a:'<b>Проблема:</b> 1 запрос на сущности + N запросов на связи.\n\n<pre><code>// N+1 пример:\nList&lt;Payment&gt; payments = repo.findAll(); // 1 запрос: SELECT * FROM payments\nfor (Payment p : payments) {\n    p.getMerchant().getName(); // N запросов: SELECT * FROM merchants WHERE id = ?\n}\n// Итого: 1 + 100 = 101 запрос вместо 1!</code></pre>\n\n<b>Решения:</b>\n\n1. <b>JOIN FETCH</b> (лучший для конкретных запросов):\n<pre><code>@Query("SELECT p FROM Payment p JOIN FETCH p.merchant")\nList&lt;Payment&gt; findAllWithMerchant();\n// 1 запрос с JOIN!</code></pre>\n\n2. <b>@EntityGraph</b> (декларативный):\n<pre><code>@EntityGraph(attributePaths = {"merchant"})\nList&lt;Payment&gt; findByStatus(Status s);\n// Автоматический LEFT JOIN</code></pre>\n\n3. <b>@BatchSize</b> (простой, минимум изменений):\n<pre><code>@BatchSize(size = 50)\nprivate Merchant merchant;\n// Загружает merchants пачками по 50: WHERE id IN (?, ?, ..., ?)\n// 1 + 2 запроса вместо 1 + 100</code></pre>\n\n4. <b>DTO Projection</b> (без Entity вообще):\n<pre><code>@Query("SELECT new PaymentDto(p.id, p.amount, m.name) " +\n       "FROM Payment p JOIN p.merchant m")\nList&lt;PaymentDto&gt; findPaymentDtos();</code></pre>\n\n<b>Обнаружение:</b>\n<pre><code># application.yml\nspring.jpa.show-sql: true\nlogging.level.org.hibernate.SQL: DEBUG\n# Или: datasource-proxy для подсчёта запросов в тестах</code></pre>\n\n<b>На собесе:</b> как обнаружить N+1? Какое решение предпочтительнее? (JOIN FETCH для known queries, @BatchSize для general case)',hot:1,lvl:3},
    {q:'Стратегии наследования',a:'3 стратегии маппинга иерархии классов:\n\n<b>1. SINGLE_TABLE (default) — одна таблица:</b>\n<pre><code>@Entity\n@Inheritance(strategy = InheritanceType.SINGLE_TABLE)\n@DiscriminatorColumn(name = "type")\npublic abstract class Payment { ... }\n\n@Entity @DiscriminatorValue("CARD")\npublic class CardPayment extends Payment { ... }\n\n@Entity @DiscriminatorValue("SBP")\npublic class SbpPayment extends Payment { ... }\n\n-- Одна таблица payments с колонкой type\n-- Неиспользуемые колонки = NULL</code></pre>\n+ Быстро (нет JOIN). - Nullable колонки, широкая таблица.\n\n<b>2. JOINED — таблица на каждый класс + JOIN:</b>\n<pre><code>@Inheritance(strategy = InheritanceType.JOINED)\n-- payments (id, amount, status)\n-- card_payments (id, card_number, expiry)\n-- sbp_payments (id, phone, bank_id)\n-- Полиморфный запрос = JOIN</code></pre>\n+ Нормализовано. - JOIN overhead, медленнее.\n\n<b>3. TABLE_PER_CLASS — отдельная таблица:</b>\n<pre><code>@Inheritance(strategy = InheritanceType.TABLE_PER_CLASS)\n-- card_payments (id, amount, status, card_number)\n-- sbp_payments (id, amount, status, phone)\n-- Полиморфный запрос = UNION ALL</code></pre>\n+ Нет NULL колонок. - UNION ALL медленный, нет FK от родителя.\n\n<b>Совет:</b> SINGLE_TABLE для простых иерархий (2-3 подтипа), JOINED для сложных.\n\n<b>На собесе:</b> какую стратегию выбрать для платёжных типов? (SINGLE_TABLE — быстро, типов немного)',lvl:2},
    {q:'Виды связей (@OneToMany и т.д.)',a:'<pre><code>// @ManyToOne — самая частая. FK в таблице Payment\n@ManyToOne(fetch = FetchType.LAZY)\n@JoinColumn(name = "merchant_id")\nprivate Merchant merchant;\n\n// @OneToMany — обратная сторона ManyToOne\n@OneToMany(mappedBy = "payment", cascade = ALL, orphanRemoval = true)\nprivate List&lt;PaymentItem&gt; items = new ArrayList&lt;&gt;();\n\n// @OneToOne\n@OneToOne(fetch = FetchType.LAZY)\n@JoinColumn(name = "receipt_id")\nprivate Receipt receipt;\n\n// @ManyToMany — промежуточная таблица\n@ManyToMany\n@JoinTable(name = "payment_tags",\n    joinColumns = @JoinColumn(name = "payment_id"),\n    inverseJoinColumns = @JoinColumn(name = "tag_id"))\nprivate Set&lt;Tag&gt; tags = new HashSet&lt;&gt;();</code></pre>\n\n<b>mappedBy</b> — указывает владельца связи (у кого FK в таблице).\n\n<b>Bidirectional — синхронизация обеих сторон:</b>\n<pre><code>// Вспомогательные методы\npublic void addItem(PaymentItem item) {\n    items.add(item);\n    item.setPayment(this); // синхронизация!\n}\npublic void removeItem(PaymentItem item) {\n    items.remove(item);\n    item.setPayment(null);\n}</code></pre>\n\n<b>На собесе:</b> что такое mappedBy? Кто владелец связи? (тот, у кого @JoinColumn / FK в таблице)',lvl:2},
    {q:'Каскадные операции',a:'Каскады определяют что делать со связанными сущностями при операции над родителем.\n\n<pre><code>@OneToMany(mappedBy = "payment",\n    cascade = CascadeType.ALL,     // все каскады\n    orphanRemoval = true)           // удалять сирот\nprivate List&lt;PaymentItem&gt; items = new ArrayList&lt;&gt;();</code></pre>\n\n<b>Типы каскадов:</b>\n<pre><code>PERSIST   — persist родителя -> persist детей (INSERT)\nMERGE     — merge родителя -> merge детей (UPDATE)\nREMOVE    — remove родителя -> remove детей (DELETE)\nREFRESH   — refresh родителя -> refresh детей\nDETACH    — detach родителя -> detach детей\nALL       — все вышеперечисленные</code></pre>\n\n<b>orphanRemoval vs CASCADE.REMOVE:</b>\n<pre><code>// orphanRemoval = true:\npayment.getItems().remove(item); // удалили из коллекции\n// -> DELETE FROM payment_items WHERE id = ?  (удалён из БД!)\n\n// CASCADE.REMOVE:\nem.remove(payment); // удалили родителя\n// -> DELETE FROM payment_items ... (удалены дети)\n// НО: payment.getItems().remove(item) НЕ удалит из БД!</code></pre>\n\n<b>Осторожно:</b>\n• CASCADE.REMOVE на @ManyToMany — удалит у ВСЕХ родителей!\n• CASCADE.ALL на @ManyToOne — обычно не нужен (дочерний не управляет родителем)\n\n<b>На собесе:</b> что такое orphanRemoval? Чем отличается от CASCADE.REMOVE? (orphan = удалён из коллекции, REMOVE = удалён родитель)',lvl:2},
    {q:'@GeneratedValue стратегии',a:'<pre><code>@Id\n@GeneratedValue(strategy = GenerationType.SEQUENCE, generator = "payment_seq")\n@SequenceGenerator(name = "payment_seq",\n    sequenceName = "payment_id_seq",\n    allocationSize = 50)  // Hibernate берёт 50 id за раз\nprivate Long id;</code></pre>\n\n<b>Стратегии:</b>\n<pre><code>IDENTITY   — автоинкремент БД (SERIAL/BIGSERIAL)\n             + Простой\n             - НЕ поддерживает batch insert! (Hibernate делает INSERT сразу)\n\nSEQUENCE   — sequence в БД (рекомендуется для PostgreSQL!)\n             + Batch insert работает (allocationSize)\n             + Hibernate берёт диапазон id заранее\n             - Нужна sequence в БД\n\nTABLE      — отдельная таблица-счётчик\n             - Медленно (блокировки), не использовать\n\nAUTO       — Hibernate сам выбирает\n             В PostgreSQL выберет SEQUENCE\n             Но лучше указать явно</code></pre>\n\n<b>allocationSize:</b>\n• По умолчанию 50 — Hibernate берёт 50 id за один вызов sequence\n• Ускоряет batch insert: не нужно вызывать sequence для каждого INSERT\n• В sequence БД: INCREMENT BY 50\n\n<b>На собесе:</b> почему IDENTITY не поддерживает batch insert? (id присваивается только после INSERT, Hibernate не может отложить INSERT)',lvl:2},
    {q:'Кэши Hibernate',a:'<b>1st Level Cache (Persistence Context):</b>\n<pre><code>@Transactional\nvoid example() {\n    Payment p1 = em.find(Payment.class, 1L); // SQL: SELECT ...\n    Payment p2 = em.find(Payment.class, 1L); // НЕТ SQL! Из кэша.\n    p1 == p2; // true! Identity guarantee\n}\n// Кэш живёт в рамках транзакции/EntityManager\n// Автоматический, нельзя отключить</code></pre>\n\n<b>2nd Level Cache (общий между сессиями):</b>\n<pre><code>@Entity\n@Cacheable                    // JPA\n@Cache(usage = CacheConcurrencyStrategy.READ_WRITE) // Hibernate\npublic class Merchant { ... }\n\n// application.yml\nspring.jpa.properties.hibernate:\n  cache.use_second_level_cache: true\n  cache.region.factory_class: org.hibernate.cache.jcache.JCacheRegionFactory\n  javax.cache.provider: org.ehcache.jsr107.EhcacheCachingProvider</code></pre>\n\n<b>Cache strategies:</b>\n• READ_ONLY — immutable данные (справочники)\n• READ_WRITE — мутабельные, lock при записи\n• NONSTRICT_READ_WRITE — eventual consistency\n\n<b>Query Cache:</b> кэширует результаты JPQL. Инвалидируется при ЛЮБОМ изменении таблицы — обычно не стоит включать.\n\n<b>На собесе:</b> когда использовать 2nd level cache? (справочники, редко меняющиеся данные, read-heavy)',lvl:3},
    {q:'Блокировки в JPA',a:'<b>Оптимистическая (@Version):</b>\n<pre><code>@Entity\npublic class Payment {\n    @Id private Long id;\n    \n    @Version\n    private Long version; // автоинкремент при UPDATE!\n    \n    private BigDecimal amount;\n}\n\n// UPDATE payments SET amount=?, version=4 WHERE id=1 AND version=3\n// Если version изменился -> 0 rows affected -> OptimisticLockException!</code></pre>\n\n<b>Обработка конфликта:</b>\n<pre><code>@Retryable(value = OptimisticLockException.class, maxAttempts = 3)\n@Transactional\npublic void updatePayment(Long id, BigDecimal amount) {\n    Payment p = repo.findById(id).orElseThrow();\n    p.setAmount(amount);\n    // При конфликте — автоматический retry\n}</code></pre>\n\n<b>Пессимистическая:</b>\n<pre><code>// В Repository\n@Lock(LockModeType.PESSIMISTIC_WRITE)\n@Query("SELECT p FROM Payment p WHERE p.id = :id")\nPayment findByIdForUpdate(@Param("id") Long id);\n// -> SELECT ... FOR UPDATE\n\n// PESSIMISTIC_READ -> SELECT ... FOR SHARE\n// PESSIMISTIC_WRITE -> SELECT ... FOR UPDATE</code></pre>\n\n<b>Когда что:</b>\n• <b>Оптимистическая:</b> по умолчанию. Low contention, большинство случаев.\n• <b>Пессимистическая:</b> баланс, лимиты, критичные операции.\n\n<b>На собесе:</b> как обработать OptimisticLockException? (retry с перечитыванием данных)',hot:1,lvl:3},
    {q:'JPQL vs Criteria API vs Native',a:'Три способа писать запросы в JPA. У каждого свои сильные стороны.\n\n<b>1. JPQL (Java Persistence Query Language)</b>\nSQL-подобный язык, но оперирует <b>Entity-классами и их полями</b>, а не таблицами и колонками. Независим от БД.\n\n<pre><code>@Query("SELECT u FROM User u WHERE u.email = :email AND u.status = :status")\nOptional&lt;User&gt; findActive(@Param("email") String email, @Param("status") UserStatus status);\n\n@Query("SELECT u.name, COUNT(o) FROM User u JOIN u.orders o GROUP BY u.name")\nList&lt;Object[]&gt; countOrdersByUser();\n\n@Query("SELECT new com.example.UserDto(u.id, u.name) FROM User u WHERE u.status = :s")\nList&lt;UserDto&gt; findAsDto(@Param("s") UserStatus s);</code></pre>\n\n<b>Плюсы:</b>\n• Читаемо, похоже на SQL\n• Работает с сущностями (не надо знать структуру таблиц)\n• Независим от СУБД\n• Поддерживает named queries\n\n<b>Минусы:</b>\n• Запросы в строках — ошибки в runtime, не compile-time\n• Нет type safety (например, опечатка в имени поля — exception при запуске)\n• Нельзя динамически собирать запрос (без конкатенации строк)\n\n<b>2. Criteria API</b>\nПрограммное построение запросов через Java API. Type-safe с помощью Metamodel.\n\n<pre><code>// Генерация Metamodel: hibernate-jpamodelgen\n// Появляются User_, Order_ классы с полями User_.email и т.д.\n\nCriteriaBuilder cb = em.getCriteriaBuilder();\nCriteriaQuery&lt;User&gt; cq = cb.createQuery(User.class);\nRoot&lt;User&gt; root = cq.from(User.class);\n\nList&lt;Predicate&gt; predicates = new ArrayList&lt;&gt;();\nif (email != null) {\n    predicates.add(cb.equal(root.get(User_.email), email));\n}\nif (status != null) {\n    predicates.add(cb.equal(root.get(User_.status), status));\n}\nif (minAge != null) {\n    predicates.add(cb.greaterThanOrEqualTo(root.get(User_.age), minAge));\n}\ncq.where(predicates.toArray(new Predicate[0]));\ncq.orderBy(cb.desc(root.get(User_.createdAt)));\n\nList&lt;User&gt; result = em.createQuery(cq).getResultList();</code></pre>\n\n<b>Плюсы:</b>\n• <b>Type safety</b> — опечатки ловятся компилятором\n• <b>Динамические запросы</b> — легко собирать фильтры по флагам\n• <b>Рефакторинг безопасен</b> — IDE найдёт все использования\n\n<b>Минусы:</b>\n• Многословно — для простых запросов оверкилл\n• Хуже читается, чем JPQL\n• Нужен hibernate-jpamodelgen для генерации Metamodel\n\n<b>3. Native Queries (чистый SQL)</b>\n<pre><code>@Query(value = "SELECT * FROM users WHERE created_at &gt; NOW() - INTERVAL \\\'7 days\\\'",\n       nativeQuery = true)\nList&lt;User&gt; findRecent();\n\n// Маппинг нестандартных колонок на DTO\n@Query(value = "SELECT u.id AS id, u.name AS name, COUNT(o.id) AS order_count " +\n               "FROM users u LEFT JOIN orders o ON o.user_id = u.id " +\n               "GROUP BY u.id, u.name",\n       nativeQuery = true)\nList&lt;UserWithOrderCount&gt; getUserStats();</code></pre>\n\n<b>Плюсы:</b>\n• Доступ ко ВСЕМ возможностям конкретной БД (CTE, window functions, HSTORE, JSONB в Postgres)\n• Максимальная производительность — прямой контроль над планом\n• Нужен для сложных аналитических запросов\n\n<b>Минусы:</b>\n• Привязка к конкретной СУБД\n• Нет валидации на уровне JPA (JPA не знает что там происходит)\n• Результаты — обычно Object[] или DTO (Entity сложнее мапить)\n• Не участвует в automatic caching/dirty checking\n\n<b>4. Spring Data Specification&lt;T&gt;</b>\nНадстройка над Criteria API, упрощающая динамические запросы:\n\n<pre><code>public interface UserRepository extends JpaRepository&lt;User, Long&gt;,\n        JpaSpecificationExecutor&lt;User&gt; { }\n\npublic class UserSpecs {\n    public static Specification&lt;User&gt; hasStatus(UserStatus s) {\n        return (root, q, cb) -&gt; cb.equal(root.get("status"), s);\n    }\n\n    public static Specification&lt;User&gt; createdAfter(LocalDateTime d) {\n        return (root, q, cb) -&gt; cb.greaterThan(root.get("createdAt"), d);\n    }\n}\n\n// Комбинация:\nSpecification&lt;User&gt; spec = hasStatus(ACTIVE).and(createdAfter(yesterday));\nPage&lt;User&gt; page = userRepo.findAll(spec, pageable);</code></pre>\n\n<b>5. QueryDSL — альтернатива Criteria API</b>\nМощная библиотека с fluent API, более читаемая чем Criteria:\n<pre><code>QUser user = QUser.user;\nList&lt;User&gt; result = queryFactory\n    .selectFrom(user)\n    .where(user.email.eq(email).and(user.status.eq(ACTIVE)))\n    .orderBy(user.createdAt.desc())\n    .fetch();</code></pre>\nНе часть JPA, но популярна в проектах с динамическими запросами.\n\n<b>Сравнительная таблица:</b>\n<pre><code>Критерий             | JPQL      | Criteria API | Native SQL\n─────────────────────┼───────────┼──────────────┼─────────────\nType safety          | ❌         | ✅ (metamodel)| ❌\nДинамические запросы | ⚠         | ✅            | ⚠\nЧитаемость           | ✅         | ❌ multyline  | ✅ (если SQL)\nDb-independent       | ✅         | ✅            | ❌\nСложные SQL (CTE)    | частично  | ❌            | ✅\nРефакторинг          | risky     | safe          | risky\nPerformance          | хорошо    | хорошо        | максимум</code></pre>\n\n<b>Как выбирать:</b>\n• <b>JPQL</b> — для большинства запросов со статическими условиями\n• <b>Criteria API / Specification</b> — для динамических фильтров (поиск с чекбоксами)\n• <b>Native SQL</b> — для сложных аналитических запросов, специфичных для БД функций\n• <b>QueryDSL</b> — если ценишь читаемость и часто пишешь динамические запросы\n\n<b>Real-world пример смешивания:</b>\n<pre><code>public interface PaymentRepository extends JpaRepository&lt;Payment, Long&gt; {\n    // JPQL для простого\n    @Query("SELECT p FROM Payment p WHERE p.status = :s")\n    List&lt;Payment&gt; findByStatus(@Param("s") PaymentStatus s);\n\n    // Native для оптимизации\n    @Query(value = "SELECT * FROM payments WHERE amount &gt; :min " +\n                   "AND (jsonb_data->>\\\'priority\\\')::int &gt;= :priority",\n           nativeQuery = true)\n    List&lt;Payment&gt; findHighPriority(@Param("min") BigDecimal min,\n                                   @Param("priority") int priority);\n\n    // Specification для динамики\n    // — наследуется из JpaSpecificationExecutor\n}</code></pre>\n\n<b>На собесе:</b>\n• В чём преимущество JPQL над native? (БД-независимость, работа с Entity)\n• Когда нужен Criteria API? (динамические запросы, type safety)\n• Как Spring Data упрощает динамические запросы? (Specification)',lvl:2},
    {q:'Liquibase — миграции БД',a:'Версионирование и автоматическое применение изменений схемы БД.\n\n<pre><code># application.yml\nspring:\n  liquibase:\n    change-log: classpath:db/changelog/db.changelog-master.yaml</code></pre>\n\n<b>Master changelog:</b>\n<pre><code># db/changelog/db.changelog-master.yaml\ndatabaseChangeLog:\n  - include:\n      file: db/changelog/v1/001-create-payments.yaml\n  - include:\n      file: db/changelog/v1/002-add-merchant-id.yaml</code></pre>\n\n<b>Пример changeset:</b>\n<pre><code># 001-create-payments.yaml\ndatabaseChangeLog:\n  - changeSet:\n      id: 001-create-payments\n      author: developer\n      changes:\n        - createTable:\n            tableName: payments\n            columns:\n              - column: {name: id, type: bigint, autoIncrement: true,\n                         constraints: {primaryKey: true}}\n              - column: {name: amount, type: decimal(19,2),\n                         constraints: {nullable: false}}\n              - column: {name: status, type: varchar(50)}\n              - column: {name: created_at, type: timestamptz,\n                         defaultValueComputed: now()}\n      rollback:\n        - dropTable: {tableName: payments}</code></pre>\n\n<b>Ключевые таблицы:</b>\n• DATABASECHANGELOG — история применённых changeset\n• DATABASECHANGELOGLOCK — блокировка от параллельного применения\n\n<b>Liquibase vs Flyway:</b>\n• Liquibase — XML/YAML/JSON/SQL, rollback, preconditions, гибче\n• Flyway — только SQL, проще, convention over configuration\n\n<b>На собесе:</b> как откатить миграцию? (rollback в changeset). Что если changeset уже применён и нужно изменить? (новый changeset, никогда не менять применённый!)',lvl:2},
    {q:'Spring Data JPA — подробно',a:'<pre><code>public interface PaymentRepository\n    extends JpaRepository&lt;Payment, Long&gt; {\n\n    // 1. Query methods (по имени метода)\n    List&lt;Payment&gt; findByStatus(Status status);\n    List&lt;Payment&gt; findByAmountGreaterThanAndStatusOrderByCreatedAtDesc(\n        BigDecimal min, Status status);\n    Optional&lt;Payment&gt; findByExternalId(String externalId);\n    boolean existsByExternalId(String externalId);\n    long countByStatus(Status status);\n\n    // 2. @Query — JPQL\n    @Query("SELECT p FROM Payment p JOIN FETCH p.merchant WHERE p.status = :s")\n    List&lt;Payment&gt; findWithMerchant(@Param("s") Status status);\n\n    // 3. Native query\n    @Query(value = "SELECT * FROM payments WHERE created_at &gt; :date", nativeQuery = true)\n    List&lt;Payment&gt; findRecent(@Param("date") Instant date);\n\n    // 4. @Modifying для UPDATE/DELETE\n    @Modifying\n    @Query("UPDATE Payment p SET p.status = :s WHERE p.id = :id")\n    int updateStatus(@Param("id") Long id, @Param("s") Status status);\n}\n\n// 5. Пагинация\nPage&lt;Payment&gt; findByStatus(Status s, Pageable pageable);\n// Вызов: repo.findByStatus(ACTIVE, PageRequest.of(0, 20, Sort.by("createdAt").descending()))\n\n// 6. Specification (динамические фильтры)\nrepo.findAll(hasStatus(ACTIVE).and(amountGreaterThan(100)));</code></pre>\n\n<b>Auditing:</b>\n<pre><code>@EntityListeners(AuditingEntityListener.class)\npublic class Payment {\n    @CreatedDate private Instant createdAt;\n    @LastModifiedDate private Instant updatedAt;\n    @CreatedBy private String createdBy;\n}</code></pre>\n\n<b>На собесе:</b> как сделать динамический фильтр по 10 полям? (Specification&lt;T&gt;). Чем Page отличается от Slice? (Page делает COUNT, Slice — нет)',hot:1,lvl:2},
  
    {q:'Что такое EntityGraph?',a:'Декларативный способ указать что загрузить вместе с Entity (вместо JOIN FETCH в JPQL).\n\n<pre><code>@NamedEntityGraph(name = "Payment.full",\n    attributeNodes = @NamedAttributeNode("items"))\n@Entity\npublic class Payment { ... }\n\n// Использование\n@EntityGraph("Payment.full")\nList<Payment> findByStatus(Status s);</code></pre>\n\nПреимущество: не нужно писать JPQL, комбинируется с query methods.',lvl:3},
    {q:'Как работает Spring Data Specification?',a:'Программная генерация WHERE условий (аналог Criteria API):\n\n<pre><code>public class PaymentSpec {\n    public static Specification<Payment> hasStatus(Status s) {\n        return (root, query, cb) -> cb.equal(root.get("status"), s);\n    }\n    public static Specification<Payment> amountGreater(BigDecimal min) {\n        return (root, query, cb) -> cb.greaterThan(root.get("amount"), min);\n    }\n}\n// Использование\nrepo.findAll(hasStatus(ACTIVE).and(amountGreater(100)));</code></pre>\n\nИдеально для динамических фильтров.',hot:1,lvl:3},
]},

  { id:'spring', icon:'&#127811;', name:'Spring', data: [

    {q:'IoC и DI в Spring',a:'<b>IoC</b> (Inversion of Control) — фреймворк управляет созданием и жизненным циклом объектов.\n<b>DI</b> (Dependency Injection) — способ реализации IoC: зависимости внедряются извне.\n\n<b>3 способа DI:</b>\n<pre><code>// 1. Constructor injection (РЕКОМЕНДУЕМЫЙ)\n@Service\npublic class PaymentService {\n    private final PaymentRepository repo;    // final!\n    private final NotificationService notify;\n\n    // С одним конструктором @Autowired не нужен (Spring 4.3+)\n    public PaymentService(PaymentRepository repo, NotificationService notify) {\n        this.repo = repo;\n        this.notify = notify;\n    }\n}\n\n// 2. Setter injection (для опциональных зависимостей)\n@Autowired(required = false)\npublic void setCache(CacheService cache) { this.cache = cache; }\n\n// 3. Field injection (НЕ рекомендуется)\n@Autowired\nprivate PaymentRepository repo; // сложнее тестировать!</code></pre>\n\n<b>Почему constructor лучше:</b>\n• final поля — immutable, thread-safe\n• Видны зависимости в конструкторе\n• Легко тестировать: new PaymentService(mockRepo, mockNotify)\n• Нельзя забыть зависимость (compile error)\n\n<b>ApplicationContext vs BeanFactory:</b>\n• BeanFactory — базовый контейнер, lazy loading\n• ApplicationContext — расширяет BeanFactory: events, i18n, AOP, eager loading\n\n<b>На собесе:</b> почему field injection плохо? (нельзя сделать final, сложнее тестировать, скрытые зависимости)',hot:1,lvl:1},
    {q:'Жизненный цикл бина',a:'<pre><code>1.  Instantiation (создание объекта)\n2.  Populate Properties (DI — внедрение зависимостей)\n3.  BeanNameAware.setBeanName()\n4.  BeanFactoryAware.setBeanFactory()\n5.  ApplicationContextAware.setApplicationContext()\n6.  BeanPostProcessor.postProcessBeforeInitialization()\n7.  @PostConstruct  ← тут инициализация!\n8.  InitializingBean.afterPropertiesSet()\n9.  custom init-method\n10. BeanPostProcessor.postProcessAfterInitialization()\n    ← тут создаются AOP proxy (@Transactional, @Cacheable)!\n--- Бин готов к использованию ---\n11. @PreDestroy  ← тут cleanup!\n12. DisposableBean.destroy()\n13. custom destroy-method</code></pre>\n\n<b>Пример:</b>\n<pre><code>@Service\npublic class PaymentService {\n\n    @PostConstruct\n    void init() {\n        log.info("PaymentService initialized");\n        // загрузка справочников, прогрев кэша\n    }\n\n    @PreDestroy\n    void cleanup() {\n        log.info("PaymentService shutting down");\n        // закрытие ресурсов, flush кэша\n    }\n}</code></pre>\n\n<b>BeanPostProcessor — самый важный:</b>\n• Вызывается для КАЖДОГО бина\n• postProcessAfterInitialization — создаёт proxy (AOP)\n• Именно поэтому @Transactional работает через proxy\n\n<b>На собесе:</b> в какой момент создаётся proxy для @Transactional? (step 10 — postProcessAfterInitialization)',hot:1,lvl:2},
    {q:'Скоупы бинов',a:'<b>Scope</b> определяет жизненный цикл бина: сколько экземпляров создаётся и как долго они живут.\n\n<b>Основные скоупы:</b>\n\n<b>1. <code>singleton</code> (default)</b> — один экземпляр на ApplicationContext. Создаётся при старте (eager) или при первом обращении (lazy).\n<pre><code>@Service\npublic class UserService { } // один на всё приложение</code></pre>\n\n<b>2. <code>prototype</code></b> — новый экземпляр при каждом <code>getBean()</code>/@Autowired. Spring не управляет жизненным циклом после создания (destroy-callbacks не вызываются).\n<pre><code>@Component\n@Scope(ConfigurableBeanFactory.SCOPE_PROTOTYPE)\npublic class ReportBuilder { }</code></pre>\n\n<b>Web-scopes (только в web-приложении):</b>\n\n<b>3. <code>request</code></b> — один на HTTP-запрос.\n<pre><code>@Component\n@RequestScope\npublic class RequestContext {\n    private String correlationId;\n    // новый экземпляр на каждый запрос\n}</code></pre>\n\n<b>4. <code>session</code></b> — один на HTTP-сессию пользователя.\n\n<b>5. <code>application</code></b> — один на ServletContext (аналог singleton, но для web-контекста).\n\n<b>6. <code>websocket</code></b> — один на WebSocket-соединение.\n\n<b>Проблема «singleton injected prototype»:</b>\n<pre><code>@Service\npublic class OrderService { // singleton\n    @Autowired\n    private ReportBuilder builder; // prototype - но инжектится ОДИН РАЗ!\n}\n// Хотя ReportBuilder prototype, builder в OrderService всегда тот же</code></pre>\n\n<b>Решения:</b>\n\n<b>a) <code>ObjectProvider</code> (рекомендуется):</b>\n<pre><code>@Autowired\nprivate ObjectProvider&lt;ReportBuilder&gt; builderProvider;\n\npublic void generate() {\n    ReportBuilder b = builderProvider.getObject(); // новый каждый раз\n}</code></pre>\n\n<b>b) <code>Provider</code> из javax.inject:</b>\n<pre><code>@Autowired\nprivate Provider&lt;ReportBuilder&gt; provider;\nprovider.get();</code></pre>\n\n<b>c) <code>@Lookup</code>:</b>\n<pre><code>public abstract ReportBuilder createBuilder(); // Spring переопределит</code></pre>\n\n<b>d) Scoped proxy:</b>\n<pre><code>@Scope(value = SCOPE_PROTOTYPE, proxyMode = TARGET_CLASS)\npublic class ReportBuilder { }\n// Теперь при каждом вызове proxy создаёт новый объект</code></pre>\n\n<b>Аналогично с request/session:</b> если инжектить в singleton — нужен <code>proxyMode</code>, иначе при старте ещё нет request\'а.\n\n<b>На собесе:</b>\n• Какой scope по умолчанию? (singleton)\n• Как инжектить prototype в singleton? (ObjectProvider / scoped proxy)\n• Singleton thread-safe? (Spring его так создаёт, но поля БИНА должны быть stateless или потокобезопасны)',lvl:1},
    {q:'@Bean vs @Component и стереотипы',a:'<b>@Component</b> — автосканирование (@ComponentScan)\n<b>@Service</b> — бизнес-логика\n<b>@Repository</b> — DAO + трансляция исключений\n<b>@Controller/@RestController</b> — web\n<b>@Bean</b> — метод в @Configuration (сторонние библиотеки)\n\n@Primary — приоритет. @Qualifier — по имени.\n@Conditional, @Profile — условные бины.',hot:1,lvl:2},
    {q:'@Autowired, @Inject, @Resource — разница',a:'Три аннотации для инъекции зависимостей. Из разных миров, с разной семантикой.\n\n<b>@Autowired</b> — Spring-нативная\n• Пакет: <code>org.springframework.beans.factory.annotation</code>\n• <b>По типу</b> (by type) — ищет подходящий бин\n• Если несколько — нужен <code>@Qualifier("name")</code>\n• По умолчанию <code>required = true</code> — падает если бина нет (можно <code>required = false</code>)\n\n<pre><code>@Service\npublic class OrderService {\n    @Autowired\n    private PaymentService paymentService;\n\n    @Autowired\n    @Qualifier("cardPayment") // если несколько PaymentService\n    private PaymentService cardPayment;\n}</code></pre>\n\n<b>@Inject</b> — Jakarta CDI (JSR-330)\n• Пакет: <code>jakarta.inject</code> (было <code>javax.inject</code>)\n• Стандарт Java EE / Jakarta EE\n• <b>По типу</b>, как @Autowired\n• Совместим с Spring, но нужна явная зависимость <code>jakarta.inject</code>\n• Для «или null» — <code>Optional&lt;T&gt;</code> или <code>Provider&lt;T&gt;</code>\n\n<pre><code>@Service\npublic class OrderService {\n    @Inject\n    private PaymentService paymentService;\n\n    @Inject\n    @Named("cardPayment") // аналог @Qualifier\n    private PaymentService cardPayment;\n}</code></pre>\n\n<b>@Resource</b> — Jakarta Annotations (JSR-250)\n• Пакет: <code>jakarta.annotation</code>\n• <b>По имени</b> (by name) — сначала ищет бин с именем поля; если не нашёл — по типу\n• Поддерживает <code>name = "..."</code> для явного имени\n• Исторически из Java EE — изначально для injection EJB/JNDI ресурсов\n\n<pre><code>@Service\npublic class OrderService {\n    @Resource(name = "cardPayment")\n    private PaymentService cardPayment;\n\n    @Resource // ищет бин с именем "paymentService"\n    private PaymentService paymentService;\n}</code></pre>\n\n<b>Сравнительная таблица:</b>\n<pre><code>Критерий            | @Autowired    | @Inject     | @Resource\n────────────────────┼───────────────┼─────────────┼─────────────\nПроисхождение       | Spring        | Jakarta CDI | Jakarta EE\nПакет               | org.springfwk | jakarta.inj | jakarta.ann\nПоиск               | by type       | by type     | by name, then type\nQualifier           | @Qualifier    | @Named      | name="..."\nOptional            | required=false| Optional&lt;T&gt; | нет прямо\nПортабельность      | Только Spring | Любой DI    | Любой JSR-250</code></pre>\n\n<b>🎯 Рекомендация (современная практика):</b>\n\n<b>Constructor injection БЕЗ аннотации</b> — лучшая практика с Spring 4.3+:\n<pre><code>@Service\npublic class OrderService {\n    private final PaymentService paymentService;\n    private final InventoryService inventoryService;\n\n    // Spring сам заинжектит зависимости — никаких аннотаций\n    public OrderService(PaymentService paymentService,\n                        InventoryService inventoryService) {\n        this.paymentService = paymentService;\n        this.inventoryService = inventoryService;\n    }\n}</code></pre>\n\n<b>Почему constructor injection лучше:</b>\n• <b>Immutable</b> — поля final, гарантия что не будут null\n• <b>Обязательные зависимости</b> — видны сразу в сигнатуре\n• <b>Тестируемость</b> — легко создать в тесте без Spring: <code>new OrderService(mock, mock)</code>\n• <b>Circular dependencies</b> — Spring упадёт при старте, а не в runtime (с field injection циклы проходят)\n• Не нужна аннотация если один конструктор\n• <b>Lombok:</b> <code>@RequiredArgsConstructor</code> автогенерирует\n\n<pre><code>@Service\n@RequiredArgsConstructor // Lombok генерирует constructor для всех final\npublic class OrderService {\n    private final PaymentService paymentService;\n    private final InventoryService inventoryService;\n}</code></pre>\n\n<b>Field injection — плохо:</b>\n<pre><code>@Autowired private PaymentService paymentService; // ❌\n// Проблемы:\n// - нельзя сделать final\n// - сложно тестировать без Spring context\n// - скрывает зависимости (не видны в конструкторе)\n// - позволяет бесконечные циклические зависимости</code></pre>\n\n<b>Setter injection</b> — для опциональных зависимостей (редко используется).\n\n<b>На собесе:</b>\n• Разница @Autowired vs @Resource? (type vs name)\n• Почему @Autowired — плохо на полях? (final, тестируемость)\n• Как Spring разруливает несколько бинов одного типа? (@Qualifier, @Primary, name matching)\n• Что лучше использовать в 2026? (constructor injection, без аннотаций)',lvl:2},
    {q:'Как заинжектить примитив или коллекцию?',a:'<b>Примитив:</b>\n<code>@Value("${app.timeout:5000}") private int timeout;</code>\n<code>@Value("#{2 * 3}") private int calc;</code> — SpEL\n\n<b>Коллекция бинов:</b>\n<code>@Autowired private List<PaymentStrategy> strategies;</code>\nИнжектит все бины типа PaymentStrategy.\n\n<code>@Autowired private Map<String, PaymentStrategy> map;</code>\nКлюч = имя бина, значение = бин.',lvl:2},
    {q:'BeanPostProcessor и BeanFactoryPostProcessor',a:'<b>BeanPostProcessor:</b> модифицирует бины после создания.\n• postProcessBeforeInitialization — до @PostConstruct\n• postProcessAfterInitialization — после (здесь создаются proxy!)\n\n<b>BeanFactoryPostProcessor:</b> модифицирует определения бинов до их создания.\nПример: PropertySourcesPlaceholderConfigurer — подставляет ${} значения.',lvl:2},
