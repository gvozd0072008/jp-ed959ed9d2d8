    {q:'FizzBuzz',a:'<b>Задача:</b> вывести числа от 1 до 100. Вместо кратных 3 — «Fizz». Вместо кратных 5 — «Buzz». Вместо кратных 15 — «FizzBuzz».\n\n<b>1. Классический императивный:</b>\n<pre><code>for (int i = 1; i &lt;= 100; i++) {\n    if (i % 15 == 0) System.out.println("FizzBuzz");\n    else if (i % 3 == 0) System.out.println("Fizz");\n    else if (i % 5 == 0) System.out.println("Buzz");\n    else System.out.println(i);\n}</code></pre>\nВажно: проверка на 15 ПЕРВОЙ, иначе кратные 15 уйдут в ветку «Fizz».\n\n<b>2. Без проверки на 15</b> (конкатенация):\n<pre><code>for (int i = 1; i &lt;= 100; i++) {\n    String s = "";\n    if (i % 3 == 0) s += "Fizz";\n    if (i % 5 == 0) s += "Buzz";\n    System.out.println(s.isEmpty() ? i : s);\n}</code></pre>\nЛегче расширить (например, добавить правило на 7).\n\n<b>3. Stream API (функциональный):</b>\n<pre><code>IntStream.rangeClosed(1, 100)\n    .mapToObj(i -&gt; i % 15 == 0 ? "FizzBuzz"\n                 : i % 3 == 0 ? "Fizz"\n                 : i % 5 == 0 ? "Buzz"\n                 : String.valueOf(i))\n    .forEach(System.out::println);</code></pre>\n\n<b>4. Расширяемый (правила в Map) — покажет архитектурное мышление:</b>\n<pre><code>Map&lt;Integer, String&gt; rules = new LinkedHashMap&lt;&gt;();\nrules.put(3, "Fizz");\nrules.put(5, "Buzz");\n// легко добавить: rules.put(7, "Bang");\n\nfor (int i = 1; i &lt;= 100; i++) {\n    String result = rules.entrySet().stream()\n        .filter(e -&gt; i % e.getKey() == 0)\n        .map(Map.Entry::getValue)\n        .collect(Collectors.joining());\n    System.out.println(result.isEmpty() ? i : result);\n}</code></pre>\n\n<b>Почему задачу дают:</b> отсеивает тех, кто не умеет писать базовый код. Тест на понимание операторов <code>%</code>, приоритета условий и структур управления.\n\n<b>На собесе:</b> пиши вариант №2 — он и правильный, и показывает, что ты думаешь про расширяемость. Не используй Stream API если есть риск показаться «overengineering-ом» для этой задачи.\n\n<b>Сложность:</b> O(n) time, O(1) space.',lvl:1},
    {q:'Two Sum (O(n))',a:'<pre><code>int[] twoSum(int[] nums, int target) {\n    Map<Integer,Integer> map = new HashMap<>();\n    for (int i = 0; i < nums.length; i++) {\n        int comp = target - nums[i];\n        if (map.containsKey(comp))\n            return new int[]{map.get(comp), i};\n        map.put(nums[i], i);\n    }\n    return new int[]{};\n}</code></pre>',hot:1,lvl:2},
    {q:'Реверс строки',a:'<b>Задача:</b> развернуть строку — "hello" → "olleh".\n\n<b>1. Самый лаконичный (1 строка):</b>\n<pre><code>String reversed = new StringBuilder(str).reverse().toString();</code></pre>\nИспользует встроенный <code>StringBuilder.reverse()</code>. На собесе — ОК, но обычно просят ручную реализацию.\n\n<b>2. Двумя указателями (самый эффективный для ручной реализации):</b>\n<pre><code>public String reverse(String s) {\n    char[] c = s.toCharArray();\n    int left = 0, right = c.length - 1;\n    while (left &lt; right) {\n        char tmp = c[left];\n        c[left] = c[right];\n        c[right] = tmp;\n        left++;\n        right--;\n    }\n    return new String(c);\n}\n// Time O(n), Space O(n) — для копии массива</code></pre>\n\n<b>3. Рекурсивно</b> (менее эффективно, больше памяти):\n<pre><code>String reverse(String s) {\n    if (s.isEmpty()) return s;\n    return reverse(s.substring(1)) + s.charAt(0);\n}\n// Time O(n²), Space O(n) — из-за substring и стека рекурсии</code></pre>\n\n<b>4. Через Stream API:</b>\n<pre><code>String reversed = str.chars()\n    .mapToObj(c -&gt; (char) c)\n    .collect(Collectors.collectingAndThen(\n        Collectors.toList(),\n        list -&gt; { Collections.reverse(list); return list; }))\n    .stream()\n    .map(String::valueOf)\n    .collect(Collectors.joining());</code></pre>\nSlow. Лучше не писать.\n\n<b>Важные нюансы:</b>\n\n<b>Unicode и surrogate pairs:</b> эмодзи и символы вне BMP занимают 2 <code>char</code>\'а (surrogate pair). Простой реверс char-по-char их ломает!\n<pre><code>"Hello 👋".toCharArray() // 👋 = 2 char\'а\n// После реверса: битая последовательность</code></pre>\n\n<b>Безопасное решение для Unicode:</b>\n<pre><code>String reverseUnicode(String s) {\n    return new StringBuilder(s).reverse().toString();\n    // StringBuilder корректно обрабатывает surrogate pairs\n}\n// Или:\nint[] codePoints = s.codePoints().toArray();\nreverseArray(codePoints);\nreturn new String(codePoints, 0, codePoints.length);</code></pre>\n\n<b>На собесе:</b> напиши 2 указателя, потом упомяни про StringBuilder.reverse() и surrogate pairs как bonus. Задача LeetCode #344.',lvl:2},
    {q:'Палиндром',a:'<b>Задача:</b> проверить, читается ли строка одинаково с начала и с конца. «А роза упала на лапу Азора» — палиндром.\n\n<b>Решение — два указателя:</b>\n<pre><code>public boolean isPalindrome(String s) {\n    // 1. Нормализация: нижний регистр + только буквы/цифры\n    s = s.toLowerCase().replaceAll("[^a-zа-я0-9]", "");\n\n    // 2. Два указателя идут навстречу\n    int left = 0, right = s.length() - 1;\n    while (left &lt; right) {\n        if (s.charAt(left) != s.charAt(right)) return false;\n        left++;\n        right--;\n    }\n    return true;\n}\n// Time O(n), Space O(n) — regex создаёт новую строку\n// Можно улучшить до Space O(1) — проверять Character.isLetterOrDigit() в цикле</code></pre>\n\n<b>Оптимизированный без regex (O(1) space):</b>\n<pre><code>public boolean isPalindrome(String s) {\n    int left = 0, right = s.length() - 1;\n    while (left &lt; right) {\n        // Пропускаем не-буквы/цифры\n        while (left &lt; right && !Character.isLetterOrDigit(s.charAt(left))) left++;\n        while (left &lt; right && !Character.isLetterOrDigit(s.charAt(right))) right--;\n        // Сравниваем в нижнем регистре\n        if (Character.toLowerCase(s.charAt(left)) != Character.toLowerCase(s.charAt(right))) {\n            return false;\n        }\n        left++;\n        right--;\n    }\n    return true;\n}</code></pre>\n\n<b>Наивное (менее эффективное):</b>\n<pre><code>return s.equals(new StringBuilder(s).reverse().toString());\n// O(n) time, но создаёт копию строки</code></pre>\n\n<b>Палиндром числа</b> (без конвертации в строку):\n<pre><code>boolean isPalindrome(int x) {\n    if (x &lt; 0) return false;\n    int reversed = 0, original = x;\n    while (x != 0) {\n        reversed = reversed * 10 + x % 10;\n        x /= 10;\n    }\n    return reversed == original;\n}</code></pre>\n\n<b>Расширенные задачи:</b>\n• <b>Longest Palindromic Substring</b> — DP или «расширение от центра» O(n²)\n• <b>Count palindromic substrings</b> — тоже расширение от центра\n• <b>Valid Palindrome II</b> — можно удалить 1 символ\n\n<b>LeetCode:</b> #125 Valid Palindrome (Easy), #5 Longest Palindromic Substring (Medium).\n\n<b>На собесе:</b> напиши два указателя, обсуди обработку пробелов/пунктуации, упомяни про Unicode (в русском тексте особенно).',lvl:2},
    {q:'Факториал',a:'<b>Задача:</b> n! = 1 × 2 × 3 × ... × n, а 0! = 1.\n\n<b>1. Итеративно (рекомендуется):</b>\n<pre><code>long factorial(int n) {\n    if (n &lt; 0) throw new IllegalArgumentException("n must be non-negative");\n    long result = 1;\n    for (int i = 2; i &lt;= n; i++) {\n        result *= i;\n    }\n    return result;\n}\n// Time O(n), Space O(1)</code></pre>\n\n<b>2. Рекурсивно:</b>\n<pre><code>long factorial(int n) {\n    if (n &lt; 0) throw new IllegalArgumentException();\n    return n &lt;= 1 ? 1 : n * factorial(n - 1);\n}\n// Time O(n), Space O(n) — стек рекурсии\n// Нет tail call optimization в JVM → StackOverflowError на больших n</code></pre>\n\n<b>3. Stream API (однострочник):</b>\n<pre><code>long factorial = LongStream.rangeClosed(2, n).reduce(1L, (a, b) -&gt; a * b);</code></pre>\n\n<b>Проблема переполнения:</b>\n<pre><code>long (63 бита): max = 9_223_372_036_854_775_807\nfactorial(20) = 2_432_902_008_176_640_000  // OK\nfactorial(21) = overflow!  // 51_090_942_171_709_440_000 &gt; max long</code></pre>\n\n<b>Для больших n — BigInteger:</b>\n<pre><code>BigInteger factorial(int n) {\n    BigInteger result = BigInteger.ONE;\n    for (int i = 2; i &lt;= n; i++) {\n        result = result.multiply(BigInteger.valueOf(i));\n    }\n    return result;\n}\n// Работает для любых n, но медленнее и занимает больше памяти</code></pre>\n\n<b>Рекурсия с мемоизацией (DP):</b>\n<pre><code>Map&lt;Integer, Long&gt; cache = new HashMap&lt;&gt;();\nlong factorial(int n) {\n    if (n &lt;= 1) return 1;\n    return cache.computeIfAbsent(n, k -&gt; k * factorial(k - 1));\n}\n// Полезно если вызываешь многократно с разными n</code></pre>\n\n<b>На собесе:</b>\n• Сразу уточни, может ли n быть отрицательным или 0 (edge cases)\n• Обсуди переполнение и границы long (max n = 20)\n• Упомяни, что рекурсия может привести к StackOverflow для больших n в Java (нет TCO)\n• Для interview-friendly решения — итеративная версия лучшая',lvl:1},
    {q:'Фибоначчи',a:'<b>Задача:</b> fib(0)=0, fib(1)=1, fib(n)=fib(n-1)+fib(n-2). Последовательность: 0, 1, 1, 2, 3, 5, 8, 13, 21...\n\n<b>1. Наивная рекурсия (плохо!):</b>\n<pre><code>int fib(int n) {\n    if (n &lt;= 1) return n;\n    return fib(n - 1) + fib(n - 2);\n}\n// Time O(2^n) — экспоненциально! fib(40) уже несколько секунд\n// Space O(n) — глубина рекурсии</code></pre>\nПроблема: пересчитывает одни и те же значения много раз.\n\n<b>2. Рекурсия с мемоизацией (top-down DP):</b>\n<pre><code>Map&lt;Integer, Long&gt; memo = new HashMap&lt;&gt;();\nlong fib(int n) {\n    if (n &lt;= 1) return n;\n    return memo.computeIfAbsent(n, k -&gt; fib(k-1) + fib(k-2));\n}\n// Time O(n), Space O(n)</code></pre>\n\n<b>3. Итеративно (bottom-up DP, рекомендуется):</b>\n<pre><code>long fib(int n) {\n    if (n &lt;= 1) return n;\n    long a = 0, b = 1;\n    for (int i = 2; i &lt;= n; i++) {\n        long tmp = a + b;\n        a = b;\n        b = tmp;\n    }\n    return b;\n}\n// Time O(n), Space O(1) — идеальное сочетание!</code></pre>\n\n<b>4. Матричное возведение в степень (O(log n)):</b>\n<pre><code>// [[1,1],[1,0]]^n = [[fib(n+1), fib(n)], [fib(n), fib(n-1)]]\n// Быстрое возведение в степень — log n умножений</code></pre>\nПолезно для очень больших n и олимпиадных задач.\n\n<b>5. Формула Бине (O(1) но с потерей точности):</b>\n<pre><code>double sqrt5 = Math.sqrt(5);\ndouble phi = (1 + sqrt5) / 2;\nlong fib = Math.round(Math.pow(phi, n) / sqrt5);\n// Точно до n ≈ 70, потом ошибки double</code></pre>\n\n<b>Переполнение:</b>\n<pre><code>fib(92) = 7_540_113_804_746_346_429 — последнее значение, помещающееся в long\nfib(93) = overflow! Нужен BigInteger</code></pre>\n\n<b>BigInteger версия:</b>\n<pre><code>BigInteger fib(int n) {\n    if (n &lt;= 1) return BigInteger.valueOf(n);\n    BigInteger a = BigInteger.ZERO, b = BigInteger.ONE;\n    for (int i = 2; i &lt;= n; i++) {\n        BigInteger tmp = a.add(b); a = b; b = tmp;\n    }\n    return b;\n}</code></pre>\n\n<b>На собесе:</b>\n1. Начни с наивной рекурсии, чтобы показать понимание задачи\n2. Затем укажи на экспоненциальную сложность\n3. Добавь мемоизацию — O(n)\n4. Предложи итеративную версию с O(1) памятью — это то, что хотят увидеть\n5. Bonus: упомяни матричное возведение для O(log n) и переполнение long\n\n<b>Задача:</b> LeetCode #509 Fibonacci Number (Easy), #70 Climbing Stairs (тот же принцип).',lvl:1},
    {q:'Проверка простого числа',a:'<b>Простое число (prime)</b> — целое &gt; 1, делится только на 1 и на себя (2, 3, 5, 7, 11, 13, 17, 19, 23, ...).\n\n<b>1. Наивный метод O(n):</b>\n<pre><code>boolean isPrime(int n) {\n    if (n &lt; 2) return false;\n    for (int i = 2; i &lt; n; i++) {\n        if (n % i == 0) return false;\n    }\n    return true;\n}\n// Time O(n) — плохо для больших n</code></pre>\n\n<b>2. Оптимизация до sqrt(n) — O(√n):</b>\n<pre><code>boolean isPrime(int n) {\n    if (n &lt; 2) return false;\n    if (n == 2) return true;\n    if (n % 2 == 0) return false;\n    for (int i = 3; i * i &lt;= n; i += 2) {\n        if (n % i == 0) return false;\n    }\n    return true;\n}\n// Why sqrt(n)? Если n = a*b, то хотя бы один из них &lt;= sqrt(n).</code></pre>\n\n<b>3. Оптимизация 6k±1 — самая быстрая простая:</b>\n<pre><code>boolean isPrime(int n) {\n    if (n &lt; 2) return false;\n    if (n &lt; 4) return true;           // 2, 3 — простые\n    if (n % 2 == 0 || n % 3 == 0) return false;\n\n    // Все простые &gt; 3 имеют форму 6k ± 1\n    for (int i = 5; (long) i * i &lt;= n; i += 6) {\n        if (n % i == 0 || n % (i + 2) == 0) return false;\n    }\n    return true;\n}\n// Time O(√n / 3) — в 3 раза быстрее простого sqrt подхода</code></pre>\n\n<b>Почему 6k±1:</b>\n<pre><code>Любое число можно записать как 6k, 6k±1, 6k±2, 6k+3.\n• 6k — делится на 6 (составное)\n• 6k±2 — делится на 2 (составное)\n• 6k+3 — делится на 3 (составное)\n\nЗначит простые &gt; 3 могут быть только в форме 6k±1 (т.е. 6k+1, 6k+5).\nПроверяем только их → меньше итераций.</code></pre>\n\n<b>4. Защита от integer overflow:</b>\n<pre><code>// i*i может переполниться для больших int\nfor (int i = 5; i &lt;= Math.sqrt(n); i += 6) { ... }\n// Или:\nfor (int i = 5; (long) i * i &lt;= n; i += 6) { ... }\n// Или использовать long</code></pre>\n\n<b>5. Решето Эратосфена — для многих проверок:</b>\n<pre><code>// Если нужно проверить все простые до N, лучше построить sieve\nboolean[] sieve(int n) {\n    boolean[] isPrime = new boolean[n + 1];\n    Arrays.fill(isPrime, true);\n    isPrime[0] = isPrime[1] = false;\n    for (int i = 2; (long) i * i &lt;= n; i++) {\n        if (isPrime[i]) {\n            for (int j = i * i; j &lt;= n; j += i) {\n                isPrime[j] = false;\n            }\n        }\n    }\n    return isPrime;\n}\n// Time O(n log log n) — очень быстро!\n// Space O(n)\n// Построение один раз → O(1) на проверку</code></pre>\n\n<b>6. Для криптографии — вероятностные тесты:</b>\n\n<b>Miller-Rabin test:</b>\n<pre><code>// BigInteger в JDK имеет встроенный:\nBigInteger n = new BigInteger("12345678901234567890");\nboolean probablyPrime = n.isProbablePrime(100);\n// certainty=100: вероятность ошибки &lt; 2^-100\n// Для RSA ключей используется Miller-Rabin\n</code></pre>\n\n<b>Время проверки больших чисел:</b>\n<pre><code>10^6 digits:\n  Naive O(n):       вечность\n  Sqrt O(√n):       ~1 минута\n  Miller-Rabin:     мс</code></pre>\n\n<b>Дополнительные тесты:</b>\n• <b>AKS</b> — полиномиальный детерминистический (O(log^12 n), теоретически)\n• <b>Solovay-Strassen</b> — вероятностный\n• <b>Baillie-PSW</b> — комбинация, используется в Python\n\n<b>Свойства простых чисел (полезно на собесе):</b>\n• 2 — единственное чётное простое\n• Простые числа бесконечны (доказательство Евклида)\n• Распределение: π(n) ~ n/ln(n) — теорема о простых\n• Goldbach: любое чётное &gt;2 = сумма двух простых (гипотеза)\n\n<b>Практическое применение:</b>\n• <b>RSA</b> — произведение двух больших простых\n• <b>Хеш-функции</b> — использовуют простые для распределения\n• <b>HashMap capacity</b> — в некоторых имплементациях простые числа\n• <b>Генераторы случайных чисел</b>\n\n<b>Подводные камни:</b>\n• n = 1: <b>не простое</b> (по определению)\n• n = 2: простое (не забыть)\n• n &lt; 0: обычно не учитывается, но может быть ошибка\n• Переполнение i*i\n\n<b>LeetCode задачи:</b>\n• #204 Count Primes — Sieve of Eratosthenes\n• #1175 Prime Arrangements\n\n<b>На собесе:</b>\n• Почему sqrt(n), а не n? (если n = a*b, то min(a,b) &lt;= sqrt(n))\n• Что такое решето Эратосфена? (для множества чисел, O(n log log n))\n• Как генерируются простые для RSA? (Miller-Rabin на случайных больших числах)\n• Что с производительностью? (naive O(n), sqrt O(√n), 6k±1 быстрее в ~3x)',lvl:2},
    {q:'Дубликаты в массиве',a:'<pre><code>Set<Integer> seen = new HashSet<>();\nList<Integer> dups = new ArrayList<>();\nfor (int n : arr)\n    if (!seen.add(n)) dups.add(n);\n\n// Stream\nArrays.stream(arr).boxed()\n    .collect(groupingBy(identity(), counting()))\n    .entrySet().stream()\n    .filter(e -> e.getValue() > 1)\n    .map(Entry::getKey).toList();</code></pre>',lvl:2},
    {q:'Реверс числа',a:'<b>Задача:</b> 123 → 321, -123 → -321.\n\n<b>Математическое решение (рекомендуется):</b>\n<pre><code>public int reverse(int num) {\n    int reversed = 0;\n    while (num != 0) {\n        int digit = num % 10;    // последняя цифра\n        reversed = reversed * 10 + digit;\n        num /= 10;               // убираем последнюю цифру\n    }\n    return reversed;\n}\n// Работает и с отрицательными: -123 → -321\n// Time O(log n), Space O(1)\n// log n — количество цифр в числе</code></pre>\n\n<b>Разбор работы (на 123):</b>\n<pre><code>Шаг 1: num=123, digit=3,  reversed = 0*10+3 = 3,   num=12\nШаг 2: num=12,  digit=2,  reversed = 3*10+2 = 32,  num=1\nШаг 3: num=1,   digit=1,  reversed = 32*10+1=321, num=0</code></pre>\n\n<b>Обработка переполнения</b> (LeetCode задача возвращает 0 при overflow):\n<pre><code>public int reverse(int num) {\n    long reversed = 0; // long для защиты от overflow\n    while (num != 0) {\n        reversed = reversed * 10 + num % 10;\n        num /= 10;\n    }\n    if (reversed &gt; Integer.MAX_VALUE || reversed &lt; Integer.MIN_VALUE) {\n        return 0; // или throw exception\n    }\n    return (int) reversed;\n}</code></pre>\n\n<b>Вариант с Math.addExact / Math.multiplyExact:</b>\n<pre><code>int reversed = 0;\ntry {\n    while (num != 0) {\n        reversed = Math.addExact(Math.multiplyExact(reversed, 10), num % 10);\n        num /= 10;\n    }\n    return reversed;\n} catch (ArithmeticException e) {\n    return 0; // overflow\n}</code></pre>\n\n<b>Через строку (менее эффективно):</b>\n<pre><code>int reverse(int num) {\n    boolean negative = num &lt; 0;\n    String reversed = new StringBuilder(String.valueOf(Math.abs(num))).reverse().toString();\n    try {\n        int result = Integer.parseInt(reversed);\n        return negative ? -result : result;\n    } catch (NumberFormatException e) {\n        return 0;\n    }\n}</code></pre>\n\n<b>Почему математическое решение лучше:</b>\n• Не нужны конверсии в строку и обратно\n• Меньше памяти\n• Работает с отрицательными числами без дополнительной обработки (в Java <code>-123 % 10 = -3</code>)\n\n<b>Граничные случаи:</b>\n• <code>num = 0</code> → возвращает 0\n• <code>num = 10</code> → 1 (ведущие нули теряются — это нормально)\n• <code>num = Integer.MIN_VALUE</code> → переполнение (2147483648 не помещается в int)\n• Отрицательные работают «из коробки»\n\n<b>LeetCode:</b> #7 Reverse Integer (Easy).',lvl:2},
    {q:'Пузырьковая сортировка',a:'<b>Bubble Sort</b> — простейший алгоритм сортировки. Название от аналогии с «всплыванием пузырьков»: большие элементы постепенно «всплывают» в конец массива.\n\n<b>Идея:</b>\n<pre><code>Проход 1: [5, 2, 8, 1, 9, 3]\n            ⟶ [2, 5, 1, 8, 3, 9] (после первого прохода 9 в конце)\nПроход 2: [2, 5, 1, 8, 3, 9]\n            ⟶ [2, 1, 5, 3, 8, 9]\nПроход 3: [2, 1, 5, 3, 8, 9]\n            ⟶ [1, 2, 3, 5, 8, 9] (отсортировано)</code></pre>\n\n<b>Базовая реализация:</b>\n<pre><code>void bubbleSort(int[] arr) {\n    int n = arr.length;\n    for (int i = 0; i &lt; n - 1; i++) {\n        for (int j = 0; j &lt; n - i - 1; j++) {\n            if (arr[j] &gt; arr[j + 1]) {\n                int tmp = arr[j];\n                arr[j] = arr[j + 1];\n                arr[j + 1] = tmp;\n            }\n        }\n    }\n}\n// Time: O(n²) always, даже на отсортированном</code></pre>\n\n<b>Оптимизация — ранний выход:</b>\n<pre><code>void bubbleSort(int[] arr) {\n    int n = arr.length;\n    for (int i = 0; i &lt; n - 1; i++) {\n        boolean swapped = false;\n        for (int j = 0; j &lt; n - i - 1; j++) {\n            if (arr[j] &gt; arr[j + 1]) {\n                int tmp = arr[j];\n                arr[j] = arr[j + 1];\n                arr[j + 1] = tmp;\n                swapped = true;\n            }\n        }\n        if (!swapped) break;  // если не было swap — отсортировано\n    }\n}\n// Best case: O(n) если массив уже отсортирован</code></pre>\n\n<b>Сложность:</b>\n<pre><code>Time:\n  Best:    O(n)   — если отсортировано + early exit\n  Average: O(n²)\n  Worst:   O(n²)  — reverse sorted\n\nSpace: O(1) — сортирует in-place\n\nStable: да — равные элементы сохраняют относительный порядок</code></pre>\n\n<b>Сравнение с другими simple сортировками O(n²):</b>\n<pre><code>Алгоритм         | Best  | Avg   | Worst | Space | Stable\n─────────────────┼───────┼───────┼───────┼───────┼────────\nBubble Sort      | O(n)  | O(n²) | O(n²) | O(1)  | ✅\nSelection Sort   | O(n²) | O(n²) | O(n²) | O(1)  | ❌\nInsertion Sort   | O(n)  | O(n²) | O(n²) | O(1)  | ✅</code></pre>\n\n<b>Insertion Sort</b> — обычно быстрее bubble на практике:\n<pre><code>void insertionSort(int[] arr) {\n    for (int i = 1; i &lt; arr.length; i++) {\n        int key = arr[i];\n        int j = i - 1;\n        while (j &gt;= 0 &amp;&amp; arr[j] &gt; key) {\n            arr[j + 1] = arr[j];\n            j--;\n        }\n        arr[j + 1] = key;\n    }\n}\n// Отлично работает на почти отсортированных данных</code></pre>\n\n<b>Почему пузырьковая не используется в production:</b>\n• <b>O(n²)</b> — медленнее чем O(n log n) на больших данных\n• JDK использует <b>TimSort</b> для объектов, <b>Dual-Pivot QuickSort</b> для примитивов\n\n<b>Когда всё же использовать bubble:</b>\n• Обучение алгоритмам\n• Очень маленькие массивы (n &lt; 10) — простота кода важнее скорости\n• Когда нужна максимальная простота реализации\n• На собеседовании если спросят\n\n<b>Сравнение с O(n log n) алгоритмами:</b>\n<pre><code>n = 1000:\n  Bubble:    ~500,000 операций\n  QuickSort: ~10,000 операций\n  50x разница\n\nn = 1,000,000:\n  Bubble:    ~500 миллиардов (минуты)\n  QuickSort: ~20 миллионов (миллисекунды)\n  25,000x разница!</code></pre>\n\n<b>Production-ready сортировки:</b>\n\n<b>QuickSort</b> — O(n log n) average, O(n²) worst\n<b>MergeSort</b> — O(n log n) always, stable, O(n) space\n<b>HeapSort</b> — O(n log n), O(1) space, not stable\n<b>TimSort</b> — hybrid (merge + insertion), default в Java, Python\n<b>RadixSort</b> — O(nk) для чисел фиксированной длины\n\n<b>Java встроенные:</b>\n<pre><code>Arrays.sort(primitives);          // Dual-Pivot QuickSort\nArrays.sort(objects);              // TimSort (stable, O(n log n))\nCollections.sort(list);            // TimSort\nlist.sort(Comparator.naturalOrder());\n\n// Параллельная (многопоточная)\nArrays.parallelSort(arr);          // O(n log n / p), p = threads</code></pre>\n\n<b>Классический вопрос на собесе:</b>\n«Реализуй пузырьковую сортировку» — проверяет базу. Часто продолжают: «а как оптимизировать?», «а какая сложность в лучшем случае?», «какая используется в Java?».\n\n<b>На собесе:</b>\n• Сложность в лучшем/худшем случае? (O(n) с early exit / O(n²))\n• Стабильная? (да — равные элементы не переставляются)\n• Почему не используется в production? (O(n²) слишком медленно)\n• Что быстрее: Bubble, Selection, Insertion? (Insertion обычно)\n• Какая сортировка в Java по умолчанию? (TimSort для объектов, Dual-Pivot QS для примитивов)',lvl:2},
    {q:'Общий элемент в трёх коллекциях',a:'Классическая задача на работу с коллекциями. Несколько подходов с разной сложностью.\n\n<b>1. HashSet.retainAll — самый простой:</b>\n<pre><code>public Set&lt;Integer&gt; commonElements(List&lt;Integer&gt; list1,\n                                    List&lt;Integer&gt; list2,\n                                    List&lt;Integer&gt; list3) {\n    Set&lt;Integer&gt; common = new HashSet&lt;&gt;(list1);\n    common.retainAll(list2); // удалить всё, чего нет в list2\n    common.retainAll(list3); // удалить всё, чего нет в list3\n    return common;\n}\n\n// Time: O(n1 + n2 + n3) average\n// Space: O(n1) — для set\n// retainAll для HashSet — O(n) — проверка каждого элемента other.contains(e)</code></pre>\n\n<b>2. Stream API — функциональный:</b>\n<pre><code>public List&lt;Integer&gt; commonElements(List&lt;Integer&gt; l1, List&lt;Integer&gt; l2, List&lt;Integer&gt; l3) {\n    Set&lt;Integer&gt; set2 = new HashSet&lt;&gt;(l2); // O(n2) — для быстрого contains\n    Set&lt;Integer&gt; set3 = new HashSet&lt;&gt;(l3); // O(n3)\n\n    return l1.stream()\n        .distinct()\n        .filter(set2::contains)\n        .filter(set3::contains)\n        .toList();\n}\n// Time: O(n1 + n2 + n3)</code></pre>\n\n<b>3. Java 8+ Collectors / Sets:</b>\n<pre><code>// Если часто нужно пересечение — можно библиотеку Guava:\nimport com.google.common.collect.Sets;\n\nSet&lt;Integer&gt; common = Sets.intersection(\n    Sets.intersection(Set.copyOf(l1), Set.copyOf(l2)),\n    Set.copyOf(l3));</code></pre>\n\n<b>4. Отсортированные коллекции — два указателя:</b>\n<pre><code>// Если списки ОТСОРТИРОВАНЫ — можно без HashSet (O(1) space)\npublic List&lt;Integer&gt; commonSorted(int[] a, int[] b, int[] c) {\n    List&lt;Integer&gt; result = new ArrayList&lt;&gt;();\n    int i = 0, j = 0, k = 0;\n    while (i &lt; a.length &amp;&amp; j &lt; b.length &amp;&amp; k &lt; c.length) {\n        if (a[i] == b[j] &amp;&amp; b[j] == c[k]) {\n            result.add(a[i]);\n            i++; j++; k++;\n        } else if (a[i] &lt; b[j]) i++;\n        else if (b[j] &lt; c[k]) j++;\n        else k++;\n    }\n    return result;\n}\n// Time: O(n1 + n2 + n3)\n// Space: O(1) не считая результата</code></pre>\n\n<b>5. Для большого числа коллекций:</b>\n<pre><code>public &lt;T&gt; Set&lt;T&gt; intersectAll(List&lt;? extends Collection&lt;T&gt;&gt; collections) {\n    if (collections.isEmpty()) return Set.of();\n    Set&lt;T&gt; result = new HashSet&lt;&gt;(collections.get(0));\n    for (int i = 1; i &lt; collections.size(); i++) {\n        result.retainAll(collections.get(i));\n        if (result.isEmpty()) break; // оптимизация\n    }\n    return result;\n}</code></pre>\n\n<b>6. Если нужно с частотами (мультимножество):</b>\n<pre><code>// Допустим нужно вернуть элементы, которые есть минимум K раз во всех списках\nMap&lt;Integer, Integer&gt; counts = new HashMap&lt;&gt;();\nSet&lt;Integer&gt; uniqueInList1 = new HashSet&lt;&gt;(list1);\nfor (int x : uniqueInList1) counts.merge(x, 1, Integer::sum);\n// ... для list2, list3\n\ncounts.entrySet().stream()\n    .filter(e -&gt; e.getValue() == 3) // во всех 3 списках\n    .map(Map.Entry::getKey)\n    .toList();</code></pre>\n\n<b>Производительность сравнение:</b>\n<pre><code>n = 10,000, 3 списка:\n  retainAll:    ~5 ms\n  Stream:       ~7 ms\n  Отсортированные + 2 указателя: ~3 ms\n  Вложенные циклы O(n³): ~1000 минут! (не делать)</code></pre>\n\n<b>Ошибочные подходы:</b>\n<pre><code>// ❌ O(n³) — вложенные циклы\nfor (int x : list1)\n    if (list2.contains(x) &amp;&amp; list3.contains(x)) // O(n²) каждая!\n        result.add(x);\n// list.contains() на ArrayList = O(n)\n// Итого O(n³) — катастрофа на n&gt;1000</code></pre>\n\n<b>Граничные случаи:</b>\n• Пустые списки — результат пустой\n• Дубликаты внутри одного списка — результат уникальный (Set)\n• Очень большие списки — Set может не влезть в память → streaming approach\n\n<b>На собесе:</b>\n• Сложность HashSet.contains? (O(1) average)\n• Зачем HashSet&lt;&gt;(list) на каждом шаге? (чтобы contains был O(1), а не O(n))\n• Если списки отсортированы, как быстрее? (3 указателя, O(n))\n• А если 100 списков? (intersect по очереди, с optimization break if empty)\n• Что вернуть — Set или List? (Set если дубли не важны; List если порядок важен)',lvl:2},

    {q:'Найти недостающее число в массиве 1..N',a:'<pre><code>// Сумма арифметической прогрессии\nint missing(int[] arr, int n) {\n    int expected = n * (n + 1) / 2;\n    int actual = Arrays.stream(arr).sum();\n    return expected - actual;\n}\n\n// XOR (не будет overflow)\nint missing(int[] arr, int n) {\n    int xor = 0;\n    for (int i = 1; i <= n; i++) xor ^= i;\n    for (int a : arr) xor ^= a;\n    return xor;\n}</code></pre>',lvl:2},

    {q:'== vs equals()',a:'<b><code>==</code></b> — сравнивает <b>значения примитивов</b> или <b>ссылки</b> для объектов (указывают ли переменные на один и тот же объект в памяти).\n\n<b><code>equals()</code></b> — сравнивает <b>логическое содержимое</b> объектов. По умолчанию в Object == сравнению ссылок, но обычно переопределяется.\n\n<b>Примеры:</b>\n<pre><code>// Примитивы — просто значения\nint a = 5, b = 5;\nSystem.out.println(a == b); // true\n\n// Обёртки — Integer cache для значений -128..127\nInteger x = 127, y = 127;\nSystem.out.println(x == y); // true (из кеша)\nSystem.out.println(x.equals(y)); // true\n\nInteger x2 = 128, y2 = 128;\nSystem.out.println(x2 == y2); // false! новые объекты\nSystem.out.println(x2.equals(y2)); // true\n\n// Строки и String Pool\nString s1 = "hello";\nString s2 = "hello";\nSystem.out.println(s1 == s2); // true (обе ссылки на Pool)\n\nString s3 = new String("hello");\nSystem.out.println(s1 == s3); // false (s3 — новый объект в heap)\nSystem.out.println(s1.equals(s3)); // true\n\nString s4 = s3.intern(); // получить ссылку из Pool\nSystem.out.println(s1 == s4); // true</code></pre>\n\n<b>Почему это важно на собесе:</b> одна из самых частых багов — сравнение строк через <code>==</code>, которое работает случайно для строковых литералов и падает для <code>new String()</code> или <code>String.valueOf()</code>.\n\n<b>Правило:</b>\n• Примитивы → <code>==</code>\n• Объекты → <code>equals()</code> (всегда <code>Objects.equals(a, b)</code> — null-safe)\n• Enum → <code>==</code> работает и быстрее (каждое значение — singleton)\n• Сравнение ссылок как таковых → <code>==</code> (проверка тот же ли это объект)\n\n<b>Контракт equals:</b>\n• Рефлексивность: <code>x.equals(x) == true</code>\n• Симметричность: <code>x.equals(y) == y.equals(x)</code>\n• Транзитивность: <code>x.equals(y) && y.equals(z) ⇒ x.equals(z)</code>\n• Согласованность: результат не меняется при отсутствии изменений\n• <code>x.equals(null) == false</code>\n\nЕсли переопределяешь equals — ОБЯЗАТЕЛЬНО переопределяй hashCode.',hot:1,lvl:2},
    {q:'Как создать immutable объект?',a:'<b>Immutable объект</b> — объект, состояние которого невозможно изменить после создания. Примеры в JDK: <code>String</code>, <code>Integer</code>, <code>LocalDate</code>, <code>BigDecimal</code>.\n\n<b>Правила создания:</b>\n\n<b>1. Класс <code>final</code></b> — запрет наследования (иначе подкласс может добавить mutable состояние)\n\n<b>2. Все поля <code>private final</code></b>\n\n<b>3. Нет setters</b>, только конструктор\n\n<b>4. Defensive copy для mutable полей</b> — в конструкторе и getter\'ах не отдавать наружу ссылки на внутренние mutable коллекции/массивы\n\n<b>5. Если содержит ссылки на другие объекты — эти объекты тоже должны быть immutable</b> (или их нельзя модифицировать извне)\n\n<b>Пример:</b>\n<pre><code>public final class Money {\n    private final BigDecimal amount;  // BigDecimal immutable\n    private final String currency;    // String immutable\n    private final List&lt;String&gt; tags; // List — mutable, нужна защита\n\n    public Money(BigDecimal amount, String currency, List&lt;String&gt; tags) {\n        this.amount = amount;\n        this.currency = currency;\n        this.tags = List.copyOf(tags); // defensive copy + unmodifiable\n    }\n\n    public BigDecimal getAmount() { return amount; }\n    public String getCurrency() { return currency; }\n    public List&lt;String&gt; getTags() { return tags; } // уже unmodifiable\n\n    // «Изменение» = новый объект\n    public Money add(Money other) {\n        if (!currency.equals(other.currency)) throw new IllegalArgumentException();\n        return new Money(amount.add(other.amount), currency, tags);\n    }\n}</code></pre>\n\n<b>С Java 14+ — records:</b>\n<pre><code>public record Money(BigDecimal amount, String currency, List&lt;String&gt; tags) {\n    // Compact constructor для валидации и defensive copy\n    public Money {\n        Objects.requireNonNull(amount);\n        tags = List.copyOf(tags);\n    }\n}\n// Record: автогенерация equals, hashCode, toString, getters, конструктора\n// Неявно final, все поля private final</code></pre>\n\n<b>Плюсы immutable:</b>\n• <b>Thread-safe из коробки</b> — нельзя изменить, значит нельзя испортить гонкой\n• <b>Безопасно использовать как ключ HashMap</b> (hashCode стабилен)\n• <b>Easy reasoning</b> — состояние не меняется, легче отлаживать\n• <b>Шаринг между потоками</b> без блокировок\n\n<b>Минусы:</b>\n• Каждая «модификация» — новый объект (GC-давление)\n• Оптимизация: <code>String</code> использует String Pool, <code>Integer</code> cache\n\n<b>Паттерн Builder</b> часто используется для создания immutable объектов с множеством полей.',hot:1,lvl:2},
    {q:'final vs finally vs finalize()',a:'Три совершенно разные вещи с похожими именами — классический вопрос на путаницу.\n\n<b><code>final</code> — модификатор:</b>\n\n• <b>final поле</b> — значение задаётся один раз (в объявлении, конструкторе или init-блоке). После — нельзя менять ссылку (но содержимое объекта можно, если он mutable).\n<pre><code>final int x = 5; // x = 6; // compile error\nfinal List&lt;String&gt; list = new ArrayList&lt;&gt;();\nlist.add("ok"); // работает — ссылка неизменна, содержимое менять можно</code></pre>\n\n• <b>final метод</b> — нельзя переопределить в подклассе.\n<pre><code>class Base { final void doIt() {} }\nclass Child extends Base { void doIt() {} } // compile error</code></pre>\n\n• <b>final класс</b> — нельзя наследовать (<code>String</code>, <code>Integer</code>, <code>LocalDate</code>).\n\n• <b>final параметр</b> — нельзя переприсвоить внутри метода (эффективно — final для лямбд/внутренних классов).\n\n• <b>Effectively final</b> (Java 8+) — переменная, которая не final, но не меняется. Можно использовать в лямбдах без явного final.\n\n<b><code>finally</code> — блок в try/catch:</b>\n\nВыполняется ВСЕГДА (кроме <code>System.exit()</code> и краха JVM) — даже при return, throw, continue внутри try.\n<pre><code>try {\n    return 1;\n} finally {\n    System.out.println("always");\n    // return 2; // перезапишет return из try! (плохая практика)\n}</code></pre>\nИспользуется для очистки ресурсов. С Java 7+ замещён <code>try-with-resources</code> для AutoCloseable.\n\n<b><code>finalize()</code> — метод Object:</b>\n\nВызывался GC перед очисткой объекта. Изначально для освобождения native ресурсов. Deprecated с Java 9, <b>удалён в Java 18</b>.\n\n<b>Почему не использовать:</b>\n• Нет гарантии вызова (может и не вызваться вообще)\n• Непредсказуемое время вызова\n• Замедляет GC\n• «Воскрешение» объектов (можно сохранить this в finalize — объект не освободится)\n• Скрывает исключения\n\n<b>Замена:</b>\n• <code>try-with-resources</code> + <code>AutoCloseable</code>\n• <code>java.lang.ref.Cleaner</code> (Java 9+)\n• <code>PhantomReference</code>\n\n<b>На собесе:</b> «что напечатает этот код?»\n<pre><code>try { return 1; } finally { return 2; }\n// 2 — finally перезаписывает return из try</code></pre>',hot:1,lvl:2},
    {q:'Что такое effectively final?',a:'Переменная, которая не изменяется после инициализации. Можно использовать в лямбдах/anonymous classes без явного final.\n\n<pre><code>String name = "John"; // effectively final\nRunnable r = () -> System.out.println(name); // OK\nname = "Jane"; // теперь НЕ effectively final → compile error в лямбде</code></pre>',lvl:2},

    {q:'Как HashMap обрабатывает коллизии?',a:'<b>Что такое коллизия:</b> разные ключи попадают в один и тот же бакет (одинаковый индекс в массиве). <code>index = (n - 1) & hash</code>, где <code>hash = key.hashCode() ^ (hashCode() >>> 16)</code>.\n\n<b>Устройство HashMap:</b>\n<pre><code>transient Node&lt;K,V&gt;[] table; // массив бакетов, по умолчанию 16\n\nstatic class Node&lt;K,V&gt; {\n    final int hash;\n    final K key;\n    V value;\n    Node&lt;K,V&gt; next; // связный список для коллизий\n}</code></pre>\n\n<b>До Java 8:</b> коллизии разрешались связным списком (separate chaining). Поиск по цепочке — O(n) в худшем случае.\n\n<b>С Java 8 — оптимизация:</b>\n• При коллизии сначала цепочка (LinkedList), как раньше\n• Если в одном бакете ≥ <code>TREEIFY_THRESHOLD = 8</code> элементов <b>И</b> размер таблицы ≥ <code>MIN_TREEIFY_CAPACITY = 64</code> — цепочка перестраивается в <b>красно-чёрное дерево</b> (TreeNode), поиск O(log n)\n• Если в бакете ≤ <code>UNTREEIFY_THRESHOLD = 6</code> — обратно в связный список (чтобы не тратить память на дерево при малом количестве элементов)\n• Если элементов ≥ 8 но таблица < 64 — вместо дерева делается <code>resize()</code> (удвоение таблицы), что обычно разбрасывает коллизии\n\n<b>Зачем дерево:</b> защита от hash-коллизий (в том числе намеренных — DoS-атак, когда подбираются ключи с одинаковым hashCode). В худшем случае деградация из O(n) в O(log n).\n\n<b>Load factor и resize:</b>\n• <code>loadFactor = 0.75</code> по умолчанию\n• Когда <code>size &gt; capacity * loadFactor</code> — <code>resize()</code>: удваивает capacity и перехэширует все элементы\n• При resize в Java 8 элементы с коллизиями делятся на 2 части: часть остаётся в старом индексе, часть переходит в <code>oldIndex + oldCapacity</code>\n\n<b>Что важно для ключей:</b>\n• <code>hashCode()</code> и <code>equals()</code> должны быть согласованы: если <code>a.equals(b)</code>, то <code>a.hashCode() == b.hashCode()</code>\n• Хороший <code>hashCode()</code> равномерно распределяет — мало коллизий\n• Для дерева ключи должны быть <code>Comparable</code> (иначе fallback к <code>System.identityHashCode</code>)\n\n<b>На собесе:</b> почему не всегда дерево? (оверхед памяти; дерево нужно только при плохом hashCode или атаке)',hot:1,lvl:2},
    {q:'Почему String хороший ключ HashMap?',a:'<b>4 причины:</b>\n\n<b>1. Immutable</b> — после создания String не меняется.\nЗначит, его <code>hashCode()</code> стабилен на протяжении всей жизни объекта. Ключ не может «потеряться» в HashMap.\n\n<pre><code>// Что будет с mutable ключом:\nclass MutablePerson {\n    String name;\n    public int hashCode() { return name.hashCode(); }\n    public boolean equals(Object o) { ... }\n}\n\nMap&lt;MutablePerson, String&gt; map = new HashMap&lt;&gt;();\nMutablePerson p = new MutablePerson("John");\nmap.put(p, "data");  // hash = hash("John")\n\np.name = "Jane";      // изменили ключ!\nmap.get(p);           // null! ищет в бакете hash("Jane"), а лежит в hash("John")</code></pre>\n\n<b>2. Кэшированный hashCode</b>\nВнутри String есть поле <code>hash</code>, которое вычисляется при первом вызове <code>hashCode()</code> и потом переиспользуется — O(1) вместо O(n) на каждый lookup.\n\n<pre><code>// Из исходников java.lang.String:\nprivate int hash; // Default to 0\npublic int hashCode() {\n    int h = hash;\n    if (h == 0 &amp;&amp; !value.isEmpty()) {\n        // Вычисляем: h = 31*h + value[i] для каждого char\n        hash = h;\n    }\n    return h;\n}</code></pre>\n\n<b>3. Корректно реализованные equals() и hashCode()</b>\n• <code>equals()</code> сравнивает посимвольно\n• <code>hashCode()</code> по проверенной формуле <code>s[0]*31^(n-1) + s[1]*31^(n-2) + ...</code>\n• Выполняется контракт: равные строки → равные hashCode\n• Хорошая дисперсия — мало коллизий\n\n<b>4. String Pool — оптимизация памяти</b>\nСтроковые литералы и <code>s.intern()</code> живут в общем пуле. Если использовать одни и те же ключи (статусы, коды), они ссылаются на один объект в памяти.\n<pre><code>String s1 = "ACTIVE";\nString s2 = "ACTIVE";\n// s1 == s2 — true, одна ссылка из String Pool\n// hashCode вычислен один раз, закэширован</code></pre>\n\n<b>Дополнительные плюсы:</b>\n• <b>Serialization</b> — легко сериализуется/десериализуется (для Redis, сетевых протоколов)\n• <b>Читаемость</b> — легко дебажить: в дампе видны осмысленные ключи\n• <b>Встроенность</b> — не нужно писать свой equals/hashCode\n• <b>Thread-safety</b> — immutable из коробки безопасен между потоками\n\n<b>Что важно понимать про hashCode String:</b>\nФормула <code>s[0]*31^(n-1) + ...</code> — выбор числа 31 не случаен:\n• Простое нечётное число\n• <code>31*x</code> можно оптимизировать как <code>(x &lt;&lt; 5) - x</code> (shift + вычитание)\n• Хорошо распределяет для английского текста\n\n<b>Подводные камни:</b>\n• Для очень длинных строк вычисление hashCode дорого — O(n). Но только первый раз, потом кэш.\n• <b>Hash flooding attack</b>: если ключи контролирует пользователь (например, JSON-параметры в запросе), злоумышленник может подобрать строки с одинаковым hashCode → деградация до O(n) на вставку. Защита в Java 8+: переход в tree при коллизиях ≥ 8.\n\n<b>Альтернативные ключи:</b>\n• <b>Long / Integer</b> — ещё лучше для числовых ID (меньше памяти, быстрее hashCode)\n• <b>UUID</b> — ОК, immutable\n• <b>Enum</b> — отлично! hashCode по identity, сравнение через ==\n• <b>Record</b> (Java 14+) — автосгенерированные equals/hashCode по всем полям\n\n<b>Что НЕ делать ключом:</b>\n• Mutable объекты (<code>ArrayList</code>, <code>StringBuilder</code>, свои mutable классы)\n• Объекты без переопределённых equals/hashCode (будет работать как identity)\n• Объекты, у которых поля могут меняться\n\n<b>На собесе:</b>\n• Почему mutable нельзя ключом? (hashCode меняется → элемент «теряется»)\n• Кэшируется ли hashCode у String? (да, при первом вызове)\n• Какой аналог String для собственного класса? (record + final или @Value от Lombok)',lvl:2},

    {q:'Как Spring создаёт proxy для @Transactional?',a:'<b>Идея:</b> @Transactional — это AOP-аспект. Spring оборачивает бин в прокси, который перед вызовом метода открывает транзакцию, а после — коммитит или откатывает.\n\n<b>Пошаговый процесс:</b>\n\n<b>1. Сканирование бинов</b>\nПри старте Spring находит все @Component/@Service/@Repository и регистрирует в BeanFactory.\n\n<b>2. BeanPostProcessor</b>\nПосле создания бина срабатывает <code>InfrastructureAdvisorAutoProxyCreator</code> (включается через <code>@EnableTransactionManagement</code>). Он проверяет: есть ли на классе или его методах <code>@Transactional</code>?\n\n<b>3. Создание proxy</b>\nЕсли да — бин оборачивается в proxy:\n\n<b>CGLIB proxy (default в Spring Boot):</b>\n<pre><code>// Spring генерирует подкласс в runtime через ASM\npublic class PaymentService$$SpringCGLIB$$0 extends PaymentService {\n    private PaymentService target;\n    private TransactionInterceptor interceptor;\n\n    @Override\n    public Payment process(Payment p) {\n        TransactionInfo txInfo = interceptor.openTransaction();\n        try {\n            Payment result = target.process(p);\n            interceptor.commit(txInfo);\n            return result;\n        } catch (Exception e) {\n            interceptor.rollback(txInfo, e);\n            throw e;\n        }\n    }\n}</code></pre>\n\n<b>JDK Dynamic Proxy</b> — альтернатива для классов, которые реализуют интерфейс:\n<pre><code>Proxy.newProxyInstance(classLoader, new Class[]{PaymentService.class},\n    (proxy, method, args) -&gt; {\n        // InvocationHandler: open TX, method.invoke(target), commit\n    });</code></pre>\nSpring Boot по умолчанию использует CGLIB: <code>spring.aop.proxy-target-class=true</code>.\n\n<b>4. Что перехватывает proxy:</b>\n• <b>До метода</b>: проверка propagation; Connection из DataSource; <code>conn.setAutoCommit(false)</code>; установка isolation level\n• <b>Метод</b> выполняется на <code>target</code>\n• <b>После метода</b>: если исключение — <code>conn.rollback()</code>; иначе — <code>conn.commit()</code>; закрытие Connection\n\n<b>5. Connection хранится в ThreadLocal</b>\n<code>TransactionSynchronizationManager</code> использует ThreadLocal, чтобы Connection был доступен всем DAO в том же потоке. Поэтому внутри @Transactional метода все JpaRepository/JdbcTemplate используют одну транзакцию.\n\n<b>🔴 Главная проблема: Self-invocation</b>\n<pre><code>@Service\npublic class OrderService {\n    public void outer() {\n        this.inner(); // @Transactional НЕ СРАБОТАЕТ — this = target, не proxy\n    }\n    @Transactional\n    public void inner() { /* ... */ }\n}</code></pre>\n\n<b>Решения self-invocation:</b>\n\n<b>а) Self-inject</b>\n<pre><code>@Service\npublic class OrderService {\n    @Autowired @Lazy private OrderService self;\n    public void outer() { self.inner(); } // через proxy\n    @Transactional public void inner() { }\n}</code></pre>\n\n<b>б) AopContext</b> (нужно <code>@EnableAspectJAutoProxy(exposeProxy = true)</code>)\n<pre><code>public void outer() {\n    ((OrderService) AopContext.currentProxy()).inner();\n}</code></pre>\n\n<b>в) Разнести в разные бины</b> — самое чистое решение\n\n<b>г) TransactionTemplate</b> (программная транзакция)\n<pre><code>tx.execute(status -&gt; { /* работа */ return null; });</code></pre>\n\n<b>Другие нюансы @Transactional:</b>\n• <b>Private методы</b> — не работают (proxy не может перехватить)\n• <b>Final методы в CGLIB</b> — не работают (нельзя override final)\n• <b>Rollback только для RuntimeException</b> по умолчанию! Для checked — <code>@Transactional(rollbackFor = Exception.class)</code>\n\n<b>Propagation</b> — поведение при вложенных @Transactional:\n• <b>REQUIRED</b> (default) — присоединиться или создать новую\n• <b>REQUIRES_NEW</b> — всегда новая (приостанавливает текущую)\n• <b>NESTED</b> — savepoint внутри текущей\n• <b>SUPPORTS</b>, <b>NOT_SUPPORTED</b>, <b>MANDATORY</b>, <b>NEVER</b>\n\n<b>На собесе:</b>\n• Почему не работает @Transactional на private? (proxy не видит)\n• Почему при this.method() @Transactional не срабатывает? (минует proxy)\n• CGLIB vs JDK dynamic proxy? (CGLIB — subclass, JDK — реализация интерфейса)',hot:1,lvl:2},
    {q:'Spring Boot Auto-configuration',a:'<b>Суть:</b> Spring Boot автоматически настраивает бины исходя из того, какие библиотеки в classpath и какие свойства заданы в <code>application.yml</code>.\n\n<b>Как это работает:</b>\n\n<b>1. @SpringBootApplication</b> = <code>@Configuration + @EnableAutoConfiguration + @ComponentScan</code>\n\n<b>2. @EnableAutoConfiguration</b> импортирует <code>AutoConfigurationImportSelector</code>, который читает <b>все файлы</b>:\n<pre><code>META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports</code></pre>\nиз всех JAR\'ов на classpath. Там перечислены имена классов автоконфигурации, например:\n<pre><code>org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration\norg.springframework.boot.autoconfigure.web.servlet.WebMvcAutoConfiguration\norg.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration</code></pre>\n\n<b>3. Каждый AutoConfiguration класс применяется условно:</b>\n<pre><code>@AutoConfiguration\n@ConditionalOnClass(KafkaTemplate.class) // если есть spring-kafka в classpath\n@EnableConfigurationProperties(KafkaProperties.class)\npublic class KafkaAutoConfiguration {\n\n    @Bean\n    @ConditionalOnMissingBean(KafkaTemplate.class) // если юзер не создал свой\n    public KafkaTemplate&lt;?, ?&gt; kafkaTemplate(\n            ProducerFactory&lt;Object, Object&gt; factory) {\n        return new KafkaTemplate&lt;&gt;(factory);\n    }\n\n    @Bean\n    @ConditionalOnMissingBean\n    public ProducerFactory&lt;?, ?&gt; kafkaProducerFactory(KafkaProperties props) {\n        return new DefaultKafkaProducerFactory&lt;&gt;(props.buildProducerProperties());\n    }\n}</code></pre>\n\n<b>Основные @Conditional аннотации:</b>\n• <code>@ConditionalOnClass</code> — если класс есть в classpath\n• <code>@ConditionalOnMissingClass</code> — если класса НЕТ\n• <code>@ConditionalOnBean</code> — если существует бин типа X\n• <code>@ConditionalOnMissingBean</code> — если бина нет (позволяет юзеру переопределить)\n• <code>@ConditionalOnProperty</code> — если задано property (например, <code>spring.kafka.enabled=true</code>)\n• <code>@ConditionalOnWebApplication</code> — только для web-приложений\n• <code>@ConditionalOnJava</code> — на конкретной версии Java\n• <code>@ConditionalOnResource</code> — если есть файл\n\n<b>Пример цепочки:</b>\n<pre><code># pom.xml / build.gradle\nspring-boot-starter-data-jpa + postgresql driver\n\n# application.yml\nspring.datasource.url: jdbc:postgresql://localhost:5432/db\nspring.datasource.username: user\nspring.datasource.password: pass\n\n# Spring Boot автоматически создаёт:\n# - DataSource (HikariCP)\n# - EntityManagerFactory (Hibernate)\n# - PlatformTransactionManager\n# - JdbcTemplate\n# - @Repository бины (сканирует интерфейсы JpaRepository)</code></pre>\n\n<b>Отладка auto-configuration:</b>\n<pre><code># Запустить с --debug или\nlogging.level.org.springframework.boot.autoconfigure: DEBUG\n\n# Actuator endpoint:\nGET /actuator/conditions\n# Покажет PositiveMatches / NegativeMatches — что применилось и что нет и почему</code></pre>\n\n<b>Как переопределить:</b> просто создать свой бин того же типа (@Bean в @Configuration) — сработает <code>@ConditionalOnMissingBean</code>.\n\n<b>Как выключить конкретный auto-config:</b>\n<pre><code>@SpringBootApplication(exclude = {DataSourceAutoConfiguration.class})\n// или в application.yml:\nspring.autoconfigure.exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration</code></pre>\n\n<b>Написать свой starter:</b> создать JAR с <code>@AutoConfiguration</code> классами + файл <code>AutoConfiguration.imports</code> в <code>META-INF/spring/</code>.\n\n<b>На собесе:</b> как ты дебажишь проблему «почему бин не создался»? (/actuator/conditions, --debug).',hot:1,lvl:2},
    {q:'Какие паттерны используются в Spring?',a:'Spring — это галерея классических GoF-паттернов и enterprise-паттернов.\n\n<b>Полная таблица:</b>\n<pre><code>Паттерн               | Где в Spring\n──────────────────────┼────────────────────────────────────────\nSingleton             | Бины по умолчанию (один на контекст)\nPrototype             | @Scope("prototype")\nFactory Method        | @Bean-методы в @Configuration\nAbstract Factory      | BeanFactory, ApplicationContext\nFactory               | FactoryBean&lt;T&gt;\nProxy                 | AOP (@Transactional, @Async, @Cacheable)\nTemplate Method       | JdbcTemplate, RestTemplate, KafkaTemplate\nObserver              | ApplicationEventPublisher, @EventListener\nStrategy              | Разные implementations одного интерфейса\nFront Controller      | DispatcherServlet\nDependency Injection  | @Autowired, constructor injection\nInversion of Control  | IoC-контейнер — основа всего Spring\nDecorator             | BeanPostProcessor (оборачивает бины)\nAdapter               | HandlerAdapter\nBuilder               | UriComponentsBuilder, WebClient.builder()\nChain of Resp.        | Servlet FilterChain, Security Filter Chain\n\n// Enterprise паттерны:\nDAO                   | @Repository, JpaRepository\nService Layer         | @Service\nUnit of Work          | EntityManager + @Transactional\nDomain Event          | ApplicationEventPublisher\nSpecification         | Spring Data Specification&lt;T&gt;</code></pre>\n\n<b>Подробные примеры топ-5:</b>\n\n<b>1. Singleton</b>\n<pre><code>@Service // scope=singleton по умолчанию\npublic class PaymentService { }</code></pre>\n\n<b>2. Proxy (AOP)</b>\n<pre><code>@Transactional // Spring оборачивает бин в CGLIB-proxy\npublic Payment process(...) { }</code></pre>\n\n<b>3. Template Method</b>\n<pre><code>jdbcTemplate.query("SELECT * FROM users WHERE id = ?",\n    (rs, n) -&gt; new User(rs.getLong(1), rs.getString(2)),\n    id);\n// Скрыто: connection, statement, exception handling, close</code></pre>\n\n<b>4. Observer (Events)</b>\n<pre><code>// Publisher\npublisher.publishEvent(new OrderCreatedEvent(order));\n\n// Subscriber\n@TransactionalEventListener(phase = AFTER_COMMIT)\npublic void handle(OrderCreatedEvent e) { /* ... */ }</code></pre>\n\n<b>5. Strategy</b>\n<pre><code>@Autowired List&lt;PaymentStrategy&gt; strategies;\n// Spring инжектит ВСЕ реализации PaymentStrategy\npublic PaymentResult process(PaymentRequest req) {\n    return strategies.stream()\n        .filter(s -&gt; s.supports(req.getType()))\n        .findFirst().orElseThrow().process(req);\n}</code></pre>\n\n<b>На собесе (классический вопрос):</b>\n«Назовите 5 паттернов в Spring»:\n1. Singleton — бины\n2. Proxy — AOP (@Transactional)\n3. Factory — BeanFactory, @Bean\n4. Template Method — JdbcTemplate\n5. Observer — ApplicationEvent',hot:1,lvl:2},

    {q:'Консистентность между микросервисами?',a:'<b>Проблема:</b> в распределённой системе нельзя использовать ACID-транзакции БД поверх нескольких сервисов. Один сервис сохранил, другой упал — данные рассинхронизированы.\n\n<b>Подходы по убыванию строгости:</b>\n\n<b>1. Strong consistency через 2PC (Two-Phase Commit)</b> — редко используется.\n<pre><code>Coordinator:\n  PREPARE -> все сервисы\n  если все OK -> COMMIT\n  если кто-то NO -> ROLLBACK</code></pre>\nМинусы: блокировки, если координатор упал — подвисшие транзакции, низкая производительность. Не подходит для веб-масштабов.\n\n<b>2. Saga + компенсации</b> — стандарт де-факто в микросервисах.\n<pre><code>1. Order created\n2. Payment charged\n3. Inventory reserved\n4. If fail -> запустить компенсации в обратном порядке\n   refundPayment(), cancelOrder()</code></pre>\n• Хореография (через Kafka events)\n• Оркестрация (через Camunda/Temporal)\n\n<b>3. Transactional Outbox</b> — надёжная публикация событий.\n<pre><code>// Всё в одной транзакции БД:\nBEGIN;\nINSERT INTO orders (...) VALUES (...);\nINSERT INTO outbox (event_type, payload) VALUES (\\\'OrderCreated\\\', ...);\nCOMMIT;\n\n// Отдельный процесс читает outbox и публикует в Kafka\n// Гарантия: событие опубликовано ⇔ данные сохранены</code></pre>\nРешает проблему «сохранил в БД, но не смог отправить в Kafka».\n\n<b>4. Event Sourcing</b> — храним все события, состояние = replay.\nПо своей сути консистентно: источник правды — последовательность событий.\n\n<b>5. Eventual consistency</b> — принимаем, что разные сервисы могут видеть разное состояние короткое время, но в итоге сходятся.\n<pre><code>Order Service: saved\n    -> Kafka event\nAnalytics Service: получит через 100мс\nSearch Service: получит через 500мс</code></pre>\nКогда допустимо: аналитика, поиск, уведомления.\nКогда нет: деньги — там нужна strong consistency.\n\n<b>Ключевые техники:</b>\n\n<b>Idempotency keys</b> — клиент передаёт уникальный ключ, сервис гарантирует, что дубликаты обрабатываются как один запрос. Критично для платежей.\n<pre><code>POST /payments\nIdempotency-Key: uuid-1234\n// Если повторить с тем же ключом — вернёт тот же результат</code></pre>\n\n<b>Retry с exponential backoff + jitter</b> — для временных сбоев.\n\n<b>Dead Letter Queue (DLQ)</b> — сообщения, которые не удалось обработать, идут в отдельную очередь для ручного разбора.\n\n<b>CDC (Change Data Capture)</b> — Debezium читает WAL Postgres и публикует в Kafka.\n\n<b>На практике в финтехе:</b>\n• Платежи сами по себе — strong consistency (одна БД)\n• Нотификации пользователю — eventual (Kafka)\n• Аналитика — eventual (CDC в DWH)\n• Баланс — через Saga с outbox\n\n<b>На собесе:</b> «как гарантируешь, что деньги не списались дважды при повторе платежа?» — Idempotency-Key + UNIQUE constraint на (merchant_id, idempotency_key).',hot:1,lvl:2},
    {q:'REST API best practices',a:'<b>Представление ресурсов (не действий) через URL:</b>\n<pre><code>Плохо: POST /createUser, POST /getUser?id=1\nХорошо:\n  POST   /users           — создать\n  GET    /users           — список\n  GET    /users/123       — один\n  PUT    /users/123       — полная замена\n  PATCH  /users/123       — частичное обновление\n  DELETE /users/123       — удалить</code></pre>\n\n<b>Правильные HTTP методы и их семантика:</b>\n\n| Метод | Безопасный | Идемпотентный |\n|-------|-----------|----------------|\n| GET | ✅ | ✅ |\n| HEAD | ✅ | ✅ |\n| PUT | ❌ | ✅ |\n| DELETE | ❌ | ✅ |\n| POST | ❌ | ❌ |\n| PATCH | ❌ | ❌ (обычно) |\n\nБезопасный = не меняет состояние. Идемпотентный = повтор даёт тот же результат.\n\n<b>Правильные статус-коды:</b>\n• <b>200 OK</b> — успех (GET, PUT, PATCH)\n• <b>201 Created</b> — создан ресурс (POST) + Location header\n• <b>204 No Content</b> — успех без тела ответа (DELETE)\n• <b>400 Bad Request</b> — ошибка клиента (валидация)\n• <b>401 Unauthorized</b> — не аутентифицирован\n• <b>403 Forbidden</b> — аутентифицирован, но нет прав\n• <b>404 Not Found</b>\n• <b>409 Conflict</b> — конфликт состояния (дубликат)\n• <b>422 Unprocessable Entity</b> — валидация на уровне бизнес-логики\n• <b>429 Too Many Requests</b> — rate limit\n• <b>500 Internal Server Error</b> — ошибка сервера\n• <b>503 Service Unavailable</b> — временно недоступен (retry позднее)\n\n<b>Версионирование API:</b>\n• URL path: <code>/v1/users</code> (наглядно, но нарушает Cool URIs)\n• Header: <code>API-Version: 1</code>\n• Accept header: <code>Accept: application/vnd.company.v2+json</code>\n\n<b>Фильтрация, сортировка, пагинация:</b>\n<pre><code>GET /orders?status=PAID&amp;sort=-createdAt&amp;page=2&amp;size=20</code></pre>\nВ ответе — метаданные:\n<pre><code>{\n  "data": [...],\n  "pagination": {"page":2, "size":20, "total":456, "totalPages":23}\n}</code></pre>\n\n<b>Idempotency-Key</b> для неидемпотентных методов (POST):\n<pre><code>POST /payments\nIdempotency-Key: 7a2b3c4d-...\n// Повтор с тем же ключом = тот же результат</code></pre>\n\n<b>HATEOAS (опционально):</b> ссылки на связанные ресурсы в ответе.\n<pre><code>{\n  "id": 123, "status": "PENDING",\n  "_links": {\n    "self": {"href": "/orders/123"},\n    "cancel": {"href": "/orders/123/cancel"},\n    "items": {"href": "/orders/123/items"}\n  }\n}</code></pre>\n\n<b>6 принципов REST (Roy Fielding, 2000):</b>\n<b>1. Client-Server</b> — разделение ответственности\n<b>2. Stateless</b> — каждый запрос самодостаточен (нет server state)\n<b>3. Cacheable</b> — клиент может кэшировать ответы (Cache-Control, ETag)\n<b>4. Uniform Interface</b> — единый способ взаимодействия\n<b>5. Layered System</b> — клиент не видит всю цепочку серверов (прокси, LB)\n<b>6. Code on Demand</b> (опционально) — сервер может отдавать исполняемый код\n\n<b>Безопасность:</b>\n• HTTPS обязательно\n• Аутентификация: Bearer token (JWT) в Authorization header\n• Валидация всего на сервере\n• Rate limiting\n• CORS корректно настроен\n\n<b>Формат ошибок (RFC 7807 Problem Details):</b>\n<pre><code>{\n  "type": "https://api.example.com/errors/validation",\n  "title": "Validation failed",\n  "status": 400,\n  "detail": "Field email is invalid",\n  "instance": "/users/123"\n}</code></pre>',hot:1,lvl:2},
    {q:'Как оптимизировать медленный сервис?',a:'<b>Правило №1: сначала измерь, потом оптимизируй.</b> «Premature optimization is the root of all evil» — Donald Knuth.\n\n<b>Шаг 1. Диагностика — найти узкое место</b>\n\n<b>Метрики приложения:</b>\n• <code>/actuator/metrics</code> — latency (p50/p95/p99), throughput, error rate\n• Prometheus + Grafana — дашборды по сервисам\n• APM (Application Performance Monitoring): Jaeger, Zipkin, New Relic, Datadog\n\n<b>Профилирование CPU/памяти:</b>\n<pre><code>// Async-profiler (flame graphs) — лучший выбор\n./profiler.sh -d 60 -f flame.html &lt;pid&gt;\n\n// JFR (Java Flight Recorder) — встроенный в JDK\njcmd &lt;pid&gt; JFR.start duration=60s filename=app.jfr</code></pre>\n\n<b>Thread dump при зависаниях:</b>\n<pre><code>jstack &lt;pid&gt; &gt; threads.txt\n// Ищем: BLOCKED, WAITING в нетривиальных местах</code></pre>\n\n<b>Шаг 2. База данных — обычно 80% проблем тут</b>\n\n• <b>Медленные запросы</b> — <code>EXPLAIN ANALYZE</code>, проверить план (Seq Scan на больших таблицах = нет индекса)\n• <b>Индексы</b> — B-tree на WHERE/JOIN/ORDER BY полях; composite для multi-column; partial для фильтрованных данных\n• <b>N+1 problem</b> — частая беда с Hibernate. Решения: <code>@EntityGraph</code>, <code>JOIN FETCH</code>, <code>@BatchSize</code>\n• <b>Connection pool</b> — HikariCP (default в Spring Boot); размер: 2× (num_CPU_cores) + 1\n• <b>Read replicas</b> — разнести чтение и запись\n• <b>Денормализация</b> — материализованные views для сложных аналитических запросов\n\n<b>Шаг 3. Кеширование</b>\n\n• <b>In-process cache</b>: Caffeine (Java 8+, Google Guava-style) — для частых чтений одного JVM\n• <b>Distributed cache</b>: Redis — для данных, общих между инстансами\n• <b>HTTP cache</b>: Cache-Control, ETag на уровне nginx/gateway\n• <b>CDN</b>: для статики\n\n<pre><code>@Cacheable(value = "users", key = "#id")\npublic User getUser(Long id) { return repo.findById(id).orElseThrow(); }\n\n@CacheEvict(value = "users", key = "#user.id")\npublic void updateUser(User user) { repo.save(user); }</code></pre>\n\n<b>Шаг 4. Асинхронность и параллелизм</b>\n\n• <b>Kafka</b> — разгрузить медленные операции (отправка email, запись в БД аналитики)\n• <b>CompletableFuture / parallelStream</b> — параллельные вызовы внешних API\n• <b>@Async</b> — выполнить в другом потоке (нужен <code>@EnableAsync</code>)\n• <b>Virtual Threads</b> (Java 21+) — для I/O-bound задач: можно иметь миллионы «потоков»\n• <b>WebFlux (reactive)</b> — если bottleneck — I/O и много параллельных запросов\n\n<pre><code>// Параллельно вызовы вместо последовательных\nCompletableFuture&lt;User&gt; userFuture = CompletableFuture.supplyAsync(() -&gt; getUser(id));\nCompletableFuture&lt;Orders&gt; ordersFuture = CompletableFuture.supplyAsync(() -&gt; getOrders(id));\nCompletableFuture&lt;Profile&gt; profileFuture = CompletableFuture.supplyAsync(() -&gt; getProfile(id));\nCompletableFuture.allOf(userFuture, ordersFuture, profileFuture).join();\n// Было: 300ms (100+100+100), стало: ~100ms</code></pre>\n\n<b>Шаг 5. Код уровень</b>\n\n• <b>Алгоритмическая сложность</b> — O(n²) в цикле по миллиону — самоубийство; используй HashMap/HashSet\n• <b>Autoboxing</b> — в горячем коде используй примитивы, IntStream вместо Stream&lt;Integer&gt;\n• <b>Строки</b> — StringBuilder в циклах вместо <code>+</code>; избегай <code>replaceAll</code> в горячем пути\n• <b>Логирование</b> — не собирай тяжёлый toString() без проверки уровня: <code>if (log.isDebugEnabled()) log.debug(...)</code> или лямбда в SLF4J 2.x\n• <b>Сериализация</b> — Jackson быстрее Gson; protobuf/avro быстрее JSON\n\n<b>Шаг 6. JVM tuning</b>\n\n<pre><code>-Xms2g -Xmx2g              # одинаковые min/max — меньше resize\n-XX:+UseG1GC               # G1 — хороший default\n-XX:MaxGCPauseMillis=200   # целевая пауза GC\n-XX:+HeapDumpOnOutOfMemoryError\n-XX:HeapDumpPath=/var/log/app</code></pre>\n\n<b>Шаг 7. Масштабирование</b>\n\n• <b>Вертикальное</b> — больше CPU/RAM; быстрое, но потолок\n• <b>Горизонтальное</b> — больше инстансов; Kubernetes, stateless-дизайн, DB shards\n\n<b>Частые сценарии и решения:</b>\n\n| Симптом | Вероятная причина | Решение |\n|---------|------------------|---------|\n| Высокий p99, но p50 ок | GC паузы | Настроить GC, уменьшить heap |\n| Высокий CPU | Тяжёлые вычисления | Профилирование, алгоритмы |\n| Высокий I/O wait | Медленные запросы БД | Индексы, кэш, pool |\n| Memory leak (OOM) | Утечки | Heap dump, MAT |\n| Deadlocks, подвисания | Блокировки | Thread dump |\n| Много Http timeouts | Медленные downstream | Circuit breaker, timeout |\n\n<b>На собесе:</b>\n1. «Как начнёшь оптимизировать?» — «Сначала измерю, где тормозит»\n2. Конкретные инструменты (profiler, APM, EXPLAIN)\n3. От дешёвых к дорогим решениям: индекс → кэш → async → масштабирование\n4. Упомяни trade-offs: кэш ≠ всегда хорошо (инвалидация, eventual consistency)',hot:1,lvl:2},
    {q:'Отказоустойчивость',a:'<b>Fault tolerance</b> — способность системы продолжать работать при сбоях (частичных отказах, сети, БД, зависимостей).\n\n<b>Ключевые паттерны:</b>\n\n<b>1. Репликация и избыточность</b>\n• Несколько инстансов каждого сервиса (stateless → легко масштабировать)\n• Мастер + реплики БД (автофейловер)\n• Кросс-региональная репликация для disaster recovery\n\n<b>2. Circuit Breaker</b>\nКогда downstream сервис падает, быстро отказывать, а не ждать timeout.\n<pre><code>@CircuitBreaker(name = "paymentService", fallbackMethod = "fallback")\npublic PaymentResult charge(Payment p) {\n    return paymentClient.charge(p);\n}\npublic PaymentResult fallback(Payment p, Exception e) {\n    return PaymentResult.failed("Service unavailable");\n}</code></pre>\nСостояния: CLOSED (всё ок) → OPEN (сбой, не идём в downstream) → HALF_OPEN (пробуем) → CLOSED. Библиотеки: Resilience4j, Hystrix (deprecated).\n\n<b>3. Retry с exponential backoff + jitter</b>\nПовторять запросы с увеличивающимися паузами, рандомизировать чтобы не устроить thundering herd.\n<pre><code>@Retryable(\n    value = IOException.class,\n    maxAttempts = 3,\n    backoff = @Backoff(delay = 1000, multiplier = 2, random = true)\n)\npublic Data fetch() { return externalApi.get(); }</code></pre>\nRetry только для idempotent операций! Иначе деньги спишутся 3 раза.\n\n<b>4. Timeouts</b>\nВсе внешние вызовы должны иметь timeout (HTTP, DB, Kafka). Без таймаутов один медленный downstream убивает весь thread pool.\n<pre><code>WebClient.builder()\n    .baseUrl("https://api.example.com")\n    .build()\n    .get().uri("/data")\n    .retrieve()\n    .toEntity(String.class)\n    .timeout(Duration.ofSeconds(3))\n    .block();</code></pre>\n\n<b>5. Bulkhead (переборка, как на корабле)</b>\nИзолировать ресурсы: у медленного/падающего компонента свой thread pool, чтобы не забивать общий.\n<pre><code>@Bulkhead(name = "slow-api", type = Type.THREADPOOL)\npublic Data call() { }</code></pre>\n\n<b>6. Rate Limiting</b>\nОграничить запросы — защита от DDoS и от самого себя (saturation).\n• На уровне API Gateway (Spring Cloud Gateway, Kong)\n• Token bucket, leaky bucket алгоритмы\n\n<b>7. Graceful Shutdown</b>\nПри остановке сервиса:\n• Перестать принимать новые запросы (readiness probe = false)\n• Дождаться завершения текущих запросов (с timeout)\n• Закрыть соединения (БД, Kafka, HTTP)\n<pre><code># Spring Boot\nserver.shutdown: graceful\nspring.lifecycle.timeout-per-shutdown-phase: 30s</code></pre>\n\n<b>8. Health Checks</b>\n• <b>Liveness</b> — жив ли сервис (если нет — перезапустить)\n• <b>Readiness</b> — готов ли принимать трафик (зависимости доступны)\n• <b>Startup</b> — завершился ли старт\n<pre><code>management.endpoint.health.probes.enabled: true\n// GET /actuator/health/liveness\n// GET /actuator/health/readiness</code></pre>\n\n<b>9. Dead Letter Queue (DLQ)</b>\nСообщения, которые не удалось обработать N раз → в отдельную очередь для ручного разбора. Обязательно для Kafka/RabbitMQ.\n\n<b>10. Idempotency</b>\nПовтор операции с тем же ID даёт тот же результат. Критично при retry.\n<pre><code>POST /payments\nIdempotency-Key: uuid-1234\n// Повтор возвращает уже созданный платёж, не создаёт новый</code></pre>\n\n<b>11. Outbox Pattern</b>\nНадёжная публикация событий в Kafka: пишем в БД и в outbox таблицу в одной транзакции. Отдельный процесс читает outbox и публикует.\n\n<b>12. Chaos Engineering</b>\nПреднамеренно ломать production, чтобы проверить, что система выживает. Netflix Chaos Monkey.\n\n<b>13. Backup и Disaster Recovery</b>\n• Регулярные бэкапы БД (не только «у нас есть», но и регулярно <b>тестировать восстановление</b>)\n• RPO (Recovery Point Objective) — сколько данных можно потерять\n• RTO (Recovery Time Objective) — сколько времени на восстановление\n\n<b>14. Мониторинг и алёрты</b>\nДаже если нельзя предотвратить сбой — надо быстро узнать и отреагировать.\n• SLI (Service Level Indicator): latency, error rate, saturation\n• SLO (Objective): 99.9% uptime, p99 &lt; 500ms\n• SLA (Agreement): контракт с клиентом\n• Error budget: допустимый процент ошибок\n\n<b>Классификация сбоев:</b>\n• <b>Transient</b> — временные (сеть моргнула) → retry работает\n• <b>Permanent</b> — не пройдут от повтора (bug в коде, 4xx) → не retry\n• <b>Cascade</b> — один компонент тащит за собой другие → circuit breaker\n\n<b>Практика в финтехе:</b>\n• Платежи — idempotency-key обязательно\n• Retry на стороне клиента — с ограничением, чтобы не удвоить списание\n• Saga для распределённых операций\n• Настоящие платежи — 3 data center с репликацией\n\n<b>Spring Boot + Resilience4j:</b>\n<pre><code>resilience4j:\n  circuitbreaker:\n    instances:\n      paymentService:\n        slidingWindowSize: 100\n        failureRateThreshold: 50\n        waitDurationInOpenState: 10s\n  retry:\n    instances:\n      externalApi:\n        maxAttempts: 3\n        waitDuration: 1s</code></pre>\n\n<b>На собесе:</b> «что произойдёт, если БД упадёт на 5 секунд?» — должна отработать цепочка: timeout → circuit breaker → fallback; клиенты не видят ошибок, просто деградация (read-only mode, сообщение «попробуйте позже»).',hot:1,lvl:2},

    {q:'OAuth 2.0 и JWT',a:'<b>OAuth 2.0</b> — протокол делегированной авторизации. Позволяет приложениям получать доступ к ресурсам без передачи пароля пользователя.\n\n<b>Четыре роли:</b>\n• <b>Resource Owner</b> — пользователь (владелец данных)\n• <b>Client</b> — приложение, которое хочет доступ к данным\n• <b>Authorization Server</b> — выдаёт токены (Keycloak, Auth0, Okta)\n• <b>Resource Server</b> — API с данными (наш backend)\n\n<b>Основные Grant Types (способы получить токен):</b>\n\n<b>1. Authorization Code</b> — для web/mobile приложений с пользователем.\n<pre><code>1. User -> Client: "войти"\n2. Client -> Auth Server: redirect на /authorize\n3. User вводит логин/пароль у Auth Server\n4. Auth Server -> Client: redirect с authorization_code в URL\n5. Client (backend) -> Auth Server: POST /token\n     code=xxx, client_id, client_secret\n   <- access_token, refresh_token, id_token\n6. Client -> Resource Server: GET /api/data\n     Authorization: Bearer access_token</code></pre>\n\n<b>Authorization Code + PKCE</b> — обязательно для SPA и mobile (без client_secret).\n<pre><code>1. Client генерирует code_verifier (random string)\n2. code_challenge = SHA256(code_verifier)\n3. /authorize?code_challenge=... -> получает code\n4. /token с code + code_verifier -> получает access_token\n// Защита от перехвата code</code></pre>\n\n<b>2. Client Credentials</b> — для machine-to-machine (без пользователя).\n<pre><code>POST /token\n  grant_type=client_credentials\n  client_id=payment-service\n  client_secret=xxx\n-> access_token\n\n// Сервис A вызывает Сервис B</code></pre>\n\n<b>3. Refresh Token</b> — обновление access_token когда истёк.\n<pre><code>POST /token\n  grant_type=refresh_token\n  refresh_token=yyy\n-> новый access_token</code></pre>\n\n<b>4. Resource Owner Password</b> (устарел, не использовать) — клиент сам получает логин/пароль.\n\n<b>5. Implicit</b> (устарел, заменён на PKCE).\n\n<b>JWT (JSON Web Token)</b> — формат токена. Часто используется как access_token в OAuth.\n\n<b>Структура:</b> <code>Header.Payload.Signature</code> (Base64URL через точки)\n\n<pre><code>// Header\n{"alg":"RS256","typ":"JWT","kid":"key-1"}\n\n// Payload (claims)\n{\n  "iss": "https://auth.example.com",  // issuer\n  "sub": "user-123",                   // subject (user id)\n  "aud": "payment-api",                // audience\n  "exp": 1735689600,                   // expiration\n  "iat": 1735686000,                   // issued at\n  "jti": "unique-id",                  // JWT ID\n  "scope": "read write",\n  "roles": ["ADMIN", "USER"]\n}\n\n// Signature\nRSA_SHA256(base64(header) + "." + base64(payload), private_key)</code></pre>\n\n<b>Валидация JWT</b> (должен делать Resource Server):\n1. Проверить подпись публичным ключом от issuer\n2. Проверить <code>exp</code> — не истёк\n3. Проверить <code>iss</code> — правильный издатель\n4. Проверить <code>aud</code> — токен для нас\n5. (опционально) проверить <code>nbf</code> (not before)\n\n<b>Spring Boot как Resource Server:</b>\n<pre><code># application.yml\nspring:\n  security:\n    oauth2:\n      resourceserver:\n        jwt:\n          issuer-uri: https://keycloak.example.com/realms/app\n          # Spring автоматически:\n          # - получит /.well-known/openid-configuration\n          # - загрузит JWK keys\n          # - настроит валидатор</code></pre>\n\n<pre><code>@Configuration\npublic class SecurityConfig {\n    @Bean\n    public SecurityFilterChain chain(HttpSecurity http) throws Exception {\n        return http\n            .authorizeHttpRequests(auth -> auth\n                .requestMatchers("/admin/**").hasRole("ADMIN")\n                .requestMatchers("/api/**").authenticated()\n                .anyRequest().permitAll())\n            .oauth2ResourceServer(oauth -> oauth.jwt(Customizer.withDefaults()))\n            .build();\n    }\n}</code></pre>\n\n<b>JWT: access vs ID vs refresh token</b>\n• <b>access_token</b> — доступ к API (короткоживущий, 5-60 мин)\n• <b>id_token</b> (OIDC) — информация о пользователе (для клиента)\n• <b>refresh_token</b> — получение нового access_token (долгоживущий, храним secure)\n\n<b>OpenID Connect (OIDC)</b> — слой аутентификации поверх OAuth 2.0. Добавляет id_token и стандартные claims (name, email, picture).\n\n<b>Плюсы JWT:</b> stateless (сервер не хранит сессии), self-contained (не нужен лишний запрос в БД), легко масштабировать.\n<b>Минусы:</b> нельзя отозвать до истечения (нужен blacklist или короткий TTL), размер больше session ID, не хранить чувствительные данные (payload не зашифрован).\n\n<b>На собесе:</b>\n• Чем отличается Authorization Code от Client Credentials? (AC — пользователь; CC — сервис-сервис)\n• Как отозвать JWT? (короткий TTL + refresh_token; или jti blacklist в Redis)\n• Где хранить JWT на фронте? (httpOnly cookie лучше чем localStorage — защита от XSS)',hot:1,lvl:2},
    {q:'HTTPS, TLS, шифрование',a:'<b>HTTPS</b> = HTTP поверх <b>TLS</b> (Transport Layer Security). Обеспечивает конфиденциальность, целостность и аутентичность соединения.\n\n<b>Три свойства безопасного канала:</b>\n• <b>Confidentiality</b> — никто посторонний не прочитает данные (шифрование)\n• <b>Integrity</b> — данные не изменены по пути (MAC, hashes)\n• <b>Authenticity</b> — сервер действительно тот, кем представляется (сертификаты)\n\n<b>TLS Handshake</b> — как клиент и сервер договариваются:\n<pre><code>1. ClientHello\n   Client -&gt; Server: "поддерживаю TLS 1.3, эти cipher suites, random"\n\n2. ServerHello + Certificate\n   Server -&gt; Client: "выбран cipher suite, вот мой сертификат, random"\n\n3. Client проверяет сертификат\n   - подпись издателя (CA) валидна?\n   - доменное имя совпадает?\n   - не отозван (CRL/OCSP)?\n   - не истёк?\n\n4. Key Exchange (Diffie-Hellman / ECDHE)\n   Обе стороны генерируют общий секретный ключ,\n   используя свои private ключи и обмениваясь public.\n   Никто в середине не может вычислить этот ключ!\n\n5. Finished\n   Обмен данными теперь идёт симметричным шифрованием (AES).</code></pre>\n\n<b>Почему комбинация symmetric + asymmetric:</b>\n\n<b>Asymmetric (RSA, EC, Diffie-Hellman):</b>\n• Пара ключей: public (открытый) + private (секретный)\n• Зашифровано public → расшифрует только private\n• <b>МЕДЛЕННО</b> — 1000x медленнее symmetric\n• Используется ТОЛЬКО на handshake для обмена симметричным ключом\n\n<b>Symmetric (AES, ChaCha20):</b>\n• Один ключ для шифрования и расшифровки\n• <b>БЫСТРО</b> — аппаратное ускорение в CPU (AES-NI)\n• Используется для всех данных после handshake\n\nЭто даёт лучшее из двух миров: безопасный обмен ключами + быстрое шифрование потока.\n\n<b>Алгоритмы:</b>\n\n<b>Симметричные:</b>\n• <b>AES-128/256</b> — стандарт, используется везде\n• <b>ChaCha20</b> — альтернатива для систем без AES-NI\n• <b>DES, 3DES</b> — устарели, не использовать\n\n<b>Асимметричные:</b>\n• <b>RSA</b> — классика, размер ключа 2048-4096 бит\n• <b>ECC / ECDSA</b> — на эллиптических кривых, короче ключ (256 бит = 3072-bit RSA), быстрее\n• <b>DSA</b> — устарел\n\n<b>Key Exchange:</b>\n• <b>ECDHE</b> (Ephemeral Diffie-Hellman на эллиптических кривых) — рекомендуется. Даёт <b>Forward Secrecy</b>: компрометация long-term ключа не раскроет старые соединения\n• <b>RSA key exchange</b> — устарел, не даёт Forward Secrecy\n\n<b>Hash-функции:</b>\n• <b>SHA-256, SHA-384</b> — для подписей, MAC\n• <b>SHA-1, MD5</b> — устарели, небезопасны\n• <b>HMAC</b> — hash + secret key, для Message Authentication\n\n<b>Для паролей — ОСОБЫЕ функции:</b>\n<pre><code>// НЕ использовать для паролей:\nSHA-256(password)  // слишком быстро, легко брутфорсить\n\n// Использовать:\nbcrypt(password, cost=12)    // медленно специально, соль встроена\nscrypt(...)                  // memory-hard\nargon2id(...)                // современный выбор (OWASP recommended)\nPBKDF2(...)                  // FIPS-approved</code></pre>\n\n<b>Сертификаты (X.509):</b>\nСтруктура сертификата:\n• Subject — кому выдан (CN=example.com)\n• Issuer — кем выдан (CA)\n• Validity — срок действия\n• Public Key — открытый ключ\n• Signature — подпись CA\n• Extensions (SAN, key usage, CRL distribution points)\n\n<b>Цепочка доверия:</b>\n<pre><code>Root CA (self-signed, в trust store ОС)\n   └─ Intermediate CA\n        └─ End-entity cert (example.com)</code></pre>\n\n<b>Let\\\'s Encrypt</b> — бесплатный CA, автоматическая выдача через ACME-протокол. Сертификат на 90 дней, автопродление.\n\n<b>TLS 1.2 vs TLS 1.3:</b>\n• <b>TLS 1.3</b> (2018) — быстрее (1-RTT вместо 2-RTT), удалены слабые алгоритмы\n• TLS 1.2 — всё ещё ОК, но стоит переходить\n• TLS 1.0/1.1 — deprecated с 2021\n• SSL v2/v3 — давно запрещены\n\n<b>Уязвимости (исторические):</b>\n• <b>Heartbleed</b> (2014) — OpenSSL чтение памяти\n• <b>POODLE</b> — downgrade на SSL v3\n• <b>BEAST, CRIME, BREACH</b> — компрессия\n• <b>FREAK, Logjam</b> — export-grade crypto\n\n<b>mTLS (mutual TLS):</b> обе стороны проверяют сертификаты друг друга. Часто используется между микросервисами в service mesh для zero-trust.\n\n<b>Настройка HTTPS в Spring Boot:</b>\n<pre><code># application.yml\nserver:\n  port: 443\n  ssl:\n    enabled: true\n    key-store: classpath:keystore.p12\n    key-store-password: ${SSL_PASSWORD}\n    key-store-type: PKCS12\n    key-alias: tomcat</code></pre>\n\n<b>Certificate Pinning:</b> клиент запоминает fingerprint сертификата сервера, отказывается работать если изменился. Защита от MITM на уровне доверенного CA.\n\n<b>HSTS (HTTP Strict Transport Security):</b>\n<pre><code>Strict-Transport-Security: max-age=31536000; includeSubDomains; preload\n// Браузер запоминает на год, что этот сайт только HTTPS, SSL stripping не сработает</code></pre>\n\n<b>Private key — НИКОГДА не передавать по сети.</b> Храним в:\n• HSM (Hardware Security Module) — для production\n• KeyStore (JKS, PKCS12) — с паролем\n• Vault (HashiCorp), AWS KMS, Azure Key Vault\n• <b>НИКОГДА</b> в git!\n\n<b>На собесе:</b>\n• Почему не используется только asymmetric? (медленно, используется для key exchange)\n• Что такое Forward Secrecy? (компрометация ключа сейчас не раскроет прошлые сообщения)\n• Как проверить сертификат? (подпись CA, валидность, домен, revocation)\n• Как хранить пароли? (bcrypt/argon2, а не SHA)\n• Зачем mTLS? (двусторонняя аутентификация, zero-trust)',lvl:2},
  ]},
