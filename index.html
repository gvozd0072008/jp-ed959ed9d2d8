<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Java Interview Prep 2026</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Java Prep">
<meta name="theme-color" content="#0f1117">
<meta name="description" content="Java Developer Interview Preparation 2026">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="apple-touch-icon-precomposed" href="apple-touch-icon-precomposed.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="shortcut icon" href="apple-touch-icon.png">
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #242837;
  --bg4: #2e3347;
  --text: #e1e4ed;
  --text2: #9298b0;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --green: #00b894;
  --yellow: #fdcb6e;
  --red: #e17055;
  --orange: #f39c12;
  --blue: #74b9ff;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}
[data-theme="light"] {
  --bg: #f5f6fa;
  --bg2: #ffffff;
  --bg3: #eef0f6;
  --bg4: #dfe3ee;
  --text: #2d3436;
  --text2: #636e72;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}
button { cursor:pointer; border:none; background:none; color:inherit; font:inherit; }
input { font:inherit; color:inherit; }

/* Layout */
.app { display:flex; min-height:100vh; }
.sidebar {
  width: 260px;
  background: var(--bg2);
  border-right: 1px solid var(--bg3);
  padding: 20px 0;
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  overflow-y: auto;
  z-index: 100;
  transition: transform 0.3s;
}
.sidebar::-webkit-scrollbar { width:4px; }
.sidebar::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:4px; }
.main {
  flex:1;
  margin-left: 260px;
  padding: 20px;
  max-width: 900px;
}

/* Logo */
.logo {
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--bg3);
  margin-bottom: 12px;
}
.logo h1 { font-size:18px; font-weight:700; }
.logo span { color:var(--accent2); }
.logo p { font-size:12px; color:var(--text2); margin-top:2px; }

/* Nav */
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding: 10px 20px;
  font-size: 14px;
  transition: all 0.15s;
  border-left: 3px solid transparent;
  position: relative;
}
.nav-item:hover { background:var(--bg3); }
.nav-item.active { background:var(--bg3); border-left-color:var(--accent); color:var(--accent2); font-weight:600; }
.nav-icon { font-size:16px; width:22px; text-align:center; }
.nav-badge {
  margin-left:auto;
  font-size:11px;
  padding:2px 7px;
  border-radius:10px;
  background:var(--bg4);
  color:var(--text2);
}
.nav-progress {
  position:absolute; bottom:0; left:20px; right:20px; height:2px;
  background:var(--bg4); border-radius:1px;
}
.nav-progress-fill { height:100%; background:var(--green); border-radius:1px; transition:width 0.3s; }

/* Top bar */
.topbar {
  display:flex; align-items:center; gap:12px;
  margin-bottom:20px; flex-wrap:wrap;
}
.search-box {
  flex:1; min-width:200px;
  display:flex; align-items:center; gap:8px;
  background:var(--bg2); border:1px solid var(--bg3);
  border-radius:var(--radius); padding:10px 14px;
}
.search-box input {
  flex:1; border:none; background:none; outline:none;
  font-size:14px;
}
.search-box input::placeholder { color:var(--text2); }
.topbar-btn {
  padding:10px 14px;
  background:var(--bg2); border:1px solid var(--bg3);
  border-radius:var(--radius); font-size:13px;
  display:flex; align-items:center; gap:6px;
  transition:all 0.15s;
  white-space: nowrap;
}
.topbar-btn:hover { background:var(--bg3); }
.topbar-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.topbar-filters { display:flex; gap:8px; flex-wrap:wrap; }

/* Stats */
.stats {
  display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr));
  gap:12px; margin-bottom:24px;
}
.stat-card {
  background:var(--bg2); border-radius:var(--radius);
  padding:16px; text-align:center;
  border:1px solid var(--bg3);
}
.stat-num { font-size:28px; font-weight:700; }
.stat-label { font-size:12px; color:var(--text2); margin-top:2px; }
.stat-num.green { color:var(--green); }
.stat-num.yellow { color:var(--yellow); }
.stat-num.red { color:var(--red); }
.stat-num.accent { color:var(--accent2); }

/* Progress bar */
.progress-bar {
  width:100%; height:6px; background:var(--bg3);
  border-radius:3px; margin-bottom:20px; overflow:hidden;
  display:flex;
}
.progress-bar .seg-green { background:var(--green); transition:width 0.3s; }
.progress-bar .seg-yellow { background:var(--yellow); transition:width 0.3s; }

/* Section header */
.section-header {
  font-size:13px; font-weight:600; color:var(--text2);
  text-transform:uppercase; letter-spacing:1px;
  padding:12px 0 8px; margin-top:8px;
  border-bottom:1px solid var(--bg3);
}

/* Cards */
.card {
  background:var(--bg2);
  border:1px solid var(--bg3);
  border-radius:var(--radius);
  margin-bottom:10px;
  overflow:hidden;
  transition: all 0.15s;
}
.card:hover { border-color:var(--bg4); }
.card.status-known { border-left:3px solid var(--green); }
.card.status-learning { border-left:3px solid var(--yellow); }
.card.status-hard { border-left:3px solid var(--red); }
.card-q {
  padding:14px 16px;
  display:flex; align-items:center; gap:10px;
  cursor:pointer; user-select:none;
}
.card-q:active { background:var(--bg3); }
.card-q-text { flex:1; font-size:14px; font-weight:500; }
.card-arrow {
  font-size:12px; color:var(--text2);
  transition:transform 0.2s;
}
.card.open .card-arrow { transform:rotate(90deg); }
.card-a {
  max-height:0; overflow:hidden;
  transition: max-height 0.3s ease;
}
.card.open .card-a { max-height:5000px; }
.card-a-inner {
  padding:0 16px 14px;
  font-size:13px; line-height:1.7;
  color:var(--text2);
  border-top:1px solid var(--bg3);
  padding-top:14px;
}
.card-a-inner strong { color:var(--text); font-weight:600; }

/* Code blocks */
.card-a-inner pre {
  background:var(--bg); border:1px solid var(--bg3);
  border-radius:8px; padding:12px; margin:8px 0;
  overflow-x:auto; font-size:12px; line-height:1.5;
}
.card-a-inner code {
  font-family:'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  font-size:12px;
}
.card-a-inner :not(pre)>code {
  background:var(--bg3); padding:2px 6px; border-radius:4px;
}

/* Status buttons */
.card-actions {
  display:flex; gap:6px; padding:10px 16px;
  border-top:1px solid var(--bg3);
}
.status-btn {
  flex:1; padding:8px; border-radius:8px;
  font-size:12px; font-weight:500; text-align:center;
  transition:all 0.15s; border:1px solid var(--bg3);
}
.status-btn:hover { transform:scale(1.02); }
.status-btn.btn-hard { color:var(--red); }
.status-btn.btn-hard.selected { background:var(--red); color:#fff; border-color:var(--red); }
.status-btn.btn-learning { color:var(--yellow); }
.status-btn.btn-learning.selected { background:var(--yellow); color:#000; border-color:var(--yellow); }
.status-btn.btn-known { color:var(--green); }
.status-btn.btn-known.selected { background:var(--green); color:#fff; border-color:var(--green); }

/* Priority badges */
.badge {
  font-size:10px; padding:2px 8px; border-radius:10px;
  font-weight:600; white-space:nowrap;
}
.badge-hot { background:rgba(225,112,85,0.15); color:var(--red); }
.badge-mid { background:rgba(253,203,110,0.15); color:var(--yellow); }
.badge-l1 { background:rgba(0,184,148,0.15); color:var(--green); }
.badge-l2 { background:rgba(253,203,110,0.15); color:var(--yellow); }
.badge-l3 { background:rgba(225,112,85,0.15); color:var(--red); }


/* Quiz mode */
.quiz-overlay {
  position:fixed; inset:0; background:var(--bg);
  z-index:1000; display:none; flex-direction:column;
}
.quiz-overlay.active { display:flex; }
.quiz-header {
  padding:16px 20px; display:flex; align-items:center;
  gap:12px; border-bottom:1px solid var(--bg3);
}
.quiz-close { font-size:24px; padding:4px; }
.quiz-progress-text { margin-left:auto; font-size:13px; color:var(--text2); }
.quiz-body {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:20px; text-align:center;
}
.quiz-question {
  font-size:20px; font-weight:600; max-width:600px;
  margin-bottom:24px;
}
.quiz-topic { font-size:13px; color:var(--accent2); margin-bottom:12px; }
.quiz-reveal-btn {
  padding:14px 32px; background:var(--accent);
  color:#fff; border-radius:var(--radius);
  font-size:15px; font-weight:600;
  transition:all 0.15s;
}
.quiz-reveal-btn:hover { background:var(--accent2); }
.quiz-answer {
  max-width:700px; text-align:left;
  font-size:14px; line-height:1.7;
  color:var(--text2); margin-bottom:24px;
  display:none;
}
.quiz-answer.visible { display:block; }
.quiz-answer pre {
  background:var(--bg2); border:1px solid var(--bg3);
  border-radius:8px; padding:12px; margin:8px 0;
  overflow-x:auto; font-size:12px;
}
.quiz-answer code {
  font-family:'JetBrains Mono','Fira Code',Consolas,monospace;
  font-size:12px;
}
.quiz-rate {
  display:flex; gap:10px; display:none;
}
.quiz-rate.visible { display:flex; }
.quiz-rate button {
  padding:12px 24px; border-radius:var(--radius);
  font-size:14px; font-weight:600;
  border:1px solid var(--bg3); transition:all 0.15s;
}
.quiz-rate button:hover { transform:scale(1.05); }
.quiz-rate .qr-hard { color:var(--red); }
.quiz-rate .qr-learning { color:var(--yellow); }
.quiz-rate .qr-known { color:var(--green); }

/* Test mode overlay */
.test-overlay {
  position:fixed; inset:0; background:var(--bg);
  z-index:1001; display:none; flex-direction:column;
}
.test-overlay.active { display:flex; }
.test-header {
  padding:12px 20px; display:flex; align-items:center;
  gap:12px; border-bottom:1px solid var(--bg3);
  flex-shrink:0;
}
.test-header-left { display:flex; align-items:center; gap:12px; }
.test-header-right { margin-left:auto; display:flex; align-items:center; gap:14px; font-size:13px; color:var(--text2); }
.test-streak { color:var(--orange); font-weight:600; }
.test-timer { font-variant-numeric:tabular-nums; }
.test-timer.warning { color:var(--red); animation:pulse 1s infinite; }
@keyframes pulse { 50% { opacity:0.5; } }
.test-progress-bar { height:4px; background:var(--bg3); flex-shrink:0; }
.test-progress-fill { height:100%; background:var(--accent); transition:width 0.3s; }
.test-progress-dots { display:flex; gap:3px; padding:8px 20px; flex-wrap:wrap; flex-shrink:0; }
.test-dot { width:8px; height:8px; border-radius:50%; background:var(--bg4); }
.test-dot.answered { background:var(--accent); }
.test-dot.correct { background:var(--green); }
.test-dot.wrong { background:var(--red); }
.test-dot.current { box-shadow:0 0 0 2px var(--accent2); }

/* Test setup screen */
.test-setup { padding:30px 20px; max-width:600px; margin:0 auto; overflow-y:auto; flex:1; }
.test-setup h2 { margin-bottom:20px; }
.test-setup-section { margin-bottom:20px; }
.test-setup-section label { display:block; font-size:13px; color:var(--text2); margin-bottom:8px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.test-chips { display:flex; gap:6px; flex-wrap:wrap; }
.test-chip {
  padding:8px 16px; border-radius:20px; font-size:13px; font-weight:500;
  background:var(--bg2); border:1px solid var(--bg3); cursor:pointer; transition:all 0.15s;
}
.test-chip:hover { background:var(--bg3); }
.test-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.test-start-btn {
  width:100%; padding:16px; background:var(--accent); color:#fff;
  border-radius:var(--radius); font-size:16px; font-weight:600;
  margin-top:24px; transition:all 0.15s;
}
.test-start-btn:hover { background:var(--accent2); }
.test-start-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* Test question screen */
.test-body { padding:20px; display:flex; flex-direction:column; align-items:center; }
.test-q-badges { display:flex; gap:8px; margin-bottom:12px; }
.test-q-text { font-size:18px; font-weight:600; max-width:700px; text-align:center; margin-bottom:16px; line-height:1.5; }
.test-q-code {
  background:var(--bg2); border:1px solid var(--bg3); border-radius:8px;
  padding:14px; margin-bottom:20px; max-width:700px; width:100%;
  font-family:'JetBrains Mono','Fira Code',Consolas,monospace; font-size:13px;
  line-height:1.6; white-space:pre-wrap; overflow-x:auto;
}
.test-q-hint { font-size:12px; color:var(--text2); margin-bottom:12px; }
.test-options { max-width:700px; width:100%; }
.test-option {
  display:flex; align-items:center; gap:12px;
  padding:14px 16px; margin-bottom:8px;
  background:var(--bg2); border:1px solid var(--bg3);
  border-radius:var(--radius); cursor:pointer; transition:all 0.15s;
  font-size:14px;
}
.test-option:hover { border-color:var(--bg4); background:var(--bg3); }
.test-option.selected { border-color:var(--accent); background:rgba(108,92,231,0.1); }
.test-option .indicator {
  width:20px; height:20px; border-radius:50%; border:2px solid var(--bg4);
  display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s;
}
.test-option.multi .indicator { border-radius:4px; }
.test-option.selected .indicator { border-color:var(--accent); background:var(--accent); }
.test-option.selected .indicator::after { content:""; display:block; }
.test-option.selected:not(.multi) .indicator::after { width:8px; height:8px; border-radius:50%; background:#fff; }
.test-option.selected.multi .indicator::after { content:"\2713"; color:#fff; font-size:13px; font-weight:700; }
/* Review colors */
.test-option.opt-correct { border-color:var(--green); background:rgba(0,184,148,0.1); }
.test-option.opt-wrong { border-color:var(--red); background:rgba(225,112,85,0.1); }
.test-option.opt-missed { border-color:var(--yellow); border-style:dashed; }
.test-option.opt-correct .indicator { border-color:var(--green); background:var(--green); }
.test-option.opt-wrong .indicator { border-color:var(--red); background:var(--red); }

.test-nav { display:flex; gap:10px; padding:16px 20px; border-top:1px solid var(--bg3); flex-shrink:0; }
.test-nav button {
  flex:1; padding:12px; border-radius:var(--radius); font-size:14px; font-weight:600;
  border:1px solid var(--bg3); transition:all 0.15s;
}
.test-nav button:hover { background:var(--bg3); }
.test-nav .btn-finish { background:var(--accent); color:#fff; border-color:var(--accent); }
.test-nav .btn-finish:hover { background:var(--accent2); }

/* Test results screen */
.test-results { padding:30px 20px; max-width:700px; margin:0 auto; width:100%; }
.test-results-score { text-align:center; margin-bottom:30px; }
.test-results-score .big-num { font-size:48px; font-weight:700; }
.test-results-score .big-pct { font-size:24px; color:var(--text2); }
.test-results-score .stars { font-size:28px; margin:8px 0; }
.test-results-score .verdict { font-size:18px; font-weight:600; }
.test-results-meta { display:flex; gap:20px; justify-content:center; margin-bottom:24px; font-size:14px; color:var(--text2); }
.test-results-topics { margin-bottom:24px; }
.test-results-topic {
  display:flex; align-items:center; gap:10px; padding:10px 0;
  border-bottom:1px solid var(--bg3); font-size:14px;
}
.test-results-topic .topic-bar { flex:1; height:6px; background:var(--bg3); border-radius:3px; overflow:hidden; }
.test-results-topic .topic-bar-fill { height:100%; background:var(--green); border-radius:3px; }
.test-errors-list { margin-bottom:24px; }
.test-error-item {
  padding:12px 16px; margin-bottom:8px; background:var(--bg2);
  border:1px solid var(--bg3); border-radius:var(--radius);
  cursor:pointer; transition:all 0.15s; font-size:14px;
}
.test-error-item:hover { border-color:var(--bg4); }
.test-results-actions { display:flex; gap:10px; flex-wrap:wrap; }
.test-results-actions button {
  flex:1; padding:14px; border-radius:var(--radius); font-size:14px; font-weight:600;
  border:1px solid var(--bg3); transition:all 0.15s; min-width:140px;
}
.test-results-actions button:hover { background:var(--bg3); }
.test-results-actions .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }

/* Test review screen */
.test-review { padding:20px; max-width:700px; margin:0 auto; width:100%; }
.test-review-explanation {
  margin-top:16px; padding:16px; background:var(--bg2);
  border:1px solid var(--bg3); border-radius:var(--radius);
  font-size:14px; line-height:1.7; color:var(--text2);
}

/* SRS Review overlay */
.srs-overlay {
  position:fixed; inset:0; background:var(--bg);
  z-index:1002; display:none; flex-direction:column;
}
.srs-overlay.active { display:flex; }
.srs-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:20px; display:flex; flex-direction:column; align-items:center; }
.srs-due-badge {
  display:inline-flex; align-items:center; justify-content:center;
  background:var(--red); color:#fff; border-radius:50%; width:20px; height:20px;
  font-size:11px; font-weight:700; margin-left:6px;
}

/* Interview simulation */
.interview-overlay {
  position:fixed; inset:0; background:var(--bg);
  z-index:1003; display:none; flex-direction:column;
}
.interview-overlay.active { display:flex; }
.interview-timer-bar { height:4px; background:var(--bg3); }
.interview-timer-fill { height:100%; background:var(--accent); transition:width 1s linear; }
.interview-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:20px; max-width:800px; margin:0 auto; width:100%; }
.interview-section { margin-bottom:24px; padding:20px; background:var(--bg2); border:1px solid var(--bg3); border-radius:var(--radius); }
.interview-section h3 { margin-bottom:12px; }
.interview-textarea {
  width:100%; min-height:100px; padding:12px; border:1px solid var(--bg3);
  border-radius:8px; background:var(--bg); color:var(--text); font:inherit;
  font-size:14px; line-height:1.6; resize:vertical;
}

/* Bookmark button */
.bookmark-btn {
  font-size:16px; padding:4px; cursor:pointer; transition:all 0.15s;
  background:none; border:none; color:var(--text2);
}
.bookmark-btn.active { color:var(--yellow); }
.bookmark-btn:hover { transform:scale(1.2); }

/* Notes */
.note-area {
  margin-top:8px; padding:10px 16px; border-top:1px solid var(--bg3);
}
.note-input {
  width:100%; padding:8px 12px; border:1px solid var(--bg3);
  border-radius:8px; background:var(--bg); color:var(--text);
  font:inherit; font-size:12px; resize:vertical; min-height:40px;
}
.note-saved { font-size:11px; color:var(--green); margin-top:4px; }

/* Dashboard cards enhanced */
.dash-card {
  background:var(--bg2); border:1px solid var(--bg3); border-radius:var(--radius);
  padding:16px; margin-bottom:12px;
}
.dash-card h3 { font-size:15px; margin-bottom:10px; }
.dash-streak-big { font-size:36px; font-weight:700; color:var(--orange); text-align:center; }
.dash-streak-label { text-align:center; color:var(--text2); font-size:13px; }
.weak-topic-item {
  display:flex; align-items:center; gap:10px; padding:8px 0;
  border-bottom:1px solid var(--bg3); font-size:14px;
}
.weak-topic-bar { flex:1; height:6px; background:var(--bg3); border-radius:3px; overflow:hidden; }
.weak-topic-fill { height:100%; border-radius:3px; }
.recommendation-item {
  padding:10px 14px; margin-bottom:6px; background:var(--bg3);
  border-radius:8px; font-size:13px; cursor:pointer; transition:all 0.15s;
}
.recommendation-item:hover { background:var(--bg4); }

/* Activity heatmap */
.heatmap { display:flex; gap:2px; flex-wrap:wrap; margin-top:8px; }
.heatmap-cell {
  width:14px; height:14px; border-radius:2px; background:var(--bg3);
}
.heatmap-cell.l1 { background:rgba(0,184,148,0.3); }
.heatmap-cell.l2 { background:rgba(0,184,148,0.5); }
.heatmap-cell.l3 { background:rgba(0,184,148,0.7); }
.heatmap-cell.l4 { background:var(--green); }

/* Code sandbox */
.sandbox-overlay {
  position:fixed; inset:0; background:var(--bg);
  z-index:1004; display:none; flex-direction:column;
}
.sandbox-overlay.active { display:flex; }
.sandbox-editor {
  width:100%; flex:1; padding:16px; border:none;
  background:var(--bg2); color:var(--text);
  font-family:'JetBrains Mono','Fira Code',Consolas,monospace;
  font-size:14px; line-height:1.6; resize:none; outline:none;
  tab-size:4;
}
.sandbox-reference {
  padding:16px; border-top:1px solid var(--bg3);
  max-height:40vh; overflow-y:auto; font-size:13px;
  line-height:1.6; color:var(--text2);
}
.sandbox-ref-code {
  background:var(--bg); border:1px solid var(--bg3); border-radius:8px;
  padding:12px; margin:8px 0; font-family:'JetBrains Mono',Consolas,monospace;
  font-size:12px; line-height:1.5; white-space:pre-wrap; overflow-x:auto;
}

/* Share */
.share-modal {
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  display:none; align-items:center; justify-content:center; z-index:2000;
}
.share-modal.active { display:flex; }
.share-content {
  background:var(--bg2); border:1px solid var(--bg3); border-radius:var(--radius);
  padding:24px; max-width:400px; width:90%; text-align:center;
}
.cardLvlBtn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* Resources */
.resources-block {
  background:var(--bg2); border:1px solid var(--bg3);
  border-radius:var(--radius); margin-bottom:16px; overflow:hidden;
}
.resources-header {
  padding:12px 16px; cursor:pointer; user-select:none;
  display:flex; align-items:center; justify-content:space-between;
  font-size:14px; font-weight:600;
}
.resources-header:hover { background:var(--bg3); }
.resources-header .chev { transition:transform 0.2s; font-size:12px; color:var(--text2); }
.resources-block.open .resources-header .chev { transform:rotate(90deg); }
.resources-block .resources-list { display:none; padding:0 12px 12px; }
.resources-block.open .resources-list { display:block; }
.resources-list { display:flex; flex-direction:column; gap:8px; }
.resource-item {
  display:flex; gap:10px; padding:10px 12px;
  background:var(--bg); border:1px solid var(--bg3); border-radius:8px;
  text-decoration:none; color:var(--text); transition:all 0.15s;
  align-items:flex-start;
}
.resource-item:hover { border-color:var(--accent); transform:translateX(2px); }
.resource-icon { font-size:18px; flex-shrink:0; line-height:1.3; }
.resource-body { display:flex; flex-direction:column; gap:2px; flex:1; min-width:0; }
.resource-title { font-weight:500; font-size:14px; }
.resource-desc { font-size:12px; color:var(--text2); line-height:1.4; }
.resource-tags { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
.resource-tag {
  font-size:10px; padding:2px 6px; border-radius:4px;
  background:var(--bg3); color:var(--text2); text-transform:uppercase; letter-spacing:0.4px;
}
.resource-tag.lvl-1 { background:rgba(0,184,148,0.15); color:var(--green); }
.resource-tag.lvl-2 { background:rgba(253,203,110,0.15); color:var(--yellow); }
.resource-tag.lvl-3 { background:rgba(225,112,85,0.15); color:var(--red); }
.resources-list.compact .resource-desc { display:none; }

/* Review recommendations */
.review-rec {
  margin-top:12px; padding:12px; background:rgba(108,92,231,0.08);
  border-left:3px solid var(--accent); border-radius:8px;
}
.review-rec-title { font-size:13px; font-weight:600; margin-bottom:8px; color:var(--accent2); }
.share-text {
  width:100%; padding:12px; border:1px solid var(--bg3); border-radius:8px;
  background:var(--bg); color:var(--text); font:inherit; font-size:13px;
  text-align:center; margin:12px 0;
}

/* Filter pills */
.filter-row {
  display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;
}
.filter-pill {
  padding:6px 14px; border-radius:20px;
  font-size:12px; font-weight:500;
  background:var(--bg2); border:1px solid var(--bg3);
  transition:all 0.15s;
}
.filter-pill:hover { background:var(--bg3); }
.filter-pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* Mobile */
.mobile-header {
  display:none;
  position:fixed; top:0; left:0; right:0;
  background:var(--bg2); border-bottom:1px solid var(--bg3);
  padding:12px 16px; z-index:200;
  align-items:center; gap:12px;
}
.burger { font-size:22px; padding:4px; }
.mobile-header h1 { font-size:15px; font-weight:600; }
.sidebar-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.5); z-index:99;
}

/* Empty state */
.empty-state {
  text-align:center; padding:60px 20px; color:var(--text2);
}
.empty-state .icon { font-size:48px; margin-bottom:12px; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:3px; }

@media (max-width:768px) {
  .sidebar {
    transform:translateX(-100%);
    width:280px;
  }
  .sidebar.open { transform:translateX(0); }
  .sidebar-overlay.open { display:block; }
  .main {
    margin-left:0;
    padding: 60px 10px 20px;
    padding-top: calc(60px + env(safe-area-inset-top));
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    max-width:100%;
    width:100%;
  }
  .mobile-header {
    display:flex;
    padding-top: env(safe-area-inset-top);
  }
  .stats { grid-template-columns:repeat(2,1fr); gap:8px; }
  .stat-card { padding:12px 8px; }

  /* Topbar: search + scrollable filters */
  .topbar {
    flex-direction:column;

  }
  .search-box { width:100%; min-width:0; padding:8px 12px; }
  .topbar-filters {
    display:flex;
    gap:6px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    padding-bottom:4px;
    width:100%;
  }
  .topbar-filters::-webkit-scrollbar { display:none; }
  .topbar-btn {
    padding:8px 12px;
    font-size:12px;
    flex-shrink:0;
  }

  /* Cards */
  .card { margin-bottom:8px; border-radius:10px; }
  .card-q { padding:12px 14px; gap:8px; }
  .card-q-text { font-size:13px; }
  .card-a-inner {

    font-size:12px;
    line-height:1.6;

  }
  .card-a-inner pre {
    padding:10px;
    font-size:11px;
    border-radius:6px;
    -webkit-overflow-scrolling:touch;
  }
  .card-a-inner code { font-size:11px; }
  .card-actions { padding:8px 12px; gap:4px; }
  .status-btn { padding:7px 4px; font-size:11px; border-radius:6px; }

  .section-header { font-size:11px; padding:10px 0 6px; }
  .badge { font-size:9px; padding:2px 6px; }

  /* Quiz */
  .quiz-overlay { padding-top: env(safe-area-inset-top); }
  .quiz-body {
    padding:16px;
    justify-content:flex-start;
    padding-top:10vh;
    overflow-y:auto;
  }
  .quiz-question { font-size:16px; margin-bottom:20px; }
  .quiz-answer {
    font-size:13px;
    max-width:100%;
    word-break:break-word;
  }
  .quiz-answer pre { font-size:11px; padding:10px; }
  .quiz-reveal-btn { padding:12px 28px; font-size:14px; width:100%; }
  .quiz-rate {
    flex-direction:row;
    width:100%;
    gap:6px;
  }
  .quiz-rate button {
    flex:1;
    padding:10px 8px;
    font-size:12px;
  }

  /* Dashboard */
  .progress-bar { height:5px; }

  /* Test mode mobile */
  .test-overlay { padding-top:env(safe-area-inset-top); }
  .test-header { padding:10px 14px; }
  .test-setup { padding:20px 14px; }
  .test-q-text { font-size:15px; }
  .test-q-code { font-size:12px; padding:10px; }
  .test-option { padding:12px 14px; font-size:13px; }
  .test-nav { padding:12px 14px; }
  .test-nav button { padding:10px; font-size:13px; }
  .test-results { padding:20px 14px; }
  .test-results-score .big-num { font-size:36px; }
  .test-progress-dots { padding:6px 14px; }

  /* New features mobile */
  .srs-overlay,.interview-overlay,.sandbox-overlay { padding-top:env(safe-area-inset-top); }
  .interview-body { padding:14px; }
  .sandbox-editor { font-size:12px; padding:12px; }
  .heatmap-cell { width:11px; height:11px; }
  .dash-streak-big { font-size:28px; }
}

/* Animations */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.card { animation:fadeIn 0.2s ease; }

/* Print */
@media print {
  .sidebar,.mobile-header,.topbar,.card-actions,.filter-row { display:none!important; }
  .main { margin:0; max-width:100%; }
  .card-a { max-height:none!important; }
  .card { break-inside:avoid; }
}

<script>
// ============================================================
// DATA
// ============================================================
const TOPICS = [
  { id:'core', icon:'&#9749;', name:'Core Java', data: [
    {s:'ООП'},
    {q:'Что такое ООП? Основные принципы.',a:'ООП — парадигма программирования, основанная на концепции объектов.\n\n<b>4 принципа:</b>\n• <b>Инкапсуляция</b> — сокрытие внутреннего состояния, доступ через методы\n<pre><code>public class Payment {\n    private BigDecimal amount; // скрыто\n    public BigDecimal getAmount() { return amount; } // контролируемый доступ\n}</code></pre>\n\n• <b>Наследование</b> — создание классов на основе существующих\n<pre><code>public class CardPayment extends Payment { ... }</code></pre>\n\n• <b>Полиморфизм</b> — единый интерфейс для разных типов\n<pre><code>Payment p = new CardPayment(); // runtime — вызовется метод CardPayment\np.process(); // динамическая диспетчеризация</code></pre>\n\n• <b>Абстракция</b> — выделяем значимое, скрываем детали\n<pre><code>public interface PaymentProcessor { void process(Payment p); }\n// клиент не знает деталей реализации</code></pre>\n\n<b>На собесе спросят:</b> приведите пример каждого принципа из вашего проекта. Чем абстракция отличается от инкапсуляции?',hot:1,lvl:1},
    {q:'SOLID принципы',a:'<b>S — Single Responsibility:</b> класс имеет одну причину для изменения.\n<pre><code>// Плохо: PaymentService и логирует, и считает, и отправляет\n// Хорошо:\nclass PaymentService { void process(Payment p) {...} }\nclass PaymentNotifier { void notify(Payment p) {...} }\nclass PaymentLogger { void log(Payment p) {...} }</code></pre>\n\n<b>O — Open/Closed:</b> открыт для расширения, закрыт для модификации.\n<pre><code>// Добавляем новый тип оплаты без изменения существующего кода\ninterface PaymentStrategy { void pay(BigDecimal amount); }\nclass CardPayment implements PaymentStrategy { ... }\nclass SBPPayment implements PaymentStrategy { ... } // новый</code></pre>\n\n<b>L — Liskov Substitution:</b> подклассы заменяют базовый без нарушений.\nПример нарушения: Square extends Rectangle, но setWidth() ломает инвариант.\n\n<b>I — Interface Segregation:</b> много маленьких интерфейсов лучше одного большого.\n<pre><code>interface Readable { Payment find(Long id); }\ninterface Writable { void save(Payment p); }\n// Вместо одного PaymentRepository со всеми методами</code></pre>\n\n<b>D — Dependency Inversion:</b> зависимость от абстракций.\n<pre><code>class PaymentService {\n    private final PaymentRepository repo; // интерфейс, не impl!\n    PaymentService(PaymentRepository repo) { this.repo = repo; }\n}</code></pre>\n\n<b>На собесе:</b> просят привести пример нарушения каждого принципа и как исправить.',hot:1,lvl:1},
    {q:'IS-A, HAS-A, ассоциация, агрегация, композиция',a:'<b>IS-A</b> — наследование: Dog IS-A Animal (extends)\n<b>HAS-A</b> — использование:\n• <b>Ассоциация</b> — объекты связаны, существуют независимо (Teacher ↔ Student)\n• <b>Агрегация</b> — часть-целое, части живут независимо (University → Professor)\n• <b>Композиция</b> — часть не существует без целого (House → Room)\n\nВ коде: агрегация — объект приходит извне (конструктор), композиция — создаётся внутри',lvl:2},
    {q:'Раннее и позднее связывание',a:'<b>Раннее (статическое)</b> — метод определяется при компиляции: private, static, final методы, перегрузка.\n<b>Позднее (динамическое)</b> — в runtime: переопределённые методы, абстрактные.\n\nJava использует позднее связывание по умолчанию для нестатических методов — через vtable.',lvl:2},
    {q:'Что такое полиморфизм? Виды.',a:'Полиморфизм — объекты разных типов используют общий интерфейс.\n\n<b>Статический</b> (compile-time): перегрузка методов — одно имя, разные параметры.\n<b>Динамический</b> (runtime): переопределение методов — подкласс меняет реализацию.\n\n<b>3 вида:</b>\n• Ad hoc — перегрузка, разное поведение для разных типов аргументов\n• Параметрический — дженерики, одинаковое поведение для разных типов\n• Subtype — объект подкласса вместо базового (LSP)',hot:1,lvl:2},
    {q:'Инкапсуляция vs абстракция',a:'<b>Инкапсуляция</b> — КАК прячем: private поля + public методы. Защита внутреннего состояния.\n<b>Абстракция</b> — ЧТО показываем: выделяем важное, скрываем детали.\n\nПример: <code>List</code> — абстракция (интерфейс). ArrayList — инкапсуляция (скрывает массив внутри).\n\nИнкапсуляция — механизм, абстракция — концепция.',lvl:2},
    {q:'GRASP: Low Coupling и High Cohesion',a:'<b>Low Coupling</b> — минимум зависимостей между классами/модулями. Изменение одного не ломает другой.\n<b>High Cohesion</b> — класс делает одну хорошо определённую задачу. Все методы связаны.\n\nНарушение: God Class — делает всё (low cohesion). Service зависит от 20 других сервисов (high coupling).',lvl:2},
    {s:'Java Platform'},
    {q:'JDK, JRE, JVM — в чём разница?',a:'<b>JDK</b> — набор для разработки: JRE + компилятор (javac) + утилиты (jshell, jlink, jpackage)\n<b>JRE</b> — среда выполнения: JVM + стандартные библиотеки\n<b>JVM</b> — виртуальная машина, исполняет байт-код\n\nС Java 11 JRE не поставляется отдельно — только JDK.\nОсновная JVM — HotSpot (Oracle). Альтернативы: GraalVM, Eclipse OpenJ9, Amazon Corretto.',hot:1,lvl:1},
    {q:'Что такое байт-код и JIT-компиляция?',a:'Байт-код — промежуточное представление (.class файлы).\n\n<b>JIT (Just-In-Time):</b>\n• Компилирует горячий байт-код в нативный код\n• HotSpot: C1 (быстрая компиляция) и C2 (агрессивная оптимизация)\n• Tiered Compilation (default): C1 → C2 для hot spots\n• GraalVM: AOT-компиляция — быстрый старт, меньше памяти',lvl:1},
    {q:'ClassLoader — загрузка классов',a:'<b>ClassLoader</b> — подсистема JVM, отвечающая за загрузку .class файлов в память. В Java классы загружаются <b>лениво</b> — при первом обращении.\n\n<b>Иерархия ClassLoader\'ов (Java 9+):</b>\n<pre><code>Bootstrap ClassLoader\n    │  java.base, java.sql, java.xml, ...\n    │  (написан на C++, return null для getParent())\n    ▼\nPlatform ClassLoader (раньше Extension)\n    │  java.compiler, java.datatransfer, ...\n    ▼\nApplication (System) ClassLoader\n    │  ваш -cp / classpath\n    ▼\nCustom ClassLoader (например, web-container, plugins, OSGi)</code></pre>\n\n<b>В Java 8 и раньше:</b>\n• <b>Bootstrap</b> — rt.jar (вся standard library в одном файле)\n• <b>Extension</b> — <code>$JAVA_HOME/lib/ext</code>\n• <b>Application</b> — classpath\n\n<b>Parent Delegation Model:</b>\n<pre><code>Запрос loadClass("com.example.Foo"):\n\nApplication ClassLoader:\n    "Может родитель загрузить?" -&gt; Platform\n                                         "Может родитель?" -&gt; Bootstrap\n                                                                     "нет"\n                                         "я сам не могу"\n    "я попробую" -&gt; найду в classpath, загружу\n\nМеханизм защищает core-классы:\n- String не может быть подменён\n- Ни один плагин не подгрузит свой java.lang.String</code></pre>\n\n<b>Жизненный цикл класса:</b>\n<pre><code>1. LOADING    — чтение .class файла\n                (byte[] -&gt; Class&lt;?&gt; через defineClass())\n\n2. LINKING\n   2a. VERIFICATION  — проверка байт-кода (безопасность)\n   2b. PREPARATION   — выделение памяти под static поля\n                        (инициализация дефолтами: 0, false, null)\n   2c. RESOLUTION    — замена символических ссылок на прямые\n\n3. INITIALIZATION — выполнение static-блоков, инициализация static полей\n                     (именно здесь int x = 5; static { }; )</code></pre>\n\n<b>Когда инициализируется класс:</b>\n• Создание объекта (<code>new Foo()</code>)\n• Вызов static-метода\n• Обращение к static-полю (не final константе!)\n• Инициализация подкласса (инициализирует и суперкласс)\n• <code>Class.forName("Foo")</code>\n• Запуск main() класса\n\n<b>НЕ инициализирует:</b>\n• Обращение к <code>static final</code> константе (compile-time inline)\n• Массивы: <code>Foo[] arr = new Foo[10]</code> — Foo НЕ инициализируется\n• <code>Foo.class</code> — только loading, не initialization\n• <code>Class.forName("Foo", false, cl)</code>\n\n<b>Как это работает в коде:</b>\n<pre><code>public class Main {\n    static { System.out.println("Main static"); }\n\n    public static void main(String[] args) {\n        System.out.println("main start");\n        Foo foo = new Foo();  // триггерит инициализацию Foo\n        Foo.STATIC_CONST;      // если final — compile-time inline, без init\n    }\n}\n\npublic class Foo {\n    static { System.out.println("Foo static"); }\n    public static final int STATIC_CONST = 42;\n}\n\n// Вывод:\n// Main static     -- при загрузке Main\n// main start\n// Foo static      -- при первом new Foo()\n</code></pre>\n\n<b>ClassLoader как фабрика изоляции:</b>\nДва разных ClassLoader\'а могут загрузить «одинаковый» класс как ДВА разных <code>Class&lt;?&gt;</code>. <code>instanceof</code> между ними вернёт false!\n<pre><code>ClassLoader cl1 = new URLClassLoader(...);\nClassLoader cl2 = new URLClassLoader(...);\nClass&lt;?&gt; c1 = cl1.loadClass("Foo");\nClass&lt;?&gt; c2 = cl2.loadClass("Foo");\nc1 == c2;        // false!\nc1.equals(c2);   // false!\n// Два класса Foo с одинаковым именем, но разные объекты\n// Как это используется:\n// - плагины, изоляция их зависимостей\n// - hot reload в web-серверах\n// - OSGi, модульные системы</code></pre>\n\n<b>Написать свой ClassLoader:</b>\n<pre><code>public class MyClassLoader extends ClassLoader {\n    private final String basePath;\n\n    public MyClassLoader(String path) { this.basePath = path; }\n\n    @Override\n    protected Class&lt;?&gt; findClass(String name) throws ClassNotFoundException {\n        byte[] bytes = loadClassBytes(name); // из файла, сети, БД...\n        return defineClass(name, bytes, 0, bytes.length);\n    }\n}</code></pre>\n\n<b>Типичные применения custom ClassLoader:</b>\n• <b>Application servers</b> (Tomcat, WebLogic) — изоляция webapps\n• <b>IDE</b> (IntelliJ, Eclipse) — hot reload, плагины\n• <b>OSGi</b> (Equinox, Felix) — модульная система\n• <b>Spring DevTools</b> — reloading при разработке\n• <b>JRebel, HotSwap Agent</b> — class reloading\n• <b>Groovy Shell</b> — динамическая компиляция и загрузка\n\n<b>Ошибки, связанные с ClassLoader:</b>\n\n<b>ClassNotFoundException:</b> класс не найден в classpath во время загрузки.\n<pre><code>Class.forName("non.existing.Class");\n// ClassNotFoundException: non.existing.Class\n// Причины: нет JAR в classpath, typo</code></pre>\n\n<b>NoClassDefFoundError:</b> класс был во время компиляции, но не в runtime.\n<pre><code>// Компилировалось с MySQL JDBC\nnew com.mysql.cj.jdbc.Driver();\n// Но в production JAR забыли добавить MySQL\n// NoClassDefFoundError!</code></pre>\n\n<b>LinkageError, IncompatibleClassChangeError</b> — несоответствие версий (класс API v1 + класс implementation v2).\n\n<b>JVM 9+ изменения:</b>\n• rt.jar удалён, core разбит на модули (jmod)\n• Extension ClassLoader переименован в Platform\n• Модульная система (JPMS, Jigsaw) — ограничивает видимость между модулями\n\n<b>Утечки памяти через ClassLoader:</b>\nРаспространённая проблема в app-серверах. Если ваш код хранит ссылку на класс из веб-приложения (например, в статическом поле или ThreadLocal), то при redeploy старые классы не могут быть собраны GC → <code>OutOfMemoryError: Metaspace</code>.\n\n<b>На собесе:</b>\n• Какие 3 ClassLoader\'а? (Bootstrap, Platform, Application)\n• Что такое parent delegation? (сначала просим родителя — защита core classes)\n• Этапы жизненного цикла класса? (Loading → Linking → Initialization)\n• Когда класс инициализируется? (new, static-вызов, forName)\n• Разница ClassNotFoundException и NoClassDefFoundError? (первое — runtime loading, второе — класс был в compile но пропал)\n• Зачем Custom ClassLoader? (изоляция плагинов, hot reload)',lvl:2},
    {q:'Как работает компиляция и запуск Java-программы?',a:'1. <code>javac Main.java</code> → Main.class (байт-код)\n2. <code>java Main</code> → JVM загружает и исполняет байт-код\n\nПроцесс в JVM:\n• ClassLoader загружает .class\n• Bytecode Verifier проверяет корректность\n• Interpreter начинает выполнение\n• JIT компилирует hot spots в native code\n• GC управляет памятью',lvl:2},
    {q:'Что такое кроссплатформенность Java?',a:'<b>Write Once, Run Anywhere (WORA)</b> — слоган Sun Microsystems (1995). Один и тот же скомпилированный Java-код работает на любой ОС без перекомпиляции.\n\n<b>Как это работает:</b>\n<pre><code>1. Исходный код (.java)\n        ↓ javac\n2. Байт-код (.class) — платформо-независимый\n        ↓ загрузка в JVM\n3. JVM интерпретирует/JIT-компилирует в машинный код\n   конкретной платформы (Windows x86, Linux ARM, macOS M1...)</code></pre>\n\n<b>JVM — прослойка между программой и ОС:</b>\n• Для каждой платформы существует своя реализация JVM (HotSpot, OpenJ9, GraalVM)\n• JVM знает, как превращать байт-код в инструкции для конкретного процессора\n• Приложение этого не знает — оно видит только «Java API»\n\n<b>Пример байт-кода</b> (можно посмотреть через <code>javap -c</code>):\n<pre><code>public static void main(String[] args) {\n    System.out.println("Hello");\n}\n\n// Байт-код:\n0: getstatic     #2  // System.out:PrintStream\n3: ldc           #3  // String "Hello"\n5: invokevirtual #4  // println:(String)V\n8: return</code></pre>\nЭтот байт-код одинаков на всех платформах.\n\n<b>Платформо-зависимые части (всё же есть):</b>\n• Пути к файлам — используй <code>File.separator</code> или <code>Path</code>, а не захардкоженные <code>"/"</code> / <code>"\\\\"</code>\n• Line endings — <code>System.lineSeparator()</code>\n• Кодировки по умолчанию — всегда указывай явно (<code>StandardCharsets.UTF_8</code>)\n• Native-вызовы через JNI — платформо-зависимы\n• Некоторые UI-детали (Swing, AWT)\n\n<b>Шаги перехода:</b>\n• .java → компиляция → .class (независимо от ОС)\n• .class собираются в .jar/.war (всё ещё независимо)\n• .jar запускается на ЛЮБОЙ JVM — Windows, Linux, macOS, Solaris, AIX\n\n<b>Альтернативный путь — GraalVM Native Image:</b> AOT-компиляция в нативный бинарник. Теряется кроссплатформенность (бинарник для конкретной ОС), но быстрый старт и меньше памяти (важно для облаков и serverless).\n\n<b>Кроссплатформенность vs совместимость версий:</b>\n• Байт-код Java N работает на JVM N и выше (backward compatibility)\n• Класс, скомпилированный Java 17, НЕ работает на JVM 11\n• <code>--release 11</code> — компилирует для старых версий\n\n<b>На собесе:</b> «как ты дебажишь баг, который воспроизводится только на Linux, но не на Windows разработчика?» — путь к файлам, line endings, encoding, локаль (Turkish i bug!).',lvl:2},
    {s:'Garbage Collection'},
    {q:'Как работает сборка мусора?',a:'GC автоматически освобождает память от недостижимых объектов.\n\n<b>Алгоритм трассировки:</b> от GC Roots находит достижимые объекты. Остальное — мусор.\n\n<b>GC Roots:</b>\n• Локальные переменные в стеке потоков\n• Статические поля классов\n• JNI ссылки\n• Активные потоки\n\n<b>Поколенческая модель:</b>\n<pre><code>Heap\n├── Young Generation (~1/3 heap)\n│   ├── Eden — новые объекты создаются здесь\n│   ├── Survivor S0 (From)\n│   └── Survivor S1 (To)\n├── Old Generation (~2/3 heap) — долгоживущие\n└── Metaspace (вне heap) — метаданные классов</code></pre>\n\n<b>Процесс Minor GC:</b>\n1. Eden заполнен → Minor GC (Stop-the-World!)\n2. Живые из Eden → Survivor To\n3. Живые из Survivor From → Survivor To (age++)\n4. Если age > threshold → Old Generation\n5. Eden и From очищаются, From ↔ To меняются\n\n<b>Major/Full GC:</b> очищает Old Gen. Дольше, больше пауза.\n\n<b>JVM флаги:</b>\n<code>-Xms2g -Xmx2g</code> — начальный и макс. heap\n<code>-XX:NewRatio=2</code> — соотношение Old/Young\n<code>-XX:SurvivorRatio=8</code> — Eden/Survivor\n<code>-Xlog:gc*:file=gc.log</code> — логирование GC\n\n<b>На собесе:</b> какие объекты попадают сразу в Old Gen? (большие, -XX:PretenureSizeThreshold)',hot:1,lvl:2},
    {q:'Сборщики мусора в Java 21',a:'• <b>Serial GC</b> (-XX:+UseSerialGC) — однопоточный. Для маленьких приложений (<100MB heap).\n\n• <b>Parallel GC</b> (-XX:+UseParallelGC) — многопоточный, максимальный throughput. Для batch-обработки.\n\n• <b>G1 GC</b> (-XX:+UseG1GC) — default с Java 9.\n  Делит heap на регионы (~2048). Собирает сначала \"мусорные\" регионы.\n  <code>-XX:MaxGCPauseMillis=200</code> — целевая пауза.\n  Подходит для большинства приложений.\n\n• <b>ZGC</b> (-XX:+UseZGC) — паузы <1мс даже на терабайтных heap!\n  Concurrent: почти вся работа параллельно с приложением.\n  <code>-XX:+UseZGC -XX:+ZGenerational</code> (Java 21: generational ZGC)\n  Идеален для low-latency: платёжные системы, real-time.\n\n• <b>Shenandoah</b> (-XX:+UseShenandoahGC) — аналог ZGC от Red Hat.\n  Concurrent compaction. Доступен в OpenJDK.\n\n<b>Как выбрать:</b>\n<pre><code>Микросервис (Spring Boot)  → G1 (default) или ZGC\nВысокая нагрузка, low-latency → ZGC\nBatch processing, throughput → Parallel GC\nМаленькое приложение → Serial GC</code></pre>\n\n<b>CMS удалён в Java 14.</b>\n\n<b>На собесе:</b> какой GC используете в production? Как мониторите паузы? (GC logs, Prometheus jvm_gc_pause)',hot:1,lvl:2},
    {q:'Виды ссылок: Strong, Weak, Soft, Phantom',a:'В Java 4 вида ссылок, которые по-разному взаимодействуют с Garbage Collector. Чем «слабее» ссылка, тем охотнее GC собирает объект.\n\n<b>1. Strong Reference</b> — обычная ссылка\n<pre><code>Object obj = new Object(); // strong reference\n// GC НЕ удалит obj пока есть strong reference\n// obj = null; // теперь объект может быть собран</code></pre>\n\nЭто то, что вы используете 99% времени. Если есть хоть одна strong ref — объект жив.\n\n<b>GC Roots</b> (откуда начинается поиск достижимости):\n• Локальные переменные в стеке\n• Статические поля классов\n• Активные потоки (их стеки)\n• JNI-ссылки\n\nЕсли объект достижим из GC Root по цепочке strong references — он жив.\n\n<b>2. Weak Reference</b> — собирается при следующем GC\n<pre><code>import java.lang.ref.WeakReference;\n\nObject obj = new Object();\nWeakReference&lt;Object&gt; weak = new WeakReference&lt;&gt;(obj);\nobj = null; // strong ref удалена\n\nSystem.gc(); // GC собрал объект\nweak.get(); // null!</code></pre>\n\n<b>Использование:</b>\n• <code>WeakHashMap</code> — ключи как weak refs. При отсутствии strong refs на ключ — запись удаляется\n• Кеши, которые должны автоматически очищаться\n• Избежание утечек в observers / listeners\n• ThreadLocal (внутри использует WeakReference на ключ)\n\n<pre><code>// Пример: кэш не мешает GC собрать пользователя\nMap&lt;WeakReference&lt;User&gt;, UserProfile&gt; cache = new HashMap&lt;&gt;();\n// При удалении User из приложения — запись автоматически становится невалидной</code></pre>\n\n<b>3. Soft Reference</b> — собирается только при нехватке памяти\n<pre><code>SoftReference&lt;byte[]&gt; soft = new SoftReference&lt;&gt;(new byte[1024 * 1024]);\n// Остаётся в памяти, пока есть место в heap\n// При приближении к OOM — GC собирает soft refs</code></pre>\n\n<b>Использование:</b>\n• Кеши, где приемлемо потерять данные при давлении на память\n• Пул дорогих объектов (например, распарсенные конфиги)\n• <code>ResourceBundle</code> использует SoftReferences внутри\n\n<b>Soft vs Weak:</b>\n• Weak — собирается при первом же GC\n• Soft — только когда не хватает памяти\n• Soft «живучее» чем Weak\n\n<b>4. Phantom Reference</b> — для post-finalization cleanup\n<pre><code>import java.lang.ref.PhantomReference;\nimport java.lang.ref.ReferenceQueue;\n\nReferenceQueue&lt;Object&gt; queue = new ReferenceQueue&lt;&gt;();\nObject obj = new Object();\nPhantomReference&lt;Object&gt; phantom = new PhantomReference&lt;&gt;(obj, queue);\nphantom.get(); // ВСЕГДА null!\n\nobj = null;\nSystem.gc();\n\nReference&lt;?&gt; ref = queue.poll(); // получили уведомление\nif (ref != null) {\n    // объект прошёл финализацию, но ещё не освобождён\n    // можем освободить связанные native ресурсы\n    ref.clear();\n}</code></pre>\n\n<b>Отличия:</b>\n• <code>get()</code> ВСЕГДА возвращает null — нельзя «воскресить» объект\n• Всегда с <code>ReferenceQueue</code> — иначе бесполезно\n• Срабатывает ПОСЛЕ финализации (<code>finalize()</code>), но ПЕРЕД освобождением памяти\n\n<b>Применение:</b>\n• Замена <code>finalize()</code> (deprecated)\n• Освобождение native-ресурсов (JNI memory, file handles)\n• <code>Cleaner</code> API (Java 9+) — внутри использует PhantomReference\n\n<pre><code>// Java 9+ idiom:\nCleaner cleaner = Cleaner.create();\nclass Resource implements AutoCloseable {\n    private final Cleaner.Cleanable cleanable;\n    private final State state;\n\n    Resource() {\n        state = new State();\n        cleanable = cleaner.register(this, state); // runnable on cleanup\n    }\n\n    public void close() { cleanable.clean(); }\n\n    static class State implements Runnable {\n        public void run() { /* освобождение ресурсов */ }\n    }\n}</code></pre>\n\n<b>Сводная таблица:</b>\n<pre><code>Тип       | get()        | Когда собирается      | Использование\n──────────┼──────────────┼───────────────────────┼─────────────────────\nStrong    | объект       | НИКОГДА (пока ref жив) | 99% случаев\nSoft      | объект / null| при нехватке памяти   | Кеши\nWeak      | объект / null| при любом GC          | WeakHashMap, observers\nPhantom   | ВСЕГДА null  | после финализации    | Native cleanup</code></pre>\n\n<b>Порядок «слабости»:</b>\n<code>Strong &gt; Soft &gt; Weak &gt; Phantom</code>\n\n<b>ReferenceQueue:</b>\nКогда GC собирает объект, на который указывает Weak/Soft/Phantom reference, он может <b>положить саму Reference в очередь</b>. Это позволяет узнать что объект был собран.\n\n<pre><code>ReferenceQueue&lt;Cache&gt; queue = new ReferenceQueue&lt;&gt;();\nWeakReference&lt;Cache&gt; ref = new WeakReference&lt;&gt;(cache, queue);\n\n// Позже в фоновом потоке:\nReference&lt;?&gt; collected = queue.poll();\nif (collected != null) {\n    // cache был собран, уберём вспомогательные структуры\n}</code></pre>\n\n<b>Где это всё используется в JDK:</b>\n• <b>WeakHashMap</b> — ключи weak\n• <b>ThreadLocal</b> — внутри ThreadLocalMap ключи weak (значения — strong! может течь память если поток живёт долго)\n• <b>Cleaner API</b> — через phantom refs\n• <b>String.intern</b> — строки в пуле достигаются через weak (в некоторых JVM)\n• <b>ClassLoader</b> — классы загружаются пока есть strong ref на ClassLoader\n\n<b>Частые утечки через ссылки:</b>\n<pre><code>// ThreadLocal в пуле потоков — страшная утечка\npublic class LeakyFilter extends Filter {\n    static ThreadLocal&lt;HeavyObject&gt; tl = new ThreadLocal&lt;&gt;();\n\n    public void doFilter(...) {\n        tl.set(new HeavyObject());\n        // ... обработка\n        // tl.remove(); // забыли!\n    }\n}\n// HeavyObject держится thread-мы в пуле до смерти потока\n// Особенно плохо в Tomcat при redeploy — утечка ClassLoader</code></pre>\n\n<b>Правила:</b>\n• Всегда <code>ThreadLocal.remove()</code> после использования\n• Для кэша — SoftReference (данные) или Caffeine/Guava Cache (professional)\n• Для native-ресурсов — Cleaner API вместо finalize\n• PhantomReference редко нужен напрямую — обычно Cleaner или try-with-resources\n\n<b>На собесе:</b>\n• Назовите 4 вида ссылок по возрастанию «силы»\n• Зачем нужен WeakHashMap? (observers, кэш с авто-удалением)\n• Что такое GC Roots? (откуда начинается поиск достижимых объектов)\n• Почему phantom.get() возвращает null? (нельзя воскресить объект)\n• Что лучше: SoftReference или Caffeine Cache? (Caffeine — с TTL, size limits, statistics)',lvl:2},
    {q:'Stack vs Heap',a:'<b>Два основных региона памяти JVM:</b>\n\n<b>📚 Stack (стек)</b>\n• Хранит <b>фреймы методов</b>: локальные переменные, аргументы, адрес возврата\n• <b>Локальные примитивы</b> (int, long, boolean...) хранятся прямо в стеке\n• <b>Ссылки на объекты</b> тоже в стеке (сам объект — в heap)\n• Организация LIFO — каждый вызов метода = новый фрейм на вершине\n• <b>Свой у каждого потока</b> (thread-local)\n• Память выделяется/освобождается автоматически при входе/выходе из метода\n• Очень быстрый доступ (просто движение указателя стека)\n• Размер фиксированный: флаг <code>-Xss256k</code> (default ~512KB-1MB)\n• Переполнение → <b>StackOverflowError</b>\n\n<pre><code>void outer() {\n    int x = 5;           // в стеке\n    Person p = new Person(); // ссылка в стеке, объект — в heap\n    inner(x, p);         // новый фрейм inner сверху\n} // фрейм outer освобождается</code></pre>\n\n<b>🗄 Heap (куча)</b>\n• Хранит <b>все объекты и массивы</b>, созданные через <code>new</code>\n• <b>Один на всю JVM</b> — общий для всех потоков\n• Управляется Garbage Collector (GC)\n• Размер: <code>-Xms512m</code> (initial), <code>-Xmx2g</code> (max)\n• Доступ медленнее стека (поиск через указатели)\n• Переполнение → <b>OutOfMemoryError: Java heap space</b>\n\n<b>Структура heap в HotSpot:</b>\n<pre><code>Heap\n├── Young Generation (молодое поколение)\n│   ├── Eden  — новые объекты\n│   ├── S0    — Survivor 0\n│   └── S1    — Survivor 1\n└── Old Generation (старое поколение)\n    — объекты, пережившие N сборок young</code></pre>\nНовые объекты рождаются в Eden. При Minor GC выжившие переходят в Survivor, потом в Old.\n\n<b>Отдельно — Metaspace (Java 8+):</b>\n• Метаданные классов (Class objects, bytecode, константный пул)\n• В native-памяти, не в heap\n• Растёт по потребности: <code>-XX:MaxMetaspaceSize=256m</code>\n• До Java 8 был <b>PermGen</b> (permanent generation) в heap — известный источник OOM «PermGen space»\n\n<b>Пример различий на практике:</b>\n<pre><code>public class Example {\n    public static void main(String[] args) {\n        int a = 5;              // stack\n        int b = 10;             // stack\n        int[] arr = new int[10];// ссылка arr — stack, массив — heap\n        String s = "hello";     // ссылка s — stack, строка — heap (String Pool)\n        Person p = new Person(25, "John");\n        // ссылка p — stack\n        // объект Person — heap\n        // значение 25 — поле внутри объекта Person в heap\n        // строка "John" — heap (String Pool)\n    }\n}</code></pre>\n\n<b>Важные нюансы:</b>\n\n<b>Escape Analysis (JIT):</b> если компилятор доказал, что объект не «убегает» из метода, он может быть размещён в стеке (optimization). Но семантически программист думает — все new объекты в heap.\n\n<b>Thread Local Allocation Buffer (TLAB):</b> у каждого потока свой кусок Eden для быстрой аллокации без блокировок.\n\n<b>Off-heap memory:</b> <code>ByteBuffer.allocateDirect()</code>, Netty, Kafka — память вне heap, не трогает GC. Используется для высоконагруженных систем.\n\n<b>Утечки памяти:</b> в Java нет явного освобождения, но возможны утечки:\n• Статические коллекции с постоянно растущими элементами\n• ThreadLocal без remove\n• Не закрытые ресурсы (Connection, Stream)\n• Listeners, слушатели событий\n\n<b>Диагностика:</b>\n• <code>jmap -heap</code> — состояние heap\n• <code>jmap -dump</code> — дамп памяти\n• Eclipse MAT / VisualVM — анализ дампа\n• <code>-Xlog:gc*</code> — логи GC\n\n<b>На собесе:</b> где хранятся поля объекта? (heap, внутри самого объекта); а локальная переменная в методе? (stack — если примитив, или ссылка если объект).',lvl:1},
    {q:'Как настроить JVM для production?',a:'<b>Память:</b>\n<pre><code>-Xms2g -Xmx2g          # начальный = максимальный (избегаем resize)\n-XX:MaxMetaspaceSize=256m # лимит метаданных\n-XX:MaxDirectMemorySize=512m # для NIO буферов</code></pre>\n\n<b>GC (выбор):</b>\n<pre><code># G1 (default, универсальный)\n-XX:+UseG1GC -XX:MaxGCPauseMillis=200\n\n# ZGC (low-latency, платёжные системы)\n-XX:+UseZGC -XX:+ZGenerational</code></pre>\n\n<b>Мониторинг и диагностика:</b>\n<pre><code>-XX:+HeapDumpOnOutOfMemoryError\n-XX:HeapDumpPath=/tmp/heapdump.hprof\n-Xlog:gc*:file=gc.log:time,uptime,level,tags\n-XX:+UnlockDiagnosticVMOptions\n-XX:+DebugNonSafepoints  # для async-profiler</code></pre>\n\n<b>Для контейнеров (K8s/Docker):</b>\n<pre><code>-XX:+UseContainerSupport        # default с Java 10\n-XX:MaxRAMPercentage=75.0       # 75% от container memory limit\n-XX:InitialRAMPercentage=75.0   # сразу выделяем</code></pre>\n\n<b>Пример Dockerfile:</b>\n<pre><code>FROM eclipse-temurin:21-jre\nENV JAVA_OPTS="-XX:+UseZGC -XX:MaxRAMPercentage=75 -XX:+HeapDumpOnOutOfMemoryError"\nCMD java $JAVA_OPTS -jar app.jar</code></pre>\n\n<b>На собесе:</b> как настроен JVM в вашем production? Какой GC используете? Как мониторите? (Prometheus + Grafana: jvm_memory_used, jvm_gc_pause)',lvl:2},
    {q:'Случаи утечки памяти в Java',a:'Несмотря на GC, утечки возможны:\n\n• <b>Незакрытые ресурсы</b>: Connection, InputStream без try-with-resources\n• <b>Статические коллекции</b>: static Map который только растёт\n• <b>Listeners/Callbacks</b>: зарегистрировали, не отписались\n• <b>ThreadLocal</b>: не вызван remove() в thread pool\n• <b>Inner classes</b>: нестатический внутренний класс держит ссылку на внешний\n• <b>Кеш без eviction</b>: HashMap как кеш без ограничения размера\n\nДиагностика: jmap, jvisualvm, Eclipse MAT, async-profiler',lvl:2},

    {q:'Примитивные типы данных',a:'8 примитивов:\n• <code>byte</code> (1Б, -128..127), <code>short</code> (2Б), <code>int</code> (4Б, ~±2.1 млрд), <code>long</code> (8Б)\n• <code>float</code> (4Б), <code>double</code> (8Б, IEEE 754)\n• <code>char</code> (2Б, UTF-16), <code>boolean</code> (~1Б)\n\nОбёртки: Integer, Long... Автоупаковка/распаковка.\nInteger cache: -128..127.',lvl:1},
    {q:'Что такое автоупаковка и распаковка?',a:'<b>Автоупаковка (autoboxing):</b> примитив → обёртка автоматически.\n<pre><code>Integer x = 42;       // int → Integer.valueOf(42)\nList<Integer> list = new ArrayList<>();\nlist.add(5);          // int → Integer.valueOf(5)</code></pre>\n\n<b>Распаковка (unboxing):</b> обёртка → примитив.\n<pre><code>int y = x;            // Integer.intValue()\nint sum = x + 10;     // распаковка перед сложением</code></pre>\n\n<b>Подводные камни:</b>\n\n1. <b>Integer Cache (-128..127):</b>\n<pre><code>Integer a = 127, b = 127;\na == b  // true — один объект из кэша!\n\nInteger c = 128, d = 128;\nc == d  // false — разные объекты!\nc.equals(d) // true — всегда используй equals!</code></pre>\n\n2. <b>NullPointerException при unboxing:</b>\n<pre><code>Integer x = null;\nint y = x;  // NPE! null.intValue()\n\n// Частая ошибка в Map:\nMap<String, Integer> map = new HashMap<>();\nint val = map.get("key"); // NPE если ключа нет!</code></pre>\n\n3. <b>Производительность:</b>\n<pre><code>// Плохо: миллион boxing операций\nLong sum = 0L;\nfor (long i = 0; i < 1_000_000; i++) sum += i;\n\n// Хорошо: примитив\nlong sum = 0L;\nfor (long i = 0; i < 1_000_000; i++) sum += i;</code></pre>\n\n<b>На собесе:</b> почему <code>Integer.valueOf(127) == Integer.valueOf(127)</code> true, а 128 — false?',lvl:2},
    {q:'String, StringBuilder, StringBuffer',a:'<b>String</b> — immutable, final класс. Хранится в String Pool.\n<pre><code>String s1 = "hello";           // литерал → String Pool\nString s2 = "hello";           // та же ссылка из Pool\nString s3 = new String("hello"); // новый объект в heap\n\ns1 == s2    // true (один объект в Pool)\ns1 == s3    // false (разные объекты)\ns1.equals(s3) // true (одинаковое содержимое)</code></pre>\n\nCompact Strings (Java 9+): byte[] + coder (LATIN1/UTF16) вместо char[] — экономия памяти.\n\n<b>Конкатенация в цикле — ПРОБЛЕМА:</b>\n<pre><code>// Плохо: O(n²) — создаёт новый String на каждой итерации\nString result = "";\nfor (int i = 0; i < 10000; i++) result += i;\n\n// Хорошо: O(n) — StringBuilder\nvar sb = new StringBuilder();\nfor (int i = 0; i < 10000; i++) sb.append(i);\nString result = sb.toString();</code></pre>\n\n<b>StringBuilder vs StringBuffer:</b>\n• StringBuilder — НЕ потокобезопасный, быстрый (используй по умолчанию)\n• StringBuffer — synchronized, медленнее (legacy)\n\n<b>Text Blocks (Java 15+):</b>\n<pre><code>String json = \"\"\"\n    {\n        "name": "Payment",\n        "amount": 100.50\n    }\n    \"\"\";</code></pre>\n\n<b>Почему String immutable:</b> безопасность ключей (HashMap), потокобезопасность, String Pool, кеширование hashCode.\n\n<b>На собесе:</b> почему строки не рекомендуется использовать для хранения паролей? (String Pool — не контролируешь когда GC удалит, char[] можно обнулить)',hot:1,lvl:2},
    {q:'Что такое пул строк (String Pool)?',a:'Область в heap для уникальных строковых литералов.\n\n• Литералы автоматически в пуле: <code>String s = "hello"</code>\n• <code>new String("hello")</code> создаёт ВНЕ пула\n• <code>intern()</code> — возвращает из пула или добавляет\n• Экономит память при повторяющихся строках\n• С Java 7 — в heap (не PermGen), управляется GC',lvl:2},
    {q:'Почему String неизменяемый?',a:'• <b>Безопасность</b> — как ключ в HashMap, hashCode не меняется\n• <b>Потокобезопасность</b> — можно шарить между потоками без синхронизации\n• <b>String Pool</b> — несколько ссылок на один объект\n• <b>Кеширование hashCode</b> — вычисляется один раз, используется повторно\n• <b>Безопасность паролей</b> — нельзя модифицировать (но char[] лучше — можно обнулить)',lvl:2},
    {q:'Передача по значению или по ссылке?',a:'Java ВСЕГДА передаёт <b>по значению</b>.\n\nДля примитивов: копируется значение.\nДля объектов: копируется <b>ссылка</b> (не объект!).\n\n<pre><code>void change(String s) { s = "new"; } // не изменит оригинал\nvoid change(List l) { l.add(1); } // изменит содержимое!\nvoid change(List l) { l = new ArrayList(); } // не изменит оригинал</code></pre>',lvl:2},
