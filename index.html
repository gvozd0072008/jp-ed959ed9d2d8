  {id:"str-002",topic:"streams",lvl:2,type:"single",q:"Что выведет код?",code:"Stream.of(1, 2, 3, 4, 5)\n  .filter(n -> n > 2)\n  .map(n -> n * 2)\n  .findFirst()\n  .orElse(0);",options:["6","2","8","0","10"],correct:[0],explanation:"filter оставляет 3,4,5. map превращает в 6,8,10. findFirst() возвращает 6."},
  {id:"str-003",topic:"streams",lvl:2,type:"multi",q:"Какие операции Stream являются промежуточными?",options:["forEach()","peek()","reduce()","distinct()","count()"],correct:[1,3],explanation:"peek() и distinct() — промежуточные. forEach(), reduce(), count() — терминальные."},
  // === Multithreading ===
  {id:"thr-001",topic:"threads",lvl:2,type:"multi",q:"Какие из перечисленных коллекций потокобезопасны?",options:["ArrayList","ConcurrentHashMap","HashMap","CopyOnWriteArrayList","LinkedList"],correct:[1,3],explanation:"ConcurrentHashMap и CopyOnWriteArrayList из java.util.concurrent. ArrayList, HashMap, LinkedList — НЕ потокобезопасны."},
  {id:"thr-002",topic:"threads",lvl:2,type:"single",q:"Что делает volatile в Java?",options:["Запрещает изменение переменной","Гарантирует атомарность операций","Гарантирует видимость изменений между потоками","Блокирует доступ к переменной","Делает переменную потокобезопасной для любых операций"],correct:[2],explanation:"volatile гарантирует visibility — изменения видны другим потокам сразу. НЕ гарантирует атомарность (i++ НЕ атомарна даже с volatile)."},
  {id:"thr-003",topic:"threads",lvl:2,type:"single",q:"Какое состояние потока означает ожидание монитора?",options:["NEW","RUNNABLE","BLOCKED","WAITING","TERMINATED"],correct:[2],explanation:"BLOCKED — поток ждёт получения монитора (synchronized блок занят другим потоком). WAITING — ждёт notify(). RUNNABLE — выполняется или готов."},
  {id:"thr-004",topic:"threads",lvl:3,type:"single",q:"Что произойдёт?",code:"ExecutorService ex = Executors.newFixedThreadPool(2);\nfor (int i = 0; i < 5; i++) {\n  ex.submit(() -> {\n    Thread.sleep(1000);\n    System.out.print(\"*\");\n  });\n}",options:["Выведет 5 звёзд одновременно","Выведет 5 звёзд по 2 одновременно","Ошибка компиляции","Выведет 2 звезды и зависнет","InterruptedException"],correct:[1],explanation:"Пул из 2 потоков. Первые 2 задачи выполнятся через 1с, потом следующие 2, потом последняя. Итого 5 звёзд, но порциями по 2. Примечание: sleep в лямбде требует обработки checked exception."},
  // === SQL ===
  {id:"sql-001",topic:"sql",lvl:1,type:"single",q:"Какой JOIN вернёт только совпадающие строки из обеих таблиц?",options:["LEFT JOIN","RIGHT JOIN","INNER JOIN","FULL OUTER JOIN","CROSS JOIN"],correct:[2],explanation:"INNER JOIN — только строки с совпадением в обеих таблицах. LEFT — все из левой + совпадения. CROSS — декартово произведение."},
  {id:"sql-002",topic:"sql",lvl:2,type:"single",q:"Какой уровень изоляции предотвращает фантомное чтение?",options:["READ UNCOMMITTED","READ COMMITTED","REPEATABLE READ","SERIALIZABLE","Все уровни"],correct:[3],explanation:"SERIALIZABLE — максимальный уровень, предотвращает phantom reads. REPEATABLE READ предотвращает non-repeatable reads, но не фантомы (в стандарте SQL; в InnoDB MySQL — предотвращает)."},
  {id:"sql-003",topic:"sql",lvl:1,type:"multi",q:"Какие команды относятся к DDL?",options:["SELECT","CREATE TABLE","INSERT","ALTER TABLE","DROP TABLE"],correct:[1,3,4],explanation:"DDL (Data Definition Language): CREATE, ALTER, DROP, TRUNCATE. DML: SELECT, INSERT, UPDATE, DELETE."},
  {id:"sql-004",topic:"sql",lvl:2,type:"single",q:"Что делает индекс в базе данных?",options:["Шифрует данные","Ускоряет SELECT запросы за счёт дополнительного хранилища","Гарантирует уникальность всех значений","Автоматически партиционирует таблицу","Блокирует конкурентный доступ"],correct:[1],explanation:"Индекс — структура (обычно B-tree), ускоряющая поиск. Занимает место и замедляет INSERT/UPDATE. Уникальность — только UNIQUE INDEX."},
  // === Hibernate/JPA ===
  {id:"jpa-001",topic:"jpa",lvl:1,type:"single",q:"Какая аннотация определяет первичный ключ сущности JPA?",options:["@Entity","@Table","@Id","@Column","@GeneratedValue"],correct:[2],explanation:"@Id — помечает поле как первичный ключ. @Entity — помечает класс как сущность. @GeneratedValue — стратегия генерации ID."},
  {id:"jpa-002",topic:"jpa",lvl:2,type:"single",q:"Какой тип fetch по умолчанию для @ManyToOne?",options:["LAZY","EAGER","NONE","AUTO","BATCH"],correct:[1],explanation:"@ManyToOne и @OneToOne — EAGER по умолчанию. @OneToMany и @ManyToMany — LAZY по умолчанию. Best practice: всегда указывать LAZY явно."},
  {id:"jpa-003",topic:"jpa",lvl:2,type:"single",q:"Что такое N+1 проблема в Hibernate?",options:["Ошибка маппинга N сущностей","1 запрос для списка + N запросов для каждого связанного объекта","Ограничение на количество JOIN","Проблема с кешем первого уровня","Конфликт транзакций"],correct:[1],explanation:"N+1: 1 запрос загружает N сущностей, потом для каждой делается отдельный запрос за связанными объектами. Решение: JOIN FETCH, @EntityGraph, @BatchSize."},
  // === Spring ===
  {id:"spr-001",topic:"spring",lvl:1,type:"single",q:"Какой scope бина Spring создаёт один экземпляр на всё приложение?",options:["prototype","request","session","singleton","application"],correct:[3],explanation:"singleton — один экземпляр на Spring контейнер (по умолчанию). prototype — новый экземпляр при каждом запросе бина."},
  {id:"spr-002",topic:"spring",lvl:2,type:"single",q:"Что делает аннотация @Transactional(readOnly=true)?",options:["Запрещает чтение данных","Оптимизирует: Hibernate не делает dirty checking","Создаёт read lock на таблицы","Отключает транзакцию","Использует SERIALIZABLE изоляцию"],correct:[1],explanation:"readOnly=true — подсказка: Hibernate пропускает dirty checking (flush mode MANUAL), что ускоряет чтение. НЕ блокирует запись на уровне БД."},
  {id:"spr-003",topic:"spring",lvl:2,type:"multi",q:"Какие из этих аннотаций являются стереотипами Spring?",options:["@Component","@Service","@Transactional","@Repository","@Autowired"],correct:[0,1,3],explanation:"Стереотипы: @Component, @Service, @Repository, @Controller. @Transactional — аспект транзакций. @Autowired — внедрение зависимостей."},
  {id:"spr-004",topic:"spring",lvl:2,type:"single",q:"В каком случае @Transactional НЕ сработает?",options:["На public методе","При вызове из другого бина","При вызове метода из того же класса (self-invocation)","На методе с параметрами","В @Service классе"],correct:[2],explanation:"Self-invocation: вызов @Transactional метода из того же класса обходит прокси. Spring AOP создаёт прокси-обёртку, а внутренний вызов идёт напрямую."},
  {id:"spr-005",topic:"spring",lvl:1,type:"single",q:"Какой паттерн лежит в основе Spring IoC контейнера?",options:["Singleton","Factory","Dependency Injection","Observer","Strategy"],correct:[2],explanation:"IoC (Inversion of Control) реализуется через Dependency Injection — контейнер сам создаёт и внедряет зависимости через конструктор, сеттер или поле."},
  // === Kafka ===
  {id:"kfk-001",topic:"kafka",lvl:1,type:"single",q:"Что такое partition в Kafka?",options:["Копия данных на другом брокере","Упорядоченная последовательность сообщений внутри топика","Группа консьюмеров","Буфер для продюсера","Индекс сообщений"],correct:[1],explanation:"Partition — упорядоченная immutable последовательность сообщений. Топик разделён на партиции для параллелизма. Порядок гарантирован ВНУТРИ партиции."},
  {id:"kfk-002",topic:"kafka",lvl:2,type:"single",q:"Что означает acks=all у Kafka продюсера?",options:["Сообщение не требует подтверждения","Подтверждение от leader-а","Подтверждение от leader + всех in-sync реплик","Подтверждение от всех брокеров кластера","Подтверждение от консьюмера"],correct:[2],explanation:"acks=all (-1) — leader ждёт подтверждения от всех ISR (in-sync replicas). Максимальная надёжность, но выше latency. acks=1 — только leader."},
  {id:"kfk-003",topic:"kafka",lvl:2,type:"single",q:"Что произойдёт, если консьюмеров в группе больше, чем партиций?",options:["Сообщения дублируются","Лишние консьюмеры будут idle","Ошибка конфигурации","Kafka автоматически создаст партиции","Round-robin между всеми"],correct:[1],explanation:"В consumer group каждая партиция назначается ровно одному консьюмеру. Если консьюмеров больше — лишние простаивают (idle)."},
  // === Архитектура ===
  {id:"arch-001",topic:"arch",lvl:1,type:"single",q:"Что такое микросервисная архитектура?",options:["Один большой деплой","Набор мелких независимых сервисов с отдельными БД","Архитектура с общей базой данных","Клиент-серверная архитектура","Монолит с модулями"],correct:[1],explanation:"Микросервисы — независимые сервисы, каждый со своей БД, деплоятся отдельно, общаются через API/events. Противоположность монолиту."},
  {id:"arch-002",topic:"arch",lvl:2,type:"single",q:"Какой паттерн решает проблему распределённых транзакций?",options:["Singleton","Circuit Breaker","Saga","Repository","CQRS"],correct:[2],explanation:"Saga — последовательность локальных транзакций с компенсирующими действиями при ошибке. Виды: хореография (события) и оркестрация (координатор)."},
  {id:"arch-003",topic:"arch",lvl:2,type:"multi",q:"Какие паттерны относятся к отказоустойчивости?",options:["Circuit Breaker","Singleton","Retry","Bulkhead","Factory"],correct:[0,2,3],explanation:"Circuit Breaker, Retry, Bulkhead — паттерны resilience. Singleton и Factory — порождающие паттерны GoF."},
  // === Паттерны ===
  {id:"pat-001",topic:"patterns",lvl:1,type:"single",q:"Какой паттерн гарантирует единственный экземпляр класса?",options:["Factory","Builder","Singleton","Prototype","Adapter"],correct:[2],explanation:"Singleton — один экземпляр на приложение. В Spring все бины singleton по умолчанию. Потокобезопасная реализация: enum, holder class, или double-checked locking."},
  {id:"pat-002",topic:"patterns",lvl:2,type:"single",q:"Какой паттерн используется в java.util.stream.Stream?",options:["Iterator","Builder","Strategy","Chain of Responsibility","Decorator"],correct:[1],explanation:"Stream API использует Builder pattern (цепочка методов строит pipeline). Также Pipeline/Pipes-and-Filters. Каждая промежуточная операция возвращает новый Stream."},
  // === Тестирование ===
  {id:"tst-001",topic:"test",lvl:1,type:"single",q:"Какая аннотация JUnit 5 помечает тестовый метод?",options:["@Test","@RunWith","@TestClass","@Verify","@Check"],correct:[0],explanation:"@Test (org.junit.jupiter.api.Test) — помечает метод как тест в JUnit 5. @RunWith — JUnit 4. В JUnit 5 вместо него @ExtendWith."},
  {id:"tst-002",topic:"test",lvl:2,type:"multi",q:"Какие фреймворки используют для мокирования?",options:["Mockito","JUnit","Testcontainers","WireMock","AssertJ"],correct:[0,3],explanation:"Mockito — мокирование Java объектов. WireMock — мокирование HTTP сервисов. JUnit — тестовый фреймворк. Testcontainers — реальные контейнеры. AssertJ — assertions."},
  // === DevOps ===
  {id:"dev-001",topic:"devops",lvl:1,type:"single",q:"Что такое Docker контейнер?",options:["Виртуальная машина","Изолированный процесс с собственной файловой системой","Физический сервер","Облачный инстанс","Java процесс"],correct:[1],explanation:"Контейнер — изолированный процесс, использующий namespaces и cgroups ядра Linux. Легче VM — делит ядро ОС. Образ (image) — шаблон, контейнер — запущенный экземпляр."},
  {id:"dev-002",topic:"devops",lvl:2,type:"single",q:"Чем отличается CMD от ENTRYPOINT в Dockerfile?",options:["Ничем не отличается","CMD задаёт аргументы по умолчанию (можно переопределить), ENTRYPOINT — основную команду","ENTRYPOINT выполняется первым, CMD — последним","CMD обязателен, ENTRYPOINT — нет","CMD для production, ENTRYPOINT для development"],correct:[1],explanation:"ENTRYPOINT — основная команда контейнера. CMD — аргументы по умолчанию, переопределяются при docker run. Комбинация: ENTRYPOINT [\"java\", \"-jar\"], CMD [\"app.jar\"]."},
  // === Безопасность ===
  {id:"sec-001",topic:"security",lvl:1,type:"single",q:"Что такое JWT?",options:["Java Web Token","JSON Web Template","JSON Web Token","JavaScript Worker Thread","Java Websocket Transport"],correct:[2],explanation:"JWT (JSON Web Token) — стандарт (RFC 7519) для передачи claims между сторонами. Структура: Header.Payload.Signature (Base64). Используется для аутентификации."},
  {id:"sec-002",topic:"security",lvl:2,type:"multi",q:"Какие атаки входят в OWASP Top 10?",options:["SQL Injection","Buffer Overflow в Java","XSS (Cross-Site Scripting)","Broken Authentication","Memory Leak"],correct:[0,2,3],explanation:"OWASP Top 10: Injection, Broken Auth, XSS, Insecure Deserialization и др. Buffer Overflow нетипичен для Java (managed memory). Memory Leak — не security атака."},
  // === Сеть ===
  {id:"net-001",topic:"protocols",lvl:1,type:"single",q:"Какой код HTTP означает успешное создание ресурса?",options:["200 OK","201 Created","204 No Content","301 Moved","400 Bad Request"],correct:[1],explanation:"201 Created — ресурс успешно создан (POST). 200 OK — общий успех. 204 No Content — успех без тела ответа (DELETE)."},
  {id:"net-002",topic:"protocols",lvl:2,type:"single",q:"Чем REST отличается от gRPC?",options:["REST быстрее","gRPC использует JSON","REST использует HTTP/1.1 + JSON, gRPC — HTTP/2 + Protobuf","Они идентичны","REST поддерживает стриминг, gRPC — нет"],correct:[2],explanation:"REST: HTTP/1.1, JSON, текстовый. gRPC: HTTP/2, Protocol Buffers (бинарный), поддерживает bidirectional streaming. gRPC быстрее для межсервисного общения."},
  // === Core Java (continued) ===
  {id:"core-013",topic:"core",lvl:1,type:"single",q:"Что будет, если не переопределить hashCode() при переопределённом equals()?",options:["Ничего страшного","Объекты нельзя будет сравнивать","Нарушится контракт HashMap — equals-объекты попадут в разные бакеты","Ошибка компиляции","ClassCastException"],correct:[2],explanation:"Контракт: если a.equals(b), то a.hashCode() == b.hashCode(). Без этого HashMap не найдёт объект, т.к. он попадёт в другой бакет."},
  {id:"core-014",topic:"core",lvl:2,type:"single",q:"Какой результат?",code:"String s = \"Java\";\ns.concat(\" 21\");\nSystem.out.println(s);",options:["Java 21","Java","null","Ошибка компиляции","Java Java 21"],correct:[1],explanation:"String immutable! concat() возвращает НОВЫЙ объект, но результат не присвоен. s по-прежнему \"Java\"."},
  {id:"core-015",topic:"core",lvl:2,type:"multi",q:"Какие утверждения верны про interface в Java 8+?",options:["Может содержать default методы","Может содержать static методы","Может содержать конструкторы","Может содержать private методы (Java 9+)","Все методы обязательно public"],correct:[0,1,3],explanation:"Java 8: default и static методы. Java 9: private методы. Конструкторов в интерфейсе нет. С Java 9 методы могут быть private."},
  {id:"core-016",topic:"core",lvl:3,type:"single",q:"Что такое happens-before в Java Memory Model?",options:["Порядок выполнения строк кода","Гарантия, что результат одной операции видим другой","Приоритет потоков","Порядок загрузки классов","Очерёдность в synchronized блоке"],correct:[1],explanation:"Happens-before — отношение между операциями, гарантирующее видимость записи для чтения. Примеры: unlock → lock, volatile write → volatile read, thread start/join."},
  {id:"core-017",topic:"core",lvl:1,type:"single",q:"Какой класс является родительским для всех классов в Java?",options:["Class","Base","Root","Object","Main"],correct:[3],explanation:"java.lang.Object — корень иерархии классов. Все классы неявно наследуют Object. Методы: equals, hashCode, toString, clone, wait, notify, finalize."},
  {id:"core-018",topic:"core",lvl:2,type:"single",q:"Что выведет код?",code:"int[] arr = {1, 2, 3};\nint[] copy = arr;\ncopy[0] = 99;\nSystem.out.println(arr[0]);",options:["1","99","0","ArrayIndexOutOfBoundsException","Ошибка компиляции"],correct:[1],explanation:"Массивы — ссылочные типы. copy и arr указывают на один и тот же объект в heap. Изменение через copy видно через arr."},
  {id:"core-019",topic:"core",lvl:2,type:"single",q:"Чем abstract class отличается от interface?",options:["abstract class может иметь состояние (поля), interface — нет","Они идентичны с Java 8","interface может иметь конструктор","abstract class не может иметь методы","interface быстрее"],correct:[0],explanation:"abstract class: поля экземпляра, конструкторы, любые модификаторы. interface: только константы (public static final), default/static/private методы. Класс может implements несколько interfaces, но extends один класс."},
  {id:"core-020",topic:"core",lvl:1,type:"multi",q:"Какие методы определены в классе Object?",options:["equals()","compareTo()","hashCode()","toString()","iterator()"],correct:[0,2,3],explanation:"Object: equals(), hashCode(), toString(), clone(), getClass(), wait(), notify(), notifyAll(), finalize(). compareTo() — из Comparable, iterator() — из Iterable."},
  {id:"core-021",topic:"core",lvl:2,type:"single",q:"Что выведет код?",code:"System.out.println(1 + 2 + \"3\");\nSystem.out.println(\"1\" + 2 + 3);",options:["33 и 123","33 и 33","123 и 123","5 и 6","33 и 6"],correct:[0],explanation:"Первая строка: 1+2=3, потом 3+\"3\"=\"33\". Вторая: \"1\"+2=\"12\", потом \"12\"+3=\"123\". Конкатенация строк идёт слева направо."},
  {id:"core-022",topic:"core",lvl:3,type:"single",q:"Какой паттерн используется в try-with-resources?",options:["Strategy","Template Method","Observer","RAII / Resource Management","Decorator"],correct:[3],explanation:"try-with-resources реализует RAII (Resource Acquisition Is Initialization) — автоматическое закрытие ресурсов через AutoCloseable.close(). Ресурс закрывается в finally неявно."},
  {id:"core-023",topic:"core",lvl:2,type:"single",q:"Что такое Diamond Problem и как Java его решает?",options:["Проблема с дженериками","Конфликт методов при множественном наследовании — Java запрещает множественное наследование классов","Проблема сборки мусора","Конфликт имён пакетов","Проблема с сериализацией"],correct:[1],explanation:"Diamond Problem: два суперкласса имеют одинаковый метод. Java решает: запрет множественного наследования классов (только один extends). С interface default methods — нужно явно переопределить конфликтующий метод."},
  {id:"core-024",topic:"core",lvl:2,type:"single",q:"Какой результат?",code:"Optional<String> opt = Optional.ofNullable(null);\nSystem.out.println(opt.orElse(\"default\"));",options:["null","default","NullPointerException","Optional.empty","Ошибка компиляции"],correct:[1],explanation:"Optional.ofNullable(null) создаёт пустой Optional. orElse() возвращает значение по умолчанию, если Optional пуст."},
  {id:"core-025",topic:"core",lvl:1,type:"single",q:"Что такое autoboxing в Java?",options:["Упаковка объектов в контейнеры","Автоматическое преобразование примитива в wrapper-объект","Сжатие данных","Автоматическая сериализация","Кэширование объектов"],correct:[1],explanation:"Autoboxing: int → Integer автоматически. Unboxing: Integer → int. Внимание: unboxing null выбросит NullPointerException."},
  // === Collections (continued) ===
  {id:"col-006",topic:"collections",lvl:1,type:"single",q:"Какая коллекция реализует очередь FIFO?",options:["Stack","ArrayList","LinkedList (как Queue)","TreeSet","HashMap"],correct:[2],explanation:"LinkedList реализует интерфейс Queue (FIFO). Stack — LIFO. ArrayDeque — также FIFO/LIFO, но эффективнее LinkedList."},
  {id:"col-007",topic:"collections",lvl:2,type:"single",q:"Чем TreeMap отличается от HashMap?",options:["TreeMap быстрее","TreeMap хранит элементы отсортированными по ключу","HashMap не допускает null ключей","TreeMap основана на hash таблице","Они идентичны"],correct:[1],explanation:"TreeMap: Red-Black Tree, O(log n), сортировка по ключу (Comparable/Comparator). HashMap: hash table, O(1) amortized, без порядка. TreeMap не допускает null ключей."},
  {id:"col-008",topic:"collections",lvl:2,type:"single",q:"Что произойдёт?",code:"List<Integer> list = Arrays.asList(1, 2, 3);\nlist.add(4);",options:["[1, 2, 3, 4]","UnsupportedOperationException","Ошибка компиляции","[4, 1, 2, 3]","NullPointerException"],correct:[1],explanation:"Arrays.asList() возвращает fixed-size список (обёртку над массивом). add()/remove() выбросят UnsupportedOperationException. Для mutable: new ArrayList<>(Arrays.asList(...))."},
  {id:"col-009",topic:"collections",lvl:3,type:"single",q:"Какой load factor по умолчанию у HashMap?",options:["0.5","0.7","0.75","1.0","Зависит от размера"],correct:[2],explanation:"Default load factor = 0.75 (capacity * 0.75 = threshold для resize). Initial capacity = 16. При 12 элементах (16*0.75) произойдёт resize до 32."},
  {id:"col-010",topic:"collections",lvl:2,type:"multi",q:"Какие коллекции реализуют интерфейс Deque?",options:["ArrayList","ArrayDeque","LinkedList","PriorityQueue","Stack"],correct:[1,2],explanation:"Deque (double-ended queue): ArrayDeque и LinkedList. ArrayDeque быстрее для stack/queue (нет overhead на nodes). PriorityQueue — не Deque, а priority heap."},
  {id:"col-011",topic:"collections",lvl:2,type:"single",q:"Как ConcurrentHashMap обеспечивает потокобезопасность в Java 8+?",options:["synchronized на всей map","ReadWriteLock","CAS + synchronized на отдельных бакетах","Копирование при записи","Отсутствие блокировок"],correct:[2],explanation:"Java 8+: CAS (Compare-And-Swap) для вставки в пустой бакет + synchronized на первом узле непустого бакета. Нет блокировки всей map."},
  {id:"col-012",topic:"collections",lvl:1,type:"single",q:"В чём разница между Comparable и Comparator?",options:["Comparable — внешняя сортировка, Comparator — внутренняя","Comparable определяет естественный порядок (compareTo в классе), Comparator — внешний (отдельный класс)","Comparable только для строк","Comparator быстрее","Они взаимозаменяемы"],correct:[1],explanation:"Comparable: интерфейс в самом классе (compareTo). Comparator: отдельный объект (compare). Comparable — один порядок, Comparator — множество."},
  // === Stream API (continued) ===
  {id:"str-004",topic:"streams",lvl:2,type:"single",q:"Что делает flatMap()?",options:["Фильтрует элементы","Преобразует каждый элемент в Stream и объединяет результаты в один поток","Сортирует элементы","Группирует элементы","Создаёт параллельный поток"],correct:[1],explanation:"flatMap: каждый элемент → Stream, все результаты объединяются (flatten). Пример: list.stream().flatMap(l -> l.stream()) — из списка списков в плоский список."},
  {id:"str-005",topic:"streams",lvl:2,type:"single",q:"Чем reduce() отличается от collect()?",options:["Ничем","reduce — иммутабельная свёртка, collect — мутабельная аккумуляция","reduce быстрее","collect только для List","reduce только для чисел"],correct:[1],explanation:"reduce: создаёт новый результат на каждом шаге (immutable). collect: мутирует контейнер (StringBuilder, ArrayList). collect эффективнее для мутабельных результатов."},
  {id:"str-006",topic:"streams",lvl:1,type:"single",q:"Что вернёт этот код?",code:"List.of(3, 1, 4, 1, 5).stream()\n  .distinct()\n  .sorted()\n  .collect(Collectors.toList());",options:["[3, 1, 4, 1, 5]","[1, 3, 4, 5]","[1, 1, 3, 4, 5]","[5, 4, 3, 1]","[3, 1, 4, 5]"],correct:[1],explanation:"distinct() убирает дубликаты: [3,1,4,5]. sorted() сортирует: [1,3,4,5]. collect собирает в List."},
  {id:"str-007",topic:"streams",lvl:2,type:"multi",q:"Какие из этих операций являются short-circuiting (завершаются раньше)?",options:["filter()","findFirst()","anyMatch()","map()","limit()"],correct:[1,2,4],explanation:"Short-circuiting: findFirst, findAny, anyMatch, allMatch, noneMatch (терминальные), limit (промежуточная). filter и map обрабатывают все элементы."},
  {id:"str-008",topic:"streams",lvl:3,type:"single",q:"В чём опасность параллельных стримов?",options:["Они всегда медленнее","Overhead на разделение и слияние + неподходящий источник данных (LinkedList) + thread-safety проблемы","Они не поддерживаются в Java 17","Параллельные стримы блокируют main thread","Они потребляют бесконечно много памяти"],correct:[1],explanation:"Проблемы: ForkJoinPool overhead, LinkedList плохо параллелится (нет random access), side-effects в лямбдах + общий ForkJoinPool.commonPool()."},
  // === Multithreading (continued) ===
  {id:"thr-005",topic:"threads",lvl:1,type:"single",q:"Чем synchronized отличается от ReentrantLock?",options:["Ничем","ReentrantLock позволяет tryLock, timeout, fairness, interruptible lock","synchronized быстрее всегда","ReentrantLock не поддерживает reentrant","synchronized работает только на статических методах"],correct:[1],explanation:"ReentrantLock: tryLock(), lockInterruptibly(), fair/unfair, multiple Conditions. synchronized: проще синтаксис, автоматический release. Оба reentrant."},
  {id:"thr-006",topic:"threads",lvl:2,type:"single",q:"Что такое deadlock?",options:["Когда поток завершается неожиданно","Когда два потока ждут ресурсы друг друга и ни один не может продолжить","Когда поток выполняется слишком долго","Когда поток не может получить CPU time","Ошибка в synchronized блоке"],correct:[1],explanation:"Deadlock: поток A держит lock1 и ждёт lock2, поток B держит lock2 и ждёт lock1. Решение: единый порядок получения lock-ов, tryLock с timeout."},
  {id:"thr-007",topic:"threads",lvl:2,type:"multi",q:"Какие классы/интерфейсы относятся к java.util.concurrent?",options:["CountDownLatch","synchronized","CompletableFuture","AtomicInteger","Thread"],correct:[0,2,3],explanation:"j.u.c: CountDownLatch, CompletableFuture, AtomicInteger, ConcurrentHashMap, ExecutorService и др. synchronized — ключевое слово языка. Thread — java.lang."},
  {id:"thr-008",topic:"threads",lvl:3,type:"single",q:"Что делает CompletableFuture.supplyAsync()?",options:["Блокирует текущий поток","Выполняет задачу асинхронно и возвращает CompletableFuture с результатом","Создаёт новый Thread","Планирует задачу на определённое время","Выполняет задачу синхронно"],correct:[1],explanation:"supplyAsync — запускает Supplier в ForkJoinPool.commonPool() (или указанном Executor) и возвращает CompletableFuture. Можно чейнить: thenApply, thenCompose, handle."},
  {id:"thr-009",topic:"threads",lvl:2,type:"single",q:"Что такое ThreadLocal?",options:["Локальная переменная в методе","Переменная, имеющая отдельную копию для каждого потока","Синхронизированная переменная","Кэш потока","Статическая переменная"],correct:[1],explanation:"ThreadLocal хранит отдельное значение для каждого потока. Пример: SimpleDateFormat (не thread-safe) в ThreadLocal. Осторожно с thread pools — нужно remove() после использования."},
  {id:"thr-010",topic:"threads",lvl:2,type:"single",q:"Чем Future отличается от CompletableFuture?",options:["Ничем","CompletableFuture поддерживает цепочки (thenApply, thenCompose) и неблокирующие callbacks","Future быстрее","CompletableFuture только для Kotlin","Future поддерживает стриминг"],correct:[1],explanation:"Future: только get() (блокирующий), isDone(), cancel(). CompletableFuture: цепочки, комбинация (allOf, anyOf), обработка ошибок (exceptionally, handle)."},
  // === SQL (continued) ===
  {id:"sql-005",topic:"sql",lvl:1,type:"single",q:"Что делает GROUP BY?",options:["Сортирует результат","Группирует строки с одинаковыми значениями для агрегатных функций","Объединяет таблицы","Фильтрует результат","Ограничивает количество строк"],correct:[1],explanation:"GROUP BY группирует строки для агрегатных функций (COUNT, SUM, AVG, MAX, MIN). HAVING фильтрует группы (в отличие от WHERE, которая фильтрует до группировки)."},
  {id:"sql-006",topic:"sql",lvl:2,type:"single",q:"Чем WHERE отличается от HAVING?",options:["Ничем","WHERE фильтрует строки до GROUP BY, HAVING — после (по агрегатным функциям)","HAVING быстрее","WHERE только для JOIN","HAVING заменяет WHERE в подзапросах"],correct:[1],explanation:"WHERE: фильтрация строк ДО группировки. HAVING: фильтрация ГРУПП после GROUP BY. HAVING может использовать агрегатные функции (COUNT, SUM)."},
  {id:"sql-007",topic:"sql",lvl:2,type:"single",q:"Что такое ACID?",options:["Тип индекса","Формат данных","Свойства транзакции: Atomicity, Consistency, Isolation, Durability","Протокол репликации","Алгоритм сортировки"],correct:[2],explanation:"ACID: Atomicity (всё или ничего), Consistency (данные валидны после транзакции), Isolation (транзакции не мешают друг другу), Durability (результат сохранён даже при сбое)."},
  {id:"sql-008",topic:"sql",lvl:2,type:"multi",q:"Какие проблемы решают уровни изоляции транзакций?",options:["Dirty Read","Deadlock","Non-Repeatable Read","Phantom Read","Memory Leak"],correct:[0,2,3],explanation:"Уровни изоляции решают: Dirty Read (READ COMMITTED+), Non-Repeatable Read (REPEATABLE READ+), Phantom Read (SERIALIZABLE). Deadlock — не проблема изоляции."},
  {id:"sql-009",topic:"sql",lvl:2,type:"single",q:"Что такое оконная функция (window function)?",options:["Функция для создания окон в UI","Агрегатная функция, работающая на подмножестве строк без свёртки результата","Функция для работы с датами","Процедура в stored procedure","Функция шифрования"],correct:[1],explanation:"Window functions: ROW_NUMBER(), RANK(), LAG(), LEAD(), SUM() OVER(). Вычисляют значение для каждой строки на основе \"окна\" строк, не сворачивая результат (в отличие от GROUP BY)."},
  // === JPA/Hibernate (continued) ===
  {id:"jpa-004",topic:"jpa",lvl:2,type:"multi",q:"Какие стратегии генерации ID поддерживает JPA?",options:["IDENTITY","SEQUENCE","TABLE","RANDOM","UUID (нативная с Hibernate 6)"],correct:[0,1,2,4],explanation:"@GeneratedValue strategies: IDENTITY (auto-increment), SEQUENCE (DB sequence), TABLE (отдельная таблица), AUTO (провайдер выбирает). Hibernate 6+ поддерживает UUID нативно."},
  {id:"jpa-005",topic:"jpa",lvl:2,type:"single",q:"Что такое persistence context в JPA?",options:["Конфигурационный файл","Кэш первого уровня — набор managed entities привязанных к EntityManager","База данных","Пул соединений","Транзакция"],correct:[1],explanation:"Persistence Context — L1 cache привязанный к EntityManager. Managed entity: отслеживается, dirty checking при flush. Detached — после close/clear EM."},
  {id:"jpa-006",topic:"jpa",lvl:3,type:"single",q:"Что такое @EntityGraph и зачем он нужен?",options:["Визуализация схемы БД","Определение графа загрузки связанных сущностей для избежания N+1","Маршрутизация запросов","Кэширование запросов","Шардинг данных"],correct:[1],explanation:"@EntityGraph указывает, какие связи загружать в одном запросе (JOIN FETCH декларативно). Решает N+1 без изменения JPQL. attributePaths = {\"orders\", \"orders.items\"}."},
  {id:"jpa-007",topic:"jpa",lvl:2,type:"single",q:"Чем merge() отличается от persist()?",options:["Ничем","persist — для новых (transient → managed), merge — для detached (detached → managed copy)","persist быстрее","merge только для UPDATE","persist только в @Transactional"],correct:[1],explanation:"persist(): transient → managed, INSERT. merge(): detached → managed (возвращает новый managed объект), INSERT или UPDATE. persist выбрасывает исключение, если entity уже имеет ID (зависит от стратегии)."},
  // === Spring (continued) ===
  {id:"spr-006",topic:"spring",lvl:1,type:"single",q:"Что делает @Autowired?",options:["Создаёт REST endpoint","Внедряет зависимость (бин) из Spring контейнера","Запускает транзакцию","Помечает класс как конфигурацию","Создаёт таблицу в БД"],correct:[1],explanation:"@Autowired — внедрение зависимостей. Способы: конструктор (рекомендуется), сеттер, поле. С Spring 4.3 @Autowired на конструкторе не обязателен, если он единственный."},
  {id:"spr-007",topic:"spring",lvl:2,type:"single",q:"Как работает Spring AOP?",options:["Модифицирует байт-код при компиляции","Создаёт прокси-объекты (JDK Dynamic Proxy или CGLIB)","Использует reflection для каждого вызова","Модифицирует исходный код","Использует Java Agent"],correct:[1],explanation:"Spring AOP: JDK Dynamic Proxy (для интерфейсов) или CGLIB (для классов — наследование). Создаёт обёртку вокруг бина. Поэтому self-invocation обходит прокси."},
  {id:"spr-008",topic:"spring",lvl:2,type:"multi",q:"Какие типы advice существуют в Spring AOP?",options:["@Before","@After","@Around","@Instead","@AfterReturning"],correct:[0,1,2,4],explanation:"Spring AOP advice: @Before, @After, @AfterReturning, @AfterThrowing, @Around. @Instead не существует. @Around — самый мощный, включает ProceedingJoinPoint."},
  {id:"spr-009",topic:"spring",lvl:2,type:"single",q:"Какой HTTP метод для обновления всего ресурса в REST?",options:["POST","GET","PUT","PATCH","DELETE"],correct:[2],explanation:"PUT — полное обновление ресурса (идемпотентный). PATCH — частичное обновление. POST — создание. GET — чтение. DELETE — удаление."},
  {id:"spr-010",topic:"spring",lvl:2,type:"single",q:"Что делает @ControllerAdvice?",options:["Логирует все запросы","Глобальная обработка исключений, привязка данных и model attributes для всех контроллеров","Кэширует ответы","Авторизует запросы","Валидирует входные данные"],correct:[1],explanation:"@ControllerAdvice — глобальный обработчик для контроллеров. @ExceptionHandler внутри — обработка исключений. Также @ModelAttribute и @InitBinder."},
  {id:"spr-011",topic:"spring",lvl:3,type:"single",q:"Как Spring Boot автоконфигурация работает?",options:["Сканирует все классы проекта","Читает META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports и применяет @Conditional бины","Использует AI для определения конфигурации","Полностью конфигурируется вручную","Читает application.yml при каждом запросе"],correct:[1],explanation:"Автоконфигурация: spring.factories / AutoConfiguration.imports содержат классы конфигурации. @ConditionalOnClass, @ConditionalOnBean, @ConditionalOnProperty определяют, когда бин создаётся."},
  {id:"spr-012",topic:"spring",lvl:1,type:"single",q:"Какой аннотацией помечают Spring Boot main класс?",options:["@Component","@Configuration","@SpringBootApplication","@EnableAutoConfiguration","@RestController"],correct:[2],explanation:"@SpringBootApplication = @Configuration + @EnableAutoConfiguration + @ComponentScan. Точка входа с public static void main и SpringApplication.run()."},
  {id:"spr-013",topic:"spring",lvl:2,type:"single",q:"Что произойдёт при циклической зависимости бинов через конструктор?",options:["Spring разрешит автоматически","BeanCurrentlyInCreationException","Один бин будет null","Приложение запустится с предупреждением","StackOverflowError"],correct:[1],explanation:"Circular dependency через конструктор: Spring не может создать ни один бин (A нужен B, B нужен A). Решение: @Lazy на одном, setter injection, или рефакторинг."},
  // === Kafka (continued) ===
  {id:"kfk-004",topic:"kafka",lvl:1,type:"single",q:"Что такое offset в Kafka?",options:["Сдвиг времени","Уникальный номер сообщения в партиции","Размер буфера","Задержка доставки","Приоритет сообщения"],correct:[1],explanation:"Offset — уникальный последовательный номер сообщения в партиции. Consumer отслеживает свой offset (committed offset). Позволяет перечитывать сообщения."},
  {id:"kfk-005",topic:"kafka",lvl:2,type:"single",q:"Что гарантирует exactly-once семантика в Kafka?",options:["Сообщение доставлено ровно один раз","Сообщение никогда не потеряется","Сообщение обработано ровно один раз (в рамках Kafka Streams / транзакций)","Порядок сообщений","Минимальная задержка"],correct:[2],explanation:"Exactly-once в Kafka: идемпотентный producer (enable.idempotence=true) + транзакции (transactional.id). В Kafka Streams: processing.guarantee=exactly_once_v2. За пределами Kafka — нужна идемпотентность consumer."},
  {id:"kfk-006",topic:"kafka",lvl:2,type:"multi",q:"Какие компоненты входят в архитектуру Kafka?",options:["Producer","Broker","Zookeeper/KRaft","Consumer","Load Balancer"],correct:[0,1,2,3],explanation:"Kafka: Producer (отправляет), Broker (хранит), Consumer (читает), Zookeeper/KRaft (координация). Load Balancer не является частью Kafka — партиционирование встроено."},
  // === Архитектура (continued) ===
  {id:"arch-004",topic:"arch",lvl:2,type:"single",q:"Что такое CQRS?",options:["Паттерн кэширования","Command Query Responsibility Segregation — разделение модели чтения и записи","Протокол коммуникации сервисов","Система контроля версий","Паттерн маршрутизации"],correct:[1],explanation:"CQRS: отдельные модели для команд (write) и запросов (read). Позволяет оптимизировать каждую сторону независимо. Часто используется с Event Sourcing."},
  {id:"arch-005",topic:"arch",lvl:1,type:"single",q:"Что такое API Gateway?",options:["База данных для API","Единая точка входа для клиентов, маршрутизирующая запросы к микросервисам","Система мониторинга","Брокер сообщений","Контейнер для API"],correct:[1],explanation:"API Gateway: единая точка входа. Функции: маршрутизация, аутентификация, rate limiting, load balancing, circuit breaking. Примеры: Spring Cloud Gateway, Kong, Envoy."},
  {id:"arch-006",topic:"arch",lvl:2,type:"single",q:"Ситуация: сервис оплаты не отвечает. Что использовать?",options:["Увеличить таймаут до 60 секунд","Circuit Breaker — при N ошибках прекратить вызовы и вернуть fallback","Перезапустить сервер","Удалить кэш","Добавить retry без ограничений"],correct:[1],explanation:"Circuit Breaker (Resilience4j): CLOSED → OPEN (при threshold ошибок) → HALF_OPEN (пробные запросы). Fallback: заглушка, кэш, graceful degradation. Retry без ограничений — усугубит проблему."},
  {id:"arch-007",topic:"arch",lvl:2,type:"multi",q:"Какие паттерны используются для обнаружения сервисов?",options:["Service Discovery","Circuit Breaker","Service Registry","Load Balancing (client-side)","Saga"],correct:[0,2,3],explanation:"Service Discovery: сервисы регистрируются в registry (Eureka, Consul). Client-side LB (Spring Cloud LoadBalancer) использует registry для выбора инстанса. Circuit Breaker и Saga — другие паттерны."},
  // === Паттерны (continued) ===
  {id:"pat-003",topic:"patterns",lvl:1,type:"single",q:"Какой паттерн позволяет создавать объекты без указания конкретного класса?",options:["Singleton","Observer","Factory Method","Adapter","Facade"],correct:[2],explanation:"Factory Method: определяет интерфейс создания объектов, но подклассы решают какой класс инстанциировать. Примеры: Calendar.getInstance(), Optional.of()."},
  {id:"pat-004",topic:"patterns",lvl:2,type:"single",q:"Какой паттерн использует Spring для создания бинов?",options:["Observer","Prototype","Factory + Singleton","Adapter","Command"],correct:[2],explanation:"Spring IoC контейнер: Factory (BeanFactory/ApplicationContext создаёт бины) + Singleton (default scope). Также Proxy (AOP), Template Method (JdbcTemplate)."},
  {id:"pat-005",topic:"patterns",lvl:2,type:"multi",q:"Какие паттерны относятся к поведенческим (behavioral)?",options:["Strategy","Builder","Observer","Singleton","Template Method"],correct:[0,2,4],explanation:"Behavioral: Strategy, Observer, Template Method, Command, Iterator, State, Chain of Responsibility. Builder, Singleton — порождающие. Adapter, Facade — структурные."},
  {id:"pat-006",topic:"patterns",lvl:2,type:"single",q:"Что такое паттерн Decorator?",options:["Упрощение сложного интерфейса","Динамическое добавление обязанностей объекту через обёртку","Создание копии объекта","Преобразование интерфейса","Разделение абстракции и реализации"],correct:[1],explanation:"Decorator: обёртка с тем же интерфейсом, добавляет функциональность. Пример: BufferedInputStream(new FileInputStream()) — добавляет буферизацию. В Spring: BeanPostProcessor."},
  // === Тестирование (continued) ===
  {id:"tst-003",topic:"test",lvl:1,type:"single",q:"Что делает @MockBean в Spring Boot тестах?",options:["Создаёт реальный бин","Заменяет бин в Spring контексте на mock-объект Mockito","Удаляет бин из контекста","Создаёт тестовую БД","Запускает отдельный контекст"],correct:[1],explanation:"@MockBean: заменяет реальный бин в ApplicationContext на Mockito mock. Все зависимости этого бина получат mock. @SpyBean — частичный mock (реальные методы + переопределённые)."},
  {id:"tst-004",topic:"test",lvl:2,type:"multi",q:"Какие подходы к тестированию интеграции с БД существуют?",options:["Testcontainers (реальная БД в Docker)","H2 in-memory","Мокирование Repository","@DataJpaTest","Ручное тестирование"],correct:[0,1,3],explanation:"Testcontainers — реальная СУБД в Docker (наиболее надёжно). H2 — in-memory (быстро, но различия с prod). @DataJpaTest — slice test для JPA. Мокирование — не интеграция."},
  {id:"tst-005",topic:"test",lvl:2,type:"single",q:"Что тестирует unit-тест?",options:["Всё приложение целиком","Один модуль/класс/метод в изоляции от зависимостей","Взаимодействие сервисов","Производительность","UI"],correct:[1],explanation:"Unit test: изолированный тест одного модуля. Зависимости мокируются. Быстрый, детерминированный. Пирамида: много unit → меньше integration → мало e2e."},
  // === DevOps (continued) ===
  {id:"dev-003",topic:"devops",lvl:1,type:"single",q:"Что такое CI/CD?",options:["Continuous Integration / Continuous Deployment — автоматическая сборка, тесты и деплой","Certified Integration / Certified Deployment","Container Integration / Container Deployment","Cloud Infrastructure / Cloud Delivery","Code Inspection / Code Debugging"],correct:[0],explanation:"CI: автоматическая сборка + тесты при каждом коммите. CD: автоматический деплой (Continuous Delivery — до staging, Continuous Deployment — до prod). Инструменты: Jenkins, GitLab CI, GitHub Actions."},
  {id:"dev-004",topic:"devops",lvl:2,type:"multi",q:"Какие инструменты используют для оркестрации контейнеров?",options:["Kubernetes","Docker Compose","Docker Swarm","Maven","Jenkins"],correct:[0,1,2],explanation:"Оркестрация: Kubernetes (prod-grade), Docker Compose (development/simple), Docker Swarm (simple clustering). Maven — сборка. Jenkins — CI/CD (не оркестрация)."},
  {id:"dev-005",topic:"devops",lvl:2,type:"single",q:"Что такое Kubernetes Pod?",options:["Контейнер","Минимальная единица деплоя — один или несколько контейнеров с общими ресурсами","Кластер серверов","Сетевой namespace","Образ Docker"],correct:[1],explanation:"Pod: 1+ контейнеров с общим network namespace и volumes. Обычно 1 контейнер = 1 Pod. Sidecar pattern: основной + вспомогательные контейнеры в одном Pod."},
  // === Безопасность (continued) ===
  {id:"sec-003",topic:"security",lvl:1,type:"single",q:"Чем аутентификация отличается от авторизации?",options:["Ничем","Аутентификация — кто ты, авторизация — что тебе можно","Аутентификация — что можно, авторизация — кто ты","Аутентификация только для API","Авторизация только для UI"],correct:[1],explanation:"Authentication (authn): проверка личности (логин/пароль, JWT, OAuth). Authorization (authz): проверка прав доступа (роли, permissions). Порядок: сначала authn, потом authz."},
  {id:"sec-004",topic:"security",lvl:2,type:"single",q:"Что такое SQL Injection и как защититься?",options:["Внедрение вредоносного SQL через пользовательский ввод — защита: параметризованные запросы","Ошибка в SQL синтаксисе","Оптимизация SQL запросов","Внедрение индексов","Конфликт транзакций"],correct:[0],explanation:"SQL Injection: \"DROP TABLE users; --\" в поле ввода. Защита: PreparedStatement (параметризованные запросы), ORM/JPA, валидация ввода, WAF. НИКОГДА не конкатенировать пользовательский ввод в SQL."},
  {id:"sec-005",topic:"security",lvl:2,type:"multi",q:"Какие механизмы безопасности предоставляет Spring Security?",options:["Аутентификация","Авторизация (RBAC)","CSRF защита","SQL оптимизация","Method Security (@PreAuthorize)"],correct:[0,1,2,4],explanation:"Spring Security: аутентификация (форма, OAuth2, JWT), авторизация (роли, @PreAuthorize), CSRF, CORS, session management. SQL оптимизация — не его задача."},
  // === Сеть (continued) ===
  {id:"net-003",topic:"protocols",lvl:1,type:"single",q:"Чем TCP отличается от UDP?",options:["TCP быстрее","UDP надёжнее","TCP гарантирует доставку и порядок, UDP — нет (но быстрее)","Они идентичны","TCP только для веб-браузеров"],correct:[2],explanation:"TCP: надёжный, упорядоченный, с подтверждением (3-way handshake). UDP: быстрый, без гарантий (для streaming, gaming, DNS). HTTP работает поверх TCP."},
  {id:"net-004",topic:"protocols",lvl:2,type:"single",q:"Что такое WebSocket?",options:["Новый формат JSON","Протокол полнодуплексной связи поверх одного TCP соединения","Замена HTTP","Тип базы данных","Формат логирования"],correct:[1],explanation:"WebSocket: persistent bidirectional connection. Handshake через HTTP Upgrade. Используется: чаты, real-time notifications, live data. В отличие от HTTP: сервер может push-ить данные клиенту."},
  {id:"net-005",topic:"protocols",lvl:1,type:"multi",q:"Какие HTTP методы являются идемпотентными?",options:["GET","POST","PUT","DELETE","PATCH"],correct:[0,2,3],explanation:"Идемпотентные: GET, PUT, DELETE, HEAD, OPTIONS — повторный вызов даёт тот же результат. POST — НЕ идемпотентный (каждый вызов может создать новый ресурс). PATCH — не обязательно."},
  // === Git ===
  {id:"git-001",topic:"git",lvl:1,type:"single",q:"Чем git merge отличается от git rebase?",options:["Ничем","merge создаёт merge commit, rebase переписывает историю (перемещает коммиты)","rebase безопаснее","merge удаляет ветку","rebase создаёт pull request"],correct:[1],explanation:"merge: создаёт merge commit, сохраняет историю ветвления. rebase: переносит коммиты на верх целевой ветки, линейная история. Не rebase опубликованные ветки!"},
  {id:"git-002",topic:"git",lvl:2,type:"single",q:"Что делает git cherry-pick?",options:["Удаляет коммит","Применяет конкретный коммит из другой ветки в текущую","Создаёт новую ветку","Откатывает изменения","Сжимает коммиты"],correct:[1],explanation:"cherry-pick: берёт один коммит (по hash) и применяет его в текущую ветку. Создаёт НОВЫЙ коммит с теми же изменениями. Полезно для hotfix."},
  // === Kotlin ===
  {id:"ktl-001",topic:"kotlin",lvl:1,type:"single",q:"Чем val отличается от var в Kotlin?",options:["Ничем","val — неизменяемая ссылка (read-only), var — изменяемая","val для чисел, var для строк","val — публичное, var — приватное","val — nullable, var — non-null"],correct:[1],explanation:"val = final в Java (ссылка неизменяема, но объект может быть мутабельным). var = обычная переменная. Best practice: использовать val по умолчанию."},
  {id:"ktl-002",topic:"kotlin",lvl:2,type:"multi",q:"Какие особенности Kotlin отсутствуют в Java?",options:["Null safety (?/!!)","Data classes","Extension functions","Checked exceptions","Coroutines"],correct:[0,1,2,4],explanation:"Kotlin: null safety (type system), data classes (equals/hashCode/copy/toString), extension functions, coroutines. Java имеет checked exceptions — Kotlin нет."},
  // === NoSQL ===
  {id:"nos-001",topic:"nosql",lvl:1,type:"single",q:"Какой тип NoSQL использует Redis?",options:["Document store","Column-family","Graph","Key-Value store","Search engine"],correct:[3],explanation:"Redis: in-memory key-value store. Поддерживает: strings, lists, sets, sorted sets, hashes, streams. Используется: кэш, сессии, pub/sub, rate limiting."},
  {id:"nos-002",topic:"nosql",lvl:2,type:"single",q:"Что такое CAP теорема?",options:["Паттерн проектирования","В распределённой системе можно обеспечить только 2 из 3: Consistency, Availability, Partition Tolerance","Алгоритм сжатия","Протокол безопасности","Стандарт API"],correct:[1],explanation:"CAP: при network partition нужно выбрать — Consistency (все видят одинаковые данные) или Availability (система отвечает). Partition Tolerance обязателен. CP: MongoDB, HBase. AP: Cassandra, DynamoDB."},
  // === Additional Core Java ===
  {id:"core-026",topic:"core",lvl:2,type:"single",q:"Какой результат?",code:"enum Color { RED, GREEN, BLUE }\nSystem.out.println(Color.RED == Color.RED);\nSystem.out.println(Color.RED.equals(Color.RED));",options:["true true","false true","true false","false false","Ошибка компиляции"],correct:[0],explanation:"Enum: == и equals() оба работают корректно, т.к. enum гарантирует singleton для каждого значения. Рекомендуется == (null-safe, быстрее)."},
  {id:"core-027",topic:"core",lvl:3,type:"single",q:"Что такое Method Reference и когда использовать?",options:["Указатель на метод в C стиле","Сокращённая запись лямбды, ссылающейся на существующий метод (Class::method)","Вызов метода через reflection","Аннотация метода","Макрос препроцессора"],correct:[1],explanation:"Method Reference: String::toUpperCase вместо s -> s.toUpperCase(). Виды: static (Math::abs), instance (String::length), constructor (ArrayList::new), bound (str::charAt)."},
  {id:"core-028",topic:"core",lvl:2,type:"multi",q:"Какие новые features появились в Java 17 (LTS)?",options:["Sealed classes","Records","Pattern matching for instanceof","Text blocks","Virtual threads"],correct:[0,1,2,3],explanation:"Java 17 LTS: sealed classes (preview в 15), records (14), pattern matching instanceof (16), text blocks (15). Virtual threads — Java 21."},
  {id:"core-029",topic:"core",lvl:2,type:"single",q:"Что такое record в Java?",options:["Запись в БД","Immutable data carrier class — автогенерация equals, hashCode, toString, getters","Логирование событий","Тип enum","Коллекция данных"],correct:[1],explanation:"record Point(int x, int y) {} — компактный immutable класс. Автоматически: конструктор, getters (x(), y()), equals, hashCode, toString. Нельзя наследовать, extends Record неявно."},
  {id:"core-030",topic:"core",lvl:1,type:"single",q:"Что такое Generic (дженерик) в Java?",options:["Общий класс для всех типов","Параметризованный тип, обеспечивающий type safety при компиляции","Класс без методов","Абстрактный класс","Интерфейс-маркер"],correct:[1],explanation:"Generics: List<String> — компилятор проверяет тип. Type erasure: в runtime информация о типе стирается (List<String> → List). Нельзя: new T(), new T[], instanceof T."},
  // === Additional Collections ===
  {id:"col-013",topic:"collections",lvl:2,type:"single",q:"Чем PriorityQueue отличается от обычной Queue?",options:["Ничем","Элементы извлекаются в порядке приоритета (natural ordering или Comparator)","PriorityQueue потокобезопасна","PriorityQueue имеет фиксированный размер","PriorityQueue работает как Stack"],correct:[1],explanation:"PriorityQueue: heap-based, poll() возвращает минимальный элемент (или по Comparator). O(log n) для add/poll. НЕ гарантирует порядок при итерации. Не thread-safe — для concurrent: PriorityBlockingQueue."},
  {id:"col-014",topic:"collections",lvl:2,type:"single",q:"Что такое fail-fast итератор?",options:["Итератор, который быстро проходит коллекцию","Итератор, выбрасывающий ConcurrentModificationException при модификации коллекции во время обхода","Итератор без проверки типов","Итератор для пустых коллекций","Итератор с кэшированием"],correct:[1],explanation:"Fail-fast: ArrayList, HashMap — выбрасывают CME при структурной модификации. Fail-safe: CopyOnWriteArrayList, ConcurrentHashMap — работают на копии/сегменте, не выбрасывают CME."},
  // === Additional Streams ===
  {id:"str-009",topic:"streams",lvl:2,type:"single",q:"Что делает Collectors.groupingBy()?",options:["Сортирует элементы","Группирует элементы по ключу в Map<K, List<V>>","Объединяет стримы","Фильтрует элементы","Считает количество"],correct:[1],explanation:"groupingBy: аналог SQL GROUP BY. Результат: Map<K, List<V>>. Можно комбинировать: groupingBy(classifier, Collectors.counting()). Downstream collectors: counting, mapping, toSet."},
  {id:"str-010",topic:"streams",lvl:2,type:"single",q:"Что вернёт код?",code:"Map<Boolean, List<Integer>> result =\n  List.of(1,2,3,4,5).stream()\n    .collect(Collectors.partitioningBy(n -> n > 3));",options:["Map с одним элементом","Map с двумя ключами: true=[4,5], false=[1,2,3]","List<Integer>","Exception","Map<Integer, Boolean>"],correct:[1],explanation:"partitioningBy: разделяет на две группы (true/false). Результат: {true=[4,5], false=[1,2,3]}. Всегда ровно 2 ключа, даже если одна группа пуста."},
  // === Additional SQL ===
  {id:"sql-010",topic:"sql",lvl:2,type:"single",q:"Что такое deadlock в контексте БД?",options:["Ошибка синтаксиса SQL","Две транзакции взаимно блокируют строки друг друга и ни одна не может продолжить","Переполнение таблицы","Ошибка соединения","Отсутствие индекса"],correct:[1],explanation:"DB deadlock: транзакция A блокирует строку 1 и ждёт строку 2, транзакция B блокирует строку 2 и ждёт строку 1. СУБД обнаруживает и откатывает одну транзакцию."},
  {id:"sql-011",topic:"sql",lvl:2,type:"single",q:"Что делает EXPLAIN в SQL?",options:["Выполняет запрос быстрее","Показывает план выполнения запроса (какие индексы, JOIN алгоритмы)","Объясняет синтаксис SQL","Документирует таблицу","Оптимизирует запрос автоматически"],correct:[1],explanation:"EXPLAIN: показывает plan (Seq Scan, Index Scan, Nested Loop, Hash Join и т.д.), estimated cost, rows. EXPLAIN ANALYZE — реально выполняет и показывает actual time."},
  // === Additional JPA ===
  {id:"jpa-008",topic:"jpa",lvl:2,type:"single",q:"Что такое optimistic locking в JPA?",options:["Блокировка строки в БД","Проверка версии (@Version) при обновлении — без физической блокировки","Блокировка всей таблицы","Отключение параллельного доступа","Кэширование версий"],correct:[1],explanation:"Optimistic locking: @Version (int/timestamp). При UPDATE проверяется версия. Если изменилась — OptimisticLockException. Pessimistic: SELECT FOR UPDATE — реальная блокировка строки."},
  // === Additional Spring ===
  {id:"spr-014",topic:"spring",lvl:2,type:"single",q:"Что такое Spring WebFlux?",options:["Новая версия Spring MVC","Реактивный веб-фреймворк на основе Project Reactor (non-blocking I/O)","Система миграций","Модуль безопасности","Библиотека тестирования"],correct:[1],explanation:"WebFlux: реактивный стек — Mono<T> (0..1) и Flux<T> (0..N). Non-blocking I/O, event loop (Netty). Для высоконагруженных сервисов с большим I/O. Альтернатива Spring MVC (servlet-based)."},
  {id:"spr-015",topic:"spring",lvl:2,type:"single",q:"Какие profiles поддерживает Spring Boot?",options:["Только dev и prod","Любые именованные профили, активируемые через spring.profiles.active","Только 3 встроенных","Профили определяются ОС","Профили только для логирования"],correct:[1],explanation:"Profiles: любые имена (dev, test, staging, prod). Активация: spring.profiles.active=dev. application-dev.yml. @Profile(\"dev\") на бинах. Можно комбинировать несколько."},
  // === Additional Kafka ===
  {id:"kfk-007",topic:"kafka",lvl:2,type:"single",q:"Что такое consumer group в Kafka?",options:["Группировка сообщений","Набор консьюмеров, совместно читающих топик — каждая партиция назначена одному консьюмеру в группе","Группа топиков","Кластер брокеров","Набор продюсеров"],correct:[1],explanation:"Consumer Group: параллельное чтение топика. Каждая партиция — одному consumer в группе. Разные группы читают независимо (каждая получает все сообщения). Rebalance при добавлении/удалении consumer."},
  // === Additional Architecture ===
  {id:"arch-008",topic:"arch",lvl:2,type:"single",q:"Что такое Event Sourcing?",options:["Логирование ошибок","Хранение состояния как последовательности событий (вместо текущего состояния)","Обработка событий UI","Паттерн Observer","Система очередей"],correct:[1],explanation:"Event Sourcing: состояние = replay всех событий. OrderCreated → ItemAdded → OrderPaid. Преимущества: аудит, time travel, rebuild state. Часто с CQRS. Сложность: eventual consistency, event versioning."},
  {id:"arch-009",topic:"arch",lvl:1,type:"single",q:"Что такое DDD (Domain-Driven Design)?",options:["Подход к дизайну UI","Подход к проектированию ПО, в центре которого — бизнес-домен и его модель","Паттерн баз данных","Фреймворк тестирования","Методология управления проектами"],correct:[1],explanation:"DDD: Ubiquitous Language, Bounded Context, Aggregate, Entity, Value Object, Domain Event, Repository. Стратегический (контексты) и тактический (паттерны) уровни. Eric Evans."},
  // === Additional patterns ===
  {id:"pat-007",topic:"patterns",lvl:2,type:"single",q:"Что такое паттерн Strategy?",options:["Планирование проекта","Определение семейства алгоритмов, инкапсуляция каждого и взаимозаменяемость","Создание объектов","Управление состоянием","Логирование"],correct:[1],explanation:"Strategy: интерфейс алгоритма + конкретные реализации. Клиент выбирает стратегию в runtime. Пример: Comparator, PaymentStrategy (card, SBP, crypto). Убирает switch/if-else."},
  // === Situation questions ===
  {id:"sit-001",topic:"spring",lvl:2,type:"single",q:"Ситуация: приложение медленно стартует. Что проверить первым?",options:["Добавить больше RAM","Проанализировать время создания бинов (spring.main.lazy-initialization, actuator startup endpoint)","Переписать на Go","Удалить все тесты","Обновить Java до последней версии"],correct:[1],explanation:"Диагностика: /actuator/startup, spring.main.lazy-initialization=true, ApplicationStartup (BufferingApplicationStartup). Частые причины: тяжёлые бины, ComponentScan слишком широкий, Hibernate DDL auto."},
  {id:"sit-002",topic:"threads",lvl:2,type:"single",q:"Ситуация: приложение зависло, CPU 100%. Что делать?",options:["Перезагрузить сервер","Снять thread dump (jstack/jcmd) и проанализировать","Добавить больше CPU","Удалить логи","Увеличить heap"],correct:[1],explanation:"Thread dump: jstack <pid> или jcmd <pid> Thread.print. Ищем: BLOCKED потоки (deadlock), бесконечные циклы (RUNNABLE), чрезмерное количество потоков. Также: top -H для CPU по thread, async-profiler для flame graph."},
  {id:"sit-003",topic:"sql",lvl:2,type:"single",q:"Ситуация: SQL запрос выполняется 30 секунд. Что первым делом?",options:["Добавить больше RAM серверу","Выполнить EXPLAIN ANALYZE и проверить plan + наличие индексов","Переписать на NoSQL","Удалить таблицу и создать заново","Увеличить connection pool"],correct:[1],explanation:"EXPLAIN ANALYZE: показывает Seq Scan (нет индекса?), Nested Loop на больших таблицах, estimated vs actual rows. Проверить: индексы, статистику (ANALYZE), N+1 на уровне ORM."},
  {id:"sit-004",topic:"arch",lvl:2,type:"single",q:"Ситуация: нужно обрабатывать 10000 запросов/сек. Какой подход?",options:["Один мощный сервер","Горизонтальное масштабирование + кэширование + async обработка","Увеличить таймауты","Отключить логирование","Использовать только stored procedures"],correct:[1],explanation:"High load: горизонтальное масштабирование (k8s), кэш (Redis), async (Kafka), connection pooling, read replicas, CDN, оптимизация запросов. Вертикальное масштабирование имеет потолок."}
];

function addCustomCard(topicId, q, a, lvl) {

// ============================================================
function loadSRS() {
  try { return JSON.parse(localStorage.getItem(SRS_KEY)) || {}; } catch { return {}; }
}
function saveSRS() { localStorage.setItem(SRS_KEY, JSON.stringify(srsData)); }

function srsSchedule(key, quality) {
  // quality: 1-5 (1=hard, 3=learning, 5=known)
  var card = srsData[key] || {interval:0, repetition:0, ef:2.5, nextReview:0};
  if (quality < 3) {
    card.repetition = 0;
    card.interval = 1;
  } else {
    if (card.repetition === 0) card.interval = 1;
    else if (card.repetition === 1) card.interval = 3;
    else card.interval = Math.round(card.interval * card.ef);
    card.repetition++;
  }
  card.ef = Math.max(1.3, card.ef + 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  card.nextReview = Date.now() + card.interval * 86400000;
  card.lastReview = Date.now();
  srsData[key] = card;
  saveSRS();
}

function getDueCards() {
  var now = Date.now();
  var due = [];
  Object.keys(srsData).forEach(function(key) {
    if (srsData[key].nextReview <= now) {
      var parts = key.split('::');
      var topicId = parts[0];
      var qText = parts.slice(1).join('::');
      var topic = TOPICS.find(function(t){return t.id===topicId;});
      if (topic) {
        var item = topic.data.find(function(d){return d.q===qText;});
        if (item) due.push({key:key, topicId:topicId, topicName:topic.name, item:item, card:srsData[key]});
      }
    }
  });
  due.sort(function(a,b){return a.card.nextReview - b.card.nextReview;});
  return due;
}

function loadActivity() {
  try { return JSON.parse(localStorage.getItem(ACTIVITY_KEY)) || {days:{},streak:0,bestStreak:0}; }
  catch { return {days:{},streak:0,bestStreak:0}; }
}
function saveActivity() { localStorage.setItem(ACTIVITY_KEY, JSON.stringify(activityData)); }

function todayKey() { return new Date().toISOString().slice(0,10); }

function trackActivity() {
  var today = todayKey();
  if (!activityData.days[today]) {
    activityData.days[today] = {questions:0, minutes:0, started: Date.now()};
  }
  activityData.days[today].questions++;
  updateStreak();
  saveActivity();
}

function trackStudyTime() {
  var today = todayKey();
  if (!activityData.days[today]) {
    activityData.days[today] = {questions:0, minutes:0, started: Date.now()};
  }
  var elapsed = Math.round((Date.now() - sessionStartTime) / 60000);
  activityData.days[today].minutes = Math.max(activityData.days[today].minutes, elapsed);
  saveActivity();
}

function updateStreak() {
  var days = Object.keys(activityData.days).sort();
  if (days.length === 0) { activityData.streak = 0; return; }
  var streak = 1;
  var today = todayKey();
  // check from today backwards
  var d = new Date(today);
  if (!activityData.days[today]) {
    d.setDate(d.getDate() - 1);
    if (!activityData.days[d.toISOString().slice(0,10)]) { activityData.streak = 0; return; }
  }
  var check = new Date(d);
  while (true) {
    check.setDate(check.getDate() - 1);
    var k = check.toISOString().slice(0,10);
    if (activityData.days[k]) streak++;
    else break;
  }
  activityData.streak = streak;
  if (streak > (activityData.bestStreak || 0)) activityData.bestStreak = streak;
}

function getWeakTopics() {
  var testData = JSON.parse(localStorage.getItem("java-prep-tests") || '{"history":[]}');
  var topicScores = {};
  // From test history
  testData.history.forEach(function(h) {
    if (h.errors && h.errors.length > 0) {
      h.errors.forEach(function(errId) {
        var q = QUIZ_BANK.find(function(qb){return qb.id===errId;});
        if (q) {
          if (!topicScores[q.topic]) topicScores[q.topic] = {correct:0, total:0};
          topicScores[q.topic].total++;
        }
      });
    }
  });
  testData.history.forEach(function(h) {
    if (h.topics) {
      // count total per topic from tests
    }
  });
  // From card statuses
  TOPICS.forEach(function(t) {
    var stats = getTopicStats(t);
    if (stats.total > 0) {
      if (!topicScores[t.id]) topicScores[t.id] = {correct:0, total:0};
      topicScores[t.id].correct += stats.known;
      topicScores[t.id].total += stats.total;
    }
  });
  // Sort by weakness (lowest known %)
  var weak = Object.keys(topicScores).map(function(tid) {
    var s = topicScores[tid];
    var topicObj = TOPICS.find(function(t){return t.id===tid;});
    return {id:tid, name: topicObj ? topicObj.name : tid, pct: s.total > 0 ? Math.round(s.correct/s.total*100) : 0, total: s.total};
  });
  weak.sort(function(a,b){return a.pct - b.pct;});
  return weak.filter(function(w){return w.total >= 2;});
}

function getTopicStats(topic) {
  let total=0, known=0, learning=0, hard=0;
  var allData = getAllTopicData(topic);
  allData.forEach(item => {
    if (item.s) return;
    total++;
    const st = getStatus(topic.id, item.q);
    if (st==='known') known++;
    else if (st==='learning') learning++;
    else if (st==='hard') hard++;
  });
  return {total, known, learning, hard, newCount: total-known-learning-hard};
}
function getAllStats() {
  let total=0,known=0,learning=0,hard=0;
  TOPICS.forEach(t => {
    const s = getTopicStats(t);
    total+=s.total; known+=s.known; learning+=s.learning; hard+=s.hard;
  });
  return {total, known, learning, hard, newCount: total-known-learning-hard};
}

        var p = h.total > 0 ? Math.round(h.correct / h.total * 100) : 0;

      });

    }
    html += '</div>';
  }

  // Time stats
  var totalMinutes = 0;
  Object.keys(activityData.days).forEach(function(k) { totalMinutes += activityData.days[k].minutes || 0; });
  if (totalMinutes > 0) {
    html += '<div class="dash-card"><h3>\u23F1 Время обучения</h3>';
    html += '<p style="font-size:14px;color:var(--text2)">Всего: <b style="color:var(--text)">' + Math.round(totalMinutes / 60) + 'ч ' + (totalMinutes % 60) + 'мин</b></p>';

  // Topics
  html += '<h3 style="margin-bottom:12px">По темам</h3>';
  TOPICS.forEach(t => {
    if (t.id === 'links') return; // Ресурсы — отдельный раздел

    html += '<div style="background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;cursor:pointer" onclick="navigate(\'' + t.id + '\')">';

function formatAnswer(text) {
  var ls = 'color:var(--accent2);word-break:break-all;text-decoration:underline';
  text = text.replace(/(https?:\/\/[^\s<,;"']+)/g, function(m) {
    var c = m.replace(/[)]+$/, ''), t = m.slice(c.length);
    return '<a href="'+c+'" target="_blank" style="'+ls+'">'+c+'</a>'+t;
  });
  text = text.replace(/((?:[a-zA-Z0-9][a-zA-Z0-9-]*\.)+(?:com|org|net|io|ru|dev|academy|app|edu|info|guide|sh)(?:\/[^\s<,;"']*)?)/g, function(m, g, off, str) {
    if (off > 0 && str[off-1] === '/') return m;
    if (off > 0 && str[off-1] === '"') return m;
    if (off > 0 && str[off-1] === '>') return m;
    if (m.indexOf('</a>') >= 0) return m;
    var c = m.replace(/[)]+$/, ''), t = m.slice(c.length);
    return '<a href="https://'+c+'" target="_blank" style="'+ls+'">'+c+'</a>'+t;
  });
  return text.replace(/\n/g, '<br>');
}
function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function toggleCard(topicId, idx) {

function startQuiz(mode) {
  quizQueue = [];
  const topics = currentTopic === 'dashboard' ? TOPICS : TOPICS.filter(t => t.id === currentTopic);
  topics.forEach(t => {
    var allData = getAllTopicData(t);
    allData.forEach(item => {
      if (item.s) return;
      const st = getStatus(t.id, item.q);
      if (mode === 'hard' && st !== 'hard') return;
      if (mode === 'new' && st !== 'new') return;
      quizQueue.push({...item, topicId: t.id, topicName: t.name});
    });
  });
  // Shuffle
  for (let i = quizQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizQueue[i], quizQueue[j]] = [quizQueue[j], quizQueue[i]];
  }
  if (quizQueue.length === 0) { alert('Нет вопросов для этого режима'); return; }
  quizIndex = 0;
  document.getElementById('quiz').classList.add('active');
  showQuizCard();
}

function showQuizCard() {
  if (quizIndex >= quizQueue.length) { closeQuiz(); alert(`Quiz завершён! ${quizQueue.length} вопросов`); return; }
  const item = quizQueue[quizIndex];
  document.getElementById('quizTopic').textContent = item.topicName;
  document.getElementById('quizQuestion').textContent = item.q;
  document.getElementById('quizAnswer').innerHTML = formatAnswer(item.a || '');
  document.getElementById('quizAnswer').classList.remove('visible');
  document.getElementById('quizRevealBtn').style.display = '';
  document.getElementById('quizRate').classList.remove('visible');
  document.getElementById('quizProgress').textContent = `${quizIndex+1} / ${quizQueue.length}`;
}

function revealQuizAnswer() {
  document.getElementById('quizAnswer').classList.add('visible');
  document.getElementById('quizRevealBtn').style.display = 'none';
  document.getElementById('quizRate').classList.add('visible');
}

function rateQuiz(status) {
  const item = quizQueue[quizIndex];
  setStatus(item.topicId, item.q, status);
  quizIndex++;
  showQuizCard();
}

function closeQuiz() {
  document.getElementById('quiz').classList.remove('active');
  renderSidebar();
  renderMain();
}
