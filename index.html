// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'java-prep-2026';
let state = loadState();
let currentTopic = state.lastTopic || 'core';
let searchQuery = '';
let filterStatus = 'all';
let filterLevel = 0;
let quizQueue = [];
let quizIndex = 0;

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {statuses:{},lastTopic:'core'}; }
  catch { return {statuses:{},lastTopic:'core'}; }
}
function saveState() {
  state.lastTopic = currentTopic;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function getQKey(topicId, q) { return topicId + '::' + q; }
function getStatus(topicId, q) { return state.statuses[getQKey(topicId, q)] || 'new'; }
function setStatus(topicId, q, status) {
  const key = getQKey(topicId, q);
  if (status === 'new') delete state.statuses[key];
  else state.statuses[key] = status;
  saveState();
}

// ============================================================
// STATS
// ============================================================
function getTopicStats(topic) {
  let total=0, known=0, learning=0, hard=0;
  topic.data.forEach(item => {
    if (item.s) return;
    total++;
    const st = getStatus(topic.id, item.q);
    if (st==='known') known++;
    else if (st==='learning') learning++;
    else if (st==='hard') hard++;
  });
  return {total, known, learning, hard, newCount: total-known-learning-hard};
}
function getAllStats() {
  let total=0,known=0,learning=0,hard=0;
  TOPICS.forEach(t => {
    const s = getTopicStats(t);
    total+=s.total; known+=s.known; learning+=s.learning; hard+=s.hard;
  });
  return {total, known, learning, hard, newCount: total-known-learning-hard};
}

// ============================================================
// RENDER
// ============================================================
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = `<div class="logo"><h1>Java <span>Prep</span></h1><p>Interview 2026</p></div>`;
  html += `<button class="nav-item ${currentTopic==='dashboard'?'active':''}" onclick="navigate('dashboard')">
    <span class="nav-icon">&#128200;</span>Dashboard</button>`;
  TOPICS.forEach(t => {
    const s = getTopicStats(t);
    const pct = s.total ? Math.round((s.known/s.total)*100) : 0;
    html += `<button class="nav-item ${currentTopic===t.id?'active':''}" onclick="navigate('${t.id}')">
      <span class="nav-icon">${t.icon}</span>${t.name}
      <span class="nav-badge">${s.known}/${s.total}</span>
      <div class="nav-progress"><div class="nav-progress-fill" style="width:${pct}%"></div></div>
    </button>`;
  });
  html += `<div style="padding:16px 20px;border-top:1px solid var(--bg3);margin-top:12px">
    <button class="topbar-btn" style="width:100%;justify-content:center" onclick="toggleTheme()">&#9790; Тема</button>
    <button class="topbar-btn" style="width:100%;justify-content:center;margin-top:8px" onclick="exportProgress()">&#128229; Экспорт</button>
    <button class="topbar-btn" style="width:100%;justify-content:center;margin-top:8px" onclick="importProgress()">&#128228; Импорт</button>
    <button class="topbar-btn" style="width:100%;justify-content:center;margin-top:8px" onclick="resetProgress()">&#128260; Сбросить</button>
  </div>`;
  sb.innerHTML = html;
}

function renderMain() {
  const main = document.getElementById('main');
  if (currentTopic === 'dashboard') { renderDashboard(main); return; }
  const topic = TOPICS.find(t => t.id === currentTopic);
  if (!topic) return;

  const stats = getTopicStats(topic);
  const pctKnown = stats.total ? (stats.known/stats.total*100) : 0;
  const pctLearning = stats.total ? (stats.learning/stats.total*100) : 0;

  let html = `<div class="topbar">
    <div class="search-box">&#128269;<input type="text" placeholder="Поиск..." value="${searchQuery}" oninput="onSearch(this.value)"></div>
    <div class="topbar-filters">
      <button class="topbar-btn ${filterStatus==='all'?'active':''}" onclick="setFilter('all')">Все</button>
      <button class="topbar-btn ${filterStatus==='new'?'active':''}" onclick="setFilter('new')">Новые</button>
      <button class="topbar-btn ${filterStatus==='hard'?'active':''}" onclick="setFilter('hard')">&#128308;</button>
      <button class="topbar-btn ${filterStatus==='learning'?'active':''}" onclick="setFilter('learning')">&#128992;</button>
      <button class="topbar-btn ${filterStatus==='known'?'active':''}" onclick="setFilter('known')">&#128994;</button>
      <button class="topbar-btn" onclick="startQuiz()">&#127922; Quiz</button>
      <button class="topbar-btn" onclick="startQuiz('hard')">&#128293; Сложные</button>
      <button class="topbar-btn ${filterLevel===1?'active':''}" onclick="setLevel(1)">L1</button>
      <button class="topbar-btn ${filterLevel===2?'active':''}" onclick="setLevel(2)">L2</button>
      <button class="topbar-btn ${filterLevel===3?'active':''}" onclick="setLevel(3)">L3</button>
    </div>
  </div>`;

  html += `<div class="progress-bar"><div class="seg-green" style="width:${pctKnown}%"></div><div class="seg-yellow" style="width:${pctLearning}%"></div></div>`;

  let visibleCount = 0;
  topic.data.forEach((item, i) => {
    if (item.s) {
      html += `<div class="section-header">${item.s}</div>`;
      return;
    }
    const st = getStatus(topic.id, item.q);
    if (filterStatus !== 'all' && st !== filterStatus) return;
    if (filterLevel && item.lvl !== filterLevel) return;
    if (searchQuery && !item.q.toLowerCase().includes(searchQuery.toLowerCase()) &&
        !(item.a && item.a.toLowerCase().includes(searchQuery.toLowerCase()))) return;
    visibleCount++;
    html += renderCard(topic.id, item, i, st);
  });

  if (visibleCount === 0) {
    html += `<div class="empty-state"><div class="icon">&#128270;</div><p>Нет вопросов по фильтру</p></div>`;
  }
  main.innerHTML = html;
}

function renderCard(topicId, item, idx, st) {
  const stClass = st !== 'new' ? `status-${st}` : '';
  const hotBadge = item.hot ? '<span class="badge badge-hot">&#128293; HOT</span>' : '';
  const lvlBadge = item.lvl ? '<span class="badge badge-l'+item.lvl+'">L'+item.lvl+'</span>' : '';
  return `<div class="card ${stClass}" id="card-${topicId}-${idx}">
    <div class="card-q" onclick="toggleCard('${topicId}',${idx})">
      <span class="card-q-text">${item.q} ${lvlBadge} ${hotBadge}</span>
      <span class="card-arrow">&#9654;</span>
    </div>
    <div class="card-a">
      <div class="card-a-inner">${formatAnswer(item.a||'')}</div>
      <div class="card-actions">
        <button class="status-btn btn-hard ${st==='hard'?'selected':''}" onclick="rate('${topicId}','${esc(item.q)}','hard')">&#128308; Не знаю</button>
        <button class="status-btn btn-learning ${st==='learning'?'selected':''}" onclick="rate('${topicId}','${esc(item.q)}','learning')">&#128992; Частично</button>
        <button class="status-btn btn-known ${st==='known'?'selected':''}" onclick="rate('${topicId}','${esc(item.q)}','known')">&#128994; Знаю</button>
      </div>
    </div>
  </div>`;
}

function renderDashboard(main) {
  const all = getAllStats();
  const pctKnown = all.total ? Math.round(all.known/all.total*100) : 0;
  let html = `<h2 style="margin-bottom:20px">Dashboard</h2>`;
  html += `<div class="stats">
    <div class="stat-card"><div class="stat-num accent">${all.total}</div><div class="stat-label">Всего вопросов</div></div>
    <div class="stat-card"><div class="stat-num green">${all.known}</div><div class="stat-label">Знаю</div></div>
    <div class="stat-card"><div class="stat-num yellow">${all.learning}</div><div class="stat-label">Частично</div></div>
    <div class="stat-card"><div class="stat-num red">${all.hard}</div><div class="stat-label">Не знаю</div></div>
  </div>`;
  html += `<div class="progress-bar" style="height:10px;margin-bottom:8px"><div class="seg-green" style="width:${all.total?(all.known/all.total*100):0}%"></div><div class="seg-yellow" style="width:${all.total?(all.learning/all.total*100):0}%"></div></div>`;
  html += `<p style="text-align:center;color:var(--text2);margin-bottom:24px">Общий прогресс: <b style="color:var(--green)">${pctKnown}%</b></p>`;

  html += `<div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap">
    <button class="topbar-btn" onclick="startQuiz()" style="flex:1">&#127922; Quiz по всем</button>
    <button class="topbar-btn" onclick="startQuiz('hard')" style="flex:1">&#128293; Повторить сложные</button>
    <button class="topbar-btn" onclick="startQuiz('new')" style="flex:1">&#10024; Изучить новые</button>
  </div>`;

  html += `<h3 style="margin-bottom:12px">По темам</h3>`;
  TOPICS.forEach(t => {
    const s = getTopicStats(t);
    const pct = s.total ? Math.round(s.known/s.total*100) : 0;
    html += `<div style="background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;cursor:pointer" onclick="navigate('${t.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span>${t.icon} <b>${t.name}</b></span>
        <span style="color:var(--text2);font-size:13px">${s.known}/${s.total} (${pct}%)</span>
      </div>
      <div class="progress-bar" style="margin:0;height:4px"><div class="seg-green" style="width:${s.total?(s.known/s.total*100):0}%"></div><div class="seg-yellow" style="width:${s.total?(s.learning/s.total*100):0}%"></div></div>
    </div>`;
  });
  main.innerHTML = html;
}

// ============================================================
// HELPERS
// ============================================================
function formatAnswer(text) {
  var ls = 'color:var(--accent2);word-break:break-all;text-decoration:underline';
  text = text.replace(/(https?:\/\/[^\s<,;"']+)/g, function(m) {
    var c = m.replace(/[)]+$/, ''), t = m.slice(c.length);
    return '<a href="'+c+'" target="_blank" style="'+ls+'">'+c+'</a>'+t;
  });
  text = text.replace(/((?:[a-zA-Z0-9][a-zA-Z0-9-]*\.)+(?:com|org|net|io|ru|dev|academy|app|edu|info|guide|sh)(?:\/[^\s<,;"']*)?)/g, function(m, g, off, str) {
    if (off > 0 && str[off-1] === '/') return m;
    if (off > 0 && str[off-1] === '"') return m;
    if (off > 0 && str[off-1] === '>') return m;
    if (m.indexOf('</a>') >= 0) return m;
    var c = m.replace(/[)]+$/, ''), t = m.slice(c.length);
    return '<a href="https://'+c+'" target="_blank" style="'+ls+'">'+c+'</a>'+t;
  });
  return text.replace(/\n/g, '<br>');
}
function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function toggleCard(topicId, idx) {
  const card = document.getElementById(`card-${topicId}-${idx}`);
  if (card) card.classList.toggle('open');
}

function navigate(id) {
  currentTopic = id;
  searchQuery = '';
  filterStatus = 'all';
  saveState();
  renderSidebar();
  renderMain();
  document.getElementById('main').scrollTop = 0;
  window.scrollTo(0,0);
  closeSidebar();
}

function onSearch(val) { searchQuery = val; renderMain(); }
function setFilter(f) { filterStatus = f; renderMain(); }
function setLevel(l) { filterLevel = filterLevel === l ? 0 : l; renderMain(); }

function rate(topicId, q, status) {
  const current = getStatus(topicId, q);
  setStatus(topicId, q, current === status ? 'new' : status);
  renderSidebar();
  renderMain();
}

// ============================================================
// QUIZ
// ============================================================
function startQuiz(mode) {
  quizQueue = [];
  const topics = currentTopic === 'dashboard' ? TOPICS : TOPICS.filter(t => t.id === currentTopic);
  topics.forEach(t => {
    t.data.forEach(item => {
      if (item.s) return;
      const st = getStatus(t.id, item.q);
      if (mode === 'hard' && st !== 'hard') return;
      if (mode === 'new' && st !== 'new') return;
      quizQueue.push({...item, topicId: t.id, topicName: t.name});
    });
  });
  // Shuffle
  for (let i = quizQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizQueue[i], quizQueue[j]] = [quizQueue[j], quizQueue[i]];
  }
  if (quizQueue.length === 0) { alert('Нет вопросов для этого режима'); return; }
  quizIndex = 0;
  document.getElementById('quiz').classList.add('active');
  showQuizCard();
}

function showQuizCard() {
  if (quizIndex >= quizQueue.length) { closeQuiz(); alert(`Quiz завершён! ${quizQueue.length} вопросов`); return; }
  const item = quizQueue[quizIndex];
  document.getElementById('quizTopic').textContent = item.topicName;
  document.getElementById('quizQuestion').textContent = item.q;
  document.getElementById('quizAnswer').innerHTML = formatAnswer(item.a || '');
  document.getElementById('quizAnswer').classList.remove('visible');
  document.getElementById('quizRevealBtn').style.display = '';
  document.getElementById('quizRate').classList.remove('visible');
  document.getElementById('quizProgress').textContent = `${quizIndex+1} / ${quizQueue.length}`;
}

function revealQuizAnswer() {
  document.getElementById('quizAnswer').classList.add('visible');
  document.getElementById('quizRevealBtn').style.display = 'none';
  document.getElementById('quizRate').classList.add('visible');
}

function rateQuiz(status) {
  const item = quizQueue[quizIndex];
  setStatus(item.topicId, item.q, status);
  quizIndex++;
  showQuizCard();
}

function closeQuiz() {
  document.getElementById('quiz').classList.remove('active');
  renderSidebar();
  renderMain();
}

// ============================================================
function toggleTheme() {
  const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.querySelector('.sidebar-overlay').classList.remove('open');
}

function resetProgress() {
  if (confirm('Сбросить весь прогресс?')) {
    state = {statuses:{},lastTopic:currentTopic};
    saveState();
    renderSidebar();
    renderMain();
  }
}

function exportProgress() {
  var data = JSON.stringify(state, null, 2);
  var blob = new Blob([data], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'java-prep-progress.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importProgress() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var imported = JSON.parse(ev.target.result);
        if (!imported.statuses) throw new Error('bad format');
        var countNew = Object.keys(imported.statuses).length;
        var countOld = Object.keys(state.statuses).length;
        if (confirm('Импортировать ' + countNew + ' ответов? (сейчас: ' + countOld + ')\nТекущий прогресс будет объединён с импортированным.')) {
          Object.keys(imported.statuses).forEach(function(k) {
            state.statuses[k] = imported.statuses[k];
          });
          saveState();
          renderSidebar();
          renderMain();
          alert('Импорт завершён!');
        }
      } catch(err) {
        alert('Ошибка: неверный формат файла');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeQuiz();
  if (e.key === ' ' && document.getElementById('quiz').classList.contains('active')) {
    e.preventDefault();
    if (!document.getElementById('quizAnswer').classList.contains('visible')) revealQuizAnswer();
  }
  if (document.getElementById('quiz').classList.contains('active') && document.getElementById('quizAnswer').classList.contains('visible')) {
    if (e.key === '1') rateQuiz('hard');
    if (e.key === '2') rateQuiz('learning');
    if (e.key === '3') rateQuiz('known');
  }
});

// Init
const savedTheme = localStorage.getItem('theme');
if (savedTheme) document.body.setAttribute('data-theme', savedTheme);
renderSidebar();
renderMain();

// PWA: Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
